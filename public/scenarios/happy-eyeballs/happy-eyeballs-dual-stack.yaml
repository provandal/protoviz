meta:
  id: "happy-eyeballs-dual-stack"
  title: "Happy Eyeballs: How Your Browser Chooses Between IPv4 and IPv6"
  protocol: "Multi-protocol (DNS, TCP, IPv4, IPv6)"
  protocol_family: "TCP/IP"
  version: "1.0.0"
  description: >
    You type example.com into your browser. Behind the scenes, a clever algorithm
    called Happy Eyeballs (RFC 8305) races IPv6 and IPv4 connections against each
    other to give you the fastest possible experience — without you ever knowing.
    Your browser asks DNS for both an AAAA record (IPv6) and an A record (IPv4),
    then immediately tries IPv6 first. If IPv6 responds within 250 milliseconds,
    great — you're on IPv6. If not, the browser fires off an IPv4 connection too,
    and whichever responds first wins. This scenario shows both outcomes: IPv6
    winning the race, and IPv6 failing with a seamless IPv4 fallback. The entire
    process is invisible to the user, and it's the reason the internet's transition
    from IPv4 to IPv6 has been mostly painless.

  learning_objectives:
    - "Understand that modern browsers send both AAAA (IPv6) and A (IPv4) DNS queries in parallel"
    - "Learn that Happy Eyeballs always prefers IPv6 but won't wait long for it"
    - "See the 250ms timer — long enough to be fair to IPv6, short enough that users don't notice"
    - "Observe how a failed IPv6 path triggers automatic IPv4 fallback with minimal delay"
    - "Appreciate that Happy Eyeballs is built into every modern browser and operating system"
    - "Compare IPv4 (32-bit) and IPv6 (128-bit) address formats in actual packet headers"
    - "Understand why without Happy Eyeballs, broken IPv6 would mean 20+ second timeouts"

  difficulty: "beginner"

  authors:
    - name: "ProtoViz Community"
      org: "proto-viz"
      github: "proto-viz"

  created: "2026-03-19"
  updated: "2026-03-19"

  tags:
    - "IPv6"
    - "IPv4"
    - "dual-stack"
    - "Happy Eyeballs"
    - "DNS"
    - "TCP"
    - "browser"
    - "transition"
    - "beginner"
    - "intermediate"
    - "education"
    - "WIP"

  primary_specs:
    - document: "RFC 8305"
      section: "1"
      title: "Happy Eyeballs Version 2: Better Connectivity Using Concurrency"
      url: "https://datatracker.ietf.org/doc/html/rfc8305"
      alt_url: ""
    - document: "RFC 6555"
      section: "1"
      title: "Happy Eyeballs — Success with Dual-Stack Hosts"
      url: "https://datatracker.ietf.org/doc/html/rfc6555"
      alt_url: ""
    - document: "RFC 8200"
      section: "1"
      title: "Internet Protocol, Version 6 (IPv6) Specification"
      url: "https://datatracker.ietf.org/doc/html/rfc8200"
      alt_url: ""

  content_disclaimer: >
    This scenario illustrates the Happy Eyeballs algorithm (RFC 8305) for dual-stack
    connection establishment. IP addresses, DNS responses, and TCP details are
    illustrative. The 250ms connection attempt delay is the recommended default from
    RFC 8305 Section 8; implementations may vary. The two phases (IPv6 wins, IPv4
    fallback) are shown sequentially for educational purposes — in practice they
    represent alternate outcomes for the same connection attempt.

# ─────────────────────────────────────────────────────────────────
# TOPOLOGY
# ─────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: "laptop"
      type: "host"
      label: "Your Laptop"
      description: "Your laptop running a web browser — dual-stack with both IPv4 and IPv6 addresses"
      hardware: "Laptop with Wi-Fi / Ethernet"
      os: "Windows / macOS / Linux"
      ip: "10.0.1.10"
      ipv6: "2001:db8:1::10"
      mac: "a4:83:e7:2b:c1:00"
      position: "left"

    - id: "router"
      type: "switch"
      label: "Home Router"
      description: "Dual-stack home router / default gateway — forwards both IPv4 and IPv6 traffic"
      hardware: "Consumer Wi-Fi router (dual-stack)"
      position: "center"

    - id: "dns"
      type: "host"
      label: "DNS Resolver"
      description: "Recursive DNS resolver — returns both A and AAAA records for dual-stack hosts"
      hardware: "DNS server"
      ip: "10.0.1.1"
      ipv6: "2001:db8:1::1"
      mac: "d4:6a:35:11:22:01"
      position: "right"

    - id: "webserver"
      type: "host"
      label: "Web Server (example.com)"
      description: "Dual-stack web server reachable via both IPv4 (192.0.2.1) and IPv6 (2001:db8::443:1)"
      hardware: "Web server"
      os: "Linux"
      ip: "192.0.2.1"
      ipv6: "2001:db8::443:1"
      mac: "00:00:00:00:00:00"
      position: "right"

  links:
    - id: "link-laptop-router"
      from: "laptop"
      to: "router"
      speed_gbps: 1
      media: "copper"
    - id: "link-router-dns"
      from: "router"
      to: "dns"
      speed_gbps: 1
      media: "copper"
    - id: "link-router-webserver"
      from: "router"
      to: "webserver"
      speed_gbps: 1
      media: "copper"

# ─────────────────────────────────────────────────────────────────
# OSI LAYERS
# ─────────────────────────────────────────────────────────────────
osi_layers:
  laptop:
    - layer: 7
      name: "Application (Browser)"
      components: ["Chrome / Firefox / Safari", "Happy Eyeballs engine"]
      state_schema:
        app_state:
          type: "string"
          description: "What the browser is doing right now"
          initial: "idle"
        url:
          type: "string"
          description: "URL being loaded"
          initial: "—"
        happy_eyeballs_timer:
          type: "string"
          description: "Happy Eyeballs 250ms timer state"
          initial: "—"

    - layer: 4
      name: "TCP"
      components: ["OS TCP stack"]
      state_schema:
        tcp_state_v6:
          type: "string"
          description: "TCP connection state over IPv6"
          initial: "CLOSED"
        tcp_state_v4:
          type: "string"
          description: "TCP connection state over IPv4"
          initial: "CLOSED"
        src_port:
          type: "integer"
          initial: 0
        dst_port:
          type: "integer"
          initial: 0

    - layer: 3
      name: "IP (Dual-Stack)"
      components: ["IPv4", "IPv6"]
      state_schema:
        src_ipv4:
          type: "string"
          initial: "10.0.1.10"
        src_ipv6:
          type: "string"
          initial: "2001:db8:1::10"
        active_protocol:
          type: "string"
          description: "Which IP version is currently active"
          initial: "—"

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"

  router:
    - layer: 3
      name: "IP Routing (Dual-Stack)"
      components: ["IPv4 NAT gateway", "IPv6 router", "DHCP / SLAAC"]
      state_schema:
        routing_state:
          type: "string"
          initial: "forwarding"
    - layer: 2
      name: "Ethernet Switching"
      components: ["L2 bridge"]
      state_schema:
        fwd_table_entries:
          type: "integer"
          initial: 0
    - layer: 1
      name: "Physical"
      components: ["Wi-Fi / Ethernet PHY"]
      state_schema:
        phy_state:
          type: "string"
          initial: "up"

  dns:
    - layer: 7
      name: "DNS Resolver"
      components: ["Recursive resolver (Unbound / BIND / dnsmasq)"]
      state_schema:
        query_state:
          type: "string"
          initial: "idle"
        cache_hit:
          type: "boolean"
          initial: false

    - layer: 4
      name: "UDP"
      components: ["UDP port 53"]
      state_schema:
        port:
          type: "integer"
          initial: 53

    - layer: 3
      name: "IP"
      components: ["IPv4"]
      state_schema:
        src_ip:
          type: "string"
          initial: "10.0.1.1"

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"

  webserver:
    - layer: 7
      name: "Application (Web Server)"
      components: ["nginx / Apache", "HTTPS listener"]
      state_schema:
        app_state:
          type: "string"
          initial: "listening"

    - layer: 4
      name: "TCP"
      components: ["Linux TCP stack"]
      state_schema:
        tcp_state:
          type: "string"
          initial: "LISTEN"
        src_port:
          type: "integer"
          initial: 443

    - layer: 3
      name: "IP (Dual-Stack)"
      components: ["IPv4", "IPv6"]
      state_schema:
        ipv4:
          type: "string"
          initial: "192.0.2.1"
        ipv6:
          type: "string"
          initial: "2001:db8::443:1"

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"

# ─────────────────────────────────────────────────────────────────
# FRAMES
# ─────────────────────────────────────────────────────────────────
frames:
  # ── Phase 1: DNS Resolution ────────────────────────────────────
  - id: "dns_aaaa_query"
    name: "DNS AAAA Query — example.com (IPv6)"
    description: "Browser asks the DNS resolver for the IPv6 address of example.com"
    from: "laptop"
    to: "dns"
    via: ["router"]
    total_bytes: 82
    color: "#7c3aed"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "d4:6a:35:11:22:01"
            description: "Router's MAC — your laptop sends to the default gateway"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "a4:83:e7:2b:c1:00"
            description: "Your laptop's MAC address"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
            description: "IPv4 (DNS query itself travels over IPv4 to the resolver)"

      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "10.0.1.10"
            description: "Your laptop's IPv4 address"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "10.0.1.1"
            description: "DNS resolver's IPv4 address"
          - name: "Protocol"
            abbrev: "ip.proto"
            bits: 8
            value: "17 (UDP)"
            description: "DNS typically uses UDP for queries under 512 bytes"
          - name: "TTL"
            abbrev: "ip.ttl"
            bits: 8
            value: 64
            description: "Time to Live — decremented by each router, prevents infinite loops"

      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: 49152
            description: "Random ephemeral port chosen by the OS"
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 53
            description: "DNS always listens on port 53"
          - name: "Length"
            abbrev: "udp.length"
            bits: 16
            value: 48
            description: "UDP header (8 bytes) + DNS payload (40 bytes)"

      - name: "DNS Query"
        abbrev: "dns"
        layer: 7
        total_bytes: 40
        fields:
          - name: "Transaction ID"
            abbrev: "dns.id"
            bits: 16
            value: "0xAA01"
            description: "Random ID to match this query with its response"
            spec_refs:
              - document: "RFC 1035"
                section: "4.1.1"
                title: "Header Section Format"
                url: "https://datatracker.ietf.org/doc/html/rfc1035#section-4.1.1"
          - name: "Flags"
            abbrev: "dns.flags"
            bits: 16
            value: "0x0100"
            description: "QR=0 (Query), Opcode=0 (Standard Query), RD=1 (Recursion Desired)"
          - name: "Questions"
            abbrev: "dns.count.queries"
            bits: 16
            value: 1
            description: "One question: 'What is the IPv6 address of example.com?'"
          - name: "Query Name"
            abbrev: "dns.qry.name"
            bits: 104
            value: "example.com"
            description: "The domain name we are looking up"
          - name: "Query Type"
            abbrev: "dns.qry.type"
            bits: 16
            value: "AAAA (28)"
            description: "Type AAAA = IPv6 address record (128-bit). This is the first query the browser sends — IPv6 preferred."
            spec_refs:
              - document: "RFC 3596"
                section: "2.1"
                title: "AAAA Record Type"
                url: "https://datatracker.ietf.org/doc/html/rfc3596#section-2.1"
          - name: "Query Class"
            abbrev: "dns.qry.class"
            bits: 16
            value: "IN (1)"
            description: "Internet class"

  - id: "dns_a_query"
    name: "DNS A Query — example.com (IPv4)"
    description: "Browser sends the A record query in parallel with the AAAA query"
    from: "laptop"
    to: "dns"
    via: ["router"]
    total_bytes: 82
    color: "#b45309"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "d4:6a:35:11:22:01"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "a4:83:e7:2b:c1:00"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"

      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "10.0.1.10"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "10.0.1.1"
          - name: "Protocol"
            abbrev: "ip.proto"
            bits: 8
            value: "17 (UDP)"
          - name: "TTL"
            abbrev: "ip.ttl"
            bits: 8
            value: 64

      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: 49153
            description: "Different ephemeral port from the AAAA query — both queries are in flight simultaneously"
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 53
          - name: "Length"
            abbrev: "udp.length"
            bits: 16
            value: 48

      - name: "DNS Query"
        abbrev: "dns"
        layer: 7
        total_bytes: 40
        fields:
          - name: "Transaction ID"
            abbrev: "dns.id"
            bits: 16
            value: "0xAA02"
            description: "Different transaction ID from the AAAA query — the resolver uses this to send back the right answer"
          - name: "Flags"
            abbrev: "dns.flags"
            bits: 16
            value: "0x0100"
            description: "QR=0 (Query), RD=1 (Recursion Desired)"
          - name: "Questions"
            abbrev: "dns.count.queries"
            bits: 16
            value: 1
            description: "One question: 'What is the IPv4 address of example.com?'"
          - name: "Query Name"
            abbrev: "dns.qry.name"
            bits: 104
            value: "example.com"
          - name: "Query Type"
            abbrev: "dns.qry.type"
            bits: 16
            value: "A (1)"
            description: "Type A = IPv4 address record (32-bit). Sent in parallel with the AAAA query."
            spec_refs:
              - document: "RFC 1035"
                section: "3.2.2"
                title: "TYPE values"
                url: "https://datatracker.ietf.org/doc/html/rfc1035#section-3.2.2"
          - name: "Query Class"
            abbrev: "dns.qry.class"
            bits: 16
            value: "IN (1)"

  - id: "dns_aaaa_response"
    name: "DNS AAAA Response — 2001:db8::443:1"
    description: "DNS resolver returns the IPv6 address for example.com"
    from: "dns"
    to: "laptop"
    via: ["router"]
    total_bytes: 110
    color: "#7c3aed"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "a4:83:e7:2b:c1:00"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "d4:6a:35:11:22:01"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"

      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "10.0.1.1"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "10.0.1.10"
          - name: "Protocol"
            abbrev: "ip.proto"
            bits: 8
            value: "17 (UDP)"

      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: 53
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 49152

      - name: "DNS Response"
        abbrev: "dns"
        layer: 7
        total_bytes: 68
        fields:
          - name: "Transaction ID"
            abbrev: "dns.id"
            bits: 16
            value: "0xAA01"
            description: "Matches the AAAA query — this is the IPv6 answer"
          - name: "Flags"
            abbrev: "dns.flags"
            bits: 16
            value: "0x8180"
            description: "QR=1 (Response), RD=1, RA=1 (Recursion Available)"
          - name: "Answer Count"
            abbrev: "dns.count.answers"
            bits: 16
            value: 1
            description: "One answer: the AAAA record"
          - name: "Answer — AAAA Record"
            abbrev: "dns.aaaa"
            bits: 128
            value: "2001:db8::443:1"
            description: "The IPv6 address of example.com — a 128-bit address. This is 4x longer than an IPv4 address, providing a virtually unlimited address space."
            spec_refs:
              - document: "RFC 3596"
                section: "2.2"
                title: "AAAA Data Format"
                url: "https://datatracker.ietf.org/doc/html/rfc3596#section-2.2"
          - name: "TTL"
            abbrev: "dns.resp.ttl"
            bits: 32
            value: 300
            description: "Cache for 5 minutes"

  - id: "dns_a_response"
    name: "DNS A Response — 192.0.2.1"
    description: "DNS resolver returns the IPv4 address for example.com"
    from: "dns"
    to: "laptop"
    via: ["router"]
    total_bytes: 98
    color: "#b45309"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "a4:83:e7:2b:c1:00"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "d4:6a:35:11:22:01"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"

      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "10.0.1.1"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "10.0.1.10"
          - name: "Protocol"
            abbrev: "ip.proto"
            bits: 8
            value: "17 (UDP)"

      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: 53
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 49153

      - name: "DNS Response"
        abbrev: "dns"
        layer: 7
        total_bytes: 56
        fields:
          - name: "Transaction ID"
            abbrev: "dns.id"
            bits: 16
            value: "0xAA02"
            description: "Matches the A query — this is the IPv4 answer"
          - name: "Flags"
            abbrev: "dns.flags"
            bits: 16
            value: "0x8180"
            description: "QR=1 (Response), RD=1, RA=1"
          - name: "Answer Count"
            abbrev: "dns.count.answers"
            bits: 16
            value: 1
            description: "One answer: the A record"
          - name: "Answer — A Record"
            abbrev: "dns.a"
            bits: 32
            value: "192.0.2.1"
            description: "The IPv4 address of example.com — a 32-bit address. Only ~4.3 billion possible IPv4 addresses exist, which is why we need IPv6."
          - name: "TTL"
            abbrev: "dns.resp.ttl"
            bits: 32
            value: 300
            description: "Cache for 5 minutes"

  # ── Phase 2: Happy Eyeballs — IPv6 Wins ───────────────────────
  - id: "tcp_syn_ipv6"
    name: "TCP SYN → example.com over IPv6"
    description: "Browser immediately tries IPv6 first — Happy Eyeballs prefers it"
    from: "laptop"
    to: "webserver"
    via: ["router"]
    total_bytes: 94
    color: "#7c3aed"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "d4:6a:35:11:22:01"
            description: "Router's MAC — even on IPv6, the local link-layer frame goes to the gateway"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "a4:83:e7:2b:c1:00"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x86DD"
            description: "IPv6 — notice this is different from IPv4's 0x0800. The EtherType tells the NIC which IP version to expect."
            spec_refs:
              - document: "RFC 8200"
                section: "1"
                title: "Internet Protocol, Version 6 (IPv6) Specification"
                url: "https://datatracker.ietf.org/doc/html/rfc8200"

      - name: "IPv6"
        abbrev: "ipv6"
        layer: 3
        total_bytes: 40
        fields:
          - name: "Version"
            abbrev: "ipv6.version"
            bits: 4
            value: 6
            description: "IP version 6"
          - name: "Traffic Class"
            abbrev: "ipv6.tclass"
            bits: 8
            value: "0x00"
            description: "Default traffic class — no DSCP or ECN markings"
          - name: "Flow Label"
            abbrev: "ipv6.flow"
            bits: 20
            value: "0x7A3E1"
            description: "Flow label for QoS — helps routers identify this traffic flow without inspecting higher layers"
          - name: "Payload Length"
            abbrev: "ipv6.plen"
            bits: 16
            value: 40
            description: "TCP header with SYN options (40 bytes)"
          - name: "Next Header"
            abbrev: "ipv6.nxt"
            bits: 8
            value: "6 (TCP)"
            description: "TCP follows this IPv6 header — same protocol number as in IPv4"
          - name: "Hop Limit"
            abbrev: "ipv6.hlim"
            bits: 8
            value: 64
            description: "IPv6's equivalent of TTL — decremented by each router"
