# ─────────────────────────────────────────────────────────────────
# S3/RDMA: Object PUT and GET over RoCEv2 (NVIDIA Library Architecture)
# ─────────────────────────────────────────────────────────────────
# Pre-standard scenario based on NVIDIA RDMA for S3-compatible storage
# library architecture (announced Dec 2025) and Dell ObjectScale implementation.
# S3/RDMA application-layer fields (L6/L7) carry spec_note "Pre-standard" markers.
# RoCEv2 transport fields (L1-L5) use standard IBTA/RFC/IEEE refs only.
# ─────────────────────────────────────────────────────────────────

meta:
  id: "s3-rdma-object-put-get"
  title: "S3/RDMA: Object PUT and GET over RoCEv2 (NVIDIA Library Architecture)"
  protocol: "S3/RDMA"
  protocol_family: "RDMA"
  version: "1.0.0"
  description: >
    An S3/RDMA exchange over 100GbE RoCEv2, demonstrating how AI workloads can
    perform S3 PUT and GET operations with zero CPU involvement in the data path.
    The scenario begins with physical link establishment and ARP, proceeds through
    S3/RDMA library initialization and QP connection setup via UD control messages,
    then shows a complete S3 PUT (1GB AI checkpoint upload) and S3 GET (1GB download)
    using RDMA WRITE for bulk data transfer. Contrast annotations compare S3/RDMA
    with traditional S3 over TCP/HTTP at each stage. Based on the NVIDIA RDMA for
    S3-compatible storage library architecture and Dell ObjectScale implementation.
    Wire-level field encodings for the S3/RDMA application layer are pre-standard
    and subject to change pending SNIA Accelerated Object I/O TWG specification.

  learning_objectives:
    - "Understand why traditional S3 over TCP/HTTP is CPU-intensive and how S3/RDMA eliminates that overhead"
    - "See how the NVIDIA S3/RDMA library sits above the RoCEv2 transport layer and below the S3 application API"
    - "Observe the QP connection setup that S3/RDMA uses before any object transfer"
    - "Trace an S3 PUT operation: how object metadata is exchanged over the control path while data moves over RDMA WRITE"
    - "Trace an S3 GET operation: how the server uses RDMA WRITE to push object data directly into client memory"
    - "Contrast S3/RDMA data path (zero CPU on data transfer) with traditional S3 over TCP (CPU handles every byte)"
    - "Understand the role of Memory Region registration in authorizing the server to write directly into client-allocated buffers"

  difficulty: "advanced"

  authors:
    - name: "ProtoViz Community"
      org: "proto-viz"
      github: "proto-viz"
    - name: "Generated via specification analysis"
      org: "proto-viz"
      github: ""

  created: "2026-03-17"
  updated: "2026-03-17"

  tags:
    - "S3"
    - "RDMA"
    - "RoCEv2"
    - "object-storage"
    - "AI-storage"
    - "GPUDirect"
    - "NVIDIANetworking"
    - "DellObjectScale"
    - "pre-standard"
    - "100GbE"

  primary_specs:
    - document: "NVIDIA RDMA for S3-compatible storage (pre-standard)"
      section: "Architecture Overview"
      title: "RDMA for S3-compatible storage library architecture"
      url: "https://blogs.nvidia.com/blog/s3-compatible-ai-storage/"
      alt_url: "https://www.snia.org/technical-work-groups"
    - document: "IBTA Vol1"
      section: "9.7.5"
      title: "Reliable Connected Service - RDMA WRITE"
      url: "https://www.infinibandta.org/ibta-specification/"
    - document: "RFC 7871"
      section: "3"
      title: "RoCEv2 UDP encapsulation"
      url: "https://datatracker.ietf.org/doc/html/rfc7871"
    - document: "IEEE 802.1Qbb"
      section: "36"
      title: "Priority-based Flow Control"
      url: "https://standards.ieee.org/ieee/802.1Qbb/4788/"

  content_disclaimer: >
    Protocol descriptions for the RoCEv2 transport layer are based on open-source
    implementations (Linux kernel, rdma-core) and public RFCs. S3/RDMA application-layer
    field descriptions are based on the publicly announced NVIDIA library architecture
    and are pre-standard. No proprietary specification text has been reproduced.

  source_references:
    - repo: "NVIDIA CUDA Toolkit"
      path: "s3rdma/client/s3_rdma_client.h"
      description: "S3/RDMA client library API (not public source - header reference)"
    - repo: "torvalds/linux"
      path: "drivers/infiniband/hw/mlx5/qp.c"
      description: "mlx5 QP management - used by S3/RDMA library for RC QP setup"
    - repo: "torvalds/linux"
      path: "drivers/infiniband/hw/mlx5/mr.c"
      description: "mlx5 MR registration - S3/RDMA registers GPU/CPU buffers as MRs"
    - repo: "torvalds/linux"
      path: "drivers/infiniband/core/cm.c"
      description: "IB CM - S3/RDMA uses standard RC connection setup"
    - repo: "linux-rdma/rdma-core"
      path: "libibverbs/verbs.h"
      description: "Userspace verbs API - ibv_post_send, ibv_poll_cq, struct ibv_qp_attr"

# ─────────────────────────────────────────────────────────────────
# TOPOLOGY
# ─────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: "ai_client"
      type: "initiator"
      label: "AI Compute Node (Client)"
      description: >
        GPU compute node running an AI training workload. Uses the NVIDIA S3/RDMA
        client library (part of CUDA Toolkit) to access object storage without CPU
        involvement in the data path. Mellanox ConnectX-6 Dx RNIC with GPUDirect
        capability. The AI framework (PyTorch/JAX) calls s3_rdma_get() / s3_rdma_put()
        which internally manages QP setup and RDMA operations.
      hardware: "NVIDIA DGX H100 / Mellanox ConnectX-6 Dx 100GbE RNIC"
      os: "Linux 6.x"
      ip: "192.168.100.10"
      gid: "fe80::0002:c903:0010:0001"
      mac: "00:02:c9:10:00:01"
      position: "left"

    - id: "switch"
      type: "switch"
      label: "100GbE RoCEv2 Switch"
      description: >
        Lossless 100GbE switch with PFC (priority 3) and ECN/DCQCN configured for
        RDMA traffic. Standard RoCEv2 fabric - S3/RDMA uses the same lossless
        Ethernet infrastructure as any other RoCEv2 workload.
      position: "center"

    - id: "s3_server"
      type: "target"
      label: "Object Storage Server (Dell ObjectScale)"
      description: >
        Object storage server running the NVIDIA S3/RDMA server library integrated
        into Dell ObjectScale. Exposes S3-compatible API. For S3/RDMA-capable clients,
        bypasses the HTTP stack entirely and uses RoCEv2 for data transfer.
        Mellanox ConnectX-6 Dx RNIC.
      hardware: "Dell PowerEdge / Mellanox ConnectX-6 Dx 100GbE RNIC"
      os: "Linux 6.x"
      ip: "192.168.100.20"
      mac: "00:02:c9:20:00:01"
      position: "right"

  links:
    - id: "link-client-sw"
      from: "ai_client"
      to: "switch"
      speed_gbps: 100
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true
    - id: "link-sw-server"
      from: "switch"
      to: "s3_server"
      speed_gbps: 100
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true

# ─────────────────────────────────────────────────────────────────
# OSI LAYER DEFINITIONS (per actor)
# ─────────────────────────────────────────────────────────────────
osi_layers:
  ai_client:
    - layer: 7
      name: "S3/RDMA Application"
      components: ["AI framework (PyTorch/JAX)", "S3 API calls"]
      state_schema:
        s3_operation:
          type: "string"
          description: "Current S3 operation (PUT/GET/IDLE)"
          initial: "IDLE"
        object_key:
          type: "string"
          description: "Current object key being operated on"
          initial: "null"
        object_size:
          type: "integer"
          description: "Object size in bytes"
          initial: 0
        s3_state:
          type: "string"
          description: "S3 operation state machine"
          initial: "IDLE"
        gpu_buffer_ptr:
          type: "string"
          description: "GPU buffer virtual address for data"
          initial: "null"

    - layer: 6
      name: "NVIDIA S3/RDMA Client Library"
      components: ["s3_rdma_client.h", "CUDA Toolkit S3/RDMA module"]
      state_schema:
        library_state:
          type: "string"
          description: "Library lifecycle state"
          initial: "NOT_INITIALIZED"
        qp_state_lib:
          type: "string"
          description: "Library-managed QP state"
          initial: "NONE"
        mr_registered:
          type: "boolean"
          description: "Memory Region registered for GPU/CPU buffer pool"
          initial: false
        rkey_local:
          type: "string"
          description: "Local rkey for registered MR"
          initial: "null"

    - layer: 5
      name: "IB Transport (RC QP)"
      components: ["drivers/infiniband/hw/mlx5/qp.c", "drivers/infiniband/core/verbs.c"]
      state_schema:
        qp_state:
          type: "string"
          description: "Queue Pair state machine state"
          initial: "RESET"
        qp_num:
          type: "string"
          description: "Local QP number"
          initial: "null"
        psn_send:
          type: "integer"
          description: "Send Packet Sequence Number"
          initial: 0
        psn_recv:
          type: "integer"
          description: "Next expected receive PSN"
          initial: 0
        remote_qpn:
          type: "string"
          description: "Remote QP number"
          initial: "null"
        pmtu:
          type: "string"
          description: "Path MTU"
          initial: "null"
        rkey_remote:
          type: "string"
          description: "Remote Memory Region key (learned from peer)"
          initial: "null"

    - layer: 4
      name: "UDP (RoCEv2 encapsulation)"
      components: ["kernel UDP stack", "RNIC hardware offload"]
      state_schema:
        src_port:
          type: "integer"
          description: "UDP source port (hash of flow for ECMP)"
          initial: 0
        dst_port:
          type: "integer"
          description: "UDP destination port - always 4791 for RoCEv2"
          initial: 4791

    - layer: 3
      name: "IP / ECN"
      components: ["kernel IP stack", "RNIC GID table"]
      state_schema:
        src_ip:
          type: "string"
          initial: "192.168.100.10"
        dst_ip:
          type: "string"
          initial: "null"
        ecn_state:
          type: "string"
          description: "ECN state: Not-ECT | ECT(0) | CE"
          initial: "Not-ECT"

    - layer: 2
      name: "Ethernet / PFC 802.1Qbb"
      components: ["mlx5 driver", "IEEE 802.1Q", "IEEE 802.1Qbb PFC"]
      state_schema:
        link_state:
          type: "string"
          initial: "down"
        pfc_enabled:
          type: "boolean"
          description: "PFC enabled on priority 3"
          initial: false
        pfc_xoff:
          type: "boolean"
          description: "PFC XOFF asserted"
          initial: false

    - layer: 1
      name: "Physical / RS-FEC"
      components: ["IEEE 802.3cd", "100GBASE-SR4", "RS(544,514) FEC"]
      state_schema:
        phy_state:
          type: "string"
          initial: "down"
        an_state:
          type: "string"
          description: "Auto-Negotiation state"
          initial: "idle"
        speed:
          type: "string"
          initial: "unknown"
        signal_detect:
          type: "boolean"
          initial: false

  s3_server:
    - layer: 7
      name: "S3/RDMA Server"
      components: ["Dell ObjectScale S3 engine", "NVIDIA S3/RDMA server library"]
      state_schema:
        s3_operation:
          type: "string"
          initial: "IDLE"
        object_key:
          type: "string"
          initial: "null"
        object_size:
          type: "integer"
          initial: 0
        s3_state:
          type: "string"
          initial: "IDLE"
        storage_backend:
          type: "string"
          initial: "ObjectScale"
        cpu_involvement:
          type: "string"
          description: "Whether CPU was involved in data transfer"
          initial: "none"

    - layer: 6
      name: "NVIDIA S3/RDMA Server Library"
      components: ["s3_rdma_server module", "Dell ObjectScale RDMA plugin"]
      state_schema:
        library_state:
          type: "string"
          initial: "NOT_INITIALIZED"
        rkey_advertised:
          type: "string"
          description: "rkey advertised to client for RDMA WRITE"
          initial: "null"
        client_buffer_vaddr:
          type: "string"
          description: "Client buffer virtual address (learned from CONNECT)"
          initial: "null"
        client_rkey:
          type: "string"
          description: "Client rkey (learned from CONNECT)"
          initial: "null"

    - layer: 5
      name: "IB Transport (RC QP)"
      components: ["drivers/infiniband/hw/mlx5/qp.c"]
      state_schema:
        qp_state:
          type: "string"
          initial: "RESET"
        qp_num:
          type: "string"
          initial: "null"
        psn_send:
          type: "integer"
          initial: 0
        psn_recv:
          type: "integer"
          initial: 0
        remote_qpn:
          type: "string"
          initial: "null"

    - layer: 4
      name: "UDP (RoCEv2 encapsulation)"
      components: ["kernel UDP stack", "RNIC hardware offload"]
      state_schema:
        dst_port:
          type: "integer"
          initial: 4791

    - layer: 3
      name: "IP / ECN"
      components: ["kernel IP stack"]
      state_schema:
        src_ip:
          type: "string"
          initial: "192.168.100.20"
        ecn_state:
          type: "string"
          initial: "Not-ECT"

    - layer: 2
      name: "Ethernet / PFC"
      components: ["mlx5 driver", "IEEE 802.1Qbb PFC"]
      state_schema:
        link_state:
          type: "string"
          initial: "down"
        pfc_enabled:
          type: "boolean"
          initial: false
        pfc_xoff:
          type: "boolean"
          initial: false

    - layer: 1
      name: "Physical / RS-FEC"
      components: ["IEEE 802.3cd", "100GBASE-SR4"]
      state_schema:
        phy_state:
          type: "string"
          initial: "down"
        an_state:
          type: "string"
          initial: "idle"
        speed:
          type: "string"
          initial: "unknown"
        signal_detect:
          type: "boolean"
          initial: false

  switch:
    - layer: 3
      name: "IP Forwarding / ECN"
      components: ["L3 forwarding (optional)", "ECN/WRED marking"]
      state_schema:
        ecn_marking_enabled:
          type: "boolean"
          description: "ECN CE marking enabled for congestion notification (DCQCN)"
          initial: true
        wred_threshold_bytes:
          type: "integer"
          initial: 153600
    - layer: 2
      name: "Ethernet Switching / PFC"
      components: ["802.1Q bridge", "802.1Qbb PFC", "MAC forwarding table"]
      state_schema:
        fwd_table_entries:
          type: "integer"
          initial: 0
        port_a_pfc_xoff:
          type: "boolean"
          description: "PFC XOFF toward ai_client (priority 3)"
          initial: false
        port_b_pfc_xoff:
          type: "boolean"
          description: "PFC XOFF toward s3_server (priority 3)"
          initial: false
    - layer: 1
      name: "Physical (per-port)"
      components: ["100GBASE-SR4", "RS(544,514) FEC"]
      state_schema:
        port_a_phy:
          type: "string"
          description: "Physical state of port facing ai_client"
          initial: "down"
        port_a_an:
          type: "string"
          initial: "idle"
        port_b_phy:
          type: "string"
          description: "Physical state of port facing s3_server"
          initial: "down"
        port_b_an:
          type: "string"
          initial: "idle"

# ─────────────────────────────────────────────────────────────────
# FRAMES
# ─────────────────────────────────────────────────────────────────
frames:

  # ── ARP ─────────────────────────────────────────────────────────
  - id: "arp_request"
    name: "ARP Request"
    description: "Client broadcasts ARP to resolve 192.168.100.20"
    from: "ai_client"
    to: "broadcast"
    via: ["switch"]
    timestamp_ns: 5000000
    total_bytes: 42
    color: "#f0c040"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "ff:ff:ff:ff:ff:ff"
            description: "Broadcast MAC"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:10:00:01"
            description: "Client NIC MAC"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0806"
            description: "EtherType 0x0806 = ARP"
      - name: "ARP"
        abbrev: "arp"
        layer: 3
        total_bytes: 28
        fields:
          - name: "Opcode"
            abbrev: "arp.opcode"
            bits: 16
            value: 1
            description: "1 = Request"
          - name: "Sender MAC"
            abbrev: "arp.src.hw_mac"
            bits: 48
            value: "00:02:c9:10:00:01"
            description: "Client MAC"
          - name: "Sender IP"
            abbrev: "arp.src.proto_ipv4"
            bits: 32
            value: "192.168.100.10"
            description: "Client IP"
          - name: "Target IP"
            abbrev: "arp.dst.proto_ipv4"
            bits: 32
            value: "192.168.100.20"
            description: "Server IP to resolve"

  - id: "arp_reply"
    name: "ARP Reply"
    description: "Server responds with its MAC address"
    from: "s3_server"
    to: "ai_client"
    via: ["switch"]
    timestamp_ns: 5200000
    total_bytes: 42
    color: "#f0c040"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:10:00:01"
            description: "Unicast reply to client"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:20:00:01"
            description: "Server NIC MAC"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0806"
            description: "ARP"
      - name: "ARP"
        abbrev: "arp"
        layer: 3
        total_bytes: 28
        fields:
          - name: "Opcode"
            abbrev: "arp.opcode"
            bits: 16
            value: 2
            description: "2 = Reply"
          - name: "Sender MAC"
            abbrev: "arp.src.hw_mac"
            bits: 48
            value: "00:02:c9:20:00:01"
            description: "Server MAC (the answer)"
          - name: "Sender IP"
            abbrev: "arp.src.proto_ipv4"
            bits: 32
            value: "192.168.100.20"
            description: "Server IP"

  # ── S3/RDMA CONNECT ─────────────────────────────────────────────
  - id: "s3rdma_connect_req"
    name: "S3/RDMA CONNECT Request"
    description: >
      Client sends S3/RDMA connection request over UD SEND to the well-known
      S3/RDMA service QP on the server. Carries client QP info, rkey, and buffer
      address so the server can RDMA WRITE into client memory.
    from: "ai_client"
    to: "s3_server"
    via: ["switch"]
    timestamp_ns: 20000000
    total_bytes: 146
    color: "#9b59b6"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:20:00:01"
            description: "Server MAC"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:10:00:01"
            description: "Client MAC"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
            description: "IPv4"
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.100.10"
            description: "Client IP"
          - name: "Destination"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.100.20"
            description: "Server IP"
          - name: "ECN"
            abbrev: "ip.ecn"
            bits: 2
            value: "ECT(0)"
            description: "ECN-Capable Transport - RoCEv2 marks ECT(0)"
            spec_refs:
              - document: "RFC 3168"
                section: "5"
                title: "ECN field"
                url: "https://datatracker.ietf.org/doc/html/rfc3168"
      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: 49152
            description: "Entropy source port (hash-based for ECMP)"
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 4791
            description: "RoCEv2 well-known port"
            spec_refs:
              - document: "RFC 7871"
                section: "3"
                title: "RoCEv2 UDP port"
                url: "https://datatracker.ietf.org/doc/html/rfc7871"
      - name: "BTH (Base Transport Header)"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "Opcode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x64"
            value_hex: "0x64"
            description: "UD Send Only - control message to well-known S3/RDMA service QP"
            spec_refs:
              - document: "IBTA Vol1"
                section: "9.7.1"
                title: "UD Send Only opcode"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Solicited Event (SE)"
            abbrev: "bth.se"
            bits: 1
            value: 1
            description: "Last (only) packet of message — solicited event"
          - name: "MigReq"
            abbrev: "bth.migreq"
            bits: 1
            value: 1
            description: "1 = primary path (not alternate/migrated)"
          - name: "Pad Count"
            abbrev: "bth.padcnt"
            bits: 2
            value: 0
            description: "Number of pad bytes appended to payload to make it a multiple of 4"
          - name: "Transport Header Version"
            abbrev: "bth.thv"
            bits: 4
            value: 0
          - name: "P_Key"
            abbrev: "bth.pkey"
            bits: 16
            value: "0xFFFF"
            value_hex: "0xFFFF"
            description: "Full membership P_Key (0xFFFF). Partition Key — defines a virtual fabric partition."
          - name: "FECN"
            abbrev: "bth.fecn"
            bits: 1
            value: 0
            description: "Forward ECN — not set"
          - name: "BECN"
            abbrev: "bth.becn"
            bits: 1
            value: 0
            description: "Backward ECN — not set"
          - name: "Dest QP"
            abbrev: "bth.dqpn"
            bits: 24
            value: "0x000001"
            # REVIEW: Well-known QP number for S3/RDMA service is assumed to be QP 1. Actual value TBD.
            description: "Well-known S3/RDMA service QP on server"
          - name: "Acknowledge Request (A)"
            abbrev: "bth.ackreq"
            bits: 1
            value: 1
            description: "Requester requests acknowledgement"
          - name: "PSN"
            abbrev: "bth.psn"
            bits: 24
            value: 0
            description: "Packet Sequence Number"
            spec_refs:
              - document: "IBTA Vol1"
                section: "9.7.1"
                title: "Base Transport Header"
                url: "https://www.infinibandta.org/ibta-specification/"
      # REVIEW: DETH header required for UD - 8 bytes with Q_Key and Src QP
      - name: "DETH (Datagram Extended Header)"
        abbrev: "deth"
        layer: 5
        total_bytes: 8
        fields:
          - name: "Q_Key"
            abbrev: "deth.qkey"
            bits: 32
            value: "0x80010000"
            # REVIEW: Q_Key value for S3/RDMA service is assumed. Actual value TBD.
            description: "Queue Key authorizing access to the UD service QP"
            spec_refs:
              - document: "IBTA Vol1"
                section: "9.8.4"
