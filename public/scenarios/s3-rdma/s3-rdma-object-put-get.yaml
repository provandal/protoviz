          - name: "Acknowledge Request (A)"
            abbrev: "bth.ackreq"
            bits: 1
            value: 0
            description: "Response — no acknowledgement requested"
          - name: "PSN"
            abbrev: "bth.psn"
            bits: 24
            value: 3
            description: "Server PSN 3"
      - name: "S3/RDMA GET COMPLETE Payload"
        abbrev: "s3rdma.get_complete"
        layer: 7
        total_bytes: 76
        fields:
          - name: "Message Type"
            abbrev: "s3rdma.msg_type"
            bits: 8
            value: "0x22"
            # REVIEW: GET_COMPLETE message type value is assumed.
            description: "GET_COMPLETE message type"
            spec_note: >
              Pre-standard. Field encoding subject to change pending SNIA
              Accelerated Object I/O TWG specification publication.
          - name: "Transfer ID"
            abbrev: "s3rdma.transfer_id"
            bits: 32
            value: "0x00000043"
            description: "Matches GET REQUEST transfer ID"
            spec_note: >
              Pre-standard. Field encoding subject to change pending SNIA
              Accelerated Object I/O TWG specification publication.
          - name: "Content Length"
            abbrev: "s3rdma.content_length"
            bits: 64
            value: 1073741824
            description: "1GB object"
            spec_note: >
              Pre-standard. Field encoding subject to change pending SNIA
              Accelerated Object I/O TWG specification publication.
          - name: "ETag"
            abbrev: "s3rdma.etag"
            bits: "variable"
            value: "d41d8cd98f00b204e9800998ecf8427e"
            description: "S3 ETag"
            spec_note: >
              Pre-standard. Field encoding subject to change pending SNIA
              Accelerated Object I/O TWG specification publication.
          - name: "Content Type"
            abbrev: "s3rdma.content_type"
            bits: "variable"
            value: "application/octet-stream"
            description: "MIME type"
            spec_note: >
              Pre-standard. Field encoding subject to change pending SNIA
              Accelerated Object I/O TWG specification publication.
          - name: "Bytes Transferred"
            abbrev: "s3rdma.bytes_transferred"
            bits: 64
            value: 1073741824
            description: "1GB confirmed transferred"
            spec_note: >
              Pre-standard. Field encoding subject to change pending SNIA
              Accelerated Object I/O TWG specification publication.
          - name: "Status"
            abbrev: "s3rdma.status"
            bits: 16
            value: "200 OK"
            description: "S3 status code"
            spec_note: >
              Pre-standard. Field encoding subject to change pending SNIA
              Accelerated Object I/O TWG specification publication.

# ─────────────────────────────────────────────────────────────────
# TIMELINE
# ─────────────────────────────────────────────────────────────────
timeline:

  # ── Phase 0: S3/TCP vs S3/RDMA Contrast ──────────────────────
  - id: "evt_contrast_intro"
    type: "annotation"
    t_ns: 0
    annotation:
      text: "Traditional S3 vs S3/RDMA — Why This Matters"
      detail: >
        Traditional S3 GET: HTTP GET request -> TCP connection -> TLS handshake ->
        HTTP response with object data -> kernel copies data through TCP socket
        buffers -> application copies from socket to buffer. Every byte touches the
        CPU twice. CPU utilization: high. Latency: 100s of microseconds to milliseconds.

        S3/RDMA GET: QP setup (one time) -> RDMA WRITE of object data directly into
        pre-registered client buffer. Zero CPU copies. Zero kernel involvement in data
        path. CPU utilization for data transfer: ~0%. Latency: single-digit microseconds.

  # ── Phase 1: Link Training ──────────────────────────────────────
  - id: "evt_phy_signal_link_a"
    type: "state_change"
    t_ns: 100000
    annotation:
      text: "Link A: signal detected — Client <-> Switch port A"
      detail: >
        Optical transceiver on client detects light from switch port A.
        Auto-Negotiation begins per IEEE 802.3cd clause 73.
      spec_refs:
        - document: "IEEE 802.3cd"
          section: "73"
          title: "Auto-Negotiation for 100GBASE-KR4"
          url: "https://standards.ieee.org/ieee/802.3cd/7387/"
    state_after:
      - actor_id: "ai_client"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              phy_state: "AN_IN_PROGRESS"
              signal_detect: true
              an_state: "ABILITY_DETECT"
      - actor_id: "switch"
        layers:
          - layer: 1
            name: "Physical (per-port)"
            state_fields:
              port_a_phy: "AN_IN_PROGRESS"
              port_a_an: "ABILITY_DETECT"

  - id: "evt_phy_signal_link_b"
    type: "state_change"
    t_ns: 200000
    annotation:
      text: "Link B: signal detected — Switch port B <-> Server"
    state_after:
      - actor_id: "s3_server"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              phy_state: "AN_IN_PROGRESS"
              signal_detect: true
              an_state: "ABILITY_DETECT"
      - actor_id: "switch"
        layers:
          - layer: 1
            name: "Physical (per-port)"
            state_fields:
              port_b_phy: "AN_IN_PROGRESS"
              port_b_an: "ABILITY_DETECT"

  - id: "evt_an_complete_both"
    type: "state_change"
    t_ns: 2000000
    annotation:
      text: "Both links: AN complete — 100GbE + RS(544,514) FEC, links UP"
      detail: >
        Both links negotiate 100GBASE-SR4 with RS(544,514) FEC (mandatory for 100G).
        Link Training equalizes channels. Links are UP and ready for traffic.
    state_after:
      - actor_id: "ai_client"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              phy_state: "UP"
              an_state: "COMPLETE"
              speed: "100GbE"
          - layer: 2
            name: "Ethernet / PFC 802.1Qbb"
            state_fields:
              link_state: "up"
              pfc_enabled: true
      - actor_id: "s3_server"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              phy_state: "UP"
              an_state: "COMPLETE"
              speed: "100GbE"
          - layer: 2
            name: "Ethernet / PFC"
            state_fields:
              link_state: "up"
              pfc_enabled: true
      - actor_id: "switch"
        layers:
          - layer: 1
            name: "Physical (per-port)"
            state_fields:
              port_a_phy: "UP"
              port_a_an: "COMPLETE"
              port_b_phy: "UP"
              port_b_an: "COMPLETE"
          - layer: 2
            name: "Ethernet Switching / PFC"
            state_fields:
              fwd_table_entries: 0

  - id: "evt_pfc_enabled"
    type: "state_change"
    t_ns: 3000000
    annotation:
      text: "PFC enabled on priority 3 — lossless Ethernet for RoCEv2"
      detail: >
        Priority Flow Control (IEEE 802.1Qbb) enabled on priority class 3.
        This prevents packet loss under congestion, which is critical for RDMA.
        S3/RDMA uses the same lossless fabric as any RoCEv2 workload.

  # ── Phase 2: ARP ────────────────────────────────────────────────
  - id: "evt_arp_request"
    type: "frame_tx"
    t_ns: 5000000
    frame_id: "arp_request"
    annotation:
      text: "ARP: Client resolves server IP 192.168.100.20"
    state_after:
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "Ethernet Switching / PFC"
            state_fields:
              fwd_table_entries: 1

  - id: "evt_arp_reply"
    type: "frame_tx"
    t_ns: 5200000
    frame_id: "arp_reply"
    annotation:
      text: "ARP Reply: Server MAC 00:02:c9:20:00:01"
    state_after:
      - actor_id: "ai_client"
        layers:
          - layer: 3
            name: "IP / ECN"
            state_fields:
              dst_ip: "192.168.100.20"
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "Ethernet Switching / PFC"
            state_fields:
              fwd_table_entries: 2

  # ── Phase 3: Library Initialization ─────────────────────────────
  - id: "evt_client_lib_init"
    type: "state_change"
    t_ns: 10000000
    annotation:
      text: "Client: s3_rdma_client_init() — S3/RDMA library initialized"
      detail: >
        Client calls s3_rdma_client_init(). Library registers a large Memory Region
        covering the GPU/CPU buffer pool (ibv_reg_mr() -> MLX5_CMD_OP_CREATE_MKEY).
        Creates a pool of RC QPs pre-allocated for S3 operations. This is a one-time
        cost amortized across all subsequent S3 operations.
    state_after:
      - actor_id: "ai_client"
        layers:
          - layer: 7
            name: "S3/RDMA Application"
            state_fields:
              s3_state: "LIB_INITIALIZED"
              gpu_buffer_ptr: "0x7f8000000000"
          - layer: 6
            name: "NVIDIA S3/RDMA Client Library"
            state_fields:
              library_state: "INITIALIZED"
              mr_registered: true
              rkey_local: "0xABCD1234"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RESET"
              qp_num: "0x000200"

  - id: "evt_server_lib_ready"
    type: "state_change"
    t_ns: 10000000
    annotation:
      text: "Server: S3/RDMA server library pre-initialized, ready for connections"
      detail: >
        Server has pre-initialized its NVIDIA S3/RDMA server library on startup.
        Pool of QPs ready to accept client connections. Integrated with Dell ObjectScale
        storage engine.
    state_after:
      - actor_id: "s3_server"
        layers:
          - layer: 6
            name: "NVIDIA S3/RDMA Server Library"
            state_fields:
              library_state: "READY_FOR_CONNECTIONS"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RESET"
              qp_num: "0x000300"

  # ── Phase 4: S3/RDMA Connect ───────────────────────────────────
  - id: "evt_connect_req"
    type: "frame_tx"
    t_ns: 20000000
    frame_id: "s3rdma_connect_req"
    annotation:
      text: "S3/RDMA CONNECT Request — client sends QP info, rkey, buffer address"
      detail: >
        Client sends connection request via UD SEND to the well-known S3/RDMA
        service QP on the server. Carries client QP number, GID, rkey, and buffer
        virtual address. The server will use this rkey/vaddr to RDMA WRITE data
        directly into the client's GPU memory.
    state_after:
      - actor_id: "ai_client"
        layers:
          - layer: 6
            name: "NVIDIA S3/RDMA Client Library"
            state_fields:
              library_state: "CONNECTING"
              qp_state_lib: "CONNECTING"

  - id: "evt_connect_resp"
    type: "frame_tx"
    t_ns: 20500000
    frame_id: "s3rdma_connect_resp"
    annotation:
      text: "S3/RDMA CONNECT Response — server assigns RC QP, returns rkey"
      detail: >
        Server assigns an RC QP from its pool and responds with server QP number,
        rkey, and connection ID. Both sides now have all information needed to
        transition QPs from RESET to RTS.
    state_after:
      - actor_id: "s3_server"
        layers:
          - layer: 6
            name: "NVIDIA S3/RDMA Server Library"
            state_fields:
              library_state: "CONNECTED"
              client_buffer_vaddr: "0x7f8000000000"
              client_rkey: "0xABCD1234"

  - id: "evt_qp_rts"
    type: "state_change"
    t_ns: 21000000
    annotation:
      text: "QP transitions: RESET -> INIT -> RTR -> RTS on both sides"
      detail: >
        Both client and server call modify_qp() to bring their RC QPs through
        the standard IB state machine: RESET -> INIT -> RTR -> RTS. This is the
        same QP bring-up sequence used by all RoCEv2 applications. After RTS,
        the QP pair is ready for RDMA SEND and RDMA WRITE operations.
    state_after:
      - actor_id: "ai_client"
        layers:
          - layer: 6
            name: "NVIDIA S3/RDMA Client Library"
            state_fields:
              library_state: "CONNECTED"
              qp_state_lib: "READY"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RTS"
              remote_qpn: "0x000300"
              pmtu: "4096"
              rkey_remote: "0xDEAD5678"
              psn_send: 0
              psn_recv: 0
      - actor_id: "s3_server"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RTS"
              remote_qpn: "0x000200"
              psn_send: 0
              psn_recv: 0

  # ── Phase 5: S3 PUT ─────────────────────────────────────────────
  - id: "evt_put_request"
    type: "frame_tx"
    t_ns: 30000000
    frame_id: "s3_put_request"
    annotation:
      text: "S3 PUT REQUEST — metadata only (bucket, key, 1GB size). No data in this message."
      detail: >
        Client sends PUT metadata via RDMA SEND. This small control message contains
        the S3 operation details (bucket, key, size, checksum algorithm) and the
        client buffer location. In traditional S3 this would be an HTTP PUT with the
        entire 1GB body. In S3/RDMA, the data transfer happens separately via RDMA WRITE.
    state_after:
      - actor_id: "ai_client"
        layers:
          - layer: 7
            name: "S3/RDMA Application"
            state_fields:
              s3_operation: "PUT"
              object_key: "checkpoint/model_epoch_42.pt"
              object_size: 1073741824
              s3_state: "PUT_REQUEST_SENT"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 1

  - id: "evt_put_ready"
    type: "frame_tx"
    t_ns: 30500000
    frame_id: "s3_put_ready"
    annotation:
      text: "S3 PUT READY — server returns destination vaddr + rkey for RDMA WRITE"
      detail: >
        Server allocates storage space, registers a Memory Region for the incoming
        data, and sends back the destination address and rkey. This is the PUT
        inversion: unlike HTTP PUT where the client pushes data, here the server
        tells the client WHERE to write, and the client RDMA WRITEs to that location.
    state_after:
      - actor_id: "s3_server"
        layers:
          - layer: 7
            name: "S3/RDMA Server"
            state_fields:
              s3_operation: "PUT"
              object_key: "checkpoint/model_epoch_42.pt"
              s3_state: "PUT_READY_SENT"
              storage_backend: "ObjectScale"
          - layer: 6
            name: "NVIDIA S3/RDMA Server Library"
            state_fields:
              rkey_advertised: "0xDEAD5678"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 1
      - actor_id: "ai_client"
        layers:
          - layer: 7
            name: "S3/RDMA Application"
            state_fields:
              s3_state: "PUT_WRITING_DATA"

  - id: "evt_put_rdma_write"
    type: "frame_tx"
    t_ns: 31000000
    frame_id: "s3_put_rdma_write"
    annotation:
      text: "RDMA WRITE — client pushes 64MB chunk (1 of 16) directly into server memory"
      detail: >
        Client RNIC DMA-reads 64MB from GPU memory and RDMA WRITEs directly into
        server memory at the address from PUT READY. For the full 1GB object,
        16 such RDMA WRITEs occur (16 x 64MB). Server CPU never touches the data.
        Client CPU never copies the data. This is standard RoCEv2 RDMA WRITE —
        the only thing S3/RDMA adds is the control plane that arranged the addressing.
    state_after:
      - actor_id: "ai_client"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 2
      - actor_id: "s3_server"
        layers:
          - layer: 7
            name: "S3/RDMA Server"
            state_fields:
              cpu_involvement: "NONE - RNIC DMA writes data directly to storage buffer"

  - id: "evt_put_complete"
    type: "frame_tx"
    t_ns: 40000000
    frame_id: "s3_put_complete"
    annotation:
      text: "S3 PUT COMPLETE — 1GB uploaded, checksum verified, ETag returned"
      detail: >
        Server confirms PUT success after verifying CRC32C checksum. Returns S3 ETag
        and version ID. The object is now durable in ObjectScale storage.
    state_after:
      - actor_id: "ai_client"
        layers:
          - layer: 7
            name: "S3/RDMA Application"
            state_fields:
              s3_state: "PUT_COMPLETE"
      - actor_id: "s3_server"
        layers:
          - layer: 7
            name: "S3/RDMA Server"
            state_fields:
              s3_state: "PUT_COMPLETE"

  - id: "evt_put_contrast"
    type: "annotation"
    t_ns: 40100000
    annotation:
      text: "Contrast: S3/TCP PUT vs S3/RDMA PUT"
      detail: >
        Traditional S3 PUT equivalent: HTTP PUT with 1GB body -> TLS encrypt 1GB ->
        TCP segment 1GB into ~1400B packets -> kernel copies each packet to NIC ->
        NIC transmits -> server NIC receives -> kernel copies to socket buffer ->
        HTTP server reads from socket -> copies to storage buffer -> writes to disk.
        CPU touches every byte multiple times. Throughput bounded by single-core
        memory bandwidth (~50 GB/s). Latency dominated by TCP congestion control.

        S3/RDMA PUT: 2 control messages (PUT REQUEST + PUT READY) + 16 RDMA WRITEs
        (16 x 64MB). Server CPU never touched the data. Client CPU never copied the
        data. Throughput bounded by RNIC DMA bandwidth and network bandwidth, not
        CPU. At 100GbE: ~12.5 GB/s sustained.

  # ── Phase 6: S3 GET ─────────────────────────────────────────────
  - id: "evt_get_request"
    type: "frame_tx"
    t_ns: 50000000
    frame_id: "s3_get_request"
    annotation:
      text: "S3 GET REQUEST — client requests object, provides destination buffer info"
      detail: >
        Client sends GET request with bucket/key and destination buffer address/rkey.
        The server will RDMA WRITE the object data directly into this buffer.
    state_after:
      - actor_id: "ai_client"
        layers:
          - layer: 7
            name: "S3/RDMA Application"
            state_fields:
              s3_operation: "GET"
              s3_state: "GET_REQUEST_SENT"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 3

  - id: "evt_get_rdma_write"
    type: "frame_tx"
    t_ns: 51000000
    frame_id: "s3_get_rdma_write"
    annotation:
      text: "RDMA WRITE — server pushes 64MB chunk (1 of 16) directly into client GPU memory"
      detail: >
        Server RNIC DMA-reads object data from storage and RDMA WRITEs directly into
        client GPU memory. Client CPU is not involved. For the full 1GB object, 16 such
        RDMA WRITEs occur. This is the same mechanism as any RDMA WRITE — S3/RDMA
        simply arranges the addressing so the server knows where to write.
    state_after:
      - actor_id: "s3_server"
        layers:
          - layer: 7
            name: "S3/RDMA Server"
            state_fields:
              s3_operation: "GET"
              s3_state: "GET_WRITING_DATA"
              cpu_involvement: "NONE - RNIC DMA read storage and wrote to client"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 3

  - id: "evt_get_complete"
    type: "frame_tx"
    t_ns: 60000000
    frame_id: "s3_get_complete"
    annotation:
      text: "S3 GET COMPLETE — 1GB in client GPU buffer, ready for training"
      detail: >
        Server signals completion. Object data is now in the client GPU buffer at
        0x7f8000000000, ready for the training forward pass. Client CPU was never
        involved in data movement. No intermediate copy to host memory required
        if using GPUDirect Storage mode.
    state_after:
      - actor_id: "ai_client"
        layers:
          - layer: 7
            name: "S3/RDMA Application"
            state_fields:
              s3_state: "GET_COMPLETE"
              gpu_buffer_ptr: "0x7f8000000000"
          - layer: 6
            name: "NVIDIA S3/RDMA Client Library"
            state_fields:
              library_state: "CONNECTED"
      - actor_id: "s3_server"
        layers:
          - layer: 7
            name: "S3/RDMA Server"
            state_fields:
              s3_state: "GET_COMPLETE"
              cpu_involvement: "NONE - RNIC DMA read storage and wrote to client"

  - id: "evt_get_contrast"
    type: "annotation"
    t_ns: 60100000
    annotation:
      text: "Contrast: S3/TCP GET vs S3/RDMA GET"
      detail: >
        The client's AI training loop called s3_rdma_get(). The object data is now
        in the GPU buffer at 0x7f8000000000. The client CPU was never involved in
        the data movement. The training forward pass can begin immediately — no
        intermediate copy to host memory required if using GPUDirect Storage mode.

        Traditional S3 GET: HTTP GET -> TCP -> TLS decrypt -> kernel socket buffer ->
        user-space copy -> GPU upload via PCIe. Every byte crosses CPU twice minimum.
        S3/RDMA GET: 1 control message + 16 RDMA WRITEs. Zero CPU, zero copies.

# ─────────────────────────────────────────────────────────────────
# GLOSSARY
# ─────────────────────────────────────────────────────────────────
glossary:
  - term: "S3/RDMA"
    definition: >
      Protocol that implements S3 PUT/GET semantics using RDMA for the data path.
      Control messages (bucket, key, addressing) use small RDMA SENDs. Object data
      uses RDMA WRITE directly into pre-registered Memory Regions. Zero CPU
      involvement in the data path.
    spec_refs:
      - document: "NVIDIA RDMA for S3-compatible storage (pre-standard)"
        section: "Architecture Overview"
        url: "https://blogs.nvidia.com/blog/s3-compatible-ai-storage/"

  - term: "NVIDIA S3/RDMA Library"
    definition: >
      Client and server libraries developed by NVIDIA to implement S3/RDMA. Client
      library ships in CUDA Toolkit. Server library integrated by storage vendors
      (Dell ObjectScale, Cloudian HyperStore, HPE Alletra). Architecture is open;
      wire format pending SNIA standardization.
    spec_refs:
      - document: "NVIDIA S3/RDMA Library (pre-standard)"
        section: "Architecture"
        url: "https://blogs.nvidia.com/blog/s3-compatible-ai-storage/"

  - term: "SNIA Accelerated Object I/O TWG"
    definition: >
      SNIA Technical Work Group chartered to produce an interoperable specification
      for S3 over RDMA optimized for AI/ML workloads.
    spec_refs:
      - document: "SNIA TWG"
        section: "Charter"
        url: "https://www.snia.org/technical-work-groups"

  - term: "Control Path vs Data Path"
    definition: >
      In S3/RDMA, the control path carries S3 metadata (bucket, key, size, ETag)
      via small RDMA SEND messages. The data path carries object data via RDMA WRITE
      with zero CPU involvement. This separation is fundamental to S3/RDMA efficiency.

  - term: "Transfer ID"
    definition: >
      A correlation identifier in S3/RDMA control messages that ties together the
      REQUEST, READY, and COMPLETE messages for a single object operation.
      Functionally similar to an HTTP request ID or exchange ID.

  - term: "PUT Inversion"
    definition: >
      Unlike traditional HTTP PUT (client sends data in request body), S3/RDMA PUT
      has the client advertise a source buffer and rkey, the server returns a
      destination address and rkey, and the client RDMA WRITEs to the server.
      This allows the server to control destination addressing and flow.

  - term: "Queue Pair"
    abbrev: "QP"
    definition: "The fundamental RDMA endpoint. Consists of a Send Queue (SQ) and Receive Queue (RQ). S3/RDMA uses RC (Reliable Connected) QPs for data transfer and UD (Unreliable Datagram) QPs for initial connection setup."
    spec_refs:
      - document: "IBTA Vol1"
        section: "11.2"
        title: "Queue Pair"
        url: "https://www.infinibandta.org/ibta-specification/"

  - term: "Memory Region"
    abbrev: "MR"
    definition: "A contiguous virtual memory range registered with the RNIC. In S3/RDMA, the client registers GPU memory as an MR so the server can RDMA WRITE object data directly into it. Returns lkey (local access) and rkey (remote access authorization)."
    spec_refs:
      - document: "IBTA Vol1"
        section: "10.6.3"
        title: "Memory Region Registration"
        url: "https://www.infinibandta.org/ibta-specification/"

  - term: "Priority Flow Control"
    abbrev: "PFC"
    definition: "IEEE 802.1Qbb extension enabling per-priority pause frames for lossless Ethernet. S3/RDMA relies on PFC (priority 3) to prevent packet loss, same as any RoCEv2 workload."
    spec_refs:
      - document: "IEEE 802.1Qbb"
        section: "36"
        title: "Priority-based Flow Control"
        url: "https://standards.ieee.org/ieee/802.1Qbb/4788/"
