      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 4791
      - name: "IB BTH"
        abbrev: "infiniband.bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "Opcode"
            abbrev: "infiniband.bth.opcode"
            bits: 8
            value: "0x11"
            value_hex: "0x11"
            description: "0x11 = RC Acknowledge. Pure ACK packet — no payload."
            spec_refs:
              - document: "IBTA Vol1"
                section: "A19"
                title: "Opcode 0x11 = RC Acknowledge"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Destination QP"
            abbrev: "infiniband.bth.destqp"
            bits: 24
            value: "0x00A001"
            description: "Initiator's QP number — ACK goes back to the QP that sent the WRITE"
          - name: "PSN"
            abbrev: "infiniband.bth.psn"
            bits: 24
            value: 1234567
      - name: "IB AETH (ACK Extended Transport Header)"
        abbrev: "infiniband.aeth"
        layer: 5
        total_bytes: 4
        fields:
          - name: "Syndrome"
            abbrev: "infiniband.aeth.syndrome"
            bits: 8
            value: "0x00"
            value_hex: "0x00"
            description: "Syndrome 0x00 = ACK (no error). Other values: 0x20-0x3F = RNR NAK (with timer), 0x60-0x9F = NAK codes."
            spec_refs:
              - document: "IBTA Vol1"
                section: "9.7.7"
                title: "AETH Syndrome field encoding"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Message Sequence Number (MSN)"
            abbrev: "infiniband.aeth.msn"
            bits: 24
            value: 1
            description: "Cumulative message count ACKed. Initiator uses this to determine which WQEs are complete."

  # ── RDMA READ REQUEST ─────────────────────────────────────────────
  - id: "rdma_read_req"
    name: "RDMA READ Request"
    description: >
      Initiator requests target to send back the data it just wrote.
      Only a request packet is sent — no data. Target RNIC autonomously
      reads its own memory and sends RDMA READ Response packets.
      CPU on target is NOT involved.
      Linux: ibv_post_send() with IBV_WR_RDMA_READ opcode
    from: "initiator"
    to: "target"
    via: ["switch"]
    timestamp_ns: 25000000
    total_bytes: 74
    color: "#b05bd9"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:12:34:56"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.1.10"
          - name: "Destination"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.1.20"
      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 4791
      - name: "IB BTH"
        abbrev: "infiniband.bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "Opcode"
            abbrev: "infiniband.bth.opcode"
            bits: 8
            value: "0x0C"
            value_hex: "0x0C"
            description: "0x0C = RC RDMA Read Request. Contains RETH specifying what to read. No payload in request direction."
            spec_refs:
              - document: "IBTA Vol1"
                section: "A19"
                title: "Opcode 0x0C = RC RDMA Read Request"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Destination QP"
            abbrev: "infiniband.bth.destqp"
            bits: 24
            value: "0x00B002"
          - name: "PSN"
            abbrev: "infiniband.bth.psn"
            bits: 24
            value: 1234568
            description: "Next PSN after the WRITE (1234567 + 1)"
      - name: "IB RETH"
        abbrev: "infiniband.reth"
        layer: 5
        total_bytes: 16
        fields:
          - name: "Virtual Address"
            abbrev: "infiniband.reth.virtual_address"
            bits: 64
            value: "0x7f0000000000"
            description: "Address to read from — same MR we wrote to"
          - name: "R_Key"
            abbrev: "infiniband.reth.r_key"
            bits: 32
            value: "0xDEAD1234"
            description: "Same rkey — authorizes read access to this MR"
          - name: "DMA Length"
            abbrev: "infiniband.reth.dma_length"
            bits: 32
            value: 4096
            description: "Read 4096 bytes"

  # ── RDMA READ RESPONSE ────────────────────────────────────────────
  - id: "rdma_read_resp_only"
    name: "RDMA READ Response Only"
    description: >
      Target RNIC reads its own memory (DMA) and sends the data back.
      No CPU involvement on target. Initiator RNIC writes received data
      directly into initiator's local memory buffer.
      Linux: mlx5 firmware generates read response; ibv_poll_cq() on initiator
      sees READ completion after last response packet.
    from: "target"
    to: "initiator"
    via: ["switch"]
    timestamp_ns: 26200000
    total_bytes: 4162
    color: "#b05bd9"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:12:34:56"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.1.20"
          - name: "Destination"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.1.10"
      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 4791
      - name: "IB BTH"
        abbrev: "infiniband.bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "Opcode"
            abbrev: "infiniband.bth.opcode"
            bits: 8
            value: "0x10"
            value_hex: "0x10"
            description: "0x10 = RC RDMA Read Response Only (fits in one MTU). If >MTU, first=0x0D, middle=0x0E, last=0x0F."
            spec_refs:
              - document: "IBTA Vol1"
                section: "A19"
                title: "Opcode 0x10 = RC RDMA Read Response Only"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Destination QP"
            abbrev: "infiniband.bth.destqp"
            bits: 24
            value: "0x00A001"
          - name: "PSN"
            abbrev: "infiniband.bth.psn"
            bits: 24
            value: 7654321
            description: "Target's PSN — starts from target's starting PSN in CM REP"
      - name: "IB AETH"
        abbrev: "infiniband.aeth"
        layer: 5
        total_bytes: 4
        fields:
          - name: "Syndrome"
            abbrev: "infiniband.aeth.syndrome"
            bits: 8
            value: "0x00"
            description: "ACK — read completed successfully. Initiator will generate READ completion on CQ."
          - name: "MSN"
            abbrev: "infiniband.aeth.msn"
            bits: 24
            value: 1
      - name: "RDMA Data Payload"
        abbrev: "data"
        layer: 7
        total_bytes: 4096
        fields:
          - name: "Payload"
            abbrev: "data.data"
            bits: 32768
            value: "<same 4096 bytes previously written by RDMA WRITE>"
            description: "Data DMA'd from target memory by target's RNIC. No CPU read() call occurred on target."
      - name: "IB ICRC"
        abbrev: "infiniband.icrc"
        layer: 5
        total_bytes: 4
        fields:
          - name: "ICRC"
            abbrev: "infiniband.icrc"
            bits: 32
            value: "0x<computed>"
            description: "ICRC over read response — verified by initiator RNIC"

# ─────────────────────────────────────────────────────────────────
# TIMELINE
# ─────────────────────────────────────────────────────────────────
timeline:

  # ── Phase 1: Link Training ──────────────────────────────────────
  - id: "evt_phy_signal"
    type: "state_change"
    t_ns: 0
    annotation:
      text: "Physical layer: signal detected on both ends"
      detail: "Optical transceiver detects light. Begins Auto-Negotiation (AN) per IEEE 802.3cd clause 73."
      spec_refs:
        - document: "IEEE 802.3cd"
          section: "73"
          title: "Auto-Negotiation for 100GBASE-KR4"
          url: "https://standards.ieee.org/ieee/802.3cd/7387/"
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              phy_state: "AN_IN_PROGRESS"
              signal_detect: true
              an_state: "ABILITY_DETECT"
      - actor_id: "target"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              phy_state: "AN_IN_PROGRESS"
              signal_detect: true
              an_state: "ABILITY_DETECT"
      - actor_id: "switch"
        layers:
          - layer: 1
            name: "Physical"
            state_fields:
              port_a_state: "AN_IN_PROGRESS"
              port_b_state: "AN_IN_PROGRESS"

  - id: "evt_an_complete"
    type: "state_change"
    t_ns: 2000000
    annotation:
      text: "Auto-Negotiation complete: 100GbE agreed, RS-FEC required"
      detail: >
        AN exchanges technology ability pages. Both ends agree on 100GBASE-SR4.
        RS(544,514) FEC is mandatory for 100G. Link Training begins to equalize the
        channel (pre-emphasis, post-cursor, etc).
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              an_state: "COMPLETE"
              lt_state: "IN_PROGRESS"
              fec_mode: "RS(544,514)"
              speed: "100Gbps"
      - actor_id: "target"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              an_state: "COMPLETE"
              lt_state: "IN_PROGRESS"
              speed: "100Gbps"

  - id: "evt_link_up"
    type: "state_change"
    t_ns: 4000000
    annotation:
      text: "Link Training complete — link is UP at 100Gbps with RS-FEC"
      detail: >
        Both sides declare link up. PFC (802.1Qbb) is enabled for priority 3
        (the standard RoCEv2 traffic class) via DCBX negotiation (not shown).
        Ethernet frames can now flow.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              phy_state: "UP"
              lt_state: "COMPLETE"
          - layer: 2
            name: "Ethernet / PFC"
            state_fields:
              link_state: "up"
              pfc_enabled: true
              pfc_priority: 3
      - actor_id: "target"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              phy_state: "UP"
              lt_state: "COMPLETE"
          - layer: 2
            name: "Ethernet / PFC"
            state_fields:
              link_state: "up"
              pfc_enabled: true
      - actor_id: "switch"
        layers:
          - layer: 1
            name: "Physical"
            state_fields:
              port_a_state: "up"
              port_b_state: "up"
          - layer: 2
            name: "Ethernet Switching / PFC"
            state_fields:
              fwd_table_entries: 0

  # ── Phase 2: ARP ────────────────────────────────────────────────
  - id: "evt_arp_req"
    type: "frame_tx"
    t_ns: 5000000
    frame_id: "arp_request"
    annotation:
      text: "ARP Request: who has 192.168.1.20?"
      detail: "RoCEv2 uses IP addressing. Before any connection setup, IP reachability must be established."
    state_after:
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "Ethernet Switching / PFC"
            state_fields:
              fwd_table_entries: 1

  - id: "evt_arp_rep"
    type: "frame_tx"
    t_ns: 5200000
    frame_id: "arp_reply"
    annotation:
      text: "ARP Reply: 192.168.1.20 is at 00:02:c9:ab:cd:ef"
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 3
            name: "IP / Routing"
            state_fields:
              dst_ip: "192.168.1.20"
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "Ethernet Switching / PFC"
            state_fields:
              fwd_table_entries: 2

  # ── Phase 3: App registers MR, creates QP ───────────────────────
  - id: "evt_mr_reg"
    type: "state_change"
    t_ns: 7000000
    annotation:
      text: "Both sides register Memory Regions via ibv_reg_mr()"
      detail: >
        ibv_reg_mr() pins physical pages, builds a DMA mapping, and registers
        the virtual→physical translation in the RNIC's Memory Translation Table (MTT).
        Returns lkey (for local DMA) and rkey (to share with remote for RDMA access).
        Linux: mlx5_ib_reg_user_mr() → MLX5_CMD_OP_CREATE_MKEY firmware command.
      spec_refs:
        - document: "IBTA Vol1"
          section: "10.6"
          title: "Memory Management — Registration and Keys"
          url: "https://www.infinibandta.org/ibta-specification/"
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              mr_registered: true
              app_state: "mr_registered"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              lkey: "0xABC01234"
              qp_state: "RESET"
      - actor_id: "target"
        layers:
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              mr_registered: true
              mr_vaddr: "0x7f0000000000"
              mr_length: 4096
              app_state: "mr_registered_listening"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              lkey: "0xDEF05678"
              rkey: "0xDEAD1234"

  - id: "evt_qp_create"
    type: "state_change"
    t_ns: 8000000
    annotation:
      text: "QP created — state: RESET"
      detail: >
        ibv_create_qp() allocates a Queue Pair (Send Queue + Receive Queue + Completion Queue).
        QP begins in RESET state — cannot send or receive.
        mlx5: MLX5_CMD_OP_CREATE_QP firmware command assigns QPN.
      spec_refs:
        - document: "IBTA Vol1"
          section: "11.2.4"
          title: "QP State Machine — RESET state"
          url: "https://www.infinibandta.org/ibta-specification/"
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RESET"
              qp_num: "0x00A001"
      - actor_id: "target"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RESET"
              qp_num: "0x00B002"

  - id: "evt_qp_init"
    type: "state_change"
    t_ns: 8500000
    annotation:
      text: "QP transitioned RESET → INIT via ibv_modify_qp()"
      detail: >
        modify_qp(RESET→INIT) sets: P_Key index, port number, access flags.
        QP can now post Receive WQEs (but cannot send yet).
        Linux: ib_modify_qp() → mlx5_ib_modify_qp() → MLX5_CMD_OP_RST2INIT_QP.
        Required attrs: IB_QP_PKEY_INDEX | IB_QP_PORT | IB_QP_ACCESS_FLAGS.
      spec_refs:
        - document: "IBTA Vol1"
          section: "11.2.4.2"
          title: "RESET to INIT transition — required attributes"
          url: "https://www.infinibandta.org/ibta-specification/"
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "INIT"
      - actor_id: "target"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "INIT"

  # ── Phase 4: CM Handshake ────────────────────────────────────────
  - id: "evt_cm_req"
    type: "frame_tx"
    t_ns: 10000000
    frame_id: "cm_req"
    annotation:
      text: "CM REQ sent — proposing QP parameters"
      detail: >
        rdma_connect() triggers ib_send_cm_req(). Sends initiator QPN, starting PSN,
        path MTU=4096, retry counts, and application private data to target.
        Both QPs still in INIT at this point.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 6
            name: "CM / rdma-cm"
            state_fields:
              cm_state: "REQ_SENT"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 1234567
              pmtu: "4096"

  - id: "evt_cm_rep"
    type: "frame_tx"
    t_ns: 12000000
    frame_id: "cm_rep"
    annotation:
      text: "CM REP received — target accepts, provides its QPN and PSN"
      detail: >
        On receiving REQ, target calls rdma_accept() → ib_send_cm_rep().
        Target transitions its QP to RTR (Ready To Receive) after sending REP.
        Initiator transitions its QP to RTR on receiving REP.
        INIT→RTR sets: dest QPN, RQ PSN, path MTU, AV (address vector).
        Linux: mlx5_ib_modify_qp() → MLX5_CMD_OP_INIT2RTR_QP.
    state_after:
      - actor_id: "target"
        layers:
          - layer: 6
            name: "CM / rdma-cm"
            state_fields:
              cm_state: "REP_SENT"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RTR"
              remote_qpn: "0x00A001"
              psn_recv_expected: 1234567
              pmtu: "4096"
      - actor_id: "initiator"
        layers:
          - layer: 6
            name: "CM / rdma-cm"
            state_fields:
              cm_state: "REP_RECEIVED"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RTR"
              remote_qpn: "0x00B002"
              psn_recv_expected: 7654321
              rkey: "0xDEAD1234"

  - id: "evt_cm_rtu"
    type: "frame_tx"
    t_ns: 13500000
    frame_id: "cm_rtu"
    annotation:
      text: "CM RTU sent — both QPs transition to RTS. Connection established."
      detail: >
        After sending RTU, initiator transitions QP: RTR→RTS.
        On receiving RTU, target transitions QP: RTR→RTS.
        RTR→RTS sets: SQ PSN, retry count, RNR retry, timeout.
        Linux: MLX5_CMD_OP_RTR2RTS_QP.
        QP is now fully operational — RDMA operations can begin.
      spec_refs:
        - document: "IBTA Vol1"
          section: "11.2.4.4"
          title: "RTR to RTS — QP ready to send"
          url: "https://www.infinibandta.org/ibta-specification/"
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 6
            name: "CM / rdma-cm"
            state_fields:
              cm_state: "ESTABLISHED"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RTS"
              sq_psn: 1234567
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              app_state: "connected"
      - actor_id: "target"
        layers:
          - layer: 6
            name: "CM / rdma-cm"
            state_fields:
              cm_state: "ESTABLISHED"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RTS"

  # ── Phase 5: RDMA WRITE ──────────────────────────────────────────
  - id: "evt_app_post_write"
    type: "state_change"
    t_ns: 19000000
    annotation:
      text: "Application posts RDMA WRITE Work Request to Send Queue"
      detail: >
        ibv_post_send() with opcode IBV_WR_RDMA_WRITE.
        WR specifies: local SG list (lkey + vaddr of source buffer), remote vaddr + rkey.
        Doorbell ring via mmio write to RNIC BAR register (no syscall after ibv_post_send).
        Linux: mlx5_post_one_wr() → builds 64-byte WQE → rings doorbell via
        mlx5_write64() to RNIC MMIO.
      spec_refs:
        - document: "IBTA Vol1"
          section: "11.4.1"
          title: "ibv_post_send — posting WRs to SQ"
          url: "https://www.infinibandta.org/ibta-specification/"
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              posted_wr: "RDMA_WRITE wr_id=1"
              app_state: "write_posted"

  - id: "evt_rdma_write"
    type: "frame_tx"
    t_ns: 20000000
    frame_id: "rdma_write_only"
    annotation:
      text: "RDMA WRITE — 4KB pushed into remote memory, zero CPU on target"
      detail: >
        RNIC DMAs local buffer, encapsulates in BTH+RETH+UDP+IP+Eth, transmits.
        Target RNIC verifies ICRC, checks rkey authorization against MR table,
        DMAs payload to target physical memory. Target CPU sees nothing until
        application polls CQ (which would only happen if target posted a WRITE_WITH_IMM).
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 1234567
          - layer: 2
            name: "Ethernet / PFC"
            state_fields:
              tx_queue_depth: 4162
      - actor_id: "target"
        layers:
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              cpu_involvement: "NONE — RNIC DMA wrote directly to MR"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_recv_expected: 1234568

  - id: "evt_rdma_write_ack"
    type: "frame_tx"
    t_ns: 20800000
    frame_id: "rdma_write_ack"
    annotation:
      text: "ACK from target RNIC — WRITE complete, CQE posted on initiator"
      detail: >
        Target RNIC autonomously generates RC ACK. No CPU involvement on target.
        On receiving ACK, initiator RNIC posts a CQE (Completion Queue Entry) to
        initiator's CQ. Application learns of completion via ibv_poll_cq().
        Linux: mlx5_ib_poll_cq() reads CQE from CQ ring buffer.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              cq_entries: 1
              app_state: "write_complete"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 1234568

  # ── Phase 6: RDMA READ ───────────────────────────────────────────
  - id: "evt_app_post_read"
    type: "state_change"
    t_ns: 24000000
    annotation:
      text: "Application posts RDMA READ Work Request"
      detail: >
        ibv_post_send() with opcode IBV_WR_RDMA_READ.
        Specifies: local SG buffer for received data (lkey), remote vaddr + rkey.
        RDMA READ requires a round trip — initiator sends request, target sends data.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              posted_wr: "RDMA_READ wr_id=2"
              app_state: "read_posted"

  - id: "evt_rdma_read_req"
    type: "frame_tx"
    t_ns: 25000000
    frame_id: "rdma_read_req"
    annotation:
      text: "RDMA READ Request — no data in this direction"
      detail: >
        Initiator sends BTH(opcode=0x0C) + RETH specifying what to read.
        No payload. Target RNIC will autonomously DMA its own memory and respond.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 1234568

  - id: "evt_rdma_read_resp"
    type: "frame_tx"
    t_ns: 26200000
    frame_id: "rdma_read_resp_only"
    annotation:
      text: "RDMA READ Response — target RNIC DMAs memory and sends data"
      detail: >
        Target RNIC: receives READ request → validates rkey → DMA reads physical memory
        → builds response packet(s) → transmits. Zero CPU involvement on target.
        Initiator RNIC: receives response → DMA writes to initiator's local buffer →
        posts READ CQE. Application calls ibv_poll_cq() to retrieve result.
        The data returned is exactly what was written in the RDMA WRITE — verified
        end-to-end by ICRC.
    state_after:
      - actor_id: "target"
        layers:
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              cpu_involvement: "NONE — RNIC DMA read memory and sent response"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 7654321
      - actor_id: "initiator"
        layers:
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              cq_entries: 1
              app_state: "read_complete"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_recv_expected: 7654322

  - id: "evt_done"
    type: "annotation"
    t_ns: 27000000
    annotation:
      text: "Scenario complete"
      detail: >
        Summary: The initiator established a 100GbE RoCEv2 RC connection, performed
        an RDMA WRITE of 4KB to remote memory (zero remote CPU involvement), then
        read that same data back with an RDMA READ (also zero remote CPU involvement).
        Total data frames: 2. Total control frames: 5 (ARP×2, CM×3).
        The remote CPU was never interrupted for data operations.

# ─────────────────────────────────────────────────────────────────
# GLOSSARY
# ─────────────────────────────────────────────────────────────────
glossary:
  - term: "Queue Pair"
    abbrev: "QP"
    definition: "The fundamental RDMA endpoint. Consists of a Send Queue (SQ) and Receive Queue (RQ). Communication happens between a local QP and a remote QP. For RC service, each QP is connected to exactly one remote QP."
    spec_refs:
      - document: "IBTA Vol1"
        section: "11.2"
        title: "Queue Pair"
        url: "https://www.infinibandta.org/ibta-specification/"

  - term: "Memory Region"
    abbrev: "MR"
    definition: "A contiguous virtual memory range registered with the RNIC. Registration pins the pages and creates a virtual→physical translation in the RNIC's Memory Translation Table. Returns lkey (for local access) and rkey (for remote access authorization)."
    spec_refs:
      - document: "IBTA Vol1"
        section: "10.6.3"
        title: "Memory Region Registration"
        url: "https://www.infinibandta.org/ibta-specification/"

  - term: "Work Queue Element"
    abbrev: "WQE"
    definition: "A descriptor posted to a QP's SQ or RQ describing a data transfer operation. For SEND/WRITE/READ, the WQE contains opcode, local SG list (lkey+addr+len), and for RDMA ops, the remote address and rkey."
    spec_refs:
      - document: "IBTA Vol1"
        section: "11.4"
        title: "Work Queue Elements"
        url: "https://www.infinibandta.org/ibta-specification/"

  - term: "Priority Flow Control"
    abbrev: "PFC"
    definition: "IEEE 802.1Qbb extension that allows pause frames to be sent per traffic class (priority 0-7), enabling lossless Ethernet. RoCEv2 typically runs on priority 3. When a switch buffer reaches a threshold, it sends a PAUSE frame for that priority, causing the upstream sender to pause transmission without dropping packets."
    spec_refs:
      - document: "IEEE 802.1Qbb"
        section: "36"
        title: "Priority-based Flow Control"
        url: "https://standards.ieee.org/ieee/802.1Qbb/4788/"

  - term: "DCQCN"
    definition: "Data Center Quantized Congestion Notification. The standard congestion control algorithm for RoCEv2. Uses ECN marking by switches (CE bits in IP header) to trigger rate reduction at senders. Combines concepts from QCN and DCTCP."
    spec_refs:
      - document: "SIGCOMM 2015"
        section: "1"
        title: "Congestion Control for Large-Scale RDMA Deployments"
        url: "https://dl.acm.org/doi/10.1145/2829988.2787484"

  - term: "Invariant CRC"
    abbrev: "ICRC"
    definition: "A 32-bit CRC appended to every IB transport packet. Covers BTH, all extended headers, and payload. 'Invariant' means mutable IP/Ethernet fields (TTL, FECN/BECN) are zeroed before computation so routers do not invalidate it. Checked in hardware by the receiving RNIC — if failed, packet is silently dropped and RC will retransmit."
    spec_refs:
      - document: "IBTA Vol1"
        section: "9.4.1"
        title: "Invariant CRC"
        url: "https://www.infinibandta.org/ibta-specification/"

  - term: "Reliable Connected"
    abbrev: "RC"
    definition: "IB transport service type. RC provides: reliable (guaranteed delivery with retransmission), in-order delivery, connection-oriented (QP-to-QP). Required for RDMA READ. Most RoCEv2 deployments use RC."
    spec_refs:
      - document: "IBTA Vol1"
        section: "9.7.5"
        title: "Reliable Connected Service"
        url: "https://www.infinibandta.org/ibta-specification/"
