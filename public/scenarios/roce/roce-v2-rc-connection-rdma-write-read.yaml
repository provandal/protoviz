meta:
  id: "roce-v2-rc-link-through-rdma-write-read"
  title: "RoCEv2 RC: Link Training → QP Connection → RDMA WRITE → RDMA READ"
  protocol: "RoCEv2"
  protocol_family: "RDMA"
  version: "1.0.0"
  description: >
    A complete RoCEv2 Reliable Connected (RC) exchange over 100GbE, beginning with
    physical link establishment (Auto-Negotiation, Link Training, RS-FEC), proceeding
    through IP/ARP setup, IB Connection Manager (CM) QP bring-up via MAD/CM REQ→REP→RTU,
    an RDMA WRITE that pushes a 4KB buffer directly into remote memory without CPU
    involvement on the target, and an RDMA READ that retrieves that same buffer.
    Host state is shown across all OSI layers, including verbs API, QP state machine,
    IB transport headers, IP/UDP encapsulation, PFC-capable Ethernet, and the physical
    layer RS-FEC state. Frame fields are annotated with IBTA, RFC, and IEEE spec references
    and cross-referenced to Linux kernel source (rdma-core, drivers/infiniband/hw/mlx5).

  learning_objectives:
    - "Understand how 100GbE physical link comes up via Auto-Negotiation and Link Training"
    - "Trace ARP resolution and IP addressing for RoCEv2 (which runs over UDP/IP, unlike RoCEv1)"
    - "Follow IB Connection Manager MAD exchange to bring a Queue Pair from RESET to RTS"
    - "Observe QP state machine transitions: RESET → INIT → RTR → RTS"
    - "See how RDMA WRITE bypasses the remote CPU — no receive WQE consumed on target"
    - "See how RDMA READ requires a round trip and how RETH/AETH headers carry addressing"
    - "Understand Memory Region (MR) keys (lkey/rkey) and their role in RDMA authorization"
    - "Observe how PFC (Priority Flow Control) prevents lossless Ethernet drop under congestion"

  difficulty: "advanced"

  authors:
    - name: "ProtoViz Community"
      org: "proto-viz"
      github: "proto-viz"
    - name: "Generated via Linux kernel source analysis"
      org: "proto-viz"
      github: ""

  created: "2026-03-14"
  updated: "2026-03-14"

  tags:
    - "RDMA"
    - "RoCEv2"
    - "InfiniBand"
    - "100GbE"
    - "lossless-ethernet"
    - "PFC"
    - "DCQCN"
    - "queue-pair"
    - "education"

  primary_specs:
    - document: "IBTA Vol1"
      section: "9"
      title: "Connection Management"
      url: "https://www.infinibandta.org/ibta-specification/"
      alt_url: "https://www.rdmamojo.com/2012/12/28/ib-verbs-connection-setup/"
    - document: "IBTA Vol1"
      section: "9.7"
      title: "Reliable Connection Service"
      url: "https://www.infinibandta.org/ibta-specification/"
      alt_url: "https://docs.kernel.org/infiniband/index.html"
    - document: "RFC 7871"
      section: "3"
      title: "RoCEv2 — IB transport over UDP/IPv4/IPv6"
      url: "https://datatracker.ietf.org/doc/html/rfc7871"
      alt_url: "https://community.mellanox.com/s/article/rocev2-ip-routable-rdma-over-converged-ethernet"
    - document: "IEEE 802.1Qbb"
      section: "36"
      title: "Priority-based Flow Control"
      url: "https://standards.ieee.org/ieee/802.1Qbb/4788/"
      alt_url: "https://community.mellanox.com/s/article/understanding-pfc"
    - document: "IEEE 802.3cd"
      section: "135"
      title: "100GBASE-KR4 Auto-Negotiation and Link Training"
      url: "https://standards.ieee.org/ieee/802.3cd/7387/"
      alt_url: ""

  content_disclaimer: >
    Protocol descriptions in this scenario are based on open-source implementations
    (Linux kernel, rdma-core, Wireshark) and public RFCs. No proprietary specification
    text has been reproduced. IBTA, IEEE, and other specification references are provided
    as citations for further reading.

  source_references:
    - repo: "torvalds/linux"
      path: "drivers/infiniband/core/cm.c"
      description: "IB Connection Manager — REQ/REP/RTU/DREQ/DREP state machine"
    - repo: "torvalds/linux"
      path: "drivers/infiniband/hw/mlx5/qp.c"
      description: "mlx5 QP creation, modify_qp (RESET→INIT→RTR→RTS), WQE posting"
    - repo: "torvalds/linux"
      path: "drivers/infiniband/core/verbs.c"
      description: "ib_modify_qp — generic verbs QP state machine enforcement"
    - repo: "torvalds/linux"
      path: "drivers/net/ethernet/mellanox/mlx5/core/en/reporter_rx.c"
      description: "mlx5 RX path, PFC watchdog, ECN counters"
    - repo: "linux-rdma/rdma-core"
      path: "libibverbs/verbs.h"
      description: "Userspace verbs API — ibv_post_send, ibv_poll_cq, struct ibv_qp_attr"
    - repo: "linux-rdma/rdma-core"
      path: "librdmacm/cma.c"
      description: "rdma_create_qp, rdma_connect, rdma_accept — CM abstraction over IB CM MADs"

# ─────────────────────────────────────────────────────────────────
# TOPOLOGY
# ─────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: "initiator"
      type: "initiator"
      label: "Host A (Initiator)"
      description: "RDMA initiator — posts SEND/WRITE/READ Work Requests"
      hardware: "Mellanox ConnectX-6 Dx 100GbE RNIC"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "192.168.1.10"
      gid: "fe80::0002:c903:0012:3456"
      mac: "00:02:c9:12:34:56"
      position: "left"

    - id: "switch"
      type: "switch"
      label: "100GbE Switch"
      description: "Lossless 100GbE switch with PFC and ECN/RED support. PFC priority 3 used for RoCEv2 traffic."
      hardware: "Generic 100GbE datacenter switch"
      position: "center"

    - id: "target"
      type: "target"
      label: "Host B (Target)"
      description: "RDMA target — exposes Memory Regions for remote access"
      hardware: "Mellanox ConnectX-6 Dx 100GbE RNIC"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "192.168.1.20"
      gid: "fe80::0002:c903:00ab:cdef"
      mac: "00:02:c9:ab:cd:ef"
      position: "right"

  links:
    - id: "link-a-sw"
      from: "initiator"
      to: "switch"
      speed_gbps: 100
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true
    - id: "link-sw-b"
      from: "switch"
      to: "target"
      speed_gbps: 100
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true

# ─────────────────────────────────────────────────────────────────
# OSI LAYER DEFINITIONS (per actor)
# These define what each OSI layer means for this specific protocol stack
# ─────────────────────────────────────────────────────────────────
osi_layers:
  initiator:
    - layer: 7
      name: "Application / Verbs"
      components: ["libibverbs", "librdmacm", "user application"]
      state_schema:
        app_state:
          type: "string"
          description: "Application-level state"
          initial: "idle"
        posted_wr:
          type: "string"
          description: "Last Work Request posted to SQ"
          initial: "none"
        cq_entries:
          type: "integer"
          description: "Completion Queue entries available"
          initial: 0
        mr_registered:
          type: "boolean"
          description: "Memory Region registered with RNIC"
          initial: false

    - layer: 6
      name: "CM / rdma-cm"
      components: ["librdmacm", "drivers/infiniband/core/cma.c", "drivers/infiniband/core/cm.c"]
      state_schema:
        cm_state:
          type: "string"
          description: "Connection Manager state"
          initial: "idle"
        cm_id:
          type: "string"
          description: "rdma_cm_id handle"
          initial: "null"

    - layer: 5
      name: "IB Transport (RC QP)"
      components: ["drivers/infiniband/hw/mlx5/qp.c", "drivers/infiniband/core/verbs.c"]
      state_schema:
        qp_state:
          type: "string"
          description: "Queue Pair state machine state"
          initial: "RESET"
        qp_num:
          type: "string"
          description: "Local QP number"
          initial: "null"
        psn_send:
          type: "integer"
          description: "Send Packet Sequence Number"
          initial: 0
        psn_recv_expected:
          type: "integer"
          description: "Next expected receive PSN"
          initial: 0
        sq_depth:
          type: "integer"
          description: "Send Queue WQE count"
          initial: 128
        rq_depth:
          type: "integer"
          description: "Receive Queue WQE count"
          initial: 128
        pmtu:
          type: "string"
          description: "Path MTU for this QP"
          initial: "null"
        sq_psn:
          type: "integer"
          description: "Starting PSN for sends"
          initial: 0
        lkey:
          type: "string"
          description: "Local Memory Region key"
          initial: "null"
        rkey:
          type: "string"
          description: "Remote Memory Region key (learned from peer)"
          initial: "null"
        remote_qpn:
          type: "string"
          description: "Remote QP number"
          initial: "null"

    - layer: 4
      name: "UDP (RoCEv2 encapsulation)"
      components: ["kernel UDP stack", "RNIC hardware offload"]
      state_schema:
        src_port:
          type: "integer"
          description: "UDP source port (hash of flow for ECMP)"
          initial: 0
        dst_port:
          type: "integer"
          description: "UDP destination port — always 4791 for RoCEv2"
          initial: 4791

    - layer: 3
      name: "IP / Routing"
      components: ["kernel IP stack", "RNIC GID table"]
      state_schema:
        src_ip:
          type: "string"
          description: "Source IP address"
          initial: "192.168.1.10"
        dst_ip:
          type: "string"
          description: "Destination IP address"
          initial: "null"
        dscp:
          type: "integer"
          description: "DSCP/ToS marking for QoS (ECN uses low 2 bits)"
          initial: 0
        ecn_state:
          type: "string"
          description: "ECN state: Not-ECT | ECT(0) | ECT(1) | CE"
          initial: "Not-ECT"
        ttl:
          type: "integer"
          initial: 64

    - layer: 2
      name: "Ethernet / PFC"
      components: ["mlx5 driver", "IEEE 802.1Q", "IEEE 802.1Qbb PFC"]
      state_schema:
        link_state:
          type: "string"
          initial: "down"
        pfc_enabled:
          type: "boolean"
          description: "PFC enabled on priority 3"
          initial: false
        pfc_priority:
          type: "integer"
          description: "PFC priority class for RoCEv2 traffic"
          initial: 3
        pfc_xoff:
          type: "boolean"
          description: "PFC XOFF asserted (pause active)"
          initial: false
        tx_queue_depth:
          type: "integer"
          description: "Approximate bytes in TX queue"
          initial: 0
        vlan_id:
          type: "integer"
          description: "VLAN for PFC (PFC requires 802.1Q)"
          initial: 0

    - layer: 1
      name: "Physical / RS-FEC"
      components: ["IEEE 802.3cd", "100GBASE-SR4", "RS(544,514) FEC"]
      state_schema:
        phy_state:
          type: "string"
          description: "Physical layer state"
          initial: "down"
        an_state:
          type: "string"
          description: "Auto-Negotiation state"
          initial: "idle"
        lt_state:
          type: "string"
          description: "Link Training state"
          initial: "idle"
        fec_mode:
          type: "string"
          initial: "RS(544,514)"
        fec_corrected_blocks:
          type: "integer"
          initial: 0
        speed:
          type: "string"
          initial: "unknown"
        signal_detect:
          type: "boolean"
          initial: false

  target:
    - layer: 7
      name: "Application / Verbs"
      components: ["libibverbs", "librdmacm", "user application"]
      state_schema:
        app_state:
          type: "string"
          initial: "idle"
        mr_registered:
          type: "boolean"
          initial: false
        mr_vaddr:
          type: "string"
          description: "Virtual address of registered Memory Region"
          initial: "null"
        mr_length:
          type: "integer"
          description: "Length of registered MR in bytes"
          initial: 0
        cpu_involvement:
          type: "string"
          description: "Whether CPU was involved in this data transfer"
          initial: "none"

    - layer: 6
      name: "CM / rdma-cm"
      components: ["librdmacm", "drivers/infiniband/core/cma.c"]
      state_schema:
        cm_state:
          type: "string"
          initial: "listening"
        cm_id:
          type: "string"
          initial: "null"

    - layer: 5
      name: "IB Transport (RC QP)"
      components: ["drivers/infiniband/hw/mlx5/qp.c"]
      state_schema:
        qp_state:
          type: "string"
          initial: "RESET"
        qp_num:
          type: "string"
          initial: "null"
        psn_recv_expected:
          type: "integer"
          initial: 0
        lkey:
          type: "string"
          initial: "null"
        rkey:
          type: "string"
          description: "rkey this host will advertise to initiator (out-of-band, via app)"
          initial: "null"
        remote_qpn:
          type: "string"
          initial: "null"
        pmtu:
          type: "string"
          initial: "null"

    - layer: 4
      name: "UDP (RoCEv2 encapsulation)"
      components: ["kernel UDP stack", "RNIC hardware offload"]
      state_schema:
        dst_port:
          type: "integer"
          initial: 4791

    - layer: 3
      name: "IP / Routing"
      components: ["kernel IP stack"]
      state_schema:
        src_ip:
          type: "string"
          initial: "192.168.1.20"
        ecn_state:
          type: "string"
          initial: "Not-ECT"

    - layer: 2
      name: "Ethernet / PFC"
      components: ["mlx5 driver", "IEEE 802.1Qbb PFC"]
      state_schema:
        link_state:
          type: "string"
          initial: "down"
        pfc_enabled:
          type: "boolean"
          initial: false
        pfc_xoff:
          type: "boolean"
          initial: false

    - layer: 1
      name: "Physical / RS-FEC"
      components: ["IEEE 802.3cd", "100GBASE-SR4"]
      state_schema:
        phy_state:
          type: "string"
          initial: "down"
        an_state:
          type: "string"
          initial: "idle"
        lt_state:
          type: "string"
          initial: "idle"
        speed:
          type: "string"
          initial: "unknown"
        signal_detect:
          type: "boolean"
          initial: false

  switch:
    - layer: 2
      name: "Ethernet Switching / PFC"
      components: ["802.1Q bridge", "802.1Qbb PFC", "ECN/WRED"]
      state_schema:
        fwd_table_entries:
          type: "integer"
          initial: 0
        pfc_priority_3_xoff:
          type: "boolean"
          initial: false
        egress_queue_depth_p3:
          type: "integer"
          description: "Bytes in egress queue for PFC priority 3"
          initial: 0
    - layer: 1
      name: "Physical"
      components: ["100GBASE-SR4"]
      state_schema:
        port_a_state:
          type: "string"
          initial: "down"
        port_b_state:
          type: "string"
          initial: "down"

# ─────────────────────────────────────────────────────────────────
# FRAME LIBRARY
# ─────────────────────────────────────────────────────────────────
frames:

  # ── ARP ─────────────────────────────────────────────────────────
  - id: "arp_request"
    name: "ARP Request"
    description: "Initiator broadcasts ARP to resolve 192.168.1.20 to a MAC address"
    from: "initiator"
    to: "broadcast"
    via: ["switch"]
    timestamp_ns: 5000000
    total_bytes: 42
    color: "#f0c040"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            offset_bits: 0
            value: "ff:ff:ff:ff:ff:ff"
            description: "Broadcast MAC — ARP request goes to all hosts"
            spec_refs:
              - document: "IEEE 802.3"
                section: "3.2.3"
                title: "Broadcast address"
                url: "https://standards.ieee.org/ieee/802.3/7661/"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            offset_bits: 48
            value: "00:02:c9:12:34:56"
            description: "Initiator NIC MAC address"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            offset_bits: 96
            value: "0x0806"
            value_hex: "0x0806"
            description: "EtherType 0x0806 = ARP"
            spec_refs:
              - document: "RFC 826"
                section: "1"
                title: "ARP EtherType"
                url: "https://datatracker.ietf.org/doc/html/rfc826"
      - name: "ARP"
        abbrev: "arp"
        layer: 3
        total_bytes: 28
        fields:
          - name: "Hardware Type"
            abbrev: "arp.hw.type"
            bits: 16
            value: 1
            description: "1 = Ethernet"
          - name: "Protocol Type"
            abbrev: "arp.proto.type"
            bits: 16
            value: "0x0800"
            description: "0x0800 = IPv4"
          - name: "Opcode"
            abbrev: "arp.opcode"
            bits: 16
            value: 1
            description: "1 = Request, 2 = Reply"
          - name: "Sender MAC"
            abbrev: "arp.src.hw_mac"
            bits: 48
            value: "00:02:c9:12:34:56"
            description: "Initiator MAC"
          - name: "Sender IP"
            abbrev: "arp.src.proto_ipv4"
            bits: 32
            value: "192.168.1.10"
            description: "Initiator IP"
          - name: "Target MAC"
            abbrev: "arp.dst.hw_mac"
            bits: 48
            value: "00:00:00:00:00:00"
            description: "Unknown — this is what we're asking for"
          - name: "Target IP"
            abbrev: "arp.dst.proto_ipv4"
            bits: 32
            value: "192.168.1.20"
            description: "IP we want to resolve to MAC"

  - id: "arp_reply"
    name: "ARP Reply"
    description: "Target responds with its MAC address"
    from: "target"
    to: "initiator"
    via: ["switch"]
    timestamp_ns: 5200000
    total_bytes: 42
    color: "#f0c040"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:12:34:56"
            description: "Unicast reply to initiator"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
            description: "Target MAC"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0806"
      - name: "ARP"
        abbrev: "arp"
        layer: 3
        total_bytes: 28
        fields:
          - name: "Opcode"
            abbrev: "arp.opcode"
            bits: 16
            value: 2
            description: "2 = Reply — I have the MAC you asked for"
          - name: "Sender MAC"
            abbrev: "arp.src.hw_mac"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
            description: "Target MAC — this is the answer"
          - name: "Sender IP"
            abbrev: "arp.src.proto_ipv4"
            bits: 32
            value: "192.168.1.20"

  # ── CM REQ ───────────────────────────────────────────────────────
  - id: "cm_req"
    name: "CM REQ (Connection Request)"
    description: >
      IB Connection Manager Request. Initiator proposes QP parameters including
      its QP number, starting PSN, path MTU, and retry counts. Carried as a
      Management Datagram (MAD) over UDP port 4791.
      Linux: drivers/infiniband/core/cm.c cm_send_req()
    from: "initiator"
    to: "target"
    via: ["switch"]
    timestamp_ns: 10000000
    total_bytes: 108
    color: "#5b8dd9"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:12:34:56"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
            description: "0x0800 = IPv4"

      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Version"
            abbrev: "ip.version"
            bits: 4
            value: 4
          - name: "IHL"
            abbrev: "ip.hdr_len"
            bits: 4
            value: 5
            description: "Header length = 5 × 32-bit words = 20 bytes"
          - name: "DSCP/ECN"
            abbrev: "ip.dscp"
            bits: 8
            value: "0x28"
            value_hex: "0x28"
            description: "DSCP 10 (AF11) — RoCEv2 traffic class. Low 2 bits = ECN capable transport (ECT(0) = 0b10)"
            spec_refs:
              - document: "RFC 3168"
                section: "5"
                title: "ECN field in IP header"
                url: "https://datatracker.ietf.org/doc/html/rfc3168#section-5"
              - document: "RFC 4594"
                section: "4.1"
                title: "DSCP for low-drop assured forwarding"
                url: "https://datatracker.ietf.org/doc/html/rfc4594"
          - name: "Total Length"
            abbrev: "ip.len"
            bits: 16
            value: 88
          - name: "TTL"
            abbrev: "ip.ttl"
            bits: 8
            value: 64
          - name: "Protocol"
            abbrev: "ip.proto"
            bits: 8
            value: 17
            description: "17 = UDP — RoCEv2 always encapsulates IB transport in UDP"
            spec_refs:
              - document: "RFC 7871"
                section: "3"
                title: "RoCEv2 uses UDP encapsulation"
                url: "https://datatracker.ietf.org/doc/html/rfc7871"
          - name: "Source"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.1.10"
          - name: "Destination"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.1.20"

      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: 49152
            description: "Ephemeral port chosen by RNIC. Used by switches for ECMP load balancing."
            spec_refs:
              - document: "RFC 7871"
                section: "8"
                title: "UDP source port for ECMP"
                url: "https://datatracker.ietf.org/doc/html/rfc7871#section-8"
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 4791
            description: "IANA-assigned well-known port for RoCEv2. All RoCEv2 traffic uses this port."
            spec_refs:
              - document: "RFC 7871"
                section: "7"
                title: "IANA port assignment 4791"
                url: "https://datatracker.ietf.org/doc/html/rfc7871#section-7"
          - name: "Length"
            abbrev: "udp.length"
            bits: 16
            value: 68
          - name: "Checksum"
            abbrev: "udp.checksum"
            bits: 16
            value: "0x0000"
            description: "RoCEv2 sets UDP checksum to 0. Integrity is protected by ICRC in the IB layer."
            spec_refs:
              - document: "RFC 7871"
                section: "6"
                title: "UDP checksum set to zero for RoCEv2"
                url: "https://datatracker.ietf.org/doc/html/rfc7871#section-6"

      - name: "IB BTH (Base Transport Header)"
        abbrev: "infiniband.bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "Opcode"
            abbrev: "infiniband.bth.opcode"
            bits: 8
            value: "0x64"
            value_hex: "0x64"
            description: "0x64 = CM_Request_First_Middle_Last — Connection Manager Request MAD. Opcode encodes service type + packet type."
            spec_refs:
              - document: "IBTA Vol1"
                section: "9.7.5"
                title: "CM REQ message format"
                url: "https://www.infinibandta.org/ibta-specification/"
                alt_url: "https://docs.kernel.org/infiniband/tag_matching.html"
              - document: "IBTA Vol1"
                section: "5.3.1"
                title: "BTH Opcode encoding"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Solicited Event (SE)"
            abbrev: "infiniband.bth.se"
            bits: 1
            value: 0
            description: "SE=0: receiver need not generate a solicited event. SE=1 used to wake sleeping recv completions."
            spec_refs:
              - document: "IBTA Vol1"
                section: "9.3"
                title: "Solicited Event bit"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "MigReq"
            abbrev: "infiniband.bth.migreq"
            bits: 1
            value: 1
            description: "1 = path is primary (not alternate/migrated)"
          - name: "Pad Count"
            abbrev: "infiniband.bth.padcnt"
            bits: 2
            value: 0
            description: "Number of pad bytes appended to payload to make it a multiple of 4"
          - name: "Transport Header Version"
            abbrev: "infiniband.bth.tver"
            bits: 4
            value: 0
          - name: "P_Key"
            abbrev: "infiniband.bth.pkey"
            bits: 16
            value: "0xFFFF"
            value_hex: "0xFFFF"
            description: "Full membership P_Key (0xFFFF). Partition Key — defines a virtual fabric partition."
            spec_refs:
              - document: "IBTA Vol1"
                section: "10.9"
                title: "Partition Key"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "FECN"
            abbrev: "infiniband.bth.fecn"
            bits: 1
            value: 0
            description: "Forward ECN — set by switch when experiencing congestion. Triggers DCQCN rate reduction at receiver."
            spec_refs:
              - document: "IBTA Vol1"
                section: "3.5.4"
                title: "FECN — Forward Explicit Congestion Notification"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "BECN"
            abbrev: "infiniband.bth.becn"
            bits: 1
            value: 0
            description: "Backward ECN — set by receiver in a CNP (Congestion Notification Packet) to tell sender to reduce rate."
          - name: "Destination QP"
            abbrev: "infiniband.bth.destqp"
            bits: 24
            value: "0x000001"
            value_hex: "0x000001"
            description: "QP 1 = Well-known QP for CM (General Management Queue Pair). All CM traffic goes to QP1."
            spec_refs:
              - document: "IBTA Vol1"
                section: "3.5.3"
                title: "Reserved QP Numbers — QP1 = GSI (General Services Interface)"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Acknowledge Request (A)"
            abbrev: "infiniband.bth.ackreq"
            bits: 1
            value: 1
            description: "A=1: Request an ACK from remote side"
          - name: "Packet Sequence Number (PSN)"
            abbrev: "infiniband.bth.psn"
            bits: 24
            value: 0
            description: "Starting sequence number. 24-bit wrap-around counter. RC transport uses PSN for ordering and retransmit."
            spec_refs:
              - document: "IBTA Vol1"
                section: "9.4"
                title: "Packet Sequence Number"
                url: "https://www.infinibandta.org/ibta-specification/"

      - name: "IB DETH (Datagram Extended Transport Header)"
        abbrev: "infiniband.deth"
        layer: 5
        total_bytes: 8
        fields:
          - name: "Queue Key (Q_Key)"
            abbrev: "infiniband.deth.q_key"
            bits: 32
            value: "0x80010000"
            value_hex: "0x80010000"
            description: "Well-known Q_Key for CM MADs (0x80010000). Privileged Q_Key — MSB set means kernel-space only."
            spec_refs:
              - document: "IBTA Vol1"
                section: "3.5.5"
                title: "Q_Key — access control for UD QPs"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Source QP"
            abbrev: "infiniband.deth.srcqp"
            bits: 24
            value: "0x000001"
            description: "Source QP1 (GSI) — CM sends from QP1"

      - name: "IB MAD (CM REQ Payload)"
        abbrev: "infiniband.mad"
        layer: 6
        total_bytes: 232
        fields:
          - name: "Local Communication ID"
            abbrev: "infiniband.mad.cm.local_comm_id"
            bits: 32
            value: "0xA1B2C3D4"
            description: "Unique ID assigned by initiator for this connection. Both sides use this to match REQ/REP/RTU."
            spec_refs:
              - document: "IBTA Vol1"
                section: "12.6.5"
                title: "CM REQ — Local Communication ID"
                url: "https://www.infinibandta.org/ibta-specification/"
            kernel_ref:
              file: "drivers/infiniband/core/cm.c"
              function: "cm_init_av_for_response"
              notes: "Communication ID generated in cm_send_req(); stored in cm_id_private->id.local_id"
          - name: "Service ID"
            abbrev: "infiniband.mad.cm.service_id"
            bits: 64
            value: "0x0000000001000000"
            description: "Identifies the service being requested — application-defined or well-known (e.g. iSER, NVMe-oF)"
            spec_refs:
              - document: "IBTA Vol1"
                section: "12.6.5"
                title: "CM REQ — Service ID"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Local QPN"
            abbrev: "infiniband.mad.cm.local_qpn"
            bits: 24
            value: "0x00A001"
            description: "Initiator's QP number — target will use this as its Destination QP in data packets"
            kernel_ref:
              file: "drivers/infiniband/hw/mlx5/qp.c"
              function: "mlx5_ib_create_qp"
              notes: "QPN assigned by firmware via MLX5_CMD_OP_CREATE_QP"
          - name: "Starting PSN"
            abbrev: "infiniband.mad.cm.starting_psn"
            bits: 24
            value: 1234567
            description: "Initiator's proposed starting PSN for its sends. Random to reduce collision probability on path reset."
            kernel_ref:
              file: "drivers/infiniband/core/cm.c"
              function: "ib_send_cm_req"
              notes: "get_random_u32() & 0xffffff in cm_send_req()"
          - name: "Path MTU"
            abbrev: "infiniband.mad.cm.path_mtu"
            bits: 4
            value: 5
            description: "5 = 4096 bytes path MTU. Encoding: 1=256, 2=512, 3=1024, 4=2048, 5=4096."
            spec_refs:
              - document: "IBTA Vol1"
                section: "12.6.5"
                title: "CM REQ — Path MTU field encoding"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Retry Count"
            abbrev: "infiniband.mad.cm.retry_count"
            bits: 3
            value: 7
            description: "Max retransmissions before declaring error. 7 = retry indefinitely (special value)."
            kernel_ref:
              file: "drivers/infiniband/core/cm.c"
              function: "ib_send_cm_req"
              notes: "Passed via struct ib_cm_req_param.retry_count"
          - name: "RNR Retry Count"
            abbrev: "infiniband.mad.cm.rnr_retry_count"
            bits: 3
            value: 7
            description: "Retries on Receiver Not Ready NAK. 7 = retry indefinitely."
            spec_refs:
              - document: "IBTA Vol1"
                section: "9.7.5.2"
                title: "RNR Retry — Receiver Not Ready handling"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Private Data"
            abbrev: "infiniband.mad.cm.private_data"
            bits: 1792
            value: "<application-specific, e.g. NVMe-oF connect parameters>"
            description: "Up to 224 bytes of application private data in REQ. Used by ULPs (NVMe-oF, iSER, SDP) to pass connection parameters."
            spec_refs:
              - document: "IBTA Vol1"
                section: "12.6.5"
                title: "CM REQ Private Data"
                url: "https://www.infinibandta.org/ibta-specification/"

  # ── CM REP ───────────────────────────────────────────────────────
  - id: "cm_rep"
    name: "CM REP (Connection Reply)"
    description: >
      Target accepts the connection, provides its QP number, starting PSN,
      and optional private data. Sent from QP1 to QP1.
      Linux: drivers/infiniband/core/cm.c cm_send_rep()
    from: "target"
    to: "initiator"
    via: ["switch"]
    timestamp_ns: 12000000
    total_bytes: 108
    color: "#5b8dd9"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:12:34:56"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.1.20"
          - name: "Destination"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.1.10"
          - name: "Protocol"
            abbrev: "ip.proto"
            bits: 8
            value: 17
      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: 49153
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 4791
          - name: "Checksum"
            abbrev: "udp.checksum"
            bits: 16
            value: "0x0000"
            description: "Always 0 for RoCEv2 — ICRC covers integrity"
      - name: "IB BTH"
        abbrev: "infiniband.bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "Opcode"
            abbrev: "infiniband.bth.opcode"
            bits: 8
            value: "0x65"
            value_hex: "0x65"
            description: "0x65 = CM_Reply — Connection Manager Reply"
          - name: "Destination QP"
            abbrev: "infiniband.bth.destqp"
            bits: 24
            value: "0x000001"
            description: "QP1 (GSI) — reply always goes to CM queue"
          - name: "PSN"
            abbrev: "infiniband.bth.psn"
            bits: 24
            value: 0
      - name: "IB MAD (CM REP Payload)"
        abbrev: "infiniband.mad.cm_rep"
        layer: 6
        total_bytes: 232
        fields:
          - name: "Local Communication ID"
            abbrev: "infiniband.mad.cm.local_comm_id"
            bits: 32
            value: "0xDEADBEEF"
            description: "Target's own communication ID for this connection"
          - name: "Remote Communication ID"
            abbrev: "infiniband.mad.cm.remote_comm_id"
            bits: 32
            value: "0xA1B2C3D4"
            description: "Echo back the initiator's comm ID from REQ — ties this reply to that request"
          - name: "Local QPN"
            abbrev: "infiniband.mad.cm.local_qpn"
            bits: 24
            value: "0x00B002"
            description: "Target's QP number — initiator will use this as DestQP in all data packets"
            kernel_ref:
              file: "drivers/infiniband/hw/mlx5/qp.c"
              function: "mlx5_ib_create_qp"
              notes: "QPN from MLX5_CMD_OP_CREATE_QP response"
          - name: "Starting PSN"
            abbrev: "infiniband.mad.cm.starting_psn"
            bits: 24
            value: 7654321
            description: "Target's proposed starting PSN for its sends (reads will generate response packets from here)"
          - name: "Target ACK Delay"
            abbrev: "infiniband.mad.cm.target_ack_delay"
            bits: 5
            value: 14
            description: "Local ACK timeout exponent. Timeout = 4.096µs × 2^(target_ack_delay). Used by initiator to set QP timeout."
            spec_refs:
              - document: "IBTA Vol1"
                section: "12.6.10"
                title: "CM REP — Target ACK Delay"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "RNR Retry Count"
            abbrev: "infiniband.mad.cm.rnr_retry"
            bits: 3
            value: 7
          - name: "Private Data"
            abbrev: "infiniband.mad.cm.private_data"
            bits: 1792
            value: "<rkey=0xDEAD1234, vaddr=0x7f0000000000, length=4096>"
            description: "Application private data — in this scenario, target passes rkey and virtual address of its registered MR to initiator (application-layer key exchange, not CM-defined)"

  # ── CM RTU ───────────────────────────────────────────────────────
  - id: "cm_rtu"
    name: "CM RTU (Ready To Use)"
    description: >
      Initiator confirms connection is ready. After sending RTU, both sides
      transition their QPs to RTS (Ready To Send). Data can now flow.
      Linux: drivers/infiniband/core/cm.c → ib_send_cm_rtu()
    from: "initiator"
    to: "target"
    via: ["switch"]
    timestamp_ns: 13500000
    total_bytes: 76
    color: "#5b8dd9"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:12:34:56"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.1.10"
          - name: "Destination"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.1.20"
      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 4791
      - name: "IB BTH"
        abbrev: "infiniband.bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "Opcode"
            abbrev: "infiniband.bth.opcode"
            bits: 8
            value: "0x66"
            value_hex: "0x66"
            description: "0x66 = CM_RTU — Ready To Use. This is the last CM handshake message."
          - name: "Destination QP"
            abbrev: "infiniband.bth.destqp"
            bits: 24
            value: "0x000001"
      - name: "IB MAD (CM RTU Payload)"
        abbrev: "infiniband.mad.cm_rtu"
        layer: 6
        total_bytes: 232
        fields:
          - name: "Local Communication ID"
            abbrev: "infiniband.mad.cm.local_comm_id"
            bits: 32
            value: "0xA1B2C3D4"
          - name: "Remote Communication ID"
            abbrev: "infiniband.mad.cm.remote_comm_id"
            bits: 32
            value: "0xDEADBEEF"
            description: "Echo target's comm ID — confirms we received the REP"

  # ── RDMA WRITE ONLY (no recv WQE consumed on target) ─────────────
  - id: "rdma_write_only"
    name: "RDMA WRITE Only"
    description: >
      4KB RDMA WRITE. Initiator pushes data directly into target's registered memory
      at a pre-negotiated virtual address using the rkey received in CM REP private data.
      The target CPU is NOT involved — no receive WQE is consumed.
      This is the fundamental difference between RDMA WRITE and SEND.
      Linux: mlx5_ib_post_send() → mlx5_post_one_wr() builds WQE with opcode MLX5_OPCODE_RDMA_WRITE
    from: "initiator"
    to: "target"
    via: ["switch"]
    timestamp_ns: 20000000
    total_bytes: 4162
    color: "#e05c5c"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:12:34:56"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.1.10"
          - name: "Destination"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.1.20"
          - name: "DSCP/ECN"
            abbrev: "ip.dscp"
            bits: 8
            value: "0x28"
            description: "ECT(0) marked — sender advertises ECN capability. Switch may flip to CE if congested (DCQCN)."
          - name: "Total Length"
            abbrev: "ip.len"
            bits: 16
            value: 4148
      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: 49152
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 4791
          - name: "Length"
            abbrev: "udp.length"
            bits: 16
            value: 4128
      - name: "IB BTH"
        abbrev: "infiniband.bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "Opcode"
            abbrev: "infiniband.bth.opcode"
            bits: 8
            value: "0x0A"
            value_hex: "0x0A"
            description: "0x0A = RC RDMA Write Only. Packet is both first and last — fits in one MTU."
            spec_refs:
              - document: "IBTA Vol1"
                section: "A19"
                title: "Opcode Table — RC RDMA Write Only = 0x0A"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Destination QP"
            abbrev: "infiniband.bth.destqp"
            bits: 24
            value: "0x00B002"
            description: "Target's data QP (from CM REP). This is the first use of the data QP — CM used QP1."
          - name: "Acknowledge Request (A)"
            abbrev: "infiniband.bth.ackreq"
            bits: 1
            value: 1
            description: "Request ACK from target — initiator needs completion event to reclaim SQ WQE"
          - name: "PSN"
            abbrev: "infiniband.bth.psn"
            bits: 24
            value: 1234567
            description: "First data PSN — matches starting PSN from CM REQ"
          - name: "FECN"
            abbrev: "infiniband.bth.fecn"
            bits: 1
            value: 0
            description: "Not set — no congestion detected on this path (yet)"
      - name: "IB RETH (RDMA Extended Transport Header)"
        abbrev: "infiniband.reth"
        layer: 5
        total_bytes: 16
        fields:
          - name: "Virtual Address"
            abbrev: "infiniband.reth.virtual_address"
            bits: 64
            value: "0x7f0000000000"
            description: "Remote virtual address in target's memory where data will be written. Established out-of-band (via CM private data or separate control message)."
            spec_refs:
              - document: "IBTA Vol1"
                section: "9.7.5.3"
                title: "RETH — RDMA Extended Transport Header"
                url: "https://www.infinibandta.org/ibta-specification/"
            kernel_ref:
              file: "drivers/infiniband/hw/mlx5/qp.c"
              function: "mlx5_post_one_wr"
              notes: "Set from ibv_send_wr.wr.rdma.remote_addr in userspace WR, translated to WQE RADDR field"
          - name: "R_Key"
            abbrev: "infiniband.reth.r_key"
            bits: 32
            value: "0xDEAD1234"
            description: "Remote Memory Region key — proves initiator is authorized to write this memory. Registered by target via ibv_reg_mr(), passed to initiator out-of-band."
            spec_refs:
              - document: "IBTA Vol1"
                section: "10.6.3"
                title: "Remote Key (R_Key) — MR access authorization"
                url: "https://www.infinibandta.org/ibta-specification/"
            kernel_ref:
              file: "drivers/infiniband/hw/mlx5/mr.c"
              function: "mlx5_ib_reg_user_mr"
              notes: "rkey generated from MR index + key incarnation bits in MLX5_CMD_OP_CREATE_MKEY"
          - name: "DMA Length"
            abbrev: "infiniband.reth.dma_length"
            bits: 32
            value: 4096
            description: "Total bytes to write — 4096 bytes (one page)"
      - name: "RDMA Data Payload"
        abbrev: "data"
        layer: 7
        total_bytes: 4096
        fields:
          - name: "Payload"
            abbrev: "data.data"
            bits: 32768
            value: "<4096 bytes of application data>"
            description: "The actual data being written to remote memory. CPU on target is completely bypassed — RNIC DMA engine writes directly to target physical memory mapped by the MR."
      - name: "IB ICRC (Invariant CRC)"
        abbrev: "infiniband.icrc"
        layer: 5
        total_bytes: 4
        fields:
          - name: "ICRC"
            abbrev: "infiniband.icrc"
            bits: 32
            value: "0x<computed>"
            description: "Invariant CRC-32 covering BTH + all extended headers + payload. 'Invariant' means it excludes mutable fields (TTL, FECN/BECN). Checked by RNIC hardware — not by CPU."
            spec_refs:
              - document: "IBTA Vol1"
                section: "9.4.1"
                title: "ICRC — Invariant CRC"
                url: "https://www.infinibandta.org/ibta-specification/"

  # ── RDMA WRITE ACK ───────────────────────────────────────────────
