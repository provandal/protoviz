      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.1.20"
          - name: "Destination"
            abbrev: "ip.dst"
