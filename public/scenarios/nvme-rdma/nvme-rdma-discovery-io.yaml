meta:
  id: "nvme-rdma-discovery-io"
  title: "NVMe-oF/RDMA: Discovery → Fabrics Connect → NVMe Write & Read over RoCEv2"
  protocol: "NVMe-oF/RDMA"
  protocol_family: "NVMe-oF"
  version: "1.0.0"
  description: >
    Complete NVMe over Fabrics using RDMA (RoCEv2) transport. Starting from physical
    link establishment and ARP resolution, through CM-based RDMA connection setup,
    NVMe-oF Fabrics Connect to the Discovery Controller, Discovery Log Page retrieval,
    IO Controller connection, Identify Controller/Namespace, and NVMe Write and Read
    operations. Contrasts with the NVMe/TCP scenario — here, NVMe commands travel via
    RDMA SEND, data via RDMA WRITE (controller→host) and RDMA READ (host→controller),
    and completions via RDMA SEND. The CPU is not involved in the data path.

  learning_objectives:
    - "Understand how NVMe-oF uses RDMA as a transport binding — commands via SEND, data via WRITE/READ"
    - "See the RDMA CM connection setup that precedes NVMe-oF Fabrics Connect"
    - "Follow the Fabrics Connect command to establish Admin and IO queues over RDMA"
    - "Observe Discovery Log Pages returned via RDMA to locate IO Controllers"
    - "Trace NVMe Write: host sends command via RDMA SEND, controller fetches data via RDMA READ"
    - "Trace NVMe Read: host sends command via RDMA SEND, controller delivers data via RDMA WRITE"
    - "Understand SGL (Scatter-Gather List) usage for RDMA data placement"
    - "Compare RDMA transport binding with TCP — zero-copy vs kernel-mediated data path"

  difficulty: "advanced"

  authors:
    - name: "ProtoViz Community"
      org: "proto-viz"
      github: "proto-viz"
    - name: "Generated via NVMe specification and Linux kernel source analysis"
      org: "proto-viz"
      github: ""

  created: "2026-03-17"
  updated: "2026-03-17"

  tags:
    - "NVMe"
    - "NVMe-oF"
    - "NVMe-oF/RDMA"
    - "RDMA"
    - "RoCEv2"
    - "storage"
    - "discovery"
    - "100GbE"
    - "education"

  primary_specs:
    - document: "NVMe-oF Spec 1.1a"
      section: "3"
      title: "NVMe over Fabrics Architecture"
      url: "https://nvmexpress.org/specifications/"
      alt_url: ""
    - document: "NVMe-oF Spec 1.1a"
      section: "4.2"
      title: "RDMA Transport Binding"
      url: "https://nvmexpress.org/specifications/"
      alt_url: ""
    - document: "NVMe Base Spec 2.1"
      section: "5"
      title: "Admin Command Set"
      url: "https://nvmexpress.org/specifications/"
      alt_url: ""
    - document: "IBTA Vol1"
      section: "9.7"
      title: "Reliable Connection Service"
      url: "https://www.infinibandta.org/ibta-specification/"
      alt_url: ""

  content_disclaimer: >
    Protocol descriptions are based on open-source implementations (Linux kernel
    nvme-rdma driver, rdma-core) and public NVMe/IBTA specifications. No proprietary
    specification text has been reproduced.

  source_references:
    - repo: "torvalds/linux"
      path: "drivers/nvme/host/rdma.c"
      description: "NVMe-oF RDMA host driver — connection setup, command submission, completion handling"
    - repo: "torvalds/linux"
      path: "drivers/nvme/target/rdma.c"
      description: "NVMe-oF RDMA target driver — queue pair management, command reception, data transfer"
    - repo: "torvalds/linux"
      path: "drivers/nvme/host/fabrics.c"
      description: "NVMe-oF common fabrics layer — Fabrics Connect, Discovery, Property Get/Set"
    - repo: "torvalds/linux"
      path: "drivers/infiniband/core/cm.c"
      description: "IB Connection Manager — CM REQ/REP/RTU state machine"

# ─────────────────────────────────────────────────────────────────
# TOPOLOGY
# ─────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: "host"
      type: "initiator"
      label: "NVMe Host"
      description: "NVMe-oF initiator — Linux host running nvme-rdma driver"
      hardware: "100GbE RNIC (e.g., ConnectX-6 Dx)"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "192.168.100.10"
      gid: "fe80::0002:c903:0012:3456"
      mac: "00:02:c9:12:34:56"
      position: "left"

    - id: "switch"
      type: "switch"
      label: "Lossless 100GbE Switch"
      description: "Data center switch with PFC enabled on priority 3 for RoCEv2"
      hardware: "100GbE switch"
      position: "center"

    - id: "target"
      type: "target"
      label: "NVMe-oF Storage Target"
      description: "NVMe-oF RDMA target — storage array exposing NVMe namespaces over RoCEv2"
      hardware: "100GbE RNIC + NVMe SSDs"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "192.168.100.20"
      gid: "fe80::0002:c903:00ab:cdef"
      mac: "00:02:c9:ab:cd:ef"
      position: "right"

  links:
    - id: "link-host-sw"
      from: "host"
      to: "switch"
      speed_gbps: 100
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true
    - id: "link-sw-target"
      from: "switch"
      to: "target"
      speed_gbps: 100
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true

# ─────────────────────────────────────────────────────────────────
# OSI LAYER DEFINITIONS
# ─────────────────────────────────────────────────────────────────
osi_layers:
  host:
    - layer: 7
      name: "NVMe Host Driver"
      components: ["drivers/nvme/host/rdma.c", "drivers/nvme/host/core.c", "drivers/nvme/host/fabrics.c"]
      state_schema:
        nvme_state:
          type: "string"
          description: "NVMe host state"
          initial: "disconnected"
        admin_qid:
          type: "integer"
          description: "Admin queue ID (always 0)"
          initial: 0
        io_qid:
          type: "integer"
          description: "IO queue ID"
          initial: 0
        cntlid:
          type: "string"
          description: "Controller ID assigned by target"
          initial: "—"
        nsid:
          type: "integer"
          description: "Active Namespace ID"
          initial: 0

    - layer: 6
      name: "NVMe-oF Fabrics"
      components: ["drivers/nvme/host/fabrics.c"]
      state_schema:
        fabrics_state:
          type: "string"
          description: "Fabrics connection state"
          initial: "idle"
        hostnqn:
          type: "string"
          description: "Host NVMe Qualified Name"
          initial: "nqn.2014-08.org.nvmexpress:uuid:host-001"
        subnqn:
          type: "string"
          description: "Target subsystem NQN"
          initial: "—"

    - layer: 5
      name: "IB Transport (RC QP)"
      components: ["drivers/infiniband/hw/mlx5/qp.c", "drivers/infiniband/core/cm.c"]
      state_schema:
        qp_state:
          type: "string"
          initial: "RESET"
        qp_num:
          type: "string"
          initial: "null"
        cm_state:
          type: "string"
          description: "Connection Manager state"
          initial: "idle"

    - layer: 4
      name: "UDP (RoCEv2)"
      components: ["RNIC hardware offload"]
      state_schema:
        dst_port:
          type: "integer"
          initial: 4791

    - layer: 3
      name: "IP / Routing"
      components: ["kernel IP stack"]
      state_schema:
        src_ip:
          type: "string"
          initial: "192.168.100.10"
        dst_ip:
          type: "string"
          initial: "null"
        ecn_state:
          type: "string"
          initial: "ECT(0)"

    - layer: 2
      name: "Ethernet / PFC"
      components: ["mlx5 driver", "IEEE 802.1Qbb"]
      state_schema:
        link_state:
          type: "string"
          initial: "down"
        pfc_enabled:
          type: "boolean"
          initial: false

    - layer: 1
      name: "Physical (100GbE)"
      components: ["IEEE 802.3cd", "100GBASE-SR4"]
      state_schema:
        phy_state:
          type: "string"
          initial: "down"
        speed:
          type: "string"
          initial: "unknown"

  target:
    - layer: 7
      name: "NVMe Target Subsystem"
      components: ["drivers/nvme/target/rdma.c", "drivers/nvme/target/core.c"]
      state_schema:
        nvme_state:
          type: "string"
          initial: "listening"
        subsys_nqn:
          type: "string"
          initial: "nqn.2024-01.com.example:subsys-array01"
        namespaces:
          type: "integer"
          description: "Number of namespaces exported"
          initial: 1
        ns1_size_gb:
          type: "integer"
          description: "Namespace 1 size in GB"
          initial: 1024

    - layer: 6
      name: "NVMe-oF Fabrics"
      components: ["drivers/nvme/target/fabrics.c"]
      state_schema:
        fabrics_state:
          type: "string"
          initial: "listening"
        cntlid_assigned:
          type: "string"
          description: "Controller ID assigned to this host"
          initial: "—"

    - layer: 5
      name: "IB Transport (RC QP)"
      components: ["drivers/infiniband/hw/mlx5/qp.c"]
      state_schema:
        qp_state:
          type: "string"
          initial: "RESET"
        qp_num:
          type: "string"
          initial: "null"
        cm_state:
          type: "string"
          initial: "listening"

    - layer: 4
      name: "UDP (RoCEv2)"
      components: ["RNIC hardware offload"]
      state_schema:
        dst_port:
          type: "integer"
          initial: 4791

    - layer: 3
      name: "IP / Routing"
      components: ["kernel IP stack"]
      state_schema:
        src_ip:
          type: "string"
          initial: "192.168.100.20"
        ecn_state:
          type: "string"
          initial: "ECT(0)"

    - layer: 2
      name: "Ethernet / PFC"
      components: ["mlx5 driver", "IEEE 802.1Qbb"]
      state_schema:
        link_state:
          type: "string"
          initial: "down"
        pfc_enabled:
          type: "boolean"
          initial: false

    - layer: 1
      name: "Physical (100GbE)"
      components: ["IEEE 802.3cd", "100GBASE-SR4"]
      state_schema:
        phy_state:
          type: "string"
          initial: "down"
        speed:
          type: "string"
          initial: "unknown"

  switch:
    - layer: 2
      name: "Ethernet Switching / PFC"
      components: ["802.1Q bridge", "802.1Qbb PFC"]
      state_schema:
        fwd_table_entries:
          type: "integer"
          initial: 0
    - layer: 1
      name: "Physical (per-port)"
      components: ["100GBASE-SR4", "RS(544,514) FEC"]
      state_schema:
        port_host_phy:
          type: "string"
          initial: "down"
        port_target_phy:
          type: "string"
          initial: "down"

# ─────────────────────────────────────────────────────────────────
# FRAMES
# ─────────────────────────────────────────────────────────────────
frames:
  # ── ARP ─────────────────────────────────────────────────────────
  - id: "arp_request"
    name: "ARP Request"
    from: "host"
    to: "broadcast"
    via: ["switch"]
    timestamp_ns: 5000000
    total_bytes: 42
    color: "#b45309"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "ff:ff:ff:ff:ff:ff"
            description: "Broadcast"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:12:34:56"
            description: "Host's MAC"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0806"
            description: "ARP"
      - name: "ARP"
        abbrev: "arp"
        layer: 3
        total_bytes: 28
        fields:
          - name: "Opcode"
            abbrev: "arp.opcode"
            bits: 16
            value: 1
            description: "ARP Request — 'Who has 192.168.100.20?'"
          - name: "Sender IP"
            abbrev: "arp.src.proto_ipv4"
            bits: 32
            value: "192.168.100.10"
            description: "Host's IP"
          - name: "Target IP"
            abbrev: "arp.dst.proto_ipv4"
            bits: 32
            value: "192.168.100.20"
            description: "Storage target's IP"

  - id: "arp_reply"
    name: "ARP Reply"
    from: "target"
    to: "host"
    via: ["switch"]
    timestamp_ns: 5050000
    total_bytes: 42
    color: "#b45309"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:12:34:56"
            description: "Host's MAC"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
            description: "Storage target's MAC"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0806"
            description: "ARP"
      - name: "ARP"
        abbrev: "arp"
        layer: 3
        total_bytes: 28
        fields:
          - name: "Opcode"
            abbrev: "arp.opcode"
            bits: 16
            value: 2
            description: "ARP Reply — '192.168.100.20 is at 00:02:c9:ab:cd:ef'"

  # ── CM REQ/REP/RTU (Admin Queue) ───────────────────────────────
  - id: "cm_req_admin"
    name: "CM REQ (Admin Queue)"
    description: "Host initiates RDMA connection for NVMe Admin Queue"
    from: "host"
    to: "target"
    via: ["switch"]
    timestamp_ns: 10000000
    total_bytes: 334
    color: "#1e40af"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
            description: "IPv4"
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.100.10"
            description: "Host"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.100.20"
            description: "Storage target"
      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 4791
            description: "RoCEv2 port"
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x64"
            description: "UD SEND (0x64) — CM messages use Unreliable Datagram"
          - name: "Destination QP"
            abbrev: "bth.dqp"
            bits: 24
            value: "0x000001"
            description: "QP1 — well-known GSI (General Service Interface) QP for CM"
            spec_refs:
              - document: "IBTA Vol1"
                section: "9.3"
                title: "Connection Management"
                url: "https://www.infinibandta.org/ibta-specification/"
      - name: "CM REQ (Connection Request)"
        abbrev: "cm"
        layer: 6
        total_bytes: 232
        fields:
          - name: "Local Communication ID"
            abbrev: "cm.local_comm_id"
            bits: 32
            value: "0x00010001"
            description: "Unique ID for this connection request"
          - name: "Service ID"
            abbrev: "cm.service_id"
            bits: 64
            value: "0x0000000000004420"
            description: "NVMe-oF RDMA service ID — identifies this as an NVMe-oF connection request. The target's CM listener matches on this service ID."
            spec_refs:
              - document: "NVMe-oF Spec 1.1a"
                section: "4.2"
                title: "RDMA Transport Binding"
                url: "https://nvmexpress.org/specifications/"
          - name: "Local QPN"
            abbrev: "cm.local_qpn"
            bits: 24
            value: "0x000080"
            description: "Host's QP number for this connection"
          - name: "Responder Resources"
            abbrev: "cm.resp_resources"
            bits: 8
            value: 4
            description: "Max outstanding RDMA READ requests (as responder)"
          - name: "Initiator Depth"
            abbrev: "cm.init_depth"
            bits: 8
            value: 4
            description: "Max outstanding RDMA READ requests (as initiator)"
          - name: "Private Data"
            abbrev: "cm.private_data"
            bits: 224
            value: "RDMA_CM + NVMe-oF RDMA Private Data"
            description: "Contains NVMe-oF RDMA transport-specific parameters: HRQSIZE (host receive queue size) = 128 entries, HSQSIZE (host send queue size) = 128 entries. These negotiate NVMe queue depths over the RDMA connection."
            spec_refs:
              - document: "NVMe-oF Spec 1.1a"
                section: "4.2.3"
                title: "RDMA CM Private Data"
                url: "https://nvmexpress.org/specifications/"
            kernel_ref:
              file: "drivers/nvme/host/rdma.c"
              function: "nvme_rdma_alloc_queue"
              notes: "Sets up QP, posts receive WQEs, sends CM REQ with NVMe-oF private data"

  - id: "cm_rep_admin"
    name: "CM REP (Admin Queue)"
    description: "Target accepts RDMA connection for Admin Queue"
    from: "target"
    to: "host"
    via: ["switch"]
    timestamp_ns: 10050000
    total_bytes: 334
    color: "#1e40af"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
            description: "IPv4"
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.100.20"
            description: "Storage target"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.100.10"
            description: "Host"
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x64"
            description: "UD SEND"
          - name: "Destination QP"
            abbrev: "bth.dqp"
            bits: 24
            value: "0x000001"
            description: "QP1 — GSI"
      - name: "CM REP (Connection Reply)"
        abbrev: "cm"
        layer: 6
        total_bytes: 232
        fields:
          - name: "Local Communication ID"
            abbrev: "cm.local_comm_id"
            bits: 32
            value: "0x00020001"
            description: "Target's communication ID"
          - name: "Remote Communication ID"
            abbrev: "cm.remote_comm_id"
            bits: 32
            value: "0x00010001"
            description: "Matches host's CM REQ"
          - name: "Local QPN"
            abbrev: "cm.local_qpn"
            bits: 24
            value: "0x000100"
            description: "Target's QP number for this connection"
          - name: "Private Data"
            abbrev: "cm.private_data"
            bits: 224
            value: "NVMe-oF RDMA Accept: CRQSIZE=128"
            description: "Target responds with CRQSIZE (controller receive queue size). The minimum of HSQSIZE and CRQSIZE determines the effective queue depth."
            kernel_ref:
              file: "drivers/nvme/target/rdma.c"
              function: "nvme_rdma_accept"
              notes: "Target allocates QP, posts receive WQEs, sends CM REP with CRQSIZE"

  - id: "cm_rtu_admin"
    name: "CM RTU (Admin Queue Ready)"
    description: "Host confirms — RDMA connection established for Admin Queue"
    from: "host"
    to: "target"
    via: ["switch"]
    timestamp_ns: 10100000
    total_bytes: 100
    color: "#1e40af"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x64"
            description: "UD SEND"
      - name: "CM RTU (Ready To Use)"
        abbrev: "cm"
        layer: 6
        total_bytes: 36
        fields:
          - name: "Local Communication ID"
            abbrev: "cm.local_comm_id"
            bits: 32
            value: "0x00010001"
            description: "Host's communication ID"
          - name: "Remote Communication ID"
            abbrev: "cm.remote_comm_id"
            bits: 32
            value: "0x00020001"
            description: "Target's communication ID"

  # ── Fabrics Connect (Discovery Controller) ──────────────────────
  - id: "fabrics_connect_discovery"
    name: "Fabrics Connect (Discovery Controller)"
    description: "NVMe Fabrics Connect command to Discovery Controller via RDMA SEND"
    from: "host"
    to: "target"
    via: ["switch"]
    timestamp_ns: 20000000
    total_bytes: 166
    color: "#1e40af"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
            description: "IPv4"
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.100.10"
            description: "Host"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.100.20"
            description: "Target"
      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 4791
            description: "RoCEv2"
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x04"
            description: "RC SEND Only (0x04) — NVMe commands travel via RDMA SEND. This is a key difference from NVMe/TCP: the command arrives directly in a pre-posted receive WQE buffer on the target, zero-copy."
            spec_refs:
              - document: "NVMe-oF Spec 1.1a"
                section: "4.2.4"
                title: "Capsule Command — RDMA SEND"
                url: "https://nvmexpress.org/specifications/"
          - name: "Destination QP"
            abbrev: "bth.dqp"
            bits: 24
            value: "0x000100"
            description: "Target's Admin Queue QP"
          - name: "PSN"
            abbrev: "bth.psn"
            bits: 24
            value: 0
            description: "First packet on this QP"
      - name: "NVMe Fabrics Connect Command"
        abbrev: "nvme_fabrics"
        layer: 7
        total_bytes: 64
        fields:
          - name: "Opcode"
            abbrev: "nvme.cmd.opc"
            bits: 8
            value: "0x7F"
            description: "Fabrics Command (0x7F) — NVMe-oF-specific admin command"
            spec_refs:
              - document: "NVMe-oF Spec 1.1a"
                section: "3.3"
                title: "Fabrics Command Set"
                url: "https://nvmexpress.org/specifications/"
          - name: "Fabrics Command Type"
            abbrev: "nvme.fabrics.fctype"
            bits: 8
            value: "0x01"
            description: "Connect (0x01) — establish association with controller"
          - name: "Queue ID"
            abbrev: "nvme.fabrics.qid"
            bits: 16
            value: 0
            description: "Queue 0 = Admin Queue. IO queues are connected separately after discovery."
          - name: "SQ Size"
            abbrev: "nvme.fabrics.sqsize"
            bits: 16
            value: 127
            description: "Submission queue size (0-based) = 128 entries"
          - name: "Host NQN"
            abbrev: "nvme.fabrics.hostnqn"
            bits: 0
            value: "nqn.2014-08.org.nvmexpress:uuid:host-001"
            description: "Host's NVMe Qualified Name — unique identifier for this host"
          - name: "SubNQN"
            abbrev: "nvme.fabrics.subnqn"
            bits: 0
            value: "nqn.2014-08.org.nvmexpress.discovery"
            description: "Discovery Controller well-known NQN"
            spec_refs:
              - document: "NVMe-oF Spec 1.1a"
                section: "3.1.2"
                title: "Discovery Controller"
                url: "https://nvmexpress.org/specifications/"

  - id: "fabrics_connect_disc_resp"
    name: "Fabrics Connect Response (Discovery)"
    description: "Discovery Controller accepts connection, assigns controller ID"
    from: "target"
    to: "host"
    via: ["switch"]
    timestamp_ns: 20050000
    total_bytes: 118
    color: "#1e40af"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x04"
            description: "RC SEND Only — completion delivered via RDMA SEND"
          - name: "Destination QP"
