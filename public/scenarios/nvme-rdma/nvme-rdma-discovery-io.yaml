            description: "Dynamic controller ID (0xFFFF) — Discovery Controller"

  # ── Discovery Log Page ──────────────────────────────────────────
  - id: "get_log_page_discovery"
    name: "Get Log Page (Discovery)"
    description: "Host requests Discovery Log Page via RDMA SEND, data returned via RDMA WRITE"
    from: "host"
    to: "target"
    via: ["switch"]
    timestamp_ns: 30000000
    total_bytes: 130
    color: "#0369a1"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x04"
            description: "RC SEND — NVMe command capsule"
          - name: "PSN"
            abbrev: "bth.psn"
            bits: 24
            value: 1
            description: "Second command on Admin Queue"
      - name: "NVMe Get Log Page Command"
        abbrev: "nvme"
        layer: 7
        total_bytes: 64
        fields:
          - name: "Opcode"
            abbrev: "nvme.cmd.opc"
            bits: 8
            value: "0x02"
            description: "Get Log Page (0x02)"
          - name: "Log Page Identifier"
            abbrev: "nvme.cmd.get_log.lid"
            bits: 8
            value: "0x70"
            description: "Discovery Log Page (0x70) — lists available IO controllers"
            spec_refs:
              - document: "NVMe-oF Spec 1.1a"
                section: "5.3"
                title: "Discovery Log Page"
                url: "https://nvmexpress.org/specifications/"
          - name: "SGL Descriptor"
            abbrev: "nvme.cmd.sgl"
            bits: 128
            value: "Keyed SGL: rkey=0x0000ABCD, va=0x7f8000100000, len=4096"
            description: "SGL (Scatter-Gather List) tells the target WHERE to RDMA WRITE the log page data. The target will use this rkey and virtual address to perform an RDMA WRITE directly into the host's pre-registered memory — zero CPU involvement on the host."
            spec_refs:
              - document: "NVMe-oF Spec 1.1a"
                section: "4.2.5"
                title: "SGL Usage in RDMA Transport"
                url: "https://nvmexpress.org/specifications/"
            kernel_ref:
              file: "drivers/nvme/host/rdma.c"
              function: "nvme_rdma_map_data"
              notes: "Maps host buffer, creates SGL with rkey for target to RDMA WRITE into"

  - id: "discovery_log_write"
    name: "Discovery Log Data (RDMA WRITE)"
    description: "Target RDMA WRITEs Discovery Log Page directly into host memory"
    from: "target"
    to: "host"
    via: ["switch"]
    timestamp_ns: 30050000
    total_bytes: 1134
    color: "#0369a1"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x0a"
            description: "RC RDMA WRITE Only (0x0a) — target writes log data directly into host's pre-registered buffer using the SGL rkey. No receive WQE consumed on the host — data lands silently in memory."
            spec_refs:
              - document: "NVMe-oF Spec 1.1a"
                section: "4.2.5"
                title: "Data Transfer — RDMA WRITE"
                url: "https://nvmexpress.org/specifications/"
      - name: "RETH"
        abbrev: "reth"
        layer: 5
        total_bytes: 16
        fields:
          - name: "Virtual Address"
            abbrev: "reth.va"
            bits: 64
            value: "0x00007f8000100000"
            description: "Host buffer VA from the SGL in the NVMe command"
          - name: "R_Key"
            abbrev: "reth.rkey"
            bits: 32
            value: "0x0000ABCD"
            description: "Host's memory region key — authorizes this RDMA WRITE"
          - name: "DMA Length"
            abbrev: "reth.dma_len"
            bits: 32
            value: 1056
            description: "Discovery Log Page header (16B) + 1 entry (1040B)"
      - name: "Discovery Log Page Data"
        abbrev: "nvme_disc"
        layer: 7
        total_bytes: 1056
        fields:
          - name: "Number of Records"
            abbrev: "nvme_disc.numrec"
            bits: 64
            value: 1
            description: "One IO Controller entry available"
          - name: "Entry[0]: Transport Type"
            abbrev: "nvme_disc.entry.trtype"
            bits: 8
            value: "0x01"
            description: "RDMA transport (0x01)"
          - name: "Entry[0]: SubNQN"
            abbrev: "nvme_disc.entry.subnqn"
            bits: 0
            value: "nqn.2024-01.com.example:subsys-array01"
            description: "IO subsystem NQN — use this for the Fabrics Connect to the IO Controller"
          - name: "Entry[0]: Transport Address"
            abbrev: "nvme_disc.entry.traddr"
            bits: 0
            value: "192.168.100.20"
            description: "Target's IP for IO Controller connection"
          - name: "Entry[0]: Transport Service ID"
            abbrev: "nvme_disc.entry.trsvcid"
            bits: 0
            value: "4420"
            description: "RDMA CM service ID for NVMe-oF (IANA assigned)"

  - id: "discovery_log_cqe"
    name: "Get Log Page Completion (RDMA SEND)"
    description: "Target sends NVMe completion after RDMA WRITE of log data"
    from: "target"
    to: "host"
    via: ["switch"]
    timestamp_ns: 30100000
    total_bytes: 118
    color: "#0369a1"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x04"
            description: "RC SEND — NVMe completion via RDMA SEND. The ordering is: (1) RDMA WRITE data, (2) RDMA SEND completion. RDMA ordering guarantees the data is visible before the completion arrives."
      - name: "NVMe Completion"
        abbrev: "nvme_cqe"
        layer: 7
        total_bytes: 16
        fields:
          - name: "Status"
            abbrev: "nvme.cqe.status"
            bits: 16
            value: "0x0000"
            description: "Success — log page data is now in host memory"

  # ── Fabrics Connect (IO Controller) ─────────────────────────────
  - id: "fabrics_connect_io"
    name: "Fabrics Connect (IO Controller, QID=1)"
    description: "Host connects IO queue to the subsystem discovered via log page"
    from: "host"
    to: "target"
    via: ["switch"]
    timestamp_ns: 40000000
    total_bytes: 166
    color: "#1e40af"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x04"
            description: "RC SEND — Fabrics Connect command"
          - name: "Destination QP"
            abbrev: "bth.dqp"
            bits: 24
            value: "0x000102"
            description: "Target's IO Queue QP (separate RDMA connection from Admin)"
      - name: "NVMe Fabrics Connect"
        abbrev: "nvme_fabrics"
        layer: 7
        total_bytes: 64
        fields:
          - name: "Opcode"
            abbrev: "nvme.cmd.opc"
            bits: 8
            value: "0x7F"
            description: "Fabrics Command"
          - name: "Fabrics Command Type"
            abbrev: "nvme.fabrics.fctype"
            bits: 8
            value: "0x01"
            description: "Connect"
          - name: "Queue ID"
            abbrev: "nvme.fabrics.qid"
            bits: 16
            value: 1
            description: "IO Queue 1 — separate from Admin Queue (QID=0). Each IO queue gets its own RDMA QP for isolation."
          - name: "SQ Size"
            abbrev: "nvme.fabrics.sqsize"
            bits: 16
            value: 127
            description: "128 entries — IO queue depth"
          - name: "SubNQN"
            abbrev: "nvme.fabrics.subnqn"
            bits: 0
            value: "nqn.2024-01.com.example:subsys-array01"
            description: "IO subsystem NQN from Discovery Log Page"

  - id: "fabrics_connect_io_resp"
    name: "Fabrics Connect Response (IO Controller)"
    from: "target"
    to: "host"
    via: ["switch"]
    timestamp_ns: 40050000
    total_bytes: 118
    color: "#1e40af"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x04"
            description: "RC SEND — completion"
      - name: "NVMe Completion"
        abbrev: "nvme_cqe"
        layer: 7
        total_bytes: 16
        fields:
          - name: "Status"
            abbrev: "nvme.cqe.status"
            bits: 16
            value: "0x0000"
            description: "Success"
          - name: "Controller ID"
            abbrev: "nvme.cqe.connect.cntlid"
            bits: 16
            value: "0x0041"
            description: "Controller ID 65 — assigned by target for this host's IO connection"

  # ── NVMe Write (RDMA READ for data) ────────────────────────────
  - id: "nvme_write_cmd"
    name: "NVMe Write Command (RDMA SEND)"
    description: "Host sends NVMe Write command — target will RDMA READ the data"
    from: "host"
    to: "target"
    via: ["switch"]
    timestamp_ns: 50000000
    total_bytes: 130
    color: "#991b1b"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x04"
            description: "RC SEND — NVMe command capsule"
          - name: "Destination QP"
            abbrev: "bth.dqp"
            bits: 24
            value: "0x000102"
            description: "Target's IO Queue QP"
          - name: "PSN"
            abbrev: "bth.psn"
            bits: 24
            value: 1
            description: "Second packet on IO Queue QP"
      - name: "NVMe Write Command"
        abbrev: "nvme"
        layer: 7
        total_bytes: 64
        fields:
          - name: "Opcode"
            abbrev: "nvme.cmd.opc"
            bits: 8
            value: "0x01"
            description: "NVMe Write (0x01)"
          - name: "NSID"
            abbrev: "nvme.cmd.nsid"
            bits: 32
            value: 1
            description: "Namespace 1"
          - name: "Starting LBA"
            abbrev: "nvme.cmd.slba"
            bits: 64
            value: "0x0000000000000000"
            description: "LBA 0 — start of namespace"
          - name: "Number of Logical Blocks"
            abbrev: "nvme.cmd.nlb"
            bits: 16
            value: 7
            description: "8 blocks (0-based) × 512B = 4KB write"
          - name: "SGL Descriptor"
            abbrev: "nvme.cmd.sgl"
            bits: 128
            value: "Keyed SGL: rkey=0x0000BCDE, va=0x7f8000200000, len=4096"
            description: "SGL pointing to host's write data buffer. The target will RDMA READ from this address to fetch the write data — the host's CPU is NOT involved in the data transfer."
            spec_refs:
              - document: "NVMe-oF Spec 1.1a"
                section: "4.2.6"
                title: "Write Command — RDMA READ by Controller"
                url: "https://nvmexpress.org/specifications/"

  - id: "nvme_write_rdma_read"
    name: "RDMA READ (Target Fetches Write Data)"
    description: "Target RDMA READs 4KB write data from host's buffer — zero CPU involvement on host"
    from: "target"
    to: "host"
    via: ["switch"]
    timestamp_ns: 50050000
    total_bytes: 98
    color: "#991b1b"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x0c"
            description: "RC RDMA READ Request (0x0c) — target asks host's RNIC to return data from the SGL address. The host's RNIC responds with an RDMA READ Response containing the data. No CPU interrupt on the host."
            spec_refs:
              - document: "IBTA Vol1"
                section: "9.7.5"
                title: "RDMA READ Operation"
                url: "https://www.infinibandta.org/ibta-specification/"
      - name: "RETH"
        abbrev: "reth"
        layer: 5
        total_bytes: 16
        fields:
          - name: "Virtual Address"
            abbrev: "reth.va"
            bits: 64
            value: "0x00007f8000200000"
            description: "Host's write data buffer address (from NVMe command SGL)"
          - name: "R_Key"
            abbrev: "reth.rkey"
            bits: 32
            value: "0x0000BCDE"
            description: "Host's memory region key authorizing read access"
          - name: "DMA Length"
            abbrev: "reth.dma_len"
            bits: 32
            value: 4096
            description: "4KB — matches NVMe write command transfer length"

  - id: "nvme_write_rdma_read_resp"
    name: "RDMA READ Response (Host → Target with Write Data)"
    description: "Host's RNIC returns 4KB write data to target — CPU not involved"
    from: "host"
    to: "target"
    via: ["switch"]
    timestamp_ns: 50100000
    total_bytes: 4162
    color: "#991b1b"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x10"
            description: "RC RDMA READ Response (0x10) — host's RNIC DMA-reads data from the registered memory region and sends it to the target. The host CPU is completely uninvolved."
          - name: "PSN"
            abbrev: "bth.psn"
            bits: 24
            value: 0
            description: "Response PSN matches READ request"
      - name: "AETH"
        abbrev: "aeth"
        layer: 5
        total_bytes: 4
        fields:
          - name: "Syndrome"
            abbrev: "aeth.syndrome"
            bits: 8
            value: "0x00"
            description: "ACK — read data follows"
      - name: "Payload"
        abbrev: "payload"
        layer: 7
        total_bytes: 4096
        fields:
          - name: "Write Data"
            abbrev: "nvme.data"
            bits: 32768
            value: "4096 bytes of application write data"
            description: "The actual data being written to NVMe namespace. Delivered via RDMA READ Response — zero-copy from host memory to target NIC, then to NVMe SSD."

  - id: "nvme_write_cqe"
    name: "NVMe Write Completion (RDMA SEND)"
    description: "Target confirms NVMe Write completed after writing data to SSD"
    from: "target"
    to: "host"
    via: ["switch"]
    timestamp_ns: 50200000
    total_bytes: 118
    color: "#991b1b"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x04"
            description: "RC SEND — completion delivered via RDMA SEND to host's receive WQE"
      - name: "NVMe Completion"
        abbrev: "nvme_cqe"
        layer: 7
        total_bytes: 16
        fields:
          - name: "Status"
            abbrev: "nvme.cqe.status"
            bits: 16
            value: "0x0000"
            description: "Success — 4KB written to LBA 0"
          - name: "SQ ID"
            abbrev: "nvme.cqe.sqid"
            bits: 16
            value: 1
            description: "IO Queue 1"

  # ── NVMe Read (RDMA WRITE for data) ────────────────────────────
  - id: "nvme_read_cmd"
    name: "NVMe Read Command (RDMA SEND)"
    description: "Host sends NVMe Read command — target will RDMA WRITE the data back"
    from: "host"
    to: "target"
    via: ["switch"]
    timestamp_ns: 60000000
    total_bytes: 130
    color: "#6b21a8"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x04"
            description: "RC SEND — NVMe command capsule"
          - name: "PSN"
            abbrev: "bth.psn"
            bits: 24
            value: 2
            description: "Third command on IO Queue QP"
      - name: "NVMe Read Command"
        abbrev: "nvme"
        layer: 7
        total_bytes: 64
        fields:
          - name: "Opcode"
            abbrev: "nvme.cmd.opc"
            bits: 8
            value: "0x02"
            description: "NVMe Read (0x02)"
          - name: "NSID"
            abbrev: "nvme.cmd.nsid"
            bits: 32
            value: 1
            description: "Namespace 1"
          - name: "Starting LBA"
            abbrev: "nvme.cmd.slba"
            bits: 64
            value: "0x0000000000000000"
            description: "LBA 0 — same block we just wrote"
          - name: "Number of Logical Blocks"
            abbrev: "nvme.cmd.nlb"
            bits: 16
            value: 7
            description: "8 blocks × 512B = 4KB read"
          - name: "SGL Descriptor"
            abbrev: "nvme.cmd.sgl"
            bits: 128
            value: "Keyed SGL: rkey=0x0000CDEF, va=0x7f8000300000, len=4096"
            description: "SGL pointing to host's read data buffer. The target will RDMA WRITE data directly into this address — read data arrives in host memory without any CPU involvement."

  - id: "nvme_read_rdma_write"
    name: "RDMA WRITE (Target Delivers Read Data)"
    description: "Target RDMA WRITEs 4KB read data into host's buffer — zero CPU on host"
    from: "target"
    to: "host"
    via: ["switch"]
    timestamp_ns: 60100000
    total_bytes: 4162
    color: "#6b21a8"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x0a"
            description: "RC RDMA WRITE Only (0x0a) — target writes read data directly into the host's buffer at the SGL address. The host's CPU is not interrupted — data appears silently in memory."
            spec_refs:
              - document: "NVMe-oF Spec 1.1a"
                section: "4.2.7"
                title: "Read Command — RDMA WRITE by Controller"
                url: "https://nvmexpress.org/specifications/"
      - name: "RETH"
        abbrev: "reth"
        layer: 5
        total_bytes: 16
        fields:
          - name: "Virtual Address"
            abbrev: "reth.va"
            bits: 64
            value: "0x00007f8000300000"
            description: "Host's read buffer address from the SGL"
          - name: "R_Key"
            abbrev: "reth.rkey"
            bits: 32
            value: "0x0000CDEF"
            description: "Host's memory region key"
          - name: "DMA Length"
            abbrev: "reth.dma_len"
            bits: 32
            value: 4096
            description: "4KB read data"
      - name: "Payload"
        abbrev: "payload"
        layer: 7
        total_bytes: 4096
        fields:
          - name: "Read Data"
            abbrev: "nvme.data"
            bits: 32768
            value: "4096 bytes of data read from NVMe SSD"
            description: "The data that was previously written to LBA 0. Delivered via RDMA WRITE — zero-copy from NVMe SSD through target NIC directly into host's registered memory."

  - id: "nvme_read_cqe"
    name: "NVMe Read Completion (RDMA SEND)"
    description: "Target sends completion after RDMA WRITE of read data — host processes data"
    from: "target"
    to: "host"
    via: ["switch"]
    timestamp_ns: 60150000
    total_bytes: 118
    color: "#6b21a8"
    headers:
      - name: "BTH"
        abbrev: "bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "OpCode"
            abbrev: "bth.opcode"
            bits: 8
            value: "0x04"
            description: "RC SEND — completion. RDMA ordering guarantees: by the time this SEND arrives in the host's CQ, the RDMA WRITE data is already visible in the host's buffer."
      - name: "NVMe Completion"
        abbrev: "nvme_cqe"
        layer: 7
        total_bytes: 16
        fields:
          - name: "Status"
            abbrev: "nvme.cqe.status"
            bits: 16
            value: "0x0000"
            description: "Success — 4KB read from LBA 0, data is in host buffer"

# ─────────────────────────────────────────────────────────────────
# TIMELINE
# ─────────────────────────────────────────────────────────────────
timeline:
  # ── Link ────────────────────────────────────────────────────────
  - id: "evt_phy_link"
    type: "state_change"
    t_ns: 0
    annotation:
      text: "Physical link up — 100GbE with PFC enabled on both segments"
      detail: >
        Both 100GbE links come up via Auto-Negotiation with RS-FEC. PFC is
        enabled on priority 3 for lossless RoCEv2 transport. This is the
        same lossless fabric foundation described in the PFC/ECN/DCQCN scenario.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 1
            state_fields:
              phy_state: "up"
              speed: "100 Gbps"
          - layer: 2
            state_fields:
              link_state: "up"
              pfc_enabled: true
          - layer: 3
            state_fields:
              dst_ip: "192.168.100.20"
      - actor_id: "target"
        layers:
          - layer: 1
            state_fields:
              phy_state: "up"
              speed: "100 Gbps"
          - layer: 2
            state_fields:
              link_state: "up"
              pfc_enabled: true
      - actor_id: "switch"
        layers:
          - layer: 1
            state_fields:
              port_host_phy: "up"
              port_target_phy: "up"

  # ── ARP ─────────────────────────────────────────────────────────
  - id: "evt_arp_req"
    type: "frame_tx"
    t_ns: 5000000
    frame_id: "arp_request"
    annotation:
      text: "ARP Request — Host resolves storage target's MAC address"
      detail: >
        The NVMe host needs the target's MAC address before it can establish
        an RDMA connection. ARP request is broadcast; switch floods to all ports.
    state_after:
      - actor_id: "switch"
        layers:
          - layer: 2
            state_fields:
              fwd_table_entries: 1

  - id: "evt_arp_rep"
    type: "frame_tx"
    t_ns: 5050000
    frame_id: "arp_reply"
    annotation:
      text: "ARP Reply — Target responds with MAC 00:02:c9:ab:cd:ef"
      detail: >
        ARP cache updated on both sides. The host can now create RDMA connections.
    state_after:
      - actor_id: "switch"
        layers:
          - layer: 2
            state_fields:
              fwd_table_entries: 2

  # ── CM Connection Setup (Admin Queue) ───────────────────────────
  - id: "evt_cm_req_admin"
    type: "frame_tx"
    t_ns: 10000000
    frame_id: "cm_req_admin"
    annotation:
      text: "CM REQ → Host initiates RDMA connection for NVMe Admin Queue"
      detail: >
        The nvme-rdma driver calls rdma_connect() which triggers the IB CM
        (Connection Manager) to send a CM REQ. This is sent via UD (Unreliable
        Datagram) to the well-known QP1 (GSI — General Service Interface).

        The CM REQ carries NVMe-oF RDMA private data specifying:
        • HRQSIZE = 128 (host receive queue size)
        • HSQSIZE = 128 (host send queue size)

        This is a key difference from NVMe/TCP: the RDMA transport requires
        explicit QP connection setup via the IB CM before any NVMe commands
        can flow. The NVMe/TCP transport simply opens a TCP connection.
      spec_refs:
        - document: "IBTA Vol1"
          section: "12.6"
          title: "CM REQ Message"
          url: "https://www.infinibandta.org/ibta-specification/"
    state_after:
      - actor_id: "host"
        layers:
          - layer: 5
            state_fields:
              qp_state: "INIT"
              qp_num: "0x000080"
              cm_state: "REQ_SENT"

  - id: "evt_cm_rep_admin"
    type: "frame_tx"
    t_ns: 10050000
    frame_id: "cm_rep_admin"
    annotation:
      text: "CM REP ← Target accepts RDMA connection, allocates QP"
      detail: >
        The target's nvme-rdma driver accepts the connection. It allocates a QP,
        posts receive WQEs (for incoming NVMe command capsules), and sends CM REP
        with CRQSIZE = 128 (controller receive queue size).

        The QP transitions: RESET → INIT → RTR (Ready to Receive).
    state_after:
      - actor_id: "target"
        layers:
          - layer: 5
            state_fields:
              qp_state: "RTR"
              qp_num: "0x000100"
              cm_state: "REP_SENT"

  - id: "evt_cm_rtu_admin"
    type: "frame_tx"
    t_ns: 10100000
    frame_id: "cm_rtu_admin"
    annotation:
      text: "CM RTU → RDMA connection established — Admin Queue ready"
      detail: >
        The host sends CM RTU (Ready To Use), both QPs transition to RTS
        (Ready To Send). The RDMA connection is fully established.

        NVMe-oF/RDMA uses one RDMA QP per NVMe queue:
        • Admin Queue (QID 0) → QP pair 0x000080 ↔ 0x000100
        • IO Queue 1 (QID 1) → separate QP pair (connected later)

        This per-queue isolation means a stalled IO queue doesn't block
        admin operations — important for controller management.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 5
            state_fields:
              qp_state: "RTS"
              cm_state: "established"
          - layer: 6
            state_fields:
              fabrics_state: "RDMA connected"
      - actor_id: "target"
        layers:
          - layer: 5
            state_fields:
              qp_state: "RTS"
              cm_state: "established"

  # ── Fabrics Connect (Discovery) ─────────────────────────────────
  - id: "evt_fabrics_connect_disc"
    type: "frame_tx"
    t_ns: 20000000
    frame_id: "fabrics_connect_discovery"
    annotation:
      text: "Fabrics Connect → Host connects to Discovery Controller"
      detail: >
        With the RDMA connection established, the host sends an NVMe Fabrics
        Connect command via RDMA SEND (BTH opcode 0x04). The command capsule
        lands directly in a pre-posted receive WQE on the target — zero-copy
        into the target's command buffer.

        The host connects to the well-known Discovery Controller NQN:
        nqn.2014-08.org.nvmexpress.discovery

        This is analogous to the NVMe/TCP scenario's mDNS → CDC flow, but
        simpler: in the RDMA case, the host typically knows the target's IP
        address from static configuration (nvme connect-all -t rdma -a 192.168.100.20).
    state_after:
      - actor_id: "host"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "connecting to discovery"
          - layer: 6
            state_fields:
              subnqn: "nqn.2014-08.org.nvmexpress.discovery"

  - id: "evt_fabrics_connect_disc_resp"
    type: "frame_tx"
    t_ns: 20050000
    frame_id: "fabrics_connect_disc_resp"
    annotation:
      text: "Fabrics Connect Response ← Discovery Controller ready"
      detail: >
        The target accepts the Fabrics Connect and returns a dynamic controller
        ID (0xFFFF for Discovery Controllers). The host's Admin Queue is now
        associated with the Discovery Controller.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "discovery connected"
              cntlid: "0xFFFF"

  # ── Discovery Log Page ──────────────────────────────────────────
  - id: "evt_get_log_cmd"
    type: "frame_tx"
    t_ns: 30000000
    frame_id: "get_log_page_discovery"
    annotation:
      text: "Get Log Page → Host requests Discovery Log via RDMA SEND"
      detail: >
        The host sends a Get Log Page command (LID 0x70) via RDMA SEND.
        The command includes a Keyed SGL descriptor that tells the target
        exactly where to RDMA WRITE the log page data in host memory:
        rkey=0x0000ABCD, va=0x7f8000100000, len=4096.

        This is the fundamental NVMe-oF/RDMA data transfer pattern for
        controller-to-host data:
        1. Host sends command via RDMA SEND (with SGL pointing to host buffer)
        2. Target RDMA WRITEs data directly into host buffer (using SGL rkey/va)
        3. Target sends completion via RDMA SEND

        The host's CPU does not touch the data — it goes from target NIC
        directly into host memory via RDMA WRITE. Compare with NVMe/TCP
        where the kernel must copy data from socket buffers to the target buffer.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "retrieving discovery log"

  - id: "evt_discovery_log_write"
    type: "frame_tx"
    t_ns: 30050000
    frame_id: "discovery_log_write"
    annotation:
      text: "RDMA WRITE ← Target delivers Discovery Log Page into host memory"
      detail: >
        The target reads the Discovery Log Page from its configuration and
        RDMA WRITEs it directly into the host's pre-registered buffer using
        the rkey and virtual address from the command's SGL.

        The log page contains one entry:
        • SubNQN: nqn.2024-01.com.example:subsys-array01
        • Transport: RDMA (0x01)
        • Address: 192.168.100.20
        • Service ID: 4420

        The host will use this information to connect to the IO Controller.
    state_after:
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "discovery log sent"

  - id: "evt_discovery_log_cqe"
    type: "frame_tx"
    t_ns: 30100000
    frame_id: "discovery_log_cqe"
    annotation:
      text: "Completion ← Discovery Log Page retrieved successfully"
      detail: >
        The target sends the NVMe completion via RDMA SEND. RDMA ordering
        guarantees that the RDMA WRITE (data) is visible in host memory
        BEFORE this SEND (completion) arrives. The host can immediately
        access the Discovery Log Page data.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "discovery complete"
          - layer: 6
            state_fields:
              subnqn: "nqn.2024-01.com.example:subsys-array01"

  # ── Fabrics Connect (IO Controller) ─────────────────────────────
  - id: "evt_fabrics_connect_io"
    type: "frame_tx"
    t_ns: 40000000
    frame_id: "fabrics_connect_io"
    annotation:
      text: "Fabrics Connect → Host connects IO Queue to storage subsystem"
      detail: >
        The host establishes a second RDMA connection (separate CM REQ/REP/RTU,
        omitted for brevity) and sends Fabrics Connect for IO Queue 1 (QID=1)
        to the subsystem NQN discovered in the log page.

        Each NVMe IO queue maps to a separate RDMA QP. In production, a host
        typically creates one IO queue per CPU core (e.g., 32 QPs for 32 cores)
        for maximum parallelism. Each queue operates independently.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "connecting IO queue"
              io_qid: 1

  - id: "evt_fabrics_connect_io_resp"
    type: "frame_tx"
    t_ns: 40050000
    frame_id: "fabrics_connect_io_resp"
    annotation:
      text: "Fabrics Connect Response ← IO Controller ready, CNTLID=0x0041"
      detail: >
        The target assigns controller ID 0x0041 and the IO queue is ready
        for NVMe I/O operations. The host can now issue NVMe Read and Write
        commands on this queue.

        At this point the full NVMe-oF/RDMA stack is established:
        • Admin Queue: QP 0x000080 ↔ 0x000100 (for admin commands, discovery)
        • IO Queue 1: QP 0x000082 ↔ 0x000102 (for NVMe Read/Write I/O)
    state_after:
      - actor_id: "host"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "IO queue connected"
              cntlid: "0x0041"
              nsid: 1
          - layer: 6
            state_fields:
              fabrics_state: "IO connected"
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "IO connected"
          - layer: 6
            state_fields:
              cntlid_assigned: "0x0041"

  # ── NVMe Write ──────────────────────────────────────────────────
  - id: "evt_nvme_write_cmd"
    type: "frame_tx"
    t_ns: 50000000
    frame_id: "nvme_write_cmd"
    annotation:
      text: "NVMe Write → Host sends 4KB write command (RDMA SEND)"
      detail: >
        The host application issues a 4KB write to LBA 0. The nvme-rdma driver:
        1. Registers the write data buffer as an MR (Memory Region)
        2. Builds an NVMe Write command with a Keyed SGL pointing to the buffer
        3. Sends the command via RDMA SEND (ibv_post_send with SEND opcode)

        The SGL tells the target: "My write data is at va=0x7f8000200000,
        rkey=0x0000BCDE, length=4096. RDMA READ it from there."

        This is the OPPOSITE of NVMe Read data flow: for Writes, the TARGET
        fetches data FROM the host via RDMA READ. For Reads, the target
        delivers data TO the host via RDMA WRITE.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "write pending"

  - id: "evt_nvme_write_rdma_read"
    type: "frame_tx"
    t_ns: 50050000
    frame_id: "nvme_write_rdma_read"
    annotation:
      text: "RDMA READ ← Target fetches write data from host memory"
      detail: >
        The target's NVMe driver issues an RDMA READ to fetch the 4KB write
        data from the host's buffer. The target's RNIC sends an RDMA READ
        Request (BTH opcode 0x0c) with the host's rkey and virtual address.

        The host's RNIC receives this request, DMA-reads the data from the
        host's registered memory region, and returns it as an RDMA READ
        Response — ALL IN HARDWARE. The host CPU is not interrupted.

        This is a fundamental advantage of the RDMA transport over TCP:
        in NVMe/TCP, the host kernel must copy write data from user buffers
        into kernel socket buffers, then the NIC DMAs from kernel memory.
        In NVMe-oF/RDMA, the data goes directly from user-space memory
        to the wire without any CPU copy.
    state_after:
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "fetching write data"

  - id: "evt_nvme_write_rdma_read_resp"
    type: "frame_tx"
    t_ns: 50100000
    frame_id: "nvme_write_rdma_read_resp"
    annotation:
      text: "RDMA READ Response → 4KB write data delivered to target"
      detail: >
        The host's RNIC returns the 4KB data payload. The target receives it,
        and the NVMe target driver writes it to the backend NVMe SSD at LBA 0.
    state_after:
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "writing to SSD"

  - id: "evt_nvme_write_cqe"
    type: "frame_tx"
    t_ns: 50200000
    frame_id: "nvme_write_cqe"
    annotation:
      text: "NVMe Write Completion ← 4KB written to LBA 0 successfully"
      detail: >
        The target confirms the NVMe Write completed. The NVMe completion
        is delivered via RDMA SEND to the host's completion queue (receive WQE).

        NVMe Write data path summary (RDMA transport):
        1. Host → Target: RDMA SEND (NVMe Write command with SGL)
        2. Target → Host: RDMA READ Request (fetch write data)
        3. Host → Target: RDMA READ Response (4KB data, zero-copy)
        4. Target → Host: RDMA SEND (NVMe completion)
        Total: 4 RDMA operations, 0 CPU copies on host.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "write complete"
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "IO ready"

  # ── NVMe Read ──────────────────────────────────────────────────
  - id: "evt_nvme_read_cmd"
    type: "frame_tx"
    t_ns: 60000000
    frame_id: "nvme_read_cmd"
    annotation:
      text: "NVMe Read → Host sends 4KB read command (RDMA SEND)"
      detail: >
        The host sends an NVMe Read command for the same LBA 0 (4KB).
        The command includes a Keyed SGL telling the target where to RDMA
        WRITE the read data in host memory:
        rkey=0x0000CDEF, va=0x7f8000300000, len=4096.

        For Read operations, the data path is simpler than Write:
        the target reads from SSD and RDMA WRITEs directly into the
        host's buffer, then sends the completion.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "read pending"

  - id: "evt_nvme_read_rdma_write"
    type: "frame_tx"
    t_ns: 60100000
    frame_id: "nvme_read_rdma_write"
    annotation:
      text: "RDMA WRITE ← Target delivers 4KB read data into host memory"
      detail: >
        The target reads 4KB from the NVMe SSD at LBA 0 and RDMA WRITEs it
        directly into the host's registered buffer using the SGL rkey and
        virtual address. The host's CPU is not involved — data lands silently
        in user-space memory.

        This is the same data delivery mechanism used for the Discovery Log
        Page earlier, and it's the fundamental pattern for all controller-to-host
        data in NVMe-oF/RDMA.
    state_after:
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "read data sent"

  - id: "evt_nvme_read_cqe"
    type: "frame_tx"
    t_ns: 60150000
    frame_id: "nvme_read_cqe"
    annotation:
      text: "NVMe Read Completion ← 4KB read from LBA 0 successfully"
      detail: >
        The target sends the completion via RDMA SEND. RDMA ordering guarantees
        the WRITE data is visible before this completion arrives.

        NVMe Read data path summary (RDMA transport):
        1. Host → Target: RDMA SEND (NVMe Read command with SGL)
        2. Target → Host: RDMA WRITE (4KB data, zero-copy into host buffer)
        3. Target → Host: RDMA SEND (NVMe completion)
        Total: 3 RDMA operations, 0 CPU copies on host.

        Comparison with NVMe/TCP:
        • NVMe/TCP Read: command (TCP SEND) → data (TCP C2HData PDU, kernel copy) → completion
        • NVMe-oF/RDMA Read: command (RDMA SEND) → data (RDMA WRITE, zero-copy) → completion
        The RDMA path eliminates all CPU data copies and kernel transitions.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "read complete"
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              nvme_state: "IO ready"

  # ── Summary ─────────────────────────────────────────────────────
  - id: "evt_summary"
    type: "annotation"
    t_ns: 100000000
    annotation:
      text: "⟳ Scenario complete — NVMe-oF/RDMA discovery and I/O"
      detail: >
        This scenario demonstrated NVMe over Fabrics using the RDMA transport binding:

        1. LINK — 100GbE physical establishment with PFC for lossless fabric
        2. ARP — MAC address resolution
        3. CM — IB Connection Manager QP setup (REQ/REP/RTU) for Admin Queue
        4. FABRICS CONNECT — Discovery Controller connection, Discovery Log Page retrieval
        5. IO CONNECT — IO Controller queue setup over separate RDMA QP
        6. NVMe WRITE — command via SEND, data fetched via RDMA READ (3 operations)
        7. NVMe READ — command via SEND, data delivered via RDMA WRITE (2 operations)

        RDMA Transport Binding — Data Path Summary:
        ┌─────────────────────────┬──────────────────────┬─────────────────────┐
        │ Operation               │ Command Direction    │ Data Direction      │
        ├─────────────────────────┼──────────────────────┼─────────────────────┤
        │ NVMe Read               │ Host→Target (SEND)   │ Target→Host (WRITE) │
        │ NVMe Write              │ Host→Target (SEND)   │ Target←Host (READ)  │
        │ Admin (Get Log Page)    │ Host→Target (SEND)   │ Target→Host (WRITE) │
        │ Completion (any)        │ Target→Host (SEND)   │ —                   │
        └─────────────────────────┴──────────────────────┴─────────────────────┘

        Key advantages over NVMe/TCP:
        • Zero CPU data copies — RNIC DMA handles all data movement
        • Lower latency — no kernel socket buffer transitions
        • Higher throughput — line-rate achievable with single QP
        • Per-queue isolation — each NVMe queue on its own RDMA QP

        Trade-off: requires lossless Ethernet fabric (PFC + ECN/DCQCN),
        RDMA-capable NICs, and more complex configuration.

# ─────────────────────────────────────────────────────────────────
# GLOSSARY
# ─────────────────────────────────────────────────────────────────
glossary:
  - term: "Keyed SGL"
    abbrev: "SGL"
    definition: "Scatter-Gather List descriptor in NVMe-oF/RDMA that provides the remote memory key (rkey) and virtual address for RDMA data placement. The host includes SGLs in NVMe commands to tell the target where to RDMA WRITE (for reads) or RDMA READ (for writes)."
    spec_refs:
      - document: "NVMe-oF Spec 1.1a"
        section: "4.2.5"
        title: "SGL Usage"
        url: "https://nvmexpress.org/specifications/"

  - term: "Command Capsule"
    definition: "An NVMe command sent as an RDMA SEND. The capsule contains the 64-byte NVMe command and optionally inline data (for small writes). Large data transfers use the SGL mechanism instead."

  - term: "RDMA Transport Binding"
    definition: "The NVMe-oF specification's mapping of NVMe commands and data to RDMA operations. Commands → RDMA SEND, host-to-controller data → RDMA READ, controller-to-host data → RDMA WRITE, completions → RDMA SEND."
    spec_refs:
      - document: "NVMe-oF Spec 1.1a"
        section: "4.2"
        title: "RDMA Transport Binding"
        url: "https://nvmexpress.org/specifications/"

  - term: "Admin Queue"
    abbrev: "AQ"
    definition: "NVMe Queue ID 0 — used for admin commands (Identify, Get Log Page, Fabrics Connect). In NVMe-oF/RDMA, the Admin Queue maps to a dedicated RDMA QP pair."

  - term: "IO Queue"
    definition: "NVMe Queue IDs 1-N — used for NVMe Read/Write I/O operations. Each IO queue maps to its own RDMA QP, providing per-queue isolation and per-core parallelism."

  - term: "NVMe Qualified Name"
    abbrev: "NQN"
    definition: "Globally unique identifier for NVMe subsystems and hosts. Format: nqn.YYYY-MM.reverse-domain:user-string. The Discovery Controller uses the well-known NQN nqn.2014-08.org.nvmexpress.discovery."
    spec_refs:
      - document: "NVMe Base Spec 2.1"
        section: "4.5"
        title: "NVMe Qualified Name"
        url: "https://nvmexpress.org/specifications/"

  - term: "RDMA READ vs RDMA WRITE"
    definition: "In NVMe-oF/RDMA: RDMA WRITE delivers data TO the host (NVMe Read, Log Pages). RDMA READ fetches data FROM the host (NVMe Write). This is because the target initiates data transfer in both cases, using the SGL keys provided by the host."
