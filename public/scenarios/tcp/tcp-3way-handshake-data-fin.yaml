            description: "TCP checksum over pseudo-header + TCP header + data"
          - name: "Urgent Pointer"
            abbrev: "tcp.urgent_pointer"
            bits: 16
            value: 0
            description: "Not used (URG flag not set)"
          - name: "Options"
            abbrev: "tcp.options"
            bits: 160
            value: "MSS=1460, SACK-Permitted, Window Scale=7, Timestamps"
            description: "TCP options negotiated during handshake (20 bytes)"
            fields:
              - name: "MSS"
                abbrev: "tcp.options.mss_val"
                bits: 32
                value: 1460
                description: "Maximum Segment Size — largest TCP payload this side will accept. 1460 = 1500 (Ethernet MTU) − 20 (IP) − 20 (TCP base header)"
                spec_refs:
                  - document: "RFC 9293"
                    section: "3.7.1"
                    title: "Maximum Segment Size Option"
                    url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.7.1"
                kernel_ref:
                  file: "net/ipv4/tcp_output.c"
                  function: "tcp_syn_options"
                  notes: "Builds MSS option in SYN segments based on route MTU"
              - name: "SACK Permitted"
                abbrev: "tcp.options.sack_perm"
                bits: 16
                value: true
                description: "Selective Acknowledgment permitted — allows receiver to report non-contiguous blocks received"
                spec_refs:
                  - document: "RFC 2018"
                    section: "2"
                    title: "SACK Option"
                    url: "https://datatracker.ietf.org/doc/html/rfc2018"
              - name: "Window Scale"
                abbrev: "tcp.options.wscale_val"
                bits: 24
                value: 7
                description: "Window scale factor = 7 → actual window = window_size × 2^7 = 65535 × 128 = 8,388,480 bytes (~8MB). Needed for high-bandwidth links."
                spec_refs:
                  - document: "RFC 7323"
                    section: "2"
                    title: "TCP Window Scale Option"
                    url: "https://datatracker.ietf.org/doc/html/rfc7323#section-2"
                kernel_ref:
                  file: "net/ipv4/tcp_output.c"
                  function: "tcp_syn_options"
                  notes: "Window scale value derived from tcp_rmem[2] setting"
              - name: "Timestamps"
                abbrev: "tcp.options.timestamp"
                bits: 80
                value: "TSval=100000, TSecr=0"
                description: "TCP Timestamps option — TSval is sender's clock; TSecr echoes peer's TSval for RTT measurement. TSecr=0 because no peer timestamp received yet."
                spec_refs:
                  - document: "RFC 7323"
                    section: "3"
                    title: "TCP Timestamps Option"
                    url: "https://datatracker.ietf.org/doc/html/rfc7323#section-3"

