meta:
  id: "tcp-3way-handshake-data-fin"
  title: "TCP: 3-Way Handshake → Data Transfer → FIN Teardown"
  protocol: "TCP"
  protocol_family: "TCP/IP"
  version: "1.0.0"
  description: >
    A complete TCP connection lifecycle over 10GbE: physical link establishment,
    ARP resolution, the classic 3-way handshake (SYN → SYN-ACK → ACK) with
    sequence/acknowledgment number mechanics, a simple HTTP-style request/response
    data exchange showing segmentation and sliding window, and graceful 4-way
    FIN teardown. Every TCP header field is annotated with RFC references and
    Linux kernel source cross-links. This is the foundation scenario — virtually
    every other protocol in ProtoViz runs on top of TCP or contrasts with it.

  learning_objectives:
    - "Understand how TCP's 3-way handshake establishes synchronized sequence numbers between two hosts"
    - "Trace the SYN → SYN-ACK → ACK exchange and observe the Initial Sequence Number (ISN) selection"
    - "See how TCP sequence numbers and acknowledgment numbers track every byte of data"
    - "Observe TCP window size negotiation and how the receiver advertises available buffer space"
    - "Understand MSS (Maximum Segment Size) negotiation via TCP options during the handshake"
    - "Follow TCP data segments carrying an HTTP request and response with proper ACKs"
    - "See the graceful 4-way FIN teardown (FIN → ACK → FIN → ACK) and understand TIME_WAIT"
    - "Observe TCP state machine transitions on both client and server: CLOSED → SYN_SENT → ESTABLISHED → FIN_WAIT → TIME_WAIT"

  difficulty: "beginner"

  authors:
    - name: "ProtoViz Community"
      org: "proto-viz"
      github: "proto-viz"
    - name: "Generated via Linux kernel source analysis"
      org: "proto-viz"
      github: ""

  created: "2026-03-17"
  updated: "2026-03-17"

  tags:
    - "TCP"
    - "TCP/IP"
    - "3-way handshake"
    - "transport layer"
    - "sequence numbers"
    - "flow control"
    - "connection management"
    - "beginner"
    - "education"

  primary_specs:
    - document: "RFC 9293"
      section: "3.5"
      title: "TCP Connection State Diagram"
      url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.5"
      alt_url: "https://www.rfc-editor.org/rfc/rfc9293"
    - document: "RFC 9293"
      section: "3.6"
      title: "TCP Segment Format"
      url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.6"
      alt_url: ""
    - document: "RFC 7323"
      section: "2"
      title: "TCP Window Scale Option"
      url: "https://datatracker.ietf.org/doc/html/rfc7323#section-2"
      alt_url: ""
    - document: "RFC 6298"
      section: "2"
      title: "Computing TCP Retransmission Timer"
      url: "https://datatracker.ietf.org/doc/html/rfc6298#section-2"
      alt_url: ""
    - document: "IEEE 802.3"
      section: "3"
      title: "Ethernet Frame Format"
      url: "https://standards.ieee.org/ieee/802.3/10422/"
      alt_url: ""

  content_disclaimer: >
    Protocol descriptions in this scenario are based on open-source implementations
    (Linux kernel, Wireshark dissectors) and public RFCs. No proprietary specification
    text has been reproduced. RFC references are provided as citations for further reading.

  source_references:
    - repo: "torvalds/linux"
      path: "net/ipv4/tcp_output.c"
      description: "TCP segment output — SYN/ACK/FIN generation, window management"
    - repo: "torvalds/linux"
      path: "net/ipv4/tcp_input.c"
      description: "TCP segment input processing — state machine transitions, ACK handling"
    - repo: "torvalds/linux"
      path: "net/ipv4/tcp.c"
      description: "Core TCP functions — connect, accept, close, sendmsg, recvmsg"
    - repo: "torvalds/linux"
      path: "net/ipv4/tcp_ipv4.c"
      description: "IPv4-specific TCP — ISN generation (SipHash), routing, connection lookup"
    - repo: "torvalds/linux"
      path: "include/net/tcp.h"
      description: "TCP header definitions, state machine constants, option parsing"
    - repo: "torvalds/linux"
      path: "net/ipv4/arp.c"
      description: "ARP request/reply handling"

# ─────────────────────────────────────────────────────────────────
# TOPOLOGY
# ─────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: "client"
      type: "host"
      label: "Client"
      description: "TCP client — initiates the connection with connect()"
      hardware: "Generic 10GbE NIC"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "10.0.1.10"
      mac: "00:11:22:33:44:01"
      position: "left"

    - id: "switch"
      type: "switch"
      label: "10GbE Switch"
      description: "Layer-2 Ethernet switch forwarding frames between client and server"
      hardware: "Generic 10GbE switch"
      position: "center"

    - id: "server"
      type: "host"
      label: "Server"
      description: "TCP server — accepts connections with accept(), serves HTTP responses"
      hardware: "Generic 10GbE NIC"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "10.0.1.20"
      mac: "00:11:22:33:44:02"
      position: "right"

  links:
    - id: "link-c-sw"
      from: "client"
      to: "switch"
      speed_gbps: 10
      media: "copper_dac"
      fec: "FC-FEC"
      autoneg: true
    - id: "link-sw-s"
      from: "switch"
      to: "server"
      speed_gbps: 10
      media: "copper_dac"
      fec: "FC-FEC"
      autoneg: true

# ─────────────────────────────────────────────────────────────────
# OSI LAYER DEFINITIONS (per actor)
# ─────────────────────────────────────────────────────────────────
osi_layers:
  client:
    - layer: 7
      name: "Application (HTTP)"
      components: ["user application", "libc socket API"]
      state_schema:
        app_state:
          type: "string"
          description: "Application-level state"
          initial: "idle"
        socket_fd:
          type: "string"
          description: "Socket file descriptor"
          initial: "none"
        bytes_sent:
          type: "integer"
          description: "Total application bytes sent"
          initial: 0
        bytes_received:
          type: "integer"
          description: "Total application bytes received"
          initial: 0

    - layer: 5
      name: "Session / Socket"
      components: ["net/socket.c", "net/ipv4/af_inet.c"]
      state_schema:
        socket_state:
          type: "string"
          description: "Kernel socket state"
          initial: "SS_UNCONNECTED"
        local_port:
          type: "integer"
          description: "Local (ephemeral) port number"
          initial: 0
        remote_port:
          type: "integer"
          description: "Remote port number"
          initial: 0

    - layer: 4
      name: "TCP"
      components: ["net/ipv4/tcp.c", "net/ipv4/tcp_output.c", "net/ipv4/tcp_input.c"]
      state_schema:
        tcp_state:
          type: "string"
          description: "TCP state machine state (RFC 9293 §3.3.2)"
          initial: "CLOSED"
        seq_num:
          type: "string"
          description: "Next sequence number to send (SND.NXT)"
          initial: "—"
        ack_num:
          type: "string"
          description: "Next sequence number expected from peer (RCV.NXT)"
          initial: "—"
        snd_una:
          type: "string"
          description: "Oldest unacknowledged sequence number (SND.UNA)"
          initial: "—"
        window_size:
          type: "integer"
          description: "Advertised receive window (bytes)"
          initial: 65535
        mss:
          type: "integer"
          description: "Maximum Segment Size negotiated"
          initial: 0
        cwnd:
          type: "integer"
          description: "Congestion window (segments)"
          initial: 10
        rtt_ms:
          type: "string"
          description: "Smoothed round-trip time estimate"
          initial: "—"

    - layer: 3
      name: "IP / Routing"
      components: ["net/ipv4/ip_output.c", "net/ipv4/route.c"]
      state_schema:
        src_ip:
          type: "string"
          description: "Source IP address"
          initial: "10.0.1.10"
        dst_ip:
          type: "string"
          description: "Destination IP address"
          initial: "null"
        ttl:
          type: "integer"
          initial: 64
        ip_id:
          type: "integer"
          description: "IP identification field (for fragmentation)"
          initial: 0

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver", "IEEE 802.3"]
      state_schema:
        link_state:
          type: "string"
          initial: "down"
        mac_addr:
          type: "string"
          initial: "00:11:22:33:44:01"
        arp_resolved:
          type: "boolean"
          description: "Destination MAC known via ARP"
          initial: false

    - layer: 1
      name: "Physical (10GbE)"
      components: ["IEEE 802.3", "10GBASE-CR"]
      state_schema:
        phy_state:
          type: "string"
          description: "Physical layer state"
          initial: "down"
        an_state:
          type: "string"
          description: "Auto-Negotiation state"
          initial: "idle"
        speed:
          type: "string"
          initial: "unknown"
        signal_detect:
          type: "boolean"
          initial: false

  server:
    - layer: 7
      name: "Application (HTTP)"
      components: ["HTTP server", "libc socket API"]
      state_schema:
        app_state:
          type: "string"
          description: "Application-level state"
          initial: "listening"
        socket_fd:
          type: "string"
          description: "Socket file descriptor"
          initial: "listen_fd=3"
        bytes_sent:
          type: "integer"
          description: "Total application bytes sent"
          initial: 0
        bytes_received:
          type: "integer"
          description: "Total application bytes received"
          initial: 0

    - layer: 5
      name: "Session / Socket"
      components: ["net/socket.c", "net/ipv4/af_inet.c"]
      state_schema:
        socket_state:
          type: "string"
          description: "Kernel socket state"
          initial: "SS_UNCONNECTED"
        local_port:
          type: "integer"
          description: "Listening port number"
          initial: 80
        remote_port:
          type: "integer"
          description: "Remote port number (after accept)"
          initial: 0
        backlog:
          type: "integer"
          description: "SYN backlog queue depth"
          initial: 128

    - layer: 4
      name: "TCP"
      components: ["net/ipv4/tcp.c", "net/ipv4/tcp_output.c", "net/ipv4/tcp_input.c"]
      state_schema:
        tcp_state:
          type: "string"
          description: "TCP state machine state (RFC 9293 §3.3.2)"
          initial: "LISTEN"
        seq_num:
          type: "string"
          description: "Next sequence number to send (SND.NXT)"
          initial: "—"
        ack_num:
          type: "string"
          description: "Next sequence number expected from peer (RCV.NXT)"
          initial: "—"
        snd_una:
          type: "string"
          description: "Oldest unacknowledged sequence number (SND.UNA)"
          initial: "—"
        window_size:
          type: "integer"
          description: "Advertised receive window (bytes)"
          initial: 65535
        mss:
          type: "integer"
          description: "Maximum Segment Size negotiated"
          initial: 0
        cwnd:
          type: "integer"
          description: "Congestion window (segments)"
          initial: 10
        rtt_ms:
          type: "string"
          description: "Smoothed round-trip time estimate"
          initial: "—"

    - layer: 3
      name: "IP / Routing"
      components: ["net/ipv4/ip_output.c", "net/ipv4/route.c"]
      state_schema:
        src_ip:
          type: "string"
          description: "Source IP address"
          initial: "10.0.1.20"
        dst_ip:
          type: "string"
          description: "Destination IP address"
          initial: "null"
        ttl:
          type: "integer"
          initial: 64
        ip_id:
          type: "integer"
          description: "IP identification field"
          initial: 0

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver", "IEEE 802.3"]
      state_schema:
        link_state:
          type: "string"
          initial: "down"
        mac_addr:
          type: "string"
          initial: "00:11:22:33:44:02"
        arp_resolved:
          type: "boolean"
          description: "Destination MAC known via ARP"
          initial: false

    - layer: 1
      name: "Physical (10GbE)"
      components: ["IEEE 802.3", "10GBASE-CR"]
      state_schema:
        phy_state:
          type: "string"
          description: "Physical layer state"
          initial: "down"
        an_state:
          type: "string"
          description: "Auto-Negotiation state"
          initial: "idle"
        speed:
          type: "string"
          initial: "unknown"
        signal_detect:
          type: "boolean"
          initial: false

# ─────────────────────────────────────────────────────────────────
# FRAMES
# ─────────────────────────────────────────────────────────────────
frames:
  # ── Link / ARP ──────────────────────────────────────────────────
  - id: "arp_request"
    name: "ARP Request"
    description: "Client resolves server's MAC address"
    from: "client"
    to: "broadcast"
    via: ["switch"]
    timestamp_ns: 200000000
    total_bytes: 42
    color: "#b45309"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "ff:ff:ff:ff:ff:ff"
            value_hex: "0xffffffffffff"
            description: "Broadcast — ARP request sent to all hosts on the segment"
            spec_refs:
              - document: "IEEE 802.3"
                section: "3.2.3"
                title: "Destination Address field"
                url: "https://standards.ieee.org/ieee/802.3/10422/"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "00:11:22:33:44:01"
            value_hex: "0x001122334401"
            description: "Client's MAC address"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0806"
            value_hex: "0x0806"
            description: "ARP (Address Resolution Protocol)"
            spec_refs:
              - document: "RFC 826"
                section: "1"
                title: "An Ethernet Address Resolution Protocol"
                url: "https://datatracker.ietf.org/doc/html/rfc826"

      - name: "ARP"
        abbrev: "arp"
        layer: 3
        total_bytes: 28
        fields:
          - name: "Hardware Type"
            abbrev: "arp.hw.type"
            bits: 16
            value: 1
            value_hex: "0x0001"
            description: "Ethernet (1)"
          - name: "Protocol Type"
            abbrev: "arp.proto.type"
            bits: 16
            value: "0x0800"
            value_hex: "0x0800"
            description: "IPv4"
          - name: "Hardware Size"
            abbrev: "arp.hw.size"
            bits: 8
            value: 6
            description: "MAC address length in bytes"
          - name: "Protocol Size"
            abbrev: "arp.proto.size"
            bits: 8
            value: 4
            description: "IPv4 address length in bytes"
          - name: "Opcode"
            abbrev: "arp.opcode"
            bits: 16
            value: 1
            value_hex: "0x0001"
            description: "ARP Request (1)"
            spec_refs:
              - document: "RFC 826"
                section: "1"
                title: "Packet format"
                url: "https://datatracker.ietf.org/doc/html/rfc826"
          - name: "Sender MAC"
            abbrev: "arp.src.hw_mac"
            bits: 48
            value: "00:11:22:33:44:01"
            description: "Client's MAC"
          - name: "Sender IP"
            abbrev: "arp.src.proto_ipv4"
            bits: 32
            value: "10.0.1.10"
            description: "Client's IP address"
          - name: "Target MAC"
            abbrev: "arp.dst.hw_mac"
            bits: 48
            value: "00:00:00:00:00:00"
            description: "Unknown — this is what we're resolving"
          - name: "Target IP"
            abbrev: "arp.dst.proto_ipv4"
            bits: 32
            value: "10.0.1.20"
            description: "Server's IP address — who has this?"

  - id: "arp_reply"
    name: "ARP Reply"
    description: "Server responds with its MAC address"
    from: "server"
    to: "client"
    via: ["switch"]
    timestamp_ns: 200050000
    total_bytes: 42
    color: "#b45309"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "00:11:22:33:44:01"
            description: "Unicast to client"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "00:11:22:33:44:02"
            description: "Server's MAC address"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0806"
            description: "ARP"

      - name: "ARP"
        abbrev: "arp"
        layer: 3
        total_bytes: 28
        fields:
          - name: "Opcode"
            abbrev: "arp.opcode"
            bits: 16
            value: 2
            value_hex: "0x0002"
            description: "ARP Reply (2) — 'I am 10.0.1.20, my MAC is 00:11:22:33:44:02'"
            spec_refs:
              - document: "RFC 826"
                section: "1"
                title: "Packet reception"
                url: "https://datatracker.ietf.org/doc/html/rfc826"
            kernel_ref:
              file: "net/ipv4/arp.c"
              function: "arp_process"
              notes: "Processes incoming ARP, updates neighbor cache"
          - name: "Sender MAC"
            abbrev: "arp.src.hw_mac"
            bits: 48
            value: "00:11:22:33:44:02"
            description: "Server's MAC — the answer to the ARP request"
          - name: "Sender IP"
            abbrev: "arp.src.proto_ipv4"
            bits: 32
            value: "10.0.1.20"
            description: "Server's IP address"
          - name: "Target MAC"
            abbrev: "arp.dst.hw_mac"
            bits: 48
            value: "00:11:22:33:44:01"
            description: "Client's MAC"
          - name: "Target IP"
            abbrev: "arp.dst.proto_ipv4"
            bits: 32
            value: "10.0.1.10"
            description: "Client's IP"

  # ── TCP 3-Way Handshake ─────────────────────────────────────────
  - id: "tcp_syn"
    name: "TCP SYN"
    description: "Client initiates connection — first segment of 3-way handshake"
    from: "client"
    to: "server"
    via: ["switch"]
    timestamp_ns: 200100000
    total_bytes: 74
    color: "#0f766e"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "00:11:22:33:44:02"
            description: "Server's MAC (resolved via ARP)"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "00:11:22:33:44:01"
            description: "Client's MAC"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
            value_hex: "0x0800"
            description: "IPv4"

      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Version"
            abbrev: "ip.version"
            bits: 4
            value: 4
            description: "IPv4"
          - name: "Header Length"
            abbrev: "ip.hdr_len"
            bits: 4
            value: 5
            description: "5 × 4 = 20 bytes (no IP options)"
          - name: "DSCP"
            abbrev: "ip.dsfield.dscp"
            bits: 6
            value: 0
            description: "Default — no QoS marking"
          - name: "Total Length"
            abbrev: "ip.len"
            bits: 16
            value: 60
            description: "IP header (20) + TCP header with options (40)"
          - name: "Identification"
            abbrev: "ip.id"
            bits: 16
            value: "0xa1b2"
            description: "Unique per datagram, used for fragment reassembly"
          - name: "Flags"
            abbrev: "ip.flags"
            bits: 3
            value: "0x2"
            description: "Don't Fragment (DF) set — TCP uses Path MTU Discovery"
            spec_refs:
              - document: "RFC 1191"
                section: "3"
                title: "Path MTU Discovery"
                url: "https://datatracker.ietf.org/doc/html/rfc1191"
          - name: "TTL"
            abbrev: "ip.ttl"
            bits: 8
            value: 64
            description: "Time To Live — decremented by each router"
          - name: "Protocol"
            abbrev: "ip.proto"
            bits: 8
            value: 6
            description: "TCP (protocol number 6)"
            spec_refs:
              - document: "RFC 791"
                section: "3.1"
                title: "Internet Header Format"
                url: "https://datatracker.ietf.org/doc/html/rfc791#section-3.1"
          - name: "Header Checksum"
            abbrev: "ip.checksum"
            bits: 16
            value: "0x3c7e"
            description: "IP header checksum (covers header only, not payload)"
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "10.0.1.10"
            description: "Client's IP address"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "10.0.1.20"
            description: "Server's IP address"

      - name: "TCP"
        abbrev: "tcp"
        layer: 4
        total_bytes: 40
        fields:
          - name: "Source Port"
            abbrev: "tcp.srcport"
            bits: 16
            value: 49152
            description: "Ephemeral port chosen by kernel (range 49152–65535)"
            spec_refs:
              - document: "RFC 6335"
                section: "6"
                title: "Dynamic/Ephemeral Ports"
                url: "https://datatracker.ietf.org/doc/html/rfc6335#section-6"
            kernel_ref:
              file: "net/ipv4/inet_hashtables.c"
              function: "inet_csk_find_open_port"
              notes: "Selects ephemeral port from ip_local_port_range"
          - name: "Destination Port"
            abbrev: "tcp.dstport"
            bits: 16
            value: 80
            description: "HTTP well-known port"
          - name: "Sequence Number"
            abbrev: "tcp.seq"
            bits: 32
            value: 1000000
            value_hex: "0x000f4240"
            description: "Initial Sequence Number (ISN) — chosen pseudo-randomly by the kernel using SipHash to prevent sequence prediction attacks. This is the client's starting byte counter."
            spec_refs:
              - document: "RFC 9293"
                section: "3.4.1"
                title: "Initial Sequence Number Selection"
                url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.4.1"
            kernel_ref:
              file: "net/ipv4/tcp_ipv4.c"
              function: "secure_tcp_seq"
              notes: "SipHash-based ISN generation using source/dest IP+port and a secret key"
          - name: "Acknowledgment Number"
            abbrev: "tcp.ack"
            bits: 32
            value: 0
            description: "Zero — not yet valid (ACK flag not set in SYN-only segment)"
          - name: "Data Offset"
            abbrev: "tcp.hdr_len"
            bits: 4
            value: 10
            description: "10 × 4 = 40 bytes — TCP header includes 20 bytes of options"
          - name: "Flags"
            abbrev: "tcp.flags"
            bits: 8
            value: "0x02"
            description: "SYN=1 — initiates connection, synchronizes sequence numbers"
            spec_refs:
              - document: "RFC 9293"
                section: "3.6"
                title: "Header Format — Control Bits"
                url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.6"
            fields:
              - name: "SYN"
                abbrev: "tcp.flags.syn"
                bits: 1
                value: 1
                description: "Synchronize sequence numbers — connection request"
              - name: "ACK"
                abbrev: "tcp.flags.ack"
                bits: 1
                value: 0
                description: "No acknowledgment yet"
              - name: "FIN"
                abbrev: "tcp.flags.fin"
                bits: 1
                value: 0
                description: "Not closing"
              - name: "RST"
                abbrev: "tcp.flags.reset"
                bits: 1
                value: 0
                description: "Not resetting"
              - name: "PSH"
                abbrev: "tcp.flags.push"
                bits: 1
                value: 0
                description: "No push"
          - name: "Window Size"
            abbrev: "tcp.window_size"
            bits: 16
            value: 65535
            description: "Receiver's advertised window — how many bytes the client can buffer. Will be scaled by Window Scale option."
            spec_refs:
              - document: "RFC 9293"
                section: "3.8.6"
                title: "Managing the Window"
                url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.8.6"
          - name: "Checksum"
            abbrev: "tcp.checksum"
            bits: 16
