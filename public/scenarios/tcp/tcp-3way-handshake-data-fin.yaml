# ─────────────────────────────────────────────────────────────────
# TIMELINE
# ─────────────────────────────────────────────────────────────────
timeline:
  # ── Phase: Link Establishment ───────────────────────────────────
  - id: "evt_phy_link"
    type: "state_change"
    t_ns: 0
    annotation:
      text: "Physical link up — 10GbE Auto-Negotiation complete on both segments"
      detail: >
        Both 10GbE links (client↔switch and switch↔server) complete IEEE 802.3
        Auto-Negotiation and achieve link synchronization. The switch learns MAC
        addresses as frames arrive — no configuration needed for basic L2 forwarding.
        Unlike enterprise RoCEv2 deployments, this simple TCP scenario uses standard
        Ethernet without PFC or ECN — TCP's own congestion control handles loss recovery.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 1
            state_fields:
              phy_state: "up"
              an_state: "complete"
              speed: "10 Gbps"
              signal_detect: true
          - layer: 2
            state_fields:
              link_state: "up"
      - actor_id: "server"
        layers:
          - layer: 1
            state_fields:
              phy_state: "up"
              an_state: "complete"
              speed: "10 Gbps"
              signal_detect: true
          - layer: 2
            state_fields:
              link_state: "up"

  # ── Phase: ARP Resolution ──────────────────────────────────────
  - id: "evt_arp_req"
    type: "frame_tx"
    t_ns: 200000000
    frame_id: "arp_request"
    annotation:
      text: "ARP Request — Client asks 'Who has 10.0.1.20?'"
      detail: >
        Before the client can send any IP packet to the server, it needs the
        server's MAC address. The kernel checks its ARP cache (neighbor table)
        and finds no entry for 10.0.1.20. It broadcasts an ARP request to all
        hosts on the L2 segment. The switch floods this frame out all ports
        except the source port. In Linux, this is handled by the neighbor
        subsystem (net/core/neighbour.c → arp_solicit).
    state_after:
      - actor_id: "client"
        layers:
          - layer: 3
            state_fields:
              dst_ip: "10.0.1.20"

  - id: "evt_arp_rep"
    type: "frame_tx"
    t_ns: 200050000
    frame_id: "arp_reply"
    annotation:
      text: "ARP Reply — Server responds '10.0.1.20 is at 00:11:22:33:44:02'"
      detail: >
        The server recognizes its own IP in the ARP request and sends a unicast
        ARP reply containing its MAC address. Both sides now update their ARP caches.
        The client can now construct complete Ethernet frames to the server.
        ARP entries are cached with a timeout (Linux default: gc_stale_time = 60s).
    state_after:
      - actor_id: "client"
        layers:
          - layer: 2
            state_fields:
              arp_resolved: true
      - actor_id: "server"
        layers:
          - layer: 2
            state_fields:
              arp_resolved: true
          - layer: 3
            state_fields:
              dst_ip: "10.0.1.10"

  # ── Phase: TCP 3-Way Handshake ──────────────────────────────────
  - id: "evt_tcp_syn"
    type: "frame_tx"
    t_ns: 200100000
    frame_id: "tcp_syn"
    annotation:
      text: "TCP SYN → Client initiates 3-way handshake (connect() system call)"
      detail: >
        The application calls connect(). The kernel allocates a socket, selects an
        ephemeral source port (49152), generates a cryptographically random Initial
        Sequence Number (ISN = 1000000) using SipHash, and sends a SYN segment.

        The SYN carries critical negotiation parameters as TCP options:
        • MSS = 1460 (max payload per segment = Ethernet MTU 1500 − 20 IP − 20 TCP)
        • Window Scale = 7 (effective window = advertised × 2^7 = ~8MB)
        • SACK Permitted (enables selective acknowledgment for loss recovery)
        • Timestamps (enables precise RTT measurement and PAWS protection)

        The client enters SYN_SENT state and starts a retransmission timer.
        If no SYN-ACK arrives, Linux retries with exponential backoff
        (1s, 2s, 4s... controlled by tcp_syn_retries, default 6).
      spec_refs:
        - document: "RFC 9293"
          section: "3.5"
          title: "Establishing a Connection"
          url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.5"
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              app_state: "connecting"
              socket_fd: "fd=4"
          - layer: 5
            state_fields:
              socket_state: "SS_CONNECTING"
              local_port: 49152
              remote_port: 80
          - layer: 4
            state_fields:
              tcp_state: "SYN_SENT"
              seq_num: "1000001"
              ack_num: "—"
              snd_una: "1000000"
              mss: 1460

  - id: "evt_tcp_syn_ack"
    type: "frame_tx"
    t_ns: 200150000
    frame_id: "tcp_syn_ack"
    annotation:
      text: "TCP SYN-ACK ← Server acknowledges SYN, sends its own SYN"
      detail: >
        The server was in LISTEN state (application called listen() earlier). Upon
        receiving the client's SYN, the kernel:
        1. Allocates a new socket (connection request) in the SYN backlog queue
        2. Generates its own ISN (2000000) independently via SipHash
        3. Sends a SYN-ACK: ACK = client_ISN + 1 = 1000001 (acknowledging the SYN)
           and its own SYN with seq = 2000000

        The ACK number (1000001) means: "I've received everything up to byte 1000001.
        Send me that byte next." SYN consumes one sequence number even though it
        carries no data — this is how TCP ensures the handshake is reliably acknowledged.

        Modern Linux uses SYN cookies (net.ipv4.tcp_syncookies) to protect against
        SYN flood attacks — the ISN itself encodes connection parameters, avoiding
        state allocation until the final ACK arrives.
      spec_refs:
        - document: "RFC 9293"
          section: "3.5"
          title: "Establishing a Connection"
          url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.5"
    state_after:
      - actor_id: "server"
        layers:
          - layer: 5
            state_fields:
              socket_state: "SS_CONNECTING"
              remote_port: 49152
          - layer: 4
            state_fields:
              tcp_state: "SYN_RECEIVED"
              seq_num: "2000001"
              ack_num: "1000001"
              snd_una: "2000000"
              mss: 1460

  - id: "evt_tcp_ack_handshake"
    type: "frame_tx"
    t_ns: 200200000
    frame_id: "tcp_ack_handshake"
    annotation:
      text: "TCP ACK → Handshake complete — both sides now ESTABLISHED"
      detail: >
        The client receives the SYN-ACK, validates the ACK number (must be ISN + 1),
        and sends the final ACK with ack = server_ISN + 1 = 2000001. Both sides
        transition to ESTABLISHED.

        At this point, the 3-way handshake has accomplished:
        1. Both sides agreed on initial sequence numbers (ISNs)
        2. Both sides know each other's MSS (1460 bytes)
        3. Both sides negotiated Window Scale (factor 7 → ~8MB effective window)
        4. Both sides agreed to SACK and Timestamps

        The server's accept() call now returns with a new connected socket fd.
        Data can flow in both directions. The first RTT sample is measured from
        the SYN timestamp to the SYN-ACK arrival (~50μs in this LAN scenario).

        Key insight: TCP requires this 1-RTT handshake before any data can flow.
        This is why protocols like QUIC (which combines TLS and transport handshakes)
        were developed — to reduce connection setup latency.
      spec_refs:
        - document: "RFC 9293"
          section: "3.5"
          title: "Establishing a Connection"
          url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.5"
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              app_state: "connected"
          - layer: 5
            state_fields:
              socket_state: "SS_CONNECTED"
          - layer: 4
            state_fields:
              tcp_state: "ESTABLISHED"
              seq_num: "1000001"
              ack_num: "2000001"
              snd_una: "1000001"
              rtt_ms: "~0.05"
      - actor_id: "server"
        layers:
          - layer: 7
            state_fields:
              app_state: "connected"
              socket_fd: "conn_fd=5"
          - layer: 5
            state_fields:
              socket_state: "SS_CONNECTED"
          - layer: 4
            state_fields:
              tcp_state: "ESTABLISHED"
              ack_num: "1000001"
              rtt_ms: "~0.05"

  # ── Phase: TCP Data Transfer ────────────────────────────────────
  - id: "evt_tcp_data_request"
    type: "frame_tx"
    t_ns: 300000000
    frame_id: "tcp_http_request"
    annotation:
      text: "TCP Data → Client sends HTTP GET request (205 bytes)"
      detail: >
        The application calls send() with an HTTP GET request. The kernel's TCP
        stack segments the data (in this case it fits in one segment since
        205 bytes < MSS 1460), sets seq=1000001 (first data byte), adds a
        TCP header with PSH and ACK flags, and hands it to IP for transmission.

        Sequence number tracking:
        • Before: SND.NXT = 1000001, SND.UNA = 1000001
        • After:  SND.NXT = 1000206 (1000001 + 205 bytes sent)
        •         SND.UNA = 1000001 (waiting for server's ACK)

        The PSH (Push) flag tells the receiver's TCP to deliver data to the
        application immediately rather than waiting for more data to fill the
        receive buffer. This is appropriate for request-response protocols
        where latency matters more than throughput.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              app_state: "request sent"
              bytes_sent: 205
          - layer: 4
            state_fields:
              seq_num: "1000206"
              snd_una: "1000001"

  - id: "evt_tcp_data_ack_request"
    type: "frame_tx"
    t_ns: 300050000
    frame_id: "tcp_ack_request"
    annotation:
      text: "TCP ACK ← Server acknowledges HTTP request (ACK 1000206)"
      detail: >
        The server receives the 205-byte segment, validates the sequence number
        (matches expected RCV.NXT = 1000001), copies the data to the socket receive
        buffer, advances RCV.NXT to 1000206, and sends an ACK.

        The ACK number 1000206 means: "I've received all bytes up to (but not
        including) 1000206. Send me byte 1000206 next." This is cumulative
        acknowledgment — a single ACK covers all data up to that point.

        In Linux, the server may delay this ACK by up to 40ms (tcp_delack_min)
        to piggyback it on a data response. Here the server ACKs quickly since
        the application needs time to generate the response.
      spec_refs:
        - document: "RFC 9293"
          section: "3.8.6.2"
          title: "Acknowledgment Generation"
          url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.8.6.2"
    state_after:
      - actor_id: "server"
        layers:
          - layer: 7
            state_fields:
              app_state: "processing request"
              bytes_received: 205
          - layer: 4
            state_fields:
              ack_num: "1000206"
      - actor_id: "client"
        layers:
          - layer: 4
            state_fields:
              snd_una: "1000206"

  - id: "evt_tcp_data_response"
    type: "frame_tx"
    t_ns: 300200000
    frame_id: "tcp_http_response"
    annotation:
      text: "TCP Data ← Server sends HTTP 200 OK response (546 bytes)"
      detail: >
        The server application generates an HTTP 200 OK response with an HTML body
        (434 bytes) plus headers (112 bytes) = 546 bytes total. Since 546 < MSS (1460),
        it fits in a single TCP segment.

        Sequence number tracking (server side):
        • Before: SND.NXT = 2000001, SND.UNA = 2000001
        • After:  SND.NXT = 2000547 (2000001 + 546 bytes sent)
        •         SND.UNA = 2000001 (waiting for client's ACK)

        If the response were larger than MSS (e.g., a 10KB page), TCP would
        segment it into multiple 1460-byte segments. The receiver would ACK them
        cumulatively, and the sender's congestion window (cwnd) would govern
        how many segments can be in flight simultaneously.
    state_after:
      - actor_id: "server"
        layers:
          - layer: 7
            state_fields:
              app_state: "response sent"
              bytes_sent: 546
          - layer: 4
            state_fields:
              seq_num: "2000547"
              snd_una: "2000001"

  - id: "evt_tcp_data_ack_response"
    type: "frame_tx"
    t_ns: 300250000
    frame_id: "tcp_ack_response"
    annotation:
      text: "TCP ACK → Client acknowledges HTTP response (ACK 2000547)"
      detail: >
        The client receives the 546-byte response, validates the sequence number,
        copies data to the receive buffer for the application to read, and sends
        an ACK with ack=2000547.

        The HTTP request/response exchange is now complete. Both sides have
        successfully transferred data:
        • Client → Server: 205 bytes (HTTP GET request)
        • Server → Client: 546 bytes (HTTP 200 response)

        Total bytes on the wire including headers: request segment 271 bytes,
        response segment 612 bytes, plus ACKs and handshake overhead.
        TCP's overhead for this small exchange: ~40% of total bytes were headers.
        For bulk data transfers, this ratio improves dramatically since each
        1460-byte data segment only carries 54 bytes of headers (3.7% overhead).
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              app_state: "response received"
              bytes_received: 546
          - layer: 4
            state_fields:
              ack_num: "2000547"
      - actor_id: "server"
        layers:
          - layer: 4
            state_fields:
              snd_una: "2000547"

  # ── Phase: TCP FIN Teardown ─────────────────────────────────────
  - id: "evt_tcp_fin_client"
    type: "frame_tx"
    t_ns: 400000000
    frame_id: "tcp_fin_client"
    annotation:
      text: "TCP FIN → Client initiates graceful close (close() system call)"
      detail: >
        The application calls close() on the socket. The kernel's TCP stack sends a
        FIN segment, signaling "I have no more data to send." The client transitions
        from ESTABLISHED to FIN_WAIT_1.

        Important: FIN is a half-close — the client can still *receive* data from
        the server. This allows the server to finish sending any remaining data
        before closing its side. Applications can also use shutdown(SHUT_WR) for
        an explicit half-close without fully closing the socket.

        Like SYN, FIN consumes one sequence number (seq=1000206). This ensures
        the FIN itself is reliably acknowledged — if the ACK is lost, the sender
        will retransmit the FIN.
      spec_refs:
        - document: "RFC 9293"
          section: "3.5.1"
          title: "Half-Close"
          url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.5.1"
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              app_state: "closing"
          - layer: 4
            state_fields:
              tcp_state: "FIN_WAIT_1"
              seq_num: "1000207"

  - id: "evt_tcp_ack_fin_client"
    type: "frame_tx"
    t_ns: 400050000
    frame_id: "tcp_ack_fin_client"
    annotation:
      text: "TCP ACK ← Server acknowledges client's FIN"
      detail: >
        The server receives the client's FIN and sends an ACK (ack = 1000207,
        acknowledging the FIN which consumed one sequence number). The server
        enters CLOSE_WAIT — it knows the client is done sending, but the
        server can still send data if needed.

        The client, upon receiving this ACK, transitions from FIN_WAIT_1 to
        FIN_WAIT_2 — waiting for the server's FIN.

        In practice, the server's application reads EOF from the socket
        (recv() returns 0), signaling that the client has closed its end.
        The application then finishes any cleanup and calls close().
    state_after:
      - actor_id: "server"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "CLOSE_WAIT"
              ack_num: "1000207"
      - actor_id: "client"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "FIN_WAIT_2"
              snd_una: "1000207"

  - id: "evt_tcp_fin_server"
    type: "frame_tx"
    t_ns: 400100000
    frame_id: "tcp_fin_server"
    annotation:
      text: "TCP FIN ← Server closes its side"
      detail: >
        The server application calls close(). The kernel sends a FIN
        (seq=2000547 — server's FIN also consumes one sequence number).
        The server transitions from CLOSE_WAIT to LAST_ACK — waiting
        for the client's final acknowledgment before releasing resources.

        Both sides have now sent FIN — the connection is fully closing.
    state_after:
      - actor_id: "server"
        layers:
          - layer: 7
            state_fields:
              app_state: "closed"
          - layer: 4
            state_fields:
              tcp_state: "LAST_ACK"
              seq_num: "2000548"

  - id: "evt_tcp_ack_fin_server"
    type: "frame_tx"
    t_ns: 400150000
    frame_id: "tcp_ack_fin_server"
    annotation:
      text: "TCP ACK → Client acknowledges server's FIN — connection fully closed"
      detail: >
        The client sends the final ACK (ack=2000548, acknowledging the server's FIN).
        The server transitions to CLOSED and frees all connection resources.

        The client transitions to TIME_WAIT — a critical state that lasts for
        2 × MSL (Maximum Segment Lifetime, typically 60s in Linux, configurable
        via tcp_fin_timeout). TIME_WAIT serves two purposes:

        1. Ensures the final ACK reaches the server. If the server doesn't receive
           this ACK, it will retransmit its FIN, and the client (still in TIME_WAIT)
           can re-ACK it.

        2. Prevents old duplicate segments from a previous connection from being
           mistaken for new connection data. By waiting 2×MSL, all segments from
           this connection have expired from the network.

        After TIME_WAIT expires, the client transitions to CLOSED and the
        ephemeral port (49152) becomes available for reuse.

        Summary of TCP state transitions in this scenario:
        • Client: CLOSED → SYN_SENT → ESTABLISHED → FIN_WAIT_1 → FIN_WAIT_2 → TIME_WAIT → CLOSED
        • Server: LISTEN → SYN_RECEIVED → ESTABLISHED → CLOSE_WAIT → LAST_ACK → CLOSED
      spec_refs:
        - document: "RFC 9293"
          section: "3.5.4"
          title: "TIME-WAIT State"
          url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.5.4"
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              app_state: "TIME_WAIT"
          - layer: 5
            state_fields:
              socket_state: "SS_DISCONNECTING"
          - layer: 4
            state_fields:
              tcp_state: "TIME_WAIT"
              ack_num: "2000548"
      - actor_id: "server"
        layers:
          - layer: 7
            state_fields:
              app_state: "closed"
              socket_fd: "closed"
          - layer: 5
            state_fields:
              socket_state: "SS_UNCONNECTED"
          - layer: 4
            state_fields:
              tcp_state: "CLOSED"

  # ── Summary ─────────────────────────────────────────────────────
  - id: "evt_summary"
    type: "annotation"
    t_ns: 500000000
    annotation:
      text: "⟳ Scenario complete — TCP connection lifecycle"
      detail: >
        This scenario demonstrated the complete TCP connection lifecycle:

        1. LINK — 10GbE physical link establishment via Auto-Negotiation
        2. ARP — Address resolution to learn the server's MAC address
        3. 3-WAY HANDSHAKE — SYN → SYN-ACK → ACK with ISN synchronization,
           MSS negotiation, window scale, SACK, and timestamp options
        4. DATA TRANSFER — HTTP GET request (205 bytes) and 200 OK response (546 bytes)
           with sequence number tracking and cumulative acknowledgments
        5. 4-WAY FIN TEARDOWN — FIN → ACK → FIN → ACK with graceful half-close
           and TIME_WAIT to prevent stale segment confusion

        Key concepts illustrated:
        • Sequence numbers track every byte (including SYN/FIN virtual bytes)
        • Cumulative ACKs efficiently acknowledge contiguous data
        • TCP options negotiate capabilities only during the handshake
        • The state machine enforces ordered transitions on both sides
        • TIME_WAIT protects against stale connections

        TCP (RFC 9293, evolved from RFC 793 published in 1981) remains the
        foundation of reliable Internet communication. Understanding this
        handshake is essential for debugging connection failures, analyzing
        performance (SYN retransmits indicate reachability problems, window
        size limits indicate flow control bottlenecks), and appreciating why
        alternative protocols like QUIC and RDMA were developed.

# ─────────────────────────────────────────────────────────────────
# GLOSSARY
# ─────────────────────────────────────────────────────────────────
glossary:
  - term: "3-Way Handshake"
    abbrev: "SYN/SYN-ACK/ACK"
    definition: "TCP's connection establishment procedure: client sends SYN, server responds with SYN-ACK, client completes with ACK. Synchronizes sequence numbers and negotiates options."
    spec_refs:
      - document: "RFC 9293"
        section: "3.5"
        title: "Establishing a Connection"
        url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.5"

  - term: "Initial Sequence Number"
    abbrev: "ISN"
    definition: "The starting sequence number chosen by each side of a TCP connection. Generated pseudo-randomly (SipHash in Linux) to prevent sequence prediction attacks. SYN consumes one sequence number."
    spec_refs:
      - document: "RFC 9293"
        section: "3.4.1"
        title: "Initial Sequence Number Selection"
        url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.4.1"

  - term: "Maximum Segment Size"
    abbrev: "MSS"
    definition: "The largest TCP payload (excluding headers) a host will accept. Negotiated during the handshake via TCP options. Typical value: 1460 bytes = 1500 (Ethernet MTU) − 20 (IP header) − 20 (TCP base header)."
    spec_refs:
      - document: "RFC 9293"
        section: "3.7.1"
        title: "Maximum Segment Size Option"
        url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.7.1"

  - term: "Window Scale"
    abbrev: "WS"
    definition: "TCP option that extends the 16-bit window size field beyond 65535 bytes. Scale factor is negotiated during the handshake. Factor 7 means effective window = advertised × 128."
    spec_refs:
      - document: "RFC 7323"
        section: "2"
        title: "Window Scale Option"
        url: "https://datatracker.ietf.org/doc/html/rfc7323#section-2"

  - term: "Selective Acknowledgment"
    abbrev: "SACK"
    definition: "TCP option allowing the receiver to report non-contiguous blocks of data received. Helps the sender retransmit only the missing segments rather than everything after the loss point."
    spec_refs:
      - document: "RFC 2018"
        section: "2"
        title: "SACK Option"
        url: "https://datatracker.ietf.org/doc/html/rfc2018"

  - term: "TIME_WAIT"
    definition: "TCP state entered by the side that sends the first FIN after receiving the peer's FIN. Lasts 2×MSL (typically 60s in Linux). Ensures final ACK delivery and prevents stale segment reuse."
    spec_refs:
      - document: "RFC 9293"
        section: "3.5.4"
        title: "TIME-WAIT State"
        url: "https://datatracker.ietf.org/doc/html/rfc9293#section-3.5.4"

  - term: "Cumulative Acknowledgment"
    definition: "TCP's ACK mechanism where the acknowledgment number indicates the next expected byte. A single ACK covers all data up to that sequence number, even if multiple segments were received."

  - term: "Congestion Window"
    abbrev: "cwnd"
    definition: "Sender-side limit on the amount of unacknowledged data in flight. Starts at ~10 segments (IW10) and grows via slow start / congestion avoidance algorithms. Independent of the receiver's advertised window."
    spec_refs:
      - document: "RFC 5681"
        section: "3"
        title: "Congestion Control Algorithms"
        url: "https://datatracker.ietf.org/doc/html/rfc5681#section-3"

  - term: "Push Flag"
    abbrev: "PSH"
    definition: "TCP flag that tells the receiver to deliver buffered data to the application immediately rather than waiting for more data. Commonly set on the last segment of a logical message."

  - term: "FIN"
    definition: "TCP flag indicating the sender has finished transmitting data. Initiates a graceful connection close. Like SYN, FIN consumes one sequence number to ensure reliable acknowledgment."
