  # ── Phase 3: IKE_SA_Init Exchange ──────────────────────────────────────────

  - id: "ike_sa_init_request"
    name: "IKE_SA_Init (Host → Array) — ML-KEM-1024 Key Exchange Proposal"
    description: >
      The host sends IKE_SA_Init to begin the IKE Security Association
      establishment. This message carries the SA proposal (AES-256-GCM cipher,
      PRF-HMAC-SHA2-384 pseudorandom function), the ML-KEM-1024 encapsulation
      key (1568 bytes — this is the initiator's public key material for the
      post-quantum key exchange), and a 32-byte initiator nonce.

      This is fundamentally different from classical Diffie-Hellman: instead
      of computing g^a mod p (which is vulnerable to Shor's algorithm on a
      quantum computer), the initiator generates an ML-KEM-1024 key pair and
      sends the encapsulation key. The responder will use this key to
      encapsulate a shared secret, producing a ciphertext that only the
      initiator can decapsulate.

      Simplified for illustration — actual payloads per RFC 7296 and
      FC-SP-3 section 6.2.
    from: "host"
    to: "array"
    via: ["switch"]
    timestamp_ns: 8000
    total_bytes: 1680
    color: "#2980b9"
    headers:
      - name: "IKE_SA_Init Request"
        abbrev: "ike_sa_init_i"
        layer: 4
        fields:
          - name: "Auth_Msg_Code"
            abbrev: "ike_sa_init_i.msg_code"
            bits: 8
            offset_bits: 0
            value: "0x16"
            value_hex: "0x16"
            description: >
              0x16 = IKE_SA_Init (FC-SP-3 Rev 3.10 LB Table 7, codepoint range
              0x16-0x18 reserved for IKE_SA_Init). The first message in the
              SA Establishment exchange. Carries key exchange material and
              SA proposals.
            spec_refs:
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "6.2.4.2"
                title: "IKE_SA_Init message"
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "Table 7"
                title: "Auth_Msg_Code values"
          - name: "IKE Header — SPI_i (Initiator SPI)"
            abbrev: "ike_sa_init_i.spi_i"
            bits: 64
            offset_bits: 8
            value: "0xA1B2C3D4E5F60718"
            description: >
              Security Parameter Index chosen by the initiator. Uniquely identifies
              this IKE_SA from the initiator's perspective. Per RFC 7296 section 2.6.
          - name: "IKE Header — IKE Protocol Version"
            abbrev: "ike_sa_init_i.version"
            bits: 8
            offset_bits: 72
            value: "0x20"
            description: >
              IKE Protocol Version, encoded as a single byte: high nibble = major
              version (2), low nibble = minor version (0). FC-SP-3 Rev 3.10 LB
              Table 49. NOTE: FC-SP-3 omits the IKEv2 "Exchange Type" field that
              RFC 7296 carries — message identification is handled by the outer
              AUTH ELS Auth_Msg_Code field instead.
          - name: "IKE Header — Flags"
            abbrev: "ike_sa_init_i.flags"
            bits: 8
            offset_bits: 88
            value: "Initiator"
            description: >
              Initiator flag set — this endpoint is the IKE initiator.
              Per FC-SP-3 Table 49 the Reserved byte at offset 80 is skipped here.
          - name: "SAi1 Payload — ENCR_AES_GCM_256"
            abbrev: "ike_sa_init_i.sai1_encr"
            bits: 32
            offset_bits: 96
            value: "ENCR_AES_GCM (id=20) / 256-bit key"
            description: >
              Proposed encryption transform for the IKE_SA and Child_SA:
              AES-256-GCM (AEAD). Provides both confidentiality and integrity
              in a single operation. CNSA 2.0 requires AES-256 for symmetric
              encryption — GCM mode is the standard AEAD choice.
            spec_refs:
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "Tables A.59-A.65"
                title: "SA-C5 symmetric algorithm: AES-256-GCM"
          - name: "SAi1 Payload — PRF_HMAC_SHA2_384"
            abbrev: "ike_sa_init_i.sai1_prf"
            bits: 32
            offset_bits: 128
            value: "PRF_HMAC_SHA2_384 (id=7)"
            description: >
              Pseudorandom function for key derivation: HMAC-SHA-384.
              Used to derive SKEYSEED from the ML-KEM shared secret and nonces.
              CNSA 2.0 requires SHA-384 as minimum hash strength.
          - name: "SAi1 Payload — INTEG NONE"
            abbrev: "ike_sa_init_i.sai1_integ"
            bits: 32
            offset_bits: 160
            value: "NONE (id=0)"
            description: >
              Integrity transform: NONE. Required by RFC 7296 §3.3.2 when an
              AEAD encryption transform (here AES-256-GCM) is selected — the
              AEAD provides integrity, so a separate INTEG transform must be
              explicitly absent (encoded as NONE).
          - name: "SAi1 Payload — Key Exchange ML-KEM-1024"
            abbrev: "ike_sa_init_i.sai1_ke"
            bits: 32
            offset_bits: 192
            value: "ML-KEM-1024 (Transform Type 4 id=37 per FC-SP-3 Annex A.62)"
            description: >
              Post-quantum key exchange method: ML-KEM-1024 (FIPS 203).
              This is the core CNSA 2.0 upgrade — ML-KEM replaces classical
              Diffie-Hellman for key establishment. FC-SP-3 Rev 3.10 LB Table A.62
              lists ML-KEM-1024 as Transform Type 4 codepoint 37, marked Required
              for SA-C5. The corresponding IANA assignment for IKEv2 is being
              tracked in draft-ietf-ipsecme-ikev2-mlkem; FC-SP-3 carries the
              Transform-Type-4 value forward from that draft.

              Classical DH (used in the companion DH-CHAP scenario) computes
              g^(ab) mod p. A quantum computer running Shor's algorithm can
              solve the discrete logarithm problem and recover the shared
              secret. ML-KEM is based on the Module Learning With Errors
              (MLWE) lattice problem, for which no efficient quantum
              algorithm is known.
            spec_refs:
              - document: "FIPS 203 (ML-KEM)"
                section: "1"
                title: "ML-KEM key encapsulation"
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "Tables A.59-A.65"
                title: "SA-C5 key exchange: ML-KEM-1024"
          - name: "KEi Payload — ML-KEM-1024 Encapsulation Key (1568 bytes)"
            abbrev: "ike_sa_init_i.kei"
            bits: 12544
            offset_bits: 224
            value: "[1568-byte ML-KEM-1024 encapsulation key (initiator's public key)]"
            description: >
              The initiator's ML-KEM-1024 encapsulation key — 1568 bytes. This
              is the public key portion of the ML-KEM key pair. The responder
              will run ML-KEM.Encaps() using this key to produce:
              (1) a 32-byte shared secret K, and
              (2) a 1568-byte ciphertext ct.

              The ciphertext ct is returned in the responder's KEr payload.
              The initiator runs ML-KEM.Decaps(ct, sk) using its private key
              to recover the same shared secret K.

              Key sizes compared to classical DH:
              - DH Group 4 (2048-bit MODP): 256-byte public value
              - ML-KEM-1024: 1568-byte encapsulation key
              The larger key size is the cost of quantum resistance.
            spec_refs:
              - document: "FIPS 203"
                section: "7.1"
                title: "ML-KEM.KeyGen()"
          - name: "Ni Payload — Initiator Nonce (32 bytes)"
            abbrev: "ike_sa_init_i.ni"
            bits: 256
            offset_bits: 12768
            value: "0x3F8A72C1 D4E56B09 1A2B3C4D 5E6F7081 92A3B4C5 D6E7F809 1B2C3D4E 5F607182"
            description: >
              32-byte random nonce from the initiator. Combined with the
              responder nonce and the ML-KEM shared secret to derive SKEYSEED:
              SKEYSEED = prf(Ni | Nr, shared_secret).
              SKEYSEED is then used to derive all IKE_SA and Child_SA keys.
              Per RFC 7296 section 2.14.
      - name: "FC-2 Frame Header (Routing — always plaintext)"
        abbrev: "fc.hdr"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.hdr.rctl"
            bits: 8
            value: "0x22"
            description: "0x22 = Extended Link Service request"
          - name: "D_ID"
            abbrev: "fc.hdr.did"
            bits: 24
            value: "0x020100"
            description: "Array target port. ALWAYS PLAINTEXT."
          - name: "S_ID"
            abbrev: "fc.hdr.sid"
            bits: 24
            value: "0x010200"
            description: "Host N_Port ID. Always plaintext."
          - name: "CS_CTL"
            abbrev: "fc.hdr.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "TYPE"
            abbrev: "fc.hdr.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
          - name: "F_CTL"
            abbrev: "fc.hdr.fctl"
            bits: 24
            value: "0x290000"
            description: "Frame Control — exchange originator, first+last sequence"
          - name: "SEQ_ID"
            abbrev: "fc.hdr.seqid"
            bits: 8
            value: "0x02"
            description: "Sequence ID within this exchange"
          - name: "DF_CTL"
            abbrev: "fc.hdr.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.hdr.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc.hdr.oxid"
            bits: 16
            value: "0x0011"
            description: "Originator Exchange ID — IKE_SA_Init exchange"
          - name: "RX_ID"
            abbrev: "fc.hdr.rxid"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID — not yet assigned"
          - name: "Parameter"
            abbrev: "fc.hdr.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for ELS frames"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

  - id: "ike_sa_init_response"
    name: "IKE_SA_Init (Array → Host) — ML-KEM-1024 Ciphertext + CERTREQ"
    description: >
      The array responds with IKE_SA_Init, carrying its selected crypto suite,
      the ML-KEM-1024 ciphertext (the encapsulated shared secret — 1568 bytes),
      its nonce, a CERTREQ payload requesting the initiator's certificate, and
      a Notify payload advertising ML-DSA-87 as the supported authentication method.

      After this exchange, both sides derive SKEYSEED from the ML-KEM shared
      secret plus nonces. All subsequent IKE messages (IKE_Auth) are encrypted
      under the IKE_SA — an eavesdropper cannot read the certificates or
      authentication payloads exchanged in the next phase.

      Simplified for illustration — actual payloads per RFC 7296 and
      FC-SP-3 section 6.2.
    from: "array"
    to: "host"
    via: ["switch"]
    timestamp_ns: 12000
    total_bytes: 1720
    color: "#27ae60"
    headers:
      - name: "IKE_SA_Init Response"
        abbrev: "ike_sa_init_r"
        layer: 4
        fields:
          - name: "Auth_Msg_Code"
            abbrev: "ike_sa_init_r.msg_code"
            bits: 8
            offset_bits: 0
            value: "0x16"
            value_hex: "0x16"
            description: >
              0x16 = IKE_SA_Init (FC-SP-3 Rev 3.10 LB Table 7). Same message
              code for both directions — the IKE Flags field distinguishes
              initiator from responder.
          - name: "IKE Header — SPI_r (Responder SPI)"
            abbrev: "ike_sa_init_r.spi_r"
            bits: 64
            offset_bits: 8
            value: "0x92F3A4B5C6D7E801"
            description: >
              Security Parameter Index chosen by the responder. Together with
              SPI_i, uniquely identifies this IKE_SA. Per RFC 7296 section 2.6.
          - name: "IKE Header — Flags"
            abbrev: "ike_sa_init_r.flags"
            bits: 8
            offset_bits: 72
            value: "Responder"
            description: "Responder flag set — this endpoint is the IKE responder."
          - name: "SAr1 Payload — Selected Crypto Suite"
            abbrev: "ike_sa_init_r.sar1"
            bits: 128
            offset_bits: 80
            value: "ENCR_AES_GCM_256, PRF_HMAC_SHA2_384, INTEG=NONE, ML-KEM-1024"
            description: >
              The responder selects exactly one transform from each proposal:
              AES-256-GCM for encryption, PRF-HMAC-SHA2-384 for key derivation,
              INTEG=NONE (required when AEAD is used per RFC 7296 §3.3.2), and
              ML-KEM-1024 for key exchange. All CNSA 2.0 compliant. Encoded as
              four 32-bit transform substructures (128 bits total).
          - name: "KEr Payload — ML-KEM-1024 Ciphertext (1568 bytes)"
            abbrev: "ike_sa_init_r.ker"
            bits: 12544
            offset_bits: 208
            value: "[1568-byte ML-KEM-1024 ciphertext (encapsulated shared secret)]"
            description: >
              The ML-KEM-1024 ciphertext produced by ML-KEM.Encaps(ek_i).
              The responder ran Encaps() using the initiator's encapsulation key
              from KEi, producing: (1) a 32-byte shared secret K, and (2) this
              1568-byte ciphertext ct.

              The responder keeps K. The initiator will run ML-KEM.Decaps(ct, sk)
              using its private decapsulation key to recover the same K.

              An eavesdropper who captures both the encapsulation key and
              the ciphertext CANNOT recover K — this is the IND-CCA2 security
              guarantee of ML-KEM, which holds against both classical and
              quantum adversaries.

              Compare with classical DH: an eavesdropper captures g^a and g^b.
              A quantum computer running Shor's algorithm can compute the discrete
              log and recover g^(ab) = K. ML-KEM has no such vulnerability.
            spec_refs:
              - document: "FIPS 203"
                section: "7.2"
                title: "ML-KEM.Encaps()"
          - name: "Nr Payload — Responder Nonce (32 bytes)"
            abbrev: "ike_sa_init_r.nr"
            bits: 256
            offset_bits: 12752
            value: "0x7C4D5E6F 80912A3B 4C5D6E7F 8091A2B3 C4D5E6F7 08192A3B 4C5D6E7F 80A1B2C3"
            description: >
              32-byte random nonce from the responder. Combined with
              the initiator nonce and the ML-KEM shared secret to derive
              SKEYSEED = prf(Ni | Nr, K). Per RFC 7296 section 2.14.
          - name: "CERTREQ Payload — Certificate Request"
            abbrev: "ike_sa_init_r.certreq"
            bits: 384
            offset_bits: 13008
            value: "[SHA-384 hash(es) of trusted CA public key(s)]"
            description: >
              The responder requests the initiator's certificate by sending
              SHA-384 hashes of trusted Certificate Authority public keys.
              The initiator must present a certificate chain rooted in one
              of these CAs during IKE_Auth. This is how the certificate-based
              trust model works — both sides must have certificates signed by
              a mutually trusted CA.

              Compare with DH-CHAP: instead of CA hashes, DH-CHAP uses
              pre-shared secrets that must be manually distributed to every
              port pair. For N ports, DH-CHAP requires N*(N-1)/2 shared
              secrets; the certificate model requires N certificates from one CA.
            spec_refs:
              - document: "RFC 7296"
                section: "3.7"
                title: "Certificate Request Payload"
          - name: "Notify — SUPPORTED_AUTH_METHODS (ML-DSA-87)"
            abbrev: "ike_sa_init_r.notify_auth"
            bits: 64
            offset_bits: 13392
            value: "ML-DSA-87 (Digital Signature)"
            description: >
              Notify payload advertising ML-DSA-87 (FIPS 204) as the
              supported authentication method. ML-DSA-87 is the CNSA 2.0
              digital signature algorithm — a lattice-based replacement for
              ECDSA and RSA signatures. Security category 5 (equivalent to
              256-bit classical security).

              ML-DSA-87 signature sizes: 4627 bytes (vs. 64 bytes for ECDSA P-384).
              The larger signature is the cost of quantum resistance. Public key
              size: 2592 bytes.
            spec_refs:
              - document: "FIPS 204 (ML-DSA)"
                section: "1"
                title: "ML-DSA digital signature algorithm"
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "Tables A.59-A.65"
                title: "SA-C5 signature algorithm: ML-DSA-87"
      - name: "FC-2 Frame Header (Routing — always plaintext)"
        abbrev: "fc2"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc2.rctl"
            bits: 8
            value: "0x23"
            description: "0x23 = Extended Link Service reply"
          - name: "D_ID"
            abbrev: "fc2.did"
            bits: 24
            value: "0x010200"
            description: "Destination — host HBA port. ALWAYS PLAINTEXT."
          - name: "CS_CTL"
            abbrev: "fc2.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc2.sid"
            bits: 24
            value: "0x020100"
            description: "Source — array target port. Always plaintext."
          - name: "TYPE"
            abbrev: "fc2.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
          - name: "F_CTL"
            abbrev: "fc2.fctl"
            bits: 24
            value: "0x980000"
            description: "Frame Control — exchange responder, first+last sequence"
          - name: "SEQ_ID"
            abbrev: "fc2.seqid"
            bits: 8
            value: "0x03"
            description: "Sequence ID within this exchange"
          - name: "DF_CTL"
            abbrev: "fc2.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc2.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc2.oxid"
            bits: 16
            value: "0x0011"
            description: "Originator Exchange ID — same IKE_SA_Init exchange"
          - name: "RX_ID"
            abbrev: "fc2.rxid"
            bits: 16
            value: "0x0011"
            description: "Responder Exchange ID"
          - name: "Parameter"
            abbrev: "fc2.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

  # ── Phase 4: IKE_Auth Exchange (encrypted under IKE_SA) ────────────────────

  - id: "ike_auth_request"
    name: "IKE_Auth (Host → Array) — ML-DSA-87 Certificate + Child_SA Proposal"
    description: >
      The host sends IKE_Auth, encrypted under the IKE_SA established by
      IKE_SA_Init. This message carries the host's identity (WWN), its
      ML-DSA-87 certificate chain (leaf certificate + CA root), a CERTREQ
      for the responder's certificate, an AUTH payload containing the
      ML-DSA-87 digital signature proving the host's identity, and a
      Child_SA proposal for ESP-encrypted FC frame transport.

      Everything inside the SK{} envelope is encrypted with AES-256-GCM
      under the IKE_SA — an eavesdropper cannot read the certificates,
      identities, or authentication payloads.

      The AUTH payload contains a Digital Signature (Auth_Method=14 per
      RFC 7296 section 3.8) computed with the host's ML-DSA-87 private
      key over InitiatorSignedOctets (RFC 7296 §2.15 — see AUTH field
      below for the construction). The responder verifies this signature
      using the host's public key from the certificate.

      ABSTRACTION NOTE — FC-2 FRAGMENTATION: This view is the *logical*
      IKE_Auth message (~8192 bytes). FC-2 caps a single frame's data field
      at 2112 bytes, so on the wire this message is carried as a multi-frame
      sequence (4 FC frames at this payload size). The first frame has
      F_CTL bit "First Sequence" set; intermediate frames have neither
      First nor End set; the last frame has "End Sequence" set; SEQ_CNT
      increments 0,1,2,3 across the sequence; OX_ID/RX_ID/SEQ_ID stay
      constant. The header fields shown below are the FIRST frame of the
      sequence — middle and last frames are omitted for clarity.

      Simplified for illustration — actual payloads per RFC 7296 and
      FC-SP-3 section 6.2.
    from: "host"
    to: "array"
    via: ["switch"]
    timestamp_ns: 16000
    total_bytes: 8192
    fragmentation_note: "Logical message; carried as a 4-frame FC-2 sequence on the wire."
    color: "#8e44ad"
    headers:
      - name: "IKE_Auth Request (Encrypted — inside SK{} envelope)"
        abbrev: "ike_auth_i"
        layer: 4
        fields:
          - name: "Auth_Msg_Code"
            abbrev: "ike_auth_i.msg_code"
            bits: 8
            offset_bits: 0
            value: "0x22"
            value_hex: "0x22"
            description: >
              0x22 = IKE_Auth (FC-SP-3 Rev 3.10 LB Table 7). The second message
              in the SA Establishment exchange. Carries identity, certificates,
              authentication, and Child_SA proposal — all encrypted.
            spec_refs:
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "6.2.4.3"
                title: "IKE_Auth message"
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "Table 7"
                title: "Auth_Msg_Code values"
          - name: "SK{} Encryption Envelope"
            abbrev: "ike_auth_i.sk_envelope"
            bits: 0
            offset_bits: 8
            value: "AES-256-GCM encrypted — all following payloads are inside SK{}"
            description: >
              SK{} indicates that all subsequent payloads are encrypted and
              integrity-protected using the IKE_SA keys derived from SKEYSEED.
              An eavesdropper sees only ciphertext from this point forward.
              The switch passes the frame based on the FC header — it cannot
              read any IKE_Auth payload content.
          - name: "IDi — Initiator Identity (Host WWN)"
            abbrev: "ike_auth_i.idi"
            bits: 64
            offset_bits: 8
            value: "10:00:00:10:9B:C7:2A:01 (Name_Identifier, NAA=5)"
            description: >
              The initiator's identity: the host HBA's World Wide Port Name
              encoded as a Name_Identifier with NAA=5 format. The responder
              uses this to locate the correct certificate for verification.
              Per FC-SP-3 section 6.2.5.8.
          - name: "CERT — Leaf Certificate (ML-DSA-87 signed)"
            abbrev: "ike_auth_i.cert_leaf"
            bits: 0
            offset_bits: 72
            value: "[X.509 certificate: Subject=host WWN, Algorithm=ML-DSA-87, signed by Org CA]"
            description: >
              The host's device certificate. Key fields:
              - Subject: host WWN (10:00:00:10:9B:C7:2A:01)
              - Public Key Algorithm: ML-DSA-87 (OID 2.16.840.1.101.3.4.3.18)
              - Public Key: 2592-byte ML-DSA-87 public key
              - Signature Algorithm: ML-DSA-87 (signed by issuing CA)
              - Issuer: Organization's Certificate Authority

              The responder verifies the certificate chain: leaf cert is signed
              by the CA whose root cert the responder already trusts. If the
              chain validates, the responder trusts the host's public key
              and can verify the AUTH signature below.
            spec_refs:
              - document: "FIPS 204 (ML-DSA)"
                section: "3"
                title: "ML-DSA key pair and certificate encoding"
          - name: "CERT — CA Root Certificate"
            abbrev: "ike_auth_i.cert_ca"
            bits: 0
            offset_bits: 72
            value: "[X.509 CA root certificate: ML-DSA-87 self-signed]"
            description: >
              The Certificate Authority root certificate. Self-signed with
              ML-DSA-87. Both endpoints must trust this CA for mutual
              authentication to succeed. In an enterprise deployment,
              this CA is typically managed by the security team and its
              root certificate is pre-installed on all FC endpoints.
          - name: "CERTREQ — Certificate Request"
            abbrev: "ike_auth_i.certreq"
            bits: 0
            offset_bits: 72
            value: "[SHA-384 hash(es) of trusted CA public key(s)]"
            description: >
              The initiator requests the responder's certificate, mirroring
              the CERTREQ from the IKE_SA_Init response.
          - name: "AUTH — Digital Signature (ML-DSA-87)"
            abbrev: "ike_auth_i.auth"
            bits: 0
            offset_bits: 72
            value: "[4627-byte ML-DSA-87 signature over InitiatorSignedOctets]"
            description: >
              Digital Signature authentication (Auth_Method=14 per RFC 7296
              section 3.8). The host signs InitiatorSignedOctets with its
              ML-DSA-87 private key. Per RFC 7296 §2.15, InitiatorSignedOctets
              is constructed as:
                  RealMessage1 | NonceRData | prf(SK_pi, IDi)
              where RealMessage1 is the initiator's full IKE_SA_Init message
              (header + payloads), NonceRData is the responder's nonce, and
              prf(SK_pi, IDi) is the keyed PRF over the initiator's identity
              payload. The responder constructs ResponderSignedOctets symmetrically
              and signs that. The peer verifies the signature using the public
              key from the certificate in the CERT payload.

              If verification succeeds, the responder knows:
              1. The host holds the private key corresponding to the certificate
              2. The host generated the IKE_SA_Init message (not a replay)
              3. The certificate chain is valid back to a trusted CA

              ML-DSA-87 signature: 4627 bytes (vs. 64 bytes for ECDSA P-384).
              The larger signature is the cost of quantum resistance. A quantum
              computer cannot forge an ML-DSA-87 signature (no efficient quantum
              algorithm for the MLWE/SIS problem).
            spec_refs:
              - document: "RFC 7296"
                section: "3.8"
                title: "Authentication Payload — Digital Signature"
              - document: "FIPS 204"
                section: "6"
                title: "ML-DSA.Sign()"
          - name: "SAi2 — Child_SA Proposal"
            abbrev: "ike_auth_i.sai2"
            bits: 0
            offset_bits: 72
            value: "ESP_Header with AES-256-GCM-ODP (Offloaded Data Path)"
            description: >
              Child_SA proposal for encrypted FC frame transport. The Child_SA
              defines how FC frames will be encrypted after IKE_Auth completes:
              - Protocol: ESP (Encapsulating Security Payload)
              - Transform: AES-256-GCM
              - Mode: Transport (FC frame header plaintext, payload encrypted)

              AES-GCM-ODP indicates the encryption is offloaded to the HBA ASIC
              (Offloaded Data Path) — zero CPU involvement for frame encryption.
            spec_refs:
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "6.2.5.12"
                title: "Child_SA negotiation"
          - name: "TSi / TSr — Traffic Selectors"
            abbrev: "ike_auth_i.ts"
            bits: 0
            offset_bits: 72
            value: "Default: all traffic between these two N_Ports"
            description: >
              Traffic selectors define which FC frames are covered by the
              Child_SA. Default selectors per FC-SP-3 section 6.2.5.12.2
              cover ALL traffic between the two N_Port endpoints — regardless
              of FC-4 protocol (FCP, NVMe/FC, ELS) or application workload.
              No per-application configuration needed.
      - name: "FC-2 Frame Header (Routing — always plaintext)"
        abbrev: "fc.hdr"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.hdr.rctl"
            bits: 8
            value: "0x22"
            description: "0x22 = Extended Link Service request"
          - name: "D_ID"
            abbrev: "fc.hdr.did"
            bits: 24
            value: "0x020100"
            description: "Array target port. ALWAYS PLAINTEXT."
          - name: "S_ID"
            abbrev: "fc.hdr.sid"
            bits: 24
            value: "0x010200"
            description: "Host N_Port ID. Always plaintext."
          - name: "CS_CTL"
            abbrev: "fc.hdr.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "TYPE"
            abbrev: "fc.hdr.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
          - name: "F_CTL"
            abbrev: "fc.hdr.fctl"
            bits: 24
            value: "0x210000 (first frame of sequence)"
            description: >
              Frame Control of the FIRST frame in a multi-frame sequence:
              Exchange Originator + First Sequence set, End Sequence NOT set.
              Middle frames use 0x200000 (neither bit), and the last frame
              uses 0x280000 (End Sequence) with Sequence Initiative transferred.
              The 0x290000 value used in single-frame ELS exchanges (first+last
              in one frame) does NOT apply here — IKE_Auth exceeds the 2112-byte
              FC-2 payload limit and must be fragmented.
          - name: "SEQ_ID"
            abbrev: "fc.hdr.seqid"
            bits: 8
            value: "0x04"
            description: "Sequence ID within this exchange — constant across all 4 frames of the sequence"
          - name: "DF_CTL"
            abbrev: "fc.hdr.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.hdr.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — 0 for the first frame; increments to 1, 2, 3 across the 4-frame sequence carrying the ~8192-byte IKE_Auth message"
          - name: "OX_ID"
            abbrev: "fc.hdr.oxid"
            bits: 16
            value: "0x0012"
            description: "Originator Exchange ID — IKE_Auth exchange (same OX_ID for every frame in the sequence)"
          - name: "RX_ID"
            abbrev: "fc.hdr.rxid"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID — not yet assigned"
          - name: "Parameter"
            abbrev: "fc.hdr.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for ELS frames"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

  - id: "ike_auth_response"
    name: "IKE_Auth (Array → Host) — Array Certificate + Child_SA Accepted"
    description: >
      The array responds with IKE_Auth, also encrypted under the IKE_SA.
      This message carries the array's identity (WWN), its ML-DSA-87
      certificate chain, an AUTH payload with the array's digital signature,
      and the accepted Child_SA parameters.

      Both identities are now verified via ML-DSA-87 certificate chains.
      The IKE_SA and Child_SA are established. From this point forward,
      all FC frames between these two N_Ports are encrypted with
      AES-256-GCM under the ESP_Header.

      ABSTRACTION NOTE — FC-2 FRAGMENTATION: As with the request, this is
      the logical IKE_Auth message (~8192 bytes) carried on the wire as a
      multi-frame FC-2 sequence (4 frames). The header fields below are
      the FIRST frame of the sequence; SEQ_CNT increments across frames.

      Simplified for illustration — actual payloads per RFC 7296 and
      FC-SP-3 section 6.2.
    from: "array"
    to: "host"
    via: ["switch"]
    timestamp_ns: 21000
    total_bytes: 8192
    fragmentation_note: "Logical message; carried as a 4-frame FC-2 sequence on the wire."
    color: "#27ae60"
    headers:
      - name: "IKE_Auth Response (Encrypted — inside SK{} envelope)"
        abbrev: "ike_auth_r"
        layer: 4
        fields:
          - name: "Auth_Msg_Code"
            abbrev: "ike_auth_r.msg_code"
            bits: 8
            offset_bits: 0
            value: "0x22"
            value_hex: "0x22"
            description: >
              0x22 = IKE_Auth (FC-SP-3 Rev 3.10 LB Table 7). Same message code
              for both directions — the IKE Flags field distinguishes initiator
              from responder.
          - name: "SK{} Encryption Envelope"
            abbrev: "ike_auth_r.sk_envelope"
            bits: 0
            offset_bits: 8
            value: "AES-256-GCM encrypted — all payloads inside SK{}"
            description: "All payloads encrypted and integrity-protected under IKE_SA keys."
          - name: "IDr — Responder Identity (Array WWN)"
            abbrev: "ike_auth_r.idr"
            bits: 64
            offset_bits: 8
            value: "50:00:11:0A:CB:3F:44:01 (Name_Identifier, NAA=5)"
            description: >
              The responder's identity: the array target port's World Wide Port Name.
              The initiator uses this to locate the correct certificate for verification.
          - name: "CERT — Array Leaf Certificate (ML-DSA-87 signed)"
            abbrev: "ike_auth_r.cert_leaf"
            bits: 0
            offset_bits: 72
            value: "[X.509 certificate: Subject=array WWN, Algorithm=ML-DSA-87, signed by Org CA]"
            description: >
              The array's device certificate. Same structure as the host certificate:
              - Subject: array WWN (50:00:11:0A:CB:3F:44:01)
              - Public Key Algorithm: ML-DSA-87
              - Issuer: same Organization CA trusted by both endpoints

              The initiator verifies the certificate chain back to the trusted CA root.
          - name: "CERT — CA Root Certificate"
            abbrev: "ike_auth_r.cert_ca"
            bits: 0
            offset_bits: 72
            value: "[X.509 CA root certificate — same CA as initiator's chain]"
            description: >
              The CA root certificate. In a well-managed enterprise, this is the
              same CA that signed the host's certificate. Both endpoints trust
              this CA, enabling mutual authentication without pre-shared secrets.
          - name: "AUTH — Digital Signature (ML-DSA-87)"
            abbrev: "ike_auth_r.auth"
            bits: 0
            offset_bits: 72
            value: "[4627-byte ML-DSA-87 signature over ResponderSignedOctets]"
            description: >
              The array's ML-DSA-87 digital signature over its IKE_SA_Init
              response message. The initiator verifies this signature using the
              array's public key from the certificate.

              After successful verification, mutual authentication is complete:
              - The host has verified the array's identity via ML-DSA-87 certificate
              - The array has verified the host's identity via ML-DSA-87 certificate
              - Neither side needed a pre-shared secret
              - Both signatures are quantum-resistant
            spec_refs:
              - document: "FIPS 204"
                section: "7"
                title: "ML-DSA.Verify()"
          - name: "SAr2 — Accepted Child_SA"
            abbrev: "ike_auth_r.sar2"
            bits: 0
            offset_bits: 72
            value: "ESP_Header with AES-256-GCM — SA_ID=0x4F12A37B assigned"
            description: >
              Child_SA accepted. SA_ID=0x4F12A37B will appear in every ESP_Header
              on encrypted FC frames. Both HBA ASICs load the Child_SA
              session key derived from SKEYSEED. Encryption is now active.
          - name: "TSi / TSr — Accepted Traffic Selectors"
            abbrev: "ike_auth_r.ts"
            bits: 0
            offset_bits: 72
            value: "All traffic between host (0x010200) and array (0x020100)"
            description: >
              Traffic selectors accepted. ALL FC frames between these two
              N_Ports are covered — FCP, NVMe/FC, ELS, everything. No
              per-application configuration.
      - name: "FC-2 Frame Header (Routing — always plaintext)"
        abbrev: "fc2"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc2.rctl"
            bits: 8
            value: "0x23"
            description: "0x23 = Extended Link Service reply"
          - name: "D_ID"
            abbrev: "fc2.did"
            bits: 24
            value: "0x010200"
            description: "Destination — host HBA port. ALWAYS PLAINTEXT."
          - name: "CS_CTL"
            abbrev: "fc2.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc2.sid"
            bits: 24
            value: "0x020100"
            description: "Source — array target port. Always plaintext."
          - name: "TYPE"
            abbrev: "fc2.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
          - name: "F_CTL"
            abbrev: "fc2.fctl"
            bits: 24
            value: "0x900000 (first frame of sequence)"
            description: >
              Frame Control of the FIRST frame of the responder's multi-frame
              sequence: Exchange Responder + First Sequence set. Middle frames
              use 0x800000; the last frame uses 0x980000 (Exchange Responder +
              End Sequence + Sequence Initiative transferred). The 0x980000
              value previously shown applies only to the LAST frame of the
              sequence, not every frame.
          - name: "SEQ_ID"
            abbrev: "fc2.seqid"
            bits: 8
            value: "0x05"
            description: "Sequence ID within this exchange — constant across all 4 frames of the sequence"
          - name: "DF_CTL"
            abbrev: "fc2.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc2.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — 0 for the first frame; increments to 1, 2, 3 across the 4-frame sequence"
          - name: "OX_ID"
            abbrev: "fc2.oxid"
            bits: 16
            value: "0x0012"
            description: "Originator Exchange ID — same IKE_Auth exchange (same OX_ID for every frame in the sequence)"
          - name: "RX_ID"
            abbrev: "fc2.rxid"
            bits: 16
            value: "0x0012"
            description: "Responder Exchange ID"
          - name: "Parameter"
            abbrev: "fc2.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

  # ── Phase 5: Encrypted I/O ─────────────────────────────────────────────────

  - id: "prli_encrypted"
    name: "PRLI — First Encrypted Frame (NVMe or FCP)"
    description: >
      Process Login (PRLI) is the first encrypted frame on this link. PRLI
      establishes the FC-4 process association (NVMe type 0x28 or FCP type 0x08).
      The FC header remains plaintext — the switch reads D_ID and routes normally.
      After the FC header, the ESP_Header carries SA_ID=0x4F12A37B (from the Child_SA
      established in IKE_Auth), sequence number 1, and a unique IV. The PRLI
      payload is AES-256-GCM ciphertext.
    from: "host"
    to: "array"
    via: ["switch"]
    timestamp_ns: 23000
    total_bytes: 96
    color: "#8e44ad"
    headers:
      - name: "FC Frame Header (PLAINTEXT)"
        abbrev: "fc.prli.hdr"
        layer: 2
        fields:
          - name: "R_CTL"
            abbrev: "fc.prli.rctl"
            bits: 8
            value: "0x22"
            description: "0x22 = Extended Link Service request — PRLI"
          - name: "D_ID"
            abbrev: "fc.prli.did"
            bits: 24
            value: "0x020100"
            description: "Array target port. Switch routes here. Always plaintext."
          - name: "CS_CTL"
            abbrev: "fc.prli.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc.prli.sid"
            bits: 24
            value: "0x010200"
            description: "Host N_Port ID. Always plaintext."
          - name: "TYPE"
            abbrev: "fc.prli.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
          - name: "F_CTL"
            abbrev: "fc.prli.fctl"
            bits: 24
            value: "0x290000"
            description: "Frame Control — exchange originator, first+last sequence"
          - name: "OX_ID"
            abbrev: "fc.prli.oxid"
            bits: 16
            value: "0x0013"
            description: "Originator Exchange ID — PRLI exchange"
          - name: "RX_ID"
            abbrev: "fc.prli.rxid"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID — not yet assigned"
      - name: "ESP_Header (FC-SP-3)"
        abbrev: "esp.prli"
        layer: 2
        fields:
          - name: "SA_ID"
            abbrev: "esp.prli.said"
            bits: 32
            value: "0x4F12A37B"
            description: >
              SA_ID = 0x4F12A37B — a randomly chosen 32-bit SPI for the Child_SA established by IKE_Auth (per RFC 7296 §2.6, SPIs are randomly chosen by the responder). This value
              appears in every encrypted frame for the lifetime of this SA.
              The receiving endpoint uses SA_ID to look up the session key.
          - name: "Sequence_Number"
            abbrev: "esp.prli.seq"
            bits: 32
            value: 1
            description: >
              Anti-replay sequence number = 1. This is the very first encrypted
              frame on this link. The counter increments monotonically. If a
              frame arrives with a sequence number outside the anti-replay
              window, it is silently dropped.
          - name: "IV (Initialization Vector)"
            abbrev: "esp.prli.iv"
            bits: 96
