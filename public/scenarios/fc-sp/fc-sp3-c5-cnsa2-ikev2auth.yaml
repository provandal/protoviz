frames:
  # ── Phase 1: Fabric Login (abbreviated) ─────────────────────────────────────

  - id: "fabric_login_context"
    name: "Context: Physical Link Up + FLOGI + PLOGI Complete"
    description: >
      Physical link is up at 64GFC. FLOGI (Fabric Login) and PLOGI (N_Port Login)
      have already completed — see the FC Fabric: FLOGI -> PLOGI -> PRLI -> SCSI I/O
      scenario for those exchanges. Both endpoints have exchanged N_Port IDs,
      WWNs, and service parameters. The connection is logically established
      but NOT yet authenticated and NOT yet encrypted.

      FC-SP-3 IKEv2-AUTH authentication runs AFTER PLOGI and BEFORE PRLI.
      The host detects that the target advertises FC-SP-3 IKEv2-AUTH capability
      in its PLOGI ACC service parameters and initiates the AUTH_Negotiate exchange.

      Key difference from the DH-CHAP scenario: the host will propose IKEv2-AUTH
      (Authentication Protocol Identifier 0x00000005, FC-SP-3 Table 8) instead of DH-CHAP (0x00000001). No shared
      secrets have been pre-provisioned — trust will be established through
      ML-DSA-87 certificate chains.
    from: "host"
    to: "array"
    via: ["switch"]
    timestamp_ns: 0
    total_bytes: 0
    color: "#95a5a6"
    headers:
      - name: "Post-PLOGI State (Context Frame)"
        abbrev: "ctx"
        layer: 4
        fields:
          - name: "FC-SP-3 Capability"
            abbrev: "ctx.fcsp3"
            bits: 0
            value: "Both endpoints: FC-SP-3 capable, IKEv2-AUTH supported (PLOGI ACC)"
            description: >
              During PLOGI, both host and array included FC-SP-3 capability bits
              in the Common Service Parameters. Both endpoints support IKEv2-AUTH
              as an authentication protocol, enabling the SA-C5 profile. The host
              detects this match and will initiate AUTH_Negotiate with IKEv2-AUTH
              as the proposed protocol. No shared secrets are needed — both
              endpoints hold ML-DSA-87 device certificates issued by the
              organization's Certificate Authority.
            spec_refs:
              - document: "FC-LS-3 (FC Login)"
                section: "4.2.7"
                title: "Common Service Parameters — Security bit"
          - name: "Host WWN"
            abbrev: "ctx.host_wwn"
            bits: 64
            value: "10:00:00:10:9B:C7:2A:01"
            description: "Host HBA World Wide Port Name — will be the authentication initiator identity"
          - name: "Array WWN"
            abbrev: "ctx.array_wwn"
            bits: 64
            value: "50:00:11:0A:CB:3F:44:01"
            description: "Array target port World Wide Port Name — will be the authentication responder identity"
          - name: "Host N_Port ID"
            abbrev: "ctx.host_nport"
            bits: 24
            value: "0x010200"
            description: "Host N_Port ID assigned by FLOGI — will be S_ID in host-originated frames"
          - name: "Array N_Port ID"
            abbrev: "ctx.array_nport"
            bits: 24
            value: "0x020100"
            description: "Array N_Port ID assigned by FLOGI — will be S_ID in array-originated frames"
      - name: "FC-2 Frame Header (Reference)"
        abbrev: "fc2"
        layer: 2
        total_bytes: 24
        fields:
          - name: "D_ID"
            abbrev: "fc2.did"
            bits: 24
            value: "0x020100"
            description: "Array target port N_Port ID. ALWAYS PLAINTEXT — the switch routes on this field."
          - name: "S_ID"
            abbrev: "fc2.sid"
            bits: 24
            value: "0x010200"
            description: "Host N_Port ID. Always plaintext."
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

  # ── Phase 2: AUTH_Negotiate — IKEv2-AUTH Protocol Selection ────────────────

  - id: "auth_negotiate"
    name: "AUTH_Negotiate — Propose IKEv2-AUTH (SA-C5 Profile)"
    description: >
      The host sends AUTH_Negotiate as an FC Extended Link Service (ELS).
      This is where SA-C5 diverges fundamentally from the DH-CHAP scenario:
      the host proposes IKEv2-AUTH (Authentication Protocol Identifier 0x00000005, FC-SP-3 Table 8) instead
      of DH-CHAP (0x00000001). The IKEv2-AUTH Protocol Parameters (per Table 96)
      specify the SA-C5 profile identifier 0x00000004 (CNSA 2.0).

      The Concatenation bit is 0 — IKEv2-AUTH replaces authentication entirely.
      There is no DH-CHAP exchange at all. Authentication will be performed
      via ML-DSA-87 certificates within the IKE_Auth exchange, and key
      establishment will use ML-KEM-1024 within IKE_SA_Init. No shared
      secrets are needed at any point in this flow.
    from: "host"
    to: "array"
    via: ["switch"]
    timestamp_ns: 1000
    total_bytes: 128
    color: "#e67e22"
    headers:
      - name: "FC Extended Link Service (ELS) Header"
        abbrev: "els"
        layer: 4
        total_bytes: 4
        fields:
          - name: "ELS Command Code"
            abbrev: "els.cmd"
            bits: 8
            offset_bits: 0
            value: "0x90"
            value_hex: "0x90"
            description: >
              0x90 = AUTH ELS. The FC-SP Authentication Extended Link Service
              command code. All FC-SP-3 authentication messages — whether
              DH-CHAP or IKEv2-AUTH — are carried as ELS frames using this
              command code. The switch routes them as normal ELS traffic.
            spec_refs:
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "5.1"
                title: "AUTH_ELS — Authentication ELS"
      - name: "AUTH_Negotiate Payload"
        abbrev: "auth_neg"
        layer: 4
        total_bytes: 124
        fields:
          - name: "Auth_Msg_Code"
            abbrev: "auth_neg.msg_code"
            bits: 8
            offset_bits: 0
            value: "0x0B"
            value_hex: "0x0B"
            description: >
              0x0B = AUTH_Negotiate (FC-SP-3 Table 7). Same message code
              regardless of whether DH-CHAP or IKEv2-AUTH is being proposed.
              The protocol selection is in the subsequent fields.
            spec_refs:
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "5.3.1"
                title: "AUTH_Negotiate message"
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "Table 7"
                title: "Auth_Msg_Code values"
          - name: "Transaction_ID"
            abbrev: "auth_neg.txn_id"
            bits: 32
            offset_bits: 8
            value: "0xD7E42B19"
            description: >
              Random transaction ID generated by the initiator. All subsequent
              AUTH_ELS frames in this IKEv2-AUTH session use this transaction ID.
              Prevents replay attacks across sessions.
          - name: "Authentication Initiator Name"
            abbrev: "auth_neg.initiator_name"
            bits: 64
            offset_bits: 40
            value: "10:00:00:10:9B:C7:2A:01"
            description: >
              Host HBA World Wide Port Name. This is the authentication initiator
              identity. In the IKEv2-AUTH flow, this WWN will also appear as IDi
              (Initiator Identity) in the IKE_Auth exchange, encoded as a
              Name_Identifier with NAA=5 format.
          - name: "Usable Authentication Protocols — IKEv2-AUTH"
            abbrev: "auth_neg.proto"
            bits: 32
            offset_bits: 104
            value: "0x00000005"
            description: >
              0x00000005 = IKEv2-AUTH (FC-SP-3 Rev 3.10 LB Table 8, Authentication
              Protocol Identifiers). This is the critical field that distinguishes
              SA-C5 from DH-CHAP. The DH2048-SA profile in the companion scenario
              uses 0x00000001 (DH-CHAP). By proposing IKEv2-AUTH, the host signals
              that authentication will be certificate-based — no shared secrets.

              IKEv2-AUTH provides both authentication (via ML-DSA-87 certificate
              signatures) and SA management (IKE_SA + Child_SA) in a single
              protocol, replacing the DH-CHAP + separate SA concatenation model.
            spec_refs:
              - document: "FC-SP-3 (INCITS 577-202x Rev 3.10 LB)"
                section: "Table 8"
                title: "AUTH_Negotiate Authentication Protocol Identifiers"
              - document: "FC-SP-3 (INCITS 577-202x Rev 3.10 LB)"
                section: "6.3.3"
                title: "SA management transaction as authentication — IKEv2-AUTH"
          - name: "SA Implementation Profile Identifier (SA-C5 / CNSA 2.0)"
            abbrev: "auth_neg.ikev2_profile"
            bits: 32
            offset_bits: 136
            value: "0x00000004"
            description: >
              0x00000004 = SA-C5 Profile / CNSA 2.0 (FC-SP-3 Rev 3.10 LB Table 97,
              IKEv2-AUTH SA Implementation Profile Identifiers). Other Table 97
              values: 0x00000001 = SA-IKEv2 Profile (Annex A.5); 0x00000002 =
              SA-AUTH-Only Profile (Annex A.9); 0x00000003 = SA-C4 / CNSA 1.0
              (Annex A.10); 0x00000004 = SA-C5 / CNSA 2.0 (Annex A.11).
              This identifier selects the specific algorithm set within IKEv2-AUTH:
              - Key exchange: ML-KEM-1024 (FIPS 203)
              - Digital signatures: ML-DSA-87 (FIPS 204)
              - Symmetric cipher: AES-256-GCM
              This selects the specific algorithm set within IKEv2-AUTH:
              - Key exchange: ML-KEM-1024 (FIPS 203)
              - Digital signatures: ML-DSA-87 (FIPS 204)
              - Symmetric cipher: AES-256-GCM
              - PRF: PRF-HMAC-SHA2-384
              - Hash: SHA-384

              For comparison, SA-C4 (CNSA 1.0) uses classical algorithms:
              ECDH P-384 for key exchange and ECDSA P-384 for signatures.
              SA-C5 is the post-quantum upgrade path.
            spec_refs:
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "Annex A.11"
                title: "SA-C5 Implementation Profile"
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "Tables A.59-A.65"
                title: "SA-C5 algorithm requirements"
          - name: "Concatenation Bit"
            abbrev: "auth_neg.concat"
            bits: 1
            offset_bits: 168
            value: "0"
            description: >
              Concatenation = 0. IKEv2-AUTH replaces authentication entirely —
              it is NOT concatenated with DH-CHAP. When Concatenation=1, DH-CHAP
              runs first and then IKEv2 runs as an SA management protocol. With
              Concatenation=0 (as in SA-C5), IKEv2-AUTH handles everything: key
              exchange, mutual authentication, and SA establishment. No DH-CHAP
              exchange occurs at all.
            spec_refs:
              - document: "FC-SP-3 (INCITS 577-202x)"
                section: "6.3.3"
                title: "Concatenation bit semantics"
      - name: "FC-2 Frame Header (Routing — always plaintext)"
        abbrev: "fc.hdr"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL (Routing Control)"
            abbrev: "fc.hdr.rctl"
            bits: 8
            value: "0x22"
            description: "0x22 = Extended Link Service request. The switch routes on this + D_ID."
          - name: "D_ID (Destination ID)"
            abbrev: "fc.hdr.did"
            bits: 24
            value: "0x020100"
            description: >
              Array target port N_Port ID. ALWAYS PLAINTEXT — even after encryption
              is active, the FC header D_ID and S_ID are never encrypted.
          - name: "S_ID (Source ID)"
            abbrev: "fc.hdr.sid"
            bits: 24
            value: "0x010200"
            description: "Host N_Port ID. Always plaintext."
          - name: "CS_CTL"
            abbrev: "fc.hdr.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "TYPE"
            abbrev: "fc.hdr.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
          - name: "F_CTL"
            abbrev: "fc.hdr.fctl"
            bits: 24
            value: "0x290000"
            description: "Frame Control — exchange originator, first+last sequence, sequence initiative transfer"
          - name: "SEQ_ID"
            abbrev: "fc.hdr.seqid"
            bits: 8
            value: "0x00"
            description: "Sequence ID within this exchange"
          - name: "DF_CTL"
            abbrev: "fc.hdr.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.hdr.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc.hdr.oxid"
            bits: 16
            value: "0x0010"
            description: "Originator Exchange ID — AUTH exchange"
          - name: "RX_ID"
            abbrev: "fc.hdr.rxid"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID — not yet assigned"
          - name: "Parameter"
            abbrev: "fc.hdr.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for ELS frames"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
