meta:
  id: "fc-sp3-c5-cnsa2-ikev2auth"
  title: "FC-SP-3 SA-C5: Post-Quantum Authentication with IKEv2-AUTH (CNSA 2.0)"
  protocol: "FC-SP-3 / IKEv2-AUTH / ML-KEM-1024 / ML-DSA-87"
  protocol_family: "SAN"
  version: "1.0"
  description: >
    The SA-C5 Implementation Profile from FC-SP-3 Annex A.11 — the post-quantum
    future of Fibre Channel security. Unlike the companion DH2048-SA scenario
    (which uses DH-CHAP with pre-shared secrets followed by SA concatenation),
    SA-C5 uses IKEv2-AUTH for BOTH authentication AND SA management. There is
    no DH-CHAP involvement at all. Authentication is certificate-based using
    ML-DSA-87 (FIPS 204) digital signatures, and key exchange uses ML-KEM-1024
    (FIPS 203) key encapsulation — both quantum-resistant algorithms mandated
    by the NSA's CNSA 2.0 suite for National Security Systems.

    The flow follows FC-SP-3 Figure 22 (section 6.3.3): AUTH_Negotiate selects
    the IKEv2-AUTH protocol (not DH-CHAP), then IKE_SA_Init exchanges ML-KEM-1024
    key material and negotiates the IKE_SA, then IKE_Auth exchanges ML-DSA-87
    certificates and establishes the Child_SA for encrypted FC frame transport.
    After IKE_Auth completes, all FC frames are encrypted with AES-256-GCM under
    the ESP_Header — identical wire format to the DH-CHAP+SA scenario.

    Key architectural difference from DH-CHAP: no shared secrets are needed.
    Trust is established through a certificate chain rooted in a Certificate
    Authority. This eliminates the shared-secret distribution problem that
    plagues DH-CHAP at scale — instead of distributing secrets to N*(N-1)/2
    port pairs, you issue certificates from a single CA.

    Requested by FCIA / T11 leadership for education purposes.
  difficulty: "advanced"
  learning_objectives:
    - "Understand the CNSA 2.0 mandate and why post-quantum cryptography is needed for FC SANs"
    - "See how IKEv2-AUTH replaces DH-CHAP for certificate-based authentication — no shared secrets"
    - "Follow the ML-KEM-1024 key exchange (IKE_SA_Init) and ML-DSA-87 certificate authentication (IKE_Auth)"
    - "Understand the relationship between IKE_SA, Child_SA, and ESP_Header-encrypted FC frames"
    - "Compare SA-C5 (CNSA 2.0) with SA-C4 (CNSA 1.0) and DH-CHAP approaches"
  authors:
    - name: "Erik Smith"
      org: "Dell Technologies"
      github: "provandal"
    - name: "Claude"
      org: "Anthropic"
  created: "2026-03-30"
  updated: "2026-04-29"
  tags:
    - "fibre-channel"
    - "fc-sp-3"
    - "security"
    - "encryption"
    - "ikev2-auth"
    - "sa-c5"
    - "cnsa-2.0"
    - "post-quantum"
    - "ml-kem-1024"
    - "ml-dsa-87"
    - "aes-256-gcm"
    - "certificate-based"
    - "advanced"
    - "zero-trust"
  primary_specs:
    - document: "FC-SP-3 (INCITS 577-202x)"
      section: "Annex A.11"
      title: "SA-C5 Implementation Profile"
      url: "https://www.t11.org/ftp/t11/pub/fc/sp-3/"
    - document: "FC-SP-3 (INCITS 577-202x)"
      section: "6.3.3"
      title: "SA management transaction as authentication — IKEv2-AUTH"
    - document: "FC-SP-3 (INCITS 577-202x)"
      section: "6.2.4.2"
      title: "IKE_SA_Init message"
    - document: "FC-SP-3 (INCITS 577-202x)"
      section: "6.2.4.3"
      title: "IKE_Auth message"
    - document: "FC-SP-3 (INCITS 577-202x)"
      section: "Table 7"
      title: "Auth_Msg_Code values"
    - document: "FC-SP-3 (INCITS 577-202x)"
      section: "Table 97"
      title: "IKEv2-AUTH protocol identifiers"
    - document: "FC-SP-3 (INCITS 577-202x)"
      section: "Tables A.59-A.65"
      title: "SA-C5 algorithm requirements"
    - document: "FIPS 203 (ML-KEM)"
      section: "all"
      title: "Module-Lattice-Based Key-Encapsulation Mechanism Standard"
      url: "https://csrc.nist.gov/pubs/fips/203/final"
    - document: "FIPS 204 (ML-DSA)"
      section: "all"
      title: "Module-Lattice-Based Digital Signature Algorithm Standard"
      url: "https://csrc.nist.gov/pubs/fips/204/final"
    - document: "RFC 7296"
      section: "all"
      title: "Internet Key Exchange Protocol Version 2 (IKEv2)"
      url: "https://www.rfc-editor.org/rfc/rfc7296"
    - document: "NSA CNSA 2.0"
      section: "all"
      title: "Commercial National Security Algorithm Suite 2.0"
      url: "https://media.defense.gov/2022/Sep/07/2003071836/-1/-1/0/CSA_CNSA_2.0_ALGORITHMS_.PDF"

topology:
  actors:
    - id: "host"
      type: "initiator"
      label: "Host Server (HBA)"
      description: >
        Server with 64GFC HBA supporting FC-SP-3 SA-C5 profile. The HBA holds
        a device certificate signed with ML-DSA-87 by the organization's CA,
        plus the CA root certificate for validating peer certificates. All
        IKEv2-AUTH negotiation, ML-KEM-1024 key encapsulation, and AES-256-GCM
        encryption/decryption occur in ASIC hardware — zero CPU involvement.
        No shared secrets are provisioned; trust comes from the certificate chain.
      hardware: "64GFC HBA with SA-C5 profile support"
      os: "Linux 6.8 / Windows Server 2025"
      position: "left"

    - id: "switch"
      type: "switch"
      label: "FC Switch (64GFC)"
      description: >
        Standard 64GFC director. Completely unmodified — no firmware changes,
        no configuration, no awareness of encryption or post-quantum algorithms.
        Routes FC frames on D_ID/S_ID from the FC header, which is always
        in plaintext. The switch never sees the payload. IKEv2-AUTH negotiation,
        ML-KEM key exchange, and certificate exchanges all pass through as
        normal ELS frames — the switch just routes them.
      hardware: "Standard 64GFC switch"
      position: "center"

    - id: "array"
      type: "target"
      label: "Storage Array Target"
      description: >
        Storage array with 64GFC target ports supporting FC-SP-3 SA-C5 profile.
        Holds its own ML-DSA-87 device certificate and the CA root certificate.
        FC-SP-3 termination and AES-256-GCM decryption happen at the HBA ASIC
        on the array port — data services (dedupe, compression, ransomware
        detection) receive plaintext after decryption, exactly as in the
        DH-CHAP+SA scenario.
      hardware: "64GFC target port with SA-C5 profile support"
      position: "right"

  links:
    - id: "host-switch"
      from: "host"
      to: "switch"
      speed_gbps: 64
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true
    - id: "switch-array"
      from: "switch"
      to: "array"
      speed_gbps: 64
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true

