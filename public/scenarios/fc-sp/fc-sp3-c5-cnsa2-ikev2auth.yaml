timeline:
  - id: "context"
    type: "annotation"
    t_ns: 0
    annotation:
      text: "Starting Point: Physical Link Up, FLOGI + PLOGI Complete"
      detail: >
        Physical link is up at 64GFC. FLOGI and PLOGI are complete — both endpoints
        have exchanged WWNs and N_Port IDs. Both sides advertised FC-SP-3 IKEv2-AUTH
        capability. No shared secrets have been provisioned — both endpoints hold
        ML-DSA-87 device certificates signed by the organization's Certificate Authority.
        The host will now initiate AUTH_Negotiate proposing IKEv2-AUTH (not DH-CHAP).

  - id: "fabric_login_ctx"
    type: "frame_tx"
    t_ns: 0
    frame_id: "fabric_login_context"
    annotation:
      text: "FLOGI + PLOGI Complete — IKEv2-AUTH Capability Detected"
      detail: >
        Both SecureHBAs advertised FC-SP-3 IKEv2-AUTH support in their PLOGI ACC
        service parameters. The host detects this mutual capability match and will
        initiate AUTH_Negotiate with IKEv2-AUTH as the proposed authentication protocol.
        This is the key divergence from the DH-CHAP companion scenario: no shared
        secrets exist between these endpoints. Trust will be established entirely
        through ML-DSA-87 certificate chains rooted in a common Certificate Authority.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "AUTH_IDLE — initiating AUTH_Negotiate (IKEv2-AUTH)"
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              frame_type: "plaintext (pre-SA)"
              sa_id: "none"
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "AUTH_IDLE — awaiting AUTH_Negotiate"
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              payload_visibility: "VISIBLE (pre-encryption)"

  - id: "auth_neg"
    type: "frame_tx"
    t_ns: 1000
    frame_id: "auth_negotiate"
    annotation:
      text: "AUTH_Negotiate — IKEv2-AUTH (Auth_Protocol=0x00000005, Table 8) + SA-C5 Profile (Implementation=0x00000004, Table 97)"
      detail: >
        AUTH_Negotiate proposes IKEv2-AUTH (Authentication Protocol Identifier 0x00000005, Table 8) instead
        of DH-CHAP (0x00000001). The IKEv2-AUTH Protocol Parameters specify the SA-C5
        profile (0x00000004 = CNSA 2.0). Concatenation bit = 0 means IKEv2-AUTH handles
        everything — authentication, key exchange, and SA establishment — with no
        DH-CHAP involvement at all.

        The DH2048-SA profile in the companion scenario uses classical DH-CHAP with
        pre-shared secrets followed by SA concatenation. The SA-C5 profile shown here
        uses IKEv2-AUTH with certificates — no shared secrets, no DH-CHAP, fully
        post-quantum.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "AUTH_NEGOTIATE sent — IKEv2-AUTH proposed"
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "AUTH_NEGOTIATE received — evaluating IKEv2-AUTH proposal"

  - id: "auth_neg_rsp"
    type: "frame_tx"
    t_ns: 6000
    frame_id: "auth_neg_rsp"
    annotation:
      text: "AUTH_Negotiate_Rsp — IKEv2-AUTH + SA-C5 (CNSA 2.0) Agreed"
      detail: >
        The array confirms IKEv2-AUTH with SA-C5 profile. Both sides now know the
        next exchange is IKE_SA_Init (not DH-CHAP Challenge). This is the last
        plaintext control frame before the IKE exchanges begin. The array prepares
        its ML-KEM-1024 key material for the IKE_SA_Init response.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "AUTH_Negotiate_Rsp received — IKEv2-AUTH + SA-C5 agreed"
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "AUTH_Negotiate_Rsp sent — awaiting IKE_SA_Init"

  - id: "ike_sa_init_i"
    type: "frame_tx"
    t_ns: 8000
    frame_id: "ike_sa_init_request"
    annotation:
      text: "IKE_SA_Init (Initiator) — ML-KEM-1024 Encapsulation Key (1568 bytes)"
      detail: >
        The host sends IKE_SA_Init with its ML-KEM-1024 encapsulation key (1568 bytes).
        This is the post-quantum replacement for classical Diffie-Hellman: instead of
        computing g^a mod p (which a quantum computer can break via Shor's algorithm),
        the host generates an ML-KEM key pair based on the Module Learning With Errors
        (MLWE) lattice problem, for which no efficient quantum algorithm exists.

        The SA proposal requests: ENCR_AES_GCM_256, PRF_HMAC_SHA2_384, and ML-KEM-1024
        key exchange — all CNSA 2.0 required algorithms. The 32-byte initiator nonce
        provides freshness.

        ML-KEM-1024 vs classical DH: encapsulation-based key exchange produces a
        shared secret through Encaps/Decaps operations rather than exponentiation.
        The shared secret is IND-CCA2 secure against both classical and quantum adversaries.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "IKE_SA_Init sent — ML-KEM-1024 encapsulation key transmitted"
              ike_sa_state: "INIT_SENT"
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "IKE_SA_Init received — running ML-KEM.Encaps()"
              ike_sa_state: "INIT_RECEIVED"

  - id: "ike_sa_init_r"
    type: "frame_tx"
    t_ns: 12000
    frame_id: "ike_sa_init_response"
    annotation:
      text: "IKE_SA_Init (Responder) — ML-KEM-1024 Ciphertext + CERTREQ + ML-DSA-87 Notify"
      detail: >
        The array responds with its ML-KEM-1024 ciphertext (1568 bytes — the
        encapsulated shared secret), its nonce, a CERTREQ requesting the host's
        certificate, and a Notify advertising ML-DSA-87 as the supported
        authentication method.

        After this exchange, both sides derive SKEYSEED from the ML-KEM shared
        secret plus nonces: SKEYSEED = prf(Ni | Nr, K). All subsequent messages
        (IKE_Auth) are encrypted under the IKE_SA — an eavesdropper cannot read
        the certificates or authentication payloads exchanged in Phase 4.

        The host now runs ML-KEM.Decaps(ciphertext, sk) to recover the same
        shared secret K that the array derived during Encaps(). Both sides
        hold identical K without ever transmitting it in plaintext.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "IKE_SA_Init response received — deriving SKEYSEED from ML-KEM shared secret"
              ike_sa_state: "SKEYSEED derived — IKE_SA keys ready"
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "IKE_SA_Init sent — SKEYSEED derived"
              ike_sa_state: "SKEYSEED derived — awaiting IKE_Auth"

  - id: "skeyseed_annotation"
    type: "annotation"
    t_ns: 13000
    annotation:
      text: "SKEYSEED Derived — IKE_SA Established, Subsequent Messages Encrypted"
      detail: >
        Both endpoints have independently derived the same SKEYSEED from:
        - The 32-byte ML-KEM shared secret (from ML-KEM.Encaps/Decaps)
        - The initiator nonce Ni and responder nonce Nr
        - PRF = HMAC-SHA-384

        SKEYSEED = prf(Ni | Nr, K_mlkem)

        From SKEYSEED, all IKE_SA keys are derived: encryption key (SK_ei/SK_er),
        integrity key (SK_ai/SK_ar), and key derivation key (SK_d) for future
        Child_SA key derivation. The IKE_Auth messages that follow are encrypted
        under these keys — the certificates, identities, and AUTH signatures
        are all protected from eavesdroppers.

        Compare with DH-CHAP: in the companion scenario, K is derived from
        g^(ab) mod p — vulnerable to quantum attack. Here, K comes from
        ML-KEM — quantum-resistant.

  - id: "ike_auth_i"
    type: "frame_tx"
    t_ns: 16000
    frame_id: "ike_auth_request"
    annotation:
      text: "IKE_Auth (Initiator) — ML-DSA-87 Certificate + Digital Signature"
      detail: >
        The host sends IKE_Auth (encrypted under IKE_SA). Inside the SK{} envelope:
        - IDi: host WWN (Name_Identifier, NAA=5)
        - CERT: host's leaf certificate (ML-DSA-87 signed by Org CA) + CA root cert
        - AUTH: 4627-byte ML-DSA-87 digital signature proving host identity
        - SAi2: Child_SA proposal (ESP_Header with AES-256-GCM)
        - TSi/TSr: traffic selectors (all traffic between these N_Ports)

        ML-DSA-87 vs ECDSA: classical ECDSA P-384 produces 64-byte signatures.
        ML-DSA-87 produces 4627-byte signatures — larger, but immune to quantum
        attack. A quantum computer running Shor's algorithm can forge ECDSA
        signatures. No efficient quantum algorithm can forge ML-DSA-87 signatures
        (based on the MLWE/SIS hardness assumptions).

        Certificate-based trust model vs shared-secret model: instead of distributing
        N*(N-1)/2 shared secrets for N port pairs, the administrator issues N
        certificates from one CA. Adding a new port requires only one new certificate,
        not updating secrets on every existing port.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "IKE_Auth sent — certificate + ML-DSA-87 signature transmitted"
              ike_sa_state: "AUTH_SENT"
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "IKE_Auth received — verifying ML-DSA-87 certificate chain + signature"

  - id: "ike_auth_r"
    type: "frame_tx"
    t_ns: 21000
    frame_id: "ike_auth_response"
    annotation:
      text: "IKE_Auth (Responder) — Mutual Auth Complete, Child_SA Active, Encryption ON"
      detail: >
        The array sends IKE_Auth with its own ML-DSA-87 certificate and signature.
        The host verifies the array's certificate chain and signature. Both identities
        are now verified. Child_SA established with SA_ID=0x4F12A37B.

        Both HBA ASICs load the Child_SA session key (derived from SKEYSEED via SK_d).
        Watch the OSI panel: host shows encryption_active=true, array shows
        decryption_active=true, switch shows payload_visibility=OPAQUE.

        Total elapsed from PLOGI to full encryption: ~21 us (dominated by two
        network round-trips for IKE_SA_Init + IKE_Auth). Comparable to the DH-CHAP
        scenario despite the larger ML-KEM/ML-DSA payloads — the HBA ASIC performs
        all cryptographic operations in hardware.

        From this point: every FC frame (PRLI, FCP commands, FCP data, FCP responses,
        NVMe/FC capsules) is encrypted end-to-end with AES-256-GCM. The wire format
        (ESP_Header) is identical to the DH-CHAP scenario — only the key establishment
        and authentication methods differ.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 0
            name: "FC-0 Physical"
            state_fields:
              encryption_active: true
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              frame_type: "AES-256-GCM encrypted"
              sa_id: "0x4F12A37B"
              sequence_number: 0
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "COMPLETE — IKEv2-AUTH mutual authentication PASSED"
              ike_sa_state: "ESTABLISHED"
              child_sa_state: "ACTIVE — SA_ID=0x4F12A37B, AES-256-GCM"
      - actor_id: "array"
        layers:
          - layer: 0
            name: "FC-0 Physical"
            state_fields:
              decryption_active: true
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              frame_type: "receiving AES-256-GCM encrypted"
              sa_id: "0x4F12A37B"
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "COMPLETE — IKEv2-AUTH mutual authentication PASSED"
              ike_sa_state: "ESTABLISHED"
              child_sa_state: "ACTIVE — SA_ID=0x4F12A37B"
              data_services: "ACTIVE — dedupe/compress/ransomware-detect on plaintext post-decrypt"
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              payload_visibility: "OPAQUE — switch routes on FC header only"

  - id: "encryption_live"
    type: "annotation"
    t_ns: 22000
    annotation:
      text: "Encryption Active — All FC Frames Now AES-256-GCM Encrypted (Post-Quantum Key Establishment)"
      detail: >
        Total time from PLOGI to encryption active: ~21 us. No shared secrets
        were provisioned. No DH-CHAP exchange occurred. Authentication was
        certificate-based using ML-DSA-87. Key establishment used ML-KEM-1024.
        Both algorithms are quantum-resistant.

        The resulting encrypted frame format (ESP_Header + AES-256-GCM) is
        identical to the DH-CHAP companion scenario. The switch, multipath
        software, and applications see no difference. The cryptographic
        improvement is entirely in the key establishment and authentication
        phase — post-quantum algorithms replace classical ones, and certificates
        replace shared secrets.

  - id: "prli_encrypted"
    type: "frame_tx"
    t_ns: 23000
    frame_id: "prli_encrypted"
    annotation:
      text: "PRLI — First Encrypted Frame (ESP Seq=1)"
      detail: >
        PRLI is the first encrypted frame. FC header plaintext — switch reads D_ID
        and routes normally. ESP_Header: SA_ID=0x4F12A37B (Child_SA from IKE_Auth),
        Seq=1 starts anti-replay, unique IV. PRLI body is AES-256-GCM ciphertext.
        The switch cannot determine which FC-4 protocol (NVMe or FCP) is being
        registered.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              sequence_number: 1
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              routing_mode: "D_ID routing — payload opaque to switch"

  - id: "prli_acc_encrypted"
    type: "frame_tx"
    t_ns: 28000
    frame_id: "prli_acc_encrypted"
    annotation:
      text: "PRLI ACC — Process Association Established (Encrypted, ESP Seq=2)"
      detail: >
        PRLI ACC accepted — FCP or NVMe process association established.
        Also encrypted under SA 0xC5. With PRLI complete, production I/O
        can now flow. Every frame in both directions is AES-256-GCM encrypted
        with post-quantum key establishment.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              sequence_number: 2
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "PRLI decrypted — FC-4 session READY"

  - id: "scsi_write_encrypted"
    type: "frame_tx"
    t_ns: 100000
    frame_id: "scsi_write_encrypted"
    annotation:
      text: "Encrypted SCSI WRITE — Production I/O Under Post-Quantum SA (ESP Seq=523)"
      detail: >
        Production I/O well underway. ESP Seq=523 indicates hundreds of frames
        have already been encrypted. The FC header is identical to any unencrypted
        frame — R_CTL=0x06, TYPE=0x08, D_ID/S_ID plaintext. The switch routes
        on D_ID and sees only ciphertext beyond the ESP_Header.

        From the application's perspective, this is a normal SCSI WRITE. The
        encryption is completely transparent — the OS, HBA driver, multipath
        software, and application are unaware. The HBA ASIC encrypts at line
        rate with zero latency impact.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              sequence_number: 523
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              payload_visibility: "OPAQUE — ciphertext only"

  - id: "scsi_read_encrypted"
    type: "frame_tx"
    t_ns: 105000
    frame_id: "scsi_read_encrypted"
    annotation:
      text: "Encrypted SCSI READ — Both Directions Encrypted (ESP Seq=530)"
      detail: >
        SCSI READ data returning from the array, also encrypted under SA 0xC5.
        Both directions of the link use the same Child_SA. The array's HBA ASIC
        encrypts read data at line rate before transmission. The host's HBA ASIC
        decrypts at line rate upon receipt. The application receives plaintext
        SCSI data — completely unaware of the encryption layer.

        Array-side: data services (dedupe, compression, ransomware detection)
        operate on plaintext before encryption. The HBA ASIC encrypts the
        plaintext read data as it leaves the array port. This preserves full
        data services functionality — identical to the DH-CHAP scenario.
    state_after:
      - actor_id: "array"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              frame_type: "sent encrypted FCP_DATA (READ)"
      - actor_id: "host"
        layers:
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              sequence_number: 530
              frame_type: "received encrypted FCP_DATA — decrypted by HBA ASIC"

glossary:
  - term: "SA-C5 Profile"
    abbrev: "SA-C5"
    definition: >
      SA-C5 Implementation Profile from FC-SP-3 Annex A.11. The CNSA 2.0
      post-quantum profile for Fibre Channel security. Uses IKEv2-AUTH for
      both authentication and SA management (no DH-CHAP). Key exchange:
      ML-KEM-1024. Digital signatures: ML-DSA-87. Symmetric cipher: AES-256-GCM.
      PRF: HMAC-SHA-384. This profile is designed for environments that must
      comply with NSA CNSA 2.0 requirements (National Security Systems) or
      that want quantum-resistant protection for long-lived data.
    spec_refs:
      - document: "FC-SP-3 (INCITS 577-202x)"
        section: "Annex A.11"
        title: "SA-C5 Implementation Profile"

  - term: "CNSA 2.0"
    abbrev: "CNSA 2.0"
    definition: >
      Commercial National Security Algorithm Suite 2.0. Published by the NSA
      in September 2022. Specifies quantum-resistant cryptographic algorithms
      for National Security Systems (NSS — DoD, Intelligence Community, classified
      systems). Key changes from CNSA 1.0: adds ML-KEM-1024 for key establishment
      and ML-DSA-87 for digital signatures. AES-256 and SHA-384/512 carry over.
      CNSA 2.0 is mandatory for NSS; commercial enterprises benefit from the same
      algorithms but are not directly mandated. Timeline: NSS must transition to
      CNSA 2.0 algorithms by 2030 for software/firmware signing, 2033 for symmetric
      keys, and 2035 for asymmetric key establishment.
    spec_refs:
      - document: "NSA CNSA 2.0"
        section: "all"
        url: "https://media.defense.gov/2022/Sep/07/2003071836/-1/-1/0/CSA_CNSA_2.0_ALGORITHMS_.PDF"

  - term: "IKEv2-AUTH"
    abbrev: "IKEv2-AUTH"
    definition: >
      The IKEv2-based authentication and SA management protocol defined in
      FC-SP-3 section 6.3.3. When used as the authentication protocol (instead
      of DH-CHAP), IKEv2-AUTH provides both mutual authentication (via digital
      signatures and certificate chains) and Security Association management
      (IKE_SA + Child_SA) in a single protocol. No shared secrets are needed.
      This replaces the DH-CHAP + SA concatenation model used in earlier profiles.
    spec_refs:
      - document: "FC-SP-3 (INCITS 577-202x)"
        section: "6.3.3"
        title: "SA management transaction as authentication — IKEv2-AUTH"

  - term: "ML-KEM-1024"
    abbrev: "ML-KEM-1024"
    definition: >
      Module-Lattice-Based Key Encapsulation Mechanism, security parameter 1024.
      FIPS 203 (2024) standard. A post-quantum key encapsulation mechanism based
      on the Module Learning With Errors (MLWE) problem. Replaces classical
      ECDH/DH for key establishment. Resistant to Shor's algorithm on a quantum
      computer. Key sizes: 1568-byte encapsulation key, 1568-byte ciphertext,
      32-byte shared secret. Security category 5 (equivalent to AES-256).
    spec_refs:
      - document: "FIPS 203"
        section: "all"
        title: "ML-KEM"
        url: "https://csrc.nist.gov/pubs/fips/203/final"

  - term: "ML-DSA-87"
    abbrev: "ML-DSA-87"
    definition: >
      Module-Lattice-Based Digital Signature Algorithm, security parameter set 87.
      FIPS 204 (2024) standard. A post-quantum digital signature algorithm based
      on the Module Learning With Errors (MLWE) and Short Integer Solution (SIS)
      problems. Replaces ECDSA/RSA for digital signatures. Resistant to quantum
      attack. Key sizes: 2592-byte public key, 4896-byte private key.
      Signature size: 4627 bytes. Security category 5.
    spec_refs:
      - document: "FIPS 204"
        section: "all"
        title: "ML-DSA"
        url: "https://csrc.nist.gov/pubs/fips/204/final"

  - term: "IKE_SA_Init"
    abbrev: "IKE_SA_Init"
    definition: >
      The first message in the IKEv2 exchange, adapted for Fibre Channel
      (FC-SP-3 section 6.2.4.2). Carries the SA proposal (cipher, PRF, key
      exchange method), key exchange material (ML-KEM-1024 encapsulation key
      from initiator, ciphertext from responder), and nonces. After this
      exchange, both sides derive SKEYSEED and establish the IKE_SA for
      encrypting subsequent IKE_Auth messages. Auth_Msg_Code = 0x16 (Table 7).
    spec_refs:
      - document: "FC-SP-3 (INCITS 577-202x)"
        section: "6.2.4.2"
        title: "IKE_SA_Init message"

  - term: "IKE_Auth"
    abbrev: "IKE_Auth"
    definition: >
      The second message in the IKEv2 exchange, adapted for Fibre Channel
      (FC-SP-3 section 6.2.4.3). Encrypted under the IKE_SA. Carries identity
      (IDi/IDr = WWN), certificates (ML-DSA-87 signed), digital signature
      authentication (AUTH payload), and Child_SA proposal/acceptance.
      After IKE_Auth completes in both directions, the Child_SA is active
      and all FC frames are encrypted. Auth_Msg_Code = 0x22 (Table 7).
    spec_refs:
      - document: "FC-SP-3 (INCITS 577-202x)"
        section: "6.2.4.3"
        title: "IKE_Auth message"

  - term: "Child_SA"
    abbrev: "Child_SA"
    definition: >
      A Security Association negotiated within IKE_Auth for protecting FC frames.
      Defines the ESP transform (AES-256-GCM), SA_ID (appears in every ESP_Header),
      and traffic selectors (which FC frames are covered). The Child_SA session key
      is derived from SKEYSEED via SK_d. Analogous to an IPsec Child SA but for
      FC frame transport.
    spec_refs:
      - document: "RFC 7296"
        section: "2.17"
        title: "Child SA"

  - term: "ESP_Header"
    abbrev: "ESP"
    definition: >
      Encapsulating Security Payload header. Inserted between the FC frame header
      and the encrypted payload. Contains SA_ID (identifies the Child_SA and
      session key), sequence number (anti-replay), and initialization vector (IV).
      The FC frame header remains plaintext — the switch routes on it normally.
      Identical wire format regardless of whether the SA was established via
      DH-CHAP+SA or IKEv2-AUTH.
    spec_refs:
      - document: "FC-SP-3 (INCITS 577-202x)"
        section: "6.2"
        title: "ESP_Header format"

  - term: "SKEYSEED"
    abbrev: "SKEYSEED"
    definition: >
      The master key derivation seed in IKEv2. Derived from the ML-KEM shared
      secret and both nonces: SKEYSEED = prf(Ni | Nr, K_mlkem). From SKEYSEED,
      all IKE_SA keys (SK_ei, SK_er, SK_ai, SK_ar, SK_d, SK_pi, SK_pr) are
      derived. SK_d is then used to derive Child_SA keys for ESP encryption.
      Per RFC 7296 section 2.14.
    spec_refs:
      - document: "RFC 7296"
        section: "2.14"
        title: "SKEYSEED generation"

  - term: "Certificate Chain"
    abbrev: "cert_chain"
    definition: >
      A sequence of X.509 certificates linking a device certificate to a
      trusted Certificate Authority (CA) root. In the SA-C5 flow: the device's
      leaf certificate (signed by the CA with ML-DSA-87) is presented along
      with the CA root certificate. The verifier checks that the leaf cert's
      signature is valid under the CA's public key, and that the CA root is
      in its trust store. This eliminates the need for pre-shared secrets —
      any device with a certificate from the trusted CA is automatically
      authenticated.

  - term: "Digital Signature"
    abbrev: "digsig"
    definition: >
      A cryptographic proof that a message was created by the holder of a
      specific private key. In IKE_Auth, the AUTH payload contains an ML-DSA-87
      signature over the IKE_SA_Init message. The verifier uses the signer's
      public key (from the certificate) to confirm the signature is valid.
      Auth_Method=14 (Digital Signature) per RFC 7296 section 3.8.

  - term: "Traffic Selector"
    abbrev: "TS"
    definition: >
      Defines which FC frames are protected by the Child_SA. Default traffic
      selectors (per FC-SP-3 section 6.2.5.12.2) cover ALL traffic between
      the two N_Port endpoints — regardless of FC-4 protocol (FCP, NVMe/FC,
      ELS) or application workload. No per-application configuration needed.
    spec_refs:
      - document: "FC-SP-3 (INCITS 577-202x)"
        section: "6.2.5.12.2"
        title: "Default traffic selectors"

walkthroughs:
  - id: "sa-c5-flow"
    title: "SA-C5 Post-Quantum Authentication — From PLOGI to Encrypted"
    description: "Trace the complete IKEv2-AUTH flow with ML-KEM-1024 and ML-DSA-87."
    steps:
      - step: 0
        narration: >
          PLOGI is complete. Both endpoints advertised FC-SP-3 IKEv2-AUTH capability.
          No shared secrets exist between these endpoints — trust will come entirely
          from ML-DSA-87 certificate chains. This is the fundamental difference from
          the DH-CHAP companion scenario: no secrets to distribute, no secrets to rotate,
          no secrets to compromise.
        highlight_fields: ["ctx.fcsp3", "ctx.host_wwn", "ctx.array_wwn"]
      - step: 1
        narration: >
          AUTH_Negotiate proposes IKEv2-AUTH (Auth_Protocol=0x00000005, Table 8) — not DH-CHAP (0x00000001).
          The SA-C5 profile identifier (0x00000004) selects CNSA 2.0 algorithms.
          Concatenation bit = 0 means IKEv2-AUTH handles everything: key exchange,
          authentication, and SA establishment. No DH-CHAP will occur at all.
        highlight_fields: ["els.cmd", "auth_neg.proto", "auth_neg.ikev2_profile", "auth_neg.concat"]
      - step: 2
        narration: >
          Array confirms IKEv2-AUTH + SA-C5. Next exchange is IKE_SA_Init.
          Compare with the DH-CHAP scenario where the next frame would be
          DHCHAP_Challenge — here, there is no challenge/response at all.
        highlight_fields: ["auth_neg_rsp.proto", "auth_neg_rsp.ikev2_profile"]
      - step: 3
        narration: >
          IKE_SA_Init from the host carries the ML-KEM-1024 encapsulation key
          (1568 bytes). This is the post-quantum replacement for g^a mod p.
          The SA proposal requests AES-256-GCM + PRF-HMAC-SHA2-384 + ML-KEM-1024.
          All CNSA 2.0 required algorithms.
        highlight_fields: ["ike_sa_init_i.sai1_ke", "ike_sa_init_i.kei", "ike_sa_init_i.sai1_encr", "ike_sa_init_i.ni"]
      - step: 4
        narration: >
          IKE_SA_Init response carries the ML-KEM-1024 ciphertext (encapsulated
          shared secret), CERTREQ, and ML-DSA-87 auth method notification.
          After this exchange, SKEYSEED is derived and the IKE_SA is established.
          All subsequent messages are encrypted — an eavesdropper sees nothing.
        highlight_fields: ["ike_sa_init_r.ker", "ike_sa_init_r.nr", "ike_sa_init_r.certreq", "ike_sa_init_r.notify_auth"]
      - step: 5
        narration: >
          IKE_Auth from the host (encrypted under IKE_SA): identity (WWN),
          ML-DSA-87 certificate chain, 4627-byte digital signature, and
          Child_SA proposal (ESP + AES-256-GCM). The certificate replaces
          the shared secret — no pre-provisioned secret needed.
        highlight_fields: ["ike_auth_i.idi", "ike_auth_i.cert_leaf", "ike_auth_i.auth", "ike_auth_i.sai2"]
      - step: 6
        narration: >
          IKE_Auth response: array's ML-DSA-87 certificate and signature.
          Mutual authentication complete. Child_SA active with SA_ID=0x4F12A37B.
          Both ASICs load the session key. Encryption is ON. Total time:
          ~21 us. From here, every FC frame is AES-256-GCM encrypted with
          post-quantum key establishment — the strongest protection currently
          available for FC SAN traffic.
        highlight_fields: ["ike_auth_r.idr", "ike_auth_r.auth", "ike_auth_r.sar2"]

  - id: "dhchap-vs-ikev2auth"
    title: "DH-CHAP vs IKEv2-AUTH — What Changed and Why"
    description: "Side-by-side comparison with the DH2048-SA companion scenario."
    steps:
      - step: 0
        narration: >
          The DH2048-SA profile (companion scenario) uses DH-CHAP with pre-shared
          secrets for authentication, followed by IKE SA Establishment for the
          encryption SA. Two separate protocols, classical algorithms throughout.

          The SA-C5 profile (this scenario) uses IKEv2-AUTH for everything — one
          protocol handles authentication AND SA management. Certificate-based,
          post-quantum algorithms throughout.
        highlight_fields: []
      - step: 1
        narration: >
          Key exchange: DH2048-SA uses classical DH (g^ab mod p) — vulnerable to
          Shor's algorithm. SA-C5 uses ML-KEM-1024 (lattice-based encapsulation) —
          quantum-resistant. Both produce a 32-byte shared secret, but ML-KEM's
          security holds against quantum adversaries.
        highlight_fields: ["ike_sa_init_i.sai1_ke", "ike_sa_init_i.kei"]
      - step: 2
        narration: >
          Authentication: DH2048-SA uses shared secrets (must be pre-distributed
          to every port pair). SA-C5 uses ML-DSA-87 certificates (issue N certs
          from one CA instead of distributing N*(N-1)/2 secrets). Scales better,
          no secret rotation headaches, no compromise of one secret affecting others.
        highlight_fields: ["ike_auth_i.cert_leaf", "ike_auth_i.auth"]
      - step: 3
        narration: >
          The encrypted frame format (ESP_Header + AES-256-GCM) is identical in
          both scenarios. The switch sees no difference. The application sees no
          difference. The improvement is entirely in the key establishment and
          authentication phase — stronger algorithms, better scalability.
        highlight_fields: ["esp.prli.said", "esp.wr.said"]
