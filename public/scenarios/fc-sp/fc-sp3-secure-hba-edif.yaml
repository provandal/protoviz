            value: "0x010200"
            description: "Destination N_Port ID — host HBA port. ALWAYS PLAINTEXT."
          - name: "CS_CTL"
            abbrev: "fc2.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
