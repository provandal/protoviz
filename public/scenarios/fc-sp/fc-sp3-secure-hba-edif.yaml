  # ── DH-CHAP Challenge ────────────────────────────────────────────────────────

  - id: "dhchap_challenge"
    name: "DH-CHAP Challenge — Target Sends Challenge + DH Public Value"
    description: >
      The target (responder) sends the DH-CHAP Challenge. This frame carries
      the CHAP challenge value and the target's Diffie-Hellman public value
      (g^b mod p for the negotiated DH group).

      The initiator generates its own DH key pair, computes g^a mod p
      (its DH public value), and derives the shared secret g^(ab) mod p.
      The shared secret becomes the basis for the session key.

      DH-CHAP uses classical Diffie-Hellman only. For post-quantum key
      establishment (CNSA 2.0), FC-SP-3 provides the separate SA
      Establishment protocol (SA_INIT + SA_AUTH), which supports ML-KEM-1024.
    from: "array"
    to: "host"
    via: ["switch"]
    timestamp_ns: 7000
    total_bytes: 1600
    color: "#c0392b"
    headers:
      - name: "DH-CHAP Challenge PDU"
        abbrev: "dhchap_c"
        layer: 4
        fields:
          - name: "Auth_Msg_Code"
            abbrev: "dhchap_c.msg"
            bits: 8
            value: "0x10"
            description: "0x10 = DHCHAP_Challenge (per Wireshark packet-fcsp.c)"
            spec_refs:
              - document: "FC-SP-2"
                section: "5.3.2"
                title: "DHCHAP_Challenge"
          - name: "Challenge_Value (16 bytes)"
            abbrev: "dhchap_c.chall"
            bits: 128
            value: "0xF4A2B8C1D3E09F715A6B2C8D4E3F1A09"
            description: >
              Random 128-bit challenge nonce generated by the target.
              The initiator must respond with SHA-512(challenge_value ||
              K || shared_secret || initiator_WWN || target_WWN).
              FC-SP-2 uses a plain SHA hash over concatenation (not HMAC —
              HMAC is NVMe DH-HMAC-CHAP, a different protocol).
              This proves the initiator knows the shared secret without
              transmitting it.
          - name: "DH Public Value g^b mod p (256 bytes)"
            abbrev: "dhchap_c.dhval"
            bits: 2048
            value: "[256-byte DH public value for Group 4 (2048-bit MODP)]"
            description: >
              The target's Diffie-Hellman public value g^b mod p, where g and p
              are defined by DH Group 4 (2048-bit MODP per FC-SP-2 section
              5.3.1, Table 13). The initiator computes g^a mod p (its own
              public value) and derives the shared secret K = g^(ab) mod p.
              Both sides independently derive the same K without transmitting it.
            spec_refs:
              - document: "FC-SP-2"
                section: "5.3.1, Table 13"
                title: "DH-CHAP DH Group parameters"
