            description: "Anti-replay counter = 1849. Follows XFER_RDY (Seq 1848)."
          - name: "IV"
            abbrev: "fc.fcd.esp.iv"
            bits: 96
            value: "0x8F3A21C4 B7D09E15 00000739"
