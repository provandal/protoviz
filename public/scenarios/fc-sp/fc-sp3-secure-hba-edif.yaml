            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc2.oxid"
            bits: 16
            value: "0x0011"
            description: "Originator Exchange ID"
          - name: "RX_ID"
            abbrev: "fc2.rxid"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID"
          - name: "Parameter"
            abbrev: "fc2.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
