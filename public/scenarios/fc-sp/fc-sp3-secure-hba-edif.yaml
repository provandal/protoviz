  # ── ARRAY DECRYPTION ─────────────────────────────────────────────────────────

  - id: "array_decrypt"
    name: "Array SecureHBA: Decryption → Data Services (Plaintext)"
    description: >
      The array's SecureHBA target port receives the encrypted FC frame,
      strips the ESP_Header, verifies the GCM authentication tag, and
      decrypts the payload — all in ASIC hardware, below the FC driver.
      The FCP/NVMe target driver receives plaintext FCP frame exactly as
      if no encryption was in place.

      The data services engine (dedupe, compression, ransomware detection)
      operates on plaintext. This is the key architectural point that
      distinguishes HBA-level EDIF from:
      - Application encryption: array never sees plaintext → no dedupe/compress
      - Host-side volume encryption: same problem
      - Switch-level encryption: adds switch complexity, still masks data from array

      With SecureHBA EDIF, the array's data services are fully preserved.
    from: "array"
    to: "array"
    timestamp_ns: 35000
    total_bytes: 0
    color: "#27ae60"
    headers:
      - name: "Array SecureHBA Decryption Pipeline"
        abbrev: "decrypt"
        layer: 2
        fields:
          - name: "ESP_Header Validation"
            abbrev: "decrypt.esp"
            bits: 0
            value: "SA_ID=0xA1 → key lookup → Seq=1847 → anti-replay window check: PASS"
            description: >
              SecureHBA ASIC looks up SA_ID 0xA1, confirms sequence number 1847
              is within the anti-replay window and not a duplicate. If either
              check fails, the frame is silently dropped — no error propagated
              to the FCP stack.
          - name: "AES-256-GCM Decryption + Tag Verify"
            abbrev: "decrypt.aes"
            bits: 0
            value: "GCM tag: VALID — plaintext FCP frame delivered to FC driver"
            description: >
              The GCM authentication tag is verified first (before decryption
              output is used). If the tag is invalid — meaning the ciphertext
              was tampered with in transit — decryption output is suppressed
              and the frame dropped. This prevents padding oracle and other
              chosen-ciphertext attacks.
          - name: "Data Services Input (Plaintext)"
            abbrev: "decrypt.ds"
            bits: 0
            value: "WRITE(10) CDB → FCP target → data path → DEDUPE ✓ COMPRESS ✓ RANSOMWARE DETECT ✓"
            description: >
              After decryption, the FCP payload is plaintext SCSI data.
              Deduplication compares against existing data — works normally.
              Compression operates on plaintext — full ratio achieved.
              Ransomware detection inspects plaintext write patterns — not blind.
              None of these services are impaired. This is only possible because
              decryption happens at the HBA ASIC, before data reaches the array controller.
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

  # ── RE-KEY ──────────────────────────────────────────────────────────────────

  - id: "rekey_event"
    name: "Automatic Re-Key — Session Key Refresh (No I/O Interruption)"
    description: >
      After the rekey_interval (3600 seconds in this scenario), the SecureHBAs
      automatically negotiate a new session key. A new DH-CHAP exchange produces
      a new K, IKEv2-based key derivation produces a new session key, and a new SA (SA_ID = 0xA2) is
      established. Frames in flight under SA 0xA1 complete normally. New frames
      use SA 0xA2. SA 0xA1 is retired after a brief overlap window.

      This is entirely automatic — no administrator action, no I/O pause,
      no application awareness. The Emulex SAN Manager displays re-key
      deadlines per port for compliance auditing.
    from: "host"
    to: "array"
    via: ["switch"]
    timestamp_ns: 3601000000
    total_bytes: 0
    color: "#2980b9"
    headers:
      - name: "Re-Key Event"
        abbrev: "rekey"
        layer: 4
        fields:
          - name: "Trigger"
            abbrev: "rekey.trigger"
            bits: 0
            value: "SA_ID=0xA1 rekey_interval expired (3600s)"
            description: "SecureHBA hardware timer fires. Re-key initiated automatically."
          - name: "Process"
            abbrev: "rekey.process"
            bits: 0
            value: "New DHCHAP_Challenge → DHCHAP_Reply → SA_INIT → SA_AUTH (SA_ID=0xA2)"
            description: >
              A full new DH-CHAP + SA exchange runs while I/O continues under
              SA 0xA1. New session key loaded into encryption engine as SA 0xA2.
              Switch point from 0xA1 to 0xA2 is atomic at the hardware level.
          - name: "I/O Impact"
            abbrev: "rekey.impact"
            bits: 0
            value: "ZERO — no pause, no retransmit, no application awareness"
            description: >
              The re-key is transparent to the OS, HBA driver, and application.
              Multi-path software (PowerPath, MPIO, DM-Multipath) is unaffected —
              re-keying happens at the FC port level, below the multipath layer.
          - name: "New SA"
            abbrev: "rekey.new_sa"
            bits: 0
            value: "SA_ID=0xA2, new AES-256-GCM key, Seq counter reset to 1"
            description: "Fresh 256-bit session key derived from new K. Key derivation per IKEv2 (RFC 7296) with FC-specific PRF."
      - name: "FC-2 Frame Header (Routing — always plaintext)"
        abbrev: "fc2"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc2.rctl"
            bits: 8
            value: "0x22"
            description: "Routing Control — Extended Link Service, unsolicited control"
          - name: "D_ID"
            abbrev: "fc2.did"
            bits: 24
            value: "0x020100"
            description: "Destination N_Port ID — array target port. ALWAYS PLAINTEXT — the switch routes on this field."
          - name: "CS_CTL"
            abbrev: "fc2.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc2.sid"
            bits: 24
            value: "0x010200"
            description: "Source N_Port ID — host HBA port. Always plaintext."
          - name: "TYPE"
            abbrev: "fc2.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
          - name: "F_CTL"
            abbrev: "fc2.fctl"
            bits: 24
            value: "0x290000"
            description: "Frame Control — exchange originator, first+last sequence"
          - name: "SEQ_ID"
            abbrev: "fc2.seqid"
            bits: 8
            value: "0x00"
            description: "Sequence ID within this exchange"
          - name: "DF_CTL"
            abbrev: "fc2.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc2.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc2.oxid"
            bits: 16
            value: "0x0013"
            description: "Originator Exchange ID"
          - name: "RX_ID"
            abbrev: "fc2.rxid"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID"
          - name: "Parameter"
            abbrev: "fc2.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

timeline:
  - id: "context"
    type: "annotation"
    t_ns: 0
    annotation:
      text: "Starting Point: PLOGI Complete, Encryption Not Yet Active"
      detail: >
        FLOGI, fabric registration (FLOGI → Name Server registration), and PLOGI
        are already done — see the FC Fabric: FLOGI → PLOGI → PRLI → SCSI I/O
        scenario for those steps. Both endpoints have exchanged WWNs and N_Port IDs.
        PLOGI ACC service parameters included the FC-SP-3 security capability bit
        on both sides. The SecureHBA on the host detects this match and initiates
        authentication automatically. No administrator action required.
        Current state: connected but NOT authenticated, NOT encrypted.

  - id: "plogi_ctx"
    type: "frame_tx"
    t_ns: 0
    frame_id: "plogi_complete_context"
    annotation:
      text: "PLOGI Complete — N_Port Login Already Done"
      detail: >
        N_Port Login (PLOGI) has already completed between host and array —
        see the FC Fabric scenario for those steps. Both SecureHBAs advertised
        the FC-SP-3 security capability bit in their PLOGI ACC service parameters.
        The host's SecureHBA detects this mutual capability match and automatically
        initiates authentication. No administrator action required. Note the
        N_Port IDs: host=0x010200, array=0x020100 — these will be S_ID and D_ID
        in every subsequent frame.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "AUTH_IDLE → initiating AUTH_Negotiate"
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              frame_type: "plaintext (pre-SA)"
              sa_id: "none"
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "AUTH_IDLE → awaiting AUTH_Negotiate"
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              payload_visibility: "VISIBLE (pre-encryption)"

  - id: "auth_neg"
    type: "frame_tx"
    t_ns: 1000
    frame_id: "auth_negotiate"
    annotation:
      text: "AUTH_Negotiate — Propose Authentication Parameters"
      detail: >
        AUTH_Negotiate proposes the authentication parameters.
        Two choices define the auth posture: SHA-512 for hashing
        (CNSA 2.0 compliant) and DH Group 4 (2048-bit MODP) for classical
        Diffie-Hellman key agreement. Cipher negotiation (AES-256-GCM) happens
        later in SA_INIT, not here.
        The ELS command code 0x90 shows how FC-SP-3 rides on top of FC's
        existing Extended Link Service infrastructure — no new frame types
        are needed.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "AUTH_NEGOTIATE sent"
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "AUTH_NEGOTIATE received — evaluating"

  - id: "auth_neg_rsp"
    type: "frame_tx"
    t_ns: 6000
    frame_id: "auth_neg_rsp"
    annotation:
      text: "Auth_Negotiate_RSP — SHA-512 + DH Group 4 Agreed"
      detail: >
        The array accepts all proposed parameters. From this point, both sides
        know exactly which algorithms they will use — no negotiation surprises
        later. The array generates its DH key pair for the negotiated DH Group 4
        (2048-bit MODP) in preparation for the DH-CHAP challenge exchange.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "Auth_Negotiate_RSP — SHA-512 + DH Group 4 agreed"
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "Auth_Negotiate_RSP sent — generating DH key pair"

  - id: "dhchap_challenge"
    type: "frame_tx"
    t_ns: 7000
    frame_id: "dhchap_challenge"
    annotation:
      text: "DH-CHAP Challenge — Challenge Nonce + DH Public Value"
      detail: >
        The DH-CHAP Challenge carries two critical payloads: a 128-bit CHAP
        challenge nonce (proves liveness) and the target's DH public value
        g^b mod p (for the negotiated DH Group 4). The host must now generate
        its own DH key pair and compute the shared secret K = g^(ab) mod p.
        In a SecureHBA, this computation runs entirely in the ASIC — the host
        CPU never touches key material.
    state_after:
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "DHCHAP_Challenge sent — awaiting DH public value + CHAP response"
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "DHCHAP_Challenge received — computing DH shared secret"

  - id: "dhchap_reply"
    type: "frame_tx"
    t_ns: 8500
    frame_id: "dhchap_reply"
    annotation:
      text: "DH-CHAP Reply — Initiator DH Public Value + CHAP Response"
      detail: >
        DHCHAP_Reply carries three payloads: the initiator's DH public value
        g^a mod p (enabling both sides to derive K = g^(ab) mod p), the CHAP
        response (a SHA-512 hash proving the host derived K correctly),
        and a reverse challenge nonce for mutual authentication. The host CPU
        never sees K — everything runs in the SecureHBA ASIC hardware.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "DHCHAP_Reply sent — K derived via DH, reverse challenge issued"
              session_key: "K derived (ASIC only — never exposed to host CPU)"
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "DHCHAP_Reply received — computing DH shared secret + verifying CHAP"

  - id: "dhchap_success"
    type: "frame_tx"
    t_ns: 14000
    frame_id: "dhchap_success"
    annotation:
      text: "DH-CHAP Success — Mutual Authentication Complete"
      detail: >
        Mutual authentication is complete. Both endpoints independently hold
        the same shared secret K = g^(ab) mod p — never transmitted in
        plaintext on the wire. The array's DHCHAP_Success carries its CHAP
        response to the host's reverse challenge, proving the array also
        holds K. An eavesdropper cannot derive K from the DH public values
        alone (Computational Diffie-Hellman assumption).
    state_after:
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "DHCHAP_Success — MUTUAL AUTH COMPLETE"
              session_key: "K derived (ASIC only)"
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "DHCHAP_Success received — verifying reverse response — PASS"

  - id: "sa_init"
    type: "frame_tx"
    t_ns: 15000
    frame_id: "sa_init"
    annotation:
      text: "SA_Init — Security Association Proposal"
      detail: >
        SA_Init formalizes the Security Association: SA_ID=0xA1 (identifies
        the SA in every subsequent ESP header), transform=AES-256-GCM,
        256-bit session key derived from K (key derivation per IKEv2 RFC 7296), re-key
        interval=3600 seconds. The scope covers ALL frames between these
        two N_Ports — regardless of FC-4 protocol or application workload.
        Zero per-application configuration needed.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "SA_Init sent — deriving session key"
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              sa_id: "0xA1 (pending ACC)"
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "SA_Init received — deriving session key"

  - id: "sa_init_reverse"
    type: "frame_tx"
    t_ns: 17000
    frame_id: "sa_init_reverse"
    annotation:
      text: "SA_INIT (Reverse Direction) — Array Sends SA_INIT to Host"
      detail: >
        SA_INIT (reverse direction) — the array now sends its own SA_INIT
        to the host. SA Establishment requires SA_INIT and SA_AUTH in both
        directions to establish bidirectional Security Associations.
    state_after:
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "SA_Init (reverse) sent — establishing bidirectional SA"

  - id: "sa_auth_reverse"
    type: "frame_tx"
    t_ns: 19000
    frame_id: "sa_auth_reverse"
    annotation:
      text: "SA_AUTH (Reverse Direction) — Host Confirms Reverse SA"
      detail: >
        SA_AUTH (reverse direction) — host sends SA_AUTH to complete the
        bidirectional SA establishment. Both directions now have active
        Security Associations.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "SA_AUTH (reverse) sent — bidirectional SA complete"

  - id: "sa_auth"
    type: "frame_tx"
    t_ns: 21000
    frame_id: "sa_auth"
    annotation:
      text: "SA_AUTH — Security Association Active, Encryption ON"
      detail: >
        Security Association is live. Both SecureHBA ASICs load the 256-bit
        session key. Watch the OSI panel: host and array now show
        encryption_active=true. The switch's payload_visibility changes to
        OPAQUE — it reads FC headers (D_ID, S_ID) for routing but sees only
        ciphertext beyond the ESP header. Total elapsed from PLOGI to full
        encryption: ~21 us, dominated by two network round-trips.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 0
            name: "FC-0 Physical"
            state_fields:
              encryption_active: true
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              frame_type: "AES-256-GCM encrypted"
              sa_id: "0x000000A1"
              sequence_number: 0
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              auth_state: "COMPLETE — encryption ACTIVE"
              session_key: "AES-256-GCM/256bit (SA 0xA1)"
              rekey_deadline: "T+3600s"
      - actor_id: "array"
        layers:
          - layer: 0
            name: "FC-0 Physical"
            state_fields:
              decryption_active: true
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              frame_type: "receiving AES-256-GCM encrypted"
              sa_id: "0x000000A1"
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "COMPLETE — decryption ACTIVE"
              data_services: "ACTIVE — dedupe/compress/ransomware-detect on plaintext post-decrypt"
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              payload_visibility: "OPAQUE — switch routes on FC header only"

  - id: "encryption_live"
    type: "annotation"
    t_ns: 21500
    annotation:
      text: "Encryption Active — From Here, All FC Frames Are AES-256-GCM Encrypted"
      detail: >
        Total time from PLOGI completion to encryption active: ~21 µs
        (dominated by 2 network round-trips for DH-CHAP + SA exchange).
        The IT administrator configured nothing. The application knows nothing.
        The switch is unaware. Multipath software is unaffected.
        From this point: every FC frame (PRLI, FCP commands, FCP data,
        FCP responses, NVMe/FC capsules) is encrypted end-to-end between
        the two SecureHBA ASICs.

  - id: "prli_encrypted"
    type: "frame_tx"
    t_ns: 22000
    frame_id: "prli_encrypted"
    annotation:
      text: "PRLI (Process Login) — First Encrypted Frame"
      detail: >
        This is the first encrypted frame on the link. PRLI establishes the
        FCP process association, but now travels encrypted. The FC header
        (R_CTL, D_ID, S_ID, F_CTL, OX_ID/RX_ID) remains plaintext — the
        switch reads D_ID=0x020100 and routes normally. After the FC header,
        the ESP_Header follows: SA_ID=0xA1, Seq=1 starts anti-replay, and
        a unique IV ensures no two frames share the same nonce. The PRLI
        body is AES-256-GCM ciphertext.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              sequence_number: 1
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              routing_mode: "D_ID routing — payload opaque to switch"
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "PRLI decrypted — FCP/NVMe session parameters received"

  - id: "prli_acc_encrypted"
    type: "frame_tx"
    t_ns: 27000
    frame_id: "prli_acc_encrypted"
    annotation:
      text: "PRLI ACC — FCP Process Association Established (Encrypted)"
      detail: >
        The array accepts PRLI and declares itself as an FCP target. The
        PRLI ACC response is also encrypted under SA 0xA1 — the switch
        cannot determine whether process login succeeded or failed. With
        PRLI complete, FCP commands (SCSI I/O) can now flow. Every frame
        in both directions is AES-256-GCM encrypted. ESP Seq=2 — only the
        second encrypted frame, confirming the SA was just established.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              fcp_state: "PRLI ACC received — FCP READY"
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              sequence_number: 2
      - actor_id: "array"
        layers:
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              fcp_state: "PRLI ACC sent — FCP target READY"

  - id: "fcp_write_encrypted"
    type: "frame_tx"
    t_ns: 30000
    frame_id: "fcp_write_encrypted"
    annotation:
      text: "FCP_CMND: WRITE(10) — Command Only, Awaiting XFER_RDY"
      detail: >
        The host sends an FCP_CMND containing the SCSI WRITE(10) CDB — this
        is the command only, not the write data. The host must wait for the
        array to respond with FCP_XFER_RDY before it can send any data. The
        FC header is structurally identical to any unencrypted frame: R_CTL=0x06,
        TYPE=0x08 (FCP) — all plaintext. The switch reads D_ID for routing and
        nothing else. ESP encryption covers the 32-byte FCP_CMND IU. Seq=1847
        tells us nearly two thousand frames have already been encrypted under
        this Security Association.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              sequence_number: 1847
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              payload_visibility: "OPAQUE — ciphertext only"
      - actor_id: "array"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              frame_type: "receiving encrypted FCP_CMND"

  - id: "fcp_xfer_rdy_encrypted"
    type: "frame_tx"
    t_ns: 32000
    frame_id: "fcp_xfer_rdy_encrypted"
    annotation:
      text: "FCP_XFER_RDY — Transfer Ready (Encrypted)"
      detail: >
        The array sends FCP_XFER_RDY, granting the host permission to send
        up to 4096 bytes of write data. This flow control mechanism is
        unique to FC writes — the host cannot send data until the target
        has allocated buffer space. Reads do not require XFER_RDY. Even
        this flow control frame is encrypted under SA 0xA1 — the switch
        sees only ciphertext. ESP Seq=1848 follows immediately after the
        WRITE command's Seq=1847.
    state_after:
      - actor_id: "array"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              frame_type: "sent encrypted FCP_XFER_RDY"
      - actor_id: "host"
        layers:
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              sequence_number: 1848

  - id: "fcp_data_encrypted"
    type: "frame_tx"
    t_ns: 34000
    frame_id: "fcp_data_encrypted"
    annotation:
      text: "FCP_DATA: WRITE(10) — Encrypted Write Data (2112 bytes)"
      detail: >
        After receiving XFER_RDY, the host sends the actual write data in an
        FCP_DATA IU. This is the 2048-byte SCSI block payload plus FC overhead,
        totaling 2112 bytes — the data transfer that was NOT included in the
        earlier FCP_CMND. R_CTL=0x01 (Solicited Data) distinguishes this from
        the command frame (R_CTL=0x06). Same OX_ID=0x0020 ties it to the same
        exchange. ESP Seq=1849 follows XFER_RDY's 1848. The write data is
        AES-256-GCM encrypted — the switch and any tap cannot read a single
        byte of the data being written to disk.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              sequence_number: 1849
              frame_type: "sent FCP_DATA — write data transferred"
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              payload_visibility: "OPAQUE — 2112 bytes of ciphertext"
      - actor_id: "array"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              frame_type: "receiving encrypted FCP_DATA"

  - id: "fcp_rsp_encrypted"
    type: "frame_tx"
    t_ns: 36000
    frame_id: "fcp_rsp_encrypted"
    annotation:
      text: "FCP_RSP: WRITE(10) Good — Exchange Complete (Encrypted)"
      detail: >
        The array sends FCP_RSP with SCSI Status GOOD, completing the four-frame
        FCP WRITE exchange: FCP_CMND → FCP_XFER_RDY → FCP_DATA → FCP_RSP.
        R_CTL=0x07 (Command Status), F_CTL=0x990000 (responder, last seq, end seq,
        SI transfer) — the exchange is now closed. SEQ_ID=0x03 is the fourth
        sequence in the exchange. ESP Seq=1850 follows FCP_DATA's 1849.
        Like every frame, encrypted under SA 0xA1.
    state_after:
      - actor_id: "array"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              frame_type: "sent encrypted FCP_RSP — exchange closed"
      - actor_id: "host"
        layers:
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              sequence_number: 1850
              frame_type: "FCP WRITE complete — GOOD status"

  - id: "array_decrypt"
    type: "annotation"
    t_ns: 35000
    annotation:
      text: "Array Decryption → Plaintext to Data Services"
      detail: >
        Array-side decryption in the SecureHBA ASIC: SA_ID lookup →
        anti-replay check on Seq → AES-256-GCM tag verification → decrypt →
        plaintext FCP_RSP to FC driver. The array controller then applies
        data services — deduplication, compression, ransomware detection — on
        the plaintext write data. This is the key architecture: array data
        services are fully preserved because decryption happens at the HBA
        ASIC before data reaches the controller.
    state_after:
      - actor_id: "array"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              frame_type: "decrypted — plaintext to FC driver"
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              data_services: "ACTIVE — dedupe hash computed, compress ratio applied, ransomware scan complete"

  - id: "rekey"
    type: "annotation"
    t_ns: 3601000000
    annotation:
      text: "Automatic Re-Key — Session Key Refresh (No I/O Interruption)"
      detail: >
        Automatic re-key fires after the 3600-second interval. A new DH-CHAP
        + SA exchange runs while I/O continues under SA 0xA1. When the new
        SA 0xA2 is established, both ASICs switch seamlessly — no frames are
        dropped, no I/O stalls. Zero administrator involvement, zero
        application awareness.
    state_after:
      - actor_id: "host"
        layers:
          - layer: 2
            name: "FC-2 Framing / Transport"
            state_fields:
              sa_id: "0x000000A2 (new SA)"
              sequence_number: 0
          - layer: 4
            name: "FC-4 Protocol Mapping"
            state_fields:
              session_key: "AES-256-GCM/256bit (SA 0xA2 — fresh key)"
              rekey_deadline: "T+7200s"
      - actor_id: "array"
        layers:
          - layer: 2
            name: "FC-2 Framing"
            state_fields:
              sa_id: "0x000000A2"
          - layer: 4
            name: "FC-4 / Data Services"
            state_fields:
              auth_state: "RE-KEY COMPLETE — SA 0xA1 retired, SA 0xA2 active"

glossary:
  - term: "FC-SP-3"
    abbrev: "FC-SP-3"
    definition: >
      Fibre Channel Security Protocols version 3. The INCITS T11 standard defining
      authentication protocols, Security Association management, and frame-level
      encryption for Fibre Channel. FC-SP-3 extends FC-SP-2 by adding AES-256-GCM
      encryption and the SA Establishment protocol (SA_INIT + SA_AUTH), which
      supports post-quantum key exchange (ML-KEM-1024) separately from DH-CHAP.
      DH-CHAP continues to use classical Diffie-Hellman for authentication.
    spec_refs:
      - document: "FC-SP-3 (INCITS draft)"
        section: "all"
        title: "Fibre Channel Security Protocols 3"

  - term: "DH-CHAP"
    abbrev: "DH-CHAP"
    definition: >
      Diffie-Hellman Challenge Handshake Authentication Protocol. An optional
      authentication protocol in FC-SP. Combines CHAP (challenge-response
      authentication using a shared secret) with classical Diffie-Hellman
      key agreement. Provides mutual authentication:
      both endpoints prove their identity before any key material is used.
      Note: DH-CHAP uses classical DH only; post-quantum key establishment
      (ML-KEM) is handled separately by the SA Establishment protocol
      (SA_INIT + SA_AUTH).
    spec_refs:
      - document: "FC-SP-2"
        section: "5.3"
        title: "DH-CHAP"

  - term: "ML-KEM-1024"
    abbrev: "ML-KEM"
    definition: >
      Module-Lattice-Based Key Encapsulation Mechanism, security parameter 1024.
      FIPS 203 (2024) standard. A post-quantum key encapsulation mechanism based
      on the Module Learning With Errors (MLWE) problem. Replaces classical
      ECDH/RSA for key establishment. Resistant to Shor's algorithm on a
      quantum computer. Key sizes: 1568-byte encapsulation key, 1568-byte
      ciphertext, 32-byte shared secret.
    spec_refs:
      - document: "FIPS 203"
        section: "all"
        title: "ML-KEM"
        url: "https://csrc.nist.gov/pubs/fips/203/final"

  - term: "AES-256-GCM"
    abbrev: "AES-256-GCM"
    definition: >
      Advanced Encryption Standard with 256-bit key in Galois/Counter Mode.
      GCM provides authenticated encryption: confidentiality (ciphertext hides
      plaintext) and integrity (128-bit authentication tag detects tampering).
      Approved in CNSA 1.0 and CNSA 2.0 for protecting information up to
      TOP SECRET. The symmetric cipher used for FC frame payload encryption
      in the SecureHBA.

  - term: "ESP_Header"
    abbrev: "ESP"
    definition: >
      Encapsulating Security Payload header. Inserted between the FC frame header
      and the encrypted payload. Contains SA_ID (identifies the Security Association
      and session key), sequence number (anti-replay), and initialization vector (IV).
      The FC frame header remains plaintext — the switch routes on it normally.
      Analogous to the IPsec ESP header but adapted for the FC frame format.
    spec_refs:
      - document: "FC-SP-2"
        section: "6.2"
        title: "ESP_Header format"

  - term: "Security Association (SA)"
    abbrev: "SA"
    definition: >
      A unidirectional security context between two FC endpoints. Defines the
      session key, cipher algorithm, SA_ID, anti-replay window, and re-key schedule.
      Both the initiator and target must have a matching SA loaded to communicate.
      SA establishment follows successful DH-CHAP authentication.
    spec_refs:
      - document: "FC-SP-2"
        section: "5.4"
        title: "Security Association Management"

  - term: "EDIF"
    abbrev: "EDIF"
    definition: >
      Encryption of Data In Flight. Generic term for encrypting data as it
      traverses a storage fabric, as opposed to Data At Rest (DAR) encryption
      on the storage media. The SecureHBA provides EDIF at the FC frame level —
      between the HBA ASIC on the host and the HBA ASIC on the array port.

  - term: "CNSA 2.0"
    abbrev: "CNSA 2.0"
    definition: >
      Commercial National Security Algorithm Suite 2.0. Published by the NSA
      in September 2022. Specifies quantum-resistant cryptographic algorithms
      for National Security Systems (NSS — DoD, Intelligence Community, classified
      systems). Adds ML-KEM-1024 for key establishment and ML-DSA-87 for
      digital signatures. AES-256 and SHA-384/512 carry over from CNSA 1.0.
      CNSA 2.0 is mandatory for NSS; commercial enterprises benefit from
      the same algorithms but are not directly mandated by CNSA 2.0 itself.
    spec_refs:
      - document: "NSA CNSA 2.0"
        section: "all"
        url: "https://media.defense.gov/2022/Sep/07/2003071836/-1/-1/0/CSA_CNSA_2.0_ALGORITHMS_.PDF"

  - term: "Key Derivation (SA Establishment)"
    abbrev: "KDF"
    definition: >
      SA Establishment uses IKEv2 (RFC 7296) with FC-specific extensions for key
      derivation. The AES-256-GCM session key is derived from the shared secret K
      produced by the DH-CHAP exchange (or by SA Establishment for post-quantum
      scenarios). Key derivation per IKEv2 (RFC 7296) with FC-specific PRF.
      Simplified for illustration — actual parameters per FC-SP-3 draft.

  - term: "Re-key"
    abbrev: "rekey"
    definition: >
      Periodic replacement of the session key with a freshly derived one.
      Limits the amount of data encrypted under any single key (limiting
      cryptanalytic exposure) and provides forward secrecy for past sessions.
      The SecureHBA performs re-key automatically on a configurable interval
      (default: 1 hour) with no I/O interruption.

walkthroughs:
  - id: "authentication-flow"
    title: "The Authentication Flow — From PLOGI to Encrypted"
    description: "Trace the complete FC-SP-3 handshake from post-PLOGI to first encrypted frame."
    steps:
      - step: 0
        narration: >
          PLOGI is complete. Both SecureHBAs advertised the FC-SP-3 security capability
          bit in their PLOGI ACC service parameters. The host SecureHBA sees this match
          and begins AUTH_Negotiate automatically. No administrator action.
          Note the N_Port IDs — these will be the D_ID and S_ID in every subsequent frame.
        highlight_fields: ["ctx.sid", "ctx.did", "ctx.fcsp3"]
      - step: 1
        narration: >
          AUTH_Negotiate proposes the authentication parameters. Note the two key
          choices: SHA-512 for hashing (CNSA 2.0 compliant) and DH Group 4
          (2048-bit MODP) for classical Diffie-Hellman key agreement. Cipher
          negotiation (AES-256-GCM) happens later in SA_INIT, not here. Also
          note the ELS command code 0x90 — this is how FC-SP-3 rides on top of
          FC's Extended Link Service infrastructure.
        highlight_fields: ["els.cmd", "auth_neg.hash0", "auth_neg.dhgroup", "auth_neg.wwn"]
      - step: 2
        narration: >
          Array accepts all proposed parameters. From this point, both sides know
          exactly what algorithms they'll use. No negotiation surprises later.
        highlight_fields: ["auth_neg_rsp.hash", "auth_neg_rsp.dhgroup"]
      - step: 3
        narration: >
          The DH-CHAP Challenge carries two things: a 128-bit CHAP challenge nonce
          AND the target's DH public value g^b mod p (for the negotiated DH Group 4).
          The challenge proves liveness; the DH public value enables the shared secret
          derivation. The host generates its own DH key pair in ASIC hardware.
        highlight_fields: ["dhchap_c.msg", "dhchap_c.chall", "dhchap_c.dhval"]
      - step: 4
        narration: >
          DHCHAP_Reply carries the initiator's DH public value g^a mod p (enabling both
          sides to derive K = g^(ab) mod p), the CHAP response proving the initiator
          knows K, and a reverse challenge (mutual auth — the initiator also challenges
          the target). The host CPU never sees K. All of this runs in the SecureHBA ASIC.
        highlight_fields: ["dhchap_r.dhval", "dhchap_r.resp", "dhchap_r.rev_chall"]
      - step: 5
        narration: >
          DHCHAP_Success: mutual authentication complete. Both endpoints have verified
          each other's identity and hold the same shared secret K = g^(ab) mod p —
          derived independently, never transmitted in plaintext. An eavesdropper
          cannot derive K from the DH public values alone.
        highlight_fields: ["dhchap_s.resp", "dhchap_s.result"]
      - step: 6
        narration: >
          SA_Init formalizes the Security Association: SA_ID=0xA1, AES-256-GCM,
          256-bit key derived from K (key derivation per IKEv2 RFC 7296), re-key interval 3600s.
          Note the scope — ALL frames, regardless of application or workload.
          Zero per-application configuration.
        highlight_fields: ["sa_init.said", "sa_init.xform", "sa_init.keylen", "sa_init.rekey", "sa_init.scope"]
      - step: 7
        narration: >
          SA_AUTH: Security Association is live. Both ASICs load the session key.
          Observe the OSI panel: FC-0 Physical now shows encryption_active=true on both
          host and array. The switch's payload_visibility changes to OPAQUE.
          Total time from PLOGI to encrypted: ~21 µs.
        highlight_fields: ["sa_auth.said", "sa_auth.status"]

  - id: "encrypted-frame-anatomy"
    title: "Anatomy of an Encrypted FC Frame"
    description: "Dissect a live encrypted FCP WRITE frame — what each layer sees."
    steps:
      - step: 10
        narration: >
          We're now post-SA_AUTH. PRLI runs encrypted — this is the first encrypted
          frame. The FC header (R_CTL, D_ID, S_ID, F_CTL, OX_ID/RX_ID) is ALWAYS
          plaintext. The switch reads D_ID=0x020100 and routes normally.
          The ESP_Header follows: SA_ID identifies the key, Seq=1 starts anti-replay,
          IV is unique per-frame. The PRLI body is ciphertext.
        highlight_fields: ["fc.prli.did", "fc.prli.sid", "esp.said", "esp.seq", "esp.iv", "prli.enc.tag"]
      - step: 11
        narration: >
          PRLI ACC — the array accepts the FCP process login. This response is also
          encrypted, proving that both directions of the link are protected from the
          first frame onward. The switch cannot determine whether PRLI succeeded or
          failed. With PRLI complete, FCP I/O can now begin.
        highlight_fields: ["fc.prli_acc.did", "fc.prli_acc.sid", "esp.prli_acc.seq", "prli_acc.enc.ct"]
      - step: 12
        narration: >
          An FCP WRITE command. The FC header is identical in structure to any other
          FC frame — R_CTL=0x06 (FC-4 Data), D_ID, S_ID, TYPE=0x08 (FCP). Plaintext.
          The switch reads these fields and routes. The switch.sees annotation shows
          exactly what the switch has visibility to — D_ID for routing, nothing else.
          Seq=1847 tells us 1846 frames have already been encrypted in this session.
        highlight_fields: ["fc.fcp.rctl", "fc.fcp.did", "fc.fcp.type", "fc.fcp.esp.seq", "fcp.enc.ct", "sw.vis.sees"]
      - step: 13
        narration: >
          FCP_XFER_RDY — the array grants the host permission to send write data.
          This flow control step is unique to FC writes (reads skip it). Even this
          internal flow control frame is encrypted — the switch sees only ciphertext.
          Seq=1848 follows immediately after the WRITE command's Seq=1847.
        highlight_fields: ["fc.xr.rctl", "fc.xr.esp.seq", "xr.enc.ct"]
      - step: 14
        narration: >
          FCP_DATA — the host sends the actual write data (2112 bytes). This is the
          payload that was NOT in the FCP_CMND. R_CTL=0x01 (Solicited Data) vs.
          the command's R_CTL=0x06 (Unsolicited Command). Same OX_ID=0x0020 ties it
          to the same exchange. Seq=1849 follows XFER_RDY's 1848. The write data is
          AES-256-GCM encrypted — the switch sees 2112 bytes of ciphertext and cannot
          read a single byte of the data being written to disk.
        highlight_fields: ["fc.fcd.rctl", "fc.fcd.oxid", "fc.fcd.esp.seq", "fcd.enc.ct"]
      - step: 15
        narration: >
          FCP_RSP — the array sends the command status to close the exchange.
          R_CTL=0x07 (Command Status), F_CTL=0x990000 (responder, last seq, end seq,
          SI transfer). SEQ_ID=0x03 marks this as the fourth sequence in the FCP WRITE
          exchange (CMND=0, XFER_RDY=1, DATA=2, RSP=3). SCSI Status GOOD (0x00) —
          the write completed successfully. The exchange is now closed.
          ESP Seq=1850 follows FCP_DATA's 1849.
        highlight_fields: ["fc.rsp.rctl", "fc.rsp.fctl", "fc.rsp.seqid", "fc.rsp.esp.seq", "rsp.enc.ct"]
      - step: 16
        narration: >
          Array-side decryption. SA_ID lookup → anti-replay check → GCM tag verification
          → AES-256-GCM decrypt → plaintext FCP_DATA to FC driver. Note the data
          services field: dedupe, compress, and ransomware detection all operate
          on plaintext write data. This is the architectural point —
          array data services are fully preserved because decryption happens
          at the HBA ASIC before data reaches the array controller.
        highlight_fields: []
      - step: 17
        narration: >
          Re-key fires automatically after 3600s. A new DH-CHAP + SA exchange runs
          while I/O continues under SA 0xA1. New SA 0xA2 is loaded; I/O is seamless.
          The Emulex SAN Manager shows re-key deadlines per port for compliance auditing.
          Zero administrator involvement, zero I/O interruption.
        highlight_fields: []
      - step: 18
        narration: >
          NOTE: This scenario is under review with Broadcom FC-SP-3 maintainers
          (James Smart and team) for technical accuracy. Key corrections applied
          based on expert feedback: DH-CHAP uses classical Diffie-Hellman only
          (not ML-KEM); ML-KEM-1024 is handled by the separate SA Establishment
          protocol (SA_INIT + SA_AUTH); the response to AUTH_Negotiate is
          Auth_Negotiate_RSP (not ACC); and the SA Establishment sequence uses
          SA_INIT + SA_AUTH (not SA_Setup). Frame-level details may be further
          refined as the FC-SP-3 draft progresses through INCITS T11.
        highlight_fields: []
