            abbrev: "dhchap_s.msg"
            bits: 8
            value: "0x22"
            description: "0x22 = DHCHAP_Success. Authentication complete."
          - name: "Reverse_Challenge_Response (64 bytes)"
            abbrev: "dhchap_s.resp"
            bits: 512
            value: "[HMAC-SHA-512(K || reverse_challenge || target_WWN || initiator_WWN)]"
            description: >
              Target proves it knows K by responding correctly to the initiator's
              reverse challenge. On receipt, the initiator verifies this HMAC.
              If valid, mutual authentication is complete: both endpoints have
              proven their identity and both hold the same K.
          - name: "Authentication Result"
            abbrev: "dhchap_s.result"
            bits: 0
            value: "MUTUAL AUTH COMPLETE — both endpoints verified"
            description: >
              At this point: both WWNs are verified, shared secret K is established,
              and no pre-shared password was transmitted on the wire.
              The switch saw only opaque ELS payload bytes — it played no role
              in authentication and learned nothing from these exchanges.
