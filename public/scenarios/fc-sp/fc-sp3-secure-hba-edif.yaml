  - id: "dhchap_success"
    name: "DH-CHAP Success — Mutual Authentication Complete"
    description: >
      The target has verified the initiator's CHAP_Response, recovered K
      via ML-KEM.Decaps, and now sends DHCHAP_Success carrying its own
      response to the reverse challenge. Both sides have verified each other's
      identity. K is now a shared secret known only to the two SecureHBA ASICs.

      Next step: derive the AES-256-GCM session key from K using HKDF-SHA-512.
    from: "array"
    to: "host"
    via: ["switch"]
    timestamp_ns: 14000
    total_bytes: 80
    color: "#27ae60"
    headers:
      - name: "DHCHAP_Success PDU"
        abbrev: "dhchap_s"
        layer: 4
