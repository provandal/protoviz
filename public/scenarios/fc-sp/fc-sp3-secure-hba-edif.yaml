  # ── DH-CHAP Challenge ────────────────────────────────────────────────────────

  - id: "dhchap_challenge"
    name: "DH-CHAP Challenge + ML-KEM Encapsulation Key"
    description: >
      The target (responder) sends the DH-CHAP Challenge. In FC-SP-3 with
      ML-KEM, this frame carries both the CHAP challenge value AND the
      ML-KEM-1024 encapsulation key (the target's public key material).

      The initiator will use this encapsulation key to generate the shared
      secret: it runs ML-KEM Encaps(encapsulation_key) → (ciphertext, shared_secret).
      The shared_secret becomes the basis for the session key.

      This replaces the classical DH exchange: instead of both sides computing
      g^(ab) mod p, the initiator encapsulates a random secret that only
      the target (holding the corresponding decapsulation key) can recover.
    from: "array"
    to: "host"
    via: ["switch"]
    timestamp_ns: 7000
    total_bytes: 1600
    color: "#c0392b"
    headers:
      - name: "DH-CHAP Challenge PDU"
        abbrev: "dhchap_c"
        layer: 4
        fields:
          - name: "Auth_Msg_Code"
            abbrev: "dhchap_c.msg"
            bits: 8
            value: "0x20"
            description: "0x20 = DHCHAP_Challenge message code."
            spec_refs:
              - document: "FC-SP-2"
                section: "5.3.2"
                title: "DHCHAP_Challenge"
          - name: "Challenge_Value (16 bytes)"
            abbrev: "dhchap_c.chall"
            bits: 128
            value: "0xF4A2B8C1D3E09F715A6B2C8D4E3F1A09"
            description: >
              Random 128-bit challenge nonce generated by the target.
              The initiator must respond with HMAC-SHA-512(shared_secret,
              challenge_value || initiator_WWN || target_WWN).
              This proves the initiator knows the shared secret without
              transmitting it.
          - name: "ML-KEM-1024 Encapsulation Key (1568 bytes)"
            abbrev: "dhchap_c.ek"
            bits: 0
            value: "[1568-byte ML-KEM-1024 encapsulation key]"
            description: >
              ML-KEM-1024 encapsulation key generated by the target.
              Size: 1568 bytes (ML-KEM-1024 public key per FIPS 203).
              The initiator runs ML-KEM.Encaps(ek) to produce:
                - K: 32-byte shared secret (basis for session key)
                - c: 1568-byte ciphertext (sent back in DHCHAP_Reply)

              The target, holding the corresponding decapsulation key (dk),
              will run ML-KEM.Decaps(dk, c) → K to recover the same secret.
              An eavesdropper or quantum computer cannot derive K from ek
              or c — the hardness assumption is Module Learning With Errors (MLWE).
            spec_refs:
              - document: "FIPS 203 (ML-KEM)"
                section: "5"
                title: "ML-KEM.Encaps and ML-KEM.Decaps"
                url: "https://csrc.nist.gov/pubs/fips/203/final"
