  - id: "sa_auth"
    name: "SA_AUTH — Security Association Authenticated & Active"
    description: >
      The target responds with SA_AUTH, completing the SA Establishment
      handshake. Both SecureHBA ASICs now load the derived AES-256-GCM
      session key into their encryption/decryption engines. From this
      point forward, ALL FC frames between this host port and this array
      port are encrypted. The transition is instantaneous and seamless.
    from: "array"
    to: "host"
    via: ["switch"]
    timestamp_ns: 21000
    total_bytes: 32
    color: "#27ae60"
    headers:
      - name: "SA_AUTH"
        abbrev: "sa_auth"
        layer: 4
        fields:
