  # ── SA_Init ──────────────────────────────────────────────────────────────────

  - id: "sa_init"
    name: "SA_Init — Security Association Proposal"
    description: >
      Following successful DH-CHAP, the host sends SA_Init to formally establish
      the Security Association (SA) — the FC-SP-3 equivalent of an IPsec SA.
      The SA defines which FC frames are encrypted, the SA ID (used in
      ESP_Header), and the key derivation parameters.

      The session key is derived from K using HKDF:
        session_key = HKDF-SHA-512(K, salt="FC-ESP-SESSION-KEY", info=SA_ID || wwn_pair)
      This key is 256 bits (AES-256) and exists only in the two SecureHBA ASICs.
    from: "host"
    to: "array"
    via: ["switch"]
    timestamp_ns: 15000
    total_bytes: 64
    color: "#2980b9"
    headers:
      - name: "SA_Init PDU"
        abbrev: "sa_init"
        layer: 4
        fields:
          - name: "Auth_Msg_Code"
            abbrev: "sa_init.msg"
            bits: 8
            value: "0x30"
            description: "0x30 = SA_Init."
            spec_refs:
              - document: "FC-SP-2"
                section: "5.4"
                title: "Security Association Management"
          - name: "SA_ID"
            abbrev: "sa_init.said"
            bits: 32
            value: "0x000000A1"
            description: >
              Security Association identifier. Carried in every ESP_Header
              to tell the receiver which SA (and therefore which key) to use
              for decryption. Analogous to IPsec SPI (Security Parameters Index).
          - name: "Transform: AES-256-GCM"
            abbrev: "sa_init.xform"
            bits: 8
            value: "0x05"
            description: "Cipher confirmed: AES-256-GCM. Provides confidentiality + integrity."
          - name: "Key_Length"
            abbrev: "sa_init.keylen"
            bits: 16
            value: 256
            description: "256-bit AES key derived via HKDF-SHA-512 from K."
          - name: "Rekey_Interval"
            abbrev: "sa_init.rekey"
            bits: 32
            value: 3600
            description: >
              Automatic re-key interval in seconds = 3600 (1 hour). After this
              interval, a new DH-CHAP exchange generates a fresh K and a new
              session key is derived. Re-key happens automatically with no
              I/O interruption — frames already in flight under the old SA
              complete normally; new frames use the new SA.
          - name: "Scope: All FC Frames"
            abbrev: "sa_init.scope"
            bits: 0
            value: "ALL frames on this N_Port pair — FCP + NVMe/FC"
            description: >
              Unlike application-layer encryption, the SA covers ALL FC frames
              on this port pair regardless of upper-layer protocol or application.
              No per-application configuration. No per-volume configuration.
              No certificates to install per workload. Zero setup.
      - name: "FC-2 Frame Header (Routing — always plaintext)"
        abbrev: "fc2"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc2.rctl"
            bits: 8
            value: "0x22"
            description: "Routing Control — Extended Link Service, unsolicited control"
          - name: "D_ID"
            abbrev: "fc2.did"
            bits: 24
            value: "0x020100"
            description: "Destination N_Port ID — array target port. ALWAYS PLAINTEXT — the switch routes on this field."
          - name: "CS_CTL"
            abbrev: "fc2.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc2.sid"
            bits: 24
            value: "0x010200"
            description: "Source N_Port ID — host HBA port. Always plaintext."
          - name: "TYPE"
            abbrev: "fc2.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
          - name: "F_CTL"
            abbrev: "fc2.fctl"
            bits: 24
            value: "0x290000"
            description: "Frame Control — exchange originator, first+last sequence"
          - name: "SEQ_ID"
            abbrev: "fc2.seqid"
            bits: 8
            value: "0x00"
            description: "Sequence ID within this exchange"
          - name: "DF_CTL"
            abbrev: "fc2.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc2.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc2.oxid"
            bits: 16
            value: "0x0012"
            description: "Originator Exchange ID"
          - name: "RX_ID"
            abbrev: "fc2.rxid"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID"
          - name: "Parameter"
            abbrev: "fc2.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

  - id: "sa_setup_acc"
    name: "SA_Setup ACC — Security Association Active"
    description: >
      Target accepts the SA parameters. Both SecureHBA ASICs now load the
      derived AES-256-GCM session key into their encryption/decryption engines.
      From this point forward, ALL FC frames between this host port and
      this array port are encrypted. The transition is instantaneous and seamless.
    from: "array"
    to: "host"
    via: ["switch"]
    timestamp_ns: 21000
    total_bytes: 32
    color: "#27ae60"
    headers:
      - name: "SA_Setup ACC"
        abbrev: "sa_acc"
        layer: 4
        fields:
          - name: "Auth_Msg_Code"
            abbrev: "sa_acc.msg"
            bits: 8
            value: "0x31"
            description: "0x31 = SA_Setup ACC. Security Association is live."
          - name: "SA_ID (confirmed)"
            abbrev: "sa_acc.said"
            bits: 32
            value: "0x000000A1"
            description: "SA ID 0xA1 confirmed. Both sides load session key for this SA_ID."
          - name: "Encryption Status"
            abbrev: "sa_acc.status"
            bits: 0
            value: "ACTIVE — AES-256-GCM on all frames from next FC sequence"
            description: >
              The SecureHBA hardware encryption engine is now armed.
              The next FC sequence (PRLI or first I/O) will be encrypted.
              The switch will see: identical FC headers (D_ID, S_ID, R_CTL),
              but payload bytes that are AES-256-GCM ciphertext.
      - name: "FC-2 Frame Header (Routing — always plaintext)"
        abbrev: "fc2"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc2.rctl"
            bits: 8
            value: "0x23"
            description: "Routing Control — Extended Link Service, solicited control (response)"
          - name: "D_ID"
            abbrev: "fc2.did"
            bits: 24
            value: "0x010200"
            description: "Destination N_Port ID — host HBA port. ALWAYS PLAINTEXT."
          - name: "CS_CTL"
            abbrev: "fc2.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc2.sid"
            bits: 24
            value: "0x020100"
            description: "Source N_Port ID — array target port. Always plaintext."
          - name: "TYPE"
            abbrev: "fc2.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
          - name: "F_CTL"
            abbrev: "fc2.fctl"
            bits: 24
            value: "0x980000"
            description: "Frame Control — exchange responder, first+last sequence"
          - name: "SEQ_ID"
            abbrev: "fc2.seqid"
            bits: 8
            value: "0x01"
            description: "Sequence ID within this exchange"
          - name: "DF_CTL"
            abbrev: "fc2.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc2.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc2.oxid"
            bits: 16
            value: "0x0012"
            description: "Originator Exchange ID"
          - name: "RX_ID"
            abbrev: "fc2.rxid"
            bits: 16
            value: "0x0012"
            description: "Responder Exchange ID"
          - name: "Parameter"
            abbrev: "fc2.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

  # ── PRLI (encrypted) ─────────────────────────────────────────────────────────

  - id: "prli_encrypted"
    name: "PRLI (Process Login) — First Encrypted Frame"
    description: >
      PRLI (Process Login) establishes the FC-4 upper-layer protocol parameters
      (FCP for SCSI, or NVMe/FC). In a non-SecureHBA setup this frame is plaintext.
      With FC-SP-3 active, it is the first frame encrypted under the new SA.

      The FC frame header (R_CTL, D_ID, S_ID, OX_ID, RX_ID) is ALWAYS plaintext.
      The FC payload (PRLI request body) is AES-256-GCM encrypted.
      The ESP_Header is inserted between the FC frame header and the encrypted payload.

      The switch routes this frame identically to any other PRLI — it reads D_ID,
      forwards to the array port. It has no visibility into the PRLI payload.
    from: "host"
    to: "array"
    via: ["switch"]
    timestamp_ns: 22000
    total_bytes: 120
    color: "#8e44ad"
    headers:
      - name: "FC Frame Header (PLAINTEXT — always)"
        abbrev: "fc.prli.hdr"
        layer: 2
        fields:
          - name: "R_CTL"
            abbrev: "fc.prli.rctl"
            bits: 8
            value: "0x22"
            description: "ELS request. Switch reads this to identify frame type for routing."
          - name: "D_ID"
            abbrev: "fc.prli.did"
            bits: 24
            value: "0x020100"
            description: "Array port N_Port ID. PLAINTEXT. Switch routes on this."
          - name: "S_ID"
            abbrev: "fc.prli.sid"
            bits: 24
            value: "0x010200"
            description: "Host N_Port ID. PLAINTEXT."
          - name: "CS_CTL"
            abbrev: "fc.prli.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "TYPE"
            abbrev: "fc.prli.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
          - name: "F_CTL"
            abbrev: "fc.prli.fctl"
            bits: 24
            value: "0x290000"
            description: "Frame Control: first sequence, last sequence, exchange initiator."
          - name: "SEQ_ID"
            abbrev: "fc.prli.seqid"
            bits: 8
            value: "0x00"
            description: "Sequence ID within this exchange"
          - name: "DF_CTL"
            abbrev: "fc.prli.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.prli.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc.prli.oxid"
            bits: 16
            value: "0x0001"
            description: "Originator Exchange ID"
          - name: "RX_ID"
            abbrev: "fc.prli.rxid"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID — not yet assigned"
          - name: "Parameter"
            abbrev: "fc.prli.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "ESP_Header (FC-SP-3 Security Header)"
        abbrev: "esp"
        layer: 2
        fields:
          - name: "SA_ID (SPI equivalent)"
            abbrev: "esp.said"
            bits: 32
            offset_bits: 0
            value: "0x000000A1"
            description: >
              Security Association ID = 0xA1. Tells the receiver which SA
              (and session key) to use for decryption. Both SecureHBA ASICs
              have this SA loaded from the SA_Setup exchange.
            spec_refs:
              - document: "FC-SP-2"
                section: "6.2"
                title: "ESP_Header format"
          - name: "Sequence_Number"
            abbrev: "esp.seq"
            bits: 32
            offset_bits: 32
            value: 1
            description: >
              Anti-replay counter. Incremented for every encrypted frame.
              The receiver maintains a sliding window and rejects any frame
              with a sequence number that has already been seen — prevents
              replay attacks where an adversary retransmits captured frames.
          - name: "Initialization Vector (IV)"
            abbrev: "esp.iv"
            bits: 96
            offset_bits: 64
            value: "0x8F3A21C4 B7D09E15 2A6C8F3B"
            description: >
              96-bit IV for AES-256-GCM. Unique per frame — constructed from
              (SA_ID || sequence_number || random_salt). Reusing an IV with
              the same key is a catastrophic security failure in GCM; the
              SecureHBA hardware ensures uniqueness.
      - name: "Encrypted PRLI Payload (ciphertext)"
        abbrev: "prli.enc"
        layer: 4
        fields:
          - name: "Ciphertext (PRLI body)"
            abbrev: "prli.enc.ct"
            bits: 0
            value: "[AES-256-GCM ciphertext of PRLI request body]"
            description: >
              The PRLI payload (FCP service parameters, NVMe/FC parameters)
              is encrypted. The switch sees random-looking bytes here.
              The array SecureHBA decrypts this using the SA session key
              before passing it to the FCP/NVMe target driver.
          - name: "GCM Authentication Tag (16 bytes)"
            abbrev: "prli.enc.tag"
            bits: 128
            value: "[128-bit AES-GCM integrity tag]"
            description: >
              The 128-bit GCM authentication tag covers both the ESP_Header
              (authenticated but not encrypted) and the ciphertext.
              If any bit of the ciphertext or ESP_Header is modified in transit,
              the tag verification fails and the frame is dropped.
              This provides authenticated encryption — confidentiality AND integrity.
            spec_refs:
              - document: "NIST SP 800-38D"
                section: "5.2"
                title: "GHASH and GCTR — GCM authentication tag"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

  - id: "prli_acc_encrypted"
    name: "PRLI ACC (Process Login Accept) — Encrypted"
    description: >
      The array accepts the FCP process login and responds with PRLI ACC.
      This frame is also encrypted under SA 0xA1. The array declares
      itself as an FCP target, ready to accept SCSI commands.
    from: "array"
    to: "host"
    via: ["switch"]
    timestamp_ns: 27000
    total_bytes: 120
    color: "#8e44ad"
    headers:
      - name: "FC Frame Header (PLAINTEXT)"
        abbrev: "fc.prli_acc.hdr"
        layer: 2
        fields:
          - name: "R_CTL"
            abbrev: "fc.prli_acc.rctl"
            bits: 8
            value: "0x23"
            description: "ELS ACC response."
          - name: "D_ID"
            abbrev: "fc.prli_acc.did"
            bits: 24
            value: "0x010200"
            description: "Host N_Port ID. Switch routes to host port. Always plaintext."
          - name: "S_ID"
            abbrev: "fc.prli_acc.sid"
            bits: 24
            value: "0x020100"
            description: "Array N_Port ID. Always plaintext."
          - name: "CS_CTL"
            abbrev: "fc.prli_acc.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "TYPE"
            abbrev: "fc.prli_acc.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
          - name: "F_CTL"
            abbrev: "fc.prli_acc.fctl"
            bits: 24
            value: "0x980000"
            description: "Frame Control — exchange responder, last sequence, end sequence"
          - name: "SEQ_ID"
            abbrev: "fc.prli_acc.seqid"
            bits: 8
            value: "0x01"
            description: "Sequence ID within this exchange"
          - name: "DF_CTL"
            abbrev: "fc.prli_acc.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.prli_acc.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc.prli_acc.oxid"
            bits: 16
            value: "0x0001"
            description: "Originator Exchange ID"
          - name: "RX_ID"
            abbrev: "fc.prli_acc.rxid"
            bits: 16
            value: "0x0001"
            description: "Responder Exchange ID"
          - name: "Parameter"
            abbrev: "fc.prli_acc.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "ESP_Header (FC-SP-3)"
        abbrev: "esp.prli_acc"
        layer: 2
        fields:
          - name: "SA_ID"
            abbrev: "esp.prli_acc.said"
            bits: 32
            value: "0x000000A1"
            description: "Same Security Association — all frames between these ports are encrypted."
          - name: "Sequence_Number"
            abbrev: "esp.prli_acc.seq"
            bits: 32
            value: 2
            description: "Anti-replay counter = 2. Second encrypted frame in this SA."
          - name: "IV"
            abbrev: "esp.prli_acc.iv"
            bits: 96
            value: "0x8F3A21C4 B7D09E15 00000002"
            description: "Unique IV for this frame."
      - name: "Encrypted PRLI ACC Payload"
        abbrev: "prli_acc.enc"
        layer: 4
        fields:
          - name: "Ciphertext (PRLI ACC body)"
            abbrev: "prli_acc.enc.ct"
            bits: 0
            value: "[AES-256-GCM ciphertext of PRLI ACC response]"
            description: >
              The PRLI ACC payload declares the array as an FCP target.
              Response code 0x01 (accepted), target function bit set.
              Encrypted — the switch cannot determine whether PRLI was
              accepted or rejected.
          - name: "GCM Authentication Tag"
            abbrev: "prli_acc.enc.tag"
            bits: 128
            value: "[128-bit AES-GCM integrity tag]"
            description: "Authenticated encryption covers ESP_Header + ciphertext."
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

  # ── ENCRYPTED FCP I/O ────────────────────────────────────────────────────────

  - id: "fcp_write_encrypted"
    name: "FCP_CMND: WRITE(10) — Encrypted Command (No Data Yet)"
    description: >
      FCP_CMND carrying a SCSI WRITE(10) CDB — the command only, not the data.
      The write data cannot be sent until the target responds with FCP_XFER_RDY.
      From the switch's perspective, this is indistinguishable from any other
      FC frame — same header format, same routing, same credit management.

      The FC switch is completely oblivious to encryption. No firmware update,
      no configuration, no performance impact on the switch. This is the core
      architectural advantage of HBA-level encryption over switch-level or
      fabric-level encryption approaches.
    from: "host"
    to: "array"
    via: ["switch"]
    timestamp_ns: 30000
    total_bytes: 104
    color: "#8e44ad"
    headers:
      - name: "FC Frame Header (PLAINTEXT)"
        abbrev: "fc.fcp.hdr"
        layer: 2
        fields:
          - name: "R_CTL"
            abbrev: "fc.fcp.rctl"
            bits: 8
            value: "0x06"
            description: "0x06 = FC-4 Device Data — Unsolicited Command. FCP WRITE command frame."
          - name: "D_ID"
            abbrev: "fc.fcp.did"
            bits: 24
            value: "0x020100"
            description: "Array port. Switch routes here. Always plaintext."
          - name: "CS_CTL"
            abbrev: "fc.fcp.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc.fcp.sid"
            bits: 24
            value: "0x010200"
            description: "Host port. Always plaintext."
          - name: "TYPE"
            abbrev: "fc.fcp.type"
            bits: 8
            value: "0x08"
            description: "0x08 = FCP (SCSI Fibre Channel Protocol). Plaintext."
          - name: "F_CTL"
            abbrev: "fc.fcp.fctl"
            bits: 24
            value: "0x290000"
            description: "Frame Control — exchange originator, first sequence, end sequence, SI transfer"
          - name: "SEQ_ID"
            abbrev: "fc.fcp.seqid"
            bits: 8
            value: "0x00"
            description: "Sequence ID within this exchange"
          - name: "DF_CTL"
            abbrev: "fc.fcp.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.fcp.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc.fcp.oxid"
            bits: 16
            value: "0x0020"
            description: "Originator Exchange ID"
          - name: "RX_ID"
            abbrev: "fc.fcp.rxid"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID"
          - name: "Parameter"
            abbrev: "fc.fcp.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "ESP_Header"
        abbrev: "fc.fcp.esp"
        layer: 2
        fields:
          - name: "SA_ID"
            abbrev: "fc.fcp.esp.said"
            bits: 32
            value: "0x000000A1"
            description: "Same SA ID as established in SA_Init. Consistent for entire session."
          - name: "Sequence_Number"
            abbrev: "fc.fcp.esp.seq"
            bits: 32
            value: 1847
            description: "Anti-replay counter = 1847. This is the 1847th encrypted frame in this session."
          - name: "IV"
            abbrev: "fc.fcp.esp.iv"
            bits: 96
            value: "0x8F3A21C4 B7D09E15 00000737"
            description: "IV for this frame. Lower 32 bits = sequence number."
      - name: "Encrypted FCP Payload (ciphertext)"
        abbrev: "fcp.enc"
        layer: 4
        fields:
          - name: "Ciphertext (FCP_CMND — WRITE CDB)"
            abbrev: "fcp.enc.ct"
            bits: 0
            value: "[AES-256-GCM ciphertext of FCP_CMND frame]"
            description: >
              The FCP_CMND contains: LUN, task attribute, FCP_CDB (SCSI WRITE(10)),
              and FCP_DL (expected data length). All encrypted.
              The switch sees random bytes here — it cannot determine:
              - Which LUN is being accessed
              - What operation is being performed
              - What data is being written
              This eliminates a class of side-channel attacks where network
              monitoring reveals I/O patterns to sensitive LUNs.
          - name: "GCM Tag (16 bytes)"
            abbrev: "fcp.enc.tag"
            bits: 128
            value: "[128-bit integrity tag]"
            description: "Covers ESP_Header + ciphertext. Any tampering detected before decryption."
      - name: "Switch Visibility (Annotation)"
        abbrev: "sw.vis"
        layer: 2
        fields:
          - name: "What the switch sees"
            abbrev: "sw.vis.sees"
            bits: 0
            value: "FC header (D_ID=0x020100, S_ID=0x010200, R_CTL=0x06) + opaque payload"
            description: >
              The switch reads exactly: D_ID (3 bytes), routes to the correct
              output port. That's it. The payload is indistinguishable from
              random bytes. The switch performs normal credit-based flow control,
              BB_Credit management, and congestion detection — all based on
              the plaintext header and frame size, unaffected by encryption.
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

  - id: "fcp_xfer_rdy_encrypted"
    name: "FCP_XFER_RDY — Encrypted Transfer Ready"
    description: >
      The array sends FCP_XFER_RDY to grant the host permission to send
      write data. This flow control is unique to FC writes — it prevents
      the host from sending data before the target has buffer space.
      Even XFER_RDY is encrypted under the SA.
    from: "array"
    to: "host"
    via: ["switch"]
    timestamp_ns: 32000
    total_bytes: 80
    color: "#8e44ad"
    headers:
      - name: "FC Frame Header (PLAINTEXT)"
        abbrev: "fc.xr.hdr"
        layer: 2
        fields:
          - name: "R_CTL"
            abbrev: "fc.xr.rctl"
            bits: 8
            value: "0x05"
            description: "0x05 = FC-4 Device Data — Transfer Ready (FCP_XFER_RDY)"
            spec_refs:
              - document: "FCP-4"
                section: "9.3"
                title: "FCP_XFER_RDY IU"
          - name: "D_ID"
            abbrev: "fc.xr.did"
            bits: 24
            value: "0x010200"
            description: "Host N_Port ID. Switch routes here. Always plaintext."
          - name: "CS_CTL"
            abbrev: "fc.xr.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc.xr.sid"
            bits: 24
            value: "0x020100"
            description: "Array N_Port ID. Always plaintext."
          - name: "TYPE"
            abbrev: "fc.xr.type"
            bits: 8
            value: "0x08"
            description: "0x08 = FCP. Plaintext."
