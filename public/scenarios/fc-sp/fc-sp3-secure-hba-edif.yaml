            abbrev: "sa_auth.msg"
            bits: 8
            value: "0x31"
            description: "0x31 = SA_AUTH. Security Association is live."
          - name: "SA_ID (confirmed)"
            abbrev: "sa_auth.said"
            bits: 32
            value: "0x000000A1"
            description: "SA ID 0xA1 confirmed. Both sides load session key for this SA_ID."
          - name: "Encryption Status"
            abbrev: "sa_auth.status"
            bits: 0
