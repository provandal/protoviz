  # ── DH-CHAP Reply ────────────────────────────────────────────────────────────

  - id: "dhchap_reply"
    name: "DH-CHAP Reply — Initiator Response + DH Public Value"
    description: >
      The host SecureHBA responds with DHCHAP_Reply. This carries:
      1. The initiator's DH public value g^a mod p — allows both sides to derive K = g^(ab) mod p
      2. The CHAP response — SHA-512 over (challenge || K || shared_secret || WWNs) proving knowledge of K
      3. A reverse challenge — the initiator also challenges the target
         (mutual authentication: both sides prove identity)

      All of this is computed in hardware on the SecureHBA ASIC.
      The host CPU never sees the key material.
    from: "host"
    to: "array"
    via: ["switch"]
    timestamp_ns: 8500
    total_bytes: 1680
    color: "#e67e22"
    headers:
      - name: "DHCHAP_Reply PDU"
        abbrev: "dhchap_r"
        layer: 4
        fields:
          - name: "Auth_Msg_Code"
            abbrev: "dhchap_r.msg"
            bits: 8
            value: "0x11"
            description: "0x11 = DHCHAP_Reply (per Wireshark packet-fcsp.c)"
          - name: "DH Public Value g^a mod p (256 bytes)"
            abbrev: "dhchap_r.dhval"
            bits: 2048
            value: "[256-byte DH public value for Group 4 (2048-bit MODP)]"
            description: >
              The initiator's Diffie-Hellman public value g^a mod p.
              Both sides now independently derive the shared secret K = g^(ab) mod p.
              An eavesdropper cannot derive K from g^a or g^b alone (Computational
              Diffie-Hellman assumption).
            spec_refs:
              - document: "FC-SP-2"
                section: "5.3.1, Table 13"
                title: "DH-CHAP DH Group parameters"
          - name: "CHAP_Response (64 bytes)"
            abbrev: "dhchap_r.resp"
            bits: 512
            value: "[SHA-512(challenge_value || K || shared_secret || initiator_WWN || target_WWN)]"
            description: >
              64-byte SHA-512 response over the target's challenge.
              FC-SP-2 uses a plain hash over concatenation, not HMAC
              (HMAC is NVMe DH-HMAC-CHAP, a different protocol).
              Proves the initiator derived the same K from the DH exchange.
              The target verifies this by computing the same hash using its
              K (from g^(ab) mod p) — if they match, the initiator is authenticated.
          - name: "Reverse_Challenge (16 bytes)"
            abbrev: "dhchap_r.rev_chall"
            bits: 128
            value: "0x2C8D4E3F1A09B7C5D1E2F3A4B5C60718"
            description: >
              The initiator's challenge to the target.
              Mutual authentication: the target must now prove IT knows K.
              Without this, a man-in-the-middle could forge the target identity.
