  # ── DH-CHAP Success ──────────────────────────────────────────────────────────

  - id: "dhchap_success"
    name: "DH-CHAP Success — Mutual Authentication Complete"
    description: >
      The target has verified the initiator's CHAP_Response, confirmed K
      via the DH exchange (g^(ab) mod p), and now sends DHCHAP_Success
      carrying its own response to the reverse challenge. Both sides have
      verified each other's identity. K is now a shared secret known only
      to the two SecureHBA ASICs.

      Next step: derive the AES-256-GCM session key from K via IKEv2-based key derivation (RFC 7296) with FC-specific PRF.
    from: "array"
    to: "host"
    via: ["switch"]
    timestamp_ns: 14000
    total_bytes: 80
    color: "#27ae60"
    headers:
