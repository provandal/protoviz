  # ── DH-CHAP Reply ────────────────────────────────────────────────────────────

  - id: "dhchap_reply"
    name: "DH-CHAP Reply — Initiator Response + ML-KEM Ciphertext"
    description: >
      The host SecureHBA responds with DHCHAP_Reply. This carries:
      1. The ML-KEM ciphertext (c) — the encapsulated secret only the target can open
      2. The CHAP response — HMAC-SHA-512 over (K || challenge) proving knowledge of K
      3. A reverse challenge — the initiator also challenges the target
         (mutual authentication: both sides prove identity)

      All of this is computed in hardware on the SecureHBA ASIC.
      The host CPU never sees the key material.
    from: "host"
    to: "array"
    via: ["switch"]
    timestamp_ns: 8500
    total_bytes: 1680
    color: "#e67e22"
    headers:
      - name: "DHCHAP_Reply PDU"
        abbrev: "dhchap_r"
        layer: 4
        fields:
          - name: "Auth_Msg_Code"
            abbrev: "dhchap_r.msg"
            bits: 8
            value: "0x21"
            description: "0x21 = DHCHAP_Reply."
          - name: "ML-KEM-1024 Ciphertext c (1568 bytes)"
            abbrev: "dhchap_r.ct"
            bits: 0
            value: "[1568-byte ML-KEM ciphertext]"
            description: >
              The ciphertext c produced by ML-KEM.Encaps(ek).
              Target will run ML-KEM.Decaps(dk, c) → K to recover the shared secret.
              An adversary intercepting c cannot derive K without dk.
              Size: 1568 bytes (ML-KEM-1024 ciphertext per FIPS 203).
            spec_refs:
              - document: "FIPS 203 (ML-KEM)"
                section: "5.2"
                title: "ML-KEM.Encaps"
          - name: "CHAP_Response (64 bytes)"
            abbrev: "dhchap_r.resp"
            bits: 512
            value: "[HMAC-SHA-512(K || challenge_value || initiator_WWN || target_WWN)]"
            description: >
              64-byte HMAC-SHA-512 response over the target's challenge.
              Proves the initiator derived the same K from ML-KEM.Encaps.
              The target verifies this by computing the same HMAC using its
              K (from ML-KEM.Decaps) — if they match, the initiator is authenticated.
          - name: "Reverse_Challenge (16 bytes)"
            abbrev: "dhchap_r.rev_chall"
            bits: 128
            value: "0x2C8D4E3F1A09B7C5D1E2F3A4B5C60718"
            description: >
              The initiator's challenge to the target.
              Mutual authentication: the target must now prove IT knows K.
              Without this, a man-in-the-middle could forge the target identity.
      - name: "FC-2 Frame Header (Routing — always plaintext)"
        abbrev: "fc2"
        layer: 2
        total_bytes: 24
        fields:
