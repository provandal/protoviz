meta:
  id: "fc-sp3-secure-hba-edif"
  title: "[UNDER REVIEW] FC-SP-3 Secure HBA: Fabric Authentication → Session Key → Encrypted I/O"
  protocol: "FC-SP-3 / DH-CHAP / AES-256-GCM"
  protocol_family: "Storage Protocols"
  version: "1.0"
  description: >
    A companion to the FC Fabric: FLOGI → PLOGI → PRLI → SCSI I/O scenario.
    That scenario shows the fabric login sequence. This one picks up at PLOGI
    and adds the FC-SP-3 security layer that the Emulex SecureHBA introduces:
    DH-CHAP mutual authentication (using classical Diffie-Hellman), Security
    Association (SA) establishment with AES-256-GCM session key derivation,
    and the resulting encrypted FC frames — all negotiated automatically as
    part of the Process Login (PRLI) parameter exchange, with zero
    configuration required from the IT administrator. For CNSA 2.0
    post-quantum compliance, FC-SP-3 provides the SA Establishment protocol
    (SA_INIT + SA_AUTH), which supports ML-KEM-1024 key encapsulation
    separately from DH-CHAP.

    The scenario also covers: what the FC switch sees (routing headers only —
    payload is opaque ciphertext), why deduplication and compression survive
    (decryption happens at the array port, not in the data services engine),
    and the automatic session re-key process that refreshes keys without
    interrupting I/O.

    CNSA 2.0 accuracy note: AES-256-GCM is consistent with CNSA 2.0 symmetric
    algorithm requirements. The genuinely new CNSA 2.0 element is ML-KEM-1024
    for key establishment — this is handled by the SA Establishment protocol
    (SA_INIT + SA_AUTH), not by DH-CHAP. CNSA 2.0 applies to National Security
    Systems (NSS); commercial enterprises benefit from the same algorithms but
    are not mandated by CNSA 2.0 itself. Applicable commercial frameworks
    include DORA (EU financial sector) and NIS2 (EU critical infrastructure).
    [Under review with Broadcom FC-SP-3 maintainers for accuracy]
  difficulty: "intermediate"
  learning_objectives:
    - "Understand where FC-SP-3 authentication fits in the FC login sequence (after FLOGI/PLOGI, before or during PRLI)"
    - "Trace the DH-CHAP mutual authentication exchange: AUTH_Negotiate → Challenge → Reply → Success"
    - "Understand how FC-SP-3 separates DH-CHAP (classical DH authentication) from SA Establishment (which supports post-quantum key exchange for CNSA 2.0)"
    - "Read the SA_INIT and SA_AUTH frames that establish the AES-256-GCM encryption session"
    - "Understand the FC frame structure with ESP_Header: routing header (plaintext) vs. payload (ciphertext)"
    - "Explain why fabric switches remain transparent — they route on D_ID/S_ID which are never encrypted"
    - "Understand why array-side decryption preserves dedupe, compression, and anomaly detection"
    - "Trace the automatic re-key sequence and understand why it does not interrupt I/O"
    - "Identify the key architectural difference between SecureHBA EDIF and application-layer or host-CPU encryption"
  authors:
    - name: "Erik Smith"
      org: "Dell Technologies"
      github: "provandal"
  created: "2026-03-22"
  updated: "2026-03-22"
  tags:
    - "fibre-channel"
    - "fc-sp-3"
    - "security"
    - "encryption"
    - "dh-chap"
    - "edif"
    - "sa-establishment"
    - "cnsa-2.0"
    - "aes-256-gcm"
    - "secure-hba"
    - "emulex"
    - "intermediate"
    - "zero-trust"
  primary_specs:
    - document: "FC-SP-3 (INCITS draft)"
      section: "5"
      title: "Authentication Protocols"
      url: "https://www.t11.org/ftp/t11/pub/fc/sp-3/"
    - document: "FC-SP-2 (INCITS 496-2012)"
      section: "5.3"
      title: "DH-CHAP Protocol"
      url: "https://standards.incits.org"
    - document: "FIPS 203 (ML-KEM)"
      section: "all"
      title: "Module-Lattice-Based Key-Encapsulation Mechanism Standard"
      url: "https://csrc.nist.gov/pubs/fips/203/final"
    - document: "NIST FIPS 197"
      section: "all"
      title: "AES (Advanced Encryption Standard)"
      url: "https://csrc.nist.gov/publications/detail/fips/197/final"
    - document: "NSA CNSA 2.0"
      section: "all"
      title: "Commercial National Security Algorithm Suite 2.0"
      url: "https://media.defense.gov/2022/Sep/07/2003071836/-1/-1/0/CSA_CNSA_2.0_ALGORITHMS_.PDF"

topology:
  actors:
    - id: "host"
      type: "initiator"
      label: "Host Server (SecureHBA)"
      description: >
        Server with Emulex LPe38100-series 64GFC SecureHBA installed.
        All FC-SP-3 authentication and AES-256-GCM encryption/decryption
        occur in ASIC hardware on the HBA — zero CPU involvement.
        The OS and applications see a standard FC device; encryption is transparent.
      hardware: "Emulex LPe38102 64GFC SecureHBA (Broadcom)"
      os: "Linux 6.8 / Windows Server 2025"
      position: "left"

    - id: "switch"
      type: "switch"
      label: "FC Switch (64GFC)"
      description: >
        Standard Brocade or Cisco 64GFC director. Completely unmodified —
        no firmware changes, no configuration, no awareness of encryption.
        Routes FC frames on D_ID/S_ID from the FC header, which is always
        in plaintext. The switch never sees the payload.
      hardware: "Brocade G720 or Cisco MDS 9700 — standard 64GFC"
      position: "center"

    - id: "array"
      type: "target"
      label: "Storage Array (SecureHBA Port)"
      description: >
        Pure Storage Everpure FlashArray//XL130 R5 with Emulex SecureHBA
        target ports. FC-SP-3 termination and AES-256-GCM decryption happen
        at the HBA ASIC on the array port — data services (dedupe, compression,
        ransomware detection) receive plaintext after decryption.
      hardware: "Emulex SecureHBA target port — Pure Storage Everpure FlashArray//XL130 R5"
      position: "right"

  links:
    - id: "host-switch"
      from: "host"
      to: "switch"
      speed_gbps: 64
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true
    - id: "switch-array"
      from: "switch"
      to: "array"
      speed_gbps: 64
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true

osi_layers:
  host:
    - layer: 0
      name: "FC-0 Physical"
      components: ["64GFC SerDes", "SFP-DD optics"]
      state_schema:
        link_state:
          type: "string"
          description: "Physical link state"
          initial: "UP (64GFC)"
        encryption_active:
          type: "boolean"
          description: "Whether AES-256-GCM encryption is active on this port"
          initial: false
    - layer: 1
      name: "FC-1 Encoding"
      components: ["64b/66b encoding", "RS(544,514) FEC"]
      state_schema:
        encoding:
          type: "string"
          description: "Line encoding scheme"
          initial: "64b/66b"
    - layer: 2
      name: "FC-2 Framing / Transport"
      components: ["FC frame header", "ESP_Header (when encrypted)", "CRC-32"]
      state_schema:
        frame_type:
          type: "string"
          description: "Current frame payload type"
          initial: "plaintext"
        sa_id:
          type: "string"
          description: "Active Security Association ID"
          initial: "none"
        sequence_number:
          type: "integer"
          description: "ESP anti-replay sequence number"
          initial: 0
    - layer: 4
      name: "FC-4 Protocol Mapping"
      components: ["FCP (SCSI over FC)", "NVMe/FC", "FC-SP-3 Authentication Frames"]
      state_schema:
        auth_state:
          type: "string"
          description: "FC-SP-3 authentication state machine"
          initial: "AUTH_IDLE"
        session_key:
          type: "string"
          description: "Derived AES-256-GCM session key (handle only)"
          initial: "none"
        rekey_deadline:
          type: "string"
          description: "Next scheduled re-key timestamp"
          initial: "none"

  switch:
    - layer: 0
      name: "FC-0 Physical"
      components: ["64GFC SerDes", "crossbar switch fabric"]
      state_schema:
        port_state:
          type: "string"
          description: "Physical port state"
          initial: "UP (64GFC)"
    - layer: 1
      name: "FC-1 Encoding"
      components: ["64b/66b encoding", "RS(544,514) FEC"]
      state_schema:
        encoding:
          type: "string"
          description: "Line encoding scheme"
          initial: "64b/66b"
    - layer: 2
      name: "FC-2 Framing"
      components: ["FC header inspection (D_ID/S_ID only)", "Credit management"]
      state_schema:
        routing_mode:
          type: "string"
          description: "Frame routing basis"
          initial: "D_ID (always plaintext header)"
        payload_visibility:
          type: "string"
          description: "What the switch can see of the frame payload"
          initial: "OPAQUE — switch routes on header only"

  array:
    - layer: 0
      name: "FC-0 Physical"
      components: ["64GFC SecureHBA target port"]
      state_schema:
        link_state:
          type: "string"
          description: "Physical link state"
          initial: "UP (64GFC)"
        decryption_active:
          type: "boolean"
          description: "Whether decryption is active on this target port"
          initial: false
    - layer: 1
      name: "FC-1 Encoding"
      components: ["64b/66b encoding", "RS(544,514) FEC"]
      state_schema:
        encoding:
          type: "string"
          description: "Line encoding scheme"
          initial: "64b/66b"
    - layer: 2
      name: "FC-2 Framing"
      components: ["FC frame receive", "ESP_Header processing", "AES-256-GCM decryption engine", "CRC validation post-decrypt"]
      state_schema:
        frame_type:
          type: "string"
          description: "Frame type being received"
          initial: "plaintext"
        sa_id:
          type: "string"
          description: "Active Security Association ID (must match initiator)"
          initial: "none"
    - layer: 4
      name: "FC-4 / Data Services"
      components: ["FCP target", "NVMe/FC target", "Dedupe engine", "Compression", "Ransomware detection"]
      state_schema:
        auth_state:
          type: "string"
          description: "FC-SP-3 target authentication state"
          initial: "AUTH_IDLE"
        data_services:
          type: "string"
          description: "Status of array data services"
          initial: "ACTIVE (operating on plaintext after HBA decryption)"

frames:
  # ── PRE-CONTEXT: PLOGI already complete ─────────────────────────────────────

  - id: "plogi_complete_context"
    name: "Context: PLOGI Complete — N_Port Login Already Done"
    description: >
      This scenario assumes FLOGI and fabric registration are complete
      (see the FC Fabric: FLOGI → PLOGI → PRLI → SCSI I/O scenario for that exchange).
      PLOGI (N_Port Login) has been completed — the host and array have exchanged
      N_Port IDs, WWNs, and service parameters. The connection is logically established
      but NOT yet authenticated and NOT yet encrypted.

      FC-SP-3 authentication runs AFTER PLOGI and BEFORE (or concurrent with) PRLI.
      The host SecureHBA initiates authentication automatically upon detecting that
      the target also advertises FC-SP-3 capability in its PLOGI ACC service parameters.
    from: "host"
    to: "array"
    via: ["switch"]
    timestamp_ns: 0
    total_bytes: 0
    color: "#95a5a6"
    headers:
      - name: "Post-PLOGI State (Context Frame)"
        abbrev: "ctx"
        layer: 4
        fields:
          - name: "FC-SP-3 Capability Advertised"
            abbrev: "ctx.fcsp3"
            bits: 0
            value: "Both endpoints: FC-SP-3 capable (from PLOGI ACC Service Parameters)"
            description: >
              During PLOGI, both host and array included FC-SP-3 capability bits
              in the Common Service Parameters (Class 3 Service Parameters, word 1,
              bit 9 = Security bit). The SecureHBA detected this match and will
              now initiate authentication automatically — no administrator action required.
            spec_refs:
              - document: "FC-LS-3 (FC Login)"
                section: "4.2.7"
                title: "Common Service Parameters — Security bit"
      - name: "FC-2 Frame Header (Routing — always plaintext)"
        abbrev: "fc2"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc2.rctl"
            bits: 8
            value: "0x00"
            description: "Context frame — no actual wire frame. S_ID and D_ID shown for reference."
          - name: "D_ID"
            abbrev: "fc2.did"
            bits: 24
            value: "0x020100"
            description: "Destination N_Port ID — array target port. ALWAYS PLAINTEXT — the switch routes on this field."
          - name: "S_ID"
            abbrev: "fc2.sid"
            bits: 24
            value: "0x010200"
            description: "Source N_Port ID — host HBA port. Always plaintext."
          - name: "CS_CTL"
            abbrev: "fc2.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "TYPE"
            abbrev: "fc2.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
          - name: "F_CTL"
            abbrev: "fc2.fctl"
            bits: 24
            value: "0x290000"
            description: "Frame Control — exchange originator, first+last sequence"
          - name: "SEQ_ID"
            abbrev: "fc2.seqid"
            bits: 8
            value: "0x00"
            description: "Sequence ID within this exchange"
          - name: "DF_CTL"
            abbrev: "fc2.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc2.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc2.oxid"
            bits: 16
            value: "0x0000"
            description: "Originator Exchange ID"
          - name: "RX_ID"
            abbrev: "fc2.rxid"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID"
          - name: "Parameter"
            abbrev: "fc2.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

  # ── AUTH_NEGOTIATE ───────────────────────────────────────────────────────────

  - id: "auth_negotiate"
    name: "AUTH_Negotiate — Propose Authentication Parameters"
    description: >
      The host SecureHBA sends AUTH_Negotiate as an FC Extended Link Service (ELS).
      This frame proposes the authentication protocol (DH-CHAP), the hash algorithm
      (SHA-512 for CNSA 2.0 alignment), and the Diffie-Hellman group
      (e.g., DH Group 4 = 2048-bit MODP). Authentication negotiation does NOT
      include cipher/encryption negotiation — cipher parameters (AES-256-GCM)
      are negotiated later in SA_INIT.

      Note: DH-CHAP uses classical Diffie-Hellman key exchange. For post-quantum
      key establishment (CNSA 2.0), FC-SP-3 provides the separate SA Establishment
      protocol (SA_INIT + SA_AUTH), which supports ML-KEM-1024. DH-CHAP itself
      does not use ML-KEM.
    from: "host"
    to: "array"
    via: ["switch"]
    timestamp_ns: 1000
    total_bytes: 96
    color: "#e67e22"
    headers:
      - name: "FC Extended Link Service (ELS) Header"
        abbrev: "els"
        layer: 4
        total_bytes: 4
        fields:
          - name: "ELS Command Code"
            abbrev: "els.cmd"
            bits: 8
            offset_bits: 0
            value: "0x90"
            value_hex: "0x90"
            description: >
              0x90 = AUTH ELS (per fc_els.h ELS_AUTH_ELS). The FC-SP
              Authentication Extended Link Service command code. This is how
              FC-SP-3 messages are carried — as ELS frames on an established
              N_Port connection, not as separate fabric services.
            spec_refs:
              - document: "FC-SP-2 (INCITS 496-2012)"
                section: "5.1"
                title: "AUTH_ELS — Authentication ELS"
      - name: "AUTH_Negotiate Payload"
        abbrev: "auth_neg"
        layer: 4
        total_bytes: 92
        fields:
          - name: "Auth_Msg_Code"
            abbrev: "auth_neg.msg_code"
            bits: 8
            offset_bits: 0
            value: "0x0B"
            value_hex: "0x0B"
            description: "0x0B = AUTH_Negotiate (per Wireshark packet-fcsp.c fcauth_msgcode_vals)"
            spec_refs:
              - document: "FC-SP-2"
                section: "5.3.1"
                title: "AUTH_Negotiate message"
          - name: "Auth_Protocol"
            abbrev: "auth_neg.proto"
            bits: 8
            offset_bits: 8
            value: "0x01"
            description: "0x01 = DH-CHAP. An optional authentication protocol in FC-SP-3."
          - name: "Transaction_ID"
            abbrev: "auth_neg.txn_id"
            bits: 32
            offset_bits: 16
            value: "0xA3F12C8E"
            description: >
              Random transaction ID generated by the initiator. All subsequent
              AUTH_ELS frames in this authentication session use this ID.
              Prevents replay attacks across sessions.
          - name: "Hash_List[0] — SHA-512"
            abbrev: "auth_neg.hash0"
            bits: 8
            offset_bits: 48
            value: "0x04"
            description: >
              0x04 = SHA-512. Proposed as first preference. SHA-512 is in
              CNSA 2.0; FC-SP-2 typically used MD5 or SHA-1 (both deprecated
              for national security use). FC-SP-3 adds SHA-512 and SHA-384.
            spec_refs:
              - document: "NSA CNSA 2.0"
                section: "Table 1"
                title: "Approved hash algorithms: SHA-384, SHA-512"
          - name: "Hash_List[1] — SHA-384"
            abbrev: "auth_neg.hash1"
            bits: 8
            offset_bits: 56
            value: "0x03"
            description: "0x03 = SHA-384. Second preference. Also CNSA 2.0 compliant."
          - name: "DH_Group — DH Group 4 (2048-bit MODP)"
            abbrev: "auth_neg.dhgroup"
            bits: 16
            offset_bits: 64
            value: "0x0004"
            description: >
              0x0004 = DH Group 4 (2048-bit MODP Diffie-Hellman). DH-CHAP uses
              classical Diffie-Hellman for key agreement. Both sides compute
              g^(ab) mod p to derive a shared secret. DH Group 4 (2048-bit) is
              the standard group used in FC-SP-2 and FC-SP-3 DH-CHAP.

              Note: DH-CHAP does NOT support ML-KEM or other post-quantum
              algorithms. For CNSA 2.0 post-quantum key establishment, FC-SP-3
              provides the separate SA Establishment protocol (SA_INIT + SA_AUTH),
              which handles ML-KEM-1024 independently of DH-CHAP.
            spec_refs:
              - document: "FC-SP-2"
                section: "5.3.1, Table 13"
                title: "DH-CHAP DH Group negotiation"
          - name: "Initiator WWN"
            abbrev: "auth_neg.wwn"
            bits: 64
            offset_bits: 128
            value: "10:00:00:10:9B:C7:2A:01"
            description: >
              Host HBA World Wide Port Name. Used as the authentication identity.
              The target will look up pre-shared secrets or certificates by WWN.
              The SecureHBA also supports SPDM (Security Protocol and Data Model)
              for silicon root-of-trust attestation — the WWN is cryptographically
              bound to the HBA's hardware identity.
      - name: "FC Frame Header (Routing — always plaintext)"
        abbrev: "fc.hdr"
        layer: 2
        fields:
          - name: "R_CTL (Routing Control)"
            abbrev: "fc.hdr.rctl"
            bits: 8
            value: "0x22"
            description: "0x22 = Extended Link Service request. The switch routes on this + D_ID."
          - name: "D_ID (Destination ID)"
            abbrev: "fc.hdr.did"
            bits: 24
            value: "0x020100"
            description: >
              Array target port N_Port ID. ALWAYS PLAINTEXT — even after encryption
              is active, the FC header D_ID and S_ID are never encrypted.
              This is why the fabric switch needs no changes: it routes on D_ID
              exactly as before, completely unaware of the encrypted payload.
          - name: "S_ID (Source ID)"
            abbrev: "fc.hdr.sid"
            bits: 24
            value: "0x010200"
            description: "Host N_Port ID. Always plaintext."
          - name: "CS_CTL"
            abbrev: "fc.hdr.csctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "TYPE"
            abbrev: "fc.hdr.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
          - name: "F_CTL"
            abbrev: "fc.hdr.fctl"
            bits: 24
            value: "0x290000"
            description: "Frame Control — exchange originator, first+last sequence, sequence initiative transfer"
          - name: "SEQ_ID"
            abbrev: "fc.hdr.seqid"
            bits: 8
            value: "0x00"
            description: "Sequence ID within this exchange"
          - name: "DF_CTL"
            abbrev: "fc.hdr.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.hdr.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc.hdr.oxid"
            bits: 16
            value: "0x0010"
            description: "Originator Exchange ID — AUTH exchange"
          - name: "RX_ID"
            abbrev: "fc.hdr.rxid"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID — not yet assigned"
          - name: "Parameter"
            abbrev: "fc.hdr.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for ELS frames"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm multimode fiber (SFP-DD)"
            description: "Short-reach fiber optics"

  # ── Auth_Negotiate_RSP ───────────────────────────────────────────────────────

  - id: "auth_neg_rsp"
    name: "Auth_Negotiate_RSP — Target Confirms Parameters"
    description: >
      The array SecureHBA responds with Auth_Negotiate_RSP, confirming the
      agreed authentication parameters. Both sides now have a common
      understanding of the authentication algorithms before exchanging any
      key material. The switch passes this frame without inspection.

      Auth_Negotiate_RSP is optional in FC-SP-3. This scenario shows one
      possible flow where the target explicitly confirms parameters.
    from: "array"
    to: "host"
    via: ["switch"]
    timestamp_ns: 6000
    total_bytes: 64
    color: "#27ae60"
    headers:
      - name: "Auth_Negotiate_RSP"
        abbrev: "auth_neg_rsp"
        layer: 4
        fields:
          - name: "Auth_Msg_Code"
            abbrev: "auth_neg_rsp.msg"
            bits: 8
            value: "0x0C"
            description: "0x0C = Auth_Negotiate_RSP [FC-SP-3 — code assigned per T11 draft; closest FC-SP-2 equivalent is AUTH_Done]"
          - name: "Agreed Hash"
            abbrev: "auth_neg_rsp.hash"
            bits: 8
            value: "0x04"
            description: "SHA-512 accepted as the hash algorithm."
          - name: "Agreed DH Group"
            abbrev: "auth_neg_rsp.dhgroup"
            bits: 16
            value: "0x0004"
            description: "DH Group 4 (2048-bit MODP) accepted for DH-CHAP key agreement."
          - name: "Responder WWN"
            abbrev: "auth_neg_rsp.wwn"
            bits: 64
            value: "50:00:11:0A:CB:3F:44:01"
            description: "Array target port WWN. Used as the responder identity in DH-CHAP."
