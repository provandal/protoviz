            bits: 8
            value: "0x00"
            description: "Sequence ID within this exchange"
          - name: "DF_CTL"
            abbrev: "fc2.dfctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc2.seqcnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc2.oxid"
            bits: 16
            value: "0x0014"
            description: "Originator Exchange ID — reverse SA_INIT exchange"
          - name: "RX_ID"
            abbrev: "fc2.rxid"
            bits: 16
            value: "0xFFFF"
