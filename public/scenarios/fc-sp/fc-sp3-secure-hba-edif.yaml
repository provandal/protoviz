          - name: "Parameter"
            abbrev: "fc2.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
