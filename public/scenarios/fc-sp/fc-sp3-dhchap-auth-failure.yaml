meta:
  id: "fc-sp3-dhchap-auth-failure"
  title: "FC-SP-3 DH-CHAP: When Authentication Fails"
  protocol: "FC-SP-3 / DH-CHAP"
  protocol_family: "SAN"
  version: "1.0"
  description: >
    An error scenario showing what happens when DH-CHAP authentication fails
    due to mismatched shared secrets between an HBA and a fabric switch.
    The scenario begins with a successful PLOGI (N_Port Login), then walks
    through the AUTH_Negotiate handshake and DH-CHAP challenge-response
    exchange. The HBA computes its CHAP response using a shared secret that
    does not match the secret configured on the switch. The switch detects
    the hash mismatch, sends AUTH_Reject, and tears down the connection
    with LOGO (Fabric Logout).

    This is the single most common FC-SP-3 deployment failure: the shared
    secret was configured on the HBA but not updated on the switch (or vice
    versa) after a firmware upgrade, zone change, or switch replacement.
    The scenario shows exactly where the failure occurs, what the switch
    and HBA log, and how to diagnose the mismatch.
  difficulty: "advanced"
  learning_objectives:
    - "Understand the DH-CHAP challenge-response flow and where shared secret validation occurs"
    - "Identify the AUTH_Reject reason codes that indicate a shared secret mismatch"
    - "Read the FC-2 frame headers on AUTH_Reject and LOGO frames"
    - "Diagnose the most common FC-SP-3 deployment failure: mismatched shared secrets between HBA and switch"
    - "Understand the security implications of failed authentication — the switch refuses all I/O until the HBA re-authenticates"
    - "Trace the connection teardown sequence: AUTH_Reject → LOGO → port isolation"
    - "Know where to look in fabric manager logs and HBA driver logs to pinpoint the mismatch"
  authors:
    - name: "Erik Smith"
      org: "Dell Technologies"
      github: "provandal"
    - name: "Claude"
      org: "Anthropic"
  created: "2026-03-30"
  updated: "2026-03-30"
  tags:
    - "fibre-channel"
    - "fc-sp-3"
    - "security"
    - "dh-chap"
    - "authentication"
    - "error"
    - "troubleshooting"
    - "shared-secret"
    - "auth-reject"
    - "logo"
    - "advanced"
  primary_specs:
    - document: "FC-SP-3 (INCITS draft)"
      section: "5"
      title: "Authentication Protocols"
      url: "https://www.t11.org/ftp/t11/pub/fc/sp-3/"
    - document: "FC-SP-2 (INCITS 496-2012)"
      section: "5.3"
      title: "DH-CHAP Protocol"
      url: "https://standards.incits.org"
    - document: "FC-FS-5 (INCITS 545-2019)"
      section: "9.3"
      title: "Logout (LOGO) Procedure"
      url: "https://standards.incits.org"

topology:
  actors:
    - id: "host"
      type: "initiator"
      label: "Host Server (HBA)"
      description: >
        Server with an FC HBA configured for FC-SP-3 DH-CHAP authentication.
        The HBA has a shared secret configured by the administrator, but the
        secret does NOT match what the switch expects. This mismatch will cause
        authentication failure. The HBA may be newly installed, recently
        re-imaged, or its secret was changed without updating the switch.
      hardware: "Emulex LPe38102 64GFC HBA (Broadcom)"
      os: "Linux 6.8 / Windows Server 2025"
      position: "left"

    - id: "switch"
      type: "switch"
      label: "FC Switch (64GFC)"
      description: >
        FC director switch with FC-SP-3 DH-CHAP authentication configured on all
        F_Ports. The switch has a shared secret database (per-WWN or zone-based)
        that is used to validate incoming HBA authentication. In this scenario
        the switch's copy of the shared secret for this HBA's WWN does not
        match the secret stored on the HBA — triggering authentication failure.
      hardware: "Brocade G720 or Cisco MDS 9700 — 64GFC"
      position: "center"

    - id: "array"
      type: "target"
      label: "Storage Array"
      description: >
        Storage array target port behind the fabric switch. In this error
        scenario the host never reaches the array — authentication fails at
        the switch, and LOGO tears down the connection before any I/O path
        to the array can be established.
      hardware: "Storage Array FC Target Port — 64GFC"
      position: "right"

  links:
    - id: "host-switch"
      from: "host"
      to: "switch"
      speed_gbps: 64
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true
    - id: "switch-array"
      from: "switch"
      to: "array"
      speed_gbps: 64
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true

