    annotation:
      text: "Case B: seq=201 delivered ON TIME at t = 203 ms"
      detail: >
        TSBPD deadline for seq=201 = sender_timestamp(3 ms) +
        tsbpd_latency(200 ms) = 203 ms. Retransmit arrived at
        ~146.5 ms — well inside the budget (~57 ms of margin even
        with the worst-case jitter).

        TSBPD slotted seq=201 into its scheduled playout position.
        Application receives 200, 201, 202, 203 in clean order,
        on schedule. No glitch.
    state_after:
