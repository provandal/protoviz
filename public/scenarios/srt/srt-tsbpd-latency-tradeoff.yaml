  - id: "evt_summary"
    type: "annotation"
    t_ns: 210000000
    from: "caller"
    to: "listener"
    annotation:
      text: "The dial — rule of thumb"
      detail: >
        tsbpd_latency ≥ 3-4 × RTT is the live-streaming rule of
        thumb. With RTT = 40 ms, ≥ 120-160 ms is the comfortable
        floor. The original handshake scenario negotiated 150 ms
        for exactly this reason.

        Use cases at typical latencies:

          • 50-80 ms     Esports / interactive / first-screen
                         contribution where loss spikes are
                         visible artifacts but acceptable.
          • 120-250 ms   Default live broadcast contribution.
                         Most SRT deployments live here.
          • 500-1500 ms  Trans-continental contribution where
                         RTT is itself 100-200 ms. The added
                         end-to-end delay is invisible to the
                         viewer (still 'live' to humans).
          • 2000+ ms     OTT distribution where reliability is
                         everything and delay doesn't matter.

        The right answer is always: what does the application
        tolerate × what does the link actually look like.

# ─────────────────────────────────────────────────────────────────────
# GLOSSARY
# ─────────────────────────────────────────────────────────────────────
glossary:
  - term: "TSBPD"
    abbrev: "Time-Stamp Based Packet Delivery"
    definition: "Receiver-side delivery model where each packet is held in the receive buffer until its scheduled wall-clock time, computed as sender_timestamp + clock_offset + tsbpd_latency."

  - term: "TSBPD deadline"
    definition: "Per-packet wall-clock instant at which the receiver MUST deliver the packet — or declare it permanently lost via TLPKTDROP."

  - term: "Recovery budget"
    definition: "tsbpd_latency minus end-to-end RTT minus jitter margin minus processing overhead. The window inside which a NAK + retransmit can complete and still be useful."

  - term: "TLPKTDROP"
    abbrev: "Too-Late Packet Drop"
    definition: "Receiver-side feature that permanently abandons packets that miss their TSBPD deadline, surfacing a 'gap' to the decoder. Prevents the playout queue from blocking on a doomed packet."

  - term: "Decoder artifact"
    definition: "Visible/audible result of a permanent gap — macroblocking, frozen frame, missing audio frame, silence. The cost of a too-tight latency dial."
