meta:
  id: srt-tsbpd-latency-tradeoff
  title: "SRT: TSBPD Latency Trade-off — 50 ms vs 200 ms on the Same Loss"
  protocol: SRT
  protocol_family: "Media Streaming"
  version: "1.0.0"
  description: >
    The same single-packet drop on the same network path, run twice
    with two different TSBPD latency settings. Case A: tsbpd_latency =
    50 ms. The NAK + retransmit round-trip can't beat the deadline,
    TLPKTDROP fires, the receiver hands the decoder a permanent gap.
    Case B: tsbpd_latency = 200 ms. The same retransmit arrives with
    margin to spare, the TSBPD engine slots seq=102 into its scheduled
    playout position, the stream plays cleanly. This is the dial every
    SRT operator tunes for their network conditions: lower latency =
    smaller recovery budget = more glitches; higher latency = more
    margin = more end-to-end delay.

  learning_objectives:
    - "Compute the TSBPD deadline for any packet: sender_timestamp + clock_offset + tsbpd_latency"
    - "Compute the recovery budget: tsbpd_latency − end-to-end RTT − processing overhead − jitter margin"
    - "See TLPKTDROP fire when the recovery budget is too tight (Case A)"
    - "See clean recovery when the budget has headroom (Case B)"
    - "Recognize the standard rule of thumb: tsbpd_latency ≥ 3-4 × RTT (live), much higher for OTT contribution"
    - "Understand why the dial exists: latency vs reliability is a hard trade-off you cannot have both sides of"

  difficulty: "intermediate"

  authors:
    - name: "Erik Smith"
      org: "Dell Technologies"
      github: "provandal"

  created: "2026-05-15"
  updated: "2026-05-15"

  tags:
    - "SRT"
    - "TSBPD"
    - "latency"
    - "TLPKTDROP"
    - "ARQ"
    - "live streaming"
    - "media streaming"
    - "intermediate"
    - "education"

  primary_specs:
    - document: "Haivision/srt"
      section: "docs/features/live-streaming.md"
      title: "Live streaming and TSBPD timing"
      url: "https://github.com/Haivision/srt/blob/master/docs/features/live-streaming.md"
    - document: "Haivision/srt"
      section: "srtcore/buffer_rcv.cpp (CRcvBuffer::dropMessageInRange)"
      title: "TLPKTDROP implementation"
      url: "https://github.com/Haivision/srt/blob/master/srtcore/buffer_rcv.cpp"

  source_references:
    - repo: "Haivision/srt"
      path: "srtcore/buffer_rcv.cpp"
      description: "Receive buffer with TSBPD scheduling and TLPKTDROP"
    - repo: "Haivision/srt"
      path: "srtcore/core.cpp"
      description: "TSBPD timer / wakeup loop in CUDT::tsbpdLoop"

# ─────────────────────────────────────────────────────────────────────
# TOPOLOGY (same 3 actors as ARQ scenario)
# ─────────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: caller
      type: host
      label: "Caller (Live Encoder)"
      description: "SRT sender. The tsbpd_latency value is configured per session — we re-run with two values to compare outcomes."
      hardware: "x86_64, 1 GbE NIC"
      ip: "203.0.113.10"
      mac: "02:00:00:00:00:01"
      position: left

    - id: caller_gw
      type: router
      label: "Caller default gateway"
      description: "Edge router routing onto the Internet"
      ip: "203.0.113.1"
      mac: "02:00:00:00:00:11"
      position: center

    - id: listener
      type: host
      label: "Listener (Cloud Ingest)"
      description: "SRT receiver. Configured tsbpd_latency drives the TSBPD engine's deadline calculation per packet."
      hardware: "x86_64, 10 GbE NIC"
      ip: "198.51.100.20"
      mac: "02:00:00:00:00:02"
      position: right

  links:
    - id: link_caller_lan
      from: caller
      to: caller_gw
      speed_gbps: 1.0
      media: fiber_sr
      autoneg: true
    - id: link_internet
      from: caller_gw
      to: listener
      speed_gbps: 10.0
      media: fiber_lr

# ─────────────────────────────────────────────────────────────────────
# OSI LAYERS
# ─────────────────────────────────────────────────────────────────────
osi_layers:
  caller:
    - layer: 7
      name: "Application (Live Encoder)"
      state_schema:
        app_state:
          type: "string"
          initial: "streaming"
        bytes_sent:
          type: "integer"
          initial: 0

    - layer: 5
      name: "SRT (Session)"
      components: ["srtcore/core.cpp", "srtcore/buffer_snd.cpp"]
      state_schema:
        srt_state:
          type: "string"
          initial: "CONNECTED"
        snd_next_seq:
          type: "integer"
          initial: 200
        retransmits:
          type: "integer"
          initial: 0
        tsbpd_latency_ms:
          type: "integer"
          description: "Configured per session — changes between Case A and Case B"
          initial: 50

    - layer: 4
      name: "UDP"
      state_schema:
        local_port:
          type: "integer"
          initial: 49152
        remote_port:
          type: "integer"
          initial: 9000

    - layer: 3
      name: "IP / Routing"
      state_schema:
        src_ip:
          type: "string"
          initial: "203.0.113.10"
        dst_ip:
          type: "string"
          initial: "198.51.100.20"
        next_hop_ip:
          type: "string"
          initial: "203.0.113.1"

    - layer: 2
      name: "Ethernet"
      state_schema:
        src_mac:
          type: "string"
          initial: "02:00:00:00:00:01"
        dst_mac:
          type: "string"
          initial: "02:00:00:00:00:11"

    - layer: 1
      name: "Physical (1 GbE)"
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        speed_gbps:
          type: "number"
          initial: 1.0

  listener:
    - layer: 7
      name: "Application (Cloud Ingest)"
      state_schema:
        app_state:
          type: "string"
          initial: "consuming"
        bytes_delivered:
          type: "integer"
          initial: 0
        decoder_artifacts:
          type: "integer"
          description: "Permanent gaps surfaced to the decoder via TLPKTDROP"
          initial: 0

    - layer: 5
      name: "SRT (Session)"
      components: ["srtcore/core.cpp", "srtcore/buffer_rcv.cpp"]
      state_schema:
        srt_state:
          type: "string"
          initial: "CONNECTED"
        rcv_next_expected:
          type: "integer"
          initial: 200
        rcv_buf_highest:
          type: "integer"
          initial: 199
        loss_list:
          type: "string"
          initial: "[]"
        tlpktdrop_count:
          type: "integer"
          description: "Packets permanently abandoned by TLPKTDROP"
          initial: 0
        tsbpd_latency_ms:
          type: "integer"
          initial: 50

    - layer: 4
      name: "UDP"
      state_schema:
        local_port:
          type: "integer"
          initial: 9000

    - layer: 3
      name: "IP / Routing"
      state_schema:
        src_ip:
          type: "string"
          initial: "198.51.100.20"

    - layer: 2
      name: "Ethernet"
      state_schema:
        src_mac:
          type: "string"
          initial: "02:00:00:00:00:02"

    - layer: 1
      name: "Physical (10 GbE)"
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        speed_gbps:
          type: "number"
          initial: 10.0

# ─────────────────────────────────────────────────────────────────────
# FRAMES
# ─────────────────────────────────────────────────────────────────────
frames:
  - id: "data_seq_200"
    name: "Data seq=200 (original)"
    description: "Baseline data packet — establishes the timing reference for the loss event."
    from: "caller"
    to: "listener"
    via: ["caller_gw"]
    timestamp_ns: 0
    total_bytes: 1370
    color: "#10b981"
    headers:
      - name: "Ethernet II"
        layer: 2
        total_bytes: 14
        fields:
          - { name: "Destination MAC", bits: 48, value: "02:00:00:00:00:11", description: "Caller's default gateway MAC" }
          - { name: "Source MAC",      bits: 48, value: "02:00:00:00:00:01", description: "Caller MAC" }
          - { name: "EtherType",       bits: 16, value: "0x0800", description: "IPv4" }
      - name: "IPv4"
        layer: 3
        total_bytes: 20
        fields:
          - { name: "Source IP",      bits: 32, value: "203.0.113.10", description: "" }
          - { name: "Destination IP", bits: 32, value: "198.51.100.20", description: "" }
          - { name: "Protocol",       bits: 8,  value: 17, description: "UDP" }
          - { name: "TTL",            bits: 8,  value: 64, description: "" }
      - name: "UDP"
        layer: 4
        total_bytes: 8
        fields:
          - { name: "Source Port",      bits: 16, value: 49152, description: "" }
          - { name: "Destination Port", bits: 16, value: 9000,  description: "" }
      - name: "SRT Data Header"
        abbrev: "srt"
        layer: 5
        total_bytes: 16
        fields:
          - { name: "F | Seq", bits: 32, value: "0 | 200", description: "Data packet, sequence 200" }
          - { name: "R", bits: 1, value: 0, description: "Original" }
          - { name: "Timestamp", abbrev: "srt.timestamp", bits: 32, value: 0, description: "t = 0 ms baseline" }
          - { name: "Destination Socket ID", bits: 32, value: "0xDEF00002", description: "" }

  - id: "data_seq_201_dropped"
    name: "Data seq=201 (DROPPED in Internet path)"
    description: "The packet we're going to fail to recover in Case A, and succeed in Case B."
    from: "caller"
    to: "caller_gw"
    timestamp_ns: 3000000
    total_bytes: 1370
    color: "#ef4444"
    headers:
      - name: "SRT Data Header"
        abbrev: "srt"
        layer: 5
        total_bytes: 16
        fields:
          - { name: "F | Seq", bits: 32, value: "0 | 201", description: "Caller sends normally — the drop occurs downstream" }
          - { name: "R", bits: 1, value: 0, description: "Original" }
          - { name: "Timestamp", bits: 32, value: 3000, description: "t = 3 ms — this is the timestamp we'll preserve on the retransmit" }

  - id: "data_seq_202"
    name: "Data seq=202 — arrives, exposes the gap"
    from: "caller"
    to: "listener"
    via: ["caller_gw"]
    timestamp_ns: 6000000
    total_bytes: 1370
    color: "#10b981"
    headers:
      - name: "SRT Data Header"
        abbrev: "srt"
        layer: 5
        total_bytes: 16
        fields:
          - { name: "F | Seq", bits: 32, value: "0 | 202", description: "Arrival exposes the missing 201" }
          - { name: "Timestamp", bits: 32, value: 6000, description: "" }

  - id: "nak_201"
    name: "NAK — loss list = [201]"
    from: "listener"
    to: "caller"
    via: ["caller_gw"]
    timestamp_ns: 6500000
    total_bytes: 78
    color: "#f59e0b"
    headers:
      - name: "SRT Control Header (NAK)"
        abbrev: "srt"
        layer: 5
        total_bytes: 16
        fields:
          - { name: "F | Message Type", bits: 16, value: "1 | 0x0003 (NAK)", description: "Negative Acknowledgment" }
          - { name: "Destination Socket ID", bits: 32, value: "0xABCD0001", description: "Caller" }
      - name: "SRT NAK Loss List"
        abbrev: "srt.nak"
        layer: 5
        total_bytes: 4
        fields:
          - { name: "Lost seq", bits: 32, value: "201", description: "Single-value entry" }

  - id: "data_seq_201_retx"
    name: "Data seq=201 (RETRANSMIT, R=1, original timestamp)"
    description: "Sender retransmits. Arrives in time in Case B (200ms latency), too late in Case A (50ms latency)."
    from: "caller"
    to: "listener"
    via: ["caller_gw"]
    timestamp_ns: 46500000
    total_bytes: 1370
    color: "#a855f7"
    headers:
      - name: "SRT Data Header"
        abbrev: "srt"
        layer: 5
        total_bytes: 16
        fields:
          - { name: "F | Seq", bits: 32, value: "0 | 201", description: "Retransmit of the lost packet" }
          - { name: "R", abbrev: "srt.r", bits: 1, value: 1, description: "Retransmit indicator" }
          - { name: "Timestamp", abbrev: "srt.timestamp", bits: 32, value: 3000, description: "Original timestamp PRESERVED — critical for TSBPD slot placement regardless of arrival time" }

# ─────────────────────────────────────────────────────────────────────
# TIMELINE — Case A (50 ms) followed by Case B (200 ms)
# ─────────────────────────────────────────────────────────────────────
timeline:
  - id: "evt_intro"
    type: "annotation"
    t_ns: 0
    from: "caller"
    to: "listener"
    annotation:
      text: "Same loss event, same network — only tsbpd_latency changes"
      detail: >
        Both peers are CONNECTED. RTT ≈ 40 ms (one-way ~20 ms). We
        will run the IDENTICAL packet sequence twice — first with
        tsbpd_latency = 50 ms (Case A), then with tsbpd_latency =
        200 ms (Case B) — and watch the receiver's TSBPD engine
        decide each packet's fate.

        How TSBPD computes a delivery deadline:

          deadline = sender_timestamp + clock_offset + tsbpd_latency

        Packets sit in the receive buffer until that wall-clock
        time arrives. This smooths jitter and gives the application
        a fixed end-to-end delay. The flip side: any retransmit
        that hasn't arrived by then is unusable.

  # ─── CASE A — tsbpd_latency = 50 ms ──────────────────────────────
  - id: "evt_a_header"
    type: "annotation"
    t_ns: 0
    from: "listener"
    to: "listener"
    annotation:
      text: "CASE A — tsbpd_latency = 50 ms (low-delay configuration)"
      detail: >
        Operator chose a tight 50 ms budget for sports / interactive
        contribution. The network path is identical to Case B —
        only this configured value changes.
    state_after:
      - actor_id: "listener"
        layers:
          - layer: 5
            state_fields:
              tsbpd_latency_ms: 50
      - actor_id: "caller"
        layers:
          - layer: 5
            state_fields:
              tsbpd_latency_ms: 50

  - id: "evt_a_seq200"
    type: "frame_tx"
    t_ns: 0
    frame_id: "data_seq_200"
    annotation:
      text: "Case A: seq=200 arrives. Deadline for any seq=N = sender_ts(N) + 50 ms."
    state_after:
      - actor_id: "caller"
        layers:
          - layer: 3
            state_fields: { src_ip: "203.0.113.10", dst_ip: "198.51.100.20", ttl: 64 }
          - layer: 2
            state_fields: { src_mac: "02:00:00:00:00:01", dst_mac: "02:00:00:00:00:11" }
      - actor_id: "listener"
        layers:
          - layer: 5
            state_fields:
              rcv_next_expected: 201
              rcv_buf_highest: 200
          - layer: 3
            state_fields: { src_ip: "203.0.113.10", dst_ip: "198.51.100.20", ttl: 56 }
          - layer: 2
            state_fields: { src_mac: "02:00:00:00:00:22 (listener-side gw)", dst_mac: "02:00:00:00:00:02" }

  - id: "evt_a_drop"
    type: "error"
    t_ns: 3000000
    frame_id: "data_seq_201_dropped"
    annotation:
      text: "Case A: seq=201 dropped on the Internet path"
      detail: "Receiver does not know yet."
    state_after:
      - actor_id: "caller"
        layers:
          - layer: 3
            state_fields: { src_ip: "203.0.113.10", dst_ip: "198.51.100.20", ttl: 64 }
          - layer: 2
            state_fields: { src_mac: "02:00:00:00:00:01", dst_mac: "02:00:00:00:00:11" }

  - id: "evt_a_gap"
    type: "frame_tx"
    t_ns: 6000000
    frame_id: "data_seq_202"
    annotation:
      text: "Case A: seq=202 arrives → gap detected → immediate NAK"
    state_after:
      - actor_id: "caller"
        layers:
          - layer: 3
            state_fields: { src_ip: "203.0.113.10", dst_ip: "198.51.100.20", ttl: 64 }
          - layer: 2
            state_fields: { src_mac: "02:00:00:00:00:01", dst_mac: "02:00:00:00:00:11" }
      - actor_id: "listener"
        layers:
          - layer: 5
            state_fields:
              rcv_buf_highest: 202
              loss_list: "[201]"
          - layer: 3
            state_fields: { src_ip: "203.0.113.10", dst_ip: "198.51.100.20", ttl: 56 }
          - layer: 2
            state_fields: { src_mac: "02:00:00:00:00:22 (listener-side gw)", dst_mac: "02:00:00:00:00:02" }

  - id: "evt_a_nak"
    type: "frame_tx"
    t_ns: 6500000
    frame_id: "nak_201"
    annotation:
      text: "Case A: NAK in flight (~20 ms one-way RTT/2)"
    state_after:
      - actor_id: "listener"
        layers:
          - layer: 3
            state_fields: { src_ip: "198.51.100.20", dst_ip: "203.0.113.10", ttl: 64 }
          - layer: 2
            state_fields: { src_mac: "02:00:00:00:00:02", dst_mac: "02:00:00:00:00:22 (listener-side gw)" }
      - actor_id: "caller"
        layers:
          - layer: 3
            state_fields: { src_ip: "198.51.100.20", dst_ip: "203.0.113.10", ttl: 56 }
          - layer: 2
            state_fields: { src_mac: "02:00:00:00:00:11", dst_mac: "02:00:00:00:00:01" }

  - id: "evt_a_retx_starts"
    type: "annotation"
    t_ns: 26500000
    from: "caller"
    to: "caller"
    annotation:
      text: "Case A: NAK arrives at caller at t=26.5 ms, retransmit dispatched"
      detail: >
        Sender pulls seq=201 from RexmitQueue, preserves its
        timestamp (3 ms), sets R=1, and re-emits.

  - id: "evt_a_retx"
    type: "frame_tx"
    t_ns: 26500000
    frame_id: "data_seq_201_retx"
    annotation:
      text: "Case A: retransmit will arrive at t ≈ 46.5 ms"
      detail: >
        Timeline so far:
          • t = 3 ms:    seq=201 originally sent (now dropped)
          • t = 6 ms:    seq=202 arrives → NAK fired
          • t = 26.5 ms: NAK in flight, arrives at sender
          • t = 26.5 ms: sender retransmits seq=201
          • t = 46.5 ms: retransmit arrives at receiver

        TSBPD deadline for seq=201 = sender_timestamp(3 ms) +
        tsbpd_latency(50 ms) = 53 ms. The retransmit at 46.5 ms is
        cutting it VERY close. With any added jitter or
        kernel-scheduling delay it tips past the deadline.
    state_after:
      - actor_id: "caller"
        layers:
          - layer: 3
            state_fields: { src_ip: "203.0.113.10", dst_ip: "198.51.100.20", ttl: 64 }
          - layer: 2
            state_fields: { src_mac: "02:00:00:00:00:01", dst_mac: "02:00:00:00:00:11" }
      - actor_id: "listener"
        layers:
          - layer: 3
            state_fields: { src_ip: "203.0.113.10", dst_ip: "198.51.100.20", ttl: 56 }
          - layer: 2
            state_fields: { src_mac: "02:00:00:00:00:22 (listener-side gw)", dst_mac: "02:00:00:00:00:02" }

  - id: "evt_a_tlpktdrop"
    type: "error"
    t_ns: 53000000
    annotation:
      text: "Case A: TLPKTDROP fires at t = 53 ms — seq=201 permanently dropped"
      detail: >
        In this run the retransmit arrived at 46.5 ms — JUST under
        deadline. But TSBPD's wakeup timer fired at 53 ms before the
        packet finished being decrypted/inserted into the buffer, OR
        the retransmit's actual arrival jittered to 54 ms in this
        run. Either way, the receiver decided the packet missed its
        slot and ran TLPKTDROP: removed seq=201 from loss_list,
        advanced rcv_next_expected past it, and surfaced a 'gap' marker
        to the application's decoder.

        The MPEG-TS decoder typically responds with a brief artifact
        (one frame of macroblocking, or a missing audio frame). The
        playout queue continues advancing — better than blocking.
    state_after:
      - actor_id: "listener"
        layers:
          - layer: 7
            state_fields:
              decoder_artifacts: 1
          - layer: 5
            state_fields:
              rcv_next_expected: 203
              loss_list: "[]"
              tlpktdrop_count: 1

  - id: "evt_a_summary"
    type: "annotation"
    t_ns: 60000000
    from: "listener"
    to: "listener"
    annotation:
      text: "Case A result: GLITCH. Tight latency budget cost us this packet."
      detail: >
        Recovery budget = tsbpd_latency(50) − one_way_jitter(~5) ≈ 45 ms.
        End-to-end recovery time observed: ~50 ms.
        45 < 50 → too tight.

        Operator's options:
          1. Accept occasional glitches at this latency level.
          2. Increase latency (Case B).
          3. Reduce loss rate (better network).

  # ─── CASE B — tsbpd_latency = 200 ms (re-run) ────────────────────
  - id: "evt_b_header"
    type: "annotation"
    t_ns: 100000000
    from: "listener"
    to: "listener"
    annotation:
      text: "CASE B — tsbpd_latency = 200 ms (OTT / contribution configuration)"
      detail: >
        Same network. Operator increased tsbpd_latency to 200 ms.
        Re-run the same packet sequence.
    state_after:
      - actor_id: "listener"
        layers:
          - layer: 5
            state_fields:
              tsbpd_latency_ms: 200
              rcv_next_expected: 200
              rcv_buf_highest: 199
              loss_list: "[]"
              tlpktdrop_count: 1
      - actor_id: "caller"
        layers:
          - layer: 5
            state_fields:
              tsbpd_latency_ms: 200
              snd_next_seq: 200
      - actor_id: "listener"
        layers:
          - layer: 7
            state_fields:
              decoder_artifacts: 1

  - id: "evt_b_seq200"
    type: "frame_tx"
    t_ns: 100000000
    frame_id: "data_seq_200"
    annotation:
      text: "Case B: seq=200 arrives. Deadline for any seq=N now sender_ts(N) + 200 ms."
    state_after:
      - actor_id: "caller"
        layers:
          - layer: 3
            state_fields: { src_ip: "203.0.113.10", dst_ip: "198.51.100.20", ttl: 64 }
          - layer: 2
            state_fields: { src_mac: "02:00:00:00:00:01", dst_mac: "02:00:00:00:00:11" }
      - actor_id: "listener"
        layers:
          - layer: 3
            state_fields: { src_ip: "203.0.113.10", dst_ip: "198.51.100.20", ttl: 56 }
          - layer: 2
            state_fields: { src_mac: "02:00:00:00:00:22 (listener-side gw)", dst_mac: "02:00:00:00:00:02" }

  - id: "evt_b_drop"
    type: "error"
    t_ns: 103000000
    frame_id: "data_seq_201_dropped"
    annotation:
      text: "Case B: seq=201 dropped (same drop, same path, same time relative to start of run)"
    state_after:
      - actor_id: "caller"
        layers:
          - layer: 3
            state_fields: { src_ip: "203.0.113.10", dst_ip: "198.51.100.20", ttl: 64 }
          - layer: 2
            state_fields: { src_mac: "02:00:00:00:00:01", dst_mac: "02:00:00:00:00:11" }

  - id: "evt_b_gap"
    type: "frame_tx"
    t_ns: 106000000
    frame_id: "data_seq_202"
    annotation:
      text: "Case B: seq=202 arrives → gap detected → immediate NAK"
    state_after:
      - actor_id: "caller"
        layers:
          - layer: 3
            state_fields: { src_ip: "203.0.113.10", dst_ip: "198.51.100.20", ttl: 64 }
          - layer: 2
