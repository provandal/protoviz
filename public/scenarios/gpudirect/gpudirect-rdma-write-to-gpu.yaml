          - name: "Source QP"
            abbrev: "infiniband.deth.srcqp"
            bits: 24
            value: "0x000001"
            description: "Source QP1 (GSI) — CM sends from QP1"

      - name: "IB MAD (CM REQ)"
        abbrev: "infiniband.mad"
        layer: 6
        total_bytes: 256
        fields:
          - name: "Management Class"
            abbrev: "infiniband.mad.mgmt_class"
            bits: 8
            value: "0x07"
            description: "0x07 = Communication Management. Identifies this MAD as a CM message."
          - name: "Method"
            abbrev: "infiniband.mad.method"
            bits: 8
            value: "0x03"
            description: "0x03 = Send — used for all CM request/response messages"
          - name: "Transaction ID"
            abbrev: "infiniband.mad.transaction_id"
            bits: 64
            value: "0x0002000000000001"
            description: "Unique per-message ID for request/response matching"
          - name: "Attribute ID"
            abbrev: "infiniband.mad.attr_id"
            bits: 16
            value: "0x0010"
            description: "0x0010 = CM_REQ — this is what identifies the MAD as a Connection Request"
            spec_refs:
              - document: "IBTA Vol1"
                section: "12.6.5"
                title: "CM REQ Message"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Local Communication ID"
            abbrev: "infiniband.mad.cm.local_comm_id"
            bits: 32
            value: "0xGPU0C3D4"
            description: "Unique ID assigned by AI node for this connection"
            kernel_ref:
              file: "drivers/infiniband/core/cm.c"
              function: "cm_init_av_for_response"
              notes: "Communication ID generated in cm_send_req()"
          - name: "Service ID"
            abbrev: "infiniband.mad.cm.service_id"
            bits: 64
            value: "0x0000000001000000"
            description: "Identifies the GPUDirect RDMA data transfer service"
          - name: "Local QPN"
            abbrev: "infiniband.mad.cm.local_qpn"
            bits: 24
            value: "0x00A001"
            description: "AI node's QP number — remote server will use this as Destination QP"
            kernel_ref:
              file: "drivers/infiniband/hw/mlx5/qp.c"
              function: "mlx5_ib_create_qp"
              notes: "QPN assigned by firmware via MLX5_CMD_OP_CREATE_QP"
          - name: "Starting PSN"
            abbrev: "infiniband.mad.cm.starting_psn"
            bits: 24
            value: 2345678
            description: "AI node's proposed starting PSN for its sends"
            kernel_ref:
              file: "drivers/infiniband/core/cm.c"
              function: "ib_send_cm_req"
              notes: "get_random_u32() & 0xffffff in cm_send_req()"
          - name: "Path MTU"
            abbrev: "infiniband.mad.cm.path_mtu"
            bits: 4
            value: 5
            description: "5 = 4096 bytes path MTU. Encoding: 1=256, 2=512, 3=1024, 4=2048, 5=4096."
            spec_refs:
              - document: "IBTA Vol1"
                section: "12.6.5"
                title: "CM REQ — Path MTU field encoding"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Retry Count"
            abbrev: "infiniband.mad.cm.retry_count"
            bits: 3
            value: 7
            description: "Max retransmissions before declaring error. 7 = retry indefinitely."
          - name: "RNR Retry Count"
            abbrev: "infiniband.mad.cm.rnr_retry_count"
            bits: 3
            value: 7
            description: "Retries on Receiver Not Ready NAK. 7 = retry indefinitely."
          - name: "Private Data"
            abbrev: "infiniband.mad.cm.private_data"
            bits: 1792
            value: "<gpu_rkey=0xGPU01234, gpu_vaddr=0x00007f4000000000, gpu_buf_len=4194304, is_gpu_memory=true>"
            description: "Application private data — AI node passes GPU MR rkey, GPU BAR virtual address, and buffer length to remote server. The is_gpu_memory flag tells the remote application this is a GPUDirect target."

      - name: "IB ICRC"
        abbrev: "infiniband.icrc"
        layer: 5
        total_bytes: 4
        fields:
          - name: "Invariant CRC"
            abbrev: "infiniband.icrc"
            bits: 32
            value: "0x12345678"
            description: "CRC-32 covering all IB headers + payload (excludes variant fields like TTL, FECN/BECN). Replaces UDP checksum for RoCEv2."

  # ── CM REP ───────────────────────────────────────────────────────
  - id: "cm_rep"
    name: "CM REP (Connection Reply)"
    description: >
