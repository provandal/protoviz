  # ── RDMA WRITE to GPU Memory (remote server writes into AI node's GPU) ────
  - id: "rdma_write_to_gpu"
    name: "RDMA WRITE Only (to GPU Memory)"
    description: >
      4MB RDMA WRITE. Remote server pushes training data directly into AI node's
      GPU HBM at a GPU BAR1 virtual address using the rkey received in CM REQ
      private data. The AI node CPU is NOT involved — the RNIC DMA engine writes
      directly to GPU memory via PCIe peer-to-peer through the BAR1 aperture.
      This is the GPUDirect RDMA path: Network → RNIC → PCIe → GPU HBM.
      No bounce buffer through host DRAM. No CPU copy. No cache pollution.
      Linux: Remote server calls ibv_post_send(IBV_WR_RDMA_WRITE) targeting the
      GPU-backed MR. AI node's RNIC resolves the rkey to a GPU-backed MR in its
      MTT table, and the DMA engine writes via the BAR1 mapping.
