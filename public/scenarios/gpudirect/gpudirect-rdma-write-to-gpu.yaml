meta:
  id: "gpudirect-rdma-write-to-gpu"
  title: "GPUDirect RDMA: RoCEv2 WRITE Direct to GPU Memory"
  protocol: "RoCEv2 + GPUDirect"
  protocol_family: "RDMA"
  version: "1.0.0"
  description: >
    A GPUDirect RDMA scenario showing how an RDMA WRITE lands directly in GPU
    memory rather than host DRAM, using the nvidia-peermem kernel module. The key
    educational moment is the contrast between traditional RDMA WRITE (to host DRAM)
    and GPUDirect RDMA WRITE (directly to GPU HBM via PCIe BAR, zero CPU bounce
    buffer). The flow begins with physical link establishment, proceeds through CUDA
    GPU memory allocation and nvidia-peermem peer memory registration, IB Memory
    Region registration against the GPU BAR address, QP bring-up via CM REQ/REP/RTU,
    an RDMA WRITE that pushes a 4MB tensor buffer directly into GPU HBM bypassing
    the CPU entirely, and an RDMA READ that retrieves that same buffer. Host state
    is shown across all OSI layers, including the GPU/CUDA runtime layer, the
    nvidia-peermem/IB verbs layer, and the standard RoCEv2 stack. Frame fields are
    annotated with IBTA, RFC, and IEEE spec references and cross-referenced to Linux
    kernel source (rdma-core, drivers/infiniband/hw/mlx5, nvidia-peermem).

  learning_objectives:
    - "Understand how nvidia-peermem exposes GPU memory to the RDMA subsystem via the peer_memory_client API"
    - "See how cuMemAlloc allocates GPU HBM and how the GPU BAR1 aperture maps GPU physical memory to the PCIe address space"
    - "Trace ibv_reg_mr() against a GPU virtual address — nvidia-peermem intercepts the registration to pin GPU pages instead of host pages"
    - "Observe the DMA path: RNIC writes directly to GPU HBM via PCIe peer-to-peer, never touching host DRAM or CPU caches"
    - "Contrast traditional RDMA WRITE (RNIC → host DRAM) vs GPUDirect RDMA WRITE (RNIC → GPU HBM via BAR1)"
    - "Follow IB Connection Manager MAD exchange to bring a Queue Pair from RESET to RTS"
    - "See how RDMA READ from GPU memory also bypasses the CPU — GPU RNIC reads GPU HBM via PCIe P2P"
    - "Understand the role of nvidia_peermem_get_pages() and nvidia_peermem_put_pages() in GPU memory lifecycle"

  difficulty: "advanced"

  authors:
    - name: "ProtoViz Community"
      org: "proto-viz"
      github: "proto-viz"
    - name: "Generated via Linux kernel and nvidia-peermem source analysis"
      org: "proto-viz"
      github: ""

  created: "2026-03-17"
  updated: "2026-03-17"

  tags:
    - "RDMA"
    - "RoCEv2"
    - "GPUDirect"
    - "GPU"
    - "CUDA"
    - "nvidia-peermem"
    - "InfiniBand"
    - "100GbE"
    - "lossless-ethernet"
    - "PFC"
    - "AI-infrastructure"
    - "HPC"
    - "education"

  primary_specs:
    - document: "IBTA Vol1"
      section: "10.6"
      title: "Memory Management — Registration and Keys"
      url: "https://www.infinibandta.org/ibta-specification/"
      alt_url: "https://docs.kernel.org/infiniband/index.html"
    - document: "IBTA Vol1"
      section: "9.7"
      title: "Reliable Connection Service"
      url: "https://www.infinibandta.org/ibta-specification/"
      alt_url: "https://www.rdmamojo.com/2012/12/28/ib-verbs-connection-setup/"
    - document: "RFC 7871"
      section: "3"
      title: "RoCEv2 — IB transport over UDP/IPv4/IPv6"
      url: "https://datatracker.ietf.org/doc/html/rfc7871"
    - document: "IEEE 802.1Qbb"
      section: "36"
      title: "Priority-based Flow Control"
      url: "https://standards.ieee.org/ieee/802.1Qbb/4788/"
    - document: "IEEE 802.3cd"
      section: "135"
      title: "100GBASE-KR4 Auto-Negotiation and Link Training"
      url: "https://standards.ieee.org/ieee/802.3cd/7387/"

  content_disclaimer: >
    Protocol descriptions in this scenario are based on open-source implementations
    (Linux kernel, rdma-core, nvidia-peermem, CUDA documentation) and public RFCs.
    No proprietary specification text has been reproduced. IBTA, IEEE, NVIDIA, and
    other specification references are provided as citations for further reading.

  source_references:
    - repo: "torvalds/linux"
      path: "drivers/infiniband/core/umem.c"
      description: "ib_umem_get() — user memory region pinning; calls peer_memory_client for GPU memory"
    - repo: "Mellanox/nv_peer_memory"
      path: "nv_peer_mem.c"
      description: "nvidia-peermem kernel module — implements ib_peer_memory_client for NVIDIA GPUs"
    - repo: "torvalds/linux"
      path: "drivers/infiniband/hw/mlx5/mr.c"
      description: "mlx5_ib_reg_user_mr() — MR registration, MLX5_CMD_OP_CREATE_MKEY for GPU-backed MRs"
    - repo: "torvalds/linux"
      path: "drivers/infiniband/hw/mlx5/qp.c"
      description: "mlx5 QP creation, modify_qp (RESET→INIT→RTR→RTS), WQE posting"
    - repo: "torvalds/linux"
      path: "drivers/infiniband/core/cm.c"
      description: "IB Connection Manager — REQ/REP/RTU/DREQ/DREP state machine"
    - repo: "torvalds/linux"
      path: "drivers/infiniband/core/verbs.c"
      description: "ib_modify_qp — generic verbs QP state machine enforcement"
    - repo: "linux-rdma/rdma-core"
      path: "libibverbs/verbs.h"
      description: "Userspace verbs API — ibv_reg_mr, ibv_post_send, ibv_poll_cq"

# ─────────────────────────────────────────────────────────────────
# TOPOLOGY
# ─────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: "ai_node"
      type: "initiator"
      label: "AI Compute Node (DGX H100)"
      description: "GPU-accelerated compute node with NVIDIA H100 GPU and ConnectX-7 RNIC. nvidia-peermem enables direct RDMA to/from GPU HBM."
      hardware: "NVIDIA H100 GPU + ConnectX-7 100GbE RNIC (PCIe Gen5 peer-to-peer)"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "192.168.1.10"
      gid: "fe80::0002:c903:0012:3456"
      mac: "00:02:c9:12:34:56"
      position: "left"

    - id: "switch"
      type: "switch"
      label: "100GbE RoCEv2 Switch"
      description: "Lossless 100GbE datacenter switch with PFC and ECN/RED support. PFC priority 3 used for RoCEv2 traffic."
      hardware: "Generic 100GbE datacenter switch"
      position: "center"

    - id: "remote_server"
      type: "target"
      label: "Remote Server"
      description: "Standard RoCEv2 endpoint — sends data that will land directly in AI node's GPU memory"
      hardware: "ConnectX-7 100GbE RNIC"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "192.168.1.20"
      gid: "fe80::0002:c903:00ab:cdef"
      mac: "00:02:c9:ab:cd:ef"
      position: "right"

  links:
    - id: "link-ai-sw"
      from: "ai_node"
      to: "switch"
      speed_gbps: 100
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true
    - id: "link-sw-remote"
      from: "switch"
      to: "remote_server"
      speed_gbps: 100
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true

# ─────────────────────────────────────────────────────────────────
# OSI LAYER DEFINITIONS (per actor)
# ─────────────────────────────────────────────────────────────────
osi_layers:
  ai_node:
    - layer: 7
      name: "GPU / CUDA Runtime"
      components: ["CUDA Driver API", "cuMemAlloc", "libcuda.so", "GPU HBM"]
      state_schema:
        cuda_state:
          type: "string"
          description: "CUDA runtime initialization state"
          initial: "uninitialized"
        gpu_buffer_ptr:
          type: "string"
          description: "CUDA device pointer returned by cuMemAlloc (GPU virtual address)"
          initial: "null"
        gpu_bar_addr:
          type: "string"
          description: "PCIe BAR1 address mapping the GPU buffer into CPU/RNIC-visible address space"
          initial: "null"
        gpu_buffer_size:
          type: "integer"
          description: "Size of allocated GPU buffer in bytes"
          initial: 0
        gpu_memory_type:
          type: "string"
          description: "Type of GPU memory backing the buffer"
          initial: "none"

    - layer: 6
      name: "nvidia-peermem / IB Verbs"
      components: ["nvidia-peermem kernel module", "libibverbs", "drivers/infiniband/core/umem.c"]
      state_schema:
        peermem_state:
          type: "string"
          description: "nvidia-peermem module state"
          initial: "not_loaded"
        mr_state:
          type: "string"
          description: "Memory Region registration state"
          initial: "none"
        mr_lkey:
          type: "string"
          description: "Local Memory Region key for GPU buffer"
          initial: "null"
        mr_rkey:
          type: "string"
          description: "Remote Memory Region key for GPU buffer (shared with peer)"
          initial: "null"
        peer_memory_client:
          type: "string"
          description: "Registered IB peer memory client name"
          initial: "none"
        gpu_pages_pinned:
          type: "boolean"
          description: "GPU pages pinned via nvidia_peermem_get_pages()"
          initial: false

    - layer: 5
      name: "IB Transport (RC QP)"
      components: ["drivers/infiniband/hw/mlx5/qp.c", "drivers/infiniband/core/verbs.c"]
      state_schema:
        qp_state:
          type: "string"
          description: "Queue Pair state machine state"
          initial: "RESET"
        qp_num:
          type: "string"
          description: "Local QP number"
          initial: "null"
        psn_send:
          type: "integer"
          description: "Send Packet Sequence Number"
          initial: 0
        psn_recv_expected:
          type: "integer"
          description: "Next expected receive PSN"
          initial: 0
        sq_depth:
          type: "integer"
          description: "Send Queue WQE count"
          initial: 128
        rq_depth:
          type: "integer"
          description: "Receive Queue WQE count"
          initial: 128
        pmtu:
          type: "string"
          description: "Path MTU for this QP"
          initial: "null"
        sq_psn:
          type: "integer"
          description: "Starting PSN for sends"
          initial: 0
        remote_qpn:
          type: "string"
          description: "Remote QP number"
          initial: "null"

    - layer: 4
      name: "UDP (RoCEv2 encapsulation)"
      components: ["kernel UDP stack", "RNIC hardware offload"]
      state_schema:
        src_port:
          type: "integer"
          description: "UDP source port (hash of flow for ECMP)"
          initial: 0
        dst_port:
          type: "integer"
          description: "UDP destination port — always 4791 for RoCEv2"
          initial: 4791

    - layer: 3
      name: "IP / Routing"
      components: ["kernel IP stack", "RNIC GID table"]
      state_schema:
        src_ip:
          type: "string"
          description: "Source IP address"
          initial: "192.168.1.10"
        dst_ip:
          type: "string"
          description: "Destination IP address"
          initial: "null"
        dscp:
          type: "integer"
          description: "DSCP/ToS marking for QoS (ECN uses low 2 bits)"
          initial: 0
        ecn_state:
          type: "string"
          description: "ECN state: Not-ECT | ECT(0) | ECT(1) | CE"
          initial: "Not-ECT"
        ttl:
          type: "integer"
          initial: 64

    - layer: 2
      name: "Ethernet / PFC"
      components: ["mlx5 driver", "IEEE 802.1Q", "IEEE 802.1Qbb PFC"]
      state_schema:
        link_state:
          type: "string"
          initial: "down"
        pfc_enabled:
          type: "boolean"
          description: "PFC enabled on priority 3"
          initial: false
        pfc_priority:
          type: "integer"
          description: "PFC priority class for RoCEv2 traffic"
          initial: 3
        pfc_xoff:
          type: "boolean"
          description: "PFC XOFF asserted (pause active)"
          initial: false
        tx_queue_depth:
          type: "integer"
          description: "Approximate bytes in TX queue"
          initial: 0

    - layer: 1
      name: "Physical / RS-FEC"
      components: ["IEEE 802.3cd", "100GBASE-SR4", "RS(544,514) FEC"]
      state_schema:
        phy_state:
          type: "string"
          description: "Physical layer state (point-to-point link to switch)"
          initial: "down"
        an_state:
          type: "string"
          description: "Auto-Negotiation state (with switch port A)"
          initial: "idle"
        lt_state:
          type: "string"
          description: "Link Training state (with switch port A)"
          initial: "idle"
        fec_mode:
          type: "string"
          initial: "RS(544,514)"
        fec_corrected_blocks:
          type: "integer"
          initial: 0
        speed:
          type: "string"
          initial: "unknown"
        signal_detect:
          type: "boolean"
          initial: false

  remote_server:
    - layer: 7
      name: "Application / Verbs"
      components: ["libibverbs", "librdmacm", "user application"]
      state_schema:
        app_state:
          type: "string"
          initial: "idle"
        mr_registered:
          type: "boolean"
          initial: false
        mr_vaddr:
          type: "string"
          description: "Virtual address of registered Memory Region (host DRAM)"
          initial: "null"
        mr_length:
          type: "integer"
          description: "Length of registered MR in bytes"
          initial: 0
        data_source:
          type: "string"
          description: "Source of data for RDMA WRITE (e.g. training data, model weights)"
          initial: "none"

    - layer: 6
      name: "CM / rdma-cm"
      components: ["librdmacm", "drivers/infiniband/core/cma.c"]
      state_schema:
        cm_state:
          type: "string"
          initial: "listening"
        cm_id:
          type: "string"
          initial: "null"

    - layer: 5
      name: "IB Transport (RC QP)"
      components: ["drivers/infiniband/hw/mlx5/qp.c"]
      state_schema:
        qp_state:
          type: "string"
          initial: "RESET"
        qp_num:
          type: "string"
          initial: "null"
        psn_send:
          type: "integer"
          initial: 0
        psn_recv_expected:
          type: "integer"
          initial: 0
        lkey:
          type: "string"
          initial: "null"
        rkey:
          type: "string"
          description: "rkey for remote server's host DRAM MR"
          initial: "null"
        remote_qpn:
          type: "string"
          initial: "null"
        pmtu:
          type: "string"
          initial: "null"

    - layer: 4
      name: "UDP (RoCEv2 encapsulation)"
      components: ["kernel UDP stack", "RNIC hardware offload"]
      state_schema:
        dst_port:
          type: "integer"
          initial: 4791

    - layer: 3
      name: "IP / Routing"
      components: ["kernel IP stack"]
      state_schema:
        src_ip:
          type: "string"
          initial: "192.168.1.20"
        ecn_state:
          type: "string"
          initial: "Not-ECT"

    - layer: 2
      name: "Ethernet / PFC"
      components: ["mlx5 driver", "IEEE 802.1Qbb PFC"]
      state_schema:
        link_state:
          type: "string"
          initial: "down"
        pfc_enabled:
          type: "boolean"
          initial: false
        pfc_xoff:
          type: "boolean"
          initial: false

    - layer: 1
      name: "Physical / RS-FEC"
      components: ["IEEE 802.3cd", "100GBASE-SR4"]
      state_schema:
        phy_state:
          type: "string"
          description: "Physical layer state (point-to-point link to switch)"
          initial: "down"
        an_state:
          type: "string"
          description: "Auto-Negotiation state (with switch port B)"
          initial: "idle"
        lt_state:
          type: "string"
          description: "Link Training state (with switch port B)"
          initial: "idle"
        speed:
          type: "string"
          initial: "unknown"
        signal_detect:
          type: "boolean"
          initial: false

  switch:
    - layer: 3
      name: "IP Forwarding / ECN"
      components: ["L3 forwarding (optional)", "ECN/WRED marking"]
      state_schema:
        ecn_marking_enabled:
          type: "boolean"
          description: "ECN CE marking enabled for congestion notification (DCQCN)"
          initial: true
        wred_threshold_bytes:
          type: "integer"
          description: "WRED threshold before ECN CE marking on priority 3"
          initial: 153600
    - layer: 2
      name: "Ethernet Switching / PFC"
      components: ["802.1Q bridge", "802.1Qbb PFC", "MAC forwarding table"]
      state_schema:
        fwd_table_entries:
          type: "integer"
          description: "Number of learned MAC addresses in forwarding table"
          initial: 0
        port_a_pfc_xoff:
          type: "boolean"
          description: "PFC XOFF asserted toward AI node (priority 3)"
          initial: false
        port_b_pfc_xoff:
          type: "boolean"
          description: "PFC XOFF asserted toward remote server (priority 3)"
          initial: false
        port_a_egress_queue_p3:
          type: "integer"
          description: "Bytes queued for egress on port A (toward AI node), priority 3"
          initial: 0
        port_b_egress_queue_p3:
          type: "integer"
          description: "Bytes queued for egress on port B (toward remote server), priority 3"
          initial: 0
    - layer: 1
      name: "Physical (per-port)"
      components: ["100GBASE-SR4", "RS(544,514) FEC"]
      state_schema:
        port_a_phy:
          type: "string"
          description: "Physical state of port facing AI node"
          initial: "down"
        port_a_an:
          type: "string"
          description: "Auto-Negotiation state on port A"
          initial: "idle"
        port_a_lt:
          type: "string"
          description: "Link Training state on port A"
          initial: "idle"
        port_b_phy:
          type: "string"
          description: "Physical state of port facing remote server"
          initial: "down"
        port_b_an:
          type: "string"
          description: "Auto-Negotiation state on port B"
          initial: "idle"
        port_b_lt:
          type: "string"
          description: "Link Training state on port B"
          initial: "idle"

# ─────────────────────────────────────────────────────────────────
# FRAME LIBRARY
# ─────────────────────────────────────────────────────────────────
frames:

  # ── ARP ─────────────────────────────────────────────────────────
  - id: "arp_request"
    name: "ARP Request"
    description: "AI node broadcasts ARP to resolve 192.168.1.20 to a MAC address"
    from: "ai_node"
    to: "broadcast"
    via: ["switch"]
    timestamp_ns: 5000000
    total_bytes: 42
    color: "#f0c040"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            offset_bits: 0
            value: "ff:ff:ff:ff:ff:ff"
            description: "Broadcast MAC — ARP request goes to all hosts"
            spec_refs:
              - document: "IEEE 802.3"
                section: "3.2.3"
                title: "Broadcast address"
                url: "https://standards.ieee.org/ieee/802.3/7661/"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            offset_bits: 48
            value: "00:02:c9:12:34:56"
            description: "AI node NIC MAC address"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            offset_bits: 96
            value: "0x0806"
            value_hex: "0x0806"
            description: "EtherType 0x0806 = ARP"
            spec_refs:
              - document: "RFC 826"
                section: "1"
                title: "ARP EtherType"
                url: "https://datatracker.ietf.org/doc/html/rfc826"
      - name: "ARP"
        abbrev: "arp"
        layer: 3
        total_bytes: 28
        fields:
          - name: "Hardware Type"
            abbrev: "arp.hw.type"
            bits: 16
            value: 1
            description: "1 = Ethernet"
          - name: "Protocol Type"
            abbrev: "arp.proto.type"
            bits: 16
            value: "0x0800"
            description: "0x0800 = IPv4"
          - name: "Opcode"
            abbrev: "arp.opcode"
            bits: 16
            value: 1
            description: "1 = Request, 2 = Reply"
          - name: "Sender MAC"
            abbrev: "arp.src.hw_mac"
            bits: 48
            value: "00:02:c9:12:34:56"
            description: "AI node MAC"
          - name: "Sender IP"
            abbrev: "arp.src.proto_ipv4"
            bits: 32
            value: "192.168.1.10"
            description: "AI node IP"
          - name: "Target MAC"
            abbrev: "arp.dst.hw_mac"
            bits: 48
            value: "00:00:00:00:00:00"
            description: "Unknown — this is what we are asking for"
          - name: "Target IP"
            abbrev: "arp.dst.proto_ipv4"
            bits: 32
            value: "192.168.1.20"
            description: "IP we want to resolve to MAC"

  - id: "arp_reply"
    name: "ARP Reply"
    description: "Remote server responds with its MAC address"
    from: "remote_server"
    to: "ai_node"
    via: ["switch"]
    timestamp_ns: 5200000
    total_bytes: 42
    color: "#f0c040"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:12:34:56"
            description: "Unicast reply to AI node"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
            description: "Remote server MAC"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0806"
      - name: "ARP"
        abbrev: "arp"
        layer: 3
        total_bytes: 28
        fields:
          - name: "Opcode"
            abbrev: "arp.opcode"
            bits: 16
            value: 2
            description: "2 = Reply — I have the MAC you asked for"
          - name: "Sender MAC"
            abbrev: "arp.src.hw_mac"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
            description: "Remote server MAC — this is the answer"
          - name: "Sender IP"
            abbrev: "arp.src.proto_ipv4"
            bits: 32
            value: "192.168.1.20"

  # ── CM REQ ───────────────────────────────────────────────────────
  - id: "cm_req"
    name: "CM REQ (Connection Request)"
    description: >
      IB Connection Manager Request. AI node proposes QP parameters including
      its QP number, starting PSN, path MTU, and retry counts. Carried as a
      Management Datagram (MAD) over UDP port 4791.
      Linux: drivers/infiniband/core/cm.c cm_send_req()
    from: "ai_node"
    to: "remote_server"
    via: ["switch"]
    timestamp_ns: 18000000
    total_bytes: 322
    color: "#5b8dd9"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:12:34:56"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
            description: "0x0800 = IPv4"

      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Version"
            abbrev: "ip.version"
            bits: 4
            value: 4
          - name: "IHL"
            abbrev: "ip.hdr_len"
            bits: 4
            value: 5
            description: "Header length = 5 x 32-bit words = 20 bytes"
          - name: "DSCP/ECN"
            abbrev: "ip.dscp"
            bits: 8
            value: "0x28"
            value_hex: "0x28"
            description: "DSCP 10 (AF11) — RoCEv2 traffic class. Low 2 bits = ECN capable transport (ECT(0) = 0b10)"
            spec_refs:
              - document: "RFC 3168"
                section: "5"
                title: "ECN field in IP header"
                url: "https://datatracker.ietf.org/doc/html/rfc3168#section-5"
          - name: "Total Length"
            abbrev: "ip.len"
            bits: 16
            value: 308
            description: "20 (IP) + 288 (UDP with IB payload)"
          - name: "TTL"
            abbrev: "ip.ttl"
            bits: 8
            value: 64
          - name: "Protocol"
            abbrev: "ip.proto"
            bits: 8
            value: 17
            description: "17 = UDP — RoCEv2 always encapsulates IB transport in UDP"
            spec_refs:
              - document: "RFC 7871"
                section: "3"
                title: "RoCEv2 uses UDP encapsulation"
                url: "https://datatracker.ietf.org/doc/html/rfc7871"
          - name: "Source"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.1.10"
          - name: "Destination"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.1.20"

      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: 49152
            description: "Ephemeral port chosen by RNIC. Used by switches for ECMP load balancing."
            spec_refs:
              - document: "RFC 7871"
                section: "8"
                title: "UDP source port for ECMP"
                url: "https://datatracker.ietf.org/doc/html/rfc7871#section-8"
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 4791
            description: "IANA-assigned well-known port for RoCEv2."
            spec_refs:
              - document: "RFC 7871"
                section: "7"
                title: "IANA port assignment 4791"
                url: "https://datatracker.ietf.org/doc/html/rfc7871#section-7"
          - name: "Length"
            abbrev: "udp.length"
            bits: 16
            value: 288
            description: "8 (UDP header) + 12 (BTH) + 8 (DETH) + 256 (MAD) + 4 (ICRC)"
          - name: "Checksum"
            abbrev: "udp.checksum"
            bits: 16
            value: "0x0000"
            description: "RoCEv2 sets UDP checksum to 0. Integrity is protected by ICRC in the IB layer."

      - name: "IB BTH (Base Transport Header)"
        abbrev: "infiniband.bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "Opcode"
            abbrev: "infiniband.bth.opcode"
            bits: 8
            value: "0x64"
            value_hex: "0x64"
            description: "0x64 = UD Send Only — all CM messages use Unreliable Datagram SEND. The CM message type (REQ/REP/RTU) is encoded in the MAD Attribute ID, not the BTH opcode."
            spec_refs:
              - document: "IBTA Vol1"
                section: "5.3.1"
                title: "BTH Opcode encoding — Table 38"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Solicited Event (SE)"
            abbrev: "infiniband.bth.se"
            bits: 1
            value: 0
            description: "SE=0: receiver need not generate a solicited event"
          - name: "MigReq"
            abbrev: "infiniband.bth.migreq"
            bits: 1
            value: 1
            description: "1 = path is primary (not alternate/migrated)"
          - name: "Pad Count"
            abbrev: "infiniband.bth.padcnt"
            bits: 2
            value: 0
          - name: "Transport Header Version"
            abbrev: "infiniband.bth.tver"
            bits: 4
            value: 0
          - name: "P_Key"
            abbrev: "infiniband.bth.pkey"
            bits: 16
            value: "0xFFFF"
            value_hex: "0xFFFF"
            description: "Full membership P_Key (0xFFFF). Partition Key — defines a virtual fabric partition."
            spec_refs:
              - document: "IBTA Vol1"
                section: "10.9"
                title: "Partition Key"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "FECN"
            abbrev: "infiniband.bth.fecn"
            bits: 1
            value: 0
            description: "Forward ECN — not set"
          - name: "BECN"
            abbrev: "infiniband.bth.becn"
            bits: 1
            value: 0
            description: "Backward ECN — not set"
          - name: "Destination QP"
            abbrev: "infiniband.bth.destqp"
            bits: 24
            value: "0x000001"
            value_hex: "0x000001"
            description: "QP 1 = Well-known QP for CM (General Services Interface). All CM traffic goes to QP1."
            spec_refs:
              - document: "IBTA Vol1"
                section: "3.5.3"
                title: "Reserved QP Numbers — QP1 = GSI"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Acknowledge Request (A)"
            abbrev: "infiniband.bth.ackreq"
            bits: 1
            value: 1
            description: "A=1: Request an ACK from remote side"
          - name: "Packet Sequence Number (PSN)"
            abbrev: "infiniband.bth.psn"
            bits: 24
            value: 0
            description: "Starting sequence number for CM MAD exchange"
            spec_refs:
              - document: "IBTA Vol1"
                section: "9.4"
                title: "Packet Sequence Number"
                url: "https://www.infinibandta.org/ibta-specification/"

      - name: "IB DETH (Datagram Extended Transport Header)"
        abbrev: "infiniband.deth"
        layer: 5
        total_bytes: 8
        fields:
