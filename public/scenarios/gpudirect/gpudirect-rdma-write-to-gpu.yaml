# ─────────────────────────────────────────────────────────────────
# TIMELINE
# ─────────────────────────────────────────────────────────────────
timeline:

  # ── Phase 1: Link Training ──────────────────────────────────────

  - id: "evt_phy_signal_link_a"
    type: "state_change"
    t_ns: 0
    annotation:
      text: "Link A: signal detected — AI Node ↔ Switch port A"
      detail: >
        Optical transceiver on AI node detects light from switch port A.
        Auto-Negotiation (AN) begins per IEEE 802.3cd clause 73. L1 is point-to-point —
        this is independent of the switch ↔ remote server link.
      spec_refs:
        - document: "IEEE 802.3cd"
          section: "73"
          title: "Auto-Negotiation for 100GBASE-KR4"
          url: "https://standards.ieee.org/ieee/802.3cd/7387/"
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              phy_state: "AN_IN_PROGRESS"
              signal_detect: true
              an_state: "ABILITY_DETECT"
      - actor_id: "switch"
        layers:
          - layer: 1
            name: "Physical (per-port)"
            state_fields:
              port_a_phy: "AN_IN_PROGRESS"
              port_a_an: "ABILITY_DETECT"

  - id: "evt_phy_signal_link_b"
    type: "state_change"
    t_ns: 500000
    annotation:
      text: "Link B: signal detected — Switch port B ↔ Remote Server"
      detail: >
        Optical transceiver on remote server detects light from switch port B.
        AN begins independently on this link.
    state_after:
      - actor_id: "remote_server"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              phy_state: "AN_IN_PROGRESS"
              signal_detect: true
              an_state: "ABILITY_DETECT"
      - actor_id: "switch"
        layers:
          - layer: 1
            name: "Physical (per-port)"
            state_fields:
              port_b_phy: "AN_IN_PROGRESS"
              port_b_an: "ABILITY_DETECT"

  - id: "evt_an_complete_link_a"
    type: "state_change"
    t_ns: 2000000
    annotation:
      text: "Link A: AN complete — 100GbE agreed, Link Training begins"
      detail: >
        AN exchanges technology ability pages between AI node and switch port A.
        Both agree on 100GBASE-SR4. RS(544,514) FEC is mandatory for 100G.
        Link Training begins to equalize the channel (pre-emphasis, post-cursor).
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              an_state: "COMPLETE"
              lt_state: "IN_PROGRESS"
              fec_mode: "RS(544,514)"
              speed: "100Gbps"
      - actor_id: "switch"
        layers:
          - layer: 1
            name: "Physical (per-port)"
            state_fields:
              port_a_an: "COMPLETE"
              port_a_lt: "IN_PROGRESS"

  - id: "evt_an_complete_link_b"
    type: "state_change"
    t_ns: 2200000
    annotation:
      text: "Link B: AN complete — 100GbE agreed, Link Training begins"
      detail: >
        AN completes on switch port B ↔ remote server. Same negotiation: 100GBASE-SR4
        with RS(544,514) FEC. Link Training begins independently on this link.
    state_after:
      - actor_id: "remote_server"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              an_state: "COMPLETE"
              lt_state: "IN_PROGRESS"
              speed: "100Gbps"
      - actor_id: "switch"
        layers:
          - layer: 1
            name: "Physical (per-port)"
            state_fields:
              port_b_an: "COMPLETE"
              port_b_lt: "IN_PROGRESS"

  - id: "evt_link_up_a"
    type: "state_change"
    t_ns: 3800000
    annotation:
      text: "Link A UP — AI Node ↔ Switch at 100Gbps with RS-FEC"
      detail: >
        Link Training complete on AI node ↔ switch. PFC (802.1Qbb) is enabled for
        priority 3 via DCBX negotiation (not shown). Ethernet frames can now flow
        on this link segment.
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              phy_state: "UP"
              lt_state: "COMPLETE"
          - layer: 2
            name: "Ethernet / PFC"
            state_fields:
              link_state: "up"
              pfc_enabled: true
              pfc_priority: 3
      - actor_id: "switch"
        layers:
          - layer: 1
            name: "Physical (per-port)"
            state_fields:
              port_a_phy: "UP"
              port_a_lt: "COMPLETE"

  - id: "evt_link_up_b"
    type: "state_change"
    t_ns: 4000000
    annotation:
      text: "Link B UP — Switch ↔ Remote Server at 100Gbps with RS-FEC"
      detail: >
        Link Training complete on switch ↔ remote server. PFC enabled. Both links
        are now up — the switch can forward L2 frames between its ports. End-to-end
        L2 connectivity is established.
    state_after:
      - actor_id: "remote_server"
        layers:
          - layer: 1
            name: "Physical / RS-FEC"
            state_fields:
              phy_state: "UP"
              lt_state: "COMPLETE"
          - layer: 2
            name: "Ethernet / PFC"
            state_fields:
              link_state: "up"
              pfc_enabled: true
      - actor_id: "switch"
        layers:
          - layer: 1
            name: "Physical (per-port)"
            state_fields:
              port_b_phy: "UP"
              port_b_lt: "COMPLETE"
          - layer: 2
            name: "Ethernet Switching / PFC"
            state_fields:
              fwd_table_entries: 0

  # ── Phase 1b: ARP ──────────────────────────────────────────────
  - id: "evt_arp_req"
    type: "frame_tx"
    t_ns: 5000000
    frame_id: "arp_request"
    annotation:
      text: "ARP Request: who has 192.168.1.20?"
      detail: "RoCEv2 uses IP addressing. Before any connection setup, IP reachability must be established."
    state_after:
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "Ethernet Switching / PFC"
            state_fields:
              fwd_table_entries: 1

  - id: "evt_arp_rep"
    type: "frame_tx"
    t_ns: 5200000
    frame_id: "arp_reply"
    annotation:
      text: "ARP Reply: 192.168.1.20 is at 00:02:c9:ab:cd:ef"
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 3
            name: "IP / Routing"
            state_fields:
              dst_ip: "192.168.1.20"
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "Ethernet Switching / PFC"
            state_fields:
              fwd_table_entries: 2

  # ── Phase 2: GPU Memory Setup ──────────────────────────────────
  # This is the GPUDirect-specific phase — no equivalent in standard RoCEv2

  - id: "evt_gpu_cuda_init"
    type: "state_change"
    t_ns: 6000000
    annotation:
      text: "GPU / CUDA Runtime initialized — cuInit() and cuDeviceGet()"
      detail: >
        The application initializes the CUDA driver API. cuInit(0) loads the CUDA
        driver and enumerates GPUs. cuDeviceGet() selects the H100 GPU. cuCtxCreate()
        creates a CUDA context on the device. At this point the GPU is ready for
        memory allocation but no GPU memory has been allocated yet.
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 7
            name: "GPU / CUDA Runtime"
            state_fields:
              cuda_state: "initialized"
              gpu_memory_type: "none"

  - id: "evt_gpu_mem_alloc"
    type: "state_change"
    t_ns: 7000000
    annotation:
      text: "GPU memory allocated — cuMemAlloc() returns 4MB GPU HBM buffer"
      detail: >
        cuMemAlloc(&devPtr, 4194304) allocates a 4MB buffer in GPU High Bandwidth
        Memory (HBM). The returned device pointer (devPtr) is a GPU virtual address
        in the GPU's own address space. This memory lives on the GPU die, connected
        via HBM3 at ~3.35 TB/s bandwidth. The pointer is not directly accessible
        by the CPU or RNIC — it must be mapped through the GPU's PCIe BAR1 aperture
        for peer-to-peer access. The H100 supports up to 256GB of BAR1 aperture
        (resizable BAR / large BAR mode) to map the full 80GB HBM.
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 7
            name: "GPU / CUDA Runtime"
            state_fields:
              cuda_state: "buffer_allocated"
              gpu_buffer_ptr: "0x7f4000000000 (GPU VA)"
              gpu_buffer_size: 4194304
              gpu_memory_type: "HBM3"

  - id: "evt_gpu_peermem_load"
    type: "state_change"
    t_ns: 8000000
    annotation:
      text: "nvidia-peermem kernel module loaded — GPU memory exposed to RDMA subsystem"
      detail: >
        modprobe nvidia-peermem loads the nvidia-peermem kernel module. This module
        registers itself as an IB peer_memory_client via ib_register_peer_memory_client().
        When ibv_reg_mr() is later called with a GPU virtual address, the IB core's
        ib_umem_get() will call nvidia_peermem_acquire() to check if the address belongs
        to GPU memory. If it does, nvidia_peermem_get_pages() calls
        nvidia_p2p_get_pages() to pin the GPU physical pages and return their PCIe BAR1
        addresses. These BAR1 addresses are then stored in the RNIC's Memory Translation
        Table (MTT), enabling the RNIC DMA engine to write/read GPU memory directly via
        PCIe peer-to-peer without any CPU involvement.
      spec_refs:
        - document: "IBTA Vol1"
          section: "10.6"
          title: "Memory Management — peer memory extension"
          url: "https://www.infinibandta.org/ibta-specification/"
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 6
            name: "nvidia-peermem / IB Verbs"
            state_fields:
              peermem_state: "loaded"
              peer_memory_client: "nvidia-peermem"

  - id: "evt_gpu_bar_expose"
    type: "state_change"
    t_ns: 8500000
    annotation:
      text: "GPU BAR1 mapping established — GPU HBM accessible at PCIe address"
      detail: >
        nvidia-peermem calls nvidia_p2p_get_pages() which pins the GPU physical pages
        backing the cuMemAlloc'd buffer and returns their PCIe BAR1 physical addresses.
        The BAR1 aperture is the PCIe window through which external devices (like the
        RNIC) can access GPU memory. On H100 with large BAR enabled, the entire 80GB HBM
        can be mapped through BAR1. The BAR1 address is a PCIe physical address that the
        RNIC DMA engine can target directly — no CPU TLB, no IOMMU for P2P.
        This is the fundamental hardware enabler: PCIe allows peer-to-peer transactions
        between endpoints (RNIC and GPU) without routing through the CPU's root complex
        memory controller.
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 7
            name: "GPU / CUDA Runtime"
            state_fields:
              gpu_bar_addr: "0x00007f4000000000 (BAR1 mapping)"
          - layer: 6
            name: "nvidia-peermem / IB Verbs"
            state_fields:
              gpu_pages_pinned: true

  # ── Phase 3: Memory Region Registration ────────────────────────

  - id: "evt_mr_reg_gpu"
    type: "state_change"
    t_ns: 9000000
    annotation:
      text: "Memory Region registered against GPU BAR address via ibv_reg_mr()"
      detail: >
        ibv_reg_mr(pd, gpu_va, 4194304, IBV_ACCESS_LOCAL_WRITE | IBV_ACCESS_REMOTE_WRITE |
        IBV_ACCESS_REMOTE_READ) is called with the GPU virtual address. The IB core's
        ib_umem_get() detects this is GPU memory via the nvidia-peermem peer_memory_client:
        1. nvidia_peermem_acquire() confirms the address belongs to NVIDIA GPU memory
        2. nvidia_peermem_get_pages() calls nvidia_p2p_get_pages() to get BAR1 physical pages
        3. These BAR1 physical addresses are written into the RNIC's MTT (Memory Translation Table)
        4. MLX5_CMD_OP_CREATE_MKEY creates an MR whose page table points to GPU BAR1 addresses
        The returned lkey and rkey can now be used for RDMA operations — the RNIC hardware
        will DMA directly to/from GPU HBM via the BAR1 physical addresses in the MTT.
        This is transparent to the remote server — it just sees a normal rkey.
      spec_refs:
        - document: "IBTA Vol1"
          section: "10.6.3"
          title: "Memory Region Registration"
          url: "https://www.infinibandta.org/ibta-specification/"
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 6
            name: "nvidia-peermem / IB Verbs"
            state_fields:
              mr_state: "registered"
              mr_lkey: "0xGPU00ABC"
              mr_rkey: "0xGPU01234"

  - id: "evt_mr_reg_server"
    type: "state_change"
    t_ns: 9500000
    annotation:
      text: "Remote server registers Memory Region via ibv_reg_mr() (host DRAM)"
      detail: >
        The remote server registers a standard host DRAM-backed Memory Region.
        ibv_reg_mr() pins host physical pages, creates IOMMU DMA mapping, and
        writes page translations to the RNIC's MTT. This is the standard MR
        registration path — no GPU involvement, no nvidia-peermem.
        The lkey is used locally for scatter-gather, the rkey is not needed here
        since the remote server is the WRITE source, not target.
    state_after:
      - actor_id: "remote_server"
        layers:
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              mr_registered: true
              mr_vaddr: "0x7f0000000000"
              mr_length: 4194304
              app_state: "mr_registered_listening"
              data_source: "training_data_in_host_dram"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              lkey: "0xSRV00DEF"
              rkey: "0xSRV01234"

  # ── Phase 3b: QP Creation ──────────────────────────────────────

  - id: "evt_qp_create"
    type: "state_change"
    t_ns: 10000000
    annotation:
      text: "QP created on both sides — state: RESET"
      detail: >
        ibv_create_qp() allocates a Queue Pair (Send Queue + Receive Queue + Completion Queue).
        QP begins in RESET state — cannot send or receive. The AI node's QP will be used
        with the GPU-backed MR — when the RNIC processes incoming RDMA WRITEs targeting
        the GPU rkey, it will DMA directly to GPU memory via the MTT page table.
        mlx5: MLX5_CMD_OP_CREATE_QP firmware command assigns QPN.
      spec_refs:
        - document: "IBTA Vol1"
          section: "11.2.4"
          title: "QP State Machine — RESET state"
          url: "https://www.infinibandta.org/ibta-specification/"
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RESET"
              qp_num: "0x00A001"
      - actor_id: "remote_server"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RESET"
              qp_num: "0x00B002"

  - id: "evt_qp_init"
    type: "state_change"
    t_ns: 10500000
    annotation:
      text: "QP transitioned RESET → INIT via ibv_modify_qp()"
      detail: >
        modify_qp(RESET→INIT) sets: P_Key index, port number, access flags
        (IBV_ACCESS_REMOTE_WRITE | IBV_ACCESS_REMOTE_READ for GPUDirect target).
        QP can now post Receive WQEs (but cannot send yet).
        Linux: ib_modify_qp() → mlx5_ib_modify_qp() → MLX5_CMD_OP_RST2INIT_QP.
      spec_refs:
        - document: "IBTA Vol1"
          section: "11.2.4.2"
          title: "RESET to INIT transition — required attributes"
          url: "https://www.infinibandta.org/ibta-specification/"
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "INIT"
      - actor_id: "remote_server"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "INIT"

  # ── Phase 4: CM Handshake ──────────────────────────────────────

  - id: "evt_cm_req"
    type: "frame_tx"
    t_ns: 18000000
    frame_id: "cm_req"
    annotation:
      text: "CM REQ sent — AI node proposes QP parameters, shares GPU MR rkey"
      detail: >
        rdma_connect() triggers ib_send_cm_req(). Sends AI node's QPN, starting PSN,
        path MTU=4096, retry counts, and private data containing the GPU-backed rkey
        and GPU BAR virtual address. The remote server will use this rkey to write
        directly into GPU memory without knowing it is GPU memory — the rkey is
        opaque and the GPU-backing is transparent to the remote side.
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 2345678
              pmtu: "4096"

  - id: "evt_cm_rep"
    type: "frame_tx"
    t_ns: 20000000
    frame_id: "cm_rep"
    annotation:
      text: "CM REP received — remote server accepts, provides its QPN and PSN"
      detail: >
        On receiving REQ, remote server calls rdma_accept() → ib_send_cm_rep().
        Remote server transitions its QP to RTR. AI node transitions its QP to RTR.
        INIT→RTR sets: dest QPN, RQ PSN, path MTU, AV (address vector).
        The remote server has stored the GPU rkey from the CM REQ private data —
        it will use this rkey in the RETH header of the upcoming RDMA WRITE.
    state_after:
      - actor_id: "remote_server"
        layers:
          - layer: 6
            name: "CM / rdma-cm"
            state_fields:
              cm_state: "REP_SENT"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RTR"
              remote_qpn: "0x00A001"
              psn_recv_expected: 2345678
              pmtu: "4096"
      - actor_id: "ai_node"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RTR"
              remote_qpn: "0x00B002"
              psn_recv_expected: 8765432

  - id: "evt_cm_rtu"
    type: "frame_tx"
    t_ns: 21500000
    frame_id: "cm_rtu"
    annotation:
      text: "CM RTU sent — both QPs transition to RTS. GPUDirect RDMA connection established."
      detail: >
        After sending RTU, AI node transitions QP: RTR→RTS.
        On receiving RTU, remote server transitions QP: RTR→RTS.
        RTR→RTS sets: SQ PSN, retry count, RNR retry, timeout.
        Linux: MLX5_CMD_OP_RTR2RTS_QP.
        The QP is now fully operational. The remote server can issue RDMA WRITEs
        targeting the GPU-backed rkey — data will flow directly from network to GPU HBM.
      spec_refs:
        - document: "IBTA Vol1"
          section: "11.2.4.4"
          title: "RTR to RTS — QP ready to send"
          url: "https://www.infinibandta.org/ibta-specification/"
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RTS"
              sq_psn: 2345678
      - actor_id: "remote_server"
        layers:
          - layer: 6
            name: "CM / rdma-cm"
            state_fields:
              cm_state: "ESTABLISHED"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              qp_state: "RTS"

  # ── Phase 5: RDMA WRITE to GPU Memory ──────────────────────────
  # This is the key educational moment: the WRITE lands in GPU HBM, not host DRAM

  - id: "evt_app_post_write_to_gpu"
    type: "state_change"
    t_ns: 29000000
    annotation:
      text: "Remote server posts RDMA WRITE targeting GPU memory on AI node"
      detail: >
        ibv_post_send() with opcode IBV_WR_RDMA_WRITE on the remote server.
        The WR specifies: local SG list pointing to host DRAM source buffer (training data),
        remote vaddr = GPU BAR address, remote rkey = GPU-backed MR key.
        From the remote server's perspective, this is identical to a normal RDMA WRITE —
        the remote server does not know (or need to know) that the target memory is GPU HBM.
        The GPU-backing is entirely transparent: the rkey is opaque, and the RNIC on the
        AI node side handles the DMA routing to GPU memory based on its MTT entries.
    state_after:
      - actor_id: "remote_server"
        layers:
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              app_state: "write_to_gpu_posted"

  - id: "evt_rdma_write_to_gpu"
    type: "frame_tx"
    t_ns: 30000000
    frame_id: "rdma_write_to_gpu"
    annotation:
      text: "RDMA WRITE to GPU — 4MB pushed directly into GPU HBM, zero CPU on AI node"
      detail: >
        Remote server's RNIC DMAs from host DRAM, encapsulates in BTH+RETH+UDP+IP+Eth, transmits.
        AI node's RNIC: receives packet → verifies ICRC → looks up rkey 0xGPU01234 in MR table →
        finds MTT entries pointing to GPU BAR1 physical addresses → DMA engine writes payload
        directly to GPU HBM via PCIe peer-to-peer transaction.

        CRITICAL PATH COMPARISON:
        Traditional RDMA WRITE: Network → RNIC → PCIe → Host DRAM → cudaMemcpy → GPU HBM
        GPUDirect RDMA WRITE:   Network → RNIC → PCIe → GPU HBM (direct, zero copy)

        The traditional path requires: (1) RNIC DMA to host DRAM, (2) CPU interrupt or poll,
        (3) cudaMemcpy() H2D transfer consuming PCIe bandwidth again, (4) GPU DMA from host DRAM.
        GPUDirect eliminates steps 2-4 entirely. For large AI training data transfers, this
        halves the PCIe bandwidth consumption and eliminates CPU involvement.
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 7
            name: "GPU / CUDA Runtime"
            state_fields:
              cuda_state: "buffer_written_by_rdma"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_recv_expected: 8765433
      - actor_id: "remote_server"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 8765432

  - id: "evt_rdma_write_gpu_ack"
    type: "frame_tx"
    t_ns: 30800000
    frame_id: "rdma_write_gpu_ack"
    annotation:
      text: "ACK from AI node RNIC — WRITE to GPU complete, CQE posted on remote server"
      detail: >
        AI node's RNIC autonomously generates RC ACK after GPU DMA completes.
        No CPU involvement on the AI node — the GPU received the data, the RNIC
        generated the ACK, and the AI node's CPU was never interrupted.
        Remote server's RNIC posts a CQE for the completed WRITE.
        Application on remote server calls ibv_poll_cq() to learn of completion.
    state_after:
      - actor_id: "remote_server"
        layers:
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              app_state: "write_to_gpu_complete"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 8765433

  # ── Phase 6: RDMA READ from GPU Memory ─────────────────────────

  - id: "evt_app_post_read_from_gpu"
    type: "state_change"
    t_ns: 34000000
    annotation:
      text: "Remote server posts RDMA READ targeting GPU memory on AI node"
      detail: >
        ibv_post_send() with opcode IBV_WR_RDMA_READ on the remote server.
        Specifies: local SG buffer for received data (host DRAM, lkey), remote vaddr = GPU BAR
        address, remote rkey = GPU-backed MR key. The AI node's RNIC will perform a PCIe
        peer-to-peer read from GPU HBM and send the data back — no CPU on AI node.
    state_after:
      - actor_id: "remote_server"
        layers:
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              app_state: "read_from_gpu_posted"

  - id: "evt_rdma_read_gpu_req"
    type: "frame_tx"
    t_ns: 35000000
    frame_id: "rdma_read_gpu_req"
    annotation:
      text: "RDMA READ Request from GPU memory — no data in this direction"
      detail: >
        Remote server sends BTH(opcode=0x0C) + RETH specifying what to read from GPU memory.
        No payload. AI node's RNIC will autonomously: look up rkey → find GPU BAR1 pages in MTT →
        DMA read from GPU HBM via PCIe P2P → build response packets → transmit.
    state_after:
      - actor_id: "remote_server"
        layers:
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 8765433

  - id: "evt_rdma_read_gpu_resp"
    type: "frame_tx"
    t_ns: 36200000
    frame_id: "rdma_read_gpu_resp"
    annotation:
      text: "RDMA READ Response — AI node's RNIC DMAs from GPU HBM and sends data"
      detail: >
        AI node's RNIC: receives READ request → validates rkey 0xGPU01234 → MTT lookup finds
        GPU BAR1 physical addresses → DMA engine performs PCIe P2P read from GPU HBM →
        builds response packet with AETH+payload → transmits to remote server.

        Zero CPU involvement on the AI node. The GPU was not interrupted — no CUDA kernel
        was paused. The RNIC performed the entire operation autonomously using the PCIe
        BAR1 aperture. This is how distributed AI training frameworks (NCCL, Gloo) achieve
        high-throughput inter-node GPU communication without CPU bottlenecks.
    state_after:
      - actor_id: "ai_node"
        layers:
          - layer: 7
            name: "GPU / CUDA Runtime"
            state_fields:
              cuda_state: "buffer_read_by_rdma"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_send: 2345678
      - actor_id: "remote_server"
        layers:
          - layer: 7
            name: "Application / Verbs"
            state_fields:
              app_state: "read_from_gpu_complete"
          - layer: 5
            name: "IB Transport (RC QP)"
            state_fields:
              psn_recv_expected: 2345679

  - id: "evt_done"
    type: "annotation"
    t_ns: 37000000
    annotation:
      text: "Scenario complete — GPUDirect RDMA data transfer to GPU memory"
      detail: >
        Summary: Two independent 100GbE links came up (AI node ↔ switch, switch ↔ remote
        server). The AI node allocated GPU HBM via cuMemAlloc, loaded nvidia-peermem to expose
        GPU memory to the RDMA subsystem, registered an IB Memory Region against the GPU BAR1
        address, and established an RC QP connection. The remote server performed a 4MB RDMA WRITE
        that landed directly in GPU HBM — zero CPU involvement on the AI node, zero bounce
        through host DRAM. Then the remote server performed an RDMA READ that retrieved data
        directly from GPU HBM — again zero CPU involvement.

        Key takeaway: GPUDirect RDMA eliminates the CPU from the data path entirely. In
        traditional RDMA + cudaMemcpy, every byte crosses the PCIe bus twice (network→host DRAM,
        then host DRAM→GPU). With GPUDirect RDMA, each byte crosses PCIe only once
        (network→GPU directly). This halves PCIe bandwidth consumption and eliminates CPU
        overhead — critical for scaling distributed AI training across hundreds of GPUs.

# ─────────────────────────────────────────────────────────────────
# GLOSSARY
# ─────────────────────────────────────────────────────────────────
glossary:
  - term: "GPUDirect RDMA"
    definition: "A technology that enables direct RDMA transfers between a network adapter and GPU memory, bypassing host CPU and system memory entirely. Data flows Network ↔ RNIC ↔ PCIe ↔ GPU HBM without any CPU involvement or host DRAM bounce buffer. Requires nvidia-peermem kernel module and a GPU with PCIe BAR1 aperture large enough to map the target memory."

  - term: "nvidia-peermem"
    definition: "A Linux kernel module (formerly nv_peer_mem) that implements the IB peer_memory_client API. When ibv_reg_mr() is called with a GPU virtual address, nvidia-peermem intercepts the registration, pins the GPU physical pages via nvidia_p2p_get_pages(), and provides their PCIe BAR1 addresses to the RNIC's Memory Translation Table. This enables the RNIC to DMA directly to/from GPU memory."

  - term: "BAR1 Aperture"
    abbrev: "BAR1"
    definition: "Base Address Register 1 — the PCIe memory-mapped window through which external devices can access GPU memory. The GPU maps regions of its HBM into PCIe address space via BAR1. When the RNIC targets a BAR1 address in a DMA operation, the PCIe transaction is routed directly to the GPU without CPU involvement. H100 GPUs support up to 256GB BAR1 (resizable BAR / large BAR mode)."

  - term: "Queue Pair"
    abbrev: "QP"
    definition: "The fundamental RDMA endpoint. Consists of a Send Queue (SQ) and Receive Queue (RQ). For RC service, each QP is connected to exactly one remote QP. In GPUDirect RDMA, the QP's associated Memory Regions may point to GPU memory — the QP itself is unaware of the memory backing."
    spec_refs:
      - document: "IBTA Vol1"
        section: "11.2"
        title: "Queue Pair"
        url: "https://www.infinibandta.org/ibta-specification/"

  - term: "Memory Region"
    abbrev: "MR"
    definition: "A contiguous virtual memory range registered with the RNIC. For GPUDirect RDMA, the MR can be registered against GPU memory — nvidia-peermem provides GPU BAR1 physical addresses to the RNIC's MTT instead of host DRAM physical addresses. The resulting lkey/rkey are opaque and interchangeable with host DRAM-backed MRs from the remote peer's perspective."
    spec_refs:
      - document: "IBTA Vol1"
        section: "10.6.3"
        title: "Memory Region Registration"
        url: "https://www.infinibandta.org/ibta-specification/"

  - term: "Memory Translation Table"
    abbrev: "MTT"
    definition: "A page table inside the RNIC that maps Memory Region virtual addresses to physical addresses (DMA addresses). For standard MRs, MTT entries point to host DRAM physical pages. For GPU-backed MRs, MTT entries point to GPU BAR1 physical addresses, causing the RNIC DMA engine to perform PCIe peer-to-peer transactions directly with the GPU."

  - term: "PCIe Peer-to-Peer"
    abbrev: "P2P"
    definition: "A PCIe capability where two endpoints (e.g., RNIC and GPU) communicate directly through the PCIe switch/root complex without the data passing through host DRAM. The RNIC issues a PCIe write/read transaction targeting the GPU's BAR1 address, and the PCIe fabric routes it directly to the GPU. Requires both devices to be in the same PCIe hierarchy (same root complex or connected via PCIe switch)."

  - term: "Priority Flow Control"
    abbrev: "PFC"
    definition: "IEEE 802.1Qbb extension enabling per-priority pause frames for lossless Ethernet. RoCEv2 typically runs on priority 3. Critical for GPUDirect RDMA because GPU memory has limited buffering — packet drops would cause expensive retransmissions over the GPU's PCIe P2P path."
    spec_refs:
      - document: "IEEE 802.1Qbb"
        section: "36"
        title: "Priority-based Flow Control"
        url: "https://standards.ieee.org/ieee/802.1Qbb/4788/"

  - term: "Invariant CRC"
    abbrev: "ICRC"
    definition: "A 32-bit CRC appended to every IB transport packet. Covers BTH, all extended headers, and payload. Checked by RNIC hardware before writing data to the target memory (GPU or host DRAM). For GPUDirect RDMA, ICRC verification happens in the RNIC before the DMA to GPU — corrupted data never reaches GPU HBM."
    spec_refs:
      - document: "IBTA Vol1"
        section: "9.4.1"
        title: "Invariant CRC"
        url: "https://www.infinibandta.org/ibta-specification/"

  - term: "Reliable Connected"
    abbrev: "RC"
    definition: "IB transport service type providing reliable, in-order, connection-oriented delivery. Required for RDMA READ. Most GPUDirect RDMA deployments use RC for reliable GPU-to-GPU data transfer in distributed AI training (NCCL)."
    spec_refs:
      - document: "IBTA Vol1"
        section: "9.7.5"
        title: "Reliable Connected Service"
        url: "https://www.infinibandta.org/ibta-specification/"

  - term: "High Bandwidth Memory"
    abbrev: "HBM"
    definition: "3D-stacked DRAM technology used in modern GPUs and accelerators. H100 uses HBM3 providing ~3.35 TB/s bandwidth. HBM is physically located on the GPU package (on-die or on-interposer). GPUDirect RDMA writes data directly into HBM without passing through host DRAM."

  - term: "NCCL"
    definition: "NVIDIA Collective Communications Library — the standard library for multi-GPU and multi-node collective operations in distributed AI training. NCCL uses GPUDirect RDMA extensively to perform allreduce, allgather, and other collectives directly between GPU memories across the network, avoiding CPU bounce buffers."
