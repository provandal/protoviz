            abbrev: "ip.src"
            bits: 32
            value: "192.168.1.10"
          - name: "Destination"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.1.20"
      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
