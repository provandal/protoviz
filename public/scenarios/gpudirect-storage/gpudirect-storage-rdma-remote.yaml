# ─────────────────────────────────────────────────────────────────
# GPUDirect Storage: Remote NVMe-oF Read/Write to GPU Memory over RoCEv2
# ─────────────────────────────────────────────────────────────────
meta:
  id: "gpudirect-storage-rdma-remote"
  title: "[WIP] GPUDirect Storage: Remote NVMe-oF Read/Write to GPU Memory over RoCEv2"
  protocol: "NVMe-oF/RDMA + GPUDirect Storage"
  protocol_family: "Storage"
  version: "1.0.0"
  description: >
    A GPUDirect Storage scenario showing how a GPU reads and writes data on a remote
    NVMe-oF/RDMA storage target with data landing directly in GPU HBM — bypassing host
    DRAM entirely. The traditional remote storage path bounces data twice (storage → RDMA →
    host DRAM → CPU memcpy → GPU). GDS over RDMA eliminates both bounces: the storage
    target's RDMA WRITE delivers data straight to the GPU's PCIe BAR1 aperture, and
    cuFileWrite data is pulled directly from GPU HBM via RDMA READ. The flow covers
    physical link establishment, ARP, IB CM QP setup, NVMe-oF Fabrics Connect (admin +
    I/O queues), GDS initialization (cuFileDriverOpen, cuFileHandleRegister, cuFileBufRegister),
    a cuFileRead that triggers NVMe READ over RDMA with data written directly to GPU memory,
    and a cuFileWrite that triggers NVMe WRITE with data read directly from GPU memory.

  learning_objectives:
    - "Understand how GPUDirect Storage (GDS) eliminates the host DRAM bounce buffer for remote storage I/O"
    - "See how cuFileRead triggers an NVMe-oF READ whose RDMA WRITE lands data directly in GPU HBM via BAR1"
    - "See how cuFileWrite triggers an NVMe-oF WRITE whose data is pulled from GPU HBM via RDMA READ"
    - "Trace the NVMe-oF/RDMA transport binding: NVMe commands via RDMA SEND, data via RDMA WRITE/READ"
    - "Follow NVMe-oF Fabrics Connect to establish admin and I/O queue pairs over RDMA"
    - "Observe how nvidia-fs and nvidia-peermem cooperate to register GPU memory for RDMA"
    - "Contrast traditional path (storage → DRAM → GPU) vs GDS path (storage → GPU directly)"
    - "Follow IB Connection Manager MAD exchange to bring a Queue Pair from RESET to RTS"

  difficulty: "advanced"

  authors:
    - name: "ProtoViz Community"
      org: "proto-viz"
      github: "proto-viz"

  created: "2026-03-17"
  updated: "2026-03-17"

  tags:
    - "RDMA"
    - "RoCEv2"
    - "GPUDirect Storage"
    - "GDS"
    - "NVMe-oF"
    - "NVMe"
    - "cuFile"
    - "nvidia-fs"
    - "GPU"
    - "100GbE"
    - "lossless-ethernet"
    - "PFC"
    - "AI-infrastructure"
    - "education"

  primary_specs:
    - document: "NVMe 2.0 Base Specification"
      section: "3"
      title: "NVMe Command Set"
      url: "https://nvmexpress.org/specifications/"
    - document: "NVMe-oF 1.1"
      section: "3"
      title: "NVMe over Fabrics Transport Bindings"
      url: "https://nvmexpress.org/specifications/"
    - document: "NVMe-oF RDMA Transport Binding (TP8010)"
      section: "2"
      title: "RDMA Transport Binding for NVMe-oF"
      url: "https://nvmexpress.org/specifications/"
    - document: "IBTA Vol1"
      section: "9.7"
      title: "Reliable Connection Service"
      url: "https://www.infinibandta.org/ibta-specification/"

  content_disclaimer: >
    Protocol descriptions in this scenario are based on open-source implementations
    (Linux kernel nvme-rdma, rdma-core, nvidia-fs, nvidia-peermem, CUDA documentation)
    and public specifications. No proprietary specification text has been reproduced.

  source_references:
    - repo: "torvalds/linux"
      path: "drivers/nvme/host/rdma.c"
      description: "NVMe-oF/RDMA host initiator — Fabrics Connect, I/O submission, RDMA operations"
    - repo: "torvalds/linux"
      path: "drivers/nvme/target/rdma.c"
      description: "NVMe-oF/RDMA target — capsule processing, RDMA WRITE for read data"
    - repo: "Mellanox/nv_peer_memory"
      path: "nv_peer_mem.c"
      description: "nvidia-peermem — ib_peer_memory_client for GPU memory RDMA registration"
    - repo: "torvalds/linux"
      path: "drivers/nvme/host/core.c"
      description: "NVMe core — command submission, completion processing"

# ─────────────────────────────────────────────────────────────────
# TOPOLOGY
# ─────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: "gpu_node"
      type: "initiator"
      label: "GPU Compute Node (GPU + RNIC)"
      description: "GPU-accelerated compute node running GDS (cuFile API). nvidia-fs and nvidia-peermem enable RDMA data to land directly in GPU HBM, e.g. NVIDIA H100 + ConnectX-7."
      hardware: "GPU + 100GbE RNIC (PCIe Gen5), e.g. NVIDIA H100 + ConnectX-7"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "192.168.1.10"
      mac: "00:02:c9:12:34:56"
      position: "left"

    - id: "switch"
      type: "switch"
      label: "100GbE RoCEv2 Switch"
      description: "Lossless 100GbE datacenter switch with PFC and ECN/WRED for RoCEv2 traffic."
      hardware: "100GbE datacenter switch"
      position: "center"

    - id: "storage_target"
      type: "target"
      label: "NVMe-oF/RDMA Storage Target"
      description: "Remote NVMe-oF storage subsystem exporting NVMe namespaces over RDMA transport. Performs RDMA WRITE to deliver read data and RDMA READ to fetch write data."
      hardware: "100GbE RNIC + NVMe storage array, e.g. ConnectX-7 + NVMe SSDs"
      os: "Linux 6.x / Storage OS"
      ip: "192.168.1.20"
      mac: "00:02:c9:ab:cd:ef"
      position: "right"

  links:
    - id: "link-gpu-sw"
      from: "gpu_node"
      to: "switch"
      speed_gbps: 100
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true
    - id: "link-sw-storage"
      from: "switch"
      to: "storage_target"
      speed_gbps: 100
      media: "fiber_sr"
      fec: "RS(544,514)"
      autoneg: true

# ─────────────────────────────────────────────────────────────────
# OSI LAYER DEFINITIONS
# ─────────────────────────────────────────────────────────────────
osi_layers:
  gpu_node:
    - layer: 7
      name: "GDS / cuFile API"
      components: ["libcufile.so", "cuFileDriverOpen", "cuFileRead", "cuFileWrite"]
      state_schema:
        gds_state:
          type: "string"
          description: "GDS driver state"
          initial: "uninitialized"
        cufile_handle:
          type: "string"
          description: "cuFile handle for remote NVMe-oF namespace"
          initial: "null"
        gpu_buf_ptr:
          type: "string"
          description: "GPU device pointer registered with GDS"
          initial: "null"
        gpu_buf_size:
          type: "integer"
          description: "Size of GPU buffer in bytes"
          initial: 0
        io_state:
          type: "string"
          description: "Current I/O operation state"
          initial: "idle"

    - layer: 6
      name: "nvidia-fs / nvidia-peermem"
      components: ["nvidia-fs kernel module", "nvidia-peermem", "drivers/nvme/host/rdma.c"]
      state_schema:
        nvfs_state:
          type: "string"
          description: "nvidia-fs module state"
          initial: "not_loaded"
        peermem_state:
          type: "string"
          description: "nvidia-peermem registration state"
          initial: "not_loaded"
        gpu_pages_pinned:
          type: "boolean"
          description: "GPU pages pinned for RDMA via nvidia_peermem_get_pages()"
          initial: false
        bounce_buffer:
          type: "string"
          description: "Host DRAM bounce buffer status — bypassed when GDS active"
          initial: "required"

    - layer: 5
      name: "NVMe-oF/RDMA Transport"
      components: ["drivers/nvme/host/rdma.c", "drivers/infiniband/core/verbs.c"]
      state_schema:
        qp_state:
          type: "string"
          description: "RDMA Queue Pair state"
          initial: "RESET"
        qp_num:
          type: "string"
          initial: "null"
        admin_queue:
          type: "string"
          description: "Admin queue connection state"
          initial: "disconnected"
        io_queue:
          type: "string"
          description: "I/O queue connection state"
          initial: "disconnected"
        ctrl_id:
          type: "string"
          description: "NVMe-oF controller ID assigned by target"
          initial: "null"
        nsid:
          type: "integer"
          description: "Active NVMe namespace ID"
          initial: 0
        psn_send:
          type: "integer"
          initial: 0
        psn_recv_expected:
          type: "integer"
          initial: 0
        remote_qpn:
          type: "string"
          initial: "null"

    - layer: 4
      name: "UDP (RoCEv2 encapsulation)"
      components: ["kernel UDP stack", "RNIC hardware offload"]
      state_schema:
        src_port:
          type: "integer"
          initial: 0
        dst_port:
          type: "integer"
          description: "Always 4791 for RoCEv2"
          initial: 4791

    - layer: 3
      name: "IP / Routing"
      components: ["kernel IP stack", "RNIC GID table"]
      state_schema:
        src_ip:
          type: "string"
          initial: "192.168.1.10"
        dst_ip:
          type: "string"
          initial: "null"
        dscp:
          type: "integer"
          initial: 0
        ecn_state:
          type: "string"
          initial: "Not-ECT"
        ttl:
          type: "integer"
          initial: 64

    - layer: 2
      name: "Ethernet / PFC"
      components: ["mlx5 driver", "IEEE 802.1Qbb PFC"]
      state_schema:
        link_state:
          type: "string"
          initial: "down"
        pfc_enabled:
          type: "boolean"
          initial: false
        pfc_priority:
          type: "integer"
          initial: 3

    - layer: 1
      name: "Physical / RS-FEC"
      components: ["IEEE 802.3cd", "100GBASE-SR4", "RS(544,514) FEC"]
      state_schema:
        phy_state:
          type: "string"
          initial: "down"
        an_state:
          type: "string"
          initial: "idle"
        lt_state:
          type: "string"
          initial: "idle"
        fec_mode:
          type: "string"
          initial: "RS(544,514)"
        speed:
          type: "string"
          initial: "unknown"
        signal_detect:
          type: "boolean"
          initial: false

  storage_target:
    - layer: 7
      name: "NVMe Target Subsystem"
      components: ["drivers/nvme/target/core.c", "drivers/nvme/target/rdma.c"]
      state_schema:
        subsys_state:
          type: "string"
          initial: "ready"
        namespaces:
          type: "integer"
          description: "Number of exported NVMe namespaces"
          initial: 1
        ctrl_count:
          type: "integer"
          description: "Connected controller count"
          initial: 0

    - layer: 6
      name: "NVMe-oF Transport Layer"
      components: ["drivers/nvme/target/rdma.c", "librdmacm"]
      state_schema:
        transport_state:
          type: "string"
          initial: "listening"
        rdma_cm_state:
          type: "string"
          initial: "idle"

    - layer: 5
      name: "IB Transport (RC QP)"
      components: ["drivers/infiniband/hw/mlx5/qp.c"]
      state_schema:
        qp_state:
          type: "string"
          initial: "RESET"
        qp_num:
          type: "string"
          initial: "null"
        psn_send:
          type: "integer"
          initial: 0
        psn_recv_expected:
          type: "integer"
          initial: 0
        lkey:
          type: "string"
          initial: "null"
        rkey:
          type: "string"
          initial: "null"
        remote_qpn:
          type: "string"
          initial: "null"

    - layer: 4
      name: "UDP (RoCEv2 encapsulation)"
      components: ["kernel UDP stack", "RNIC hardware offload"]
      state_schema:
        dst_port:
          type: "integer"
          initial: 4791

    - layer: 3
      name: "IP / Routing"
      components: ["kernel IP stack"]
      state_schema:
        src_ip:
          type: "string"
          initial: "192.168.1.20"
        ecn_state:
          type: "string"
          initial: "Not-ECT"

    - layer: 2
      name: "Ethernet / PFC"
      components: ["mlx5 driver", "IEEE 802.1Qbb PFC"]
      state_schema:
        link_state:
          type: "string"
          initial: "down"
        pfc_enabled:
          type: "boolean"
          initial: false

    - layer: 1
      name: "Physical / RS-FEC"
      components: ["IEEE 802.3cd", "100GBASE-SR4"]
      state_schema:
        phy_state:
          type: "string"
          initial: "down"
        an_state:
          type: "string"
          initial: "idle"
        lt_state:
          type: "string"
          initial: "idle"
        speed:
          type: "string"
          initial: "unknown"
        signal_detect:
          type: "boolean"
          initial: false

  switch:
    - layer: 3
      name: "IP Forwarding / ECN"
      components: ["L3 forwarding", "ECN/WRED marking"]
      state_schema:
        ecn_marking_enabled:
          type: "boolean"
          initial: true
        wred_threshold_bytes:
          type: "integer"
          initial: 153600
    - layer: 2
      name: "Ethernet Switching / PFC"
      components: ["802.1Q bridge", "802.1Qbb PFC"]
      state_schema:
        fwd_table_entries:
          type: "integer"
          initial: 0
        port_a_pfc_xoff:
          type: "boolean"
          initial: false
        port_b_pfc_xoff:
          type: "boolean"
          initial: false
    - layer: 1
      name: "Physical (per-port)"
      components: ["IEEE 802.3cd 100GBASE-SR4"]
      state_schema:
        port_a_phy:
          type: "string"
          initial: "down"
        port_a_an:
          type: "string"
          initial: "idle"
        port_a_lt:
          type: "string"
          initial: "idle"
        port_b_phy:
          type: "string"
          initial: "down"
        port_b_an:
          type: "string"
          initial: "idle"
        port_b_lt:
          type: "string"
          initial: "idle"

# ─────────────────────────────────────────────────────────────────
# FRAMES
# ─────────────────────────────────────────────────────────────────
frames:
  # ── ARP ───────────────────────────────────────────────────────
  - id: "arp_request"
    name: "ARP Request"
    description: "GPU node broadcasts ARP to resolve storage target IP"
    from: "gpu_node"
    to: "broadcast"
    via: ["switch"]
    total_bytes: 42
    color: "#f0c040"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "ff:ff:ff:ff:ff:ff"
            description: "Broadcast MAC"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:12:34:56"
            description: "GPU node MAC"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0806"
            description: "EtherType 0x0806 = ARP"
      - name: "ARP"
        abbrev: "arp"
        layer: 3
        total_bytes: 28
        fields:
          - name: "Hardware Type"
            abbrev: "arp.hw.type"
            bits: 16
            value: 1
            description: "1 = Ethernet"
          - name: "Protocol Type"
            abbrev: "arp.proto.type"
            bits: 16
            value: "0x0800"
            description: "0x0800 = IPv4"
          - name: "Opcode"
            abbrev: "arp.opcode"
            bits: 16
            value: 1
            description: "1 = Request"
          - name: "Sender MAC"
            abbrev: "arp.src.hw_mac"
            bits: 48
            value: "00:02:c9:12:34:56"
          - name: "Sender IP"
            abbrev: "arp.src.proto_ipv4"
            bits: 32
            value: "192.168.1.10"
          - name: "Target MAC"
            abbrev: "arp.dst.hw_mac"
            bits: 48
            value: "00:00:00:00:00:00"
            description: "Unknown — this is what we are resolving"
          - name: "Target IP"
            abbrev: "arp.dst.proto_ipv4"
            bits: 32
            value: "192.168.1.20"

  - id: "arp_reply"
    name: "ARP Reply"
    description: "Storage target responds with its MAC address"
    from: "storage_target"
    to: "gpu_node"
    via: ["switch"]
    total_bytes: 42
    color: "#f0c040"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:12:34:56"
            description: "Unicast reply to GPU node"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
            description: "Storage target MAC"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0806"
      - name: "ARP"
        abbrev: "arp"
        layer: 3
        total_bytes: 28
        fields:
          - name: "Opcode"
            abbrev: "arp.opcode"
            bits: 16
            value: 2
            description: "2 = Reply"
          - name: "Sender MAC"
            abbrev: "arp.src.hw_mac"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
            description: "Storage target MAC — the answer"
          - name: "Sender IP"
            abbrev: "arp.src.proto_ipv4"
            bits: 32
            value: "192.168.1.20"

  # ── CM REQ/REP/RTU (322 bytes each) ──────────────────────────
  - id: "cm_req"
    name: "CM REQ (Connection Request)"
    description: >
      IB Connection Manager Request. GPU node proposes QP parameters for the
      NVMe-oF/RDMA transport connection. Carried as MAD over UD QP1.
    from: "gpu_node"
    to: "storage_target"
    via: ["switch"]
    total_bytes: 322
    color: "#5b8dd9"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:12:34:56"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Total Length"
            abbrev: "ip.len"
            bits: 16
            value: 308
            description: "20 (IP) + 288 (UDP with IB payload)"
          - name: "Protocol"
            abbrev: "ip.proto"
            bits: 8
            value: 17
            description: "17 = UDP"
          - name: "Source"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.1.10"
          - name: "Destination"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.1.20"
      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: 49152
            description: "Ephemeral port for ECMP hashing"
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 4791
            description: "RoCEv2 well-known port"
          - name: "Length"
            abbrev: "udp.length"
            bits: 16
            value: 288
            description: "8 (UDP) + 12 (BTH) + 8 (DETH) + 256 (MAD) + 4 (ICRC)"
          - name: "Checksum"
            abbrev: "udp.checksum"
            bits: 16
            value: "0x0000"
            description: "Always 0 for RoCEv2 — ICRC covers integrity"
      - name: "IB BTH (Base Transport Header)"
        abbrev: "infiniband.bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "Opcode"
            abbrev: "infiniband.bth.opcode"
            bits: 8
            value: "0x64"
            description: "0x64 = UD Send Only — all CM messages use UD SEND"
            spec_refs:
              - document: "IBTA Vol1"
                section: "5.3.1"
                title: "BTH Opcode encoding"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Solicited Event (SE)"
            abbrev: "infiniband.bth.se"
            bits: 1
            value: 0
          - name: "MigReq"
            abbrev: "infiniband.bth.migreq"
            bits: 1
            value: 1
            description: "1 = primary path"
          - name: "Pad Count"
            abbrev: "infiniband.bth.padcnt"
            bits: 2
            value: 0
          - name: "Transport Header Version"
            abbrev: "infiniband.bth.tver"
            bits: 4
            value: 0
          - name: "P_Key"
            abbrev: "infiniband.bth.pkey"
            bits: 16
            value: "0xFFFF"
            description: "Full membership partition key"
          - name: "FECN"
            abbrev: "infiniband.bth.fecn"
            bits: 1
            value: 0
          - name: "BECN"
            abbrev: "infiniband.bth.becn"
            bits: 1
            value: 0
          - name: "Destination QP"
            abbrev: "infiniband.bth.destqp"
            bits: 24
            value: "0x000001"
            description: "QP1 = GSI (General Services Interface) for CM"
          - name: "Acknowledge Request (A)"
            abbrev: "infiniband.bth.ackreq"
            bits: 1
            value: 1
          - name: "Packet Sequence Number (PSN)"
            abbrev: "infiniband.bth.psn"
            bits: 24
            value: 0
      - name: "IB DETH (Datagram Extended Transport Header)"
        abbrev: "infiniband.deth"
        layer: 5
        total_bytes: 8
        fields:
          - name: "Queue Key (Q_Key)"
            abbrev: "infiniband.deth.q_key"
            bits: 32
            value: "0x80010000"
            description: "Well-known Q_Key for CM MADs"
          - name: "Source QP"
            abbrev: "infiniband.deth.srcqp"
            bits: 24
            value: "0x000001"
      - name: "IB MAD (CM REQ)"
        abbrev: "infiniband.mad"
        layer: 6
        total_bytes: 256
        fields:
          - name: "Management Class"
            abbrev: "infiniband.mad.mgmt_class"
            bits: 8
            value: "0x07"
            description: "0x07 = Communication Management"
          - name: "Method"
            abbrev: "infiniband.mad.method"
            bits: 8
            value: "0x03"
            description: "0x03 = Send"
          - name: "Attribute ID"
            abbrev: "infiniband.mad.attr_id"
            bits: 16
            value: "0x0010"
            description: "0x0010 = CM_REQ"
            spec_refs:
              - document: "IBTA Vol1"
                section: "12.6.5"
                title: "CM REQ Message"
                url: "https://www.infinibandta.org/ibta-specification/"
          - name: "Local Communication ID"
            abbrev: "infiniband.mad.cm.local_comm_id"
            bits: 32
            value: "0xGDS0C3D4"
          - name: "Service ID"
            abbrev: "infiniband.mad.cm.service_id"
            bits: 64
            value: "0x0000000001000000"
            description: "NVMe-oF/RDMA transport service"
          - name: "Local QPN"
            abbrev: "infiniband.mad.cm.local_qpn"
            bits: 24
            value: "0x00A001"
            description: "GPU node's QP number"
          - name: "Starting PSN"
            abbrev: "infiniband.mad.cm.starting_psn"
            bits: 24
            value: 2345678
          - name: "Path MTU"
            abbrev: "infiniband.mad.cm.path_mtu"
            bits: 4
            value: 5
            description: "5 = 4096 bytes"
          - name: "Retry Count"
            abbrev: "infiniband.mad.cm.retry_count"
