            abbrev: "infiniband.bth.pkey"
            bits: 16
            value: "0xFFFF"
          - name: "FECN"
            abbrev: "infiniband.bth.fecn"
            bits: 1
            value: 0
          - name: "BECN"
            abbrev: "infiniband.bth.becn"
            bits: 1
            value: 0
          - name: "Destination QP"
            abbrev: "infiniband.bth.destqp"
            bits: 24
            value: "0x00B002"
          - name: "Acknowledge Request (A)"
            abbrev: "infiniband.bth.ackreq"
            bits: 1
            value: 1
          - name: "Packet Sequence Number (PSN)"
            abbrev: "infiniband.bth.psn"
            bits: 24
            value: 2345682
      - name: "IB AETH (ACK Extended Transport Header)"
        abbrev: "infiniband.aeth"
        layer: 5
        total_bytes: 4
        fields:
          - name: "Syndrome"
            abbrev: "infiniband.aeth.syndrome"
            bits: 8
            value: "0x00"
            description: "0x00 = ACK (bits 7-6 = 00, credit count = 0)"
          - name: "Message Sequence Number (MSN)"
            abbrev: "infiniband.aeth.msn"
            bits: 24
            value: 1
      - name: "Payload (GPU Data)"
        abbrev: "data"
        layer: 7
        total_bytes: 4096
        fields:
          - name: "Data"
            abbrev: "data.payload"
            bits: 32768
            value: "<4096 bytes from GPU HBM>"
            description: "Data read directly from GPU HBM via PCIe BAR1 P2P DMA. Traditional path: GPU → CPU memcpy → host DRAM → RDMA. GDS path: GPU HBM → RNIC (via BAR1). Zero CPU, zero bounce."
      - name: "IB ICRC"
        abbrev: "infiniband.icrc"
        layer: 5
        total_bytes: 4
        fields:
          - name: "Invariant CRC"
            abbrev: "infiniband.icrc"
            bits: 32
            value: "0x66778899"

  # Write Completion: 74 bytes
  - id: "gds_write_cqe"
    name: "NVMe Write Completion"
    description: "Storage target confirms write complete"
    from: "storage_target"
    to: "gpu_node"
    via: ["switch"]
    total_bytes: 74
    color: "#f97316"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination"
            abbrev: "eth.dst"
            bits: 48
            value: "00:02:c9:12:34:56"
          - name: "Source"
            abbrev: "eth.src"
            bits: 48
            value: "00:02:c9:ab:cd:ef"
          - name: "Type"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800"
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Total Length"
            abbrev: "ip.len"
            bits: 16
            value: 60
          - name: "Source"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.1.20"
          - name: "Destination"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.1.10"
      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 4791
          - name: "Length"
            abbrev: "udp.length"
            bits: 16
            value: 40
      - name: "IB BTH (Base Transport Header)"
        abbrev: "infiniband.bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "Opcode"
            abbrev: "infiniband.bth.opcode"
            bits: 8
            value: "0x04"
            description: "0x04 = RC Send Only — CQE"
          - name: "Solicited Event (SE)"
            abbrev: "infiniband.bth.se"
            bits: 1
            value: 1
          - name: "MigReq"
            abbrev: "infiniband.bth.migreq"
            bits: 1
            value: 0
          - name: "Pad Count"
            abbrev: "infiniband.bth.padcnt"
            bits: 2
            value: 0
          - name: "Transport Header Version"
            abbrev: "infiniband.bth.tver"
            bits: 4
            value: 0
          - name: "P_Key"
            abbrev: "infiniband.bth.pkey"
            bits: 16
            value: "0xFFFF"
          - name: "FECN"
            abbrev: "infiniband.bth.fecn"
            bits: 1
            value: 0
          - name: "BECN"
            abbrev: "infiniband.bth.becn"
            bits: 1
            value: 0
          - name: "Destination QP"
            abbrev: "infiniband.bth.destqp"
            bits: 24
            value: "0x00A001"
          - name: "Acknowledge Request (A)"
            abbrev: "infiniband.bth.ackreq"
            bits: 1
            value: 1
          - name: "Packet Sequence Number (PSN)"
            abbrev: "infiniband.bth.psn"
            bits: 24
            value: 8765435
      - name: "NVMe Completion Queue Entry"
        abbrev: "nvme.cqe"
        layer: 7
        total_bytes: 16
        fields:
          - name: "Status Code (SC)"
            abbrev: "nvme.cqe.sc"
            bits: 8
            value: 0
            description: "0 = Successful Completion"
          - name: "Command ID"
            abbrev: "nvme.cqe.cid"
            bits: 16
            value: 2
      - name: "IB ICRC"
        abbrev: "infiniband.icrc"
        layer: 5
        total_bytes: 4
        fields:
          - name: "Invariant CRC"
            abbrev: "infiniband.icrc"
            bits: 32
            value: "0xAABB0011"

# ─────────────────────────────────────────────────────────────────
# TIMELINE
# ─────────────────────────────────────────────────────────────────
timeline:
  # ── Link Establishment ────────────────────────────────────────
  - id: "evt_phy_signal_link_a"
    type: "state_change"
    t_ns: 0
    annotation:
      text: "Link A: signal detected — GPU Node ↔ Switch"
      detail: >
        Optical transceiver on GPU node detects light from switch port A.
        Auto-Negotiation begins per IEEE 802.3cd clause 73.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 1
            state_fields:
              phy_state: "AN_IN_PROGRESS"
              signal_detect: true
              an_state: "ABILITY_DETECT"
      - actor_id: "switch"
        layers:
          - layer: 1
            state_fields:
              port_a_phy: "AN_IN_PROGRESS"
              port_a_an: "ABILITY_DETECT"

  - id: "evt_phy_signal_link_b"
    type: "state_change"
    t_ns: 500000
    annotation:
      text: "Link B: signal detected — Switch ↔ Storage Target"
      detail: >
        Optical transceiver on storage target detects light from switch port B.
    state_after:
      - actor_id: "storage_target"
        layers:
          - layer: 1
            state_fields:
              phy_state: "AN_IN_PROGRESS"
              signal_detect: true
              an_state: "ABILITY_DETECT"
      - actor_id: "switch"
        layers:
          - layer: 1
            state_fields:
              port_b_phy: "AN_IN_PROGRESS"
              port_b_an: "ABILITY_DETECT"

  - id: "evt_link_up_a"
    type: "state_change"
    t_ns: 3800000
    annotation:
      text: "Link A UP — GPU Node ↔ Switch at 100Gbps with RS-FEC"
      detail: >
        AN and Link Training complete. PFC enabled on priority 3 for RoCEv2.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 1
            state_fields:
              phy_state: "UP"
              an_state: "COMPLETE"
              lt_state: "COMPLETE"
              speed: "100Gbps"
          - layer: 2
            state_fields:
              link_state: "up"
              pfc_enabled: true
      - actor_id: "switch"
        layers:
          - layer: 1
            state_fields:
              port_a_phy: "UP"
              port_a_an: "COMPLETE"
              port_a_lt: "COMPLETE"

  - id: "evt_link_up_b"
    type: "state_change"
    t_ns: 4000000
    annotation:
      text: "Link B UP — Switch ↔ Storage Target at 100Gbps with RS-FEC"
      detail: >
        Both links up. End-to-end L2 connectivity established.
    state_after:
      - actor_id: "storage_target"
        layers:
          - layer: 1
            state_fields:
              phy_state: "UP"
              an_state: "COMPLETE"
              lt_state: "COMPLETE"
              speed: "100Gbps"
          - layer: 2
            state_fields:
              link_state: "up"
              pfc_enabled: true
      - actor_id: "switch"
        layers:
          - layer: 1
            state_fields:
              port_b_phy: "UP"
              port_b_an: "COMPLETE"
              port_b_lt: "COMPLETE"
          - layer: 2
            state_fields:
              fwd_table_entries: 0

  # ── ARP ───────────────────────────────────────────────────────
  - id: "evt_arp_req"
    type: "frame_tx"
    t_ns: 5000000
    frame_id: "arp_request"
    annotation:
      text: "ARP Request: who has 192.168.1.20?"
      detail: >
        GPU node resolves storage target IP to MAC for RoCEv2 GID-to-MAC mapping.
    state_after:
      - actor_id: "switch"
        layers:
          - layer: 2
            state_fields:
              fwd_table_entries: 1

  - id: "evt_arp_rep"
    type: "frame_tx"
    t_ns: 5200000
    frame_id: "arp_reply"
    annotation:
      text: "ARP Reply: 192.168.1.20 is at 00:02:c9:ab:cd:ef"
      detail: >
        Storage target responds. GPU node now has L2 reachability to storage.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 3
            state_fields:
              dst_ip: "192.168.1.20"
      - actor_id: "switch"
        layers:
          - layer: 2
            state_fields:
              fwd_table_entries: 2

  # ── CM QP Setup ───────────────────────────────────────────────
  - id: "evt_cm_req"
    type: "frame_tx"
    t_ns: 10000000
    frame_id: "cm_req"
    annotation:
      text: "CM REQ — GPU node proposes QP for NVMe-oF/RDMA transport"
      detail: >
        IB Connection Manager Request. GPU node proposes RC QP parameters for the
        NVMe-oF/RDMA connection. Private data carries NVMe-oF RDMA CM request
        format per TP8010 (queue ID, SQ/RQ sizes).
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 5
            state_fields:
              qp_state: "RTR"
              qp_num: "0x00A001"
              psn_send: 2345678

  - id: "evt_cm_rep"
    type: "frame_tx"
    t_ns: 12000000
    frame_id: "cm_rep"
    annotation:
      text: "CM REP — storage target accepts, provides QPN and PSN"
      detail: >
        Storage target accepts the connection and provides its QP number (0x00B002)
        and starting PSN (8765432).
    state_after:
      - actor_id: "storage_target"
        layers:
          - layer: 5
            state_fields:
              qp_state: "RTR"
              qp_num: "0x00B002"
              psn_send: 8765432
              remote_qpn: "0x00A001"
          - layer: 6
            state_fields:
              rdma_cm_state: "REP_SENT"

  - id: "evt_cm_rtu"
    type: "frame_tx"
    t_ns: 13000000
    frame_id: "cm_rtu"
    annotation:
      text: "CM RTU — both QPs transition to RTS, RDMA transport ready"
      detail: >
        Both QPs move to RTS. The NVMe-oF/RDMA transport layer can now
        send NVMe command capsules via RDMA SEND and transfer data via
        RDMA WRITE/READ.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 5
            state_fields:
              qp_state: "RTS"
              remote_qpn: "0x00B002"
              psn_recv_expected: 8765432
      - actor_id: "storage_target"
        layers:
          - layer: 5
            state_fields:
              qp_state: "RTS"
              psn_recv_expected: 2345678
          - layer: 6
            state_fields:
              transport_state: "connected"
              rdma_cm_state: "ESTABLISHED"

  # ── NVMe-oF Fabrics Connect ──────────────────────────────────
  - id: "evt_fabrics_connect_admin"
    type: "frame_tx"
    t_ns: 14000000
    frame_id: "fabrics_connect_admin"
    annotation:
      text: "Fabrics Connect — Admin Queue (QID=0)"
      detail: >
        NVMe-oF Fabrics Connect command sent via RDMA SEND to establish the admin
        queue association. The Connect Data (sent via SGL) contains hostnqn, subnqn,
        and hostid. The storage target assigns a controller ID.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 5
            state_fields:
              admin_queue: "connecting"
              psn_send: 2345679

  - id: "evt_fabrics_connect_admin_resp"
    type: "frame_tx"
    t_ns: 14500000
    frame_id: "fabrics_connect_admin_resp"
    annotation:
      text: "Fabrics Connect Response — Controller ID=1 assigned"
      detail: >
        Storage target accepts the Fabrics Connect and assigns controller ID 1.
        Admin queue is now established — Identify, Get Log Page, and other admin
        commands can flow.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 5
            state_fields:
              admin_queue: "connected"
              ctrl_id: "1"
      - actor_id: "storage_target"
        layers:
          - layer: 7
            state_fields:
              ctrl_count: 1

  - id: "evt_fabrics_connect_ioq"
    type: "frame_tx"
    t_ns: 15000000
    frame_id: "fabrics_connect_ioq"
    annotation:
      text: "Fabrics Connect — I/O Queue (QID=1)"
      detail: >
        Fabrics Connect for I/O Queue 1. After this, NVMe Read/Write commands
        can be submitted. The I/O queue is where cuFileRead/cuFileWrite
        commands will be dispatched.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 5
            state_fields:
              io_queue: "connected"
              nsid: 1
              psn_send: 2345680

  # ── GDS Initialization ───────────────────────────────────────
  - id: "evt_gds_init"
    type: "state_change"
    t_ns: 16000000
    annotation:
      text: "cuFileDriverOpen() — GDS driver initialized, nvidia-fs loaded"
      detail: >
        Application calls cuFileDriverOpen() to initialize GPUDirect Storage.
        This loads the nvidia-fs kernel module which intercepts NVMe I/O paths
        and redirects DMA to GPU memory instead of host DRAM. nvidia-peermem
        registers as an IB peer memory client so RDMA MRs can be backed by GPU pages.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 7
            state_fields:
              gds_state: "driver_open"
          - layer: 6
            state_fields:
              nvfs_state: "loaded"
              peermem_state: "registered"

  - id: "evt_gds_file_register"
    type: "state_change"
    t_ns: 17000000
    annotation:
      text: "cuFileHandleRegister() — remote NVMe-oF namespace registered with GDS"
      detail: >
        Application registers the file handle (backed by the remote NVMe-oF
        namespace) with GDS. This tells nvidia-fs to intercept I/O on this
        file descriptor and use the GPUDirect path.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 7
            state_fields:
              gds_state: "file_registered"
              cufile_handle: "fd=3 → /dev/nvme0n1 (NVMe-oF remote)"

  - id: "evt_gds_buf_register"
    type: "state_change"
    t_ns: 18000000
    annotation:
      text: "cuFileBufRegister() — GPU buffer registered for RDMA, bounce buffer bypassed"
      detail: >
        Application registers a GPU memory buffer with GDS. nvidia-peermem pins
        the GPU pages via BAR1 and creates an RDMA Memory Region backed by GPU
        HBM. The RNIC can now DMA directly to/from this GPU buffer. The host
        DRAM bounce buffer is bypassed — this is the key enabler for zero-copy
        storage I/O to GPU memory.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 7
            state_fields:
              gds_state: "buf_registered"
              gpu_buf_ptr: "0x00007f4000000000"
              gpu_buf_size: 4096
          - layer: 6
            state_fields:
              gpu_pages_pinned: true
              bounce_buffer: "bypassed"

  # ── GDS Read (cuFileRead) ────────────────────────────────────
  - id: "evt_gds_read_post"
    type: "state_change"
    t_ns: 20000000
    annotation:
      text: "cuFileRead() called — GDS issues NVMe READ with GPU memory as RDMA target"
      detail: >
        Application calls cuFileRead(). GDS builds an NVMe Read command with
        an SGL descriptor pointing to the GPU memory region (rkey=0xGPU01234).
        When the storage target reads data from disk, it will RDMA WRITE the
        data directly to this GPU address — the data never touches host DRAM.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 7
            state_fields:
              io_state: "cuFileRead_pending"

  - id: "evt_gds_read_cmd"
    type: "frame_tx"
    t_ns: 20500000
    frame_id: "gds_read_cmd"
    annotation:
      text: "cuFileRead → NVMe Read command sent to storage (SGL → GPU memory)"
      detail: >
        NVMe Read command capsule sent via RDMA SEND. The SGL descriptor
        carries the rkey and virtual address of the GPU memory region.
        The storage target will use these to RDMA WRITE read data directly
        to GPU HBM.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 5
            state_fields:
              psn_send: 2345681

  - id: "evt_gds_read_data"
    type: "frame_tx"
    t_ns: 22000000
    frame_id: "gds_read_data"
    annotation:
      text: "Storage RDMA WRITEs read data directly to GPU HBM — zero host DRAM bounce"
      detail: >
        THIS IS THE KEY MOMENT: The storage target reads data from its NVMe SSD,
        then performs an RDMA WRITE targeting the GPU memory region. The RETH header
        carries the GPU BAR1 virtual address and rkey. The GPU node's RNIC receives
        this RDMA WRITE and DMAs the payload directly into GPU HBM via PCIe P2P —
        the data NEVER passes through host DRAM or CPU caches.

        Traditional path: Storage → RDMA WRITE → host DRAM → CPU memcpy → GPU
        GDS path: Storage → RDMA WRITE → RNIC → PCIe BAR1 → GPU HBM (zero bounce)
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 5
            state_fields:
              psn_recv_expected: 8765434
          - layer: 6
            state_fields:
              bounce_buffer: "bypassed"
      - actor_id: "storage_target"
        layers:
          - layer: 5
            state_fields:
              psn_send: 8765434

  - id: "evt_gds_read_cqe"
    type: "frame_tx"
    t_ns: 22500000
    frame_id: "gds_read_cqe"
    annotation:
      text: "NVMe Read completion — cuFileRead() returns, data is in GPU HBM"
      detail: >
        NVMe completion confirms the read is done. The data is now in GPU HBM
        and available to CUDA kernels immediately — no additional copy needed.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 7
            state_fields:
              io_state: "cuFileRead_complete"
          - layer: 5
            state_fields:
              psn_recv_expected: 8765435

  # ── GDS Write (cuFileWrite) ──────────────────────────────────
  - id: "evt_gds_write_post"
    type: "state_change"
    t_ns: 25000000
    annotation:
      text: "cuFileWrite() called — GDS issues NVMe WRITE, data sourced from GPU HBM"
      detail: >
        Application calls cuFileWrite(). GDS builds an NVMe Write command with
        an SGL descriptor pointing to GPU memory. The storage target will RDMA
        READ the write data directly from GPU HBM — the data never bounces
        through host DRAM.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 7
            state_fields:
              io_state: "cuFileWrite_pending"

  - id: "evt_gds_write_cmd"
    type: "frame_tx"
    t_ns: 25500000
    frame_id: "gds_write_cmd"
    annotation:
      text: "cuFileWrite → NVMe Write command sent (SGL → GPU memory for RDMA READ)"
      detail: >
        NVMe Write command capsule sent via RDMA SEND. The SGL provides the
        rkey and virtual address of the GPU buffer. The storage target will
        RDMA READ from this address to fetch the write data.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 5
            state_fields:
              psn_send: 2345682

  - id: "evt_gds_write_data"
    type: "frame_tx"
    t_ns: 27000000
    frame_id: "gds_write_data"
    annotation:
      text: "RDMA READ Response — GPU data sent directly from HBM to storage"
      detail: >
        The storage target issued an RDMA READ Request targeting the GPU memory
        region. The GPU node's RNIC autonomously reads from GPU HBM via PCIe
        BAR1 P2P DMA and sends this RDMA READ Response containing the data.
        Zero CPU involvement on the GPU node — the RNIC handles everything.

        Traditional path: GPU → CPU memcpy → host DRAM → RDMA SEND → Storage
        GDS path: GPU HBM → RNIC (via BAR1 P2P) → RDMA READ Response → Storage
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 5
            state_fields:
              psn_send: 2345683

  - id: "evt_gds_write_cqe"
    type: "frame_tx"
    t_ns: 28000000
    frame_id: "gds_write_cqe"
    annotation:
      text: "NVMe Write completion — cuFileWrite() returns, data persisted to storage"
      detail: >
        NVMe completion confirms the write is done. Data from GPU HBM has been
        persisted to the remote NVMe storage without ever touching host DRAM.
    state_after:
      - actor_id: "gpu_node"
        layers:
          - layer: 7
            state_fields:
              io_state: "cuFileWrite_complete"
          - layer: 5
            state_fields:
              psn_recv_expected: 8765436
      - actor_id: "storage_target"
        layers:
          - layer: 5
            state_fields:
              psn_send: 8765436

  # ── Summary ──────────────────────────────────────────────────
  - id: "evt_done"
    type: "annotation"
    t_ns: 30000000
    annotation:
      text: "Scenario complete — GPUDirect Storage over RoCEv2"
      detail: >
        Summary: Two 100GbE links came up. RDMA QP established via IB CM. NVMe-oF
        Fabrics Connect created admin and I/O queues over RDMA. GDS initialized with
        cuFileDriverOpen, cuFileHandleRegister, and cuFileBufRegister — registering
        GPU memory for RDMA and bypassing the host DRAM bounce buffer. cuFileRead
        triggered an NVMe READ whose data was delivered via RDMA WRITE directly to
        GPU HBM. cuFileWrite triggered an NVMe WRITE whose data was pulled via RDMA
        READ directly from GPU HBM. In both cases, zero host DRAM bounce, zero CPU
        involvement in the data path.

glossary:
  - term: "GPUDirect Storage"
    abbrev: "GDS"
    definition: "NVIDIA technology that enables direct DMA between GPU memory and storage, bypassing the CPU and host DRAM bounce buffer. Uses nvidia-fs kernel module and cuFile API."
  - term: "cuFile API"
    definition: "User-space API for GPUDirect Storage I/O. Key functions: cuFileDriverOpen, cuFileHandleRegister, cuFileBufRegister, cuFileRead, cuFileWrite."
  - term: "nvidia-fs"
    definition: "Linux kernel module that intercepts filesystem/NVMe I/O and redirects DMA to GPU memory via BAR1 when GDS is active."
  - term: "nvidia-peermem"
    definition: "Linux kernel module implementing ib_peer_memory_client. Allows RDMA Memory Regions to be backed by GPU pages, enabling RDMA operations to target GPU HBM."
  - term: "NVMe-oF"
    abbrev: "NVMe over Fabrics"
    definition: "Protocol for accessing NVMe storage over a network fabric. Supports RDMA, TCP, and FC transport bindings."
  - term: "Fabrics Connect"
    definition: "NVMe-oF command (opcode 0x7F, fctype 0x01) that establishes a queue association between host and target controller."
  - term: "BAR1"
    definition: "PCIe Base Address Register 1. On GPUs, BAR1 provides a CPU/RNIC-accessible aperture into GPU HBM, enabling peer-to-peer DMA."
  - term: "Keyed SGL"
    definition: "Scatter Gather List entry in NVMe-oF/RDMA that carries an RDMA rkey, virtual address, and length. Enables the remote side to RDMA WRITE/READ directly to the described memory region."
  - term: "Bounce Buffer"
    definition: "Host DRAM buffer used in traditional storage I/O. Data is copied: storage → DRAM → GPU. GDS eliminates this by directing DMA to GPU memory."
