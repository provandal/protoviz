            abbrev: "ip.len"
            bits: 16
            value: 108
            description: "20 (IP) + 8 (UDP) + 12 (BTH) + 64 (NVMe cmd) + 4 (ICRC)"
          - name: "Protocol"
            abbrev: "ip.proto"
            bits: 8
            value: 17
