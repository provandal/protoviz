            abbrev: "udp.dstport"
            bits: 16
            value: 4791
          - name: "Length"
            abbrev: "udp.length"
            bits: 16
            value: 88
            description: "8 (UDP) + 12 (BTH) + 64 (NVMe cmd) + 4 (ICRC)"
      - name: "IB BTH (Base Transport Header)"
        abbrev: "infiniband.bth"
        layer: 5
        total_bytes: 12
        fields:
          - name: "Opcode"
            abbrev: "infiniband.bth.opcode"
            bits: 8
            value: "0x04"
            description: "0x04 = RC Send Only — NVMe-oF commands sent via RDMA SEND"
            spec_refs:
              - document: "NVMe-oF RDMA Transport Binding"
                section: "2.2"
