  # ── NVMe-oF Fabrics Connect ──────────────────────────────────
  # Eth(14)+IP(20)+UDP(8)+BTH(12)+NVMe_Cmd(64)+ICRC(4) = 122 bytes
  - id: "fabrics_connect_admin"
    name: "NVMe-oF Fabrics Connect (Admin Queue)"
    description: "Fabrics Connect command to establish admin queue. NVMe command capsule sent via RDMA SEND."
    from: "gpu_node"
    to: "storage_target"
    via: ["switch"]
    total_bytes: 122
    color: "#22d3ee"
