# ─────────────────────────────────────────────────────────────────
# TIMELINE
# ─────────────────────────────────────────────────────────────────
timeline:

  # ── Part 1: Stateless DHCPv6 (O=1, M=0) ──────────────────────

  - id: "evt_ra_stateless"
    type: "frame_tx"
    t_ns: 100000000
    frame_id: "ra_stateless"
    annotation:
      text: "RA → Router announces prefix 2001:db8:1::/64 with M=0, O=1, A=1"
      detail: >
        The router periodically sends Router Advertisements to ff02::1 (all nodes).
        This RA carries three critical flags: M=0 means 'do NOT use DHCPv6 for your
        address — use SLAAC instead.'  O=1 means 'DO use DHCPv6 for other config
        like DNS and NTP.'  The Prefix Information option includes 2001:db8:1::/64
        with A=1 (autonomous), which tells hosts to generate a SLAAC address from
        this prefix.  This M=0/O=1 combination is the most common deployment model
        — it gives hosts the simplicity of SLAAC for addressing while still
        providing centralized DNS configuration via DHCPv6.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 3
            state_fields:
              default_gw: "fe80::211:22ff:fe33:44ff"
              ra_m_flag: 0
              ra_o_flag: 1

  - id: "evt_slaac"
    type: "frame_tx"
    t_ns: 100500000
    frame_id: "slaac_complete"
    annotation:
      text: "SLAAC → Client autoconfigures 2001:db8:1::211:22ff:fe33:4401/64"
      detail: >
        Because the RA had A=1 on the prefix and M=0, the client uses Stateless
        Address Autoconfiguration (RFC 4862).  It combines the /64 prefix with its
        interface identifier (derived from its MAC via EUI-64 or a random stable ID
        per RFC 7217) to form a globally routable address.  DAD (Duplicate Address
        Detection) is performed before the address is used.  For full SLAAC details,
        see the IPv6 SLAAC scenario.  The client now has a working IPv6 address but
        no DNS servers — that is where DHCPv6 comes in.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 3
            state_fields:
              global_addr: "2001:db8:1::211:22ff:fe33:4401"

  - id: "evt_client_sees_o_flag"
    type: "annotation"
    t_ns: 100600000
    annotation:
      text: "Client sees O=1: 'I need to ask DHCPv6 for additional configuration'"
      detail: >
        The client's network stack processes the RA flags.  O=1 triggers the
        DHCPv6 client to send an Information-Request message.  Unlike a Solicit
        (which requests an address), an Information-Request only asks for
        configuration parameters — this is 'stateless' DHCPv6 because the server
        does not need to track any per-client state or address bindings.  The
        client already has its address from SLAAC.

  - id: "evt_info_request"
    type: "frame_tx"
    t_ns: 101000000
    frame_id: "dhcpv6_info_request"
    annotation:
      text: "DHCPv6 Information-Request → Client asks for DNS, search list, NTP"
      detail: >
        The client sends an Information-Request (message type 11) to ff02::1:2
        (All_DHCP_Relay_Agents_and_Servers) using UDP source port 546 and
        destination port 547.  The message includes a Client Identifier (DUID)
        and an Option Request Option (ORO) listing the options it wants:
        DNS Recursive Name Server (23), DNS Search List (24), and SNTP Servers (31).
        Note: no IA_NA option is present — the client is NOT asking for an address.
        This is the key difference between stateless and stateful DHCPv6.
      spec_refs:
        - document: "RFC 8415"
          section: "16.16"
          title: "Information-Request Message"
          url: "https://datatracker.ietf.org/doc/html/rfc8415#section-16.16"
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              dhcpv6_mode: "stateless (Information-Request)"

  - id: "evt_reply_stateless"
    type: "frame_tx"
    t_ns: 101100000
    frame_id: "dhcpv6_reply_stateless"
    annotation:
      text: "DHCPv6 Reply ← Server provides DNS 2001:db8:1::53, search domain, SNTP"
      detail: >
        The server responds with a Reply (type 7) containing the requested options.
        DNS servers: 2001:db8:1::53 and 2001:4860:4860::8888.  DNS search list:
        example.com, lab.example.com.  SNTP server: 2001:db8:1::123.  The server
        does NOT record any binding — it simply hands out the same configuration
        to every client that asks.  This is why it is called 'stateless.'  The server
        could be rebooted and lose all memory, and it would still work perfectly
        because there is nothing to remember.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              dns_servers: "2001:db8:1::53, 2001:4860:4860::8888"
              dns_search: "example.com, lab.example.com"

  - id: "evt_stateless_complete"
    type: "annotation"
    t_ns: 101500000
    annotation:
      text: "Client fully configured: SLAAC address + DHCPv6-provided DNS"
      detail: >
        The client now has everything it needs: a globally routable IPv6 address
        (2001:db8:1::211:22ff:fe33:4401 from SLAAC), a default gateway
        (fe80::211:22ff:fe33:44ff from the RA), DNS servers and search domain
        (from DHCPv6), and an NTP server (from DHCPv6).  This is the most common
        IPv6 deployment model: SLAAC for addresses, DHCPv6 for DNS/NTP.

  - id: "evt_stateless_annotation"
    type: "annotation"
    t_ns: 102000000
    annotation:
      text: "Stateless DHCPv6 — the server does not track who has what. It just hands out config info to anyone who asks."
      detail: >
        In IPv4, DHCP does everything — addresses, DNS, NTP, gateway, subnet mask.
        In IPv6, the work is split: Router Advertisements provide the gateway and
        prefix, SLAAC generates the address, and DHCPv6 fills in DNS and NTP.
        This separation of concerns is an intentional IPv6 design choice.  O=1 is
        by far the most common RA flag setting in both enterprise and ISP networks.

  # ── Part 2: Stateful DHCPv6 (M=1) ────────────────────────────

  - id: "evt_ra_stateful"
    type: "frame_tx"
    t_ns: 200000000
    frame_id: "ra_stateful"
    annotation:
      text: "RA → Router announces M=1, O=1 — 'Use DHCPv6 for your address'"
      detail: >
        A different network segment (or reconfigured router) sends an RA with
        M=1.  This tells hosts: 'Do NOT autoconfigure addresses from SLAAC — get
        your address from a DHCPv6 server instead.'  The prefix information option
        has A=0, confirming that SLAAC should not be used.  This is the enterprise
        model where IT administrators need tight control over address assignments
        for audit trails, access control, and DNS registration.  When M=1, the
        O flag is effectively implied (you will get config along with the address),
        but it is usually set explicitly.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 3
            state_fields:
              ra_m_flag: 1
              ra_o_flag: 1
              global_addr: "none"

  - id: "evt_client_sees_m_flag"
    type: "annotation"
    t_ns: 200100000
    annotation:
      text: "Client sees M=1: 'I must use DHCPv6 to get my address'"
      detail: >
        The M flag triggers a full DHCPv6 exchange.  Unlike the stateless case
        (Information-Request / Reply), the client will now go through the 4-message
        SARR exchange: Solicit → Advertise → Request → Reply.  This is analogous
        to DHCPv4's DORA (Discover → Offer → Request → Ack).  The server will
        maintain a binding database that tracks which DUID has which address,
        with lease lifetimes and renewal timers — hence 'stateful.'

  - id: "evt_solicit"
    type: "frame_tx"
    t_ns: 200500000
    frame_id: "dhcpv6_solicit"
    annotation:
      text: "DHCPv6 Solicit → Client searches for DHCPv6 servers (msg type 1)"
      detail: >
        The client sends a Solicit to ff02::1:2.  It includes its Client Identifier
        (DUID-LLT — Link-Layer address + Time, the most common DUID type), an
        IA_NA (Identity Association for Non-temporary Addresses) requesting a stable
        address, an Option Request for DNS, and an Elapsed Time option.  The IA_NA's
        IAID (Identity Association ID) is typically derived from the interface index.
        T1 and T2 are set to 0, meaning 'let the server decide the renewal schedule.'
        Any DHCPv6 server on the link will respond with an Advertise.
      spec_refs:
        - document: "RFC 8415"
          section: "16.2"
          title: "Solicit Message"
          url: "https://datatracker.ietf.org/doc/html/rfc8415#section-16.2"
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              dhcpv6_mode: "stateful (SARR)"

  - id: "evt_advertise"
    type: "frame_tx"
    t_ns: 200600000
    frame_id: "dhcpv6_advertise"
    annotation:
      text: "DHCPv6 Advertise ← Server offers 2001:db8:1::100 (msg type 2)"
      detail: >
        The server responds with an Advertise, offering address 2001:db8:1::100 with
        a preferred lifetime of 86400s (24h) and valid lifetime of 172800s (48h).
        The IA_NA includes T1=43200s (12h) and T2=69120s (19.2h) — T1 is when the
        client should begin renewal (unicast Renew to this server), and T2 is when it
        should begin rebinding (multicast Rebind to any server, in case this one is
        gone).  The Preference option is set to 255 (maximum), which tells the client
        to accept this offer immediately without waiting for other servers.  DNS
        servers and search list are also included.
    state_after:
      - actor_id: "dhcpv6_server"
        layers:
          - layer: 7
            state_fields:
              bindings: "1 (pending)"

  - id: "evt_request"
    type: "frame_tx"
    t_ns: 200700000
    frame_id: "dhcpv6_request"
    annotation:
      text: "DHCPv6 Request → Client accepts: 'I'll take 2001:db8:1::100 from server ...53' (msg type 3)"
      detail: >
        The client sends a Request to ff02::1:2 (still multicast, so other servers
        know this client has chosen).  Crucially, the Request includes BOTH the Client
        Identifier AND the Server Identifier — the Server ID copied from the Advertise
        tells the chosen server to commit the binding, and tells other servers to
        release any tentative offers.  The IA_NA echoes the offered address.  This is
        the 'R' in SARR, analogous to the 'R' in DORA for DHCPv4.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              dhcpv6_mode: "stateful — Request sent"

  - id: "evt_reply_stateful"
    type: "frame_tx"
    t_ns: 200800000
    frame_id: "dhcpv6_reply_stateful"
    annotation:
      text: "DHCPv6 Reply ← Server confirms 2001:db8:1::100 — binding active (msg type 7)"
      detail: >
        The server sends a Reply confirming the address assignment.  The server has
        now created a persistent binding: Client DUID → 2001:db8:1::100, with
        lifetimes and renewal timers.  This binding survives server restarts (stored
        in a lease file or database).  The client will send a Renew at T1 (12h) to
        extend the lease.  If the server does not respond by T2 (19.2h), the client
        multicasts a Rebind to any available server.  If the valid lifetime expires,
        the address is released.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 3
            state_fields:
              global_addr: "2001:db8:1::100 (tentative — DAD pending)"
          - layer: 7
            state_fields:
              dhcpv6_mode: "stateful — address assigned"
              dns_servers: "2001:db8:1::53, 2001:4860:4860::8888"
              dns_search: "example.com"
      - actor_id: "dhcpv6_server"
        layers:
          - layer: 7
            state_fields:
              bindings: "1 (active)"

  - id: "evt_dad_stateful"
    type: "frame_tx"
    t_ns: 200900000
    frame_id: "dad_stateful"
    annotation:
      text: "DAD → Client checks 2001:db8:1::100 for duplicates (NS from ::)"
      detail: >
        Even though the address came from DHCPv6, the client MUST perform Duplicate
        Address Detection before using it.  The client sends a Neighbor Solicitation
        with source :: (unspecified) to the solicited-node multicast address
        ff02::1:ff00:100.  If no Neighbor Advertisement is received within 1 second,
        the address is considered unique and transitions from 'tentative' to
        'preferred.'  If a duplicate IS detected, the client sends a DHCPv6 Decline
        message and tries again.
      spec_refs:
        - document: "RFC 4862"
          section: "5.4"
          title: "Duplicate Address Detection"
          url: "https://datatracker.ietf.org/doc/html/rfc4862#section-5.4"
    state_after:
      - actor_id: "client"
        layers:
          - layer: 3
            state_fields:
              global_addr: "2001:db8:1::100"

  - id: "evt_stateful_complete"
    type: "annotation"
    t_ns: 201000000
    annotation:
      text: "Client configured: DHCPv6-assigned address 2001:db8:1::100 + DNS"
      detail: >
        The client is fully operational with a server-assigned address and DNS
        configuration.  Unlike the stateless case, the server maintains a binding
        for this client and will expect renewal.  This model gives administrators
        full visibility into address assignments — essential for enterprise networks
        that need audit trails, access control lists based on IP, and dynamic DNS
        registration.

  - id: "evt_sarr_annotation"
    type: "annotation"
    t_ns: 201500000
    annotation:
      text: "4-message exchange (SARR), like DHCP DORA in IPv4, but over UDP 546/547 with multicast"
      detail: >
        DHCPv6 SARR (Solicit-Advertise-Request-Reply) maps to DHCPv4 DORA
        (Discover-Offer-Request-Ack).  Key differences: DHCPv6 uses UDP ports
        546 (client) and 547 (server) instead of 67/68.  DHCPv6 uses IPv6
        multicast (ff02::1:2) instead of IPv4 broadcast (255.255.255.255).
        DHCPv6 identifies clients by DUID (globally unique) rather than MAC
        address — this is more robust when a host has multiple interfaces.
        DHCPv6 does NOT provide a default gateway — that always comes from the RA.

  # ── Part 3: Prefix Delegation (PD) ───────────────────────────

  - id: "evt_pd_solicit"
    type: "frame_tx"
    t_ns: 300000000
    frame_id: "dhcpv6_pd_solicit"
    annotation:
      text: "DHCPv6 Solicit + IA_PD → Home router asks ISP for a prefix"
      detail: >
        The home router (CPE — Customer Premises Equipment) sends a Solicit with
        an IA_PD option (Identity Association for Prefix Delegation, option 25).
        This is different from IA_NA — the router is NOT asking for a single address
        for itself, it is asking for an entire prefix that it can subnet and
        advertise to devices on its LAN.  The hint suggests /48, which would give
        the home router 65536 /64 subnets to work with (one per VLAN, guest network,
        IoT segment, etc.).  ISPs commonly delegate /48, /56, or /60.
      spec_refs:
        - document: "RFC 8415"
          section: "6.3"
          title: "Prefix Delegation"
          url: "https://datatracker.ietf.org/doc/html/rfc8415#section-6.3"
    state_after:
      - actor_id: "home_router"
        layers:
          - layer: 7
            state_fields:
              delegated_prefix: "requesting..."

  - id: "evt_pd_reply"
    type: "frame_tx"
    t_ns: 300200000
    frame_id: "dhcpv6_pd_reply"
    annotation:
      text: "DHCPv6 Reply ← ISP delegates 2001:db8:abcd::/48 to the home router"
      detail: >
        The ISP's DHCPv6 server responds with a Reply containing IA_PD with
        IA_Prefix option 26: delegated prefix 2001:db8:abcd::/48 with a preferred
        lifetime of 7 days and valid lifetime of 30 days.  The home router now
        'owns' this /48 and can subnet it however it likes.  A /48 provides
        65536 /64 subnets — more than any home or small business will ever need.
        The server records this delegation and will expect renewal.  If the ISP used
        rapid-commit or preference 255, the Advertise/Request steps were skipped
        (2-message exchange).
    state_after:
      - actor_id: "home_router"
        layers:
          - layer: 7
            state_fields:
              delegated_prefix: "2001:db8:abcd::/48"
      - actor_id: "dhcpv6_server"
        layers:
          - layer: 7
            state_fields:
              delegations: "1 (active)"

  - id: "evt_home_ra"
    type: "frame_tx"
    t_ns: 300500000
    frame_id: "ra_from_home_router"
    annotation:
      text: "RA → Home router advertises 2001:db8:abcd:1::/64 on its LAN"
      detail: >
        The home router takes the delegated /48, carves out the first /64 subnet
        (2001:db8:abcd:1::/64), and begins advertising it via Router Advertisements
        on its LAN interface.  LAN clients receive this RA, perform SLAAC, and get
        globally routable IPv6 addresses.  No NAT is involved — every device on the
        LAN has a real, routable address.  The home router's firewall provides
        security (stateful packet filtering), not address translation.  This is a
        fundamental difference from IPv4 home networking.
    state_after:
      - actor_id: "home_router"
        layers:
          - layer: 7
            state_fields:
              lan_prefix: "2001:db8:abcd:1::/64"

  - id: "evt_pd_annotation"
    type: "annotation"
    t_ns: 301000000
    annotation:
      text: "This is how your home router gets an IPv6 prefix from your ISP — no NAT needed"
      detail: >
        Prefix Delegation is the mechanism that makes IPv6 end-to-end connectivity
        work at scale.  Your ISP delegates a /48 or /56 to your home router, which
        subnets it and advertises /64s on each LAN segment.  Every device gets a
        globally unique, routable address.  No NAT means no port forwarding hassles,
        no broken peer-to-peer protocols, no NAT state tables to overflow.  Security
        comes from the router's stateful firewall, which blocks unsolicited inbound
        connections by default — the same protection NAT accidentally provided, but
        without the downsides.  This is IPv6 working as designed.

  # ── Summary ─────────────────────────────────────────────────

  - id: "evt_summary"
    type: "annotation"
    t_ns: 400000000
    annotation:
      text: "Scenario complete — DHCPv6 stateless, stateful, and prefix delegation"
      detail: >
        This scenario demonstrated three DHCPv6 operating modes:

        1. STATELESS (M=0, O=1) — Client gets address from SLAAC, DNS/NTP from
           DHCPv6 Information-Request.  Server tracks nothing.  Most common setup.

        2. STATEFUL (M=1) — Client gets address AND config from DHCPv6 via the
           4-message SARR exchange.  Server maintains binding database.  Used in
           enterprise networks needing address accountability.

        3. PREFIX DELEGATION — Router gets an entire prefix from DHCPv6 and
           subnets it for its LAN.  This is how IPv6 avoids NAT — every device
           gets a globally routable address.

        In IPv4, DHCP does everything.  In IPv6, SLAAC and DHCPv6 split the work.
        The RA M and O flags are the control plane that decides how this split works.

# ─────────────────────────────────────────────────────────────────
# GLOSSARY
# ─────────────────────────────────────────────────────────────────
glossary:
  - term: "DHCPv6"
    abbrev: "Dynamic Host Configuration Protocol for IPv6"
    definition: "Protocol for assigning IPv6 addresses, prefixes, and configuration options to hosts and routers. Can operate in stateful mode (server tracks bindings) or stateless mode (server just provides config). Defined in RFC 8415."
    spec_refs:
      - document: "RFC 8415"
        section: "1"
        title: "DHCPv6"
        url: "https://datatracker.ietf.org/doc/html/rfc8415"

  - term: "SLAAC"
    abbrev: "Stateless Address Autoconfiguration"
    definition: "IPv6 mechanism where hosts generate their own addresses from a prefix advertised in Router Advertisements, without any server involvement. Uses the prefix from RA + an interface identifier (EUI-64 or RFC 7217 stable random)."
    spec_refs:
      - document: "RFC 4862"
        section: "1"
        title: "IPv6 Stateless Address Autoconfiguration"
        url: "https://datatracker.ietf.org/doc/html/rfc4862"

  - term: "Router Advertisement"
    abbrev: "RA"
    definition: "ICMPv6 message (type 134) sent by routers to advertise their presence, prefixes, and configuration flags (M, O). Sent periodically and in response to Router Solicitations. The RA is the control plane for IPv6 address configuration."
    spec_refs:
      - document: "RFC 4861"
        section: "4.2"
        title: "Router Advertisement Message Format"
        url: "https://datatracker.ietf.org/doc/html/rfc4861#section-4.2"

  - term: "M Flag (Managed Address Configuration)"
    definition: "Bit in the Router Advertisement that, when set to 1, tells hosts to use DHCPv6 for address assignment instead of SLAAC. M=1 triggers the full SARR exchange."
    spec_refs:
      - document: "RFC 4861"
        section: "4.2"
        title: "RA Flags"
        url: "https://datatracker.ietf.org/doc/html/rfc4861#section-4.2"

  - term: "O Flag (Other Configuration)"
    definition: "Bit in the Router Advertisement that, when set to 1, tells hosts to use DHCPv6 for non-address configuration (DNS, NTP, search domains). O=1 with M=0 triggers a DHCPv6 Information-Request."
    spec_refs:
      - document: "RFC 4861"
        section: "4.2"
        title: "RA Flags"
        url: "https://datatracker.ietf.org/doc/html/rfc4861#section-4.2"

  - term: "DUID"
    abbrev: "DHCP Unique Identifier"
    definition: "A globally unique identifier for DHCPv6 participants. DUID-LLT (Link-Layer + Time) is the most common type — it combines the MAC address with a timestamp to create an identifier that is unique even if the NIC is replaced."
    spec_refs:
      - document: "RFC 8415"
        section: "11"
        title: "DHCP Unique Identifier (DUID)"
        url: "https://datatracker.ietf.org/doc/html/rfc8415#section-11"

  - term: "IA_NA"
    abbrev: "Identity Association for Non-temporary Addresses"
    definition: "DHCPv6 option (3) that carries address assignment information. Contains an IAID (interface-specific identifier), renewal timers T1/T2, and one or more IA_Address sub-options with actual IPv6 addresses and lifetimes."
    spec_refs:
      - document: "RFC 8415"
        section: "21.4"
        title: "IA_NA Option"
        url: "https://datatracker.ietf.org/doc/html/rfc8415#section-21.4"

  - term: "IA_PD"
    abbrev: "Identity Association for Prefix Delegation"
    definition: "DHCPv6 option (25) used by routers to request delegation of an IPv6 prefix from an upstream DHCPv6 server. The delegated prefix is then subnetted and advertised on downstream interfaces. This mechanism eliminates IPv6 NAT."
    spec_refs:
      - document: "RFC 8415"
        section: "21.21"
        title: "IA_PD Option"
        url: "https://datatracker.ietf.org/doc/html/rfc8415#section-21.21"

  - term: "SARR"
    abbrev: "Solicit-Advertise-Request-Reply"
    definition: "The 4-message exchange for stateful DHCPv6 address assignment. Analogous to DHCPv4's DORA (Discover-Offer-Request-Ack). The Solicit discovers servers, Advertise presents offers, Request selects a server, and Reply confirms the binding."

  - term: "Prefix Delegation"
    abbrev: "PD"
    definition: "DHCPv6 mechanism where an ISP delegates an IPv6 prefix (typically /48 or /56) to a customer router. The customer router subnets this prefix and advertises /64s on its LAN. This is how IPv6 provides globally routable addresses to every device without NAT."

  - term: "DAD"
    abbrev: "Duplicate Address Detection"
    definition: "NDP procedure where a host sends a Neighbor Solicitation from the unspecified address (::) to verify that a tentative address is not already in use on the link. Required for both SLAAC and DHCPv6-assigned addresses."
    spec_refs:
      - document: "RFC 4862"
        section: "5.4"
        title: "Duplicate Address Detection"
        url: "https://datatracker.ietf.org/doc/html/rfc4862#section-5.4"

  - term: "All_DHCP_Relay_Agents_and_Servers"
    definition: "The well-known IPv6 multicast address ff02::1:2, used as the destination for DHCPv6 client messages (Solicit, Request, Information-Request). All DHCPv6 servers and relay agents on the link listen on this address."
    spec_refs:
      - document: "RFC 8415"
        section: "7.1"
        title: "Multicast Addresses"
        url: "https://datatracker.ietf.org/doc/html/rfc8415#section-7.1"

# ─────────────────────────────────────────────────────────────────
# WALKTHROUGHS
# ─────────────────────────────────────────────────────────────────
walkthroughs:
  - id: "default"
    title: "DHCPv6: Stateless, Stateful, and Prefix Delegation"
    description: "Walk through the three modes of DHCPv6 and how RA flags control the client's behavior"
    steps:
      - step: 0
        narration: >
          In IPv4, DHCP does everything -- it hands out addresses, DNS servers,
          default gateways, and subnet masks all in one protocol.  In IPv6, the
          work is split: Router Advertisements provide the gateway and prefix,
          SLAAC can generate addresses, and DHCPv6 fills in the rest.  The RA's
          M and O flags are the control knobs that decide how this split works.
          Let's see all three modes in action.
        highlight_fields: []

      - step: 1
        narration: >
          The router sends a Router Advertisement with M=0 and O=1.  M=0 means
          'do not use DHCPv6 for your address -- use SLAAC.'  O=1 means 'do use
          DHCPv6 for other configuration like DNS and NTP.'  The RA also includes
          prefix 2001:db8:1::/64 with the A (Autonomous) flag set, which tells
          hosts they can use this prefix for SLAAC.  This M=0/O=1 combination is
          the most common deployment model on the Internet today.
        highlight_fields: ["icmpv6.ra.flag_m", "icmpv6.ra.flag_o", "icmpv6.opt.prefix.flag_a", "icmpv6.opt.prefix.prefix"]

      - step: 2
        narration: >
          The client takes the /64 prefix from the RA and appends its interface
          identifier to form a full /128 address via SLAAC.  Using EUI-64, the MAC
          00:11:22:33:44:01 becomes the interface ID 0211:22ff:fe33:4401, giving the
          client address 2001:db8:1::211:22ff:fe33:4401.  DAD confirms no one else
          has this address.  The client now has a working IPv6 address but no DNS
          servers -- that is where DHCPv6 comes in.
        highlight_fields: []

      - step: 3
        narration: >
          Because the RA had O=1, the client sends a DHCPv6 Information-Request
          (message type 11) to the multicast address ff02::1:2 on UDP port 547.
          This is the key message for stateless DHCPv6 -- notice there is no IA_NA
          option, meaning the client is NOT asking for an address.  It only wants
          DNS servers (option 23), a DNS search list (option 24), and SNTP servers
          (option 31).  The message includes the client's DUID for identification.
        highlight_fields: ["dhcpv6.msgtype", "dhcpv6.option.oro", "udp.srcport", "udp.dstport"]

      - step: 4
        narration: >
          The DHCPv6 server responds with a Reply containing DNS servers, a search
          list, and an SNTP server.  The server does not record any binding -- it
          gives the same information to every client that asks.  This is why it is
          called 'stateless.'  The server could be rebooted and would still work
          perfectly because there is nothing to remember.  The client is now fully
          configured: SLAAC address plus DHCPv6-provided DNS.  O=1 is by far the
          most common setup -- it is simple, scalable, and works well.
        highlight_fields: ["dhcpv6.msgtype", "dhcpv6.option.dns_servers", "dhcpv6.option.dns_search"]

      - step: 5
        narration: >
          Now let's look at stateful DHCPv6.  A different RA arrives with M=1,
          telling clients 'get your address from DHCPv6, not SLAAC.'  The prefix
          information has A=0, confirming SLAAC is disabled for addressing.  This
          is the enterprise model -- IT administrators need to know exactly which
          address belongs to which device for security audits, access control, and
          dynamic DNS registration.  M=1 triggers a completely different DHCPv6
          exchange.
        highlight_fields: ["icmpv6.ra.flag_m", "icmpv6.ra.flag_o", "icmpv6.opt.prefix"]

      - step: 6
        narration: >
          The client sends a DHCPv6 Solicit (message type 1) -- the 'S' in SARR,
          analogous to DHCP Discover in IPv4.  It includes the client's DUID
          (DUID-LLT, based on MAC + timestamp), an IA_NA option requesting a
          non-temporary address, and an Option Request for DNS.  The Solicit goes
          to ff02::1:2, so all DHCPv6 servers on the link hear it.  The Elapsed
          Time option starts at 0, indicating this is the first transmission.
        highlight_fields: ["dhcpv6.msgtype", "dhcpv6.option.clientid", "dhcpv6.option.ia_na"]

      - step: 7
        narration: >
          The server responds with an Advertise (message type 2), offering address
          2001:db8:1::100.  The IA_NA includes T1 (renewal time, 12 hours) and T2
          (rebinding time, 19.2 hours).  The IA_Address sub-option carries the
          actual address with preferred lifetime (24h) and valid lifetime (48h).
          The Preference option is set to 255 (maximum), telling the client to
          accept immediately without waiting for other servers to respond.  DNS
          servers are included in the offer.
        highlight_fields: ["dhcpv6.msgtype", "dhcpv6.option.ia_address", "dhcpv6.option.serverid", "dhcpv6.option.preference"]

      - step: 8
        narration: >
          The client sends a Request (message type 3) -- 'I accept the offer from
          server ...53.'  This message goes to ff02::1:2 (multicast), not unicast
          to the server, so that other servers on the link see it and release any
          tentative offers.  The Request includes both the Client ID and the Server
          ID -- the Server ID copied from the Advertise is how the client says
          'I chose you.'  This is the 'R' in SARR.
        highlight_fields: ["dhcpv6.msgtype", "dhcpv6.option.serverid", "dhcpv6.option.clientid"]

      - step: 9
        narration: >
          The server sends a Reply (message type 7) confirming the address
          assignment.  The server has now created a persistent binding: this
          client's DUID maps to 2001:db8:1::100.  The binding will survive server
          restarts.  The client must renew at T1 (12h) by sending a Renew message.
          If the server is unreachable at T2 (19.2h), the client multicasts a
          Rebind.  The 4-message SARR is complete -- like DORA in IPv4, but over
          UDP 546/547 with multicast instead of broadcast.
        highlight_fields: ["dhcpv6.msgtype", "dhcpv6.option.ia_address"]

      - step: 10
        narration: >
          Even though the address came from a server, the client still performs
          DAD (Duplicate Address Detection).  It sends a Neighbor Solicitation from
          the unspecified address (::) to the solicited-node multicast group for
          2001:db8:1::100.  If no one responds within 1 second, the address is
          confirmed unique.  If a duplicate is found, the client sends a DHCPv6
          Decline and requests a different address.  DAD is mandatory in IPv6
          regardless of how the address was obtained.
        highlight_fields: ["ipv6.src", "icmpv6.ns.target"]

      - step: 11
        narration: >
          Now for Prefix Delegation -- this is how your home router gets IPv6 from
          your ISP.  The home router (CPE) sends a Solicit with an IA_PD option
          instead of IA_NA.  It is not asking for a single address -- it is asking
          for an entire prefix that it can subnet and advertise on its LAN.  The
          hint requests a /48, which would give 65536 /64 subnets.  ISPs commonly
          delegate /48, /56, or /60 depending on their allocation policy.
        highlight_fields: ["dhcpv6.msgtype", "dhcpv6.option.ia_pd"]

      - step: 12
        narration: >
          The ISP's DHCPv6 server responds with a Reply containing the delegated
          prefix 2001:db8:abcd::/48.  The home router now owns this prefix and can
          carve it into /64 subnets however it likes -- one for the main LAN, one
          for a guest network, one for IoT devices.  A /48 provides 65536 /64
          subnets.  The server records this delegation with lifetimes and will
          expect renewal.
        highlight_fields: ["dhcpv6.option.ia_prefix"]

      - step: 13
        narration: >
          The home router immediately begins advertising one of its new /64 subnets
          (2001:db8:abcd:1::/64) on its LAN via Router Advertisements.  LAN devices
          receive the RA, perform SLAAC, and get globally routable IPv6 addresses.
          No NAT is involved -- every laptop, phone, and smart thermostat gets a
          real, publicly routable address.  Security comes from the router's
          stateful firewall, which blocks unsolicited inbound traffic.
        highlight_fields: ["icmpv6.opt.prefix.prefix", "icmpv6.opt.prefix.flag_a"]

      - step: 14
        narration: >
          Prefix Delegation is how the entire IPv6 Internet avoids NAT.  Your ISP
          gives your router its own prefix.  No NAT means no port forwarding
          hassles, no broken peer-to-peer protocols, no NAT state table overflows.
          Every device gets a globally routable address -- this is by design, not a
          bug.  Security comes from stateful firewalling, not address hiding.
        highlight_fields: []

      - step: 15
        narration: >
          Let's recap.  We saw three DHCPv6 modes, all controlled by two bits in
          the Router Advertisement.  O=1 alone means 'get DNS from DHCPv6, address
          from SLAAC' -- the most common setup.  M=1 means 'get your address from
          DHCPv6' -- used in enterprise networks that need address tracking.  And
          Prefix Delegation gives routers entire prefixes to subnet for their LANs,
          which is how IPv6 eliminates NAT.  In IPv4, DHCP does everything.  In
          IPv6, SLAAC and DHCPv6 split the work -- and that split is what makes
          IPv6 more flexible and scalable.
        highlight_fields: []
