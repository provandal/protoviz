meta:
  id: "dhcpv6-stateful-stateless"
  title: "DHCPv6: Stateless (O-flag) vs Stateful (M-flag) + Prefix Delegation"
  protocol: "DHCPv6"
  protocol_family: "IPv6"
  version: "1.0.0"
  description: >
    Demonstrates the two modes of DHCPv6 and how Router Advertisement M and O
    flags select between them.  Part 1 shows stateless DHCPv6 (O=1, M=0) where
    the client obtains an address via SLAAC and only asks DHCPv6 for DNS/NTP.
    Part 2 shows stateful DHCPv6 (M=1) with the full 4-message SARR exchange
    (Solicit-Advertise-Request-Reply).  Part 3 shows Prefix Delegation (IA_PD),
    which is how home routers obtain an IPv6 prefix from an ISP — eliminating
    the need for NAT.

  learning_objectives:
    - "Understand the role of RA M and O flags in selecting stateless vs stateful DHCPv6"
    - "See how stateless DHCPv6 (Information-Request / Reply) delivers DNS and NTP without tracking addresses"
    - "Trace the stateful DHCPv6 4-message SARR exchange (Solicit → Advertise → Request → Reply)"
    - "Identify DHCPv6 message types, DUID identifiers, and key options (IA_NA, IA_Address, DNS servers)"
    - "Understand DHCPv6 Prefix Delegation (IA_PD) and why it eliminates the need for IPv6 NAT"
    - "Compare DHCPv6 SARR with DHCPv4 DORA and understand the architectural differences"
    - "Recognize that IPv6 splits address assignment (SLAAC) and configuration (DHCPv6) by design"

  difficulty: "intermediate"

  authors:
    - name: "ProtoViz Community"
      org: "proto-viz"
      github: "proto-viz"

  created: "2026-03-19"
  updated: "2026-03-19"

  tags:
    - "IPv6"
    - "DHCPv6"
    - "SLAAC"
    - "stateful"
    - "stateless"
    - "prefix delegation"
    - "RA flags"
    - "M-flag"
    - "O-flag"
    - "DUID"
    - "intermediate"
    - "education"
    - "WIP"

  primary_specs:
    - document: "RFC 8415"
      section: "1"
      title: "Dynamic Host Configuration Protocol for IPv6 (DHCPv6)"
      url: "https://datatracker.ietf.org/doc/html/rfc8415"
      alt_url: "https://www.rfc-editor.org/rfc/rfc8415"
    - document: "RFC 4861"
      section: "4.2"
      title: "Neighbor Discovery for IPv6 — Router Advertisement"
      url: "https://datatracker.ietf.org/doc/html/rfc4861#section-4.2"
      alt_url: ""
    - document: "RFC 8106"
      section: "5"
      title: "IPv6 Router Advertisement Options for DNS Configuration"
      url: "https://datatracker.ietf.org/doc/html/rfc8106#section-5"
      alt_url: ""
    - document: "RFC 4862"
      section: "5.5"
      title: "IPv6 Stateless Address Autoconfiguration"
      url: "https://datatracker.ietf.org/doc/html/rfc4862#section-5.5"
      alt_url: ""

  content_disclaimer: >
    Protocol descriptions in this scenario are based on public RFCs and
    open-source implementations.  No proprietary specification text has been
    reproduced.  RFC references are provided as citations for further reading.

  source_references:
    - repo: "torvalds/linux"
      path: "net/ipv6/ndisc.c"
      description: "Neighbor Discovery — Router Advertisement processing, M/O flag handling"
    - repo: "torvalds/linux"
      path: "net/ipv6/addrconf.c"
      description: "SLAAC address autoconfiguration, prefix handling"

# ─────────────────────────────────────────────────────────────────
# TOPOLOGY
# ─────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: "client"
      type: "host"
      label: "Client"
      description: "IPv6 host — receives RAs, runs SLAAC and/or DHCPv6 client"
      hardware: "Generic 1GbE NIC"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "fe80::1 (link-local initially)"
      mac: "00:11:22:33:44:01"
      position: "left"

    - id: "switch"
      type: "switch"
      label: "Ethernet Switch"
      description: "Layer-2 Ethernet switch forwarding frames between all devices"
      hardware: "Generic 1GbE switch"
      position: "center"

    - id: "router"
      type: "router"
      label: "Router"
      description: "IPv6 router — sends Router Advertisements with M/O flags and prefix info"
      hardware: "Generic 1GbE router"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "fe80::gw (link-local), 2001:db8:1::1/64"
      mac: "00:11:22:33:44:ff"
      position: "center-top"

    - id: "dhcpv6_server"
      type: "host"
      label: "DHCPv6 Server"
      description: "DHCPv6 server — provides addresses, prefixes, and configuration options"
      hardware: "Generic 1GbE NIC"
      os: "Linux 6.x (ISC Kea / dhcpd)"
      kernel_version: "6.8"
      ip: "2001:db8:1::53, fe80::53"
      mac: "00:11:22:33:44:53"
      position: "right"

    - id: "home_router"
      type: "router"
      label: "Home Router (CPE)"
      description: "Customer premises equipment — requests prefix delegation from ISP"
      hardware: "Generic CPE"
      os: "OpenWrt"
      ip: "fe80::cpe"
      mac: "00:11:22:33:44:ce"
      position: "bottom"

  links:
    - id: "link-c-sw"
      from: "client"
      to: "switch"
      speed_gbps: 1
      media: "copper"
      autoneg: true
    - id: "link-r-sw"
      from: "router"
      to: "switch"
      speed_gbps: 1
      media: "copper"
      autoneg: true
    - id: "link-d-sw"
      from: "dhcpv6_server"
      to: "switch"
      speed_gbps: 1
      media: "copper"
      autoneg: true
    - id: "link-hr-sw"
      from: "home_router"
      to: "switch"
      speed_gbps: 1
      media: "copper"
      autoneg: true

# ─────────────────────────────────────────────────────────────────
# OSI LAYER DEFINITIONS (per actor)
# ─────────────────────────────────────────────────────────────────
osi_layers:
  client:
    - layer: 7
      name: "Application (DHCPv6 Client)"
      components: ["dhclient / NetworkManager / systemd-networkd"]
      state_schema:
        dhcpv6_mode:
          type: "string"
          description: "DHCPv6 operational mode based on RA flags"
          initial: "none"
        dns_servers:
          type: "string"
          description: "Configured DNS recursive name servers"
          initial: "none"
        dns_search:
          type: "string"
          description: "DNS search list"
          initial: "none"

    - layer: 3
      name: "IPv6 / NDP"
      components: ["net/ipv6/ndisc.c", "net/ipv6/addrconf.c"]
      state_schema:
        link_local:
          type: "string"
          description: "Link-local address (always present)"
          initial: "fe80::211:22ff:fe33:4401"
        global_addr:
          type: "string"
          description: "Global unicast address (from SLAAC or DHCPv6)"
          initial: "none"
        default_gw:
          type: "string"
          description: "Default gateway (from RA)"
          initial: "none"
        ra_m_flag:
          type: "integer"
          description: "Managed Address Configuration flag from RA"
          initial: 0
        ra_o_flag:
          type: "integer"
          description: "Other Configuration flag from RA"
          initial: 0

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver", "IEEE 802.3"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        mac_addr:
          type: "string"
          initial: "00:11:22:33:44:01"

  router:
    - layer: 3
      name: "IPv6 / NDP"
      components: ["net/ipv6/ndisc.c", "radvd"]
      state_schema:
        link_local:
          type: "string"
          initial: "fe80::211:22ff:fe33:44ff"
        global_addr:
          type: "string"
          initial: "2001:db8:1::1"
        ra_interval:
          type: "string"
          description: "RA send interval"
          initial: "200-600s"

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        mac_addr:
          type: "string"
          initial: "00:11:22:33:44:ff"

  dhcpv6_server:
    - layer: 7
      name: "Application (DHCPv6 Server)"
      components: ["ISC Kea DHCPv6 / dhcpd"]
      state_schema:
        bindings:
          type: "string"
          description: "Number of active address bindings"
          initial: "0"
        delegations:
          type: "string"
          description: "Number of active prefix delegations"
          initial: "0"

    - layer: 3
      name: "IPv6"
      components: ["net/ipv6"]
      state_schema:
        link_local:
          type: "string"
          initial: "fe80::211:22ff:fe33:4453"
        global_addr:
          type: "string"
          initial: "2001:db8:1::53"

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        mac_addr:
          type: "string"
          initial: "00:11:22:33:44:53"

  home_router:
    - layer: 7
      name: "Application (DHCPv6-PD Client)"
      components: ["odhcp6c / wide-dhcpv6"]
      state_schema:
        delegated_prefix:
          type: "string"
          description: "Prefix received via DHCPv6-PD"
          initial: "none"
        lan_prefix:
          type: "string"
          description: "Prefix advertised on LAN interface"
          initial: "none"

    - layer: 3
      name: "IPv6"
      components: ["net/ipv6"]
      state_schema:
        link_local:
          type: "string"
          initial: "fe80::211:22ff:fe33:44ce"
        wan_addr:
          type: "string"
          initial: "none"

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        mac_addr:
          type: "string"
          initial: "00:11:22:33:44:ce"

# ─────────────────────────────────────────────────────────────────
# FRAMES
# ─────────────────────────────────────────────────────────────────
frames:

  # ══════════════════════════════════════════════════════════════
  # Part 1 — Stateless DHCPv6 (O=1, M=0)
  # ══════════════════════════════════════════════════════════════

  - id: "ra_stateless"
    name: "Router Advertisement (M=0, O=1)"
    description: "Router sends RA indicating SLAAC for addressing, DHCPv6 for other config"
    from: "router"
    to: "multicast"
    via: ["switch"]
    timestamp_ns: 100000000
    total_bytes: 118
    color: "#0f766e"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "33:33:00:00:00:01"
            value_hex: "0x333300000001"
            description: "IPv6 multicast MAC for all-nodes (ff02::1)"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "00:11:22:33:44:ff"
            description: "Router's MAC address"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x86DD"
            value_hex: "0x86DD"
            description: "IPv6"

      - name: "IPv6"
        abbrev: "ipv6"
        layer: 3
        total_bytes: 40
        fields:
          - name: "Version"
            abbrev: "ipv6.version"
            bits: 4
            value: 6
            description: "IPv6"
          - name: "Traffic Class"
            abbrev: "ipv6.tclass"
            bits: 8
            value: 0
            description: "Default — no QoS marking"
          - name: "Payload Length"
            abbrev: "ipv6.plen"
            bits: 16
            value: 64
            description: "ICMPv6 RA with options"
          - name: "Next Header"
            abbrev: "ipv6.nxt"
            bits: 8
            value: 58
            description: "ICMPv6 (58)"
            spec_refs:
              - document: "RFC 8200"
                section: "4.6"
                title: "IPv6 Next Header values"
                url: "https://datatracker.ietf.org/doc/html/rfc8200"
          - name: "Hop Limit"
            abbrev: "ipv6.hlim"
            bits: 8
            value: 255
            description: "Must be 255 for NDP — receiver discards if not 255 (prevents off-link spoofing)"
            spec_refs:
              - document: "RFC 4861"
                section: "6.1.2"
                title: "Validation of Router Advertisement"
                url: "https://datatracker.ietf.org/doc/html/rfc4861#section-6.1.2"
          - name: "Source Address"
            abbrev: "ipv6.src"
            bits: 128
            value: "fe80::211:22ff:fe33:44ff"
            description: "Router's link-local address — RAs always use link-local source"
          - name: "Destination Address"
            abbrev: "ipv6.dst"
            bits: 128
            value: "ff02::1"
            description: "All-nodes multicast — every IPv6 host on the link receives this"

      - name: "ICMPv6 Router Advertisement"
        abbrev: "icmpv6.ra"
        layer: 3
        total_bytes: 64
        fields:
          - name: "Type"
            abbrev: "icmpv6.type"
            bits: 8
            value: 134
            description: "Router Advertisement (134)"
            spec_refs:
              - document: "RFC 4861"
                section: "4.2"
                title: "Router Advertisement Message Format"
                url: "https://datatracker.ietf.org/doc/html/rfc4861#section-4.2"
          - name: "Code"
            abbrev: "icmpv6.code"
            bits: 8
            value: 0
            description: "Always 0 for RA"
          - name: "Checksum"
            abbrev: "icmpv6.checksum"
            bits: 16
            value: "0xa1b2"
            description: "ICMPv6 checksum (covers pseudo-header + payload)"
          - name: "Cur Hop Limit"
            abbrev: "icmpv6.ra.cur_hop_limit"
            bits: 8
            value: 64
            description: "Recommended hop limit for outgoing packets"
          - name: "M (Managed Address) Flag"
            abbrev: "icmpv6.ra.flag_m"
            bits: 1
            value: 0
            description: "M=0 — do NOT use DHCPv6 for addresses. Use SLAAC instead."
            spec_refs:
              - document: "RFC 4861"
                section: "4.2"
                title: "Router Advertisement — M flag"
                url: "https://datatracker.ietf.org/doc/html/rfc4861#section-4.2"
          - name: "O (Other Configuration) Flag"
            abbrev: "icmpv6.ra.flag_o"
            bits: 1
            value: 1
            description: "O=1 — use DHCPv6 for OTHER configuration (DNS, NTP, search domains). This is the most common enterprise/ISP setup."
            spec_refs:
              - document: "RFC 4861"
                section: "4.2"
                title: "Router Advertisement — O flag"
                url: "https://datatracker.ietf.org/doc/html/rfc4861#section-4.2"
          - name: "Router Lifetime"
            abbrev: "icmpv6.ra.router_lifetime"
            bits: 16
            value: 1800
            description: "1800 seconds (30 min) — how long this router is valid as default gateway"
          - name: "Reachable Time"
            abbrev: "icmpv6.ra.reachable_time"
            bits: 32
            value: 0
            description: "0 = unspecified — use host default"
          - name: "Retrans Timer"
            abbrev: "icmpv6.ra.retrans_timer"
            bits: 32
            value: 0
            description: "0 = unspecified — use host default for NS retransmit interval"
          - name: "Prefix Info Option — Type"
            abbrev: "icmpv6.opt.prefix.type"
            bits: 8
            value: 3
            description: "Prefix Information option (type 3)"
          - name: "Prefix Info Option — Length"
            abbrev: "icmpv6.opt.prefix.length"
            bits: 8
            value: 4
            description: "4 units of 8 bytes = 32 bytes"
          - name: "Prefix Length"
            abbrev: "icmpv6.opt.prefix.prefix_length"
            bits: 8
            value: 64
            description: "/64 — standard subnet prefix length for SLAAC"
          - name: "L (On-Link) Flag"
            abbrev: "icmpv6.opt.prefix.flag_l"
            bits: 1
            value: 1
            description: "L=1 — this prefix is on-link (can be reached directly without routing)"
          - name: "A (Autonomous) Flag"
            abbrev: "icmpv6.opt.prefix.flag_a"
            bits: 1
            value: 1
            description: "A=1 — hosts SHOULD use this prefix for SLAAC address generation"
            spec_refs:
              - document: "RFC 4862"
                section: "5.5.3"
                title: "Router Advertisement Processing"
                url: "https://datatracker.ietf.org/doc/html/rfc4862#section-5.5.3"
          - name: "Valid Lifetime"
            abbrev: "icmpv6.opt.prefix.valid_lifetime"
            bits: 32
            value: 2592000
            description: "30 days — how long the prefix is valid for on-link determination"
          - name: "Preferred Lifetime"
            abbrev: "icmpv6.opt.prefix.preferred_lifetime"
            bits: 32
            value: 604800
            description: "7 days — how long SLAAC addresses remain preferred"
          - name: "Prefix"
            abbrev: "icmpv6.opt.prefix.prefix"
            bits: 128
            value: "2001:db8:1::"
            description: "Prefix for SLAAC — client appends its interface ID to form a /128 address"

  - id: "slaac_complete"
    name: "SLAAC Address Autoconfiguration (internal)"
    description: "Client autoconfigures 2001:db8:1::211:22ff:fe33:4401 via SLAAC (EUI-64)"
    from: "client"
    to: "client"
    via: []
    timestamp_ns: 100500000
    total_bytes: 0
    color: "#6d28d9"
    headers: []

  - id: "dhcpv6_info_request"
    name: "DHCPv6 Information-Request"
    description: "Client asks DHCPv6 server for DNS/NTP config (stateless — no address needed)"
    from: "client"
    to: "multicast"
    via: ["switch"]
    timestamp_ns: 101000000
    total_bytes: 106
    color: "#2563eb"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "33:33:00:01:00:02"
            value_hex: "0x333300010002"
            description: "IPv6 multicast MAC for All_DHCP_Relay_Agents_and_Servers (ff02::1:2)"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "00:11:22:33:44:01"
            description: "Client's MAC"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x86DD"
            description: "IPv6"

      - name: "IPv6"
        abbrev: "ipv6"
        layer: 3
        total_bytes: 40
        fields:
          - name: "Source Address"
            abbrev: "ipv6.src"
            bits: 128
            value: "fe80::211:22ff:fe33:4401"
            description: "Client's link-local address"
          - name: "Destination Address"
            abbrev: "ipv6.dst"
            bits: 128
            value: "ff02::1:2"
            description: "All_DHCP_Relay_Agents_and_Servers — well-known DHCPv6 multicast group"
            spec_refs:
              - document: "RFC 8415"
                section: "7.1"
                title: "Multicast Addresses"
                url: "https://datatracker.ietf.org/doc/html/rfc8415#section-7.1"
          - name: "Next Header"
            abbrev: "ipv6.nxt"
            bits: 8
            value: 17
            description: "UDP (17)"
          - name: "Hop Limit"
            abbrev: "ipv6.hlim"
            bits: 8
            value: 1
            description: "Link-local scope — must not leave the link"

      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: 546
            description: "DHCPv6 client port"
            spec_refs:
              - document: "RFC 8415"
                section: "7.2"
                title: "UDP Ports"
                url: "https://datatracker.ietf.org/doc/html/rfc8415#section-7.2"
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 547
            description: "DHCPv6 server port"
          - name: "Length"
            abbrev: "udp.length"
            bits: 16
            value: 44
            description: "UDP header (8) + DHCPv6 payload (36)"
          - name: "Checksum"
            abbrev: "udp.checksum"
            bits: 16
            value: "0xfe3a"
            description: "UDP checksum (mandatory in IPv6)"

      - name: "DHCPv6"
        abbrev: "dhcpv6"
        layer: 7
        total_bytes: 36
        fields:
          - name: "Message Type"
            abbrev: "dhcpv6.msgtype"
            bits: 8
            value: 11
            description: "Information-Request (11) — client wants config only, no address"
            spec_refs:
              - document: "RFC 8415"
                section: "16.16"
                title: "Information-Request Message"
                url: "https://datatracker.ietf.org/doc/html/rfc8415#section-16.16"
          - name: "Transaction ID"
            abbrev: "dhcpv6.xid"
            bits: 24
            value: "0x1a2b3c"
            description: "Random ID to match requests with replies"
          - name: "Option — Client Identifier (DUID)"
            abbrev: "dhcpv6.option.clientid"
            bits: 112
            value: "DUID-LLT: 00:01:00:01:time:00:11:22:33:44:01"
            description: "Client DUID (DUID-LLT = Link-Layer + Time) — uniquely identifies this client"
            spec_refs:
              - document: "RFC 8415"
                section: "11"
                title: "DHCP Unique Identifier (DUID)"
                url: "https://datatracker.ietf.org/doc/html/rfc8415#section-11"
          - name: "Option — Option Request (ORO)"
            abbrev: "dhcpv6.option.oro"
            bits: 48
            value: "23, 24, 31"
            description: "Requesting: DNS Recursive Name Server (23), DNS Search List (24), SNTP Servers (31)"
            spec_refs:
              - document: "RFC 8415"
                section: "21.7"
                title: "Option Request Option"
                url: "https://datatracker.ietf.org/doc/html/rfc8415#section-21.7"

  - id: "dhcpv6_reply_stateless"
    name: "DHCPv6 Reply (Stateless)"
    description: "Server provides DNS servers, search list, and SNTP servers — no address binding"
    from: "dhcpv6_server"
    to: "client"
    via: ["switch"]
    timestamp_ns: 101100000
    total_bytes: 162
    color: "#2563eb"
    headers:
      - name: "Ethernet II"
        abbrev: "eth"
        layer: 2
        total_bytes: 14
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "00:11:22:33:44:01"
            description: "Unicast to client"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "00:11:22:33:44:53"
            description: "DHCPv6 server's MAC"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x86DD"
            description: "IPv6"

      - name: "IPv6"
        abbrev: "ipv6"
        layer: 3
        total_bytes: 40
        fields:
          - name: "Source Address"
            abbrev: "ipv6.src"
            bits: 128
            value: "fe80::211:22ff:fe33:4453"
            description: "Server's link-local address"
          - name: "Destination Address"
            abbrev: "ipv6.dst"
            bits: 128
            value: "fe80::211:22ff:fe33:4401"
            description: "Client's link-local address (unicast reply)"
          - name: "Next Header"
            abbrev: "ipv6.nxt"
            bits: 8
            value: 17
