            abbrev: "fc.type"
            bits: 8
            value: "0x28"
            description: "NVMe over FC"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x880000"
            description: "Exchange responder, end sequence"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x01"
            description: "Data sequence"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in data sequence"
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0005"
            description: "Same exchange as Get Log Page command"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0x0005"
            description: "Responder Exchange ID"
          - name: "Parameter (Relative Offset)"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
