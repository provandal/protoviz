            abbrev: "fc_nvme.ls.cntlid"
            bits: 16
            value: "0xFFFF"
            description: "0xFFFF = dynamic controller ID assignment requested"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
