                url: "https://nvmexpress.org/specifications/"
          - name: "Entry[0]: SubNQN"
            abbrev: "nvme_disc.entry.subnqn"
            bits: 0
            value: "nqn.2024-01.com.example:nvme-array01"
            description: "NVMe subsystem NQN — use this for I/O Controller association"
          - name: "Entry[0]: Transport Address (WWNN)"
            abbrev: "nvme_disc.entry.traddr"
            bits: 0
