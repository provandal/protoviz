            bits: 8
            value: "0x28"
            description: "NVMe over FC"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x880000"
            description: "Exchange responder, end sequence"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x01"
            description: "Data sequence"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0011"
            description: "Same exchange as Read command"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0x0011"
          - name: "Parameter (Relative Offset)"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
            description: "Data starts at byte offset 0"
      - name: "NVMe Read Data Payload"
        abbrev: "fc_nvme.data"
        layer: 4
        total_bytes: 4096
        fields:
          - name: "Data"
            abbrev: "fc_nvme.data.payload"
            bits: 32768
            value: "4096 bytes of data read from NVMe SSD"
            description: "The data previously written to LBA 0. Delivered as FC-NVMe DATA IU — data traverses the FC fabric using FC BB_Credit flow control."

  # ── NVMe Read RSP IU ──────────────────────────────────────────
  - id: "nvme_read_rsp"
    name: "NVMe FC RSP IU: Read Complete"
    description: "Target confirms NVMe Read completed. Data is now in host buffer."
    from: "target"
    to: "initiator"
    via: ["switch"]
    timestamp_ns: 17400000
    total_bytes: 48
    color: "#6b21a8"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.r_ctl"
            bits: 8
            value: "0x07"
            description: "Command Status — NVMe FC RSP IU"
          - name: "D_ID"
            abbrev: "fc.d_id"
            bits: 24
            value: "0x010100"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc.s_id"
            bits: 24
            value: "0x010200"
          - name: "TYPE"
            abbrev: "fc.type"
            bits: 8
            value: "0x28"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x990000"
            description: "Exchange responder, last sequence, end sequence, SI transfer — closes exchange"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x02"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0011"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0x0011"
          - name: "Parameter"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
      - name: "NVMe FC RSP IU"
        abbrev: "fc_nvme.rsp"
        layer: 4
        total_bytes: 16
        fields:
          - name: "IU Type"
            abbrev: "fc_nvme.rsp.iu_type"
            bits: 8
            value: "0x02"
            description: "RSP IU — NVMe CQE"
          - name: "NVMe CQE: Status"
            abbrev: "nvme.cqe.status"
            bits: 16
            value: "0x0000"
            description: "Success — 4KB read from LBA 0, data matches previous write"

# ─────────────────────────────────────────────────────────────────
# TIMELINE
# ─────────────────────────────────────────────────────────────────
timeline:

  # ── Phase 1: Physical Link Up ──────────────────────────────────
  - id: "evt_link_init"
    type: "state_change"
    t_ns: 0
    annotation:
      text: "Physical links initializing — 32GFC, signal detect on both segments"
      detail: >
        Both 32GFC links begin speed negotiation. FC uses point-to-point links
        (no shared medium), with 64b/66b encoding and mandatory RS-FEC at 32GFC.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 0
            name: "FC-0 Physical"
            state_fields:
              signal_detect: true
              phy_state: "initializing"
      - actor_id: "switch"
        layers:
          - layer: 0
            name: "FC-0 Physical (per-port)"
            state_fields:
              port_a_phy: "initializing"
              port_b_phy: "initializing"

  - id: "evt_link_up_a"
    type: "state_change"
    t_ns: 2000000
    annotation:
      text: "Link A UP — Host to Switch at 32GFC"
      detail: >
        Speed negotiation complete: 32GFC (28.05 Gbps line rate, ~14 Gbps payload).
        64b/66b encoding active. BB_Credit flow control initialized.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 0
            name: "FC-0 Physical"
            state_fields:
              phy_state: "UP"
              speed: "32GFC"
          - layer: 1
            name: "FC-1 Encoding"
            state_fields:
              word_sync: true
      - actor_id: "switch"
        layers:
          - layer: 0
            name: "FC-0 Physical (per-port)"
            state_fields:
              port_a_phy: "UP"

  - id: "evt_link_up_b"
    type: "state_change"
    t_ns: 2500000
    annotation:
      text: "Link B UP — Switch to Storage at 32GFC"
      detail: >
        Both physical links are now up. The switch can forward FC frames between
        ports. Storage array was previously logged into the fabric (FCID 0x010200 pre-assigned).
    state_after:
      - actor_id: "target"
        layers:
          - layer: 0
            name: "FC-0 Physical"
            state_fields:
              phy_state: "UP"
              speed: "32GFC"
          - layer: 1
            name: "FC-1 Encoding"
            state_fields:
              word_sync: true
      - actor_id: "switch"
        layers:
          - layer: 0
            name: "FC-0 Physical (per-port)"
            state_fields:
              port_b_phy: "UP"
          - layer: 2
            name: "FC-2 Frame Forwarding / Fabric Services"
            state_fields:
              fwd_table_entries: 1

  # ── Phase 2: FLOGI ─────────────────────────────────────────────
  - id: "evt_flogi"
    type: "frame_tx"
    t_ns: 5000000
    frame_id: "flogi"
    annotation:
      text: "FLOGI — Host requests fabric login (S_ID=0x000000 -> D_ID=0xFFFFFE)"
      detail: >
        The host has no FCID yet (S_ID=0x000000). FLOGI is identical for FC-NVMe
        and traditional FCP — the upper-layer protocol is not yet negotiated.
        The FLOGI carries the host's WWPN, BB_Credit, and supported features.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              fabric_login: "FLOGI_SENT"
              active_exchanges: 1

  - id: "evt_flogi_acc"
    type: "frame_tx"
    t_ns: 5200000
    frame_id: "flogi_acc"
    annotation:
      text: "FLOGI ACC — Fabric assigns FCID 0x010100 to host"
      detail: >
        The fabric accepts login and assigns N_Port ID 0x010100. This FCID
        will be the host's S_ID in all subsequent frames.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              my_fcid: "0x010100"
              bb_credit: 16
              fabric_login: "complete"
              active_exchanges: 0
              ox_id_next: "0x0002"
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Frame Forwarding / Fabric Services"
            state_fields:
              fcid_pool_next: "0x010101"
              fwd_table_entries: 2

  # ── Phase 3: PLOGI to Target ───────────────────────────────────
  - id: "evt_plogi_target"
    type: "frame_tx"
    t_ns: 7000000
    frame_id: "plogi_target"
    annotation:
      text: "PLOGI to storage (0x010200) — port-level login"
      detail: >
        Host sends PLOGI to the NVMe storage target. Name Server queries
        (PLOGI to NS, GID_FT with FC-4 type 0x28) are elided for brevity.
        The GID_FT query used type 0x28 (NVMe) instead of 0x08 (FCP) —
        this is how an FC-NVMe host discovers NVMe targets specifically.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              target_plogi: "PLOGI_SENT"
              active_exchanges: 1

  - id: "evt_plogi_target_acc"
    type: "frame_tx"
    t_ns: 7200000
    frame_id: "plogi_target_acc"
    annotation:
      text: "Storage accepts PLOGI — port-level login established"
      detail: >
        Storage accepts port login. Next step: PRLI with NVMe type code 0x28.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              target_plogi: "complete"
              active_exchanges: 0
              ox_id_next: "0x0003"
      - actor_id: "target"
        layers:
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              host_plogi: "complete"

  # ── Phase 4: PRLI for NVMe (THE KEY STEP) ─────────────────────
  - id: "evt_prli_nvme"
    type: "frame_tx"
    t_ns: 8000000
    frame_id: "prli_nvme"
    annotation:
      text: "PRLI with TYPE 0x28 (NVMe) — THE KEY DIFFERENCE from traditional FC"
      detail: >
        This is the pivotal frame in the FC-NVMe flow. The PRLI Service Parameter
        Page Type is 0x28 (NVMe) instead of 0x08 (FCP/SCSI). This single byte
        determines whether the FC association carries NVMe commands or SCSI commands.

        Comparison:
        - Traditional FC: PRLI type 0x08 -> FCP -> SCSI CDBs in FCP_CMND
        - FC-NVMe:        PRLI type 0x28 -> NVMe -> NVMe SQEs in CMD IU

        A dual-mode target can accept BOTH PRLI types from the same host,
        presenting SCSI LUNs via FCP and NVMe namespaces via FC-NVMe simultaneously.

        Linux: lpfc_issue_els_prli() sets page type based on cfg_enable_fc4_type.
      spec_refs:
        - document: "FC-NVMe-2"
          section: "5.1"
          title: "PRLI for NVMe — Service Parameter Page"
          url: "https://www.t11.org/fcSite/fcretr.html"
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              nvme_state: "PRLI_SENT"
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              nvme_prli: "PRLI_SENT"

  - id: "evt_prli_nvme_acc"
    type: "frame_tx"
    t_ns: 8200000
    frame_id: "prli_nvme_acc"
    annotation:
      text: "PRLI ACC — NVMe association established. FC-NVMe I/O can begin."
      detail: >
        Storage accepts NVMe PRLI and declares itself as an NVMe target with
        Discovery Controller capability. The FC-NVMe association is now live.
        From this point, all NVMe commands use FC frame TYPE=0x28.

        Compare with NVMe-oF/RDMA: there is no PRLI equivalent — RDMA uses
        the CM (Connection Manager) REQ/REP/RTU to establish QP connections,
        then NVMe Fabrics Connect at the NVMe layer. FC-NVMe reuses the
        established FC login infrastructure instead.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              nvme_state: "PRLI complete"
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              nvme_prli: "complete"
              active_exchanges: 0
              ox_id_next: "0x0004"
      - actor_id: "target"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              nvme_prli: "complete"

  # ── Phase 5: Discovery Controller ──────────────────────────────
  - id: "evt_disc_create_assoc"
    type: "frame_tx"
    t_ns: 9000000
    frame_id: "nvme_disc_create_assoc"
    annotation:
      text: "FC-NVMe LS: Create Association with Discovery Controller"
      detail: >
        Host creates an NVMe association with the Discovery Controller using
        the FC-NVMe LS (Link Service) protocol. This is the FC transport's
        equivalent of NVMe Fabrics Connect. The LS request is sent as an FC
        frame with TYPE=0x28.

        Note: In FC-NVMe, both the Discovery Controller and I/O Controller
        associations share the same FC port login (PLOGI/PRLI). There is no
        separate RDMA QP or TCP connection — all NVMe traffic flows over the
        single FC port-pair identified by FCID.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              discovery_state: "connecting"
              nvme_state: "discovery in progress"

  - id: "evt_disc_create_assoc_acc"
    type: "frame_tx"
    t_ns: 9100000
    frame_id: "nvme_disc_create_assoc_acc"
    annotation:
      text: "Discovery Controller association created — CNTLID=0xFFFF"
      detail: >
        Discovery Controller accepts association. Dynamic controller ID 0xFFFF
        is assigned (same convention as NVMe-oF/RDMA).
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              discovery_state: "connected"
              cntlid: "0xFFFF"

  - id: "evt_disc_get_log"
    type: "frame_tx"
    t_ns: 10000000
    frame_id: "nvme_disc_get_log"
    annotation:
      text: "Get Log Page (Discovery) — NVMe CMD IU via FC"
      detail: >
        Host sends NVMe Get Log Page (LID=0x70) as FC-NVMe CMD IU to retrieve
        the Discovery Log Page. The command is identical to NVMe-oF/RDMA's
        Get Log Page, but instead of an SGL for RDMA WRITE, FC-NVMe returns
        data as FC-NVMe DATA IU frames within the FC exchange.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              nvme_state: "retrieving discovery log"

  - id: "evt_disc_log_data"
    type: "frame_tx"
    t_ns: 10100000
    frame_id: "nvme_disc_log_data"
    annotation:
      text: "Discovery Log Page data — 1 entry, FC transport, NQN for I/O subsystem"
      detail: >
        Discovery Log contains one entry:
        - Transport Type: FC (0x02)
        - SubNQN: nqn.2024-01.com.example:nvme-array01
        - Transport Address: WWNN 50:00:00:0e:1e:dd:ee:00
        - Service ID: WWPN 50:00:00:0e:1e:dd:ee:ff

        For FC transport, the address is the WWNN/WWPN pair (not IP address).
        The host uses this to create an I/O Controller association.
    state_after: []

  - id: "evt_disc_log_rsp"
    type: "frame_tx"
    t_ns: 10200000
    frame_id: "nvme_disc_log_rsp"
    annotation:
      text: "Discovery Log Page complete — NVMe FC RSP IU"
      detail: "NVMe completion confirms log page delivered successfully."
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              nvme_state: "discovery complete"
              discovery_state: "complete"

  # ── Phase 6: I/O Controller Connect ─────────────────────────────
  - id: "evt_io_create_assoc"
    type: "frame_tx"
    t_ns: 12000000
    frame_id: "nvme_io_create_assoc"
    annotation:
      text: "FC-NVMe LS: Create Association with I/O Controller"
      detail: >
        Host connects to the I/O subsystem NQN discovered from the Discovery Log.
        In FC-NVMe, this association shares the existing FC port login — no new
        PLOGI or PRLI is needed. Compare with NVMe-oF/RDMA where each IO queue
        requires a separate RDMA QP (CM REQ/REP/RTU + Fabrics Connect).
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              io_ctrl_state: "connecting"

  - id: "evt_io_create_assoc_acc"
    type: "frame_tx"
    t_ns: 12100000
    frame_id: "nvme_io_create_assoc_acc"
    annotation:
      text: "I/O Controller association created — CNTLID=0x0041"
      detail: >
        I/O Controller assigns controller ID 0x0041. NVMe I/O commands can
        now be issued. The host will first send Identify Controller and
        Identify Namespace to learn target capabilities.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              io_ctrl_state: "connected"
              cntlid: "0x0041"
      - actor_id: "target"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              cntlid_assigned: "0x0041"

  # ── Phase 7: Identify Controller ────────────────────────────────
  - id: "evt_identify_ctrl"
    type: "frame_tx"
    t_ns: 13000000
    frame_id: "nvme_identify_ctrl_cmd"
    annotation:
      text: "Identify Controller — enumerate target capabilities"
      detail: >
        Host sends NVMe Identify Controller (CNS=0x01) via CMD IU.
        Returns 4KB data structure with model number, firmware revision,
        max queue entries, NVMe version, optional features, etc.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              last_cmd: "Identify Controller"

  - id: "evt_identify_ctrl_rsp"
    type: "frame_tx"
    t_ns: 13200000
    frame_id: "nvme_identify_ctrl_rsp"
    annotation:
      text: "Identify Controller complete — target enumerated"
      detail: >
        Controller identified. 4KB Identify Controller data (delivered via DATA IU,
        elided) describes the target's capabilities. Host now knows namespace count,
        max queue depth, and supported NVMe features.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              nsid: 1
              nvme_state: "IO ready"

  # ── Phase 8: NVMe Write ────────────────────────────────────────
  - id: "evt_nvme_write_cmd"
    type: "frame_tx"
    t_ns: 15000000
    frame_id: "nvme_write_cmd"
    annotation:
      text: "NVMe Write (4KB at LBA 0) — CMD IU sent"
      detail: >
        Host sends NVMe Write command as FC-NVMe CMD IU. The NVMe SQE contains
        opcode 0x01 (Write), NSID=1, LBA=0, NLB=7 (8 blocks = 4KB).

        FC-NVMe Write flow:
        1. Host -> Target: CMD IU (NVMe Write SQE)
        2. Target -> Host: XFER_RDY IU (permission to send data)
        3. Host -> Target: DATA IU (4KB write data)
        4. Target -> Host: RSP IU (NVMe CQE — completion)

        Compare with NVMe-oF/RDMA Write flow:
        1. Host -> Target: RDMA SEND (NVMe Write command + SGL)
        2. Target -> Host: RDMA READ Request (fetch write data)
        3. Host -> Target: RDMA READ Response (4KB data, zero-copy)
        4. Target -> Host: RDMA SEND (NVMe CQE)

        Both use 4 operations, but the mechanics differ: FC-NVMe pushes data
        (host sends DATA IU), while RDMA pulls data (target RDMA READs from host).
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              last_cmd: "NVMe Write"
              io_tag: "0x0010"
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              active_exchanges: 1

  - id: "evt_nvme_write_xfer_rdy"
    type: "frame_tx"
    t_ns: 15200000
    frame_id: "nvme_write_xfer_rdy"
    annotation:
      text: "XFER_RDY IU — target ready to receive 4KB write data"
      detail: >
        Target sends XFER_RDY IU granting host permission to transfer 4096 bytes
        starting at offset 0. This is the same flow control mechanism as
        FCP_XFER_RDY in traditional FC writes. The host must not send data
        before receiving this IU (unless First Burst is negotiated).
    state_after:
      - actor_id: "target"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              last_cmd_received: "NVMe Write"

  - id: "evt_nvme_write_data"
    type: "frame_tx"
    t_ns: 15400000
    frame_id: "nvme_write_data"
    annotation:
      text: "DATA IU — 4KB write data transferred to target"
      detail: >
        Host sends 4KB write data as FC-NVMe DATA IU. The data traverses the
        FC fabric as standard FC sequences. BB_Credit flow control ensures
        the switch and target are not overwhelmed — this is the FC equivalent
        of PFC in RoCEv2/RDMA networks. No special lossless Ethernet
        configuration is needed because FC is inherently lossless.
    state_after: []

  - id: "evt_nvme_write_rsp"
    type: "frame_tx"
    t_ns: 15700000
    frame_id: "nvme_write_rsp"
    annotation:
      text: "RSP IU — NVMe Write complete, 4KB committed at LBA 0"
      detail: >
        NVMe CQE shows status 0x0000 (Success). The 4KB has been written to the
        NVMe SSD. Exchange OX_ID 0x0010 is now complete and freed.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              last_cmd: "Write complete"
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              active_exchanges: 0
              ox_id_next: "0x0011"
      - actor_id: "target"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              last_cmd_received: "Write complete"

  # ── Phase 9: NVMe Read ─────────────────────────────────────────
  - id: "evt_nvme_read_cmd"
    type: "frame_tx"
    t_ns: 17000000
    frame_id: "nvme_read_cmd"
    annotation:
      text: "NVMe Read (4KB at LBA 0) — CMD IU sent"
      detail: >
        Host reads back the same 4KB. NVMe Read flow is simpler than Write —
        NO XFER_RDY is needed:
        1. Host -> Target: CMD IU (NVMe Read SQE)
        2. Target -> Host: DATA IU (4KB read data)
        3. Target -> Host: RSP IU (NVMe CQE)

        Compare with NVMe-oF/RDMA Read:
        1. Host -> Target: RDMA SEND (NVMe Read + SGL)
        2. Target -> Host: RDMA WRITE (4KB data, zero-copy)
        3. Target -> Host: RDMA SEND (NVMe CQE)

        Both use 3 operations. FC-NVMe delivers data via FC sequences (CPU-mediated),
        while RDMA delivers via RDMA WRITE (zero-copy, no host CPU involvement).
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              last_cmd: "NVMe Read"
              io_tag: "0x0011"
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              active_exchanges: 1

  - id: "evt_nvme_read_data"
    type: "frame_tx"
    t_ns: 17200000
    frame_id: "nvme_read_data"
    annotation:
      text: "DATA IU — 4KB read data delivered to host (no XFER_RDY needed)"
      detail: >
        Target sends read data immediately — no XFER_RDY handshake required
        for reads. This is the same behavior as FCP reads. The 4KB data
        should match the data previously written to LBA 0.
    state_after:
      - actor_id: "target"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              last_cmd_received: "NVMe Read"

  - id: "evt_nvme_read_rsp"
    type: "frame_tx"
    t_ns: 17400000
    frame_id: "nvme_read_rsp"
    annotation:
      text: "RSP IU — NVMe Read complete, data verified"
      detail: >
        NVMe CQE status 0x0000 (Success). Read data is in host buffer and
        should match the write data, confirming end-to-end data integrity
        through the FC-NVMe fabric.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            name: "FC-4 Upper Layer Protocol (NVMe)"
            state_fields:
              last_cmd: "Read complete"
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              active_exchanges: 0

  # ── Summary ─────────────────────────────────────────────────────
  - id: "evt_summary"
    type: "annotation"
    t_ns: 20000000
    annotation:
      text: "Scenario complete — FC-NVMe Discovery and I/O"
      detail: >
        This scenario demonstrated NVMe over Fibre Channel (FC-NVMe):

        1. LINK — 32GFC physical establishment (FC-0/FC-1)
        2. FLOGI — Fabric login, FCID assignment (identical to traditional FC)
        3. PLOGI — Port login with target (identical to traditional FC)
        4. PRLI TYPE 0x28 — THE KEY DIFFERENCE: NVMe process login instead of FCP (0x08)
        5. DISCOVERY — FC-NVMe LS Create Association + Get Log Page (Discovery)
        6. IO CONNECT — FC-NVMe LS Create Association to I/O Controller
        7. IDENTIFY — Identify Controller + Namespace (NVMe admin commands via CMD IU)
        8. WRITE — CMD IU -> XFER_RDY IU -> DATA IU -> RSP IU (4 frames)
        9. READ — CMD IU -> DATA IU -> RSP IU (3 frames, no XFER_RDY)

        FC-NVMe vs Traditional FCP/SCSI:
        - Same: FLOGI, PLOGI, FC frame header, BB_Credit, exchange management
        - Different: PRLI type (0x28 vs 0x08), TYPE field (0x28 vs 0x08), NVMe SQE vs SCSI CDB

        FC-NVMe vs NVMe-oF/RDMA:
        - FC-NVMe: No IP stack, no RDMA, no lossless Ethernet config needed
        - NVMe-oF/RDMA: Zero-copy data path, requires PFC + RNIC
        - Both: Same NVMe command set, same Discovery Log Page, same NQN system

# ─────────────────────────────────────────────────────────────────
# GLOSSARY
# ─────────────────────────────────────────────────────────────────
glossary:
  - term: "FC-NVMe"
    definition: "NVMe over Fibre Channel — a transport binding that maps NVMe commands and data to FC sequences. Defined by FC-NVMe-2 (INCITS 560). Reuses the FC login infrastructure (FLOGI, PLOGI) but uses PRLI type 0x28 to negotiate NVMe instead of FCP/SCSI. The FC frame header TYPE field is 0x28 for all NVMe data frames."
    spec_refs:
      - document: "FC-NVMe-2"
        section: "1"
        title: "FC-NVMe Overview"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "Information Unit"
    abbrev: "IU"
    definition: "The FC-NVMe data structure carried in FC frame payloads. Four IU types: CMD IU (0x00, contains NVMe SQE), DATA IU (0x40, carries read/write data), RSP IU (0x02, contains NVMe CQE), and XFER_RDY IU (0x50, grants write data transfer permission)."
    spec_refs:
      - document: "FC-NVMe-2"
        section: "7"
        title: "FC-NVMe Information Units"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "CMD IU"
    definition: "FC-NVMe Command Information Unit (type 0x00). Contains a 64-byte NVMe Submission Queue Entry (SQE). Sent from initiator to target in an FC frame with R_CTL=0x06 and TYPE=0x28. Analogous to FCP_CMND in traditional FC."
    spec_refs:
      - document: "FC-NVMe-2"
        section: "7.1"
        title: "CMD IU"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "RSP IU"
    definition: "FC-NVMe Response Information Unit (type 0x02). Contains a 16-byte NVMe Completion Queue Entry (CQE) with command status. Sent from target to initiator in an FC frame with R_CTL=0x07 and TYPE=0x28. Analogous to FCP_RSP."
    spec_refs:
      - document: "FC-NVMe-2"
        section: "7.4"
        title: "RSP IU"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "XFER_RDY IU"
    definition: "FC-NVMe Transfer Ready Information Unit (type 0x50). Sent by the target to grant the initiator permission to send write data. Contains relative offset and byte count. Required for write operations (unless First Burst is negotiated). Not used for reads. Analogous to FCP_XFER_RDY."
    spec_refs:
      - document: "FC-NVMe-2"
        section: "7.3"
        title: "XFER_RDY IU"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "DATA IU"
    definition: "FC-NVMe Data Information Unit (type 0x40). Carries the actual read or write data payload within FC sequences. For writes, sent from initiator to target after XFER_RDY. For reads, sent from target to initiator immediately after CMD IU."
    spec_refs:
      - document: "FC-NVMe-2"
        section: "7.2"
        title: "DATA IU"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "NVMe SQE"
    abbrev: "Submission Queue Entry"
    definition: "The 64-byte NVMe command structure. Contains opcode, namespace ID, starting LBA, block count, and other command-specific fields. In FC-NVMe, the SQE is encapsulated inside a CMD IU. In NVMe-oF/RDMA, it is sent via RDMA SEND."
    spec_refs:
      - document: "NVMe Base Spec 2.0"
        section: "4.2"
        title: "Submission Queue Entry"
        url: "https://nvmexpress.org/specifications/"

  - term: "NVMe CQE"
    abbrev: "Completion Queue Entry"
    definition: "The 16-byte NVMe completion structure. Contains status code, SQ ID, and command-specific results. In FC-NVMe, the CQE is encapsulated inside a RSP IU. Indicates success (0x0000) or specific error codes."
    spec_refs:
      - document: "NVMe Base Spec 2.0"
        section: "4.6"
        title: "Completion Queue Entry"
        url: "https://nvmexpress.org/specifications/"

  - term: "NVMe Qualified Name"
    abbrev: "NQN"
    definition: "Globally unique identifier for NVMe subsystems and hosts. Format: nqn.YYYY-MM.reverse-domain:user-string. Used in FC-NVMe Create Association LS requests (same as NVMe-oF/RDMA Fabrics Connect). Discovery Controller uses well-known NQN nqn.2014-08.org.nvmexpress.discovery."
    spec_refs:
      - document: "NVMe Base Spec 2.0"
        section: "4.5"
        title: "NVMe Qualified Name"
        url: "https://nvmexpress.org/specifications/"

  - term: "PRLI"
    abbrev: "Process Login"
    definition: "Establishes an FC-4 upper-layer protocol association. The Service Parameter Page Type field determines the protocol: 0x08 = FCP/SCSI, 0x28 = NVMe. This single byte is what differentiates an FC-NVMe fabric from a traditional FCP fabric on the wire."
    spec_refs:
      - document: "FC-LS-4"
        section: "5.6"
        title: "Process Login (PRLI)"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "FLOGI"
    abbrev: "Fabric Login"
    definition: "The first ELS command after physical link up. Sent to well-known address 0xFFFFFE. The fabric assigns an N_Port ID (FCID). FLOGI is identical for FC-NVMe and traditional FCP — it occurs before the upper-layer protocol is negotiated."
    spec_refs:
      - document: "FC-LS-4"
        section: "5.3"
        title: "Fabric Login (FLOGI)"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "FCID"
    abbrev: "N_Port ID"
    definition: "A 24-bit address assigned by the fabric to an N_Port during FLOGI. Used as S_ID and D_ID in FC frame headers for routing. Format: domain:area:port (e.g., 0x010200 = domain 1, area 2, port 0)."
    spec_refs:
      - document: "FC-FS-5"
        section: "15.1"
        title: "Address Identifier"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "BB_Credit"
    abbrev: "Buffer-to-Buffer Credit"
    definition: "FC flow control mechanism. Each port advertises how many frames it can buffer. The sender decrements credit per frame and replenishes on R_RDY. This is FC's native lossless mechanism — no PFC or ECN configuration needed, unlike RoCEv2/RDMA."
    spec_refs:
      - document: "FC-FS-5"
        section: "17.2"
        title: "Buffer-to-buffer flow control"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "Exchange"
    definition: "A bidirectional conversation between two FC N_Ports identified by OX_ID (originator) and RX_ID (responder). An exchange contains one or more sequences. In FC-NVMe, each NVMe I/O operation is one exchange (CMD IU + optional XFER_RDY + DATA + RSP IU)."
    spec_refs:
      - document: "FC-FS-5"
        section: "16"
        title: "Exchange and Sequence Management"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "FC-NVMe LS"
    abbrev: "Link Service"
    definition: "FC-NVMe Link Service operations used for controller association management. Create Association establishes an NVMe controller connection. Disconnect Association tears it down. These are FC-4 level services, distinct from FC-2 ELS commands like FLOGI/PLOGI."
    spec_refs:
      - document: "FC-NVMe-2"
        section: "6"
        title: "FC-NVMe Link Services"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "First Burst"
    definition: "An FC-NVMe optimization negotiated in PRLI that allows the host to send the initial portion of write data immediately with the CMD IU, without waiting for XFER_RDY. Reduces write latency by eliminating one round-trip for small writes."
    spec_refs:
      - document: "FC-NVMe-2"
        section: "5.1.4"
        title: "First Burst Size"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "TYPE 0x28 vs TYPE 0x08"
    definition: "The FC frame header TYPE field distinguishes FC-NVMe (0x28) from FCP/SCSI (0x08). All FC-NVMe data frames use TYPE=0x28. Login ELS frames (FLOGI, PLOGI, PRLI) still use TYPE=0x01 (ELS). The PRLI service parameter page type (also 0x28 vs 0x08) determines which FC-4 protocol is negotiated."
