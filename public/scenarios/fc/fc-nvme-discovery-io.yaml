            abbrev: "fc.d_id"
            bits: 24
            value: "0x010200"
            description: "Storage target FCID"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc.s_id"
            bits: 24
            value: "0x010100"
            description: "Host FCID"
          - name: "TYPE"
