            bits: 32
            value: "0x00000000"
            description: "Start data transfer at byte 0"
          - name: "Byte Count"
            abbrev: "fc_nvme.xfer_rdy.count"
            bits: 32
            value: 4096
            description: "Transfer up to 4096 bytes (full 4KB write)"

  # ── NVMe Write DATA IU ────────────────────────────────────────
