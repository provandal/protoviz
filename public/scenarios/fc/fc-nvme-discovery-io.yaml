            bits: 8
            value: "0x28"
            description: "0x28 = NVMe over FC. This is the first frame with TYPE=0x28 — all prior login frames used TYPE=0x01 (ELS). From here on, FC-NVMe data frames use 0x28."
            spec_refs:
              - document: "FC-NVMe-2"
                section: "4.2"
                title: "FC TYPE code for NVMe"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x290000"
            description: "Exchange originator, first+last sequence, sequence initiative"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x00"
            description: "Sequence identifier within exchange"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
