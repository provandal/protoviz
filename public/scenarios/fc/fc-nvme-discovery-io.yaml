  # ── NVMe Write XFER_RDY IU ────────────────────────────────────
  - id: "nvme_write_xfer_rdy"
    name: "NVMe FC XFER_RDY IU: Transfer Ready"
    description: >
      Target sends XFER_RDY IU granting the host permission to send write data.
      This is analogous to FCP_XFER_RDY in traditional FC writes. The XFER_RDY
      specifies the relative offset and byte count the host may transfer.
      In NVMe-oF/RDMA, this step does not exist — the target fetches write data
      via RDMA READ. In FC-NVMe, the host pushes data after receiving XFER_RDY.
    from: "target"
    to: "initiator"
    via: ["switch"]
    timestamp_ns: 15200000
    total_bytes: 40
    color: "#991b1b"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.r_ctl"
            bits: 8
            value: "0x05"
            description: "Transfer Ready — NVMe FC XFER_RDY IU (same R_CTL as FCP_XFER_RDY)"
            spec_refs:
              - document: "FC-NVMe-2"
