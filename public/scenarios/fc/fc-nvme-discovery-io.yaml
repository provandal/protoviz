                section: "5.16"
                title: "Get Log Page command"
                url: "https://nvmexpress.org/specifications/"
          - name: "NVMe SQE: Log Page Identifier"
            abbrev: "nvme.cmd.get_log.lid"
            bits: 8
            value: "0x70"
            description: "Discovery Log Page (0x70) — lists available NVMe subsystems, same LID as NVMe-oF/RDMA"
            spec_refs:
              - document: "NVMe Base Spec 2.0"
                section: "5.16.1.13"
                title: "Discovery Log Page"
                url: "https://nvmexpress.org/specifications/"
          - name: "NVMe SQE: Number of Dwords"
            abbrev: "nvme.cmd.get_log.numd"
            bits: 32
            value: 1023
            description: "Request up to 4096 bytes (1024 dwords - 1, 0-based)"

  # ── Discovery Log Page Data (FC-NVMe DATA IU) ──────────────────
