            value: "0x06"
            description: "0x06 = Command — NVMe FC CMD IU"
          - name: "D_ID"
            abbrev: "fc.d_id"
            bits: 24
            value: "0x010200"
            description: "Storage target FCID"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc.s_id"
            bits: 24
            value: "0x010100"
            description: "Host FCID"
          - name: "TYPE"
            abbrev: "fc.type"
            bits: 8
            value: "0x28"
            description: "0x28 = NVMe over FC (not 0x08 FCP)"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x210000"
            description: "Exchange originator, first sequence, SI transfer"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x00"
            description: "Command sequence"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame"
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0010"
            description: "Exchange ID for this NVMe Write I/O"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID — 0xFFFF means unassigned"
          - name: "Parameter"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0"
      - name: "NVMe FC CMD IU"
        abbrev: "fc_nvme.cmd"
        layer: 4
        total_bytes: 64
        fields:
          - name: "IU Type"
            abbrev: "fc_nvme.cmd.iu_type"
            bits: 8
            value: "0x00"
            description: "CMD IU (0x00) — contains NVMe Write SQE"
          - name: "NVMe SQE: Opcode"
            abbrev: "nvme.cmd.opc"
            bits: 8
            value: "0x01"
            description: "NVMe Write (0x01)"
            spec_refs:
              - document: "NVMe Base Spec 2.0"
                section: "7.1"
                title: "Write command"
                url: "https://nvmexpress.org/specifications/"
          - name: "NVMe SQE: NSID"
            abbrev: "nvme.cmd.nsid"
            bits: 32
            value: 1
            description: "Namespace 1"
          - name: "NVMe SQE: Starting LBA"
            abbrev: "nvme.cmd.slba"
            bits: 64
            value: "0x0000000000000000"
            description: "LBA 0 — start of namespace"
          - name: "NVMe SQE: Number of Logical Blocks"
            abbrev: "nvme.cmd.nlb"
            bits: 16
            value: 7
            description: "8 blocks (0-based) x 512B = 4KB write"
      - name: "FC-1 Encoding"
