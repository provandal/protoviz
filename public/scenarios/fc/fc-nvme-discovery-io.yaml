  # ── NVMe Write Command (CMD IU) ────────────────────────────────
  - id: "nvme_write_cmd"
    name: "NVMe FC CMD IU: Write (4KB at LBA 0)"
    description: >
      Host sends NVMe Write command as FC-NVMe CMD IU. The CMD IU contains
      the 64-byte NVMe SQE with opcode, namespace ID, starting LBA, and
      block count. The target must send an XFER_RDY IU before data transfer
      (unless First Burst is negotiated in PRLI). This write flow is:
      CMD IU → XFER_RDY IU → DATA IU → RSP IU.
      Compare with FCP write: FCP_CMND → FCP_XFER_RDY → FCP_DATA → FCP_RSP.
      The frame structure is nearly identical — only the TYPE field (0x28 vs 0x08)
      and the payload contents (NVMe SQE vs SCSI CDB) differ.
    from: "initiator"
    to: "target"
    via: ["switch"]
    timestamp_ns: 15000000
    total_bytes: 96
    color: "#991b1b"
    headers:
