  # ── Get Log Page (Discovery) — NVMe CMD IU ────────────────────
  - id: "nvme_disc_get_log"
    name: "NVMe FC CMD IU: Get Log Page (Discovery Log)"
    description: >
      Host sends NVMe Get Log Page command inside an FC-NVMe CMD IU to retrieve
      the Discovery Log Page. The CMD IU contains a 64-byte NVMe SQE (Submission
      Queue Entry). Unlike NVMe-oF/RDMA where this uses RDMA SEND + SGL, here
      the data will be returned as FC-NVMe DATA IU frames.
    from: "initiator"
    to: "target"
    via: ["switch"]
    timestamp_ns: 10000000
    total_bytes: 96
    color: "#0369a1"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.r_ctl"
