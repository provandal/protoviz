            description: "0x06 = Command — NVMe FC CMD IU (same R_CTL as FCP_CMND)"
            spec_refs:
              - document: "FC-NVMe-2"
                section: "7.1"
                title: "FC-NVMe CMD IU"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "D_ID"
            abbrev: "fc.d_id"
            bits: 24
            value: "0x010200"
            description: "Storage target FCID"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc.s_id"
            bits: 24
            value: "0x010100"
            description: "Host FCID"
          - name: "TYPE"
            abbrev: "fc.type"
            bits: 8
            value: "0x28"
            description: "0x28 = NVMe over FC — all NVMe I/O frames use this type code"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x210000"
            description: "Exchange originator, first sequence, sequence initiative transfer"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x00"
            description: "Sequence identifier within exchange"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0005"
            description: "Exchange ID for this NVMe command"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID — 0xFFFF means unassigned"
          - name: "Parameter"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0"
      - name: "NVMe FC CMD IU"
        abbrev: "fc_nvme.cmd"
        layer: 4
        total_bytes: 64
        fields:
          - name: "IU Type"
            abbrev: "fc_nvme.cmd.iu_type"
            bits: 8
            value: "0x00"
            description: "CMD IU (0x00) — contains an NVMe SQE. Compare: RSP IU = 0x02, DATA IU = 0x40, XFER_RDY IU = 0x50."
            spec_refs:
              - document: "FC-NVMe-2"
                section: "7.1.1"
                title: "IU Type codes"
                url: "https://www.t11.org/fcSite/fcretr.html"
