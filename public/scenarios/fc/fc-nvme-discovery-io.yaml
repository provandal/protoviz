  # ── PRLI for NVMe (TYPE 0x28) — THE KEY DIFFERENCE ──────────
  - id: "prli_nvme"
    name: "PRLI (Process Login for NVMe — Type 0x28)"
    description: >
      THIS IS THE KEY FRAME that differentiates FC-NVMe from traditional FCP/SCSI.
      The PRLI Service Parameter Page Type is 0x28 (NVMe) instead of 0x08 (FCP).
      This tells the target that the host wants to establish an NVMe upper-layer
      association, not a SCSI/FCP one. The PRLI payload carries NVMe-specific
      service parameters including the initiator's first burst size capability.
      Linux: lpfc_els.c lpfc_issue_els_prli() checks if nvme is enabled on vport,
      then sets page type to FC_TYPE_NVME (0x28) instead of FC_TYPE_FCP (0x08).
    from: "initiator"
    to: "target"
    via: ["switch"]
    timestamp_ns: 8000000
    total_bytes: 52
    color: "#dc2626"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.r_ctl"
            bits: 8
            value: "0x22"
            description: "Unsolicited Control — ELS request"
          - name: "D_ID"
            abbrev: "fc.d_id"
            bits: 24
            value: "0x010200"
            description: "Storage array FCID"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc.s_id"
            bits: 24
            value: "0x010100"
            description: "Host FCID"
          - name: "TYPE"
            abbrev: "fc.type"
            bits: 8
            value: "0x01"
            description: "0x01 = ELS — PRLI is an ELS command, not an NVMe frame. The NVMe type (0x28) appears in the PRLI service parameter page, not here."
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x290000"
            description: "Exchange originator, first+last sequence, sequence initiative"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x00"
            description: "Sequence identifier within exchange"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0003"
            description: "Exchange ID for this PRLI"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID — 0xFFFF means unassigned"
          - name: "Parameter"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "PRLI Payload (NVMe Service Parameters)"
        abbrev: "fc.els.prli"
        layer: 4
        total_bytes: 20
        fields:
          - name: "LS_Command"
            abbrev: "fc.els.cmd"
            bits: 32
            value: "0x20000014"
            description: "0x20 = PRLI command code, page length 0x14 (20 bytes)"
            spec_refs:
              - document: "FC-LS-4"
                section: "5.6"
                title: "PRLI — Process Login"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Service Parameter Page Type"
            abbrev: "fc.els.prli.type"
            bits: 8
            value: "0x28"
            description: "0x28 = NVMe. THIS IS THE KEY FIELD. Traditional FCP/SCSI uses 0x08. When the target sees type 0x28, it knows to activate its NVMe subsystem for this initiator, not its SCSI target mode. On a dual-mode target, both 0x08 (FCP) and 0x28 (NVMe) PRLIs may coexist."
            spec_refs:
              - document: "FC-NVMe-2"
                section: "5.1"
                title: "PRLI Service Parameter Page for NVMe"
                url: "https://www.t11.org/fcSite/fcretr.html"
              - document: "FC-LS-4"
                section: "5.6.2"
                title: "Service Parameter Page Type codes"
                url: "https://www.t11.org/fcSite/fcretr.html"
            kernel_ref:
              file: "drivers/scsi/lpfc/lpfc_els.c"
              function: "lpfc_issue_els_prli"
              notes: "Sets type = FC_TYPE_NVME (0x28) when vport->cfg_enable_fc4_type includes LPFC_ENABLE_NVME"
          - name: "Initiator Function"
            abbrev: "fc.els.prli.initiator"
            bits: 1
            value: 1
            description: "This port is an NVMe host (initiator) — can send NVMe commands"
          - name: "Target Function"
            abbrev: "fc.els.prli.target"
            bits: 1
            value: 0
            description: "This port is NOT an NVMe target"
          - name: "Discovery Controller"
            abbrev: "fc.els.prli.discovery"
            bits: 1
            value: 1
            description: "Host supports Discovery Controller access — can query for available NVMe subsystems"
            spec_refs:
              - document: "FC-NVMe-2"
                section: "5.1.3"
                title: "NVMe PRLI service parameters — Discovery"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "First Burst Size"
            abbrev: "fc.els.prli.first_burst"
            bits: 16
            value: 65536
            description: "Max bytes host can send in the first burst of a write (before XFER_RDY). 0 = first burst disabled, host must wait for XFER_RDY. 65536 (64KB) = host can send up to 64KB immediately."
            spec_refs:
              - document: "FC-NVMe-2"
                section: "5.1.4"
                title: "First Burst Size"
                url: "https://www.t11.org/fcSite/fcretr.html"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 32GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS-FEC"
            description: "Reed-Solomon Forward Error Correction — mandatory for 32GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "32GFC (14.025 Gbps per lane)"
            description: "Physical signaling rate — 32GFC Gen 6 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm VCSEL multimode fiber (SFP28)"
            description: "Short-reach fiber optics — OM4 multimode, up to 100m"

