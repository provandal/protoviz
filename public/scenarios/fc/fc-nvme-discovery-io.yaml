            abbrev: "fc.type"
            bits: 8
            value: "0x28"
            description: "NVMe over FC"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x800000"
            description: "Exchange responder, sequence initiative retained by target"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x01"
            description: "XFER_RDY sequence"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0010"
            description: "Same exchange as Write command"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0x0010"
