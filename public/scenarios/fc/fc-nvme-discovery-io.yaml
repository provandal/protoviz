        layer: 4
        total_bytes: 224
        fields:
          - name: "LS Operation"
            abbrev: "fc_nvme.ls.op"
            bits: 32
            value: "0x00000001"
            description: "Create Association (0x01) — establishes an NVMe controller association over FC"
            spec_refs:
              - document: "FC-NVMe-2"
                section: "6.1"
                title: "FC-NVMe LS operations"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Host NQN"
