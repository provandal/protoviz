meta:
  id: "fc-nvme-discovery-io"
  title: "FC-NVMe: NVMe over Fibre Channel — Discovery → Connect → I/O"
  protocol: "FC-NVMe"
  protocol_family: "SAN"
  version: "1.0.0"
  description: >
    A complete FC-NVMe (NVMe over Fibre Channel) flow on a 32GFC fabric, from
    physical link establishment through Fabric Login (FLOGI), Port Login (PLOGI),
    and the critical NVMe-specific Process Login (PRLI with type code 0x28 instead
    of the traditional FCP type 0x08). After PRLI establishes the NVMe upper-layer
    association, the host connects to a Discovery Controller via FC-LS, retrieves
    the Discovery Log Page to locate NVMe subsystems, then connects to an I/O
    Controller via a second PRLI exchange. NVMe Identify Controller and Identify
    Namespace commands enumerate the target, followed by a 4KB NVMe Write and Read
    using FC-NVMe Information Units (CMD IU, XFER_RDY IU, DATA IU, RSP IU).

    FC-NVMe reuses the FC framing and login infrastructure but replaces the FCP/SCSI
    upper layer with NVMe. Compared to NVMe-oF/RDMA, FC-NVMe requires no IP stack,
    no RDMA CM, and no lossless Ethernet configuration — the FC fabric provides
    guaranteed delivery natively via BB_Credit flow control.

  learning_objectives:
    - "Understand how FC-NVMe reuses the FC login sequence (FLOGI, PLOGI) but changes PRLI to negotiate NVMe (type 0x28) instead of FCP/SCSI (type 0x08)"
    - "See the NVMe Discovery Controller flow over FC-LS — how the initiator finds NVMe subsystems in the fabric"
    - "Trace NVMe commands encapsulated in FC-NVMe Information Units: CMD IU (SQE), RSP IU (CQE), XFER_RDY IU, DATA IU"
    - "Compare FC-NVMe write flow (CMD IU → XFER_RDY IU → DATA IU → RSP IU) with traditional FCP write flow (FCP_CMND → FCP_XFER_RDY → FCP_DATA → FCP_RSP)"
    - "Understand that FC-NVMe read flow does NOT require XFER_RDY — data flows immediately after command"
    - "Compare FC-NVMe transport binding with NVMe-oF/RDMA — FC frames vs RDMA operations, BB_Credit vs PFC, FC switch vs Ethernet switch"
    - "Recognize that the FC frame header TYPE field (0x28 for NVMe vs 0x08 for FCP) is the fundamental differentiator on the wire"

  difficulty: "advanced"

  authors:
    - name: "Erik Smith"
      org: "Dell Technologies"
    - name: "Claude"
      org: "proto-viz"
      github: "proto-viz"

  created: "2026-03-30"
  updated: "2026-03-30"

  tags:
    - "Fibre Channel"
    - "FC"
    - "FC-NVMe"
    - "NVMe"
    - "NVMe-oF"
    - "SAN"
    - "32GFC"
    - "FLOGI"
    - "PLOGI"
    - "PRLI"
    - "Discovery"
    - "education"

  primary_specs:
    - document: "FC-NVMe-2"
      section: "1"
      title: "Fibre Channel — NVMe-2 (INCITS 560)"
      url: "https://www.t11.org/fcSite/fcretr.html"
    - document: "FC-FS-5"
      section: "1"
      title: "Fibre Channel — Framing and Signaling"
      url: "https://www.t11.org/fcSite/fcretr.html"
    - document: "FC-LS-4"
      section: "1"
      title: "Fibre Channel — Link Services"
      url: "https://www.t11.org/fcSite/fcretr.html"
    - document: "NVMe Base Spec 2.0"
      section: "1"
      title: "NVM Express Base Specification"
      url: "https://nvmexpress.org/specifications/"

  source_references:
    - repo: "torvalds/linux"
      path: "drivers/scsi/lpfc/lpfc_nvme.c"
      description: "Emulex/Broadcom lpfc — FC-NVMe initiator I/O path, CMD IU / RSP IU handling"
    - repo: "torvalds/linux"
      path: "drivers/scsi/lpfc/lpfc_els.c"
      description: "lpfc — FLOGI, PLOGI, PRLI ELS handling (shared with FCP)"
    - repo: "torvalds/linux"
      path: "drivers/scsi/lpfc/lpfc_nvmet.c"
      description: "lpfc — FC-NVMe target mode, XFER_RDY generation, DATA IU handling"
    - repo: "torvalds/linux"
      path: "drivers/nvme/host/fc.c"
      description: "NVMe-FC host transport — NVMe command submission over FC, queue management"
    - repo: "torvalds/linux"
      path: "drivers/nvme/target/fc.c"
      description: "NVMe-FC target transport — command reception, data transfer, completion"

  content_disclaimer: >
    Protocol descriptions in this scenario are based on open-source implementations
    (Linux kernel nvme-fc, lpfc drivers) and publicly available T11/INCITS and NVMe
    specifications summaries. No proprietary specification text has been reproduced.
    Spec references are provided as citations for further reading.

# ─────────────────────────────────────────────────────────────────
# TOPOLOGY
# ─────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: "initiator"
      type: "initiator"
      label: "Host (Initiator HBA)"
      description: "FC-NVMe initiator — Linux host with dual-port 32GFC HBA running lpfc or qla2xxx driver with nvme-fc transport"
      hardware: "32GFC dual-port HBA (e.g., Emulex LPe36000)"
      os: "Linux 6.x"
      kernel_version: "6.8"
      position: "left"

    - id: "switch"
      type: "switch"
      label: "FC Switch"
      description: "32GFC FC switch with embedded Name Server, NVMe-aware zoning, and FCID assignment"
      hardware: "32GFC FC switch"
      position: "center"

    - id: "target"
      type: "target"
      label: "NVMe Storage Target"
      description: "FC-NVMe storage array presenting NVMe namespaces over Fibre Channel"
      hardware: "32GFC storage array with NVMe SSDs"
      position: "right"

  links:
    - id: "link-host-sw"
      from: "initiator"
      to: "switch"
      speed_gbps: 32
      media: "fiber_sr"
      fec: "RS-FEC"
    - id: "link-sw-stor"
      from: "switch"
      to: "target"
      speed_gbps: 32
      media: "fiber_sr"
      fec: "RS-FEC"

# ─────────────────────────────────────────────────────────────────
# LAYER DEFINITIONS (per actor)
# FC uses FC-0 through FC-4 rather than the OSI model.
# FC-NVMe replaces the FCP-4 upper layer with NVMe.
# ─────────────────────────────────────────────────────────────────
osi_layers:
  initiator:
    - layer: 4
      name: "FC-4 Upper Layer Protocol (NVMe)"
      components: ["nvme-fc transport", "drivers/nvme/host/fc.c", "lpfc_nvme.c", "NVMe host core"]
      state_schema:
        nvme_state:
          type: "string"
          description: "NVMe host state"
          initial: "offline"
        discovery_state:
          type: "string"
          description: "Discovery Controller state"
          initial: "none"
        io_ctrl_state:
          type: "string"
          description: "I/O Controller state"
          initial: "none"
        cntlid:
          type: "string"
          description: "Controller ID assigned by target"
          initial: "null"
        nsid:
          type: "integer"
          description: "Active Namespace ID"
          initial: 0
        last_cmd:
          type: "string"
          description: "Last NVMe command issued"
          initial: "none"
        io_tag:
          type: "string"
          description: "Current NVMe I/O tag (OX_ID)"
          initial: "null"

    - layer: 2
      name: "FC-2 Framing / Signaling"
      components: ["lpfc_sli.c", "lpfc_els.c", "lpfc_hw.h", "FC-LS", "exchange management"]
      state_schema:
        my_fcid:
          type: "string"
          description: "Assigned N_Port ID (FCID) — set by fabric during FLOGI"
          initial: "0x000000"
        bb_credit:
          type: "integer"
          description: "Buffer-to-buffer credit (frames we can send before ACK)"
          initial: 0
        ox_id_next:
          type: "string"
          description: "Next originator exchange ID to allocate"
          initial: "0x0001"
        active_exchanges:
          type: "integer"
          description: "Number of active exchanges"
          initial: 0
        fabric_login:
          type: "string"
          description: "Fabric login state (FLOGI)"
          initial: "none"
        target_fcid:
          type: "string"
          description: "Discovered target FCID from Name Server"
          initial: "null"
        target_plogi:
          type: "string"
          description: "Port login state with target"
          initial: "none"
        nvme_prli:
          type: "string"
          description: "NVMe Process Login state (PRLI type 0x28)"
          initial: "none"

    - layer: 1
      name: "FC-1 Encoding"
      components: ["64b/66b encoding", "word sync"]
      state_schema:
        encoding:
          type: "string"
          initial: "64b/66b"
        word_sync:
          type: "boolean"
          initial: false

    - layer: 0
      name: "FC-0 Physical"
      components: ["32GFC SFP28", "850nm VCSEL"]
      state_schema:
        phy_state:
          type: "string"
          description: "Physical port state (point-to-point link to switch)"
          initial: "down"
        speed:
          type: "string"
          initial: "unknown"
        signal_detect:
          type: "boolean"
          initial: false

  target:
    - layer: 4
      name: "FC-4 Upper Layer Protocol (NVMe)"
      components: ["NVMe target subsystem", "drivers/nvme/target/fc.c", "lpfc_nvmet.c", "NVMe target core"]
      state_schema:
        target_state:
          type: "string"
          initial: "online"
        subsys_nqn:
          type: "string"
          description: "NVMe subsystem NQN"
          initial: "nqn.2024-01.com.example:nvme-array01"
        namespaces_exported:
          type: "integer"
          description: "Number of NVMe namespaces presented"
          initial: 1
        last_cmd_received:
          type: "string"
          initial: "none"
        nvme_prli:
          type: "string"
          initial: "none"
        cntlid_assigned:
          type: "string"
          description: "Controller ID assigned to initiator"
          initial: "null"

    - layer: 2
      name: "FC-2 Framing / Signaling"
      components: ["frame header", "CRC", "FC-LS", "ELS handling", "exchange management"]
      state_schema:
        my_fcid:
          type: "string"
          description: "Storage array FCID (pre-assigned by fabric)"
          initial: "0x010200"
        bb_credit:
          type: "integer"
          initial: 16
        active_exchanges:
          type: "integer"
          initial: 0
        fabric_login:
          type: "string"
          initial: "complete"
        host_plogi:
          type: "string"
          description: "Port login state with initiator host"
          initial: "none"

    - layer: 1
      name: "FC-1 Encoding"
      components: ["64b/66b encoding"]
      state_schema:
        encoding:
          type: "string"
          initial: "64b/66b"

    - layer: 0
      name: "FC-0 Physical"
      components: ["32GFC SFP28"]
      state_schema:
        phy_state:
          type: "string"
          description: "Physical port state (point-to-point link to switch)"
          initial: "down"
        speed:
          type: "string"
          initial: "unknown"
        signal_detect:
          type: "boolean"
          initial: false

  switch:
    - layer: 2
      name: "FC-2 Frame Forwarding / Fabric Services"
      components: ["D_ID routing", "BB_Credit management", "Name Server", "FCID assignment", "NVMe-aware zone enforcement"]
      state_schema:
        ns_entries:
          type: "integer"
          description: "Number of entries in Name Server database"
          initial: 1
        zone_active:
          type: "string"
          description: "Active zone set name"
          initial: "nvme_zone_cfg"
        fcid_pool_next:
          type: "string"
          description: "Next FCID to assign"
          initial: "0x010100"
        fwd_table_entries:
          type: "integer"
          description: "FCIDs in routing table"
          initial: 1
        port_a_bb_credit:
          type: "integer"
          description: "BB_Credit available toward host"
          initial: 16
        port_b_bb_credit:
          type: "integer"
          description: "BB_Credit available toward storage"
          initial: 16
    - layer: 0
      name: "FC-0 Physical (per-port)"
      components: ["32GFC SFP28"]
      state_schema:
        port_a_phy:
          type: "string"
          description: "Physical state of port facing host"
          initial: "down"
        port_b_phy:
          type: "string"
          description: "Physical state of port facing storage"
          initial: "down"

# ─────────────────────────────────────────────────────────────────
# FRAME LIBRARY
# ─────────────────────────────────────────────────────────────────
frames:

  # ── FLOGI ─────────────────────────────────────────────────────
  - id: "flogi"
    name: "FLOGI (Fabric Login)"
    description: >
      Host sends Fabric Login to well-known address 0xFFFFFE (Fabric Controller).
      S_ID is 0x000000 because the host has no FCID yet. This is identical to
      traditional FC — FLOGI is protocol-agnostic, occurring before the upper
      layer (NVMe or FCP) is negotiated.
      Linux: lpfc_els.c lpfc_issue_els_flogi()
    from: "initiator"
    to: "switch"
    timestamp_ns: 5000000
    total_bytes: 148
    color: "#d97706"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.r_ctl"
            bits: 8
            value: "0x22"
            description: "Unsolicited Control — ELS request frame"
            spec_refs:
              - document: "FC-FS-5"
                section: "9.3"
                title: "R_CTL field encoding"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "D_ID"
            abbrev: "fc.d_id"
            bits: 24
            value: "0xFFFFFE"
            description: "Well-known address for Fabric Controller. FLOGI always goes here."
            spec_refs:
              - document: "FC-FS-5"
                section: "15.2"
                title: "Well-known address identifiers"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control"
          - name: "S_ID"
            abbrev: "fc.s_id"
            bits: 24
            value: "0x000000"
            description: "Source ID is 0x000000 — host has no FCID assigned yet"
          - name: "TYPE"
            abbrev: "fc.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
            spec_refs:
              - document: "FC-FS-5"
                section: "9.7"
                title: "TYPE field — protocol type identifier"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x290000"
            description: "Exchange originator, first+last sequence, sequence initiative"
            spec_refs:
              - document: "FC-FS-5"
                section: "9.5"
                title: "F_CTL — Frame Control"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x00"
            description: "Sequence identifier within exchange"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0001"
            description: "Originator Exchange ID — tracks this FLOGI exchange"
            spec_refs:
              - document: "FC-FS-5"
                section: "9.10"
                title: "OX_ID and RX_ID — Exchange identification"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID — 0xFFFF means unassigned (fabric will assign)"
          - name: "Parameter"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for ELS frames"
      - name: "FLOGI Payload (ELS)"
        abbrev: "fc.els.flogi"
        layer: 2
        total_bytes: 116
        fields:
          - name: "LS_Command"
            abbrev: "fc.els.cmd"
            bits: 32
            value: "0x04000000"
            description: "0x04 = FLOGI command code"
            spec_refs:
              - document: "FC-LS-4"
                section: "5.3"
                title: "FLOGI — Fabric Login"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Common Service Parameters"
            abbrev: "fc.els.csp"
            bits: 128
            value: "BB_Credit=16, Recv_Size=2112"
            description: "Includes BB_Credit offered (16), max receive data field size (2112 bytes), E_D_TOV"
            spec_refs:
              - document: "FC-LS-4"
                section: "5.3.3"
                title: "Common Service Parameters"
                url: "https://www.t11.org/fcSite/fcretr.html"
            kernel_ref:
              file: "drivers/scsi/lpfc/lpfc_els.c"
              function: "lpfc_issue_els_flogi"
              notes: "Sets BB_Credit, data field size, and feature bits in FLOGI payload"
          - name: "Port Name (WWPN)"
            abbrev: "fc.els.wwpn"
            bits: 64
            value: "21:00:00:0e:1e:aa:bb:cc"
            description: "World Wide Port Name — globally unique 64-bit identifier for this HBA port"
            spec_refs:
              - document: "FC-FS-5"
                section: "15.3"
                title: "Name_Identifier format"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Node Name (WWNN)"
            abbrev: "fc.els.wwnn"
            bits: 64
            value: "20:00:00:0e:1e:aa:bb:cc"
            description: "World Wide Node Name — identifies the physical node (may have multiple ports)"
          - name: "Class 3 Service Parameters"
            abbrev: "fc.els.class3"
            bits: 128
            value: "Class 3 supported"
            description: "Class 3 (connectionless, no confirmation) — the standard FC class for modern SANs"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 32GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS-FEC"
            description: "Reed-Solomon Forward Error Correction — mandatory for 32GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "32GFC (14.025 Gbps per lane)"
            description: "Physical signaling rate — 32GFC Gen 6 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm VCSEL multimode fiber (SFP28)"
            description: "Short-reach fiber optics — OM4 multimode, up to 100m"

  # ── FLOGI ACC ─────────────────────────────────────────────────
  - id: "flogi_acc"
    name: "FLOGI ACC (Fabric Login Accept)"
    description: >
      Fabric accepts login and assigns FCID 0x010100 to the host.
      The assigned FCID becomes the host's S_ID for all subsequent frames.
    from: "switch"
    to: "initiator"
    timestamp_ns: 5200000
    total_bytes: 148
    color: "#d97706"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.r_ctl"
            bits: 8
            value: "0x23"
            description: "Solicited Control — ELS response (ACC)"
          - name: "D_ID"
            abbrev: "fc.d_id"
            bits: 24
            value: "0x010100"
            description: "Newly assigned FCID for the host — this is the fabric's answer"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control — 0x00 for Class 3"
          - name: "S_ID"
            abbrev: "fc.s_id"
            bits: 24
            value: "0xFFFFFE"
            description: "Fabric Controller"
          - name: "TYPE"
            abbrev: "fc.type"
            bits: 8
            value: "0x01"
            description: "ELS"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x980000"
            description: "Exchange responder, last sequence, end sequence"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x00"
            description: "Sequence identifier within exchange"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0001"
            description: "Same OX_ID as the FLOGI request — correlates request and response"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0x0001"
            description: "Responder Exchange ID assigned by fabric"
          - name: "Parameter"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "FLOGI ACC Payload"
        abbrev: "fc.els.flogi_acc"
        layer: 2
        total_bytes: 116
        fields:
          - name: "LS_Command"
            abbrev: "fc.els.cmd"
            bits: 32
            value: "0x02000000"
            description: "0x02 = LS_ACC (Link Service Accept)"
          - name: "Common Service Parameters"
            abbrev: "fc.els.csp"
            bits: 128
            value: "BB_Credit=16, Recv_Size=2112"
            description: "Fabric's service parameters including BB_Credit grant"
          - name: "Switch WWPN"
            abbrev: "fc.els.wwpn"
            bits: 64
            value: "20:01:00:05:73:01:02:03"
            description: "Switch port's World Wide Port Name"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 32GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS-FEC"
            description: "Reed-Solomon Forward Error Correction — mandatory for 32GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "32GFC (14.025 Gbps per lane)"
            description: "Physical signaling rate — 32GFC Gen 6 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm VCSEL multimode fiber (SFP28)"
            description: "Short-reach fiber optics — OM4 multimode, up to 100m"

  # ── PLOGI to Target ───────────────────────────────────────────
  - id: "plogi_target"
    name: "PLOGI to Target"
    description: >
      Host initiates Port Login with the NVMe storage target.
      PLOGI negotiates port-level parameters (BB_Credit, max frame size).
      In FC-NVMe, the host discovers the target's FCID via Name Server GID_FT
      with FC-4 type 0x28 (NVMe) — not 0x08 (FCP). For brevity, NS queries
      (PLOGI to NS, GID_FT) are elided; the host has discovered target at 0x010200.
      Linux: lpfc_els.c lpfc_issue_els_plogi()
    from: "initiator"
    to: "target"
    via: ["switch"]
    timestamp_ns: 7000000
    total_bytes: 148
    color: "#2563eb"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.r_ctl"
            bits: 8
            value: "0x22"
            description: "Unsolicited Control — ELS request"
          - name: "D_ID"
            abbrev: "fc.d_id"
            bits: 24
            value: "0x010200"
            description: "Storage array FCID discovered from Name Server (GID_FT with type 0x28)"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
