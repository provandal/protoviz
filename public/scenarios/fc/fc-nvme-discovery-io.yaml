    description: >
      Host sends an FC-NVMe LS (Link Service) request to create an NVMe association
      with the Discovery Controller. This is the FC-NVMe equivalent of the NVMe-oF
      Fabrics Connect command. The LS_REQ is sent as an FC-4 NVMe frame (TYPE=0x28)
      using the FC-NVMe LS request IU format.
      Linux: drivers/nvme/host/fc.c nvme_fc_create_association()
    from: "initiator"
    to: "target"
    via: ["switch"]
    timestamp_ns: 9000000
    total_bytes: 256
    color: "#0369a1"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
