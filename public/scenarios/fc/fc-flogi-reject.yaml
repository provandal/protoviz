            description: "64GFC physical layer"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm VCSEL multimode fiber (SFP56)"
            description: "Short-reach fiber"

# ─────────────────────────────────────────────────────────────────
# TIMELINE
# ─────────────────────────────────────────────────────────────────
timeline:

  # ── Phase 1: Physical Link Establishment ───────────────────────
  - id: "evt_phy_signal"
    type: "state_change"
    t_ns: 0
    annotation:
      text: "Signal detected — Host HBA ↔ FC Switch"
      detail: >
        Optical transceiver on host HBA detects light from FC switch port.
        FC link initialization begins. Physical link is point-to-point.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 0
            name: "FC-0 Physical"
            state_fields:
              phy_state: "initializing"
              signal_detect: true
      - actor_id: "switch"
        layers:
          - layer: 0
            name: "FC-0 Physical (per-port)"
            state_fields:
              port_phy: "initializing"

  - id: "evt_link_up"
    type: "state_change"
    t_ns: 2000000
    annotation:
      text: "Link UP — Host ↔ Switch at 64GFC"
      detail: >
        Speed negotiation complete: 64GFC (64.0 Gbps). 64b/66b encoding active.
        FC primitives can now be exchanged. BB_Credit flow control initialized.
        The host HBA driver will now attempt FLOGI to join the fabric.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 0
            name: "FC-0 Physical"
            state_fields:
              phy_state: "UP"
              speed: "64GFC"
          - layer: 1
            name: "FC-1 Encoding"
            state_fields:
              word_sync: true
      - actor_id: "switch"
        layers:
          - layer: 0
            name: "FC-0 Physical (per-port)"
            state_fields:
              port_phy: "UP"

  # ── Phase 2: FLOGI Attempt #1 — Zone Configuration Error ──────
  - id: "evt_flogi_1"
    type: "frame_tx"
    t_ns: 5000000
    frame_id: "flogi_request"
    annotation:
      text: "FLOGI — Host requests fabric login (S_ID=0x000000 → D_ID=0xFFFFFE)"
      detail: >
        The host has no FCID yet (S_ID=0x000000). It sends FLOGI to the well-known
        Fabric Controller address (0xFFFFFE). The FLOGI carries the host's WWPN
        (21:00:00:0e:1e:12:34:56), BB_Credit=16, and supported features.
        This is always the first ELS command after link up.
        Linux: lpfc_els.c lpfc_issue_els_flogi()
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              fabric_login: "FLOGI_SENT"
              active_exchanges: 1
              port_state: "FLOGI pending"
              flogi_retries: 1

  - id: "evt_ls_rjt_zone"
    type: "error"
    t_ns: 5200000
    frame_id: "ls_rjt_zone"
    annotation:
      text: "LS_RJT — FLOGI rejected: WWPN not in active zone set"
      detail: >
        The switch rejects FLOGI with reason_code=0x09 (Unable to perform command
        request), reason_code_explanation=0x0B (Insufficient fabric resources).
        ROOT CAUSE: The host's WWPN 21:00:00:0e:1e:12:34:56 is not a member of
        any zone in the active zone configuration 'prod_zone_cfg'. When hard zoning
        is enforced, a port whose WWPN is not zoned is denied fabric login entirely.
        FIX: Add the WWPN to the appropriate zone and re-activate the zone configuration.
        Example (Brocade): zoneAdd "zone_name", "21:00:00:0e:1e:12:34:56" ; cfgSave ; cfgEnable "prod_zone_cfg"
        Example (Cisco MDS): zone name zone_name vsan 1 ; member pwwn 21:00:00:0e:1e:12:34:56 ; zoneset activate name prod_zone_cfg vsan 1
        Linux log: lpfc_cmpl_els_flogi: FLOGI rejected — LS_RJT reason 0x09/0x0B
      spec_refs:
        - document: "FC-LS-4"
          section: "4.6"
          title: "LS_RJT — Link Service Reject"
          url: "https://www.t11.org/fcSite/fcretr.html"
        - document: "FC-SW-7"
          section: "6.1"
          title: "Zone enforcement during fabric login"
          url: "https://www.t11.org/fcSite/fcretr.html"
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              fabric_login: "REJECTED"
              active_exchanges: 0
              port_state: "offline"
              last_ls_rjt_reason: "0x09/0x0B — zone policy denial"
          - layer: 4
            name: "FC-4 Upper Layer Protocol"
            state_fields:
              scsi_state: "offline"
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Frame Forwarding / Fabric Services"
            state_fields:
              flogi_reject_reason: "WWPN not in active zone set"

  - id: "evt_zone_annotation"
    type: "annotation"
    t_ns: 6000000
    annotation:
      text: "Diagnosis: Zone configuration error"
      detail: >
        The port stays offline after LS_RJT. The HBA driver will retry FLOGI
        periodically, but retries will continue to fail until the zone configuration
        is corrected. Key diagnostic steps:
        1. Check switch zone configuration: 'zoneshow' (Brocade) or 'show zone active' (Cisco MDS)
        2. Verify the host WWPN appears in an active zone
        3. Ensure the zone configuration has been activated (not just saved)
        4. Check the host-side kernel log: dmesg | grep -i flogi
        5. On the switch, check: 'errdump' or 'show logging' for FLOGI reject events
        Without zoning, the host is completely invisible to the fabric and cannot
        access any storage resources.
      spec_refs:
        - document: "FC-SW-7"
          section: "6"
          title: "Zoning"
          url: "https://www.t11.org/fcSite/fcretr.html"

  # ── Phase 3: FLOGI Attempt #2 — Port Type Mismatch ────────────
  - id: "evt_flogi_2"
    type: "frame_tx"
    t_ns: 8000000
    frame_id: "flogi_retry_2"
    annotation:
      text: "FLOGI Retry #2 — Host retries after LS_RJT (OX_ID=0x0002)"
      detail: >
        The HBA driver retries FLOGI after a delay. The lpfc driver uses exponential
        backoff between retries. This retry demonstrates a different failure mode:
        the switch port has been reconfigured for zone access, but is now set to
        E-port mode (ISL) instead of F-port mode.
        Linux: lpfc_els_retry() schedules retry via lpfc_issue_els_flogi()
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              fabric_login: "FLOGI_SENT"
              active_exchanges: 1
              port_state: "FLOGI pending"
              flogi_retries: 2
              ox_id_next: "0x0003"

  - id: "evt_ls_rjt_port_type"
    type: "error"
    t_ns: 8200000
    frame_id: "ls_rjt_port_type"
    annotation:
      text: "LS_RJT — FLOGI rejected: E-port received N_Port FLOGI"
      detail: >
        The switch rejects FLOGI with reason_code=0x09 (Unable to perform command
        request), reason_code_explanation=0x03 (N_Port login not established).
        ROOT CAUSE: The switch port is configured as an E-port (ISL — Inter-Switch
        Link). E-ports expect ELP (Exchange Link Parameters) from another switch,
        not FLOGI from an N_Port. This mismatch occurs when:
        - A cable was moved from an ISL trunk to a host-facing port without changing port config
        - The port was manually locked to E-port mode
        - Auto-negotiation is disabled and the wrong mode was configured
        FIX: Reconfigure the switch port to F-port mode (or auto):
        Example (Brocade): portCfgDefault <port_number>  OR  switchPort --setPortType F <port_number>
        Example (Cisco MDS): interface fc1/1 ; switchport mode auto
        Linux log: lpfc_cmpl_els_flogi: FLOGI rejected — LS_RJT reason 0x09/0x03
      spec_refs:
        - document: "FC-SW-7"
          section: "7.3"
          title: "E_Port initialization"
          url: "https://www.t11.org/fcSite/fcretr.html"
        - document: "FC-FS-5"
          section: "7.4"
          title: "F_Port and N_Port login"
          url: "https://www.t11.org/fcSite/fcretr.html"
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              fabric_login: "REJECTED"
              active_exchanges: 0
              port_state: "offline"
              last_ls_rjt_reason: "0x09/0x03 — port type mismatch"
          - layer: 4
            name: "FC-4 Upper Layer Protocol"
            state_fields:
              scsi_state: "offline"
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Frame Forwarding / Fabric Services"
            state_fields:
              flogi_reject_reason: "E-port received N_Port FLOGI"
              port_type_config: "E-port (ISL locked)"

  - id: "evt_port_type_annotation"
    type: "annotation"
    t_ns: 9500000
    annotation:
      text: "Diagnosis: Port type mismatch (F-port vs E-port)"
      detail: >
        The switch port is in E-port mode, expecting inter-switch link (ISL)
        initialization. An N_Port FLOGI is invalid on an E-port. Diagnostic steps:
        1. Check switch port configuration: 'portShow <port>' (Brocade) or 'show interface fc1/x' (Cisco MDS)
        2. Look for port type: should show 'F-Port' or 'Auto' for host connections
        3. If it shows 'E-Port' or 'TE-Port', the port is configured for ISL
        4. Verify the physical cabling — was this port previously part of an ISL trunk?
        5. After reconfiguring to F-port/auto, the port will reset and the host can retry FLOGI
        Port type mismatch is easy to overlook during data center moves and cable changes.
      spec_refs:
        - document: "FC-SW-7"
          section: "7"
          title: "Port types and initialization"
          url: "https://www.t11.org/fcSite/fcretr.html"

  # ── Phase 4: FLOGI Attempt #3 — Duplicate WWPN ────────────────
  - id: "evt_flogi_3"
    type: "frame_tx"
    t_ns: 12000000
    frame_id: "flogi_retry_3"
    annotation:
      text: "FLOGI Retry #3 — Host retries after port type fix (OX_ID=0x0003)"
      detail: >
        The administrator has corrected the port type to F-port (auto). The host
        retries FLOGI. However, this attempt reveals a third failure: the host's
        WWPN is already registered in the fabric Name Server from another port,
        indicating a duplicate WWPN condition.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              fabric_login: "FLOGI_SENT"
              active_exchanges: 1
              port_state: "FLOGI pending"
              flogi_retries: 3
              ox_id_next: "0x0004"
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Frame Forwarding / Fabric Services"
            state_fields:
              port_type_config: "F-port (auto)"

  - id: "evt_ls_rjt_dup_wwpn"
    type: "error"
    t_ns: 12200000
    frame_id: "ls_rjt_dup_wwpn"
    annotation:
      text: "LS_RJT — FLOGI rejected: Duplicate WWPN detected in fabric"
      detail: >
        The switch rejects FLOGI with reason_code=0x09 (Unable to perform command
        request), reason_code_explanation=0x1F (Duplicate port name).
        ROOT CAUSE: The WWPN 21:00:00:0e:1e:12:34:56 is already registered in
        the fabric's Name Server database. Another port in the fabric is using the
        same WWPN. This can happen due to:
        - NPIV virtual port misconfiguration (same WWPN assigned to multiple VMs)
        - VM cloning that copied the virtual HBA's WWPN
        - A stale login from a previous host that was not properly logged out (LOGO)
        - Split-brain during HBA failover where old and new paths are both active
        FIX: Identify the conflicting port using Name Server queries or switch tools:
        Example (Brocade): nsShow — find which port holds the duplicate WWPN
        Example (Cisco MDS): show fcns database — search for the WWPN
        Then either: (a) force-logout the stale entry, (b) assign a unique WWPN to
        each port, or (c) resolve the NPIV/VM configuration conflict.
        Linux log: lpfc_cmpl_els_flogi: FLOGI rejected — LS_RJT reason 0x09/0x1F
      spec_refs:
        - document: "FC-LS-4"
          section: "4.6.3"
          title: "LS_RJT Reason Code Explanations"
          url: "https://www.t11.org/fcSite/fcretr.html"
        - document: "FC-SW-7"
          section: "7.7"
          title: "Duplicate WWPN detection"
          url: "https://www.t11.org/fcSite/fcretr.html"
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 2
            name: "FC-2 Framing / Signaling"
            state_fields:
              fabric_login: "REJECTED"
              active_exchanges: 0
              port_state: "offline"
              last_ls_rjt_reason: "0x09/0x1F — duplicate WWPN"
          - layer: 4
            name: "FC-4 Upper Layer Protocol"
            state_fields:
              scsi_state: "offline"
      - actor_id: "switch"
        layers:
          - layer: 2
            name: "FC-2 Frame Forwarding / Fabric Services"
            state_fields:
              flogi_reject_reason: "Duplicate WWPN in fabric"
              wwpn_database_conflict: true

  - id: "evt_dup_wwpn_annotation"
    type: "annotation"
    t_ns: 13500000
    annotation:
      text: "Diagnosis: Duplicate WWPN in fabric"
      detail: >
        A duplicate WWPN is a serious fabric integrity issue. Each WWPN must be
        globally unique — if two ports present the same WWPN, the fabric cannot
        correctly route frames or enforce zoning. Diagnostic steps:
        1. Query the Name Server: 'nsShow' (Brocade) or 'show fcns database' (Cisco MDS)
        2. Find which port currently holds the WWPN 21:00:00:0e:1e:12:34:56
        3. If the existing registration is stale, force it out: 'portLogout <port>' or LOGO
        4. If this is a VM/NPIV issue, ensure each virtual port has a unique WWPN
        5. Check for VM cloning events — cloned VMs inherit parent WWPN by default
        6. For multipath configurations, verify that both paths use distinct WWPNs
        Until the duplicate is resolved, this port cannot join the fabric and will
        remain in offline state with no access to storage.
      spec_refs:
        - document: "FC-FS-5"
          section: "15.3"
          title: "Name_Identifier uniqueness requirements"
          url: "https://www.t11.org/fcSite/fcretr.html"

  # ── Final State: Port remains offline ──────────────────────────
  - id: "evt_final_state"
    type: "annotation"
    t_ns: 15000000
    annotation:
      text: "Final state: Port offline — all three FLOGI attempts rejected"
      detail: >
        After three failed FLOGI attempts with different root causes, the host port
        remains in offline state. The FC port state machine never advanced beyond the
        initial login phase. Consequences:
        - No FCID assigned — the host has no identity in the fabric
        - No Name Server queries possible — cannot discover targets
        - No PLOGI/PRLI possible — cannot establish sessions with storage
        - No SCSI I/O possible — storage is completely inaccessible
        - The HBA driver will continue retrying FLOGI periodically (default: every ~2s)
        - dmesg will show repeated 'FLOGI failure' messages
        The host will remain in this state until all configuration issues are resolved.
        In production, a single FLOGI reject can cause a host outage if it is the
        only path to storage — underscoring the importance of multipath configurations.
      spec_refs:
        - document: "FC-FS-5"
          section: "7"
          title: "FC Port State Machine"
          url: "https://www.t11.org/fcSite/fcretr.html"

# ─────────────────────────────────────────────────────────────────
# GLOSSARY
# ─────────────────────────────────────────────────────────────────
glossary:
  - term: "FLOGI"
    abbrev: "Fabric Login"
    definition: "The first ELS command sent by an N_Port after physical link up. Sent to the well-known Fabric Controller address 0xFFFFFE. The fabric responds with either LS_ACC (assigning an FCID) or LS_RJT (rejecting login). A failed FLOGI means the port cannot participate in the fabric."
    spec_refs:
      - document: "FC-LS-4"
        section: "5.3"
        title: "Fabric Login (FLOGI)"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "LS_RJT"
    abbrev: "Link Service Reject"
    definition: "A generic ELS response indicating that the requested Link Service was rejected. Contains a reason_code (1 byte), reason_code_explanation (1 byte), and vendor_specific (1 byte) field. For FLOGI, common reason codes include zone policy denial, port type mismatch, and duplicate WWPN."
    spec_refs:
      - document: "FC-LS-4"
        section: "4.6"
        title: "LS_RJT — Link Service Reject"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "WWPN"
    abbrev: "World Wide Port Name"
    definition: "A globally unique 64-bit identifier assigned to each FC port. Analogous to a MAC address in Ethernet but assigned by the manufacturer using an IEEE OUI prefix. Used for zoning, persistent binding, and fabric Name Server registration. Must be unique across the entire fabric."
    spec_refs:
      - document: "FC-FS-5"
        section: "15.3"
        title: "Name_Identifier format"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "Zone"
    definition: "A logical grouping of FC ports (by WWPN or FCID) that controls which ports can communicate. Zoning enforces access control in the fabric — ports not in the same zone cannot see each other. Hard zoning (enforced at the switch ASIC level) can prevent FLOGI if the WWPN is not in any zone."
    spec_refs:
      - document: "FC-SW-7"
        section: "6"
        title: "Zoning"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "F-port"
    abbrev: "Fabric Port"
    definition: "A switch port that connects to an N_Port (host or storage HBA). F-ports accept FLOGI from N_Ports and assign FCIDs. If a switch port is not configured as an F-port (or auto-sensing), it will reject N_Port FLOGI requests."
    spec_refs:
      - document: "FC-SW-7"
        section: "3.2"
        title: "Port types"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "E-port"
    abbrev: "Expansion Port"
    definition: "A switch port that connects to another FC switch to form an Inter-Switch Link (ISL). E-ports use ELP (Exchange Link Parameters) for initialization, not FLOGI. Connecting an HBA to an E-port results in FLOGI rejection."
    spec_refs:
      - document: "FC-SW-7"
        section: "3.3"
        title: "E_Port"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "FCID"
    abbrev: "N_Port ID"
    definition: "A 24-bit address assigned by the fabric to an N_Port during FLOGI. Used as S_ID and D_ID in FC frame headers for routing. Format is domain:area:port (e.g., 0x010100). Without a successful FLOGI, the port has no FCID (0x000000) and cannot send or receive routed frames."
    spec_refs:
      - document: "FC-FS-5"
        section: "15.1"
        title: "Address Identifier"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "BB_Credit"
    abbrev: "Buffer-to-Buffer Credit"
    definition: "Flow control mechanism in FC. Each port advertises how many frames it can buffer. The sender decrements credit for each frame sent and replenishes when R_RDY primitives are received. BB_Credit is exchanged during FLOGI but not activated if FLOGI is rejected."
    spec_refs:
      - document: "FC-FS-5"
        section: "17.2"
        title: "Buffer-to-buffer flow control"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "ELS"
    abbrev: "Extended Link Service"
    definition: "FC frame type 0x01 used for login, logout, and other link-level operations. FLOGI, PLOGI, PRLI, LS_ACC, and LS_RJT are all ELS frames. ELS frames use R_CTL=0x22 (request) or R_CTL=0x23 (response)."
    spec_refs:
      - document: "FC-LS-4"
        section: "4"
        title: "Extended Link Service overview"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "NPIV"
    abbrev: "N_Port ID Virtualization"
    definition: "A Fibre Channel feature that allows a single physical HBA port to register multiple virtual WWPNs and FCIDs with the fabric. Used by hypervisors to give each VM its own FC identity. Misconfigured NPIV can cause duplicate WWPN conflicts."
    spec_refs:
      - document: "FC-LS-4"
        section: "5.3.1"
        title: "FDISC — Discover F_Port Service Parameters (NPIV)"
        url: "https://www.t11.org/fcSite/fcretr.html"

  - term: "ISL"
    abbrev: "Inter-Switch Link"
    definition: "A physical link between two FC switches that carries fabric traffic. ISL ports (E-ports) use ELP for initialization and cannot accept N_Port FLOGI. ISL trunking groups multiple ISLs for bandwidth aggregation."
    spec_refs:
      - document: "FC-SW-7"
        section: "8"
        title: "Inter-Switch Link initialization"
        url: "https://www.t11.org/fcSite/fcretr.html"
