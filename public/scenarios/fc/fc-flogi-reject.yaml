meta:
  id: "fc-flogi-reject"
  title: "FC FLOGI Reject: When Fabric Login Fails"
  protocol: "Fibre Channel"
  protocol_family: "SAN"
  version: "1.0.0"
  description: >
    Demonstrates three common failure modes during Fibre Channel Fabric Login (FLOGI).
    The host HBA sends a FLOGI request to the FC switch, which responds with LS_RJT
    (Link Service Reject) instead of the expected LS_ACC. Each failure is annotated with
    root cause analysis and remediation steps: (1) zoning misconfiguration where the HBA
    WWPN is not in the active zone set, (2) port type mismatch where an F-port receives
    an E-port ISL initialization, and (3) duplicate WWPN detected in the fabric.
    Understanding these failures is critical for SAN troubleshooting because a failed
    FLOGI means the host cannot obtain an FCID and is completely isolated from the fabric.

  learning_objectives:
    - "Understand the FLOGI exchange and why it must succeed before any other FC communication"
    - "Recognize the LS_RJT frame format including reason_code and reason_code_explanation fields"
    - "Diagnose zone configuration errors that prevent fabric login"
    - "Identify port type mismatch failures (F-port vs E-port) and how to correct switch port configuration"
    - "Understand duplicate WWPN detection and its implications for fabric integrity"
    - "Learn the FC port state machine transitions when FLOGI fails (the port remains offline)"
    - "Map LS_RJT reason codes to actionable troubleshooting steps"

  difficulty: "advanced"

  authors:
    - name: "Erik Smith"
      org: "Dell Technologies"
    - name: "Claude"
      org: "Anthropic"

  created: "2026-03-30"
  updated: "2026-03-30"

  tags:
    - "Fibre Channel"
    - "FC"
    - "SAN"
    - "FLOGI"
    - "LS_RJT"
    - "error"
    - "troubleshooting"
    - "zoning"
    - "64GFC"
    - "education"

  primary_specs:
    - document: "FC-LS-4"
      section: "5.3"
      title: "Fabric Login (FLOGI)"
      url: "https://www.t11.org/fcSite/fcretr.html"
    - document: "FC-LS-4"
      section: "4.6"
      title: "LS_RJT — Link Service Reject"
      url: "https://www.t11.org/fcSite/fcretr.html"
    - document: "FC-FS-5"
      section: "7"
      title: "Port State Machine"
      url: "https://www.t11.org/fcSite/fcretr.html"
    - document: "FC-SW-7"
      section: "7"
      title: "Switch fabric login processing"
      url: "https://www.t11.org/fcSite/fcretr.html"

  source_references:
    - repo: "torvalds/linux"
      path: "drivers/scsi/lpfc/lpfc_els.c"
      description: "Emulex/Broadcom lpfc — FLOGI issue and completion handling, LS_RJT processing"
    - repo: "torvalds/linux"
      path: "drivers/scsi/qla2xxx/qla_init.c"
      description: "QLogic/Marvell qla2xxx — fabric login state machine, error recovery"
    - repo: "torvalds/linux"
      path: "drivers/scsi/lpfc/lpfc_hw4.h"
      description: "lpfc — FC frame header definitions, ELS command codes, LS_RJT reason codes"

  content_disclaimer: >
    Protocol descriptions in this scenario are based on open-source implementations
    (Linux kernel, open-fc) and publicly available T11/INCITS standards summaries.
    No proprietary specification text has been reproduced. Spec references are
    provided as citations for further reading.

# ─────────────────────────────────────────────────────────────────
# TOPOLOGY
# ─────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: "initiator"
      type: "initiator"
      label: "Host (Initiator HBA)"
      description: "FC initiator — Linux host with dual-port 64GFC HBA running lpfc or qla2xxx driver"
      hardware: "64GFC dual-port HBA"
      os: "Linux 6.x"
      kernel_version: "6.8"
      position: "left"

    - id: "switch"
      type: "switch"
      label: "FC Switch"
      description: "64GFC FC switch with embedded Name Server, zoning, and FCID assignment"
      hardware: "64GFC FC switch"
      position: "right"

  links:
    - id: "link-host-sw"
      from: "initiator"
      to: "switch"
      speed_gbps: 64
      media: "fiber_sr"
      fec: "RS-FEC"

# ─────────────────────────────────────────────────────────────────
# LAYER DEFINITIONS (per actor)
# FC uses FC-0 through FC-4 rather than the OSI model.
# ─────────────────────────────────────────────────────────────────
osi_layers:
  initiator:
    - layer: 4
      name: "FC-4 Upper Layer Protocol"
      components: ["FCP-4", "lpfc_scsi.c", "SCSI sd_mod"]
      state_schema:
        scsi_state:
          type: "string"
          description: "SCSI host adapter state"
          initial: "offline"

    - layer: 2
      name: "FC-2 Framing / Signaling"
      components: ["lpfc_sli.c", "lpfc_els.c", "lpfc_hw.h", "FC-LS"]
      state_schema:
        my_fcid:
          type: "string"
          description: "Assigned N_Port ID (FCID) — set by fabric during FLOGI"
          initial: "0x000000"
        bb_credit:
          type: "integer"
          description: "Buffer-to-buffer credit (frames we can send before ACK)"
          initial: 0
        ox_id_next:
          type: "string"
          description: "Next originator exchange ID to allocate"
          initial: "0x0001"
        active_exchanges:
          type: "integer"
          description: "Number of active exchanges"
          initial: 0
        fabric_login:
          type: "string"
          description: "Fabric login state (FLOGI)"
          initial: "none"
        port_state:
          type: "string"
          description: "FC port state machine state"
          initial: "offline"
        flogi_retries:
          type: "integer"
          description: "Number of FLOGI attempts made"
          initial: 0
        last_ls_rjt_reason:
          type: "string"
          description: "Reason code from most recent LS_RJT"
          initial: "none"

    - layer: 1
      name: "FC-1 Encoding"
      components: ["64b/66b encoding", "word sync"]
      state_schema:
        encoding:
          type: "string"
          initial: "64b/66b"
        word_sync:
          type: "boolean"
          initial: false

    - layer: 0
      name: "FC-0 Physical"
      components: ["64GFC SFP56", "850nm VCSEL"]
      state_schema:
        phy_state:
          type: "string"
          description: "Physical port state (point-to-point link to switch)"
          initial: "down"
        speed:
          type: "string"
          initial: "unknown"
        signal_detect:
          type: "boolean"
          initial: false

  switch:
    - layer: 2
      name: "FC-2 Frame Forwarding / Fabric Services"
      components: ["D_ID routing", "BB_Credit management", "Name Server", "FCID assignment", "Zone enforcement"]
      state_schema:
        zone_active:
          type: "string"
          description: "Active zone set name"
          initial: "prod_zone_cfg"
        fcid_pool_next:
          type: "string"
          description: "Next FCID to assign"
          initial: "0x010100"
        fwd_table_entries:
          type: "integer"
          description: "FCIDs in routing table"
          initial: 1
        port_type_config:
          type: "string"
          description: "Configured port type for host-facing port"
          initial: "F-port (auto)"
        flogi_reject_reason:
          type: "string"
          description: "Reason the switch rejected the last FLOGI"
          initial: "none"
        wwpn_database_conflict:
          type: "boolean"
          description: "Whether a duplicate WWPN was detected"
          initial: false
        port_bb_credit:
          type: "integer"
          description: "BB_Credit available toward host"
          initial: 16

    - layer: 0
      name: "FC-0 Physical (per-port)"
      components: ["64GFC SFP56"]
      state_schema:
        port_phy:
          type: "string"
          description: "Physical state of port facing host"
          initial: "down"

# ─────────────────────────────────────────────────────────────────
# FRAME LIBRARY
# ─────────────────────────────────────────────────────────────────
frames:

  # ── FLOGI Request (same for all three failure scenarios) ───────
  - id: "flogi_request"
    name: "FLOGI (Fabric Login)"
    description: >
      Host sends Fabric Login to well-known address 0xFFFFFE (Fabric Controller).
      S_ID is 0x000000 because the host has no FCID yet.
      This is the first ELS command after physical link up — the host is asking
      the fabric to admit it and assign an N_Port ID.
      Linux: lpfc_els.c lpfc_issue_els_flogi()
    from: "initiator"
    to: "switch"
    timestamp_ns: 5000000
    total_bytes: 148
    color: "#d97706"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.r_ctl"
            bits: 8
            value: "0x22"
            description: "Unsolicited Control — ELS request frame"
            spec_refs:
              - document: "FC-FS-5"
                section: "9.3"
                title: "R_CTL field encoding"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "D_ID"
            abbrev: "fc.d_id"
            bits: 24
            value: "0xFFFFFE"
            description: "Well-known address for Fabric Controller. FLOGI always goes here."
            spec_refs:
              - document: "FC-FS-5"
                section: "15.2"
                title: "Well-known address identifiers"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
            value: "0x00"
            description: "Class-specific control"
          - name: "S_ID"
            abbrev: "fc.s_id"
            bits: 24
            value: "0x000000"
            description: "Source ID is 0x000000 — host has no FCID assigned yet"
          - name: "TYPE"
            abbrev: "fc.type"
            bits: 8
            value: "0x01"
            description: "0x01 = Extended Link Service (ELS)"
            spec_refs:
              - document: "FC-FS-5"
                section: "9.7"
                title: "TYPE field — protocol type identifier"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x290000"
            description: "Exchange originator, first+last sequence, sequence initiative"
            spec_refs:
              - document: "FC-FS-5"
                section: "9.5"
                title: "F_CTL — Frame Control"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x00"
            description: "Sequence identifier within exchange"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
            description: "Sequence count — first frame in sequence"
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0001"
            description: "Originator Exchange ID — tracks this FLOGI exchange"
            spec_refs:
              - document: "FC-FS-5"
                section: "9.10"
                title: "OX_ID and RX_ID — Exchange identification"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID — 0xFFFF means unassigned (fabric will assign)"
          - name: "Parameter"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for ELS frames"
      - name: "FLOGI Payload (ELS)"
        abbrev: "fc.els.flogi"
        layer: 2
        total_bytes: 116
        fields:
          - name: "LS_Command"
            abbrev: "fc.els.cmd"
            bits: 32
            value: "0x04000000"
            description: "0x04 = FLOGI command code"
            spec_refs:
              - document: "FC-LS-4"
                section: "5.3"
                title: "FLOGI — Fabric Login"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Common Service Parameters"
            abbrev: "fc.els.csp"
            bits: 128
            value: "BB_Credit=16, Recv_Size=2112"
            description: "Includes BB_Credit offered (16), max receive data field size (2112 bytes), E_D_TOV"
            spec_refs:
              - document: "FC-LS-4"
                section: "5.3.3"
                title: "Common Service Parameters"
                url: "https://www.t11.org/fcSite/fcretr.html"
            kernel_ref:
              file: "drivers/scsi/lpfc/lpfc_els.c"
              function: "lpfc_issue_els_flogi"
              notes: "Sets BB_Credit, data field size, and feature bits in FLOGI payload"
          - name: "Port Name (WWPN)"
            abbrev: "fc.els.wwpn"
            bits: 64
            value: "21:00:00:0e:1e:12:34:56"
            description: "World Wide Port Name — globally unique 64-bit identifier for this HBA port"
            spec_refs:
              - document: "FC-FS-5"
                section: "15.3"
                title: "Name_Identifier format"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Node Name (WWNN)"
            abbrev: "fc.els.wwnn"
            bits: 64
            value: "20:00:00:0e:1e:12:34:56"
            description: "World Wide Node Name — identifies the physical node (may have multiple ports)"
          - name: "Class 3 Service Parameters"
            abbrev: "fc.els.class3"
            bits: 128
            value: "Class 3 supported"
            description: "Class 3 (connectionless, no confirmation) — the standard FC class for modern SANs"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm VCSEL multimode fiber (SFP56)"
            description: "Short-reach fiber optics — OM4 multimode, up to 100m"

  # ── LS_RJT: Zone Configuration Error ──────────────────────────
  - id: "ls_rjt_zone"
    name: "LS_RJT (Zone Config — WWPN Not in Active Zone Set)"
    description: >
      Switch rejects FLOGI because the host's WWPN (21:00:00:0e:1e:12:34:56) is
      not a member of any zone in the active zone configuration. The switch enforces
      hard zoning at the port level — if a WWPN is not zoned, the port is denied
      fabric access entirely. This is the most common cause of FLOGI rejection in
      production environments.
      Reason: 0x09 (Unable to perform command request)
      Explanation: 0x0B (Insufficient fabric resources — zone policy denial)
    from: "switch"
    to: "initiator"
    timestamp_ns: 5200000
    total_bytes: 32
    color: "#dc2626"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.r_ctl"
            bits: 8
            value: "0x23"
            description: "Solicited Control — ELS response frame"
            spec_refs:
              - document: "FC-FS-5"
                section: "9.3"
                title: "R_CTL field encoding"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "D_ID"
            abbrev: "fc.d_id"
            bits: 24
            value: "0x000000"
            description: "Destination is the host — but host has no FCID, so D_ID remains 0x000000"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control"
          - name: "S_ID"
            abbrev: "fc.s_id"
            bits: 24
            value: "0xFFFFFE"
            description: "Fabric Controller well-known address"
          - name: "TYPE"
            abbrev: "fc.type"
            bits: 8
            value: "0x01"
            description: "ELS"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x980000"
            description: "Exchange responder, last sequence, end sequence"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x00"
            description: "Sequence identifier"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control — no optional headers"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
            description: "Sequence count"
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0001"
            description: "Same OX_ID as the FLOGI request — correlates reject to the original request"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0xFFFF"
            description: "Responder Exchange ID — 0xFFFF, exchange rejected before RX_ID assignment"
          - name: "Parameter"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset — 0 for this frame type"
      - name: "LS_RJT Payload"
        abbrev: "fc.els.ls_rjt"
        layer: 2
        total_bytes: 8
        fields:
          - name: "LS_Command"
            abbrev: "fc.els.cmd"
            bits: 32
            value: "0x01000000"
            description: "0x01 = LS_RJT (Link Service Reject)"
            spec_refs:
              - document: "FC-LS-4"
                section: "4.6"
                title: "LS_RJT — Link Service Reject"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Reserved"
            abbrev: "fc.els.ls_rjt.rsvd"
            bits: 8
            value: "0x00"
            description: "Reserved byte"
          - name: "Reason Code"
            abbrev: "fc.els.ls_rjt.reason"
            bits: 8
            value: "0x09"
            description: "0x09 = Unable to perform command request. The switch cannot process the FLOGI due to a policy or configuration constraint."
            spec_refs:
              - document: "FC-LS-4"
                section: "4.6.2"
                title: "LS_RJT Reason Codes"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Reason Code Explanation"
            abbrev: "fc.els.ls_rjt.reason_exp"
            bits: 8
            value: "0x0B"
            description: "0x0B = Insufficient fabric resources. In context of FLOGI, this typically means a zone policy denied access — the WWPN is not in any active zone."
            spec_refs:
              - document: "FC-LS-4"
                section: "4.6.3"
                title: "LS_RJT Reason Code Explanations"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Vendor Specific"
            abbrev: "fc.els.ls_rjt.vendor"
            bits: 8
            value: "0x00"
            description: "Vendor-specific code — 0x00 (no additional vendor detail). Some switch vendors encode proprietary diagnostic codes here."
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "Line encoding scheme — 64b/66b for 64GFC"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "Reed-Solomon Forward Error Correction — mandatory for 64GFC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "Physical signaling rate — 64GFC Gen 7 Fibre Channel"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm VCSEL multimode fiber (SFP56)"
            description: "Short-reach fiber optics — OM4 multimode, up to 100m"

  # ── FLOGI Retry (after zone reject) ───────────────────────────
  - id: "flogi_retry_2"
    name: "FLOGI Retry #2 (after zone reject)"
    description: >
      Host HBA driver retries FLOGI after receiving LS_RJT. The lpfc driver will
      retry up to 8 times with increasing delay. The retry will also fail because
      the zone configuration has not changed — this demonstrates the second failure
      mode: port type mismatch.
    from: "initiator"
    to: "switch"
    timestamp_ns: 8000000
    total_bytes: 148
    color: "#d97706"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.r_ctl"
            bits: 8
            value: "0x22"
            description: "Unsolicited Control — ELS request frame"
          - name: "D_ID"
            abbrev: "fc.d_id"
            bits: 24
            value: "0xFFFFFE"
            description: "Fabric Controller well-known address"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
            value: "0x00"
            description: "Class-specific control"
          - name: "S_ID"
            abbrev: "fc.s_id"
            bits: 24
            value: "0x000000"
            description: "Source still 0x000000 — host was never assigned an FCID"
          - name: "TYPE"
            abbrev: "fc.type"
            bits: 8
            value: "0x01"
            description: "ELS"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x290000"
            description: "Exchange originator, first+last sequence, sequence initiative"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x00"
            description: "Sequence identifier"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
            description: "Sequence count"
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0002"
            description: "New exchange for the retry — OX_ID incremented"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0xFFFF"
            description: "Unassigned"
          - name: "Parameter"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset"
      - name: "FLOGI Payload (ELS)"
        abbrev: "fc.els.flogi"
        layer: 2
        total_bytes: 116
        fields:
          - name: "LS_Command"
            abbrev: "fc.els.cmd"
            bits: 32
            value: "0x04000000"
            description: "0x04 = FLOGI command code"
          - name: "Common Service Parameters"
            abbrev: "fc.els.csp"
            bits: 128
            value: "BB_Credit=16, Recv_Size=2112"
            description: "Same service parameters — host configuration unchanged"
          - name: "Port Name (WWPN)"
            abbrev: "fc.els.wwpn"
            bits: 64
            value: "21:00:00:0e:1e:12:34:56"
            description: "Same WWPN — hardware identity does not change between retries"
          - name: "Node Name (WWNN)"
            abbrev: "fc.els.wwnn"
            bits: 64
            value: "20:00:00:0e:1e:12:34:56"
            description: "Same WWNN"
          - name: "Class 3 Service Parameters"
            abbrev: "fc.els.class3"
            bits: 128
            value: "Class 3 supported"
            description: "Class 3 parameters"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "64b/66b encoding"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "RS-FEC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "64GFC physical layer"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm VCSEL multimode fiber (SFP56)"
            description: "Short-reach fiber"

  # ── LS_RJT: Port Type Mismatch ────────────────────────────────
  - id: "ls_rjt_port_type"
    name: "LS_RJT (Port Type Mismatch — F-port vs E-port)"
    description: >
      Switch rejects FLOGI because the port is configured as an E-port (ISL) but
      received an N_Port FLOGI instead of ELP/ESC for inter-switch link initialization.
      This happens when a cable is moved from an ISL trunk port to a host-facing port
      without reconfiguring the port type, or when auto-negotiation fails to detect
      the correct port type.
      Reason: 0x09 (Unable to perform command request)
      Explanation: 0x03 (N_Port login not established — port type conflict)
    from: "switch"
    to: "initiator"
    timestamp_ns: 8200000
    total_bytes: 32
    color: "#dc2626"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.r_ctl"
            bits: 8
            value: "0x23"
            description: "Solicited Control — ELS response frame"
          - name: "D_ID"
            abbrev: "fc.d_id"
            bits: 24
            value: "0x000000"
            description: "Host has no FCID"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control"
          - name: "S_ID"
            abbrev: "fc.s_id"
            bits: 24
            value: "0xFFFFFE"
            description: "Fabric Controller"
          - name: "TYPE"
            abbrev: "fc.type"
            bits: 8
            value: "0x01"
            description: "ELS"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x980000"
            description: "Exchange responder, last sequence, end sequence"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x00"
            description: "Sequence identifier"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
            description: "Sequence count"
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0002"
            description: "Matches the retry FLOGI OX_ID"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0xFFFF"
            description: "Exchange rejected before RX_ID assignment"
          - name: "Parameter"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset"
      - name: "LS_RJT Payload"
        abbrev: "fc.els.ls_rjt"
        layer: 2
        total_bytes: 8
        fields:
          - name: "LS_Command"
            abbrev: "fc.els.cmd"
            bits: 32
            value: "0x01000000"
            description: "0x01 = LS_RJT (Link Service Reject)"
            spec_refs:
              - document: "FC-LS-4"
                section: "4.6"
                title: "LS_RJT — Link Service Reject"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Reserved"
            abbrev: "fc.els.ls_rjt.rsvd"
            bits: 8
            value: "0x00"
            description: "Reserved byte"
          - name: "Reason Code"
            abbrev: "fc.els.ls_rjt.reason"
            bits: 8
            value: "0x09"
            description: "0x09 = Unable to perform command request. The switch port cannot process FLOGI because it expects ISL traffic."
            spec_refs:
              - document: "FC-LS-4"
                section: "4.6.2"
                title: "LS_RJT Reason Codes"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Reason Code Explanation"
            abbrev: "fc.els.ls_rjt.reason_exp"
            bits: 8
            value: "0x03"
            description: "0x03 = N_Port login not established. The switch port is configured as E-port (ISL) and cannot accept an N_Port FLOGI. Port type must be reconfigured to F-port or auto."
            spec_refs:
              - document: "FC-LS-4"
                section: "4.6.3"
                title: "LS_RJT Reason Code Explanations"
                url: "https://www.t11.org/fcSite/fcretr.html"
              - document: "FC-SW-7"
                section: "7.3"
                title: "E_Port initialization"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Vendor Specific"
            abbrev: "fc.els.ls_rjt.vendor"
            bits: 8
            value: "0x45"
            description: "Vendor-specific code 0x45 — some switches use this to indicate 'E-port mode expected ISL'. Check switch-specific documentation for vendor code interpretation."
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "64b/66b encoding"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "RS-FEC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "64GFC physical layer"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm VCSEL multimode fiber (SFP56)"
            description: "Short-reach fiber"

  # ── FLOGI Retry #3 (third attempt) ────────────────────────────
  - id: "flogi_retry_3"
    name: "FLOGI Retry #3 (after port type reject)"
    description: >
      Host retries FLOGI again. This time the switch has been reconfigured to F-port
      mode, but now detects a duplicate WWPN already logged in elsewhere in the fabric.
    from: "initiator"
    to: "switch"
    timestamp_ns: 12000000
    total_bytes: 148
    color: "#d97706"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.r_ctl"
            bits: 8
            value: "0x22"
            description: "Unsolicited Control — ELS request frame"
          - name: "D_ID"
            abbrev: "fc.d_id"
            bits: 24
            value: "0xFFFFFE"
            description: "Fabric Controller well-known address"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
            value: "0x00"
            description: "Class-specific control"
          - name: "S_ID"
            abbrev: "fc.s_id"
            bits: 24
            value: "0x000000"
            description: "Still no FCID — all previous FLOGI attempts have failed"
          - name: "TYPE"
            abbrev: "fc.type"
            bits: 8
            value: "0x01"
            description: "ELS"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x290000"
            description: "Exchange originator, first+last sequence, sequence initiative"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x00"
            description: "Sequence identifier"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
            description: "Sequence count"
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0003"
            description: "Third exchange — OX_ID incremented again"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0xFFFF"
            description: "Unassigned"
          - name: "Parameter"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset"
      - name: "FLOGI Payload (ELS)"
        abbrev: "fc.els.flogi"
        layer: 2
        total_bytes: 116
        fields:
          - name: "LS_Command"
            abbrev: "fc.els.cmd"
            bits: 32
            value: "0x04000000"
            description: "0x04 = FLOGI command code"
          - name: "Common Service Parameters"
            abbrev: "fc.els.csp"
            bits: 128
            value: "BB_Credit=16, Recv_Size=2112"
            description: "Same service parameters"
          - name: "Port Name (WWPN)"
            abbrev: "fc.els.wwpn"
            bits: 64
            value: "21:00:00:0e:1e:12:34:56"
            description: "Same WWPN — this WWPN is already in use elsewhere in the fabric"
          - name: "Node Name (WWNN)"
            abbrev: "fc.els.wwnn"
            bits: 64
            value: "20:00:00:0e:1e:12:34:56"
            description: "Same WWNN"
          - name: "Class 3 Service Parameters"
            abbrev: "fc.els.class3"
            bits: 128
            value: "Class 3 supported"
            description: "Class 3 parameters"
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "64b/66b encoding"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
            description: "RS-FEC"
      - name: "FC-0 Physical"
        abbrev: "fc0"
        layer: 0
        fields:
          - name: "Line Rate"
            abbrev: "fc0.rate"
            bits: 0
            value: "64GFC (28.05 Gbps per lane)"
            description: "64GFC physical layer"
          - name: "Media"
            abbrev: "fc0.media"
            bits: 0
            value: "850nm VCSEL multimode fiber (SFP56)"
            description: "Short-reach fiber"

  # ── LS_RJT: Duplicate WWPN ────────────────────────────────────
  - id: "ls_rjt_dup_wwpn"
    name: "LS_RJT (Duplicate WWPN Detected)"
    description: >
      Switch rejects FLOGI because the WWPN presented by this host
      (21:00:00:0e:1e:12:34:56) is already logged in from another port in the
      fabric. This can happen due to: (a) NPIV misconfiguration where the same
      virtual WWPN is assigned to two hosts, (b) a cloned VM that inherited the
      parent's HBA WWPN, or (c) a split-brain scenario during HBA failover where
      the old path was not properly cleaned up.
      Reason: 0x09 (Unable to perform command request)
      Explanation: 0x1F (Duplicate port name — WWPN already registered)
    from: "switch"
    to: "initiator"
    timestamp_ns: 12200000
    total_bytes: 32
    color: "#dc2626"
    headers:
      - name: "FC Frame Header"
        abbrev: "fc"
        layer: 2
        total_bytes: 24
        fields:
          - name: "R_CTL"
            abbrev: "fc.r_ctl"
            bits: 8
            value: "0x23"
            description: "Solicited Control — ELS response frame"
          - name: "D_ID"
            abbrev: "fc.d_id"
            bits: 24
            value: "0x000000"
            description: "Host has no FCID"
          - name: "CS_CTL"
            abbrev: "fc.cs_ctl"
            bits: 8
            value: "0x00"
            description: "Class-Specific Control"
          - name: "S_ID"
            abbrev: "fc.s_id"
            bits: 24
            value: "0xFFFFFE"
            description: "Fabric Controller"
          - name: "TYPE"
            abbrev: "fc.type"
            bits: 8
            value: "0x01"
            description: "ELS"
          - name: "F_CTL"
            abbrev: "fc.f_ctl"
            bits: 24
            value: "0x980000"
            description: "Exchange responder, last sequence, end sequence"
          - name: "SEQ_ID"
            abbrev: "fc.seq_id"
            bits: 8
            value: "0x00"
            description: "Sequence identifier"
          - name: "DF_CTL"
            abbrev: "fc.df_ctl"
            bits: 8
            value: "0x00"
            description: "Data Field Control"
          - name: "SEQ_CNT"
            abbrev: "fc.seq_cnt"
            bits: 16
            value: 0
            description: "Sequence count"
          - name: "OX_ID"
            abbrev: "fc.ox_id"
            bits: 16
            value: "0x0003"
            description: "Matches the third FLOGI attempt"
          - name: "RX_ID"
            abbrev: "fc.rx_id"
            bits: 16
            value: "0xFFFF"
            description: "Exchange rejected before RX_ID assignment"
          - name: "Parameter"
            abbrev: "fc.parameter"
            bits: 32
            value: "0x00000000"
            description: "Relative offset"
      - name: "LS_RJT Payload"
        abbrev: "fc.els.ls_rjt"
        layer: 2
        total_bytes: 8
        fields:
          - name: "LS_Command"
            abbrev: "fc.els.cmd"
            bits: 32
            value: "0x01000000"
            description: "0x01 = LS_RJT (Link Service Reject)"
            spec_refs:
              - document: "FC-LS-4"
                section: "4.6"
                title: "LS_RJT — Link Service Reject"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Reserved"
            abbrev: "fc.els.ls_rjt.rsvd"
            bits: 8
            value: "0x00"
            description: "Reserved byte"
          - name: "Reason Code"
            abbrev: "fc.els.ls_rjt.reason"
            bits: 8
            value: "0x09"
            description: "0x09 = Unable to perform command request. The fabric cannot admit this port because its identity conflicts with an existing registration."
            spec_refs:
              - document: "FC-LS-4"
                section: "4.6.2"
                title: "LS_RJT Reason Codes"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Reason Code Explanation"
            abbrev: "fc.els.ls_rjt.reason_exp"
            bits: 8
            value: "0x1F"
            description: "0x1F = Duplicate port name (WWPN). The WWPN 21:00:00:0e:1e:12:34:56 is already registered in the Name Server from a different physical port. The fabric refuses to allow two ports with the same WWPN."
            spec_refs:
              - document: "FC-LS-4"
                section: "4.6.3"
                title: "LS_RJT Reason Code Explanations"
                url: "https://www.t11.org/fcSite/fcretr.html"
              - document: "FC-SW-7"
                section: "7.7"
                title: "Duplicate WWPN detection"
                url: "https://www.t11.org/fcSite/fcretr.html"
          - name: "Vendor Specific"
            abbrev: "fc.els.ls_rjt.vendor"
            bits: 8
            value: "0xDF"
            description: "Vendor-specific code 0xDF — may indicate the conflicting FCID or port index in vendor-specific logging. Consult switch event logs for the existing WWPN registration."
      - name: "FC-1 Encoding"
        abbrev: "fc1"
        layer: 1
        fields:
          - name: "Encoding"
            abbrev: "fc1.encoding"
            bits: 0
            value: "64b/66b"
            description: "64b/66b encoding"
          - name: "FEC"
            abbrev: "fc1.fec"
            bits: 0
            value: "RS(544,514)"
