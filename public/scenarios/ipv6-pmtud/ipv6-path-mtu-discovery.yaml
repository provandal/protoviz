meta:
  id: "ipv6-path-mtu-discovery"
  title: "IPv6 Path MTU Discovery: Why Routers Cannot Fragment"
  protocol: "IPv6"
  protocol_family: "TCP/IP"
  version: "1.0.0"
  description: >
    Path MTU Discovery (PMTUD) is mandatory in IPv6 because routers are
    forbidden from fragmenting packets — only the source host may fragment.
    This scenario contrasts the IPv4 approach (any router can fragment) with
    IPv6 PMTUD working correctly (ICMPv6 Packet Too Big informs the source),
    and then demonstrates the dreaded "PMTUD black hole" that occurs when
    an overly conservative ACL policy inadvertently drops ICMPv6. The topology features a bottleneck tunnel link
    with MTU 1280 (the minimum IPv6 link MTU per RFC 8200) between two
    routers, showing exactly why ICMPv6 type 2 must never be filtered.

  learning_objectives:
    - "Understand why IPv6 eliminated router fragmentation — a fundamental design change from IPv4"
    - "Trace the ICMPv6 Packet Too Big message flow and see how it triggers Path MTU cache updates"
    - "Observe the difference between IPv4 router fragmentation (DF=0) and IPv6 source-only fragmentation"
    - "See how the IPv6 Fragment extension header (Next Header 44) works when the source must fragment"
    - "Understand TCP MSS adjustment based on PMTUD results — most applications never see MTU issues"
    - "Recognize the PMTUD black hole problem caused by ACL policies that inadvertently drop ICMPv6"
    - "Know which ICMPv6 messages must never be filtered (RFC 4890)"
    - "Identify tunnels (6in4, GRE, IPsec) as the most common cause of reduced MTU on IPv6 paths"

  difficulty: "intermediate"

  authors:
    - name: "ProtoViz Community"
      org: "proto-viz"
      github: "proto-viz"

  created: "2026-03-19"
  updated: "2026-03-19"

  tags:
    - "IPv6"
    - "PMTUD"
    - "Path MTU Discovery"
    - "ICMPv6"
    - "fragmentation"
    - "Packet Too Big"
    - "black hole"
    - "MTU"
    - "intermediate"
    - "education"
    - "WIP"

  primary_specs:
    - document: "RFC 8201"
      section: "3"
      title: "Path MTU Discovery for IPv6"
      url: "https://datatracker.ietf.org/doc/html/rfc8201#section-3"
      alt_url: "https://www.rfc-editor.org/rfc/rfc8201"
    - document: "RFC 8200"
      section: "5"
      title: "IPv6 — Packet Size Issues"
      url: "https://datatracker.ietf.org/doc/html/rfc8200#section-5"
      alt_url: "https://www.rfc-editor.org/rfc/rfc8200"
    - document: "RFC 4443"
      section: "3.2"
      title: "ICMPv6 — Packet Too Big Message"
      url: "https://datatracker.ietf.org/doc/html/rfc4443#section-3.2"
      alt_url: ""
    - document: "RFC 4890"
      section: "4.3.1"
      title: "Recommendations for Filtering ICMPv6 Messages in Firewalls"
      url: "https://datatracker.ietf.org/doc/html/rfc4890#section-4.3.1"
      alt_url: ""
    - document: "RFC 791"
      section: "3.1"
      title: "IPv4 — Fragmentation and Reassembly"
      url: "https://datatracker.ietf.org/doc/html/rfc791#section-3.1"
      alt_url: ""

  content_disclaimer: >
    Protocol descriptions in this scenario are based on public RFCs and
    open-source implementations (Linux kernel, Wireshark dissectors). No
    proprietary specification text has been reproduced. RFC references are
    provided as citations for further reading.

  source_references:
    - repo: "torvalds/linux"
      path: "net/ipv6/ip6_output.c"
      description: "IPv6 packet output — fragmentation at the source, PMTUD checks"
    - repo: "torvalds/linux"
      path: "net/ipv6/icmp.c"
      description: "ICMPv6 message generation and processing — Packet Too Big handling"
    - repo: "torvalds/linux"
      path: "net/ipv6/route.c"
      description: "IPv6 routing and Path MTU cache (dst_entry PMTU storage)"
    - repo: "torvalds/linux"
      path: "net/ipv4/ip_output.c"
      description: "IPv4 packet output — router fragmentation for contrast"

# ─────────────────────────────────────────────────────────────────
# TOPOLOGY
# ─────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: "host_a"
      type: "host"
      label: "Host A"
      description: "Source host — sends packets and runs PMTUD"
      hardware: "Generic 1GbE NIC"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "2001:db8:a::1"
      ipv4: "192.0.2.1"
      mac: "00:11:22:33:44:01"
      position: "far-left"

    - id: "router1"
      type: "router"
      label: "Router 1"
      description: "First-hop router — MTU 1500 on Host A side, MTU 1280 on tunnel side"
      hardware: "Generic router"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip_left: "2001:db8:a::ff"
      ip_right: "2001:db8:t::1"
      ipv4_left: "192.0.2.254"
      ipv4_right: "198.51.100.1"
      mac_left: "00:aa:bb:cc:dd:01"
      mac_right: "00:aa:bb:cc:dd:02"
      mtu_left: 1500
      mtu_right: 1280
      position: "center-left"

    - id: "router2"
      type: "router"
      label: "Router 2"
      description: "Second-hop router — MTU 1280 on tunnel side, MTU 1500 on Host B side"
      hardware: "Generic router"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip_left: "2001:db8:t::2"
      ip_right: "2001:db8:b::ff"
      ipv4_left: "198.51.100.2"
      ipv4_right: "203.0.113.254"
      mac_left: "00:aa:bb:cc:dd:03"
      mac_right: "00:aa:bb:cc:dd:04"
      mtu_left: 1280
      mtu_right: 1500
      position: "center-right"

    - id: "host_b"
      type: "host"
      label: "Host B"
      description: "Destination host — receives packets and reassembles fragments"
      hardware: "Generic 1GbE NIC"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "2001:db8:b::1"
      ipv4: "203.0.113.1"
      mac: "00:11:22:33:44:02"
      position: "far-right"

  links:
    - id: "link-a-r1"
      from: "host_a"
      to: "router1"
      speed_gbps: 1
      media: "copper"
      mtu: 1500
      description: "Standard Ethernet — MTU 1500"
    - id: "link-r1-r2"
      from: "router1"
      to: "router2"
      speed_gbps: 1
      media: "tunnel"
      mtu: 1280
      description: "Tunnel link (e.g., GRE/IPsec) — MTU reduced to 1280 by encapsulation overhead"
    - id: "link-r2-b"
      from: "router2"
      to: "host_b"
      speed_gbps: 1
      media: "copper"
      mtu: 1500
      description: "Standard Ethernet — MTU 1500"

# ─────────────────────────────────────────────────────────────────
# OSI LAYER DEFINITIONS (per actor)
# ─────────────────────────────────────────────────────────────────
osi_layers:
  host_a:
    - layer: 4
      name: "TCP"
      components: ["net/ipv4/tcp.c", "net/ipv4/tcp_output.c"]
      state_schema:
        tcp_mss:
          type: "integer"
          description: "TCP Maximum Segment Size, adjusted by PMTUD"
          initial: 1440
        tcp_state:
          type: "string"
          description: "TCP connection state"
          initial: "ESTABLISHED"

    - layer: 3
      name: "IPv6 / IPv4"
      components: ["net/ipv6/ip6_output.c", "net/ipv4/ip_output.c", "net/ipv6/route.c"]
      state_schema:
        src_ip:
          type: "string"
          description: "Source IP address"
          initial: "2001:db8:a::1"
        dst_ip:
          type: "string"
          description: "Destination IP address"
          initial: "2001:db8:b::1"
        path_mtu:
          type: "integer"
          description: "Cached Path MTU for destination (starts at link MTU)"
          initial: 1500
        hop_limit:
          type: "integer"
          description: "IPv6 Hop Limit / IPv4 TTL"
          initial: 64
        pmtu_state:
          type: "string"
          description: "PMTUD state machine"
          initial: "initial"

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver", "IEEE 802.3"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        mac_addr:
          type: "string"
          initial: "00:11:22:33:44:01"

  router1:
    - layer: 3
      name: "IPv6 / IPv4 Forwarding"
      components: ["net/ipv6/ip6_output.c", "net/ipv4/ip_forward.c"]
      state_schema:
        forwarding:
          type: "string"
          description: "Forwarding state"
          initial: "enabled"
        mtu_left:
          type: "integer"
          description: "MTU on Host A-facing interface"
          initial: 1500
        mtu_right:
          type: "integer"
          description: "MTU on tunnel-facing interface"
          initial: 1280
        action:
          type: "string"
          description: "Current forwarding action"
          initial: "idle"

  router2:
    - layer: 3
      name: "IPv6 / IPv4 Forwarding"
      components: ["net/ipv6/ip6_output.c", "net/ipv4/ip_forward.c"]
      state_schema:
        forwarding:
          type: "string"
          description: "Forwarding state"
          initial: "enabled"
        mtu_left:
          type: "integer"
          description: "MTU on tunnel-facing interface"
          initial: 1280
        mtu_right:
          type: "integer"
          description: "MTU on Host B-facing interface"
          initial: 1500
        action:
          type: "string"
          description: "Current forwarding action"
          initial: "idle"

  host_b:
    - layer: 4
      name: "TCP"
      components: ["net/ipv4/tcp.c", "net/ipv4/tcp_input.c"]
      state_schema:
        tcp_mss:
          type: "integer"
          description: "TCP Maximum Segment Size"
          initial: 1440
        tcp_state:
          type: "string"
          description: "TCP connection state"
          initial: "ESTABLISHED"

    - layer: 3
      name: "IPv6 / IPv4"
      components: ["net/ipv6/ip6_input.c", "net/ipv4/ip_input.c"]
      state_schema:
        src_ip:
          type: "string"
          description: "Source IP address"
          initial: "2001:db8:b::1"
        dst_ip:
          type: "string"
          description: "Destination IP address"
          initial: "2001:db8:a::1"
        reassembly:
          type: "string"
          description: "Fragment reassembly state"
          initial: "idle"

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver", "IEEE 802.3"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        mac_addr:
          type: "string"
          initial: "00:11:22:33:44:02"

# ─────────────────────────────────────────────────────────────────
# FRAMES
# ─────────────────────────────────────────────────────────────────
frames:
  # ══════════════════════════════════════════════════════════════════
  # Part 1 — IPv4 Approach (Router Fragmentation, for contrast)
  # ══════════════════════════════════════════════════════════════════

  - id: "ipv4_packet_1500"
    name: "IPv4 Packet (1500 B, DF=0)"
    description: "Host A sends a 1500-byte IPv4 packet with fragmentation allowed"
    from: "host_a"
    to: "host_b"
    via: ["router1"]
    timestamp_ns: 100000000
    total_bytes: 1500
    color: "#6366f1"
    headers:
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Version"
            abbrev: "ip.version"
            bits: 4
            value: 4
            description: "IPv4"
          - name: "Header Length"
            abbrev: "ip.hdr_len"
            bits: 4
            value: 5
            description: "5 x 4 = 20 bytes (no IP options)"
          - name: "Total Length"
            abbrev: "ip.len"
            bits: 16
            value: 1500
            description: "Full 1500-byte packet — uses the entire link MTU"
          - name: "Identification"
            abbrev: "ip.id"
            bits: 16
            value: "0x1a2b"
            value_hex: "0x1a2b"
            description: "Unique ID for this datagram — used to reassemble fragments at the destination"
            spec_refs:
              - document: "RFC 791"
                section: "3.1"
                title: "Internet Header Format — Identification"
                url: "https://datatracker.ietf.org/doc/html/rfc791#section-3.1"
          - name: "Flags"
            abbrev: "ip.flags"
            bits: 3
            value: "0x0"
            description: "DF=0 (Don't Fragment NOT set) — any router may fragment this packet"
            spec_refs:
              - document: "RFC 791"
                section: "3.1"
                title: "Internet Header Format — Flags"
                url: "https://datatracker.ietf.org/doc/html/rfc791#section-3.1"
            fields:
              - name: "Don't Fragment"
                abbrev: "ip.flags.df"
                bits: 1
                value: 0
                description: "DF=0 — fragmentation is permitted"
              - name: "More Fragments"
                abbrev: "ip.flags.mf"
                bits: 1
                value: 0
                description: "MF=0 — this is a complete (unfragmented) packet"
          - name: "Fragment Offset"
            abbrev: "ip.frag_offset"
            bits: 13
            value: 0
            description: "0 — not a fragment"
          - name: "TTL"
            abbrev: "ip.ttl"
            bits: 8
            value: 64
            description: "Time To Live"
          - name: "Protocol"
            abbrev: "ip.proto"
            bits: 8
            value: 6
            description: "TCP (protocol number 6)"
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "192.0.2.1"
            description: "Host A's IPv4 address"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "203.0.113.1"
            description: "Host B's IPv4 address"

      - name: "TCP + Payload"
        abbrev: "tcp"
        layer: 4
        total_bytes: 1480
        fields:
          - name: "TCP Header + Data"
            abbrev: "tcp.payload"
            bits: 11840
            value: "1480 bytes (20-byte TCP header + 1460 bytes application data)"
            description: "Full MSS data segment — MSS 1460 = MTU 1500 - 20 IP - 20 TCP"

  - id: "ipv4_fragment_1"
    name: "IPv4 Fragment 1 (1280 B)"
    description: "Router 1 fragments the packet — first fragment (1280 bytes)"
    from: "router1"
    to: "host_b"
    via: ["router2"]
    timestamp_ns: 100010000
    total_bytes: 1280
    color: "#6366f1"
    headers:
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Version"
            abbrev: "ip.version"
            bits: 4
            value: 4
            description: "IPv4"
          - name: "Total Length"
            abbrev: "ip.len"
            bits: 16
            value: 1280
            description: "First fragment — 1280 bytes fits the tunnel MTU"
          - name: "Identification"
            abbrev: "ip.id"
            bits: 16
            value: "0x1a2b"
            value_hex: "0x1a2b"
            description: "Same ID as the original packet — receiver uses this to reassemble"
          - name: "Flags"
            abbrev: "ip.flags"
            bits: 3
            value: "0x1"
            description: "MF=1 (More Fragments) — there are additional fragments following"
            fields:
              - name: "Don't Fragment"
                abbrev: "ip.flags.df"
                bits: 1
                value: 0
                description: "DF=0"
              - name: "More Fragments"
                abbrev: "ip.flags.mf"
                bits: 1
                value: 1
                description: "MF=1 — more fragments to come"
          - name: "Fragment Offset"
            abbrev: "ip.frag_offset"
            bits: 13
            value: 0
            description: "Offset 0 — this is the first fragment (contains the TCP header)"
          - name: "TTL"
            abbrev: "ip.ttl"
            bits: 8
            value: 63
            description: "Decremented by Router 1"
          - name: "Protocol"
            abbrev: "ip.proto"
            bits: 8
            value: 6
            description: "TCP"
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "192.0.2.1"
            description: "Original source (Host A) — preserved across fragmentation"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "203.0.113.1"
            description: "Original destination (Host B)"

      - name: "Fragment Payload"
        abbrev: "data"
        layer: 4
        total_bytes: 1260
        fields:
          - name: "Data"
            abbrev: "data.data"
            bits: 10080
            value: "1260 bytes of original payload (TCP header + first portion of data)"
            description: "First 1260 bytes of the original 1480-byte payload"

  - id: "ipv4_fragment_2"
    name: "IPv4 Fragment 2 (240 B)"
    description: "Router 1 fragments the packet — second/last fragment (remaining 240 bytes)"
    from: "router1"
    to: "host_b"
    via: ["router2"]
    timestamp_ns: 100011000
    total_bytes: 240
    color: "#6366f1"
    headers:
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Total Length"
            abbrev: "ip.len"
            bits: 16
            value: 240
            description: "Last fragment — 20 IP header + 220 remaining data bytes"
          - name: "Identification"
            abbrev: "ip.id"
            bits: 16
            value: "0x1a2b"
            value_hex: "0x1a2b"
            description: "Same ID — receiver matches fragments by this field"
          - name: "Flags"
            abbrev: "ip.flags"
            bits: 3
            value: "0x0"
            description: "MF=0 — this is the last fragment"
            fields:
              - name: "Don't Fragment"
                abbrev: "ip.flags.df"
                bits: 1
                value: 0
                description: "DF=0"
              - name: "More Fragments"
                abbrev: "ip.flags.mf"
                bits: 1
                value: 0
                description: "MF=0 — final fragment"
          - name: "Fragment Offset"
            abbrev: "ip.frag_offset"
            bits: 13
            value: 158
            description: "Offset 158 (in 8-byte units = byte offset 1264) — where this fragment's data starts in the original datagram. Note: 1260 rounds down to 1256 at the 8-byte boundary, so offset = 1260/8 = 157.5, rounded to 158 with data adjustment."
          - name: "TTL"
            abbrev: "ip.ttl"
            bits: 8
            value: 63
            description: "Decremented by Router 1"
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "192.0.2.1"
            description: "Original source preserved"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "203.0.113.1"
            description: "Original destination preserved"

      - name: "Fragment Payload"
        abbrev: "data"
        layer: 4
        total_bytes: 220
        fields:
          - name: "Data"
            abbrev: "data.data"
            bits: 1760
            value: "220 bytes — remainder of the original payload"
            description: "Final portion of the original 1480-byte payload"

  # ══════════════════════════════════════════════════════════════════
  # Part 2 — IPv6 PMTUD Working Correctly
  # ══════════════════════════════════════════════════════════════════

  - id: "ipv6_packet_1500"
    name: "IPv6 Packet (1500 B)"
    description: "Host A sends a 1500-byte IPv6 packet assuming path MTU = 1500"
    from: "host_a"
    to: "host_b"
    via: ["router1"]
    timestamp_ns: 200000000
    total_bytes: 1500
    color: "#0f766e"
    headers:
      - name: "IPv6"
        abbrev: "ipv6"
        layer: 3
        total_bytes: 40
        fields:
          - name: "Version"
            abbrev: "ipv6.version"
            bits: 4
            value: 6
            description: "IPv6"
            spec_refs:
              - document: "RFC 8200"
                section: "3"
                title: "IPv6 Header Format"
                url: "https://datatracker.ietf.org/doc/html/rfc8200#section-3"
          - name: "Traffic Class"
            abbrev: "ipv6.tclass"
            bits: 8
            value: 0
            description: "Default — no DSCP or ECN marking"
          - name: "Flow Label"
            abbrev: "ipv6.flow"
            bits: 20
            value: "0x12345"
            description: "Flow label — can be used by routers for per-flow load balancing"
          - name: "Payload Length"
            abbrev: "ipv6.plen"
            bits: 16
            value: 1460
            description: "1460 bytes — everything after the 40-byte fixed IPv6 header (total packet = 1500)"
            spec_refs:
              - document: "RFC 8200"
                section: "3"
                title: "IPv6 Header Format — Payload Length"
                url: "https://datatracker.ietf.org/doc/html/rfc8200#section-3"
          - name: "Next Header"
            abbrev: "ipv6.nxt"
            bits: 8
            value: 6
            description: "TCP (protocol number 6) — no extension headers"
          - name: "Hop Limit"
            abbrev: "ipv6.hlim"
            bits: 8
            value: 64
            description: "Hop Limit — equivalent to IPv4 TTL, decremented by each router"
          - name: "Source Address"
            abbrev: "ipv6.src"
            bits: 128
            value: "2001:db8:a::1"
            description: "Host A's IPv6 address"
          - name: "Destination Address"
            abbrev: "ipv6.dst"
            bits: 128
            value: "2001:db8:b::1"
            description: "Host B's IPv6 address"

      - name: "TCP + Payload"
        abbrev: "tcp"
        layer: 4
        total_bytes: 1460
        fields:
          - name: "TCP Header + Data"
            abbrev: "tcp.payload"
            bits: 11680
            value: "1460 bytes (20-byte TCP header + 1440 bytes application data)"
            description: "Full MSS payload — MSS 1440 = MTU 1500 - 40 IPv6 - 20 TCP"

  - id: "icmpv6_pkt_too_big"
    name: "ICMPv6 Packet Too Big"
    description: "Router 1 cannot fragment, drops the packet, sends Packet Too Big with MTU=1280"
    from: "router1"
    to: "host_a"
    via: []
    timestamp_ns: 200020000
    total_bytes: 1240
    color: "#dc2626"
    headers:
      - name: "IPv6"
        abbrev: "ipv6"
        layer: 3
        total_bytes: 40
        fields:
          - name: "Version"
            abbrev: "ipv6.version"
            bits: 4
            value: 6
            description: "IPv6"
          - name: "Payload Length"
            abbrev: "ipv6.plen"
            bits: 16
            value: 1200
            description: "ICMPv6 header (8) + as much of the original packet as fits (up to 1192 bytes)"
          - name: "Next Header"
            abbrev: "ipv6.nxt"
            bits: 8
            value: 58
            description: "ICMPv6 (protocol number 58)"
            spec_refs:
              - document: "RFC 4443"
                section: "2.1"
                title: "ICMPv6 — Message General Format"
                url: "https://datatracker.ietf.org/doc/html/rfc4443#section-2.1"
          - name: "Hop Limit"
            abbrev: "ipv6.hlim"
            bits: 8
            value: 64
            description: "Hop limit for the ICMPv6 message itself"
          - name: "Source Address"
            abbrev: "ipv6.src"
            bits: 128
            value: "2001:db8:a::ff"
            description: "Router 1's interface address (facing Host A)"
          - name: "Destination Address"
            abbrev: "ipv6.dst"
            bits: 128
            value: "2001:db8:a::1"
            description: "Host A — the original sender"

      - name: "ICMPv6 Packet Too Big"
        abbrev: "icmpv6"
        layer: 3
        total_bytes: 1200
        fields:
          - name: "Type"
            abbrev: "icmpv6.type"
            bits: 8
            value: 2
            description: "Type 2 — Packet Too Big"
            spec_refs:
              - document: "RFC 4443"
                section: "3.2"
                title: "Packet Too Big Message"
                url: "https://datatracker.ietf.org/doc/html/rfc4443#section-3.2"
          - name: "Code"
