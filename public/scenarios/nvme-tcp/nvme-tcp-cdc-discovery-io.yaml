            bits: 8
            value: "0x04 (CapsuleCmd)"
            description: "Command capsule on IO Queue 1"
      - name: "NVMe Write Command"
        layer: 7
        fields:
          - name: "Opcode"
            abbrev: "nvme.cmd.opc"
            bits: 8
            value: "0x01 (Write)"
