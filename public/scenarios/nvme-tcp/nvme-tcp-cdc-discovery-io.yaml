            bits: 16
            value: "0x0000 (Success)"
            description: "Fabrics Connect succeeded — admin queue established"
          - name: "Controller ID (Result)"
            abbrev: "nvme.cqe.result"
            bits: 32
            value: "0x0041 (CNTLID=65)"
            description: "CDC assigned controller ID 65 to this host"
