meta:
  id: "nvme-tcp-cdc-discovery-io"
  title: "NVMe/TCP: mDNS → CDC Discovery → DIM → Subsystem Connect → I/O"
  protocol: "NVMe-oF/TCP"
  protocol_family: "NVMe-oF"
  version: "1.0.0"
  description: >
    A complete NVMe over TCP (NVMe-oF/TCP) exchange from initial service discovery
    through I/O operations. A Linux host running nvme-stas discovers a Centralized
    Discovery Controller (CDC) via mDNS, registers with DIM (TP8013), retrieves
    CDC Discovery Log Pages containing DDC referrals, connects to the Direct
    Discovery Controller (DDC) on the storage array to learn IO Controller details,
    then connects to the IO Controller to perform NVMe Write and Read operations.
    Demonstrates the full three-tier discovery hierarchy: CDC → DDC → IOC.
    Covers TP8009 (CDC architecture), TP8010, and TP8013 (DIM).

  learning_objectives:
    - "Understand how nvme-stas (stafd) discovers CDCs via mDNS service advertisement (_nvme-disc._tcp)"
    - "Follow NVMe-oF/TCP connection initialization: ICReq/ICResp PDU exchange and parameter negotiation"
    - "Observe Fabrics Connect command establishing an Admin queue to a Discovery Controller"
    - "See how DIM (Discovery Information Management, TP8013) registers a host with a CDC"
    - "Understand Discovery Log Pages: how hosts learn which subsystems and controllers are available"
    - "Trace the full IO Controller connection: Fabrics Connect → Identify Controller → Identify Namespace"
    - "Watch NVMe Write and Read commands flow over TCP with CapsuleCmd, R2T, H2CData, and C2HData PDUs"
    - "Understand the CDC → DDC → IOC controller hierarchy in NVMe-oF discovery architecture"

  difficulty: "advanced"

  authors:
    - name: "ProtoViz Community"
      org: "proto-viz"
      github: "proto-viz"
    - name: "Generated via NVMe specification and Linux kernel source analysis"
      org: "proto-viz"
      github: ""

  created: "2026-03-16"
  updated: "2026-03-16"

  tags:
    - "NVMe"
    - "NVMe-oF"
    - "NVMe/TCP"
    - "NVMe-oF/TCP"
    - "storage"
    - "CDC"
    - "discovery"
    - "DIM"
    - "mDNS"
    - "TP8009"
    - "TP8013"
    - "education"

  primary_specs:
    - document: "NVMe Base Spec 2.1"
      section: "5"
      title: "Admin Command Set"
      url: "https://nvmexpress.org/specifications/"
      alt_url: "https://nvmexpress.org/wp-content/uploads/NVM-Express-Base-Specification-Revision-2.1-2024.08.05-Ratified.pdf"
    - document: "NVMe-oF Spec 1.1a"
      section: "3"
      title: "NVMe over Fabrics Architecture"
      url: "https://nvmexpress.org/specifications/"
      alt_url: ""
    - document: "NVMe/TCP Transport Spec"
      section: "3"
      title: "NVMe/TCP Transport Binding"
      url: "https://nvmexpress.org/specifications/"
      alt_url: ""
    - document: "TP8009"
      section: ""
      title: "Centralized Discovery Controller (CDC)"
      url: "https://nvmexpress.org/specifications/"
      alt_url: ""
    - document: "TP8010"
      section: ""
      title: "Discovery Controller Enhancements"
      url: "https://nvmexpress.org/specifications/"
      alt_url: ""
    - document: "TP8013"
      section: ""
      title: "Discovery Information Management (DIM)"
      url: "https://nvmexpress.org/specifications/"
      alt_url: ""
    - document: "RFC 6762"
      section: ""
      title: "Multicast DNS"
      url: "https://datatracker.ietf.org/doc/html/rfc6762"
      alt_url: ""
    - document: "RFC 6763"
      section: ""
      title: "DNS-Based Service Discovery"
      url: "https://datatracker.ietf.org/doc/html/rfc6763"
      alt_url: ""

  content_disclaimer: >
    Protocol descriptions in this scenario are based on open-source implementations
    (Linux kernel nvme-tcp driver, libnvme, nvme-stas, nvme-cli) and public NVMe
    specifications. No proprietary specification text has been reproduced. NVMe,
    TP8009/8010/8013, and other specification references are provided as citations
    for further reading.

  source_references:
    - repo: "torvalds/linux"
      path: "drivers/nvme/host/tcp.c"
      description: "NVMe-oF/TCP host driver — ICReq/ICResp, PDU send/recv, queue management"
    - repo: "torvalds/linux"
      path: "drivers/nvme/host/fabrics.c"
      description: "NVMe Fabrics Connect, Property Get/Set, discovery log page retrieval"
    - repo: "torvalds/linux"
      path: "drivers/nvme/target/tcp.c"
      description: "NVMe-oF/TCP target driver — controller-side PDU handling"
    - repo: "torvalds/linux"
      path: "drivers/nvme/target/discovery.c"
      description: "Discovery controller target — log page generation, DIM handling"
    - repo: "torvalds/linux"
      path: "include/linux/nvme-tcp.h"
      description: "NVMe/TCP PDU type definitions, ICReq/ICResp/CapsuleCmd/CapsuleResp structs"
    - repo: "torvalds/linux"
      path: "include/linux/nvme.h"
      description: "NVMe command structures, admin/IO opcodes, fabrics command types, discovery log"
    - repo: "linux-nvme/nvme-stas"
      path: "staslib/avahi.py"
      description: "stafd mDNS discovery — Avahi integration for _nvme-disc._tcp service browsing"
    - repo: "linux-nvme/libnvme"
      path: "src/nvme/fabrics.c"
      description: "nvmf_register_ctrl() — DIM register/deregister, discovery log page retrieval"

# ─────────────────────────────────────────────────────────────────
# TOPOLOGY
# ─────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: "initiator"
      type: "initiator"
      label: "Linux Host (nvme-stas)"
      description: "NVMe-oF host running nvme-stas (stafd + stacd) for automated discovery and connection"
      hardware: "25GbE NIC"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ip: "192.168.100.10"
      mac: "00:50:56:a1:b2:c3"
      position: "left"

    - id: "switch"
      type: "switch"
      label: "Ethernet Switch + CDC"
      description: "Data center Ethernet switch with embedded Centralized Discovery Controller (CDC). The CDC provides mDNS advertisement, DIM registration, and Discovery Log Pages per TP8009."
      hardware: "25GbE Ethernet switch with CDC"
      ip: "192.168.100.50"
      position: "center"

    - id: "target"
      type: "target"
      label: "NVMe-oF/TCP Storage Array"
      description: "NVMe-oF/TCP storage array with Direct Discovery Controller (DDC) and IO Controllers"
      hardware: "NVMe-oF/TCP storage array"
      os: "Linux 6.x / Storage OS"
      ip: "192.168.100.51"
      mac: "00:50:56:d4:e5:f6"
      position: "right"

  links:
    - id: "link-host-sw"
      from: "initiator"
      to: "switch"
      speed_gbps: 25
      media: "fiber_sr"
    - id: "link-sw-storage"
      from: "switch"
      to: "target"
      speed_gbps: 25
      media: "fiber_sr"

# ─────────────────────────────────────────────────────────────────
# OSI LAYER DEFINITIONS (per actor)
# ─────────────────────────────────────────────────────────────────
osi_layers:
  initiator:
    - layer: 7
      name: "NVMe Host / nvme-stas"
      components: ["nvme-stas (stafd + stacd)", "nvme-cli", "libnvme"]
      state_schema:
        stafd_state:
          type: "string"
          description: "stafd daemon state"
          initial: "running"
        stacd_state:
          type: "string"
          description: "stacd daemon state"
          initial: "running"
        discovered_controllers:
          type: "integer"
          description: "Number of discovered controllers"
          initial: 0
        connected_subsystems:
          type: "integer"
          description: "Number of connected NVMe subsystems"
          initial: 0
        namespaces:
          type: "integer"
          description: "Number of available namespaces"
          initial: 0

    - layer: 6
      name: "NVMe Fabrics"
      components: ["drivers/nvme/host/fabrics.c", "libnvme fabrics"]
      state_schema:
        fabrics_state:
          type: "string"
          description: "Fabrics connection state"
          initial: "idle"
        controller_type:
          type: "string"
          description: "Connected controller type (CDC, DDC, IOC)"
          initial: "none"
        cntlid:
          type: "string"
          description: "Assigned controller ID"
          initial: "none"
        kato_ms:
          type: "integer"
          description: "Keep Alive Timeout (ms)"
          initial: 120000
        hostnqn:
          type: "string"
          description: "Host NQN"
          initial: "nqn.2014-08.org.nvmexpress:uuid:host-01"

    - layer: 5
      name: "NVMe-oF/TCP Transport"
      components: ["drivers/nvme/host/tcp.c", "include/linux/nvme-tcp.h"]
      state_schema:
        tcp_transport_state:
          type: "string"
          description: "NVMe/TCP transport state"
          initial: "idle"
        pfv:
          type: "string"
          description: "PDU Format Version"
          initial: "0x0000"
        hdgst:
          type: "boolean"
          description: "Header digest enabled"
          initial: false
        ddgst:
          type: "boolean"
          description: "Data digest enabled"
          initial: false
        maxr2t:
          type: "integer"
          description: "Maximum outstanding R2Ts"
          initial: 1
        admin_qid:
          type: "integer"
          description: "Admin queue ID"
          initial: 0
        io_queues:
          type: "integer"
          description: "Number of IO queues established"
          initial: 0

    - layer: 4
      name: "TCP"
      components: ["kernel TCP stack"]
      state_schema:
        tcp_state:
          type: "string"
          description: "TCP connection state"
          initial: "CLOSED"
        src_port:
          type: "integer"
          description: "TCP source port (ephemeral)"
          initial: 0
        dst_port:
          type: "integer"
          description: "TCP destination port"
          initial: 0
        seq:
          type: "string"
          description: "Current sequence number"
          initial: "0"
        mss:
          type: "integer"
          description: "Maximum Segment Size"
          initial: 1460

    - layer: 3
      name: "IP / Routing"
      components: ["kernel IP stack"]
      state_schema:
        src_ip:
          type: "string"
          initial: "192.168.100.10"
        dst_ip:
          type: "string"
          initial: "unresolved"
        ttl:
          type: "integer"
          initial: 64

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver", "IEEE 802.3"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        mac:
          type: "string"
          initial: "00:50:56:a1:b2:c3"

    - layer: 1
      name: "Physical"
      components: ["25GBASE-SR", "SFP28"]
      state_schema:
        phy_state:
          type: "string"
          initial: "up"
        speed:
          type: "string"
          initial: "25Gbps"

  target:
    - layer: 7
      name: "NVMe Controllers (DDC + IOC)"
      components: ["drivers/nvme/target/core.c", "drivers/nvme/target/discovery.c", "nvmet configfs"]
      state_schema:
        ddc_state:
          type: "string"
          description: "Direct Discovery Controller state"
          initial: "idle"
        io_controller_state:
          type: "string"
          description: "IO Controller state"
          initial: "idle"
        nvme_ns_count:
          type: "integer"
          description: "Number of NVMe namespaces"
          initial: 4

    - layer: 6
      name: "NVMe Fabrics (IOC)"
      components: ["drivers/nvme/target/fabrics-cmd.c"]
      state_schema:
        fabrics_state:
          type: "string"
          initial: "listening"
        assigned_cntlid:
          type: "string"
          description: "Controller ID assigned to host"
          initial: "none"

    - layer: 5
      name: "NVMe-oF/TCP Transport"
      components: ["drivers/nvme/target/tcp.c"]
      state_schema:
        tcp_transport_state:
          type: "string"
          initial: "listening"
        maxdata:
          type: "integer"
          description: "Max data capsules per R2T"
          initial: 131072

    - layer: 4
      name: "TCP"
      components: ["kernel TCP stack"]
      state_schema:
        tcp_state:
          type: "string"
          initial: "LISTEN"
        listen_port_ddc:
          type: "integer"
          description: "DDC TCP listening port"
          initial: 8009
        listen_port_ioc:
          type: "integer"
          description: "IOC TCP listening port"
          initial: 4420

    - layer: 3
      name: "IP / Routing"
      components: ["kernel IP stack"]
      state_schema:
        src_ip:
          type: "string"
          initial: "192.168.100.51"

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver", "IEEE 802.3"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        mac:
          type: "string"
          initial: "00:50:56:d4:e5:f6"

    - layer: 1
      name: "Physical"
      components: ["25GBASE-SR", "SFP28"]
      state_schema:
        phy_state:
          type: "string"
          initial: "up"
        speed:
          type: "string"
          initial: "25Gbps"

  switch:
    - layer: 7
      name: "CDC (Discovery Controller)"
      components: ["drivers/nvme/target/discovery.c", "TP8009", "TP8013"]
      state_schema:
        cdc_state:
          type: "string"
          description: "CDC service state"
          initial: "listening"
        registered_hosts:
          type: "integer"
          description: "Hosts registered via DIM"
          initial: 0
        subsystem_count:
          type: "integer"
          description: "Subsystems in CDC database"
          initial: 3
    - layer: 6
      name: "NVMe Fabrics (CDC)"
      components: ["drivers/nvme/target/fabrics-cmd.c"]
      state_schema:
        cdc_fabrics_state:
          type: "string"
          initial: "listening"
        assigned_cntlid:
          type: "string"
          initial: "none"
    - layer: 5
      name: "NVMe-oF/TCP (CDC)"
      components: ["drivers/nvme/target/tcp.c"]
      state_schema:
        cdc_transport_state:
          type: "string"
          initial: "listening"
    - layer: 4
      name: "TCP (CDC port 8009)"
      components: ["kernel TCP stack"]
      state_schema:
        cdc_tcp_state:
          type: "string"
          initial: "LISTEN"
    - layer: 3
      name: "IP Forwarding"
      components: ["L3 switch forwarding"]
      state_schema:
        routing_state:
          type: "string"
          initial: "active"
    - layer: 2
      name: "Ethernet Switching"
      components: ["802.1Q bridge", "MAC forwarding table"]
      state_schema:
        fwd_table_entries:
          type: "integer"
          initial: 0

# ─────────────────────────────────────────────────────────────────
# FRAME DEFINITIONS
# ─────────────────────────────────────────────────────────────────
frames:
  # ── mDNS Discovery ──
  - id: "mdns_query"
    name: "mDNS Query (_nvme-disc._tcp)"
    from: "initiator"
    to: "switch"
    total_bytes: 78
    color: "#b45309"
    headers:
      - name: "Ethernet"
        layer: 2
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "01:00:5e:00:00:fb"
            description: "IPv4 multicast MAC for 224.0.0.251"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "00:50:56:a1:b2:c3"
            description: "Host NIC MAC address"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800 (IPv4)"
      - name: "IPv4"
        layer: 3
        fields:
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.100.10"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "224.0.0.251"
            description: "mDNS multicast group address (RFC 6762)"
            spec_refs:
              - document: "RFC 6762"
                section: "3"
                title: "Multicast DNS Addresses"
                url: "https://datatracker.ietf.org/doc/html/rfc6762#section-3"
          - name: "TTL"
            abbrev: "ip.ttl"
            bits: 8
            value: "255"
            description: "mDNS requires TTL=255 for link-local scope"
      - name: "UDP"
        layer: 4
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: "5353"
            description: "mDNS port (RFC 6762)"
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: "5353"
      - name: "mDNS Query"
        layer: 7
        fields:
          - name: "Transaction ID"
            abbrev: "dns.id"
            bits: 16
            value: "0x0000"
            description: "mDNS queries use ID 0 (RFC 6762 §18.1)"
          - name: "Flags"
            abbrev: "dns.flags"
            bits: 16
            value: "0x0000 (Standard Query)"
          - name: "Questions"
            abbrev: "dns.count.queries"
            bits: 16
            value: "1"
          - name: "Query Name"
            abbrev: "dns.qry.name"
            bits: 0
            value: "_nvme-disc._tcp.local"
            description: "DNS-SD service type for NVMe discovery controllers (TP8009)"
            spec_refs:
              - document: "TP8009"
                section: ""
                title: "mDNS Service Type for NVMe Discovery"
                url: "https://nvmexpress.org/specifications/"
              - document: "RFC 6763"
                section: "7"
                title: "DNS-SD Service Names"
                url: "https://datatracker.ietf.org/doc/html/rfc6763#section-7"
            kernel_ref:
              file: "staslib/avahi.py"
              function: "Avahi._service_browser"
              notes: "stafd registers with Avahi to browse for _nvme-disc._tcp service type"
          - name: "Query Type"
            abbrev: "dns.qry.type"
            bits: 16
            value: "PTR (12)"
            description: "PTR query for service instance enumeration"

  - id: "mdns_response"
    name: "mDNS Response (CDC advertisement)"
    from: "switch"
    to: "initiator"
    total_bytes: 210
    color: "#b45309"
    headers:
      - name: "Ethernet"
        layer: 2
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "01:00:5e:00:00:fb"
            description: "mDNS multicast response"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "00:50:56:sw:cd:01"
            description: "Switch management MAC address"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800 (IPv4)"
      - name: "IPv4"
        layer: 3
        fields:
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.100.50"
            description: "Switch/CDC management IP"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "224.0.0.251"
          - name: "TTL"
            abbrev: "ip.ttl"
            bits: 8
            value: "255"
      - name: "UDP"
        layer: 4
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: "5353"
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: "5353"
      - name: "mDNS Response"
        layer: 7
        fields:
          - name: "Flags"
            abbrev: "dns.flags"
            bits: 16
            value: "0x8400 (Response, Authoritative)"
          - name: "Answers"
            abbrev: "dns.count.answers"
            bits: 16
            value: "3"
          - name: "PTR Record"
            abbrev: "dns.resp.name"
            bits: 0
            value: "CDC-Storage._nvme-disc._tcp.local"
            description: "Service instance name for the CDC"
          - name: "SRV Record Target"
            abbrev: "dns.srv.target"
            bits: 0
            value: "cdc.storage.local"
            description: "Hostname of the CDC"
          - name: "SRV Record Port"
            abbrev: "dns.srv.port"
            bits: 16
            value: "8009"
            description: "NVMe discovery port (default trsvcid)"
            spec_refs:
              - document: "TP8009"
                section: ""
                title: "CDC Discovery Port"
                url: "https://nvmexpress.org/specifications/"
          - name: "TXT Record"
            abbrev: "dns.txt"
            bits: 0
            value: "p=tcp nqn=nqn.2014-08.org.nvmexpress.discovery"
            description: "Transport type and NQN. p=tcp indicates NVMe/TCP transport. nqn= is the discovery subsystem NQN."
            kernel_ref:
              file: "staslib/avahi.py"
              function: "Avahi._resolved_cb"
              notes: "stafd parses TXT record for transport type (p=) and NQN (nqn=)"

  # ── TCP Handshake to CDC ──
  - id: "tcp_syn_cdc"
    name: "TCP SYN (→ CDC port 8009)"
    from: "initiator"
    to: "switch"
    total_bytes: 74
    color: "#0f766e"
    headers:
      - name: "Ethernet"
        layer: 2
        fields:
          - name: "Destination MAC"
            abbrev: "eth.dst"
            bits: 48
            value: "00:50:56:d4:e5:f6"
          - name: "Source MAC"
            abbrev: "eth.src"
            bits: 48
            value: "00:50:56:a1:b2:c3"
          - name: "EtherType"
            abbrev: "eth.type"
            bits: 16
            value: "0x0800 (IPv4)"
      - name: "IPv4"
        layer: 3
        fields:
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "192.168.100.10"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "192.168.100.50"
      - name: "TCP"
        layer: 4
        fields:
          - name: "Source Port"
            abbrev: "tcp.srcport"
            bits: 16
            value: "49152"
          - name: "Destination Port"
            abbrev: "tcp.dstport"
            bits: 16
            value: "8009"
            description: "NVMe discovery service port"
          - name: "Flags"
            abbrev: "tcp.flags"
            bits: 8
            value: "SYN"
          - name: "Sequence Number"
            abbrev: "tcp.seq"
            bits: 32
            value: "0 (relative)"
          - name: "Window Size"
            abbrev: "tcp.window_size"
            bits: 16
            value: "65535"
          - name: "MSS"
            abbrev: "tcp.options.mss"
            bits: 16
            value: "1460"

  - id: "tcp_synack_cdc"
    name: "TCP SYN-ACK (CDC → Host)"
    from: "switch"
    to: "initiator"
    total_bytes: 74
    color: "#0f766e"
    headers:
      - name: "TCP"
        layer: 4
        fields:
          - name: "Source Port"
            abbrev: "tcp.srcport"
            bits: 16
            value: "8009"
          - name: "Destination Port"
            abbrev: "tcp.dstport"
            bits: 16
            value: "49152"
          - name: "Flags"
            abbrev: "tcp.flags"
            bits: 8
            value: "SYN, ACK"
          - name: "Sequence Number"
            abbrev: "tcp.seq"
            bits: 32
            value: "0 (relative)"
          - name: "Acknowledgment Number"
            abbrev: "tcp.ack"
            bits: 32
            value: "1"

  - id: "tcp_ack_cdc"
    name: "TCP ACK (3-way handshake complete)"
    from: "initiator"
    to: "switch"
    total_bytes: 66
    color: "#0f766e"
    headers:
      - name: "TCP"
        layer: 4
        fields:
          - name: "Flags"
            abbrev: "tcp.flags"
            bits: 8
            value: "ACK"
          - name: "Acknowledgment Number"
            abbrev: "tcp.ack"
            bits: 32
            value: "1"

  # ── NVMe-oF/TCP Initialization to CDC ──
  - id: "icreq_cdc"
