            abbrev: "nvme.disc.entry.subnqn"
            bits: 0
            value: "nqn.2014-08.org.nvmexpress.discovery"
            description: "Well-known discovery NQN — DDC referral uses the same discovery NQN as CDC"
      - name: "Entry 2: DDC Referral (Storage Array 2)"
        layer: 6
        fields:
