            bits: 16
            value: "0x1234"
          - name: "Serial Number"
            abbrev: "nvme.id.ctrl.sn"
            bits: 160
            value: "SN-SUBSYS-ALPHA-001"
          - name: "Model Number"
            abbrev: "nvme.id.ctrl.mn"
            bits: 320
            value: "NVMe-oF/TCP Storage Array"
          - name: "Firmware Revision"
            abbrev: "nvme.id.ctrl.fr"
            bits: 64
            value: "v2.1.0"
          - name: "Max Data Transfer Size"
            abbrev: "nvme.id.ctrl.mdts"
            bits: 8
            value: "6"
            description: "MDTS=6 → max transfer = 2^6 × 4KB = 256KB"
          - name: "Controller ID"
            abbrev: "nvme.id.ctrl.cntlid"
            bits: 16
            value: "1"
          - name: "NVMe Version"
            abbrev: "nvme.id.ctrl.ver"
            bits: 32
            value: "2.1.0"
          - name: "Number of Namespaces"
