            bits: 8
            value: "0"
          - name: "Digest Types"
            abbrev: "nvme-tcp.icresp.digest"
            bits: 8
            value: "0x00"
            description: "Controller accepted: no digests"
          - name: "Max Data Capsules"
            abbrev: "nvme-tcp.icresp.maxdata"
            bits: 32
            value: "131072"
            description: "Maximum data per R2T the controller supports (bytes)"

  # ── Fabrics Connect to CDC ──
  - id: "fabrics_connect_cdc"
