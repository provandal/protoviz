          - name: "Header Length"
            abbrev: "nvme-tcp.hlen"
            bits: 8
            value: "128"
          - name: "PDU Length"
            abbrev: "nvme-tcp.plen"
            bits: 32
            value: "128"
      - name: "ICResp Parameters"
