            bits: 32
            value: "4"
            description: "4 namespaces available on this subsystem"
          - name: "SQ Entry Size"
            abbrev: "nvme.id.ctrl.sqes"
            bits: 8
            value: "6/6"
            description: "Min/Max SQE size = 2^6 = 64 bytes"
          - name: "CQ Entry Size"
            abbrev: "nvme.id.ctrl.cqes"
            bits: 8
            value: "4/4"
            description: "Min/Max CQE size = 2^4 = 16 bytes"

