                title: "Initialize Connection Request PDU"
                url: "https://nvmexpress.org/specifications/"
            kernel_ref:
              file: "drivers/nvme/host/tcp.c"
              function: "nvme_tcp_init_connection"
              notes: "Host sends ICReq after TCP connect completes"
          - name: "Flags"
            abbrev: "nvme-tcp.flags"
            bits: 8
            value: "0x00"
          - name: "Header Length"
            abbrev: "nvme-tcp.hlen"
            bits: 8
            value: "128"
            description: "ICReq PDU is always 128 bytes"
          - name: "PDU Data Offset"
            abbrev: "nvme-tcp.pdo"
            bits: 8
            value: "0"
          - name: "PDU Length"
            abbrev: "nvme-tcp.plen"
            bits: 32
            value: "128"
      - name: "ICReq Parameters"
        layer: 5
        fields:
          - name: "PDU Format Version"
            abbrev: "nvme-tcp.icreq.pfv"
            bits: 16
            value: "0x0000"
            description: "Only version 0 is defined"
          - name: "Host PDU Data Alignment"
            abbrev: "nvme-tcp.icreq.hpda"
            bits: 8
            value: "0"
            description: "Dword alignment for PDU data (0 = no constraint)"
          - name: "Digest Types"
            abbrev: "nvme-tcp.icreq.digest"
            bits: 8
            value: "0x00"
            description: "Bit 0: Header Digest, Bit 1: Data Digest. 0x00 = no digests requested."
            kernel_ref:
              file: "drivers/nvme/host/tcp.c"
              function: "nvme_tcp_init_connection"
              notes: "Digest negotiation — host requests, controller accepts/rejects in ICResp"
          - name: "Max Outstanding R2Ts"
            abbrev: "nvme-tcp.icreq.maxr2t"
            bits: 32
            value: "1"
            description: "Maximum number of outstanding Ready-to-Transfer PDUs per command"

  - id: "icresp_cdc"
