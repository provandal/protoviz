          - name: "Transport Service ID"
            abbrev: "nvme.disc.entry.trsvcid"
            bits: 0
            value: "4420"
            description: "IANA-assigned NVMe-oF port"
          - name: "Subsystem NQN"
            abbrev: "nvme.disc.entry.subnqn"
            bits: 0
