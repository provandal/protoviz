            value: "PSH, ACK"
      - name: "NVMe-oF/TCP CapsuleCmd"
        layer: 5
        fields:
          - name: "PDU Type"
            abbrev: "nvme-tcp.type"
            bits: 8
            value: "0x04 (CapsuleCmd)"
            description: "Command Capsule PDU — carries an NVMe command SQE"
          - name: "PDU Length"
            abbrev: "nvme-tcp.plen"
            bits: 32
            value: "1096"
            description: "72 bytes header + 1024 bytes Connect data"
      - name: "NVMe Fabrics Connect Command"
        layer: 6
        fields:
