    from: "initiator"
    to: "switch"
    total_bytes: 194
    color: "#1e40af"
    headers:
      - name: "TCP"
        layer: 4
        fields:
          - name: "Source Port"
            abbrev: "tcp.srcport"
            bits: 16
            value: "49152"
          - name: "Destination Port"
            abbrev: "tcp.dstport"
            bits: 16
            value: "8009"
          - name: "Flags"
            abbrev: "tcp.flags"
            bits: 8
            value: "PSH, ACK"
      - name: "NVMe-oF/TCP PDU Header"
        layer: 5
        fields:
          - name: "PDU Type"
            abbrev: "nvme-tcp.type"
            bits: 8
            value: "0x00 (ICReq)"
            description: "Initialize Connection Request — first NVMe/TCP PDU after TCP handshake"
            spec_refs:
