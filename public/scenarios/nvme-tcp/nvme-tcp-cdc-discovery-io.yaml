            abbrev: "nvme-tcp.type"
            bits: 8
            value: "0x04 (CapsuleCmd)"
      - name: "NVMe Identify Command"
        layer: 6
        fields:
          - name: "Opcode"
            abbrev: "nvme.cmd.opc"
            bits: 8
            value: "0x06 (Identify)"
            description: "Retrieve controller or namespace identification data"
            spec_refs:
              - document: "NVMe Base Spec 2.1"
                section: "5.17"
                title: "Identify Command"
                url: "https://nvmexpress.org/specifications/"
            kernel_ref:
              file: "drivers/nvme/host/core.c"
              function: "nvme_identify_ctrl"
              notes: "Host reads controller capabilities, model, serial, firmware revision"
          - name: "CNS (Controller or Namespace Structure)"
            abbrev: "nvme.identify.cns"
            bits: 8
            value: "0x01 (Identify Controller)"
            description: "CNS=1 returns 4096-byte Identify Controller data structure"
          - name: "Command ID"
            abbrev: "nvme.cmd.cid"
            bits: 16
            value: "1"

