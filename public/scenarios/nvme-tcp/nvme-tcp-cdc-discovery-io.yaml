                url: "https://nvmexpress.org/specifications/"
            kernel_ref:
              file: "drivers/nvme/host/core.c"
              function: "nvme_setup_rw"
              notes: "Sets up NVMe Read/Write SQE from block layer request"
          - name: "Namespace ID"
            abbrev: "nvme.cmd.nsid"
            bits: 32
            value: "1"
          - name: "Starting LBA"
            abbrev: "nvme.cmd.write.slba"
            bits: 64
            value: "0x0000000000001000"
            description: "LBA 4096 — write starts at 2MB offset"
          - name: "Number of Logical Blocks"
            abbrev: "nvme.cmd.write.nlb"
            bits: 16
            value: "7"
            description: "8 LBAs (0's based) × 512 bytes = 4KB write"
          - name: "Force Unit Access"
            abbrev: "nvme.cmd.write.fua"
            bits: 1
            value: "0"
            description: "FUA=0 — controller may use volatile write cache"
          - name: "Command ID"
            abbrev: "nvme.cmd.cid"
            bits: 16
            value: "0"

  - id: "nvme_write_r2t"
    name: "R2T (Ready to Transfer)"
    from: "target"
    to: "initiator"
    via: ["switch"]
    total_bytes: 90
    color: "#991b1b"
    headers:
      - name: "NVMe-oF/TCP R2T PDU"
        layer: 5
        fields:
          - name: "PDU Type"
            abbrev: "nvme-tcp.type"
            bits: 8
            value: "0x09 (R2T)"
            description: "Ready-to-Transfer — controller requests write data from host"
            spec_refs:
              - document: "NVMe/TCP Transport Spec"
                section: "3.10"
                title: "Ready to Transfer PDU"
                url: "https://nvmexpress.org/specifications/"
            kernel_ref:
              file: "drivers/nvme/host/tcp.c"
              function: "nvme_tcp_handle_r2t"
              notes: "Host processes R2T and sends H2CData with the requested data"
          - name: "Command ID"
            abbrev: "nvme-tcp.r2t.cid"
            bits: 16
            value: "0"
          - name: "Transfer Tag"
            abbrev: "nvme-tcp.r2t.ttag"
            bits: 16
            value: "1"
          - name: "R2T Offset"
            abbrev: "nvme-tcp.r2t.offset"
            bits: 32
            value: "0"
            description: "Start of data region"
          - name: "R2T Length"
            abbrev: "nvme-tcp.r2t.length"
            bits: 32
            value: "4096"
            description: "Controller requests all 4KB of write data"

  - id: "nvme_write_h2cdata"
    name: "H2CData (4KB write data)"
    from: "initiator"
    to: "target"
    via: ["switch"]
    total_bytes: 4162
    color: "#991b1b"
    headers:
      - name: "NVMe-oF/TCP H2CData PDU"
        layer: 5
        fields:
          - name: "PDU Type"
            abbrev: "nvme-tcp.type"
            bits: 8
            value: "0x06 (H2CData)"
            description: "Host-to-Controller Data — carries the write payload"
            kernel_ref:
              file: "drivers/nvme/host/tcp.c"
              function: "nvme_tcp_send_h2c_data"
              notes: "Host transmits write data in response to R2T"
          - name: "Command ID"
            abbrev: "nvme-tcp.h2cdata.cid"
            bits: 16
            value: "0"
          - name: "Transfer Tag"
            abbrev: "nvme-tcp.h2cdata.ttag"
            bits: 16
            value: "1"
          - name: "Data Offset"
            abbrev: "nvme-tcp.h2cdata.offset"
            bits: 32
            value: "0"
          - name: "Data Length"
            abbrev: "nvme-tcp.h2cdata.datalen"
            bits: 32
            value: "4096"
            description: "4KB of write data"
          - name: "Last PDU"
            abbrev: "nvme-tcp.h2cdata.last"
            bits: 1
            value: "1"
            description: "LAST flag set — this is the final data PDU for this command"

  - id: "nvme_write_resp"
    name: "Write Completion (Success)"
    from: "target"
    to: "initiator"
    via: ["switch"]
    total_bytes: 90
    color: "#991b1b"
    headers:
      - name: "NVMe-oF/TCP CapsuleResp"
        layer: 5
        fields:
          - name: "PDU Type"
            abbrev: "nvme-tcp.type"
            bits: 8
            value: "0x05 (CapsuleResp)"
      - name: "NVMe Completion (CQE)"
        layer: 7
        fields:
          - name: "Status"
            abbrev: "nvme.cqe.status"
            bits: 16
            value: "0x0000 (Success)"
            description: "Write completed successfully — 4KB written to LBA 0x1000 on Namespace 1"
          - name: "SQ Head Pointer"
            abbrev: "nvme.cqe.sqhd"
            bits: 16
            value: "1"
          - name: "Command ID"
            abbrev: "nvme.cqe.cid"
            bits: 16
            value: "0"

  # ── NVMe Read ──
  - id: "nvme_read_cmd"
    name: "NVMe Read Command (4KB)"
    from: "initiator"
    to: "target"
    via: ["switch"]
    total_bytes: 138
    color: "#6b21a8"
    headers:
      - name: "NVMe-oF/TCP CapsuleCmd"
        layer: 5
        fields:
          - name: "PDU Type"
            abbrev: "nvme-tcp.type"
            bits: 8
            value: "0x04 (CapsuleCmd)"
      - name: "NVMe Read Command"
        layer: 7
        fields:
          - name: "Opcode"
            abbrev: "nvme.cmd.opc"
            bits: 8
            value: "0x02 (Read)"
            description: "NVMe IO Read command"
            spec_refs:
              - document: "NVMe Base Spec 2.1"
                section: "7.2"
                title: "Read Command"
                url: "https://nvmexpress.org/specifications/"
          - name: "Namespace ID"
            abbrev: "nvme.cmd.nsid"
            bits: 32
            value: "1"
          - name: "Starting LBA"
            abbrev: "nvme.cmd.read.slba"
            bits: 64
            value: "0x0000000000001000"
            description: "Read back the same 4KB we just wrote"
          - name: "Number of Logical Blocks"
            abbrev: "nvme.cmd.read.nlb"
            bits: 16
            value: "7"
            description: "8 LBAs × 512 bytes = 4KB read"
          - name: "Command ID"
            abbrev: "nvme.cmd.cid"
            bits: 16
            value: "1"

  - id: "nvme_read_c2hdata"
    name: "C2HData (4KB read data)"
    from: "target"
    to: "initiator"
    via: ["switch"]
    total_bytes: 4162
    color: "#6b21a8"
    headers:
      - name: "NVMe-oF/TCP C2HData PDU"
        layer: 5
        fields:
          - name: "PDU Type"
            abbrev: "nvme-tcp.type"
            bits: 8
            value: "0x07 (C2HData)"
            description: "Controller-to-Host Data — carries read payload"
            kernel_ref:
              file: "drivers/nvme/target/tcp.c"
              function: "nvmet_tcp_send_c2h_data"
              notes: "Target sends read data to host via C2HData PDU"
          - name: "Command ID"
            abbrev: "nvme-tcp.c2hdata.cid"
            bits: 16
            value: "1"
          - name: "Data Offset"
            abbrev: "nvme-tcp.c2hdata.offset"
            bits: 32
            value: "0"
          - name: "Data Length"
            abbrev: "nvme-tcp.c2hdata.datalen"
            bits: 32
            value: "4096"
            description: "4KB of read data from Namespace 1, LBA 0x1000"
          - name: "Last PDU"
            abbrev: "nvme-tcp.c2hdata.last"
            bits: 1
            value: "1"

  - id: "nvme_read_resp"
    name: "Read Completion (Success)"
    from: "target"
    to: "initiator"
    via: ["switch"]
    total_bytes: 90
    color: "#6b21a8"
    headers:
      - name: "NVMe-oF/TCP CapsuleResp"
        layer: 5
        fields:
          - name: "PDU Type"
            abbrev: "nvme-tcp.type"
            bits: 8
            value: "0x05 (CapsuleResp)"
      - name: "NVMe Completion (CQE)"
        layer: 7
        fields:
          - name: "Status"
            abbrev: "nvme.cqe.status"
            bits: 16
            value: "0x0000 (Success)"
            description: "Read completed — 4KB returned from LBA 0x1000"
          - name: "Command ID"
            abbrev: "nvme.cqe.cid"
            bits: 16
            value: "1"

# ─────────────────────────────────────────────────────────────────
# TIMELINE
# ─────────────────────────────────────────────────────────────────
timeline:
  # ── Phase: mDNS Discovery ──
  - id: "evt_mdns_query"
    type: "frame_tx"
    frame_id: "mdns_query"
    annotation:
      text: "mDNS Query: _nvme-disc._tcp.local"
      detail: >
        The host's stafd daemon (part of nvme-stas) queries mDNS for NVMe discovery
        controllers. It sends a multicast DNS query to 224.0.0.251:5353 looking for
        PTR records matching the _nvme-disc._tcp service type. This is the DNS-SD
        (DNS-Based Service Discovery, RFC 6763) mechanism specified in TP8009 for
        automated CDC discovery. stafd uses Avahi (Linux mDNS/DNS-SD implementation)
        to register a service browser for this service type.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stafd_state: "discovering"
          - layer: 3
            state_fields:
              dst_ip: "224.0.0.251"
      - actor_id: "switch"
        layers:
          - layer: 2
            state_fields:
              fwd_table_entries: 1

  - id: "evt_mdns_response"
    type: "frame_tx"
    frame_id: "mdns_response"
    annotation:
      text: "mDNS Response: CDC at 192.168.100.50:8009"
      detail: >
        The CDC responds with mDNS records advertising its discovery service.
        The PTR record maps _nvme-disc._tcp.local to the service instance name.
        The SRV record provides the target hostname and port (8009).
        The TXT record carries key-value pairs: p=tcp (transport type) and
        nqn=nqn.2014-08.org.nvmexpress.discovery (the well-known discovery NQN).
        stafd's Avahi callback parses these records and assembles a controller
        dictionary with transport, traddr, trsvcid, and subsysnqn.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stafd_state: "CDC found"
              discovered_controllers: 1
          - layer: 3
            state_fields:
              dst_ip: "192.168.100.50"
      - actor_id: "switch"
        layers:
          - layer: 2
            state_fields:
              fwd_table_entries: 2

  # ── Phase: TCP Handshake to CDC ──
  - id: "evt_tcp_syn_cdc"
    type: "frame_tx"
    frame_id: "tcp_syn_cdc"
    annotation:
      text: "TCP SYN → CDC port 8009"
      detail: >
        stafd initiates a TCP connection to the CDC at 192.168.100.50:8009.
        Port 8009 is the default trsvcid (Transport Service ID) for NVMe
        discovery controllers. The TCP 3-way handshake establishes the
        reliable transport that NVMe-oF/TCP will run over.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "SYN_SENT"
              src_port: 49152
              dst_port: 8009

  - id: "evt_tcp_synack_cdc"
    type: "frame_tx"
    frame_id: "tcp_synack_cdc"
    annotation:
      text: "TCP SYN-ACK ← CDC"
      detail: >
        The CDC's TCP stack responds with SYN-ACK, acknowledging the host's
        SYN and sending its own sequence number.
    state_after:
      - actor_id: "switch"
        layers:
          - layer: 4
            state_fields:
              cdc_tcp_state: "SYN_RCVD"

  - id: "evt_tcp_ack_cdc"
    type: "frame_tx"
    frame_id: "tcp_ack_cdc"
    annotation:
      text: "TCP ACK — connection established to CDC"
      detail: >
        The host completes the 3-way handshake. TCP connection to the CDC is
        now established. The NVMe-oF/TCP layer will send ICReq next.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "ESTABLISHED"
      - actor_id: "switch"
        layers:
          - layer: 4
            state_fields:
              cdc_tcp_state: "ESTABLISHED"

  # ── Phase: NVMe-oF/TCP Initialization to CDC ──
  - id: "evt_icreq_cdc"
    type: "frame_tx"
    frame_id: "icreq_cdc"
    annotation:
      text: "ICReq → CDC (Initialize NVMe/TCP Connection)"
      detail: >
        First NVMe-oF/TCP PDU after TCP handshake. The host sends an Initialize
        Connection Request (ICReq) to negotiate NVMe/TCP parameters. Key fields:
        PDU Format Version (only v0 defined), digest types requested (header and/or
        data digests for integrity), Host PDU Data Alignment, and max outstanding
        R2Ts. The 128-byte ICReq is the first thing the NVMe/TCP driver sends after
        TCP connect completes (nvme_tcp_init_connection).
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 5
            state_fields:
              tcp_transport_state: "ICReq sent"

  - id: "evt_icresp_cdc"
    type: "frame_tx"
    frame_id: "icresp_cdc"
    annotation:
      text: "ICResp ← CDC (Connection parameters accepted)"
      detail: >
        The CDC responds with ICResp confirming the negotiated parameters.
        The controller's CPDA (Controller PDU Data Alignment) and accepted digest
        types are returned. MaxData indicates the maximum data the controller can
        handle per R2T. With ICReq/ICResp complete, the NVMe/TCP transport layer
        is initialized and ready for NVMe commands.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 5
            state_fields:
              tcp_transport_state: "connected"
      - actor_id: "switch"
        layers:
          - layer: 5
            state_fields:
              cdc_transport_state: "connected"

  # ── Phase: Fabrics Connect to CDC ──
  - id: "evt_fabrics_connect_cdc"
    type: "frame_tx"
    frame_id: "fabrics_connect_cdc"
    annotation:
      text: "Fabrics Connect → CDC (Admin Queue, Discovery NQN)"
      detail: >
        The host sends an NVMe Fabrics Connect command to establish an Admin queue
        association with the CDC. The command uses opcode 0x7F (Fabrics) with
        fctype=0x01 (Connect). Queue ID 0 indicates the Admin queue. The Connect
        data (1024 bytes) carries the host identity: Host ID (UUID), Host NQN,
        and the target Subsystem NQN (nqn.2014-08.org.nvmexpress.discovery —
        the well-known discovery subsystem NQN). Controller ID is set to 0xFFFF
        (dynamic) so the CDC assigns one.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 6
            state_fields:
              fabrics_state: "connecting"
              controller_type: "CDC"

  - id: "evt_fabrics_connect_cdc_resp"
    type: "frame_tx"
    frame_id: "fabrics_connect_cdc_resp"
    annotation:
      text: "Fabrics Connect Response ← CDC (CNTLID=65)"
      detail: >
        The CDC accepts the Fabrics Connect and assigns Controller ID 65 to
        this host. The admin queue is now established — the host can send
        admin commands to the CDC, including DIM and Get Log Page.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 6
            state_fields:
              fabrics_state: "connected"
              cntlid: "65"
      - actor_id: "switch"
        layers:
          - layer: 6
            state_fields:
              cdc_fabrics_state: "connected"
              assigned_cntlid: "65"

  # ── Phase: DIM Registration ──
  - id: "evt_dim_register"
    type: "frame_tx"
    frame_id: "dim_register"
    annotation:
      text: "DIM Register → CDC (TP8013)"
      detail: >
        The host sends a Discovery Information Management (DIM) command to
        register with the CDC. DIM is defined in TP8013 and allows hosts to
        register/deregister with discovery controllers. The registration
        includes the host's NQN, Host ID (UUID), hostname, and OS version.
        Once registered, the CDC includes this host in its zoning calculations
        and will send Asynchronous Event Notifications when the discovery
        log changes (e.g., new subsystems come online). In nvme-stas, this
        is handled by libnvme's nvmf_register_ctrl() function.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 6
            state_fields:
              fabrics_state: "DIM registering"

  - id: "evt_dim_register_resp"
    type: "frame_tx"
    frame_id: "dim_register_resp"
    annotation:
      text: "DIM Register Response ← CDC (Success)"
      detail: >
        The CDC confirms the host's registration. The host is now in the
        CDC's database and will receive discovery log pages filtered by
        the zoning configuration — only subsystems this host is authorized
        to access will appear. The CDC will also send AENs (Asynchronous
        Event Notifications) if the discovery log changes.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 6
            state_fields:
              fabrics_state: "registered"
      - actor_id: "switch"
        layers:
          - layer: 7
            state_fields:
              registered_hosts: 1

  # ── Phase: Discovery Log Page ──
  - id: "evt_get_log_page"
    type: "frame_tx"
    frame_id: "get_log_page_discovery"
    annotation:
      text: "Get Log Page → CDC (Discovery Log, LID 0x70)"
      detail: >
        The host requests the Discovery Log Page (LID 0x70) from the CDC.
        This is a standard NVMe Get Log Page admin command. The discovery
        log contains entries for all subsystems accessible to this host,
        filtered by the CDC's zoning configuration. Each entry provides
        the transport type, address family, transport address (IP), port,
        subsystem NQN, and subsystem type (NVM or Discovery referral).
        The host reads the generation counter before and after — if it
        changes, the log must be re-read.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stafd_state: "reading discovery log"

  - id: "evt_get_log_page_resp"
    type: "frame_tx"
    frame_id: "get_log_page_discovery_resp"
    annotation:
      text: "Discovery Log Page ← CDC (2 DDC referrals)"
      detail: >
        The CDC returns the discovery log with 2 DDC referral entries:
        1) DDC on storage array 1 (subtype=1, Discovery Subsystem) at 192.168.100.51:8009
        2) DDC on storage array 2 (subtype=1, Discovery Subsystem) at 192.168.100.52:8009
        These are referrals — the CDC directs the host to connect to each DDC (Direct
        Discovery Controller) to learn which IO Controllers are available on that
        storage array. The CDC provides the network-wide view; the DDCs provide
        per-array details. stafd will now follow the first referral and connect to
        the DDC on storage array 1.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stafd_state: "CDC discovery complete"
              discovered_controllers: 3

  # ── Phase: DDC Discovery (Direct Discovery Controller on Storage) ──
  - id: "evt_tcp_syn_ddc"
    type: "frame_tx"
    frame_id: "tcp_syn_ddc"
    annotation:
      text: "TCP SYN → DDC port 8009 (storage array)"
      detail: >
        stafd follows the DDC referral from the CDC's discovery log. It initiates
        a TCP connection to the Direct Discovery Controller (DDC) on storage array 1
        at 192.168.100.51:8009. The DDC is a Discovery Controller that runs on the
        storage array itself (as opposed to the CDC which runs in the network switch).
        The DDC provides discovery log pages specific to the IO subsystems on this
        particular storage array. This is the second tier of the three-tier discovery
        hierarchy: CDC (network-wide) → DDC (per-array) → IOC (per-subsystem).
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "SYN_SENT"
              src_port: 49180
              dst_port: 8009
          - layer: 6
            state_fields:
              fabrics_state: "connecting"
              controller_type: "DDC"
              cntlid: "none"

  - id: "evt_tcp_synack_ddc"
    type: "frame_tx"
    frame_id: "tcp_synack_ddc"
    annotation:
      text: "TCP SYN-ACK ← DDC"
      detail: "The storage array's DDC acknowledges the TCP connection attempt."
    state_after:
      - actor_id: "target"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "SYN_RCVD"

  - id: "evt_tcp_ack_ddc"
    type: "frame_tx"
    frame_id: "tcp_ack_ddc"
    annotation:
      text: "TCP ACK — connection established to DDC"
      detail: "TCP handshake to the DDC on the storage array is complete."
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "ESTABLISHED"
      - actor_id: "target"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "ESTABLISHED"

  - id: "evt_icreq_ddc"
    type: "frame_tx"
    frame_id: "icreq_ddc"
    annotation:
      text: "ICReq → DDC (Initialize NVMe/TCP Connection)"
      detail: "NVMe/TCP initialization with the DDC — same ICReq/ICResp exchange as with the CDC."
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 5
            state_fields:
              tcp_transport_state: "ICReq sent"

  - id: "evt_icresp_ddc"
    type: "frame_tx"
    frame_id: "icresp_ddc"
    annotation:
      text: "ICResp ← DDC (Connection parameters accepted)"
      detail: "DDC accepts NVMe/TCP transport parameters."
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 5
            state_fields:
              tcp_transport_state: "connected"
      - actor_id: "target"
        layers:
          - layer: 5
            state_fields:
              tcp_transport_state: "connected"

  - id: "evt_fabrics_connect_ddc"
    type: "frame_tx"
    frame_id: "fabrics_connect_ddc"
    annotation:
      text: "Fabrics Connect → DDC (Admin Queue, Discovery NQN)"
      detail: >
        The host sends Fabrics Connect to the DDC using the well-known discovery
        subsystem NQN (nqn.2014-08.org.nvmexpress.discovery) — the same NQN used
        for the CDC connection. Both CDC and DDC are Discovery Controllers; they
        differ in scope (CDC = centralized/network-wide, DDC = local to a storage
        array) but use the same discovery protocol and NQN.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 6
            state_fields:
              fabrics_state: "connecting"

  - id: "evt_fabrics_connect_ddc_resp"
    type: "frame_tx"
    frame_id: "fabrics_connect_ddc_resp"
    annotation:
      text: "Fabrics Connect Response ← DDC (CNTLID=1)"
      detail: >
        The DDC accepts the connection and assigns CNTLID=1. The admin queue
        to the DDC is established — the host can now request the DDC's
        discovery log to learn about IO Controllers on this storage array.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 6
            state_fields:
              fabrics_state: "connected"
              cntlid: "1"
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              ddc_state: "connected"

  - id: "evt_dim_register_ddc"
    type: "frame_tx"
    frame_id: "dim_register_ddc"
    annotation:
      text: "DIM Register → DDC (TP8013)"
      detail: >
        The host registers with the DDC via DIM, just as it did with the CDC.
        This ensures the DDC returns discovery log entries filtered by the
        zoning configuration for this specific host. The DDC will also
        send AENs if subsystems on this storage array change.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 6
            state_fields:
              fabrics_state: "DIM registering"

  - id: "evt_dim_register_ddc_resp"
    type: "frame_tx"
    frame_id: "dim_register_ddc_resp"
    annotation:
      text: "DIM Register Response ← DDC (Success)"
      detail: >
        The DDC confirms the host's registration. The host can now request
        the DDC's discovery log page to learn which IO Controllers on this
        storage array are accessible.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 6
            state_fields:
              fabrics_state: "registered"

  - id: "evt_get_log_page_ddc"
    type: "frame_tx"
    frame_id: "get_log_page_ddc"
    annotation:
      text: "Get Log Page → DDC (Discovery Log, LID 0x70)"
      detail: >
        The host requests the Discovery Log Page from the DDC. Unlike the CDC's
        log which contained DDC referrals, the DDC's log contains the actual NVM
        subsystem entries — specifically the IO Controllers on this storage array
        that are accessible to this host. This is the step where the host learns
        the IO Controller's NQN and connection details.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stafd_state: "reading DDC log"

  - id: "evt_get_log_page_ddc_resp"
    type: "frame_tx"
    frame_id: "get_log_page_ddc_resp"
    annotation:
      text: "DDC Discovery Log ← DDC (subsys-alpha at 4420)"
      detail: >
        The DDC returns its discovery log with 1 entry: NVM Subsystem A
        (nqn.2024-01.com.storage:subsys-alpha) at 192.168.100.51:4420. This is
        the IO Controller NQN that stacd will use to connect. The three-tier
        discovery hierarchy is now complete: CDC (network-wide) → DDC (per-array)
        → IOC (per-subsystem). stacd now has the subsystem NQN and connection
        details needed to establish an IO Controller connection.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stafd_state: "DDC discovery complete"
              discovered_controllers: 4

  # ── Phase: TCP Handshake to IO Controller ──
  - id: "evt_tcp_syn_ioc"
    type: "frame_tx"
    frame_id: "tcp_syn_ioc"
    annotation:
      text: "TCP SYN → IO Controller port 4420"
      detail: >
        stacd initiates a TCP connection to the IO Controller at
        192.168.100.51:4420 — the address and port learned from the DDC's
        discovery log (nqn.2024-01.com.storage:subsys-alpha).
        Port 4420 is the IANA-assigned port for NVMe over Fabrics.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "SYN_SENT"
              src_port: 49200
              dst_port: 4420
          - layer: 6
            state_fields:
              fabrics_state: "connecting"
              controller_type: "IOC"
              cntlid: "none"

  - id: "evt_tcp_synack_ioc"
    type: "frame_tx"
    frame_id: "tcp_synack_ioc"
    annotation:
      text: "TCP SYN-ACK ← IO Controller"
      detail: "IO Controller acknowledges the TCP connection attempt."
    state_after:
      - actor_id: "target"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "SYN_RCVD"

  - id: "evt_tcp_ack_ioc"
    type: "frame_tx"
    frame_id: "tcp_ack_ioc"
    annotation:
      text: "TCP ACK — connection established to IO Controller"
      detail: "TCP handshake to the IO Controller is complete."
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "ESTABLISHED"
      - actor_id: "target"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "ESTABLISHED"

  # ── Phase: NVMe-oF/TCP Initialization to IOC ──
  - id: "evt_icreq_ioc"
    type: "frame_tx"
    frame_id: "icreq_ioc"
    annotation:
      text: "ICReq → IO Controller"
      detail: "NVMe/TCP initialization — same ICReq/ICResp exchange as with the CDC."
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 5
            state_fields:
              tcp_transport_state: "ICReq sent"

  - id: "evt_icresp_ioc"
    type: "frame_tx"
    frame_id: "icresp_ioc"
    annotation:
      text: "ICResp ← IO Controller"
      detail: "IO Controller accepts NVMe/TCP transport parameters."
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 5
            state_fields:
              tcp_transport_state: "connected"
      - actor_id: "target"
        layers:
          - layer: 5
            state_fields:
              tcp_transport_state: "connected"

  # ── Phase: Fabrics Connect to IO Controller ──
  - id: "evt_fabrics_connect_ioc"
    type: "frame_tx"
    frame_id: "fabrics_connect_ioc"
    annotation:
      text: "Fabrics Connect → IO Controller (subsys-alpha)"
      detail: >
        The host connects to the IO Controller using the subsystem NQN
        learned from the DDC's discovery log (nqn.2024-01.com.storage:subsys-alpha).
        This creates the Admin queue association. Unlike the CDC and DDC connections
        which used the well-known discovery NQN, this uses the actual storage
        subsystem NQN — completing the final tier of the CDC → DDC → IOC hierarchy.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 6
            state_fields:
              fabrics_state: "connecting"

  - id: "evt_fabrics_connect_ioc_resp"
    type: "frame_tx"
    frame_id: "fabrics_connect_ioc_resp"
    annotation:
      text: "Fabrics Connect Response ← IO Controller (CNTLID=1)"
      detail: >
        IO Controller accepts the connection and assigns CNTLID=1. The admin
        queue is established — the host can now identify the controller and
        its namespaces.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 6
            state_fields:
              fabrics_state: "connected"
              cntlid: "1"
      - actor_id: "target"
        layers:
          - layer: 6
            state_fields:
              fabrics_state: "connected"
              assigned_cntlid: "1"
          - layer: 7
            state_fields:
              io_controller_state: "connected"

  # ── Phase: Controller & Namespace Identification ──
  - id: "evt_identify_controller"
    type: "frame_tx"
    frame_id: "identify_controller"
    annotation:
      text: "Identify Controller (CNS=0x01)"
      detail: >
        The host sends Identify Controller (admin opcode 0x06, CNS=1) to learn
        the controller's capabilities: serial number, model, firmware version,
        maximum data transfer size (MDTS), number of namespaces, and supported
        features. This 4096-byte response is essential for the host driver to
        configure itself properly.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stacd_state: "identifying controller"

  - id: "evt_identify_controller_resp"
    type: "frame_tx"
    frame_id: "identify_controller_resp"
    annotation:
      text: "Identify Controller Response (4 namespaces, MDTS=256KB)"
      detail: >
        The IO Controller returns its identity: model "NVMe-oF/TCP Storage Array",
        firmware v2.1.0, MDTS=6 (max transfer 256KB), and 4 namespaces. The host
        driver uses MDTS to cap I/O request sizes and nn (Number of Namespaces) to
        know how many namespaces to enumerate.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stacd_state: "controller identified"

  - id: "evt_identify_namespace"
    type: "frame_tx"
    frame_id: "identify_namespace"
    annotation:
      text: "Identify Namespace (NSID=1, CNS=0x00)"
      detail: >
        The host identifies Namespace 1 to learn its size, LBA format, and
        capabilities. CNS=0 with a specific NSID returns the namespace's
        identity data including total size (nsze), capacity (ncap), current
        utilization (nuse), and LBA format (sector size, metadata).
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stacd_state: "identifying namespaces"

  - id: "evt_identify_namespace_resp"
    type: "frame_tx"
    frame_id: "identify_namespace_resp"
    annotation:
      text: "Identify Namespace Response (NSID=1, ~1TB, 512B LBAs)"
      detail: >
        Namespace 1 has ~1TB capacity (1,953,525,168 × 512-byte LBAs), 25% utilized.
        LBA format 0: 512 bytes per LBA, no metadata, best relative performance.
        The host's block layer will present this as /dev/nvmeXnY (e.g., /dev/nvme0n1).
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stacd_state: "namespace identified"
              namespaces: 1
              connected_subsystems: 1

  # ── Phase: IO Queue Setup ──
  - id: "evt_fabrics_connect_ioq"
    type: "frame_tx"
    frame_id: "fabrics_connect_ioq"
    annotation:
      text: "Fabrics Connect IO Queue 1"
      detail: >
        The host creates IO Queue 1 via Fabrics Connect with QID=1. IO queues
        are used for NVMe Read/Write commands (admin commands use QID=0).
        SQ Size is set to 128 entries. Multiple IO queues can be created
        (typically one per CPU core for best performance).
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 5
            state_fields:
              io_queues: 1

  - id: "evt_fabrics_connect_ioq_resp"
    type: "frame_tx"
    frame_id: "fabrics_connect_ioq_resp"
    annotation:
      text: "IO Queue 1 established — ready for I/O"
      detail: >
        IO Queue 1 is established. The host can now submit NVMe Read and Write
        commands. The block device /dev/nvme0n1 is now fully operational.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 5
            state_fields:
              io_queues: 1
          - layer: 7
            state_fields:
              stacd_state: "IO ready"
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              io_controller_state: "IO active"

  # ── Phase: NVMe Write ──
  - id: "evt_nvme_write_cmd"
    type: "frame_tx"
    frame_id: "nvme_write_cmd"
    annotation:
      text: "NVMe Write Command (4KB to LBA 0x1000)"
      detail: >
        The host submits a 4KB NVMe Write command to Namespace 1 at LBA 0x1000.
        The Write SQE (64 bytes) is sent as a CapsuleCmd PDU on IO Queue 1.
        The command specifies 8 LBAs (0's based NLB=7) × 512 bytes = 4096 bytes.
        Over NVMe/TCP, the write data is not sent inline with the command — the
        controller must first send an R2T (Ready to Transfer) PDU requesting the data.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stacd_state: "writing"

  - id: "evt_nvme_write_r2t"
    type: "frame_tx"
    frame_id: "nvme_write_r2t"
    annotation:
      text: "R2T ← Controller (request 4KB write data)"
      detail: >
        The IO Controller sends a Ready-to-Transfer (R2T) PDU requesting the
        write data from the host. The R2T specifies the transfer tag, data offset
        (0 = start), and length (4096 bytes). This is the NVMe/TCP flow control
        mechanism — the controller controls when and how much data the host sends.
        This differs from RDMA where the host can push data directly.
    state_after:
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              io_controller_state: "awaiting write data"

  - id: "evt_nvme_write_h2cdata"
    type: "frame_tx"
    frame_id: "nvme_write_h2cdata"
    annotation:
      text: "H2CData → Controller (4KB write payload)"
      detail: >
        The host sends the 4KB write data in an H2CData (Host-to-Controller Data)
        PDU. The transfer tag matches the R2T. The LAST flag indicates this is
        the final data PDU for this command. For larger writes, multiple R2T/H2CData
        exchanges may occur (controlled by maxr2t from ICReq).
    state_after:
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              io_controller_state: "writing to media"

  - id: "evt_nvme_write_resp"
    type: "frame_tx"
    frame_id: "nvme_write_resp"
    annotation:
      text: "Write Completion ← Controller (Success)"
      detail: >
        The IO Controller completes the write and returns a CapsuleResp with
        status 0x0000 (Success). The 4KB has been written to LBA 0x1000 on
        Namespace 1. The host driver completes the block I/O request.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stacd_state: "write complete"
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              io_controller_state: "IO active"

  # ── Phase: NVMe Read ──
  - id: "evt_nvme_read_cmd"
    type: "frame_tx"
    frame_id: "nvme_read_cmd"
    annotation:
      text: "NVMe Read Command (4KB from LBA 0x1000)"
      detail: >
        The host reads back the same 4KB from LBA 0x1000. The Read SQE is sent
        as a CapsuleCmd on IO Queue 1. Unlike Write, the Read command does not
        require an R2T — the controller sends data directly via C2HData PDUs.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stacd_state: "reading"

  - id: "evt_nvme_read_c2hdata"
    type: "frame_tx"
    frame_id: "nvme_read_c2hdata"
    annotation:
      text: "C2HData ← Controller (4KB read payload)"
      detail: >
        The IO Controller sends the 4KB read data in a C2HData (Controller-to-Host
        Data) PDU. For reads, data flows from controller to host without an R2T
        handshake — the controller sends data as soon as it's available from the
        media. The LAST flag marks this as the final data PDU.
    state_after:
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              io_controller_state: "sending read data"

  - id: "evt_nvme_read_resp"
    type: "frame_tx"
    frame_id: "nvme_read_resp"
    annotation:
      text: "Read Completion ← Controller (Success)"
      detail: >
        Read completed successfully. The 4KB data from LBA 0x1000 has been
        delivered to the host. The full NVMe/TCP lifecycle is now demonstrated:
        mDNS discovery → CDC registration → CDC discovery log (DDC referrals) →
        DDC connection → DDC discovery log (IOC details) → IOC connection →
        controller identification → namespace enumeration → IO queue setup →
        Write → Read. The three-tier discovery hierarchy (CDC → DDC → IOC) is complete.
    state_after:
      - actor_id: "initiator"
        layers:
          - layer: 7
            state_fields:
              stacd_state: "read complete"
      - actor_id: "target"
        layers:
          - layer: 7
            state_fields:
              io_controller_state: "IO active"
