            abbrev: "nvme.disc.entry.trtype"
            bits: 8
            value: "3 (TCP)"
          - name: "Address Family"
            abbrev: "nvme.disc.entry.adrfam"
            bits: 8
            value: "1 (IPv4)"
          - name: "Subsystem Type"
            abbrev: "nvme.disc.entry.subtype"
            bits: 8
            value: "2 (NVM Subsystem)"
            description: "IO subsystem — host can connect to this NQN for NVMe I/O operations"
          - name: "Controller ID"
            abbrev: "nvme.disc.entry.cntlid"
            bits: 16
            value: "0xFFFF"
          - name: "Transport Address"
            abbrev: "nvme.disc.entry.traddr"
            bits: 0
