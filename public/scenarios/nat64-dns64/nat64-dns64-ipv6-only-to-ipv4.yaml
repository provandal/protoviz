meta:
  id: "nat64-dns64-ipv6-only-to-ipv4"
  title: "NAT64/DNS64: IPv6-Only Client Reaches an IPv4-Only Server"
  protocol: "NAT64/DNS64"
  protocol_family: "IPv6 Transition"
  version: "1.0.0"
  description: >
    An IPv6-only client needs to reach legacy-api.example.com, which only has an
    IPv4 A record. DNS64 synthesizes a AAAA record using the well-known prefix
    64:ff9b::/96, the client connects over pure IPv6, and the NAT64 gateway
    translates packets between the IPv6 and IPv4 worlds. The scenario also covers
    464XLAT for legacy applications that hardcode IPv4 addresses. This is the key
    technology enabling federal agencies to operate IPv6-only networks per OMB
    M-21-07 while maintaining access to the IPv4 internet.

  learning_objectives:
    - "Understand how DNS64 synthesizes AAAA records from A records when no native AAAA exists"
    - "Learn the well-known NAT64 prefix 64:ff9b::/96 and how IPv4 addresses are embedded in IPv6"
    - "Trace a TCP connection from an IPv6-only client through NAT64 to an IPv4-only server"
    - "See how NAT64 maintains stateful translation mappings between IPv6 and IPv4 sessions"
    - "Observe the protocol boundary: client always sees IPv6, server always sees IPv4"
    - "Understand 464XLAT (CLAT + PLAT) for legacy apps that hardcode IPv4 addresses"
    - "Recognize why NAT64/DNS64 is the foundation for IPv6-only network deployments at scale"

  difficulty: "intermediate"

  authors:
    - name: "ProtoViz Community"
      org: "proto-viz"
      github: "proto-viz"

  created: "2026-03-19"
  updated: "2026-03-19"

  tags:
    - "IPv6"
    - "NAT64"
    - "DNS64"
    - "464XLAT"
    - "IPv6-only"
    - "IPv4 transition"
    - "federal"
    - "dual-stack"
    - "intermediate"
    - "education"
    - "WIP"

  primary_specs:
    - document: "RFC 6146"
      section: "2"
      title: "Stateful NAT64: Network Address and Protocol Translation from IPv6 Clients to IPv4 Servers"
      url: "https://datatracker.ietf.org/doc/html/rfc6146#section-2"
      alt_url: "https://www.rfc-editor.org/rfc/rfc6146"
    - document: "RFC 6147"
      section: "3"
      title: "DNS64: DNS Extensions for Network Address Translation from IPv6 Clients to IPv4 Servers"
      url: "https://datatracker.ietf.org/doc/html/rfc6147#section-3"
      alt_url: "https://www.rfc-editor.org/rfc/rfc6147"
    - document: "RFC 6052"
      section: "2"
      title: "IPv6 Addressing of IPv4/IPv6 Translators"
      url: "https://datatracker.ietf.org/doc/html/rfc6052#section-2"
      alt_url: "https://www.rfc-editor.org/rfc/rfc6052"
    - document: "RFC 6877"
      section: "3"
      title: "464XLAT: Combination of Stateful and Stateless Translation"
      url: "https://datatracker.ietf.org/doc/html/rfc6877#section-3"
      alt_url: "https://www.rfc-editor.org/rfc/rfc6877"
    - document: "RFC 8200"
      section: "3"
      title: "Internet Protocol, Version 6 (IPv6) Specification"
      url: "https://datatracker.ietf.org/doc/html/rfc8200#section-3"
      alt_url: "https://www.rfc-editor.org/rfc/rfc8200"

  content_disclaimer: >
    Protocol descriptions in this scenario are based on public RFCs and open-source
    implementations (TAYGA, Jool, Linux kernel). No proprietary specification text
    has been reproduced. RFC references are provided as citations for further reading.

  source_references:
    - repo: "torvalds/linux"
      path: "net/ipv6/ip6_output.c"
      description: "IPv6 packet output path"
    - repo: "torvalds/linux"
      path: "net/ipv6/addrconf.c"
      description: "IPv6 address configuration and management"
    - repo: "torvalds/linux"
      path: "net/ipv6/ndisc.c"
      description: "Neighbor Discovery Protocol (NDP) — IPv6 equivalent of ARP"
    - repo: "NICMx/Jool"
      path: "src/mod/common/steps/handling_hairpinning.c"
      description: "Jool NAT64 — open-source stateful NAT64 implementation for Linux"

# ─────────────────────────────────────────────────────────────────
# TOPOLOGY
# ─────────────────────────────────────────────────────────────────
topology:
  actors:
    - id: "client"
      type: "host"
      label: "IPv6-Only Client"
      description: "Client operating on an IPv6-only network — has no IPv4 address at all"
      hardware: "Generic NIC"
      os: "Linux 6.x"
      kernel_version: "6.8"
      ipv6: "2001:db8:1::10"
      mac: "00:11:22:33:44:01"
      position: "left"

    - id: "dns64"
      type: "server"
      label: "DNS64 Resolver"
      description: "Recursive DNS resolver with DNS64 function — synthesizes AAAA records for IPv4-only destinations"
      hardware: "Generic server"
      os: "Linux 6.x (BIND 9 / Unbound)"
      ipv6: "2001:db8:1::53"
      mac: "00:11:22:33:44:02"
      position: "center-left"

    - id: "nat64gw"
      type: "gateway"
      label: "NAT64 Gateway"
      description: "Stateful NAT64 translator — owns the 64:ff9b::/96 prefix and translates between IPv6 and IPv4"
      hardware: "Gateway appliance (Jool / TAYGA)"
      os: "Linux 6.x"
      ipv6: "2001:db8:1::64"
      ipv4: "203.0.113.50"
      mac: "00:11:22:33:44:03"
      position: "center-right"

    - id: "server"
      type: "host"
      label: "IPv4-Only Web Server"
      description: "Legacy server running only IPv4 — has no IPv6 connectivity at all"
      hardware: "Generic NIC"
      os: "Linux 5.x"
      ip: "198.51.100.1"
      mac: "00:11:22:33:44:04"
      position: "right"

  links:
    - id: "link-c-dns64"
      from: "client"
      to: "dns64"
      speed_gbps: 10
      media: "ethernet"
      description: "IPv6-only LAN segment"
    - id: "link-c-nat64"
      from: "client"
      to: "nat64gw"
      speed_gbps: 10
      media: "ethernet"
      description: "IPv6-only LAN segment (client to NAT64 gateway)"
    - id: "link-nat64-server"
      from: "nat64gw"
      to: "server"
      speed_gbps: 10
      media: "ethernet"
      description: "IPv4-only WAN/transit segment (NAT64 gateway to legacy server)"

# ─────────────────────────────────────────────────────────────────
# OSI LAYER DEFINITIONS (per actor)
# ─────────────────────────────────────────────────────────────────
osi_layers:
  client:
    - layer: 7
      name: "Application (HTTP)"
      components: ["user application", "libc socket API"]
      state_schema:
        app_state:
          type: "string"
          description: "Application-level state"
          initial: "idle"
        dns_query:
          type: "string"
          description: "Hostname being resolved"
          initial: "none"
        resolved_address:
          type: "string"
          description: "Address returned by DNS (always IPv6 from client's perspective)"
          initial: "none"

    - layer: 4
      name: "TCP"
      components: ["net/ipv6/tcp_ipv6.c"]
      state_schema:
        tcp_state:
          type: "string"
          description: "TCP state machine state"
          initial: "CLOSED"
        src_port:
          type: "integer"
          description: "Ephemeral source port"
          initial: 0
        dst_port:
          type: "integer"
          description: "Destination port"
          initial: 0

    - layer: 3
      name: "IPv6"
      components: ["net/ipv6/ip6_output.c", "net/ipv6/route.c"]
      state_schema:
        src_ipv6:
          type: "string"
          description: "Source IPv6 address"
          initial: "2001:db8:1::10"
        dst_ipv6:
          type: "string"
          description: "Destination IPv6 address"
          initial: "none"
        hop_limit:
          type: "integer"
          initial: 64
        protocol_view:
          type: "string"
          description: "What the client sees — always IPv6"
          initial: "IPv6-only"

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver", "IEEE 802.3"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        mac_addr:
          type: "string"
          initial: "00:11:22:33:44:01"

  dns64:
    - layer: 7
      name: "DNS64 Service"
      components: ["BIND 9 / Unbound with dns64 module"]
      state_schema:
        dns64_state:
          type: "string"
          description: "DNS64 processing state"
          initial: "idle"
        query_name:
          type: "string"
          description: "Current query being processed"
          initial: "none"
        real_a_record:
          type: "string"
          description: "A record fetched from authoritative DNS"
          initial: "none"
        synthesized_aaaa:
          type: "string"
          description: "Synthesized AAAA record using 64:ff9b::/96 prefix"
          initial: "none"

    - layer: 3
      name: "IPv6 / IPv4 (dual-stack)"
      components: ["net/ipv6/ip6_output.c", "net/ipv4/ip_output.c"]
      state_schema:
        ipv6_addr:
          type: "string"
          initial: "2001:db8:1::53"
        note:
          type: "string"
          description: "DNS64 resolver is dual-stack to reach authoritative DNS over IPv4"
          initial: "dual-stack DNS resolver"

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        mac_addr:
          type: "string"
          initial: "00:11:22:33:44:02"

  nat64gw:
    - layer: 7
      name: "NAT64 Translation Engine"
      components: ["Jool / TAYGA / kernel nat64"]
      state_schema:
        nat64_state:
          type: "string"
          description: "NAT64 gateway operational state"
          initial: "idle"
        active_mappings:
          type: "integer"
          description: "Number of active translation mappings (BIB entries)"
          initial: 0
        mapping_table:
          type: "string"
          description: "Current active mapping: IPv6 src/dst → IPv4 src/dst"
          initial: "empty"

    - layer: 3
      name: "IPv6 ↔ IPv4 Translation"
      components: ["Stateful NAT64 (RFC 6146)"]
      state_schema:
        ipv6_prefix:
          type: "string"
          description: "Well-known NAT64 prefix"
          initial: "64:ff9b::/96"
        ipv4_pool:
          type: "string"
          description: "IPv4 address pool for source NAT"
          initial: "203.0.113.0/24"
        ipv6_interface:
          type: "string"
          initial: "2001:db8:1::64"
        ipv4_interface:
          type: "string"
          initial: "203.0.113.50"
        translation_direction:
          type: "string"
          description: "Current translation direction"
          initial: "none"

    - layer: 2
      name: "Ethernet (dual-homed)"
      components: ["NIC driver — two interfaces"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        mac_addr:
          type: "string"
          initial: "00:11:22:33:44:03"

  server:
    - layer: 7
      name: "Application (HTTP)"
      components: ["HTTP server", "libc socket API"]
      state_schema:
        app_state:
          type: "string"
          description: "Application-level state"
          initial: "listening"
        perceived_client_ip:
          type: "string"
          description: "The server sees an IPv4 client (NAT64 pool address)"
          initial: "none"

    - layer: 4
      name: "TCP"
      components: ["net/ipv4/tcp.c"]
      state_schema:
        tcp_state:
          type: "string"
          description: "TCP state machine state"
          initial: "LISTEN"
        src_port:
          type: "integer"
          initial: 443
        dst_port:
          type: "integer"
          initial: 0

    - layer: 3
      name: "IPv4"
      components: ["net/ipv4/ip_output.c"]
      state_schema:
        src_ip:
          type: "string"
          description: "Source IPv4 address"
          initial: "198.51.100.1"
        dst_ip:
          type: "string"
          description: "Destination IPv4 address"
          initial: "none"
        ttl:
          type: "integer"
          initial: 64
        protocol_view:
          type: "string"
          description: "What the server sees — always IPv4"
          initial: "IPv4-only"

    - layer: 2
      name: "Ethernet"
      components: ["NIC driver", "IEEE 802.3"]
      state_schema:
        link_state:
          type: "string"
          initial: "up"
        mac_addr:
          type: "string"
          initial: "00:11:22:33:44:04"

# ─────────────────────────────────────────────────────────────────
# FRAMES
# ─────────────────────────────────────────────────────────────────
frames:
  # ── Phase 1: DNS64 Address Synthesis ──────────────────────────
  - id: "dns_aaaa_query"
    name: "DNS AAAA Query"
    description: "Client queries DNS64 resolver for AAAA record of legacy-api.example.com"
    from: "client"
    to: "dns64"
    via: []
    timestamp_ns: 100000000
    total_bytes: 78
    color: "#6366f1"
    headers:
      - name: "IPv6"
        abbrev: "ipv6"
        layer: 3
        total_bytes: 40
        fields:
          - name: "Version"
            abbrev: "ipv6.version"
            bits: 4
            value: 6
            description: "IPv6"
          - name: "Source Address"
            abbrev: "ipv6.src"
            bits: 128
            value: "2001:db8:1::10"
            description: "Client IPv6 address"
          - name: "Destination Address"
            abbrev: "ipv6.dst"
            bits: 128
            value: "2001:db8:1::53"
            description: "DNS64 resolver IPv6 address"
          - name: "Next Header"
            abbrev: "ipv6.nxt"
            bits: 8
            value: 17
            description: "UDP (17)"
          - name: "Hop Limit"
            abbrev: "ipv6.hlim"
            bits: 8
            value: 64
            description: "Hop limit"
      - name: "UDP"
        abbrev: "udp"
        layer: 4
        total_bytes: 8
        fields:
          - name: "Source Port"
            abbrev: "udp.srcport"
            bits: 16
            value: 51234
            description: "Ephemeral source port"
          - name: "Destination Port"
            abbrev: "udp.dstport"
            bits: 16
            value: 53
            description: "DNS port"
      - name: "DNS"
        abbrev: "dns"
        layer: 7
        total_bytes: 30
        fields:
          - name: "Transaction ID"
            abbrev: "dns.id"
            bits: 16
            value: "0xabcd"
            description: "DNS transaction identifier"
          - name: "Flags"
            abbrev: "dns.flags"
            bits: 16
            value: "0x0100"
            description: "Standard query, recursion desired (RD=1)"
          - name: "Query Name"
            abbrev: "dns.qry.name"
            bits: 0
            value: "legacy-api.example.com"
            description: "The hostname the client wants to resolve"
          - name: "Query Type"
            abbrev: "dns.qry.type"
            bits: 16
            value: "AAAA (28)"
            description: "Client requests an IPv6 AAAA record"
            spec_refs:
              - document: "RFC 3596"
                section: "2"
                title: "DNS Extensions to Support IP Version 6"
                url: "https://datatracker.ietf.org/doc/html/rfc3596#section-2"

  - id: "dns_a_query_upstream"
    name: "DNS A Query (Upstream)"
    description: "DNS64 resolver queries authoritative DNS for A record after finding no AAAA"
    from: "dns64"
    to: "server"
    via: []
    timestamp_ns: 100500000
    total_bytes: 70
    color: "#6366f1"
    headers:
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "192.0.2.53"
            description: "DNS64 resolver's IPv4 address (for upstream queries)"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "198.51.100.200"
            description: "Authoritative DNS server for example.com"
      - name: "DNS"
        abbrev: "dns"
        layer: 7
        total_bytes: 30
        fields:
          - name: "Query Name"
            abbrev: "dns.qry.name"
            bits: 0
            value: "legacy-api.example.com"
            description: "Same hostname, now querying for A record"
          - name: "Query Type"
            abbrev: "dns.qry.type"
            bits: 16
            value: "A (1)"
            description: "DNS64 falls back to A record query after AAAA returns NODATA"
            spec_refs:
              - document: "RFC 6147"
                section: "5.1.6"
                title: "Handling of the response"
                url: "https://datatracker.ietf.org/doc/html/rfc6147#section-5.1.6"

  - id: "dns_a_response_upstream"
    name: "DNS A Response (Upstream)"
    description: "Authoritative DNS returns A record: 198.51.100.1"
    from: "server"
    to: "dns64"
    via: []
    timestamp_ns: 101000000
    total_bytes: 86
    color: "#6366f1"
    headers:
      - name: "DNS"
        abbrev: "dns"
        layer: 7
        total_bytes: 46
        fields:
          - name: "Flags"
            abbrev: "dns.flags"
            bits: 16
            value: "0x8180"
            description: "Standard response, no error, recursion available"
          - name: "Answer Name"
            abbrev: "dns.resp.name"
            bits: 0
            value: "legacy-api.example.com"
            description: "The queried hostname"
          - name: "Answer Type"
            abbrev: "dns.resp.type"
            bits: 16
            value: "A (1)"
            description: "IPv4 address record — this confirms the server is IPv4-only"
          - name: "Answer Data"
            abbrev: "dns.a"
            bits: 32
            value: "198.51.100.1"
            description: "The IPv4 address of the legacy server"

  - id: "dns_aaaa_response_synthesized"
    name: "DNS AAAA Response (Synthesized)"
    description: "DNS64 returns synthesized AAAA record: 64:ff9b::c633:6401 to client"
    from: "dns64"
    to: "client"
    via: []
    timestamp_ns: 101500000
    total_bytes: 94
    color: "#10b981"
    headers:
      - name: "IPv6"
        abbrev: "ipv6"
        layer: 3
        total_bytes: 40
        fields:
          - name: "Source Address"
            abbrev: "ipv6.src"
            bits: 128
            value: "2001:db8:1::53"
            description: "DNS64 resolver"
          - name: "Destination Address"
            abbrev: "ipv6.dst"
            bits: 128
            value: "2001:db8:1::10"
            description: "Client"
      - name: "DNS"
        abbrev: "dns"
        layer: 7
        total_bytes: 46
        fields:
          - name: "Transaction ID"
            abbrev: "dns.id"
            bits: 16
            value: "0xabcd"
            description: "Matches the original query"
          - name: "Flags"
            abbrev: "dns.flags"
            bits: 16
            value: "0x8180"
            description: "Standard response, no error"
          - name: "Answer Name"
            abbrev: "dns.resp.name"
            bits: 0
            value: "legacy-api.example.com"
            description: "The queried hostname"
          - name: "Answer Type"
            abbrev: "dns.resp.type"
            bits: 16
            value: "AAAA (28)"
            description: "IPv6 address record — synthesized by DNS64"
            spec_refs:
              - document: "RFC 6147"
                section: "5.1.6"
                title: "DNS64 synthesizes AAAA from A record"
                url: "https://datatracker.ietf.org/doc/html/rfc6147#section-5.1.6"
          - name: "Answer Data (Synthesized)"
            abbrev: "dns.aaaa"
            bits: 128
            value: "64:ff9b::c633:6401"
            description: >
              Synthesized AAAA: prefix 64:ff9b::/96 + embedded IPv4 198.51.100.1.
              198.51.100.1 in hex = c6.33.64.01, so the full address is 64:ff9b::c633:6401.
            spec_refs:
              - document: "RFC 6052"
                section: "2.1"
                title: "IPv4-Embedded IPv6 Address Format"
                url: "https://datatracker.ietf.org/doc/html/rfc6052#section-2.1"

  # ── Phase 2: NAT64 TCP Connection ─────────────────────────────
  - id: "tcp_syn_ipv6"
    name: "TCP SYN (IPv6)"
    description: "Client sends TCP SYN over IPv6 to the synthesized address 64:ff9b::c633:6401"
    from: "client"
    to: "nat64gw"
    via: []
    timestamp_ns: 200000000
    total_bytes: 80
    color: "#3b82f6"
    headers:
      - name: "IPv6"
        abbrev: "ipv6"
        layer: 3
        total_bytes: 40
        fields:
          - name: "Version"
            abbrev: "ipv6.version"
            bits: 4
            value: 6
            description: "IPv6 — the client only speaks IPv6"
          - name: "Source Address"
            abbrev: "ipv6.src"
            bits: 128
            value: "2001:db8:1::10"
            description: "Client's IPv6 address"
          - name: "Destination Address"
            abbrev: "ipv6.dst"
            bits: 128
            value: "64:ff9b::c633:6401"
            description: >
              The synthesized address. The client treats this as a normal IPv6 address.
              It has no idea the real server is IPv4-only.
            spec_refs:
              - document: "RFC 6052"
                section: "2"
                title: "Well-Known Prefix 64:ff9b::/96"
                url: "https://datatracker.ietf.org/doc/html/rfc6052#section-2"
          - name: "Next Header"
            abbrev: "ipv6.nxt"
            bits: 8
            value: 6
            description: "TCP (6)"
          - name: "Hop Limit"
            abbrev: "ipv6.hlim"
            bits: 8
            value: 64
            description: "Hop limit"
      - name: "TCP"
        abbrev: "tcp"
        layer: 4
        total_bytes: 40
        fields:
          - name: "Source Port"
            abbrev: "tcp.srcport"
            bits: 16
            value: 49200
            description: "Ephemeral source port"
          - name: "Destination Port"
            abbrev: "tcp.dstport"
            bits: 16
            value: 443
            description: "HTTPS port"
          - name: "Sequence Number"
            abbrev: "tcp.seq"
            bits: 32
            value: 5000000
            description: "Initial Sequence Number (ISN)"
          - name: "Flags"
            abbrev: "tcp.flags"
            bits: 16
            value: "0x002"
            value_hex: "0x002"
            description: "SYN"
          - name: "Window Size"
            abbrev: "tcp.window_size"
            bits: 16
            value: 65535
            description: "Initial window size"

  - id: "tcp_syn_ipv4"
    name: "TCP SYN (IPv4 — translated)"
    description: "NAT64 gateway translates IPv6 SYN to IPv4 SYN and forwards to legacy server"
    from: "nat64gw"
    to: "server"
    via: []
    timestamp_ns: 200100000
    total_bytes: 60
    color: "#f59e0b"
    headers:
      - name: "IPv4"
        abbrev: "ip"
        layer: 3
        total_bytes: 20
        fields:
          - name: "Version"
            abbrev: "ip.version"
            bits: 4
            value: 4
            description: "IPv4 — this is now a completely normal IPv4 packet"
          - name: "Source IP"
            abbrev: "ip.src"
            bits: 32
            value: "203.0.113.50"
            description: >
              NAT64 pool address — the gateway assigns this from its IPv4 pool.
              The real server will never see the client's IPv6 address.
            spec_refs:
              - document: "RFC 6146"
                section: "3.5"
                title: "Stateful NAT64 address binding"
                url: "https://datatracker.ietf.org/doc/html/rfc6146#section-3.5"
          - name: "Destination IP"
            abbrev: "ip.dst"
            bits: 32
            value: "198.51.100.1"
            description: >
              Extracted from the last 32 bits of 64:ff9b::c633:6401.
              c633:6401 = 198.51.100.1 in dotted-decimal.
          - name: "TTL"
