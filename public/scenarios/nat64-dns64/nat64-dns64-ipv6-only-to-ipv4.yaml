# ─────────────────────────────────────────────────────────────────
# TIMELINE
# ─────────────────────────────────────────────────────────────────
timeline:
  # ── Phase 1: DNS64 Synthesizes an Address ──────────────────────
  - id: "evt_dns_query"
    type: "frame_tx"
    t_ns: 100000000
    frame_id: "dns_aaaa_query"
    annotation:
      text: "DNS AAAA Query — Client asks for IPv6 address of legacy-api.example.com"
      detail: >
        The IPv6-only client application wants to reach legacy-api.example.com.
        It calls getaddrinfo() which sends a DNS AAAA query to the configured
        DNS64 resolver at 2001:db8:1::53. The client only knows IPv6 — it asks
        for a AAAA record and expects an IPv6 address back.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              app_state: "resolving"
              dns_query: "legacy-api.example.com"
          - layer: 3
            state_fields:
              dst_ipv6: "2001:db8:1::53"

  - id: "evt_dns64_no_aaaa"
    type: "state_change"
    t_ns: 100200000
    annotation:
      text: "DNS64 checks: no AAAA record exists for legacy-api.example.com"
      detail: >
        The DNS64 resolver queries authoritative DNS and gets NODATA for the AAAA
        query — the server legacy-api.example.com has no IPv6 address. This triggers
        DNS64 behavior: the resolver will now query for an A record instead. Per
        RFC 6147, DNS64 only synthesizes when there is no real AAAA record available.
    state_after:
      - actor_id: "dns64"
        layers:
          - layer: 7
            state_fields:
              dns64_state: "no_aaaa_found"
              query_name: "legacy-api.example.com"

  - id: "evt_dns_a_upstream"
    type: "frame_tx"
    t_ns: 100500000
    frame_id: "dns_a_query_upstream"
    annotation:
      text: "DNS64 queries authoritative DNS for A record"
      detail: >
        Since no AAAA exists, the DNS64 resolver falls back to querying for an A
        record. This query goes out over the resolver's IPv4 interface to reach
        the authoritative DNS server. The DNS64 resolver itself is dual-stack — it
        needs IPv4 connectivity to reach authoritative servers for IPv4-only zones.
    state_after:
      - actor_id: "dns64"
        layers:
          - layer: 7
            state_fields:
              dns64_state: "querying_A"

  - id: "evt_dns_a_response"
    type: "frame_tx"
    t_ns: 101000000
    frame_id: "dns_a_response_upstream"
    annotation:
      text: "Authoritative DNS returns A record: 198.51.100.1"
      detail: >
        The authoritative DNS server for example.com returns the A record for
        legacy-api.example.com: 198.51.100.1. This is the server's real IPv4 address.
        Now DNS64 has the raw material it needs to synthesize an IPv6 address.
    state_after:
      - actor_id: "dns64"
        layers:
          - layer: 7
            state_fields:
              dns64_state: "synthesizing"
              real_a_record: "198.51.100.1"

  - id: "evt_dns64_synthesize"
    type: "state_change"
    t_ns: 101200000
    annotation:
      text: "DNS64 synthesizes AAAA: 64:ff9b::c633:6401 from A record 198.51.100.1"
      detail: >
        DNS64 takes the well-known prefix 64:ff9b::/96 and embeds the IPv4 address
        in the last 32 bits. 198.51.100.1 in hexadecimal is c6.33.64.01, so the
        synthesized address is 64:ff9b::c633:6401. The prefix 64:ff9b::/96 is
        reserved by IANA specifically for NAT64 (RFC 6052 Section 2.1). Any router
        seeing traffic to 64:ff9b::/96 knows it must be routed to a NAT64 gateway.
    state_after:
      - actor_id: "dns64"
        layers:
          - layer: 7
            state_fields:
              dns64_state: "synthesized"
              synthesized_aaaa: "64:ff9b::c633:6401"

  - id: "evt_dns64_response"
    type: "frame_tx"
    t_ns: 101500000
    frame_id: "dns_aaaa_response_synthesized"
    annotation:
      text: "DNS64 returns synthesized AAAA record to client"
      detail: >
        The DNS64 resolver sends the synthesized AAAA record back to the client.
        From the client's perspective, this looks exactly like a normal AAAA response.
        The client has no idea the address was synthesized — it just sees an IPv6
        address and will connect to it using normal IPv6 sockets.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              app_state: "resolved"
              resolved_address: "64:ff9b::c633:6401"
          - layer: 3
            state_fields:
              dst_ipv6: "64:ff9b::c633:6401"
      - actor_id: "dns64"
        layers:
          - layer: 7
            state_fields:
              dns64_state: "idle"

  - id: "evt_client_perspective"
    type: "state_change"
    t_ns: 101800000
    annotation:
      text: "The client thinks it is talking to an IPv6 server. It has no idea the real server is IPv4-only."
      detail: >
        This is the elegance of DNS64: the client's IPv6-only network stack is
        completely unaware of the IPv4 world behind the scenes. The application
        received a AAAA record and will now connect() to it over IPv6 just like
        any other IPv6 destination. The translation happens entirely in the network,
        invisible to the endpoints.

  # ── Phase 2: NAT64 Translates the Connection ──────────────────
  - id: "evt_tcp_syn_ipv6"
    type: "frame_tx"
    t_ns: 200000000
    frame_id: "tcp_syn_ipv6"
    annotation:
      text: "TCP SYN → Client sends IPv6 packet to 64:ff9b::c633:6401 port 443"
      detail: >
        The client application calls connect() and the kernel sends a TCP SYN to
        the synthesized address. This is a perfectly normal IPv6 packet — the client's
        TCP/IP stack has no special handling for NAT64. The packet is routed to the
        NAT64 gateway because the network is configured to route 64:ff9b::/96 there.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "SYN_SENT"
              src_port: 49200
              dst_port: 443

  - id: "evt_nat64_extract"
    type: "state_change"
    t_ns: 200050000
    annotation:
      text: "NAT64 gateway receives the IPv6 packet and recognizes the 64:ff9b::/96 prefix"
      detail: >
        The NAT64 gateway owns the 64:ff9b::/96 prefix. When it receives a packet
        destined for this prefix, it extracts the embedded IPv4 address from the
        last 32 bits: 64:ff9b::c633:6401 → c6336401 → 198.51.100.1. It then creates
        a Binding Information Base (BIB) entry to track this session.
    state_after:
      - actor_id: "nat64gw"
        layers:
          - layer: 7
            state_fields:
              nat64_state: "translating"
              active_mappings: 1
              mapping_table: "[2001:db8:1::10]:49200 ↔ 203.0.113.50:49200 → 198.51.100.1:443"
          - layer: 3
            state_fields:
              translation_direction: "IPv6 → IPv4"

  - id: "evt_tcp_syn_ipv4"
    type: "frame_tx"
    t_ns: 200100000
    frame_id: "tcp_syn_ipv4"
    annotation:
      text: "NAT64 creates an IPv4 SYN packet — new IP header, same TCP payload"
      detail: >
        The NAT64 gateway constructs a new IPv4 packet. It assigns a source IPv4
        address from its pool (203.0.113.50), sets the destination to the extracted
        address (198.51.100.1), translates the IPv6 hop limit to an IPv4 TTL
        (decremented by 1), and forwards the packet. The TCP header and payload
        are preserved — NAT64 translates at the IP layer, not the transport layer.
    state_after:
      - actor_id: "nat64gw"
        layers:
          - layer: 3
            state_fields:
              translation_direction: "IPv6 → IPv4"

  - id: "evt_tcp_syn_ack_ipv4"
    type: "frame_tx"
    t_ns: 200200000
    frame_id: "tcp_syn_ack_ipv4"
    annotation:
      text: "Legacy server responds with SYN-ACK — normal IPv4, no idea about IPv6"
      detail: >
        The legacy server at 198.51.100.1 receives a completely normal IPv4 TCP SYN
        from 203.0.113.50 (the NAT64 pool address). It responds with a standard
        SYN-ACK. The server has no awareness that the real client is on an IPv6-only
        network — from the server's perspective, this is ordinary IPv4 traffic from
        what appears to be a single IPv4 host.
    state_after:
      - actor_id: "server"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "SYN_RECEIVED"
              dst_port: 49200
          - layer: 7
            state_fields:
              perceived_client_ip: "203.0.113.50"

  - id: "evt_tcp_syn_ack_ipv6"
    type: "frame_tx"
    t_ns: 200300000
    frame_id: "tcp_syn_ack_ipv6"
    annotation:
      text: "NAT64 translates SYN-ACK back to IPv6 for the client"
      detail: >
        The NAT64 gateway looks up its mapping table: traffic from 198.51.100.1:443
        to 203.0.113.50:49200 matches the BIB entry for client [2001:db8:1::10]:49200.
        It constructs an IPv6 packet with source 64:ff9b::c633:6401 and destination
        2001:db8:1::10. The client receives a normal IPv6 SYN-ACK.
    state_after:
      - actor_id: "nat64gw"
        layers:
          - layer: 3
            state_fields:
              translation_direction: "IPv4 → IPv6"

  - id: "evt_tcp_handshake_complete"
    type: "frame_tx"
    t_ns: 200400000
    frame_id: "tcp_ack_ipv6"
    annotation:
      text: "TCP handshake complete — client sees pure IPv6, server sees pure IPv4"
      detail: >
        The client sends the final ACK, completing the 3-way handshake. The connection
        is now ESTABLISHED on both sides. The protocol boundary is crystal clear: the
        client operates entirely in IPv6, the server operates entirely in IPv4, and the
        NAT64 gateway seamlessly bridges the two worlds. Neither endpoint is aware of
        the other's IP version.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "ESTABLISHED"
      - actor_id: "server"
        layers:
          - layer: 4
            state_fields:
              tcp_state: "ESTABLISHED"

  - id: "evt_tcp_ack_ipv4_translated"
    type: "frame_tx"
    t_ns: 200500000
    frame_id: "tcp_ack_ipv4_translated"
    annotation:
      text: "ACK translated to IPv4 — server confirms ESTABLISHED state"
      detail: >
        The NAT64 gateway translates the client's ACK to IPv4 and delivers it to
        the server. Both sides are now in ESTABLISHED state and data can flow
        bidirectionally through the NAT64 translator.

  # ── Data Transfer Through NAT64 ───────────────────────────────
  - id: "evt_http_get_ipv6"
    type: "frame_tx"
    t_ns: 300000000
    frame_id: "http_get_ipv6"
    annotation:
      text: "Client sends HTTP GET over IPv6 → NAT64 translates → server receives over IPv4"
      detail: >
        The client sends an HTTP GET request for /api/v1/status. The request
        travels as a normal IPv6 packet to the NAT64 gateway, which translates
        it to IPv4 and forwards it to the legacy server. The HTTP payload is
        completely untouched — NAT64 only translates IP and ICMP headers. The
        Host header still says legacy-api.example.com.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              app_state: "request_sent"

  - id: "evt_http_get_ipv4"
    type: "frame_tx"
    t_ns: 300100000
    frame_id: "http_get_ipv4_translated"
    annotation:
      text: "HTTP GET arrives at legacy server as normal IPv4 traffic"
      detail: >
        The legacy server receives a perfectly normal IPv4 HTTP GET request from
        203.0.113.50. The server's access logs will show this NAT64 pool address
        as the client IP. If the server needs the real client address, the network
        can use mechanisms like Proxy Protocol or X-Forwarded-For headers (but that
        requires application-layer awareness).

  - id: "evt_http_response_ipv4"
    type: "frame_tx"
    t_ns: 300500000
    frame_id: "http_response_ipv4"
    annotation:
      text: "Legacy server responds with HTTP 200 OK over IPv4"
      detail: >
        The server processes the API request and sends back a JSON response over
        IPv4. This response is addressed to 203.0.113.50 — the NAT64 pool address.
        The server side of this connection is completely standard IPv4 throughout.
    state_after:
      - actor_id: "server"
        layers:
          - layer: 7
            state_fields:
              app_state: "response_sent"

  - id: "evt_http_response_ipv6"
    type: "frame_tx"
    t_ns: 300600000
    frame_id: "http_response_ipv6_translated"
    annotation:
      text: "NAT64 translates response back to IPv6 — client receives it seamlessly"
      detail: >
        The NAT64 gateway translates the IPv4 response packet back to IPv6 using its
        mapping table and delivers it to the client. The client receives a normal
        IPv6 HTTP 200 OK response. The entire transaction — DNS resolution, TCP
        handshake, HTTP request/response — happened without the client ever touching IPv4.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 7
            state_fields:
              app_state: "response_received"

  # ── ICMPv6 ↔ ICMP Translation ─────────────────────────────────
  - id: "evt_icmpv6_echo"
    type: "frame_tx"
    t_ns: 400000000
    frame_id: "icmpv6_echo_request"
    annotation:
      text: "ICMPv6 Echo Request — client pings the synthesized address"
      detail: >
        NAT64 does not only translate TCP and UDP. It also handles ICMP ↔ ICMPv6
        translation. The client sends an ICMPv6 Echo Request (type 128) to the
        synthesized address. NAT64 must translate this to an ICMPv4 Echo Request
        (type 8), because ICMPv6 and ICMPv4 use different type/code numbering.

  - id: "evt_icmp_echo_translated"
    type: "frame_tx"
    t_ns: 400100000
    frame_id: "icmp_echo_request_translated"
    annotation:
      text: "NAT64 translates ICMPv6 type 128 → ICMPv4 type 8 (Echo Request)"
      detail: >
        The NAT64 gateway translates both the IP header and the ICMP header.
        ICMPv6 type 128 (Echo Request) becomes ICMPv4 type 8 (Echo Request).
        The echo identifier and sequence number are preserved for mapping the reply.
        This translation is defined in RFC 6145 Section 5.2 (IP/ICMP Translation).

  - id: "evt_icmp_echo_reply"
    type: "frame_tx"
    t_ns: 400200000
    frame_id: "icmp_echo_reply"
    annotation:
      text: "Legacy server sends ICMP Echo Reply (IPv4)"
      detail: >
        The server responds with a standard ICMPv4 Echo Reply (type 0) to the
        NAT64 pool address. This is completely normal IPv4 ICMP behavior.

  - id: "evt_icmpv6_echo_reply"
    type: "frame_tx"
    t_ns: 400300000
    frame_id: "icmpv6_echo_reply_translated"
    annotation:
      text: "NAT64 translates ICMPv4 type 0 → ICMPv6 type 129 (Echo Reply) — ping succeeds"
      detail: >
        The NAT64 gateway translates the ICMPv4 Echo Reply (type 0) back to an
        ICMPv6 Echo Reply (type 129) and delivers it to the client. The ping
        completes successfully. The client's ping utility shows a response from
        64:ff9b::c633:6401 — it never sees the IPv4 address 198.51.100.1.

  # ── Phase 3: 464XLAT for Legacy Apps ───────────────────────────
  - id: "evt_464xlat_problem"
    type: "state_change"
    t_ns: 500000000
    annotation:
      text: "Some legacy apps hardcode IPv4 addresses (e.g., connect to '192.168.1.1' directly)"
      detail: >
        NAT64/DNS64 works perfectly for well-behaved applications that use hostnames
        and DNS. But some legacy applications hardcode IPv4 address literals — they
        call connect("192.168.1.1") directly without DNS. Since the client has no
        IPv4 address or IPv4 routing, these connections fail. This is where 464XLAT
        comes in.

  - id: "evt_464xlat_clat"
    type: "state_change"
    t_ns: 500500000
    annotation:
      text: "CLAT (Customer-side translator) on the client provides a local IPv4 interface"
      detail: >
        464XLAT (RFC 6877) adds a stateless translator called CLAT on the client.
        CLAT creates a virtual IPv4 interface (e.g., v4-wlan0) with a local IPv4
        address from the 192.0.0.0/29 range. When a legacy app sends an IPv4 packet,
        CLAT translates it to IPv6 using the NAT64 prefix. The packet then flows
        to the PLAT (Provider-side translator, which is the NAT64 gateway), which
        translates it back to IPv4 for the destination.
    state_after:
      - actor_id: "client"
        layers:
          - layer: 3
            state_fields:
              protocol_view: "IPv6-only (with CLAT virtual IPv4)"

  - id: "evt_464xlat_double_translation"
    type: "state_change"
    t_ns: 501000000
    annotation:
      text: "Double translation: App → IPv4 → CLAT → IPv6 → NAT64 (PLAT) → IPv4"
      detail: >
        The 464XLAT name describes the journey: the app generates an IPv4 packet (4),
        CLAT translates it to IPv6 (6), and the PLAT/NAT64 gateway translates it
        back to IPv4 (4). Hence "464". The first translation is stateless (CLAT, using
        SIIT from RFC 7915), and the second is stateful (NAT64/PLAT, using RFC 6146).
        Despite the double translation, this works at line rate on modern hardware.
    state_after:
      - actor_id: "nat64gw"
        layers:
          - layer: 7
            state_fields:
              nat64_state: "translating (464XLAT)"
              active_mappings: 2

  - id: "evt_464xlat_deployed"
    type: "state_change"
    t_ns: 502000000
    annotation:
      text: "464XLAT handles the edge cases. Android has used this since 2014 for IPv6-only mobile networks."
      detail: >
        464XLAT is not theoretical — it runs at massive scale today. Android has
        included CLAT (clatd) since version 4.3, enabling IPv6-only mobile networks
        on T-Mobile, Reliance Jio, and hundreds of other carriers. Apple added CLAT
        support in iOS 12.  Together, NAT64/DNS64 handles well-behaved applications
        and 464XLAT handles the rest, enabling true IPv6-only operation while
        maintaining full IPv4 internet reachability.

# ─────────────────────────────────────────────────────────────────
# GLOSSARY
# ─────────────────────────────────────────────────────────────────
glossary:
  - term: "NAT64"
    abbrev: "Network Address Translation 64"
    definition: "A stateful translation mechanism that allows IPv6-only clients to communicate with IPv4-only servers. The NAT64 gateway translates between IPv6 and IPv4 packet headers, maintaining session state (BIB entries) to map connections bidirectionally."
    spec_refs:
      - document: "RFC 6146"
        section: "1"
        title: "Stateful NAT64"
        url: "https://datatracker.ietf.org/doc/html/rfc6146#section-1"

  - term: "DNS64"
    definition: "A DNS extension that synthesizes AAAA (IPv6) records from A (IPv4) records when no native AAAA exists. DNS64 uses the NAT64 prefix (typically 64:ff9b::/96) to embed the IPv4 address in a synthesized IPv6 address, enabling IPv6-only clients to resolve IPv4-only hostnames."
    spec_refs:
      - document: "RFC 6147"
        section: "1"
        title: "DNS64"
        url: "https://datatracker.ietf.org/doc/html/rfc6147#section-1"

  - term: "Well-Known Prefix"
    abbrev: "64:ff9b::/96"
    definition: "The IANA-reserved IPv6 prefix used by NAT64. The last 32 bits of an address in this prefix contain the embedded IPv4 address. For example, 64:ff9b::c633:6401 embeds IPv4 address 198.51.100.1 (c6=198, 33=51, 64=100, 01=1)."
    spec_refs:
      - document: "RFC 6052"
        section: "2.1"
        title: "Well-Known Prefix"
        url: "https://datatracker.ietf.org/doc/html/rfc6052#section-2.1"

  - term: "464XLAT"
    definition: "A combination of a stateless CLAT (Customer-side translator) and a stateful PLAT (Provider-side translator / NAT64) that enables IPv4 literal traffic to traverse an IPv6-only network. The packet undergoes double translation: IPv4 → IPv6 (CLAT) → IPv4 (PLAT). Used by Android since 2014 and iOS since iOS 12."
    spec_refs:
      - document: "RFC 6877"
        section: "1"
        title: "464XLAT"
        url: "https://datatracker.ietf.org/doc/html/rfc6877#section-1"

  - term: "CLAT"
    abbrev: "Customer-side Translator"
    definition: "The client-side component of 464XLAT. A stateless NAT46 translator (SIIT, RFC 7915) that runs on the end-user device, providing a virtual IPv4 interface for legacy applications. Translates outgoing IPv4 packets to IPv6 using the NAT64 prefix."

  - term: "PLAT"
    abbrev: "Provider-side Translator"
    definition: "The network-side component of 464XLAT — this is the NAT64 gateway. Performs stateful translation from IPv6 back to IPv4 for delivery to IPv4-only servers. In a 464XLAT deployment, the PLAT is the same NAT64 gateway used for DNS64-based translation."

  - term: "BIB"
    abbrev: "Binding Information Base"
    definition: "The state table maintained by a stateful NAT64 gateway. Each entry maps an IPv6 transport address (IPv6 address + port) to an IPv4 transport address (IPv4 pool address + port). BIB entries are created when new sessions are established and expire after inactivity."
    spec_refs:
      - document: "RFC 6146"
        section: "3.1"
        title: "Binding Information Base"
        url: "https://datatracker.ietf.org/doc/html/rfc6146#section-3.1"

  - term: "Synthesized AAAA Record"
    definition: "A DNS AAAA record created by a DNS64 resolver by combining the NAT64 prefix with an IPv4 address. The client receives this as a normal AAAA response and is unaware the address was synthesized. Only created when no native AAAA record exists."

  - term: "IPv6-Only Network"
    definition: "A network that carries only IPv6 traffic — no IPv4 addresses are assigned to hosts. Requires NAT64/DNS64 (and optionally 464XLAT) to maintain access to IPv4-only internet resources. Mandated for US federal agencies by OMB M-21-07."

  - term: "SIIT"
    abbrev: "Stateless IP/ICMP Translation"
    definition: "A stateless algorithm for translating between IPv4 and IPv6 packet headers, defined in RFC 7915. Used by CLAT in 464XLAT for client-side translation. Unlike NAT64, SIIT does not maintain per-session state."
    spec_refs:
      - document: "RFC 7915"
        section: "4"
        title: "Translating from IPv4 to IPv6"
        url: "https://datatracker.ietf.org/doc/html/rfc7915#section-4"

# ─────────────────────────────────────────────────────────────────
# WALKTHROUGHS
# ─────────────────────────────────────────────────────────────────
walkthroughs:
  - id: "default"
    title: "NAT64/DNS64: Bridging IPv6-Only Clients to the IPv4 Internet"
    description: "Walk through DNS64 address synthesis, NAT64 stateful translation, ICMP mapping, and 464XLAT for legacy applications"
    steps:
      - step: 0
        narration: >
          OMB M-21-07 requires federal agencies to operate IPv6-only networks by
          2025. But the IPv4 internet is not going away anytime soon — there are
          still millions of IPv4-only servers. How does an IPv6-only client reach
          them? The answer is NAT64 and DNS64, working together to make the IPv4
          world accessible from IPv6-only networks without the client ever needing
          an IPv4 address.
        highlight_fields: []

      - step: 1
        narration: >
          Our IPv6-only client wants to reach legacy-api.example.com. The
          application calls getaddrinfo(), which sends a DNS AAAA query to the
          DNS64 resolver. The client asks for an IPv6 address — it only speaks
          IPv6 and has no idea whether the server is IPv4 or IPv6. Notice the
          query type is AAAA (28), requesting a 128-bit IPv6 address.
        highlight_fields: ["dns.qry.name", "dns.qry.type"]

      - step: 2
        narration: >
          The DNS64 resolver checks authoritative DNS and finds no AAAA record for
          legacy-api.example.com. This is the trigger for DNS64 behavior: since
          there is no native IPv6 address, the resolver queries for an A record
          instead. It gets back 198.51.100.1 — confirming this is an IPv4-only
          server. Per RFC 6147, DNS64 only synthesizes when no real AAAA exists,
          so dual-stack servers with native AAAA records are unaffected.
        highlight_fields: ["dns.qry.type", "dns.a"]

      - step: 3
        narration: >
          Now the magic of DNS64: it takes the well-known prefix 64:ff9b::/96
          (RFC 6052) and embeds the IPv4 address in the last 32 bits. 198.51.100.1
          in hexadecimal is c6.33.64.01, so the synthesized address is
          64:ff9b::c633:6401. The client receives this as a normal AAAA response
          and stores it as the server's IPv6 address. The client has no idea this
          address was manufactured seconds ago from an IPv4 address.
        highlight_fields: ["dns.aaaa", "dns.resp.type"]

      - step: 4
        narration: >
          The client connects to the synthesized address like any normal IPv6
          destination. It sends a TCP SYN to 64:ff9b::c633:6401 port 443. This is
          a standard IPv6 packet — the client's TCP/IP stack has zero special
          handling for NAT64. The network routes packets destined for 64:ff9b::/96
          to the NAT64 gateway, just like any other prefix route.
        highlight_fields: ["ipv6.dst", "tcp.flags", "tcp.dstport"]

      - step: 5
        narration: >
          The NAT64 gateway receives the IPv6 SYN and recognizes the 64:ff9b::/96
          prefix. It extracts the embedded IPv4 address (198.51.100.1) from the
          last 32 bits, assigns a source IPv4 address from its pool (203.0.113.50),
          and creates a Binding Information Base (BIB) entry to track this session.
          It then constructs a brand new IPv4 SYN packet — same TCP payload, but
          with IPv4 headers replacing the IPv6 headers.
        highlight_fields: ["ip.src", "ip.dst", "tcp.seq"]

      - step: 6
        narration: >
          The legacy server at 198.51.100.1 receives a completely normal IPv4 TCP
          SYN from 203.0.113.50. It has no idea the real client is on an IPv6-only
          network. It responds with a standard SYN-ACK, just as it would for any
          IPv4 client. This is the beauty of NAT64 — the server requires zero
          modifications. It could be a 20-year-old application that has never heard
          of IPv6.
        highlight_fields: ["ip.src", "ip.dst", "tcp.flags"]

      - step: 7
        narration: >
          The NAT64 gateway translates the SYN-ACK back to IPv6 using its mapping
          table. The source becomes 64:ff9b::c633:6401 (the synthesized address),
          and the destination is the client's real IPv6 address 2001:db8:1::10.
          The client receives what looks like a perfectly normal IPv6 SYN-ACK.
          The TCP handshake completes with the client in pure IPv6 and the server
          in pure IPv4 — the protocol boundary is completely invisible to both.
        highlight_fields: ["ipv6.src", "ipv6.dst", "tcp.flags"]

      - step: 8
        narration: >
          With the connection established, data flows freely. The client sends an
          HTTP GET over IPv6 to the NAT64 gateway, which translates it to IPv4 and
          forwards it to the legacy server. The HTTP payload — headers, body,
          everything — passes through completely untouched. NAT64 only translates
          IP headers and ICMP; application data is preserved bit-for-bit.
        highlight_fields: ["http.request.method", "http.request.uri"]

      - step: 9
        narration: >
          The legacy server processes the request and returns an HTTP 200 OK over
          IPv4. The response flows back through the NAT64 gateway, which translates
          it to IPv6 and delivers it to the client. End to end, the client made a
          standard IPv6 HTTPS request and got a standard IPv6 HTTPS response. The
          fact that the server was IPv4-only is entirely hidden by the network.
        highlight_fields: ["http.response.code"]

      - step: 10
        narration: >
          NAT64 also handles ICMP. When the client pings the synthesized address,
          it sends an ICMPv6 Echo Request (type 128). The NAT64 gateway must
          translate not just the IP header, but also the ICMP type and code values,
          because ICMPv6 and ICMPv4 use different numbering. Type 128 (ICMPv6 Echo
          Request) becomes type 8 (ICMPv4 Echo Request).
        highlight_fields: ["icmpv6.type", "icmp.type"]

      - step: 11
        narration: >
          The ICMP Echo Reply flows back through the same translation: ICMPv4
          type 0 (Echo Reply) becomes ICMPv6 type 129 (Echo Reply). The client's
          ping utility shows a response from 64:ff9b::c633:6401 — it never sees
          the real IPv4 address. This ICMP translation is critical for network
          diagnostics and Path MTU Discovery to work across the NAT64 boundary.
        highlight_fields: ["icmpv6.type", "icmp.type"]

      - step: 12
        narration: >
          NAT64/DNS64 covers about 95% of real-world traffic. But some legacy
          applications hardcode IPv4 address literals — they call connect("192.168.1.1")
          directly without DNS. These break on IPv6-only networks because there
          is no DNS step for DNS64 to intercept. This is where 464XLAT (RFC 6877)
          comes in.
        highlight_fields: []

      - step: 13
        narration: >
          464XLAT adds a CLAT (Customer-side translator) on the client device. CLAT
          creates a virtual IPv4 interface and performs stateless translation: the
          legacy app sends IPv4, CLAT converts it to IPv6 using the NAT64 prefix,
          the packet traverses the IPv6-only network to the NAT64 gateway (PLAT),
          which converts it back to IPv4. The "464" name describes this journey:
          IPv4 → IPv6 → IPv4.
        highlight_fields: []

      - step: 14
        narration: >
          464XLAT is not a niche solution — it runs at enormous scale today.
          Android has included CLAT (clatd) since version 4.3 (2013), and Apple
          added CLAT in iOS 12. T-Mobile, Reliance Jio, and hundreds of other
          mobile carriers operate IPv6-only networks with NAT64 and 464XLAT,
          serving billions of devices. This is production-proven technology.
        highlight_fields: []

      - step: 15
        narration: >
          Let us recap the full picture. NAT64/DNS64 is how you run an IPv6-only
          network without breaking access to the IPv4 internet. The client never
          needs an IPv4 address — this is true IPv6-only operation. DNS64 makes
          IPv4-only servers appear as IPv6 destinations. NAT64 translates packets
          at the network boundary. 464XLAT handles the last 5% of apps that refuse
          to work with DNS. 64:ff9b::/96 is the well-known prefix reserved for
          NAT64 (RFC 6052). Together, these technologies are the foundation of the
          federal IPv6-only mandate and the future of Internet addressing.
        highlight_fields: []
