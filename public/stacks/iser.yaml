id: iser
name: iSER (RoCE)
family: block-scsi
alignment: osi

summary: >
  iSCSI Extensions for RDMA over RoCEv2. Keeps the iSCSI control plane
  (login, parameter negotiation) but tunnels SCSI CDBs and data through
  RDMA verbs instead of TCP. Default deployment carries RDMA over
  RoCEv2 (UDP/IP on a lossless Ethernet fabric).

spec_refs:
  - document: "RFC 7145"
    title: "iSCSI Extensions for RDMA Specification"
    url: "https://www.rfc-editor.org/rfc/rfc7145"
  - document: "RFC 7143"
    title: "iSCSI Protocol (RFC 3720 successor)"
  - document: "IBTA RoCEv2 (Annex A17)"
    title: "InfiniBand Architecture Specification, RoCEv2"

layers:
  osi-l7:
    component_id: block-device

  osi-l6:
    component_id: scsi
    notes: "SCSI command set; CDBs flow through iSCSI control PDUs while data moves via RDMA."

  osi-l5:
    component_id: iscsi
    notes: "iSER reuses iSCSI's session: login + Full Feature Phase, but data-transfer is redirected to RDMA verbs (RFC 7145)."

  rdma-verbs:
    component_id: rdma-verbs
    notes: "iSER tunnels SCSI Read/Write through RDMA Read/Write; control PDUs ride on RDMA SEND/RECV."

  osi-l4:
    component_id: udp
    notes: "RoCEv2 carries verbs traffic in UDP/IP (port 4791). Routable across IP subnets."

  osi-l3:
    component_id: ip
    notes: "RoCEv2 packets are standard UDP/IP. (RoCEv1 used a raw Ethertype with no IP — out of scope here.)"

  osi-l2:
    component_id: dcb
    notes: "RoCE requires a lossless fabric. PFC at minimum; ECN typically combined with DCQCN for congestion control."

  osi-l1:
    component_id: gbe-phy

optional_layers:
  - id: net-virt-row
    name: Network Virtualization
    position: between-osi-l2-osi-l1
    description: "Overlay networks add encapsulation overhead and complicate PFC/ECN behavior; deploy with care."
  - id: sr-iov-row
    name: SR-IOV
    position: between-osi-l2-osi-l1
    description: "Common on RoCE-enabled NICs to expose verbs to VMs directly."

scenarios:
  - id: iser-login-rdma-write
    label: "iSER Login + RDMA Data Transfer"

metadata:
