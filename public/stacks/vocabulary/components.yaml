# StackBuilder component vocabulary
#
# Canonical components stacks can reference. Each entry has:
#   - a stable id (used by stack YAML files)
#   - a display name
#   - a color token (resolved by the renderer's theme)
#   - aliases (alternate names contributors might use; validator resolves them)
#   - default spec_refs (overridable per-cell in stack files)
#   - a definition (shown in the cell detail panel; also used as fallback
#     popup text when a stack cell omits per-layer notes)
#
# Color tokens are semantic, not hex. Themes provide the actual colors.
# Adding a new component is a PR. Adding a new alias is also a PR but cheaper.

components:

  # ── L7 / Application ─────────────────────────────────────────────────────
  - id: block-device
    name: Block Device
    color: neutral
    aliases: ["Block", "Block Storage", "BlockDev"]
    definition: >
      The OS-level block device abstraction (e.g. /dev/sd*, /dev/nvme*).
      Strictly the L7 protocol is the command set (NVMe, SCSI); "Block
      Device" is the OS-level surface layered on top. Shown at L7 across
      block-storage stacks as a unifying header — a pedagogical convenience,
      not a literal protocol entity.

  - id: file-system
    name: File System
    color: neutral
    aliases: ["Filesystem", "FS"]
    definition: >
      The OS-level file abstraction (open, read, write, close on named
      paths). Like Block Device, this is the consumer of the file-sharing
      protocol (NFS, SMB), not part of the protocol itself.

  - id: object-api
    name: Object API
    color: neutral
    aliases: ["S3", "HTTP Object", "Object", "Swift", "Azure Blob"]
    definition: >
      Object storage interfaces (S3, Swift, Azure Blob) exposed as REST
      APIs over HTTP/HTTPS. Object create/get/delete is mapped onto HTTP
      verbs; payload is opaque to the protocol.

  # ── L7 / Application protocols (file/object) ────────────────────────────
  - id: smb-app
    name: SMB (v2, v3)
    color: smb
    aliases: ["SMB", "CIFS", "SMB3"]
    definition: >
      Server Message Block file-sharing protocol. SMB 3.x adds SMB Direct
      (RDMA), SMB Multichannel, and per-share encryption. Sits at L7 in
      the canonical OSI mapping (the OS file-system surface above is the
      consumer, not part of SMB itself).

  - id: nfs-app
    name: NFS
    color: nfs
    aliases: ["NFSv3", "NFSv4", "NFSv4.1", "NFSv4.2"]
    definition: >
      Network File System. v3 uses RPC/XDR over UDP or TCP. v4.x integrates
      session, state, and security; pNFS adds parallel data paths. Sits at
      L7 — the file-system surface above is the consumer, not part of NFS.

  - id: xdr
    name: XDR
    color: nfs-aux
    aliases: ["External Data Representation"]
    definition: >
      Wire-format encoding used by NFS and Sun RPC (RFC 4506). Defines how
      integers, strings, opaque data, and structures serialize on the wire.
      Sits at L6 (Presentation) in the canonical NFS layering.

  - id: rpc
    name: RPC
    color: nfs-aux
    aliases: ["ONC RPC", "Sun RPC"]
    definition: >
      ONC Remote Procedure Call (RFC 5531). Carries XDR-encoded arguments
      and replies for NFS and other Sun-RPC services. Provides
      authentication via RPCSEC_GSS. Sits at L5 (Session) in the canonical
      NFS layering.

  # ── L6 / Presentation-ish (command sets) ─────────────────────────────────
  - id: nvme
    name: NVMe
    color: nvme
    aliases: ["NVM Express"]
    definition: >
      NVM Express command set and queueing model. In NVMe-oF, NVMe is the
      command layer; a binding (TCP, RDMA, FC) carries the commands and
      data over a fabric. Pedagogically shown at L6/ULP — strict OSI would
      put the command set at L7.
    spec_refs:
      - document: "NVMe Base Specification 2.0"
        url: "https://nvmexpress.org/specifications/"

  - id: scsi
    name: SCSI
    color: scsi
    aliases: ["SCSI Architecture"]
    definition: >
      Small Computer System Interface command set. Commands flow as CDBs
      (Command Descriptor Blocks). Transports include FCP (over FC),
      iSCSI (over TCP/IP), iSER (over RDMA), and SAS.
    spec_refs:
      - document: "INCITS SAM-5"
        title: "SCSI Architecture Model - 5"
      - document: "INCITS SBC-4"
        title: "SCSI Block Commands - 4"

  # ── L5 / Session ─────────────────────────────────────────────────────────
  - id: nvme-tcp-binding
    name: NVMe/TCP
    color: nvme
    aliases: ["NVMe over TCP", "NVMe/TCP Binding"]
    definition: >
      The NVMe-oF binding that frames NVMe commands and data inside TCP
      using PDUs. Adds a discovery flow (CDC) and per-queue connections.
    spec_refs:
      - document: "NVMe-oF 1.1"
        section: "TCP Transport"

  - id: nvme-rdma-binding
    name: NVMe over RDMA
    color: nvme
    aliases: ["NVMe/RDMA"]
    definition: >
      The NVMe-oF binding that uses RDMA verbs (over RoCE, iWARP, or
      InfiniBand) to carry NVMe Capsules and data with zero-copy transfers.

  - id: smb-session
    name: SMB Session Service
    color: smb
    aliases: ["NetBIOS Session Service"]
    definition: >
      Session-layer framing for SMB. On modern deployments runs directly
      over TCP port 445 (or over RDMA verbs in SMB Direct).

  - id: iscsi
    name: iSCSI
    color: iscsi
    aliases: ["iSCSI Layer"]
    definition: >
      Internet SCSI. Encapsulates SCSI CDBs in PDUs over TCP. Login phase
      negotiates session parameters; full-feature phase carries I/O. iSER
      reuses iSCSI's control plane and tunnels data through RDMA verbs.
    spec_refs:
      - document: "RFC 7143"
        title: "Internet Small Computer System Interface (iSCSI) Protocol"

  - id: scsi-fcp
    name: SCSI-FCP
    color: scsi
    aliases: ["FCP", "SCSI over FC"]
    definition: >
      The FC-4 mapping that carries SCSI CDBs over Fibre Channel. Uses FC
      sequences and exchanges; relies on FC-2 for ordering and delivery.

  - id: nvme-fc
    name: NVMe-FC
    color: nvme
    aliases: ["NVMe over FC", "FC-NVMe"]
    definition: >
      The FC-4 mapping that carries NVMe Capsules over Fibre Channel.
      Standardized in INCITS T11 FC-NVMe-2; coexists with SCSI-FCP traffic
      on the same FC fabric.
    spec_refs:
      - document: "INCITS T11 FC-NVMe-2"

  - id: http
    name: HTTP
    color: http
    aliases: ["HTTPS", "HTTP/1.1", "HTTP/2"]
    definition: >
      HyperText Transfer Protocol. Stateless request/response framing for
      object-storage APIs (S3, Swift, Azure Blob). HTTPS wraps HTTP in
      TLS at the same logical layer; HTTP/2 multiplexes streams over a
      single TCP connection.
    spec_refs:
      - document: "RFC 9110"
        title: "HTTP Semantics"

  # ── Verbs (interlayer between L5 and L4) ─────────────────────────────────
  - id: rdma-verbs
    name: RDMA Verbs
    color: rdma
    aliases: ["IB Verbs", "Verbs"]
    definition: >
      The RDMA programming surface. Sits as an interlayer between L5
      (binding/session) and L4 (transport): the transport carrier varies
      by RDMA flavor (UDP for RoCEv2, TCP for iWARP, native IB transport
      for InfiniBand). Stacks like SMB Direct, NFS over RDMA, NVMe over
      RDMA, and iSER all submit work via verbs.
    spec_refs:
      - document: "IBTA Vol 1"
        title: "InfiniBand Architecture Specification"

  - id: iser
    name: iSER
    color: iscsi
    aliases: ["iSCSI Extensions for RDMA"]
    definition: >
      iSCSI Extensions for RDMA. Replaces the iSCSI data-transfer path with
      RDMA reads and writes while keeping the iSCSI control plane. In our
      diagrams "iSER" is the column identity; the L5 component is iSCSI.
    spec_refs:
      - document: "RFC 7145"
        title: "iSCSI Extensions for RDMA Specification"

  # ── L4 / Transport ───────────────────────────────────────────────────────
  - id: tcp
    name: TCP
    color: tcp
    aliases: ["Transmission Control Protocol"]
    definition: >
      Reliable, ordered byte stream. Used by iSCSI, NVMe/TCP, NFS/TCP,
      SMB, HTTP-based object protocols, and as the carrier for iWARP RDMA.
    spec_refs:
      - document: "RFC 9293"
        title: "Transmission Control Protocol (TCP)"

  - id: udp
    name: UDP
    color: udp
    aliases: ["User Datagram Protocol"]
    definition: >
      Unreliable datagram service. Used as the outer carrier for RoCEv2
      (UDP/IP wraps the IBTA transport), and historically by NFSv3.
    spec_refs:
      - document: "RFC 768"

  - id: ib-transport
    name: IB Transport
    color: rdma
    aliases: ["InfiniBand Transport"]
    definition: >
      InfiniBand Transport Layer. Provides reliable connection (RC),
      reliable datagram (RD), unreliable datagram (UD), and other
      service types. The native carrier for IB-attached RDMA stacks.
    spec_refs:
      - document: "IBTA Vol 1, Chapter 9"

  # ── L3 / Network ─────────────────────────────────────────────────────────
  - id: ip
    name: IP
    color: ip
    aliases: ["IPv4", "IPv6", "Internet Protocol"]
    definition: >
      Internet Protocol. Routes packets across networks. Both IPv4 and
      IPv6 are in active production use across storage networks.

  - id: fc-fs
    name: FC-FS
    color: fc
    aliases: ["FC Framing and Signaling"]
    definition: >
      FC Framing and Signaling. The FC-2 layer specification covering
      frame format, sequences, exchanges, and flow control. Authenticated
      encryption is defined by the FC-SP-3 standard, which attaches an
      ESP_Header to FC-2 frames (AES-256-GCM).
    spec_refs:
      - document: "INCITS T11 FC-FS-5"

  - id: fc-discovery
    name: NVMe Discovery
    color: fc
    aliases: ["FC-NVMe Discovery", "Discovery Service"]
    definition: >
      FC-3 service used by FC-NVMe-2 for host/subsystem discovery and
      naming. Distinct from generic FC-GS-7 services; specific to NVMe
      hosts establishing connections to NVM subsystems on the FC fabric.
    spec_refs:
      - document: "INCITS T11 FC-NVMe-2"

  - id: ib-network
    name: IB Network
    color: ip
    aliases: ["InfiniBand Network Layer"]
    definition: >
      InfiniBand Network Layer (Local Routing Header / Global Routing
      Header). Routes packets between IB subnets (analogous to IP at L3).
    spec_refs:
      - document: "IBTA Vol 1, Chapter 8"

  # ── L2 / Data Link ───────────────────────────────────────────────────────
  - id: ethernet
    name: Ethernet (DCB optional)
    color: ethernet
    aliases: ["Ethernet"]
    definition: >
      Layer-2 Ethernet framing. DCB (Data Center Bridging) extensions —
      Priority Flow Control (PFC), Enhanced Transmission Selection (ETS),
      DCBX — are optional on this stack. NVMe/TCP, iSCSI, SMB-over-TCP,
      and NFS-over-TCP do not require lossless behavior.

  - id: dcb
    name: Ethernet + DCB
    color: ethernet
    aliases: ["Data Center Bridging", "DCB Ethernet", "DCB"]
    definition: >
      Layer-2 Ethernet with DCB (Data Center Bridging) extensions enabled
      and required. PFC at minimum; ETS and DCBX commonly deployed; ECN
      paired with DCQCN for congestion control. Required for RoCE; was
      required for FCoE. The L2 frame is still Ethernet — DCB is a feature
      set, not a separate protocol.

  - id: ib-link
    name: IB Link
    color: ethernet
    aliases: ["InfiniBand Link Layer"]
    definition: >
      InfiniBand Link Layer. Provides credit-based flow control,
      virtual lanes, and link-level error detection. Lossless by design —
      analogous to Ethernet+DCB but native to InfiniBand fabrics.
    spec_refs:
      - document: "IBTA Vol 1, Chapter 7"

  - id: fc-encode
    name: Encode/Decode
    color: fc
    aliases: ["FC Encoding", "8b/10b", "64b/66b", "256b/257b"]
    definition: >
      FC-1 transmission encoding. 8b/10b for 1/2/4/8GFC (legacy); 64b/66b for
      10/16/32GFC; 256b/257b transcoding combined with RS-FEC for 64GFC and
      above (Gen 7).

  # ── L1 / Physical ────────────────────────────────────────────────────────
  - id: gbe-phy
    name: 10/25/40/50/100 GbE
    color: phy
    aliases: ["GbE", "Ethernet Physical", "Ethernet PHY"]
    definition: >
      Ethernet physical layer. Modern storage networks span 10G through
      400G; 25G/100G are the volume tiers in 2025-2026.

  - id: ib-phy
    name: InfiniBand
    color: phy
    aliases: ["IB", "InfiniBand Physical"]
    definition: >
      InfiniBand physical layer. HDR (200G), NDR (400G), XDR (800G).
      Native transport for IB-RDMA stacks.

  - id: fc-phy
    name: 1/2/4/...128G FC
    color: phy
    aliases: ["FC Physical", "GFC"]
    definition: >
      Fibre Channel physical layer. Speeds from 1GFC through 128GFC.
      Optical (SFP+, SFP28, QSFP) and copper (DAC) media.

  # ── Optional / Cross-cutting ─────────────────────────────────────────────
  - id: net-virt
    name: Network Virtualization
    color: optional
    aliases: ["Overlay", "VXLAN", "Geneve"]
    definition: >
      Optional overlay networks (VXLAN, Geneve, NVGRE) decoupling tenant
      L2/L3 from the physical underlay. Architecturally these create a
      virtualized L2 ABOVE an underlay L3 — pedagogically rendered between
      L2 and L1 here for visual parallelism with the brasstacksblog
      reference diagram, not because that placement is topologically exact.

  - id: sr-iov
    name: SR-IOV
    color: optional
    aliases: ["Single Root I/O Virtualization"]
    definition: >
      PCIe Single Root I/O Virtualization. Lets a single physical NIC or
      HBA expose multiple Virtual Functions to VMs, bypassing the
      hypervisor for data-plane traffic. SR-IOV is a PCIe capability, not
      a network protocol layer — shown band-aligned with Network
      Virtualization for visual continuity with the reference diagram.

  - id: npiv
    name: NPIV
    color: optional
    aliases: ["N_Port ID Virtualization"]
    definition: >
      N_Port ID Virtualization. Lets a single FC HBA log in as multiple
      virtual N_Ports, enabling per-VM zoning and LUN masking. Technically
      an FC-2 addressing capability (multiple WWPNs per N_Port); shown
      band-aligned with Network Virtualization here for cross-stack
      pedagogical parallel, not because NPIV literally lives between
      FC-1 and FC-0.
