id: smb-direct-iwarp
name: SMB Direct (iWARP)
family: file
alignment: osi

summary: >
  SMB Direct over iWARP. iWARP layers RDMA semantics (RDMAP/DDP/MPA)
  on top of TCP, so it runs on standard Ethernet without DCB. Trades a
  little CPU efficiency for routability and lossy-network tolerance.

spec_refs:
  - document: "MS-SMBD"
    title: "SMB2 Remote Direct Memory Access (RDMA) Transport Protocol"
  - document: "RFC 5040"
    title: "A Remote Direct Memory Access Protocol Specification"
  - document: "RFC 5044"
    title: "Marker PDU Aligned Framing for TCP (MPA)"

layers:
  osi-l7:
    component_id: smb-app

  osi-l5:
    component_id: smb-session
    notes: "SMB Direct semantics identical to the RoCE variant; the difference is the underlying RDMA carrier."

  rdma-verbs:
    component_id: rdma-verbs
    notes: "iWARP exposes the same verbs API; under the hood RDMAP/DDP/MPA frame on top of TCP."

  osi-l4:
    component_id: tcp
    notes: "iWARP runs over a normal TCP connection (with MPA framing). Tolerant of lossy networks; routable across subnets."

  osi-l3:
    component_id: ip

  osi-l2:
    component_id: ethernet
    notes: "Standard Ethernet — iWARP does not require DCB."

  osi-l1:
    component_id: gbe-phy

optional_layers:
  - id: net-virt-row
    name: Network Virtualization
    position: between-osi-l2-osi-l1
    description: "Overlay tolerated more easily by iWARP than RoCE since iWARP doesn't depend on PFC."
  - id: sr-iov-row
    name: SR-IOV
    position: between-osi-l2-osi-l1
    description: "Supported by most iWARP-capable NICs."

scenarios: []

metadata:
