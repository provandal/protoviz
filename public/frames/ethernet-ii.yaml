id: ethernet-ii
name: "Ethernet II (DIX) Frame"
short_label: "Ethernet"
family: ethernet
osi_layer: "L2"

summary: >
  Classical DIX / Ethernet II frame as used by IP, FCoE, RoCE, and most
  modern protocols. Preamble + SFD synchronize the receiver; 14-byte
  L2 header carries addressing and EtherType demux; payload 46-1500
  bytes (or up to ~9000 for Jumbo); 32-bit FCS trails. Per IEEE 802.3.

layers:
  - id: preamble
    name: "Wire sync (PHY)"
    color: framing
  - id: header
    name: "L2 Header"
    color: addressing
  - id: payload
    name: "Payload"
    color: payload
  - id: trailer
    name: "L2 Trailer"
    color: crc
  - id: ifg
    name: "Inter-Frame Gap"
    color: framing

fields:
  - name: Preamble
    bits: 56
    layer: preamble
    color: framing
    notes: >
      7 bytes of alternating 1s and 0s (0x55 each). Allows the receiver
      PHY to recover bit clock. NOT covered by FCS.

  - name: SFD
    bits: 8
    layer: preamble
    color: framing
    notes: >
      Start Frame Delimiter (0xD5). Marks the end of the preamble and
      the start of frame data. NOT covered by FCS.

  - name: Destination MAC
    bits: 48
    layer: header
    color: addressing
    notes: >
      48-bit destination MAC address. Broadcast = ff:ff:ff:ff:ff:ff;
      multicast has bit 0 of first byte set; unicast otherwise.

  - name: Source MAC
    bits: 48
    layer: header
    color: addressing
    notes: >
      48-bit source MAC address. Always unicast (multicast/broadcast
      bit must be 0).

  - name: EtherType
    bits: 16
    layer: header
    color: control
    notes: >
      Type/Length field. Values >= 0x0600 = EtherType (DIX);
      values < 0x0600 = Length (IEEE 802.3 LLC). Common: 0x0800 IPv4,
      0x86DD IPv6, 0x0806 ARP, 0x8100 802.1Q VLAN, 0x8915 RoCEv1,
      0x8906 FCoE.

  - name: Payload
    bits: 0
    variable: true
    payload: true
    layer: payload
    color: payload
    notes: >
      L2 payload. Minimum 46 bytes (frames shorter than this are
      padded). Standard maximum 1500 bytes; Jumbo Frames extend to
      ~9000 bytes by mutual agreement (not standard in 802.3 base).

  - name: FCS
    bits: 32
    layer: trailer
    color: crc
    is_crc: true
    crc_coverage: { from: "Destination MAC", to: "Payload" }
    notes: >
      Frame Check Sequence. CRC-32 (polynomial 0x04C11DB7) covering
      DA, SA, EtherType, and payload. Does NOT cover preamble or SFD.

  - name: IFG
    bits: 96
    layer: ifg
    color: framing
    wire_only: true
    notes: >
      Inter-Frame Gap. Minimum 96 bit times (12 byte times) of idle
      between successive frames. Required for receiver recovery and
      counted against effective wire throughput.

payload:
  min_bytes: 46
  max_bytes: 1500
  default_bytes: 1500
  jumbo_max_bytes: 9000

wire_overhead:
  before_bytes: 0  # Preamble/SFD/IFG already modeled as fields
  notes: >
    Preamble (7), SFD (1), and IFG (12) are modeled as explicit fields
    so they appear in the diagram. They are NOT covered by FCS and are
    not counted in standard frame-size limits but DO consume wire time.

link_variants:
