    encoding: "8b/10b"
    encoding_ratio: 0.8
    fec: null
    fec_ratio: 1.0
    spec: "IEEE 802.3z"
  - id: 10gbe
    name: "10GbE (10GBASE-R)"
    line_rate_gbaud: 10.3125
    encoding: "64b/66b"
    encoding_ratio: 0.969697
    fec: null
    fec_ratio: 1.0
    spec: "IEEE 802.3ae"
  - id: 25gbe
    name: "25GbE (25GBASE-R)"
    line_rate_gbaud: 25.78125
    encoding: "64b/66b"
    encoding_ratio: 0.969697
    fec: "RS-FEC(528,514)"
    fec_ratio: 0.973485
    spec: "IEEE 802.3by"
  - id: 40gbe
    name: "40GbE (40GBASE-R)"
    line_rate_gbaud: 10.3125
    encoding: "64b/66b"
    encoding_ratio: 0.969697
    fec: null
    fec_ratio: 1.0
    spec: "IEEE 802.3ba"
    notes: "4 × 10.3125 GBd lanes"
  - id: 50gbe
    name: "50GbE (50GBASE-R)"
    line_rate_gbaud: 26.5625
    encoding: "PAM4 + 256b/257b"
    encoding_ratio: 0.996109
    fec: "RS-FEC(544,514)"
    fec_ratio: 0.944853
    spec: "IEEE 802.3cd"
  - id: 100gbe
    name: "100GbE (100GBASE-R, 4×25)"
    line_rate_gbaud: 25.78125
    encoding: "64b/66b"
    encoding_ratio: 0.969697
    fec: "RS-FEC(528,514)"
    fec_ratio: 0.973485
    spec: "IEEE 802.3bj"
    notes: "4 × 25.78125 GBd NRZ"
  - id: 200gbe
    name: "200GbE (200GBASE-R)"
    line_rate_gbaud: 26.5625
    encoding: "PAM4 + 256b/257b"
    encoding_ratio: 0.996109
    fec: "RS-FEC(544,514)"
    fec_ratio: 0.944853
    spec: "IEEE 802.3cd"
    notes: "4 × 26.5625 GBd PAM4"
  - id: 400gbe
    name: "400GbE (400GBASE-R)"
    line_rate_gbaud: 26.5625
    encoding: "PAM4 + 256b/257b"
    encoding_ratio: 0.996109
    fec: "RS-FEC(544,514)"
    fec_ratio: 0.944853
    spec: "IEEE 802.3bs"
    notes: "8 × 26.5625 GBd PAM4 (or 4 × 53.125)"
  - id: 800gbe
    name: "800GbE"
    line_rate_gbaud: 53.125
    encoding: "PAM4 + 256b/257b"
    encoding_ratio: 0.996109
    fec: "RS-FEC(544,514) + interleaving"
    fec_ratio: 0.944853
    spec: "IEEE 802.3df"
    notes: "8 × 53.125 GBd PAM4"

