        lanes: 4
        encoding: "64b/66b"
        encoding_ratio: 0.969697
        fec: "RS-FEC(528,514)"
        fec_ratio: 0.973485
        spec: "IEEE 802.3bj/bm"
      - id: 2x50
        label: "2 × 50 GBd PAM-4 (100GBASE-CR2/DR2)"
        line_rate_gbaud: 26.5625
        lanes: 2
        encoding: "PAM4 + 256b/257b"
        encoding_ratio: 0.996109
        fec: "RS-FEC(544,514)"
        fec_ratio: 0.944853
        spec: "IEEE 802.3cd"
      - id: 1x100
